            - text: ", most of these datasets lack diverse scenarios, focusing only on participation scenarios (PS) and overlooking the agent’s observation scenarios (OS). Additionally, they only focus on factual memory (FM), neglecting reflective memory (RM). Some works do not include the profiles of users. Previous studies typically use these datasets in long-context evaluation methods that do not align with the agent’s memory process. Moreover, the evaluation metrics used with these datasets are not comprehensive."
