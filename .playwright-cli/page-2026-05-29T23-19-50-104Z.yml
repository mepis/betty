          - generic [ref=e382]:
            - heading "3.2 Multi-scenario Memory" [level=3] [ref=e383]:
              - generic [ref=e384]: "3.2"
              - text: Multi-scenario Memory
            - paragraph [ref=e386]: "The interactive scenarios of the agent can be categorized into two types, including the participation scenario and the observation scenario. In the participation scenario, the agent interacts with the user, while in the observation scenario, the agent serves only as an observer, recording user-inputted messages. In the participation scenario, other modules of the agent, such as the reasoning module, will affect the memory module. However, in the observation scenario, the agent does not perform actions and thus does not influence memory. These two scenarios cannot be considered the same. Therefore, we provide the following two types of datasets:"
            - paragraph [ref=e388]: Participation Memory Scenario. The participation memory scenario is represented by the dialogue between the user and the agent, which is the agent’s typical usage scenario. To eliminate the influence of other modules of the agent, we predefine the agent’s responses to the user’s expressions. In the user-agent dialogue interaction, the agent’s memory not only needs to remember the message expressed by the user but also needs to store the message of the agent’s responses, such as the agent’s reply when the user requests a recommendation. In our dataset, the data for participation scenario dataset consists of sessions composed of many turns in dialogues.
            - paragraph [ref=e390]: Observation Memory Scenario. The observation memory scenario is represented by the flow of message input from the user to the agent. In this process, the agent passively receives the user’s message flow over time and does not interact with the user. This scenario focuses on the agent’s role as an observer, where the agent only needs to remember the message expressed by the user without taking any action. In our dataset, the data for observation scenario dataset consists of message lists composed of many messages.
          - generic [ref=e391]:
            - heading "3.3 Multi-level Memory" [level=3] [ref=e392]:
              - generic [ref=e393]: "3.3"
              - text: Multi-level Memory
            - paragraph [ref=e395]: "In the daily usage of LLM-based agents, we expect it to have factual memory capabilities, while also hoping that its memory mechanism can summarize and reason at higher levels to generate reflective memory. Reflective memory enables the agent to gain a more comprehensive understanding of the user, thereby improving the satisfaction of subsequent interactions. From this perspective, we divide the types of memory data and questions in our dataset into two categories:"
            - paragraph [ref=e397]:
              - text: Factual Memory. It refers to the specific factual attributes of the users or the entities associated with them, such as their relative’s age or occupation, the time details of events and so on. This information will be expressed in daily dialogues between users and agents. Asking questions about these attributes can test various memory abilities of the agent. For example, in dialogues, the user may not directly express the time of an event but might use indirect references, such as "next Monday", we can evaluate the agent’s ability to extract information and instantly convert time-related information by asking it the exact time of the day of the month of the event. In addition, we can also evaluate its ability to update knowledge based on different expressions of the same attribute over time. Furthermore, by designing questions that require the integration of multiple entities’ attributes for answers, we evaluate the agent’s memory capability in terms of its memory reasoning abilities in both single-session and multi-session contexts. These question examples are shown in Figure
              - link "3" [ref=e398] [cursor=pointer]:
                - /url: https://arxiv.org/html/2506.21605v1#S3.F3
              - text: .
            - paragraph [ref=e400]: Reflective Memory. Reflective memory refers to the extraction and summarization of high-level preferences based on the user’s expression of low-level preferences, including some factual attributes in the dialogue. For example, the user’s taste preferences are inferred from his expressions of liking for different dishes. To enhance the credibility of the answers, our memory content is reinforced through multiple expressions of different factual preferences or attributes to strengthen the understanding of the agent. We can evaluate the agent’s memory mechanism’s ability to extract and summarize preferences at different levels.
          - generic [ref=e401]:
            - heading "3.4 Multi-metric Evaluation" [level=3] [ref=e402]:
              - generic [ref=e403]: "3.4"
              - text: Multi-metric Evaluation
            - paragraph [ref=e405]: In order to more comprehensively assess the memory mechanism of the agent, we employ a total of four evaluation metrics as follows.
            - paragraph [ref=e407]: Memory Accuracy. To avoid misjudgments caused by the agent’s flexible expression of answers, in our evaluation dataset, all questions are set as multiple-choice questions. After the agent completes the memory process, both the questions and options will be submitted to the agent. The accuracy score of the memory is calculated by comparing the agent’s choice with the true choice.
            - paragraph [ref=e409]: Memory Recall. For retrieval-based memory mechanisms, the accuracy of retrieval is also an important metric that needs to be measured. It not only reflects the agent’s ability to effectively store and organize memory content, but also indicates the agent’s efficient use of memory when answering questions. In the process of creating dialogues, we first generate key evidence dialogues for answering questions, which enables the measurement of retrieval accuracy.
            - paragraph [ref=e411]: Memory Capacity. We consider that the agent’s memory mechanism might have a capacity limit, which is reflected in a sharp decline in accuracy when the amount of memory content reaches a certain point. This critical threshold represents the capacity of the memory. This phenomenon might not exist, because, for example, when evaluating the retrieval-based memory mechanisms, their accuracy depends on the effectiveness of retrieval.
            - paragraph [ref=e413]: Memory Efficiency. Regarding the design of the agent’s memory mechanism, we need to focus not only on the accuracy and completeness of the memory but also on efficiency. Some memory mechanisms may result in excessively high processing time costs for the agent, which could be unacceptable in practical applications.
