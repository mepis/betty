              - text: Comparison of Different Inference Models
            - paragraph [ref=e1068]:
              - text: In practical applications of agents, different models may be selected for different memory mechanisms. Therefore, we evaluate the performance of several common models across various memory mechanisms. Specifically, we selected Qwen2.5-7B-Instruct, gpt-4o-mini, Meta-Llama-3.1-8B-Instruct and glm-4b-chat
              - generic [ref=e1069]:
                - text: GLM et al. (
                - link "2024" [ref=e1070] [cursor=pointer]:
