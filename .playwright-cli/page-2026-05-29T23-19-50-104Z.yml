                - text: )
              - text: . We extract each user’s high-level preferences in each recommendation dataset by identifying the most frequent category of items with which he or she likes or rates positively. If there is no category information, we utilize LLMs(GPT-4o-mini) to summarize the high-level preferences corresponding to these positive relation items. We assign high-level preference attributes using either random matching or matching based on identical attributes, and then we obtain the user’s relation graph shown in Figure
              - link "2" [ref=e350] [cursor=pointer]:
                - /url: https://arxiv.org/html/2506.21605v1#S3.F2
              - text: . At the same time, we construct three one-to-many mappings between high-level preferences and low-level factual attributes with LLMs or the item-category relationships from the recommendation datasets.
            - 'figure "Figure 2: A user relation graph is composed of a user’s profile and his or her associated entities including individuals, events, items and places." [ref=e351]':
              - img "Refer to caption" [ref=e352]
