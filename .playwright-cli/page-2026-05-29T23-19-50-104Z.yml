            - paragraph [ref=e1699]: "Role Dialogue Generation Prompt. Please generate a {round_length}-round interactive conversion between the user and assistant, with a total of {sentence_length} sentences. The dialogue’s main content should based on the given information about the user’s {entity}. Ensure that no information beyond what is provided is introduced in the dialogue. **Note that the user cannot ask the assistant for information because the assistant does not know the information.** Note that the assistant is the user’s personal assistant, so it should only respond passively to the user’s dialogue, but it can reply with varied content. Please return the conversation in a JSON list format as shown in the example, ensuring that the result can be directly parsed by json.loads. **Every json must includes both user and assistant with their words! Every json’s format is {{\"user\": user’s words, \"assistant\": assistant’s words}}** #[Information]: {information}"
            - paragraph [ref=e1701]: "#example: [{{\"user\": \"I wanted to talk to you about my cousin, Ethan Parker. He’s 39 years old.\", \"assistant\": \"Certainly! Ethan is 39. Is there something specific you’d like to discuss about him?\"}}, {{\"user\": \"Well, he’s actually pretty short for a guy, only 162 cm. He always jokes about it, though.\", \"assistant\": \"It sounds like Ethan has a good sense of humor about his height. That’s always a great quality!\"}}, {{\"user\": \"Yes, he really does. It’s one of the things that makes him so fun to be around.\", \"assistant\": \"I can imagine! Having a cousin with a lighthearted attitude must make family gatherings enjoyable.\"}}, {{\"user\": \"Definitely. And since we’re so close in age, it feels like he’s more of a friend than just family.\", \"assistant\": \"That sounds wonderful. It must be special to have that kind of bond with your cousin.\"}} {{\"user\": \"It really is. We’ve shared a lot of memories growing up together.\", \"assistant\": \"Those shared memories must make your relationship even stronger. It sounds like Ethan has been a big part of your life.\"}}]"
            - paragraph [ref=e1703]: "Event Dialogue Generation Prompt. Please generate a {round_length}-round interactive conversion between the user and assistant, with a total of {sentence_length} sentences. The dialogue’s main content should based on the given information about the {event_name}. Ensure that no information beyond what is provided is introduced in the dialogue. Note that the assistant is the user’s personal assistant, so it should only respond passively to the user’s dialogue, but it can reply with varied content. Note that the user cannot ask the assistant for information because the assistant does not know the information. You can start with user saying I’m going to attend {event_name} Please return the conversation in a JSON list format as shown in the example, ensuring that the result can be directly parsed by json.loads. #[Information]: {information}"
            - paragraph [ref=e1705]: "#example: [{{\"user\": \"I wanted to talk to you about my cousin, Ethan Parker. He’s 39 years old.\", \"assistant\": \"Certainly! Ethan is 39. Is there something specific you’d like to discuss about him?\"}}, {{\"user\": \"Well, he’s actually pretty short for a guy, only 162 cm. He always jokes about it, though.\", \"assistant\": \"It sounds like Ethan has a good sense of humor about his height. That’s always a great quality!\"}}, {{\"user\": \"Yes, he really does. It’s one of the things that makes him so fun to be around.\", \"assistant\": \"I can imagine! Having a cousin with a lighthearted attitude must make family gatherings enjoyable.\"}}, {{\"user\": \"Definitely. And since we’re so close in age, it feels like he’s more of a friend than just family.\", \"assistant\": \"That sounds wonderful. It must be special to have that kind of bond with your cousin.\"}} {{\"user\": \"It really is. We’ve shared a lot of memories growing up together.\", \"assistant\": \"Those shared memories must make your relationship even stronger. It sounds like Ethan has been a big part of your life.\"}}]"
