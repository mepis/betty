              - text: User Relation Graph Example
            - paragraph [ref=e1305]: In this section, we present examples of the components of our dataset, including the user graph and test cases. For the user graph, we show profile examples of the user itself, related individuals, events, items, and places.
            - paragraph [ref=e1307]: "UserProfile: \"gender\": \"Male\", \"relationship\": \"self\", \"name\": \"James Smith\", \"age\": \"30 years old\", \"height\": \"164 cm\", \"birthday\": \"08.13\", \"hometown\": \"San Francisco, CA\", \"work location\": \"Boston, MA\", \"education\": \"Associate Degree\", \"occupation\": \"Police Officer\", \"position\": \"Community Policing Officer\", \"company name\": \"Boston Law Enforcement Agency\", \"hobby\": \"Climbing\", \"character\": \"Friendly\", \"contact number\": \"4150430511\", \"email address\": \"james.smith@bostonlawenforcement.gov\", \"ssn\": \"914610199408130162\", \"passport number\": \"PUP4822676\", \"bank account\": \"6222022865544246\", \"driver license\": \"914EAPRDV5F\", \"highlevel preference\": [\"movie genre preference\": (\"Comedy\", \"Romance\", \"Action\", \"Drama\", \"Thriller\"), \"taste preference\": \"Umami and Sweet\", \"book preference\": \"Humor\"]."
            - paragraph [ref=e1309]: "RelativeRoleProfile.\"gender\":\"Male\", \"relationship\":\"Brother\",\"name\": \"Ethan Cooper\",\"age\": \"28 years old\",\"height\": \"165cm\",\"birthday\": \"01/20\",\"hometown\": \"Boston, MA\", \"work location\": \"Los Angeles, CA\", \"education\": \"Associate Degree\", \"occupation\": \"Electrician\", \"position\": \"Electrical Maintenance Technician\", \"company name\": \"SparkLight Electric Services\", \"hobby\": \"Running\", \"character\": \"Thoughtful\", \"contact number\": \"20103787263\",\"email address\": \"ethan.cooper@sparklightelectric.com\""
            - paragraph [ref=e1311]: "ColleagueRoleProfile. \"gender\": \"Male\", \"relationship\": \"boss\", \"name\": \"Nolan Hayes\", \"age\": \"39 years old\",\"height\": \"170cm\",\"birthday\": \"03/24\",\"hometown\": \"Philadelphia, PA\",\"work location\": \"Boston, MA\",\"education\": \"Associate Degree\",\"occupation\": \"Police Officer\",\"position\": \"Police Sergeant\",\"company name\": \"Boston Law Enforcement Agency\", \"hobby\": \"Attending Concerts\",\"character\": \"Empathetic\", \"contact number\": \"30503926075\",\"email address\": \"nolan.hayes@bostonlawagency.gov\""
            - paragraph [ref=e1313]: "WorkEventProfile. \"event type\": \"Company Team Building\", \"main content\": \"Community engagement workshop for team bonding.\", \"location\": \"Los Angeles, CA\", \"time\": \"the week after next Sat 9:00 AM\", \"event name\": \"Team Connect\", \"scale\": \"one hundred people\", \"duration\": \"eight day\""
            - paragraph [ref=e1315]: "RestEventProfile.\"event type\": \"Community Fair\", \"main content\": \"Join us at the Community Fair for climbing challenges, equipment demos, and safety workshops! Engage with fellow enthusiasts, explore local climbing spots, and enjoy inspiring talks from seasoned climbers. Perfect for all skill levels and climbing enthusiasts!\", \"location\": \"Miami, FL\", \"time\": \"2024-10-12 19:00\", \"event name\": \"Climb Fest\", \"scale\": \"nine hundred people\", duration\": \"three day\""
            - paragraph [ref=e1317]: "ItemProfile: \"relationship\": \"Own\", \"item type\": \"Laundry Detergent\", \"item name\": \"Arm & Hammer Liquid Detergent\", \"item review\": \"As a police officer, I’m always on the go, and I need products that can keep up with my busy lifestyle. I’ve been using Arm & Hammer Liquid Detergent for a while now, and I have to say, it’s been a game changer for me. Not only does it tackle tough stains from my uniforms and gear with ease, but it also leaves my clothes smelling fresh and clean. The added baking soda really helps to neutralize odors, which is a must when you’re working in various environments. Plus, I appreciate that it’s available in eco-friendly options, making it easier to care for the planet while looking after my laundry. Definitely a solid choice for anyone looking for effective and reliable detergent!\""
            - paragraph [ref=e1319]: "PlaceProfile. Place example: \"relationship\": \"Visited\",\"place type\": \"Mall\", \"place name\": \"The Grove\", \"place review\": \"I recently visited The Grove and I have to say, it was a really refreshing experience. The vibe there is incredibly friendly and welcoming, just like the community I strive to serve as a police officer. The shops and restaurants offer a great variety, and I especially enjoyed grabbing a bite at one of the local eateries. The layout is easy to navigate, making it a perfect spot to relax and enjoy some fresh air.As someone who loves climbing, I appreciated the green spaces where you can unwind and enjoy nature. It’s a fantastic place to spend time with family or friends. The only downside I found was that it got a bit crowded during peak hours, but that’s to be expected in such a popular location. Overall, I’d highly recommend The Grove to anyone looking for a fun and friendly outing!\""
