          - heading "1 Introduction" [level=2] [ref=e168]:
            - generic [ref=e169]: "1"
            - text: Introduction
          - paragraph [ref=e171]:
            - text: In recent years, large language models (LLMs) have demonstrated remarkable capabilities in processing natural languages and performing complex tasks across various domains
            - generic [ref=e172]:
              - text: Zhao et al. (
              - link "2023" [ref=e173] [cursor=pointer]:
                - /url: https://arxiv.org/html/2506.21605v1#bib.bib28
              - text: ); Wu et al. (
              - link "2024b" [ref=e174] [cursor=pointer]:
                - /url: https://arxiv.org/html/2506.21605v1#bib.bib20
              - text: )
            - text: . However, vanilla LLMs typically operate in static scenarios, without interacting with external environments, thereby limiting their potential advancement toward artificial general intelligence (AGI). To address this limitation, many recent works propose LLM-based agents with extra modules besides the foundation models, enabling them to interact with environments with autonomous learning and dynamic adaptation
            - generic [ref=e175]:
              - text: Wang et al. (
              - link "2024a" [ref=e176] [cursor=pointer]:
                - /url: https://arxiv.org/html/2506.21605v1#bib.bib17
              - text: ); Xi et al. (
              - link "2025" [ref=e177] [cursor=pointer]:
                - /url: https://arxiv.org/html/2506.21605v1#bib.bib21
              - text: )
            - text: . Among them, the memory module serves as an essential foundation for saving critical information and accumulating experiences. It empowers LLM-based agents to better meet the demands of dynamic tasks, as well as evolve within their environments continuously
            - generic [ref=e178]:
              - text: Zhang et al. (
              - link "2024a" [ref=e179] [cursor=pointer]:
                - /url: https://arxiv.org/html/2506.21605v1#bib.bib25
              - text: )
            - text: .
          - paragraph [ref=e181]:
            - text: Some previous studies evaluate the memory capability of LLM-based agents in a subjective way, which adopts human evaluators or LLMs to score the memory process
            - generic [ref=e182]:
              - text: Zhong et al. (
              - link "2024" [ref=e183] [cursor=pointer]:
                - /url: https://arxiv.org/html/2506.21605v1#bib.bib29
              - text: )
            - text: . Other studies focus on the evaluation in an indirect way
            - generic [ref=e184]:
              - text: Packer et al. (
              - link "2023" [ref=e185] [cursor=pointer]:
                - /url: https://arxiv.org/html/2506.21605v1#bib.bib11
              - text: )
            - text: . They measure the task performances of agents conditional on different memory mechanisms, where a better memory mechanism generally leads to better performances. Recently, some studies introduce long-term dialogue datasets, which can be used to evaluate the long-term memory capabilities of LLM-based agents objectively
            - generic [ref=e186]:
              - text: Wu et al. (
              - link "2024a" [ref=e187] [cursor=pointer]:
                - /url: https://arxiv.org/html/2506.21605v1#bib.bib19
              - text: )
            - text: .
          - paragraph [ref=e189]: However, previous works have some limitations on evaluating the memory capability of LLM-based agents. First of all, most of them provide insufficient evaluation of the different levels of memory capabilities, which primarily focus on factual memory while neglecting reflective memory. Here, we define the factual memory as a low-level type of memory that involves information that is explicitly provided. In contrast, the reflective memory stands a higher level, which is not explicitly stated but can be implicitly reflected. For example, a user’s taste preferences represent reflective memory, while their preference for specific dishes is factual memory. Second, most of them are limited to participation scenarios, where the agent interacts with the user from a first-person perspective. However, in the agent’s daily usage, there are also observation scenarios, where the agent observes and records the user’s messages from a third-person perspective. Moreover, most of them are just focusing on the effectiveness of memory mechanisms without considering their efficiency and capacity, which is also significant in real-world applications.
          - paragraph [ref=e191]: "To address these limitations, we propose a more comprehensive dataset and benchmark to evaluate the memory capability of LLM-based agents. The major features of our dataset and benchmark are presented as follows:"
          - paragraph [ref=e193]: Multi-scenario Dataset. To evaluate the agent’s memory capabilities across different scenarios, our dataset includes data from two common usage scenarios. The first is the participation scenario, where the agent interacts with the user. The second is the observation scenario, where the agent is assumed as the role of an observer and required to record the information provided by the user.
          - paragraph [ref=e195]: Multi-level Memory Content. Our dataset focuses on both factual memory and reflective memory, enabling a comprehensive evaluation of the memory capability of LLM-based agents. It allows for the evaluation of memory capabilities in tasks including information extraction, cross-session reasoning, knowledge updating, temporal reasoning, as well as reflective summarization.
          - paragraph [ref=e197]: Multi-metric Evaluation. Based on our dataset, we introduce a multi-metric benchmark to evaluate the memory capabilities of LLM-based agents. To provide a comprehensive and obvious assessment of the various aspects of the agent’s memory performance, we offer four evaluation metrics, including accuracy, recall, capacity, and temporal efficiency.
          - paragraph [ref=e199]:
            - text: In summary, we introduce a dataset featuring multi-scenario and multi-level content, which is distinctively different from previous datasets. Additionally, we introduce a more comprehensive benchmark with mutli-metric evaluations. To benefit the research community, we have released our dataset and project at Github repository
            - superscript [ref=e201]: "*"
            - text: . In the following parts, we provide the related works in Section
            - link "2" [ref=e202] [cursor=pointer]:
              - /url: https://arxiv.org/html/2506.21605v1#S2
            - text: . We illustrate the process of data construction in Section
            - link "3" [ref=e203] [cursor=pointer]:
              - /url: https://arxiv.org/html/2506.21605v1#S3
            - text: ", and present the benchmark with analyses in Section"
            - link "4" [ref=e204] [cursor=pointer]:
              - /url: https://arxiv.org/html/2506.21605v1#S4
            - text: . Finally, we draw conclusions of our paper in Section
            - link "5" [ref=e205] [cursor=pointer]:
              - /url: https://arxiv.org/html/2506.21605v1#S5
            - text: .
