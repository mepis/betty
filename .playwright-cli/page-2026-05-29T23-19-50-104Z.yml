              - link "5" [ref=e1071] [cursor=pointer]:
                - /url: https://arxiv.org/html/2506.21605v1#S4.T5
              - text: . Under the same context window length, the choice of base model significantly affects the agents’ performence. In most cases, GPT-4o-mini performs as the best model compared to others. Although the factual memory capability of Meta-Llama-3.1-8B-Instruct is notably inferior to that of other models, its reflective memory ability is still relatively good. Interestingly, for GenerativeAgent, choosing GPT-4o-mini as the base model results in a significantly higher time consumption compared to other models in our experiments. However, in most cases, the time consumption differences between the three models are not substantial.
        - generic [ref=e1072]:
          - heading "5 Conclusion" [level=2] [ref=e1073]:
            - generic [ref=e1074]: "5"
            - text: Conclusion
          - paragraph [ref=e1076]: This paper provides a more comprehensive and scalable dataset for evaluating LLM-based agent’s memory mechanisms. It includes a dataset with multi-scenarios (both participation and observation), and multi-level memory content include reflective memory and factual memory. Based on this dataset, we constructed a time-aware evaluation framework that simulates the daily interactions between users and agents with multi-metric include accuracy, recall, capacity and temporal efficiency. We evaluate the performance of seven common memory mechanisms in agents on our benchmark.
        - generic [ref=e1077]:
          - heading "Limitations" [level=2] [ref=e1078]
          - paragraph [ref=e1080]: The dataset proposed in this paper consists of a graph formed by the profiles of users and relevant entities, enabling further exploration of the agent’s memory mechanism. Our evaluation method is limited by an assessment of memory for structured data. However, by comparing the construction of relevant entity profiles or the capture of specific attribute information in the agent’s memory during user-agent interactions, we can investigate the agent’s ability to structure memory. In addition, there are still many areas to explore in reflective memory, such as users’ emotional memory.
        - generic [ref=e1081]:
          - heading "Ethics Statement" [level=2] [ref=e1082]
          - paragraph [ref=e1084]: The data used in this article to construct the dataset includes data from publicly available, authorized datasets. All publicly available data are used in accordance with their respective licenses for research purposes. The LLM-generated content may pose risks, including the potential for unintended biases or harmful output. Although we have taken steps to minimize these risks, we encourage users to apply the dataset responsibly to avoid ethical risks.
        - generic [ref=e1085]:
