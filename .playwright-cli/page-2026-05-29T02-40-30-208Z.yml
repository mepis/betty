          - paragraph [ref=e709]: Some of these quants (Q3_K_XL, Q4_K_L etc) are the standard quantization method with the embeddings and output weights quantized to Q8_0 instead of what they would normally default to.
          - heading "Downloading using huggingface-cli" [level=2] [ref=e710]:
