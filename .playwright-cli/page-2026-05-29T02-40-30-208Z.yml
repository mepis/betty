            - generic [ref=e723]: ARM/AVX information
          - paragraph [ref=e724]: Previously, you would download Q4_0_4_4/4_8/8_8, and these would have their weights interleaved in memory in order to improve performance on ARM and AVX machines by loading up more data in one pass.
          - paragraph [ref=e725]:
            - text: Now, however, there is something called "online repacking" for weights. details in
            - link "this PR" [ref=e726] [cursor=pointer]:
              - /url: https://github.com/ggml-org/llama.cpp/pull/9921
            - text: . If you use Q4_0 and your hardware would benefit from repacking weights, it will do it automatically on the fly.
          - paragraph [ref=e727]:
            - text: As of llama.cpp build
            - link "b4282" [ref=e728] [cursor=pointer]:
              - /url: https://github.com/ggml-org/llama.cpp/releases/tag/b4282
            - text: you will not be able to run the Q4_0_X_X files and will instead need to use Q4_0.
          - paragraph [ref=e729]:
            - text: Additionally, if you want to get slightly better quality for , you can use IQ4_NL thanks to
            - link "this PR" [ref=e730] [cursor=pointer]:
              - /url: https://github.com/ggml-org/llama.cpp/pull/10541
            - text: which will also repack the weights for ARM, though only the 4_4 for now. The loading time may be slower but it will result in an overall speed incrase.
