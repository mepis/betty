                    - generic [ref=e371]:
                      - paragraph [ref=e372]: "I have to assume you do not understand what I am trying to explore, as your \"Collaborator\" badge suggests knowledge about llama.cpp in general... Maybe I explained it badly, excuse my (non-native language) explaination. I will try again:"
                      - paragraph [ref=e373]: Fit determines optimal placement of layers regarding memory usage of layers across GPUs and system RAM. That's not what I am after alone.
                      - paragraph [ref=e374]:
                        - text: Try running llama-bench with two different GPUs (with enough memory together to fit the whole model plus cache/overhead) with -v, and you will see (enabling auto fit e.g. using
                        - code [ref=e375]: "-fitt 1"
                        - text: ), that it assigns first a number of layers to GPU0, and then the remaining layers to GPU1. The distribution is somewhat proportional.
                        - text: This works fine with identical GPUs, but less so when the first GPU is orders of magnitude faster. In that case, manually assigning as many layers as possible to the faster GPU gives a performance advantage.
                      - paragraph [ref=e376]:
                        - text: Now for a MoE model, the same thing happens. The MoE tensors are assigned to the same GPU as their whole layer. No special treatment of MoE tensors
                        - emphasis [ref=e377]: as long as it fits to the available total VRAM
                        - text: .
                      - paragraph [ref=e378]:
                        - text: Now, disable the secondary, slower GPU with
                        - code [ref=e379]: GGML_VK_VISIBLE_DEVICES=0
                        - text: and retry. The model will
                        - emphasis [ref=e380]: no longer fit
                        - text: on the single GPU. In that case, Auto-Fit will prefer to offload the MoE tensors of n.x
                        - strong [ref=e381]: last
                        - text: layers to Vulkan_Host (i.e. CPU/System RAM) to fit the rest on the GPU, and it will even choose on a tensor group level within the same layer! It also takes quite some time, and produces extensive log output documenting dozens of fitting attempts until the optimal MoE tensor offload is found.
                        - text: The result is similar to using
                        - code [ref=e382]: "-ncmoe n"
                        - text: ", only that this offloads the MoE Tensors of the"
                        - strong [ref=e383]: first
                        - text: n layers to CPU/System RAM. (That difference on its own is interesting as well).
                      - paragraph [ref=e384]:
                        - text: The two variants (for
                        - code [ref=e385]: "-ncmoe"
                        - text: I had to choose the first
                        - strong [ref=e386]: "12"
                        - text: "layers to fit the rest without GTT spillover, while Fit chose the last 10 plus a few from the 11th-last layer.. suggesting non-uniform layer sizes):"
