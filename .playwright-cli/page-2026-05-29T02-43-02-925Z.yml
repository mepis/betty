                      - paragraph [ref=e395]: Both approaches provide a (subjectively) optimal result for 1 GPU plus System RAM.
                      - paragraph [ref=e396]:
                        - text: But neither variants do offload MoE tensors
                        - strong [ref=e397]: to the second GPU
                        - text: . Fit treats multiple GPUs as equal (which arguably fits (pun intended) 99% of multi-GPU users out there).
                      - paragraph [ref=e398]: So, to conclude, "It is recommended not to use to do manual tensor placement and let fit do the work." is, in my experience, bad advice (as most passive-voice phrasings attributed to an unknown, unseen authority, are). I would rather recommend to use auto fit as a base line to get a working setup, but to take the results and tweak afterwards to improve performance further, especially with a budget/hybrid/frankenstein/iGPU setup.
                      - paragraph [ref=e399]: "(And it gets even spicier: only with llama-bench's tiny context window, it fits on both GPUs. with llama-server and a useful context size, I also have to offload a tiny bit to the system (or switch to a smaller quant))"
                      - paragraph [ref=e400]: "The remaining interesting questions are:"
