            - generic [ref=e93]:
              - generic [ref=e94]:
                - heading "post by Someone on Mar 2" [level=2] [ref=e95]
                - article "post by Someone on Mar 2" [ref=e96]:
                  - generic [ref=e97]:
                    - generic "Someone's profile" [ref=e100]
                    - generic [ref=e101]:
                      - generic [ref=e102]:
                        - generic "Someone's profile" [ref=e105]: Someone
                        - link "Mar 2" [ref=e108] [cursor=pointer]:
                          - /url: /t/does-qwen3-5-35b-a3b-on-gb10-leave-a-lot-of-performance-on-the-table/362200
                      - generic [ref=e109]:
                        - generic [ref=e110]:
                          - paragraph [ref=e111]:
                            - text: Looking at the
                            - link "Spark Arena - LLM Leaderboard link clicked 166 times" [ref=e112] [cursor=pointer]:
                              - /url: https://spark-arena.com/leaderboard
                              - text: Spark Arena - LLM Leaderboard 166
                            - text: "for Qwen3.5-35B-A3B I`m very disappointed by the concurrency speeds results. I`m no expert what so ever but I tried to find ways to optimize this by the time my first DGX Spark unit that I have ordered arrives. Please fell free to correct anything I say as I have no previous experience doing this."
                          - paragraph [ref=e113]:
                            - text: The main target for me is to optimize GB10 to work efficiently with the very fast growing context window of OpenClaw. I looked at my OpenRouter logs and the context for the main agent starts at 10K and grows with about 5K for each prompt up to 150K or more. The output seems to fluctuate in between 150-500 tokens and the total ratio for a few weeks of usage is 130:1 input:output tokens. Gemini recommended using instead of the internal MTP head the
                            - strong [ref=e114]: LongSpec/OWL LSTM.
                          - paragraph [ref=e115]: I truly hope there is someone here willing to implement this and release some benchmark results as I fell so disappointed by the current results. I already spent all afternoon to get to these optimizations and I hope they actually work.
                          - paragraph [ref=e116]: "From this point further I will paste out of my conversations with Gemini and what it recommends as being the reasons and the fix for the benchmark results on Spark Arena:"
                          - separator [ref=e117]
                          - paragraph [ref=e118]:
                            - text: ‘The results from
                            - strong [ref=e119]:
                              - link "spark-arena.com link clicked 64 times" [ref=e120] [cursor=pointer]:
                                - /url: http://spark-arena.com
                                - text: spark-arena.com 64
                            - text: "perfectly illustrate why your current setup is hitting a wall. You are experiencing a massive performance “cliff” as the context grows:"
                          - list [ref=e121]:
                            - listitem [ref=e122]:
                              - paragraph [ref=e123]:
                                - strong [ref=e124]: "Prompt Processing (PP):"
                                - text: Your speed drops from
                                - strong [ref=e125]: 3918 tok/s
                                - text: (2K context) to a staggering
                                - strong [ref=e126]: 60.66 tok/s
                                - text: (100K context). That is a
                                - strong [ref=e127]: 64x slowdown
                                - text: .
                            - listitem [ref=e128]:
                              - paragraph [ref=e129]:
                                - strong [ref=e130]: "Text Generation (TG):"
                                - text: Your output drops from
                                - strong [ref=e131]: 98.15 tok/s
                                - text: to
                                - strong [ref=e132]: 4.02 tok/s
                                - text: at 100K. This makes the agent feel “frozen” rather than interactive.
                          - separator [ref=e133]
                          - paragraph [ref=e134]:
                            - text: To ensure our 4-agent deployment (growing from 10K to 150K context) avoids the catastrophic performance degradation observed in standard benchmarks—where speed drops by 98% at 100K tokens—we are moving to an
                            - strong [ref=e135]: LSTM-based speculative architecture (OWL/LongSpec)
                            - text: .
                          - paragraph [ref=e136]: Unlike official MTP or Eagle-3 heads, the LSTM architecture is context-agnostic and will not “choke” as the agents’ conversation history scales.
                          - 'heading "Heading linkI. Core Hardware Strategy: CPU-GPU Offloading" [level=4] [ref=e137]':
                            - link "Heading link":
                              - /url: "#p-1767368-i-core-hardware-strategy-cpu-gpu-offloading-1"
                            - strong [ref=e138]: "I. Core Hardware Strategy: CPU-GPU Offloading"
                          - paragraph [ref=e139]:
                            - text: The
                            - strong [ref=e140]: Grace Arm CPU (20 cores)
                            - text: on our DGX Spark shares 128GB of unified memory with the Blackwell GPU. We will offload the drafting phase to the CPU cores (
                            - code [ref=e141]: "--speculative-draft-device cpu"
                            - text: ). This prevents GPU stalling and saves VRAM for the massive 150K token KV cache.
                          - heading "Heading linkII. Implementation Paths (Select Version 2 for Maximum Speed)" [level=4] [ref=e142]:
                            - link "Heading link":
                              - /url: "#p-1767368-ii-implementation-paths-select-version-2-for-maximum-speed-2"
                            - strong [ref=e143]: II. Implementation Paths (Select Version 2 for Maximum Speed)
                          - paragraph [ref=e144]:
                            - text: We have two options for the drafter model.
                            - strong [ref=e145]: Version 2 is the recommended target
                            - text: for production as it aligns the drafter specifically to our quantized 4-bit model.
                          - paragraph [ref=e146]:
                            - strong [ref=e147]: "Version 1: The “Off-the-Shelf” Drafter (Fastest to Start)"
                            - text: Uses a pre-trained drafter designed for the QwQ series. It is a good baseline but may have lower acceptance rates with our specific quantized 35B A3B weights.
                          - list [ref=e148]:
                            - listitem [ref=e149]:
                              - strong [ref=e150]: "Step:"
                              - text: "Download and point SGLang to the weights:"
                              - code [ref=e151]: huggingface-cli download sail/longspec-QwQ-32B-Preview --local-dir ./longspec-drafter
                          - paragraph [ref=e152]:
                            - strong [ref=e153]: "Version 2: The “Custom Distilled” Drafter (Recommended for Performance)"
                            - text: We will perform a synthetic distillation of a 0.6B LSTM drafter directly from the
                            - strong [ref=e154]: cyankiwi/Qwen3.5-35B-A3B-AWQ-4bit
                            - text: model.
                          - list [ref=e155]:
                            - listitem [ref=e156]:
                              - paragraph [ref=e157]:
                                - strong [ref=e158]: "Why it’s better:"
                                - text: It teaches the drafter to predict the exact output patterns of our specific 4-bit quantized model. This results in a higher “Acceptance Rate,” which directly translates to more tokens per second at 150K context.
                            - listitem [ref=e159]:
                              - paragraph [ref=e160]:
                                - strong [ref=e161]: "Action:"
                                - text: "Run the following robust distillation script:"
                              - list [ref=e162]:
                                - listitem [ref=e163]:
                                  - paragraph [ref=e164]: Bash
                                  - code [ref=e167]: python longspec/train/train_drafter.py \ --model_name_or_path cyankiwi/Qwen3.5-35B-A3B-AWQ-4bit \ --drafter_arch lstm \ --dataset_name sail/longspec-data \ --output_dir ./custom-qwen-drafter \ --per_device_train_batch_size 4 \ --gradient_accumulation_steps 8 \ --learning_rate 5e-4 \ --num_train_epochs 3 \ --bf16 True \ --use_marlin True \ --anchor_offset_training True
                              - heading "Heading linkIII. Final Launch Configuration" [level=4] [ref=e168]:
                                - link "Heading link":
                                  - /url: "#p-1767368-iii-final-launch-configuration-3"
                                - strong [ref=e169]: III. Final Launch Configuration
                          - paragraph [ref=e170]:
                            - text: Once the drafter is selected/trained, use the following SGLang configuration to lock in the
                            - strong [ref=e171]: Marlin kernels
                            - text: and
                            - strong [ref=e172]: FP8 KV Cache
                            - text: ":"
                          - paragraph [ref=e173]: Bash
                          - code [ref=e176]: python -m sglang.launch_server \ --model-path cyankiwi/Qwen3.5-35B-A3B-AWQ-4bit \ --quantization awq_marlin \ --speculative-model ./custom-qwen-drafter \ --speculative-draft-device cpu \ --speculative-algo HOWL \ --kv-cache-dtype fp8 \ --context-length 262144 \ --mem-fraction-static 0.8 \ --enable-prefix-caching
                          - heading "Heading linkIV. Summary of Impact" [level=4] [ref=e177]:
                            - link "Heading link":
                              - /url: "#p-1767368-iv-summary-of-impact-4"
                            - strong [ref=e178]: IV. Summary of Impact
                          - paragraph [ref=e179]:
                            - text: By combining
                            - strong [ref=e180]: W4A16 Marlin weights
                            - text: with a
                            - strong [ref=e181]: CPU-offloaded OWL/HOWL drafter
                            - text: ", we leverage the full Unified Memory architecture of the Spark. This setup is designed to maintain"
                            - strong [ref=e182]: 25–40 tokens/sec
                            - text: at 150K context, preventing the performance cliff that would otherwise stall our agents.
                          - separator [ref=e183]
                          - paragraph [ref=e184]: "IMPORTANT NOTE:"
                          - paragraph [ref=e185]:
                            - text: We chose the
                            - strong [ref=e186]: cyankiwi/Qwen3.5-35B-A3B-AWQ-4bit
                            - text: "version for three specific reasons that are critical to our 150K context target:"
                          - list [ref=e187]:
                            - listitem [ref=e188]:
                              - paragraph [ref=e189]:
                                - strong [ref=e190]: "1M Context Ready:"
                                - text: Unlike standard quants, this version includes specific configuration overrides that extend the context window stability up to
                                - strong [ref=e191]: 1 million tokens
                                - text: ", ensuring the model doesn’t lose logic as we hit our 150K agentic limit."
                            - listitem [ref=e192]:
                              - paragraph [ref=e193]:
                                - strong [ref=e194]: "MTP Layer Preservation:"
                                - text: It is one of the few 4-bit quants that preserves the
                                - strong [ref=e195]: Multi-Token Prediction (MTP)
                                - text: layers. This is vital because our Version 2 distillation depends on these layers to train the LSTM drafter effectively.
                            - listitem [ref=e196]:
                              - paragraph [ref=e197]:
                                - strong [ref=e198]: "Blackwell Optimization:"
                                - text: The AWQ format used here is fully compatible with
                                - strong [ref=e199]: Marlin kernels
                                - text: ", which are the only way to achieve maximum throughput on the DGX Spark’s Blackwell architecture while keeping the model size under 20GB."
