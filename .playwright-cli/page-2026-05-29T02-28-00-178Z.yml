                      - generic [ref=e141]:
                        - generic [ref=e142]:
                          - paragraph [ref=e143]: I don’t have any formal training in AI and many technical discussions I online are way over my head, but I bought a 16 GB GPU for my computer and have been tinkering with LLMs for a long time now. A couple days ago, I got my DGX spark, and am trying to move from Ollama (which I have used for a while and am familiar with) to llama.cpp.
                          - list [ref=e144]:
                            - listitem [ref=e145]:
                              - text: I’m hoping some folks can suggest any improvements to either compilation or command-line options for
                              - code [ref=e146]: llama-server
                            - listitem [ref=e147]: I am having problems with crashing due to memory errors, or poor performance when I attempt to run a larger model (test results below).
                            - listitem [ref=e148]: Maybe the model I chose to test is unsuited for DGX spark (I am just learning about dense vs MOE models).
                            - listitem [ref=e149]:
                              - strong [ref=e150]: Thanks!!
                          - heading "Heading linkllama.cpp info" [level=2] [ref=e151]:
                            - link "Heading link":
                              - /url: "#p-1742383-llamacpp-info-1"
                            - text: llama.cpp info
                          - paragraph [ref=e152]:
                            - text: The repo I cloned has tag
                            - code [ref=e153]: b7653
                            - text: (Dated Jan 7, 2026)
                            - strong [ref=e154]: "Commands used to compile:"
                          - code [ref=e157]: "cmake .. -B build -DGGML_CUDA=ON -DLLAMA_CURL=ON -DGGML_NATIVE=OFF` cmake --build build --config Release -j 16"
                          - paragraph [ref=e158]:
                            - text: I followed the Nvidia Spark
                            - link "playbook link clicked 5 times" [ref=e159] [cursor=pointer]:
                              - /url: https://build.nvidia.com/spark/nemotron
                              - text: playbook 5
                            - text: (with some changes to the building compilation options) and can run
                            - emphasis [ref=e160]: Nemotron-3-Nano-30B-A3B-UD-Q8_K_XL.gguf
                            - text: with good performance (48 t/s).
                          - paragraph [ref=e161]:
                            - text: I wanted to step it up a notch, so tried out
                            - link "bartowski/mistralai_Devstral-2-123B-Instruct-2512-GGUF-Q6_K link clicked 2 times" [ref=e162] [cursor=pointer]:
                              - /url: https://huggingface.co/bartowski/mistralai_Devstral-2-123B-Instruct-2512-GGUF/tree/4a730f6f1a6d88a1b85bca12bd503bc0b86d79b4/mistralai_Devstral-2-123B-Instruct-2512-Q6_K
