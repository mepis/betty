          - heading "Anchor Query planning" [level=2] [ref=e1807]:
            - link "Anchor" [ref=e1808] [cursor=pointer]:
              - /url: "#query-planning"
              - text: 
            - text: Query planning
          - paragraph [ref=e1809]: Depending on the filter used in the search - there are several possible scenarios for query execution. Qdrant chooses one of the query execution options depending on the available indexes, the complexity of the conditions and the cardinality of the filtering result. This process is called query planning.
          - paragraph [ref=e1810]: "The strategy selection process relies heavily on heuristics and can vary from release to release. However, the general principles are:"
          - list [ref=e1811]:
            - listitem [ref=e1812]:
              - text: planning is performed for each segment independently (see
              - link "storage" [ref=e1813] [cursor=pointer]:
                - /url: https://qdrant.tech/documentation/manage-data/storage/
              - text: for more information about segments)
            - listitem [ref=e1814]: prefer a full scan if the amount of points is below a threshold
            - listitem [ref=e1815]: estimate the cardinality of a filtered result before selecting a strategy
            - listitem [ref=e1816]:
              - text: retrieve points using payload index (see
              - link "indexing" [ref=e1817] [cursor=pointer]:
                - /url: https://qdrant.tech/documentation/manage-data/indexing/
              - text: ) if cardinality is below threshold
            - listitem [ref=e1818]: use filterable vector index if the cardinality is above a threshold
            - listitem [ref=e1819]: use ACORN when the selectivity (ratio) is low, but the cardinality (an amount) is still high
          - paragraph [ref=e1820]:
            - text: You can adjust the threshold using a
            - link "configuration file" [ref=e1821] [cursor=pointer]:
              - /url: https://github.com/qdrant/qdrant/blob/master/config/config.yaml
            - text: ", as well as independently for each collection."
