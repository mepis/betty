            - code [ref=e1400]: "\"document_id\": \"a\""
            - text: and
            - code [ref=e1401]: "document_id: \"b\""
            - text: ).
          - status [ref=e1402]: "ⓘ This feature relies heavily on the `group_by` key provided. To improve performance, make sure to create a dedicated index for it."
          - paragraph [ref=e1403]:
            - strong [ref=e1404]: Limitations
            - text: ":"
          - list [ref=e1405]:
            - listitem [ref=e1406]:
              - text: Only
              - link "keyword" [ref=e1407] [cursor=pointer]:
                - /url: https://qdrant.tech/documentation/manage-data/payload/#keyword
              - text: and
              - link "integer" [ref=e1408] [cursor=pointer]:
                - /url: https://qdrant.tech/documentation/manage-data/payload/#integer
              - text: payload values are supported for the
              - code [ref=e1409]: group_by
              - text: parameter. Payload values with other types will be ignored.
            - listitem [ref=e1410]:
              - text: At the moment, pagination is not enabled when using
              - strong [ref=e1411]: groups
              - text: ", so the"
              - code [ref=e1412]: offset
              - text: parameter is not allowed.
          - heading "Anchor Lookup in groups" [level=3] [ref=e1413]:
            - link "Anchor" [ref=e1414] [cursor=pointer]:
              - /url: "#lookup-in-groups"
              - text: 
            - text: Lookup in groups
          - paragraph [ref=e1415]: When the points in a group share large fields like titles, abstracts, or full document vectors, copying that data onto every point inflates storage and forces you to rewrite every chunk whenever a shared field changes.
          - paragraph [ref=e1416]:
            - code [ref=e1417]: with_lookup
            - text: solves this. Store the shared data once in a separate collection, then attach it to each group at query time using the
            - link "groups API" [ref=e1418] [cursor=pointer]:
              - /url: "#grouping-api"
            - text: .
          - paragraph [ref=e1419]:
            - img "Group id matches point id" [ref=e1420]
          - status [ref=e1421]: ⓘ Store only document-level metadata (e.g., titles, abstracts) in the lookup collection, not chunks or duplicated data.
          - paragraph [ref=e1422]:
            - text: Set up the two collections.
            - code [ref=e1423]: chunks
            - text: holds one point per chunk with its own vector.
            - code [ref=e1424]: documents
            - text: holds one point per document with payload only. The payload index on
            - code [ref=e1425]: document_id
            - text: lets
            - code [ref=e1426]: group_by
            - text: work on that field.
