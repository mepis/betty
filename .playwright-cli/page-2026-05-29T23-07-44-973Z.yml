          - heading "Anchor Filtering results by score" [level=3] [ref=e525]:
            - link "Anchor" [ref=e526] [cursor=pointer]:
              - /url: "#filtering-results-by-score"
              - text: 
            - text: Filtering results by score
          - paragraph [ref=e527]:
            - text: In addition to payload filtering, it might be useful to filter out results with a low similarity score. For example, if you know the minimal acceptance score for your model and do not want any results which are less similar than the threshold. In this case, you can use
            - code [ref=e528]: score_threshold
            - text: parameter of the search query. It will exclude all results with a score worse than the given.
          - status [ref=e529]: ⓘ This parameter may exclude lower or higher scores depending on the used metric. For example, higher scores of Euclidean metric are considered more distant and, therefore, will be excluded.
          - heading "Anchor Payload and vector in the result" [level=3] [ref=e530]:
            - link "Anchor" [ref=e531] [cursor=pointer]:
              - /url: "#payload-and-vector-in-the-result"
              - text: 
            - text: Payload and vector in the result
          - paragraph [ref=e532]:
            - text: By default, retrieval methods do not return any stored information such as payload and vectors. Additional parameters
            - code [ref=e533]: with_vectors
            - text: and
            - code [ref=e534]: with_payload
            - text: alter this behavior.
          - paragraph [ref=e535]: "Example:"
          - generic [ref=e537]:
