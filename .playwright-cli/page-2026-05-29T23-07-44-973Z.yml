          - paragraph [ref=e1761]:
            - emphasis [ref=e1762]: Available as of v1.11.0
          - paragraph [ref=e1763]: In some cases it might be useful to retrieve a random sample of points from the collection. This can be useful for debugging, testing, or for providing entry points for exploration.
          - paragraph [ref=e1764]:
            - text: Random sampling API is a part of
            - link "Universal Query API" [ref=e1765] [cursor=pointer]:
