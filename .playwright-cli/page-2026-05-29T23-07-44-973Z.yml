          - paragraph [ref=e359]:
            - text: Values under the key
            - code [ref=e360]: params
            - text: "specify custom parameters for the search. Currently, it could be:"
          - list [ref=e361]:
            - listitem [ref=e362]:
              - code [ref=e363]: hnsw_ef
              - text: "- value that specifies"
              - code [ref=e364]: ef
              - text: parameter of the HNSW algorithm.
            - listitem [ref=e365]:
              - code [ref=e366]: exact
              - text: "- option to not use the approximate search (ANN). If set to true, the search may run for a long as it performs a full scan to retrieve exact results."
            - listitem [ref=e367]:
