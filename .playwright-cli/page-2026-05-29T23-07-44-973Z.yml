          - heading "Anchor Metrics" [level=2] [ref=e257]:
            - link "Anchor" [ref=e258] [cursor=pointer]:
              - /url: "#metrics"
              - text: 
            - text: Metrics
          - paragraph [ref=e259]: There are many ways to estimate the similarity of vectors with each other. In Qdrant terms, these ways are called metrics. The choice of metric depends on the vectors obtained and, in particular, on the neural network encoder training method.
          - paragraph [ref=e260]: "Qdrant supports these most popular types of metrics:"
          - list [ref=e261]:
            - listitem [ref=e262]:
              - text: "Dot product:"
              - code [ref=e263]: Dot
              - text: "-"
              - link "https://en.wikipedia.org/wiki/Dot_product" [ref=e264] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Dot_product
            - listitem [ref=e265]:
              - text: "Cosine similarity:"
              - code [ref=e266]: Cosine
              - text: "-"
              - link "https://en.wikipedia.org/wiki/Cosine_similarity" [ref=e267] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Cosine_similarity
            - listitem [ref=e268]:
              - text: "Euclidean distance:"
              - code [ref=e269]: Euclid
              - text: "-"
              - link "https://en.wikipedia.org/wiki/Euclidean_distance" [ref=e270] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Euclidean_distance
            - listitem [ref=e271]:
              - text: "Manhattan distance:"
              - code [ref=e272]: Manhattan
              - text: "*-"
              - link "https://en.wikipedia.org/wiki/Taxicab_geometry" [ref=e273] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Taxicab_geometry
              - superscript [ref=e275]: "*Available as of v1.7"
          - paragraph [ref=e276]: The most typical metric used in similarity learning models is the cosine metric.
          - paragraph [ref=e277]:
            - img "Embeddings" [ref=e278]
          - paragraph [ref=e279]: Qdrant counts this metric in 2 steps, due to which a higher search speed is achieved. The first step is to normalize the vector when adding it to the collection. It happens only once for each vector.
          - paragraph [ref=e280]: The second step is the comparison of vectors. In this case, it becomes equivalent to dot production - a very fast operation due to SIMD.
          - paragraph [ref=e281]:
            - text: Depending on the query configuration, Qdrant might prefer different strategies for the search. Read more about it in the
            - link "query planning" [ref=e282] [cursor=pointer]:
              - /url: "#query-planning"
            - text: section.
          - heading "Anchor Search API" [level=2] [ref=e283]:
            - link "Anchor" [ref=e284] [cursor=pointer]:
              - /url: "#search-api"
              - text: 
            - text: Search API
          - paragraph [ref=e285]: Let’s look at an example of a search query.
