              - text: 
            - text: Pagination
          - paragraph [ref=e1096]:
            - text: Search and
            - link "recommendation" [ref=e1097] [cursor=pointer]:
              - /url: https://qdrant.tech/documentation/search/explore/#recommendation-api
            - text: "APIs allow to skip first results of the search and return only the result starting from some specified offset:"
          - paragraph [ref=e1098]: "Example:"
          - generic [ref=e1100]:
            - generic [ref=e1103]: http
            - generic [ref=e1106]: python
            - generic [ref=e1109]: typescript
            - generic [ref=e1112]: rust
            - generic [ref=e1115]: java
            - generic [ref=e1118]: csharp
            - generic [ref=e1121]: go
          - generic [ref=e1123]:
            - code [ref=e1125]:
              - generic [ref=e1127]: "POST /collections/{collection_name}/points/query"
              - generic [ref=e1129]: "{"
              - generic [ref=e1131]: "\"query\": [0.2, 0.1, 0.9, 0.7],"
              - generic [ref=e1133]: "\"with_vectors\": true,"
              - generic [ref=e1135]: "\"with_payload\": true,"
              - generic [ref=e1137]: "\"limit\": 10,"
              - generic [ref=e1139]: "\"offset\": 100"
              - generic [ref=e1141]: "}"
            - button "Copy to clipboard" [ref=e1142] [cursor=pointer]:
              - tooltip "Copy to clipboard" [ref=e1143]
          - paragraph [ref=e1144]: Is equivalent to retrieving the 11th page with 10 records per page.
          - alert [ref=e1145]: ⚠ Large offset values may cause performance issues
          - paragraph [ref=e1146]: Vector-based retrieval in general and HNSW index in particular, are not designed to be paginated. It is impossible to retrieve Nth closest vector without retrieving the first N vectors first.
          - paragraph [ref=e1147]: However, using the offset parameter saves the resources by reducing network traffic and the number of times the storage is accessed.
          - paragraph [ref=e1148]:
            - text: Using an
            - code [ref=e1149]: offset
            - text: parameter, will require to internally retrieve
            - code [ref=e1150]: offset + limit
            - text: points, but only access payload and vector from the storage those points which are going to be actually returned.
          - heading "Anchor Grouping API" [level=2] [ref=e1151]:
            - link "Anchor" [ref=e1152] [cursor=pointer]:
              - /url: "#grouping-api"
              - text: 
            - text: Grouping API
          - paragraph [ref=e1153]: It is possible to group results by a certain field. This is useful when you have multiple points for the same item, and you want to avoid redundancy of the same item in the results.
          - paragraph [ref=e1154]:
            - text: For example, if you have a large document split into multiple chunks, and you want to search or
            - link "recommend" [ref=e1155] [cursor=pointer]:
              - /url: https://qdrant.tech/documentation/search/explore/#recommendation-api
            - text: on a per-document basis, you can group the results by the document ID.
