            - text: Since ACORN is significantly slower (approximately 2-10x in typical scenarios) but improves recall for restrictive filters, tuning this parameter is about deciding when the accuracy improvement justifies the performance cost.
          - heading "Anchor Batch search API" [level=2] [ref=e852]:
            - link "Anchor" [ref=e853] [cursor=pointer]:
              - /url: "#batch-search-api"
              - text: 
            - text: Batch search API
          - paragraph [ref=e854]: The batch search API enables to perform multiple search requests via a single request.
          - paragraph [ref=e855]:
            - text: Its semantic is straightforward,
            - code [ref=e856]: "n"
            - text: batched search requests are equivalent to
            - code [ref=e857]: "n"
            - text: singular search requests.
          - paragraph [ref=e858]: This approach has several advantages. Logically, fewer network connections are required which can be very beneficial on its own.
          - paragraph [ref=e859]:
            - text: More importantly, batched requests will be efficiently processed via the query planner which can detect and optimize requests if they have the same
            - code [ref=e860]: filter
            - text: .
          - paragraph [ref=e861]: This can have a great effect on latency for non trivial filters as the intermediary results can be shared among the request.
          - paragraph [ref=e862]: In order to use it, simply pack together your search requests. All the regular attributes of a search request are of course available.
