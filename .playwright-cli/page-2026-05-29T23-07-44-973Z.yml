            - button "Copy to clipboard" [ref=e1035] [cursor=pointer]:
              - tooltip "Copy to clipboard" [ref=e1036]
          - paragraph [ref=e1037]: The above example will fetch the default vector from the point with this id, and use it as the query vector.
          - paragraph [ref=e1038]:
            - text: If the
            - code [ref=e1039]: using
            - text: parameter is also specified, Qdrant will use the vector with that name.
          - paragraph [ref=e1040]:
            - text: It is also possible to reference an ID from a different collection, by setting the
            - code [ref=e1041]: lookup_from
            - text: parameter.
          - generic [ref=e1043]:
            - generic [ref=e1046]: http
            - generic [ref=e1049]: python
            - generic [ref=e1052]: typescript
            - generic [ref=e1055]: rust
            - generic [ref=e1058]: java
            - generic [ref=e1061]: csharp
