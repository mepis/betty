          - paragraph [ref=e674]: Accessing array elements by index is currently not supported.
          - heading "Anchor ACORN Search Algorithm" [level=3] [ref=e675]:
            - link "Anchor" [ref=e676] [cursor=pointer]:
              - /url: "#acorn-search-algorithm"
              - text: 
            - text: ACORN Search Algorithm
          - paragraph [ref=e677]:
            - emphasis [ref=e678]: Available as of v1.16.0
          - paragraph [ref=e679]:
            - text: For filtered vector search, you are recommended to create a
            - link "payload index" [ref=e680] [cursor=pointer]:
              - /url: https://qdrant.tech/documentation/manage-data/indexing/#payload-index
            - text: for the fields you want to filter by. During the search, Qdrant will use a combined
            - link "filterable index" [ref=e681] [cursor=pointer]:
              - /url: https://qdrant.tech/documentation/manage-data/indexing/#filterable-hnsw-index
            - text: . However, when combining multiple strict payload filters, this mechanism might not provide sufficient accuracy. In such cases, you can use the ACORN search algorithm.
          - paragraph [ref=e682]:
            - text: It is an extension to the regular HNSW search algorithm, based on the ACORN-1 algorithm described in the paper
            - 'link "ACORN: Performant and Predicate-Agnostic Search Over Vector Embeddings and Structured Data" [ref=e683] [cursor=pointer]':
              - /url: https://arxiv.org/abs/2403.04871
            - text: . During graph traversal, it explores not just direct neighbors (first hop), but also neighbors of neighbors (second hop) when direct neighbors are filtered out. This improves search accuracy at the cost of performance.
          - paragraph [ref=e684]: "Enable it as follows:"
          - generic [ref=e686]:
            - generic [ref=e689]: http
            - generic [ref=e692]: python
            - generic [ref=e695]: typescript
            - generic [ref=e698]: rust
