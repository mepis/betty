          - paragraph [ref=e736]:
            - text: ACORN is disabled by default. Once enabled via the
            - code [ref=e737]: enable
            - text: flag, it activates conditionally when estimated filter selectivity is below the threshold. The optional
            - code [ref=e738]: max_selectivity
            - text: value controls this threshold;
            - code [ref=e739]: "0.0"
            - text: means ACORN will never be used,
            - code [ref=e740]: "1.0"
            - text: means it will always be used. The default value is
            - code [ref=e741]: "0.4"
            - text: ". Selectivity is estimated as:"
