          - paragraph [ref=e1756]:
            - text: For a collection of 20 000 documents with around 24 chunks each, duplicating ~3 KB of document-level data on every chunk adds up to ~1.4 GB. Storing those fields once per document in the
            - code [ref=e1757]: documents
            - text: collection brings that down to ~60 MB. The split pays off when the shared fields are large or change often, since updating one point in
            - code [ref=e1758]: documents
            - text: shows up under every chunk’s group at query time.
          - heading "Anchor Random Sampling" [level=2] [ref=e1759]:
