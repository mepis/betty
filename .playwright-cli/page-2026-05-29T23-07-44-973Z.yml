            - generic [ref=e543]: python
            - generic [ref=e546]: typescript
            - generic [ref=e549]: rust
            - generic [ref=e552]: java
            - generic [ref=e555]: csharp
            - generic [ref=e558]: go
          - generic [ref=e560]:
            - code [ref=e562]:
