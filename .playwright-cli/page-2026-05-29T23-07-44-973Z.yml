              - generic [ref=e715]: "{"
              - generic [ref=e717]: "\"query\": [0.2, 0.1, 0.9, 0.7],"
              - generic [ref=e719]: "\"params\": {"
              - generic [ref=e721]: "\"acorn\": {"
              - generic [ref=e723]: "\"enable\": true,"
              - generic [ref=e725]: "\"max_selectivity\": 0.4"
