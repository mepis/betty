        - generic [ref=e2264]:
          - heading "4.3 Generalization Study" [level=3] [ref=e2265]:
            - generic [ref=e2266]: "4.3"
            - text: Generalization Study
          - paragraph [ref=e2268]: To evaluate generalization under extreme context lengths, we compare MAGMA against prior methods on the LongMemEval benchmark. LongMemEval poses a substantial scalability challenge, with an average context length exceeding 100k tokens, and therefore serves as a rigorous stress test for long-term memory retention and retrieval under strict computational constraints.
          - paragraph [ref=e2270]:
            - text: As summarized in Table
            - link "2" [ref=e2271] [cursor=pointer]:
              - /url: "#S4.T2"
            - text: ", MAGMA achieves the highest average accuracy (61.2%), outperforming both the Full-context baseline (55.0%) and the Nemori system (56.2%). These results indicate that MAGMA generalizes effectively to ultra-long interaction histories while maintaining strong retrieval precision."
          - paragraph [ref=e2273]: At the same time, the results highlight a favorable efficiency–granularity trade-off. Although the Full-context baseline performs strongly on single-session-assistant tasks (89.3%), this performance comes at a prohibitive computational cost, requiring over 100k tokens per query. MAGMA achieves competitive accuracy (83.9%) while using only 0.7k–4.2k tokens per query, representing a reduction of more than 95%. This demonstrates that MAGMA effectively compresses long interaction histories into compact, reasoning-dense subgraphs, preserving essential information while substantially reducing inference-time overhead.
        - generic [ref=e2274]:
