            - 'heading "Case 1: Overcoming Information Loss (Recall)." [level=4] [ref=e3396]'
            - paragraph [ref=e3398]: "For the query regarding instruments, A-MEM failed completely due to its summarization process abstracting away specific details (\"violin\") from early sessions. Other RAG baselines only retrieved the \"clarinet\" due to surface-level semantic matching. MAGMA, however, maintains an entity-centric graph structure. Instead of relying on rigid schemas, MAGMA queries the local neighborhood of the [Entity: Melanie] node. This allows it to capture diverse natural language predicates (e.g., \"playing my violin\", \"started clarinet\") and aggregate disjoint facts into a comprehensive answer, demonstrating robustness against information loss."
          - generic [ref=e3399]:
            - 'heading "Case 2: Multi-Hop Reasoning vs. Surface Extraction." [level=4] [ref=e3400]'
            - paragraph [ref=e3402]: "The query \"How many children?\" exposes a critical weakness in standard RAG: the inability to perform arithmetic across contexts. Baselines simply extracted the explicit mention of \"two children\" from a photo caption. In contrast, MAGMA treated this as a graph traversal problem focused on entity resolution. It queried the neighborhood of [Entity: Melanie] for connected nodes of type Person. By analyzing the semantic edges, specifically distinguishing the \"two kids\" entity in the canyon photo from the \"son\" entity involved in the car accident, MAGMA synthesized these distinct nodes. It correctly deduced that the \"son\" (referenced later as \"brother\") was an additional individual, summing up to a count of \"at least three,\" a logical leap impossible for systems relying solely on vector similarity."
