            - generic [ref=e2276]: "4.4"
            - text: System Efficiency Analysis
          - paragraph [ref=e2278]: "To evaluate the system efficiency of MAGMA, two metrics are focused: (1) memory build time (the time required to construct the memory graph) and (2) token cost (the average tokens processed per query)."
          - paragraph [ref=e2280]:
            - text: Table
            - link "3" [ref=e2281] [cursor=pointer]:
