            - text: ); Wei et al. (
            - link "2022" [ref=e135] [cursor=pointer]:
              - /url: "#bib.bib30"
            - text: )
          - text: ", yet they remain limited in their ability to maintain and reason over long-term context. These models process information within a finite attention window, and their internal representations do not persist across interactions, causing earlier details to be forgotten once they fall outside the active context"
          - generic [ref=e136]:
            - text: Brown et al. (
            - link "2020" [ref=e137] [cursor=pointer]:
              - /url: "#bib.bib29"
            - text: ); Beltagy et al. (
            - link "2020a" [ref=e138] [cursor=pointer]:
              - /url: "#bib.bib32"
            - text: )
          - text: . Even within a single long sequence, attention effectiveness degrades with distance due to attention dilution, positional encoding limitations, and token interference, leading to the well-known “lost-in-the-middle” and context-decay phenomena
          - generic [ref=e139]:
            - text: Liu et al. (
            - link "2024" [ref=e140] [cursor=pointer]:
              - /url: "#bib.bib25"
            - text: ); Press et al. (
            - link "2021a" [ref=e141] [cursor=pointer]:
              - /url: "#bib.bib35"
            - text: )
          - text: . Moreover, LLMs lack native mechanisms for stable and structured memory, resulting in inconsistent recall, degraded long-horizon reasoning, and limited support for tasks requiring persistent and organized memory
          - generic [ref=e142]:
            - text: Khandelwal et al. (
            - link "2018" [ref=e143] [cursor=pointer]:
              - /url: "#bib.bib33"
            - text: ); Maharana et al. (
            - link "2024" [ref=e144] [cursor=pointer]:
              - /url: "#bib.bib9"
            - text: )
          - text: .
        - paragraph [ref=e146]: To address these inherent limitations, Memory-Augmented Generation (MAG) systems have emerged as a promising direction for enabling LLMs to operate beyond the boundaries of their fixed context windows. MAG equips an agent with an external memory continuously recording interaction histories and allowing the agents to retrieve and reintegrate past experiences when generating new responses. By offloading long-term context to an explicit memory module, MAG systems provide a means for agents to accumulate knowledge over time, support multi-session coherence, and adapt to evolving conversational or task contexts. In this paradigm, memory is no longer implicit in internal activations but becomes a persistent, queryable resource that substantially enhances long-horizon reasoning, personalized behavior, and stable agent identity.
        - paragraph [ref=e148]:
          - text: Despite their promise, current MAG systems exhibit structural and operational limitations that constrain their effectiveness in long-term reasoning
          - generic [ref=e149]:
            - text: Li et al. (
            - link "2025" [ref=e150] [cursor=pointer]:
              - /url: "#bib.bib5"
            - text: ); Chhikara et al. (
            - link "2025" [ref=e151] [cursor=pointer]:
              - /url: "#bib.bib3"
            - text: ); Xu et al. (
            - link "2025" [ref=e152] [cursor=pointer]:
              - /url: "#bib.bib2"
            - text: ); Packer et al. (
            - link "2023" [ref=e153] [cursor=pointer]:
              - /url: "#bib.bib19"
            - text: ); Rasmussen et al. (
            - link "2025" [ref=e154] [cursor=pointer]:
              - /url: "#bib.bib6"
            - text: ); Wang and Chen (
            - link "2025" [ref=e155] [cursor=pointer]:
              - /url: "#bib.bib1"
            - text: ); Kang et al. (
            - link "2025a" [ref=e156] [cursor=pointer]:
              - /url: "#bib.bib7"
            - text: )
          - text: . Most existing approaches store past interactions in monolithic repositories or minimally structured memory buffers, relying primarily on semantic similarity, recency, or heuristic scoring to retrieve relevant content. For example, A-Mem
          - generic [ref=e157]:
            - text: Xu et al. (
            - link "2025" [ref=e158] [cursor=pointer]:
              - /url: "#bib.bib2"
            - text: )
          - text: organizes past interactions into Zettelkasten-like memory units that are incrementally linked and refined, yet their retrieval pipelines rely primarily on semantic embedding similarity, missing the relations such as temporal or causal relationships. Cognitive-inspired frameworks like Nemori
          - generic [ref=e159]:
            - text: Nan et al. (
            - link "2025" [ref=e160] [cursor=pointer]:
              - /url: "#bib.bib4"
            - text: )
          - text: introduce principled episodic segmentation and representation alignment, enabling agents to detect event boundaries and construct higher-level semantic summaries. However, their memory structures are still narrative and undifferentiated, with no explicit modeling of distinct relational dimensions.
        - paragraph [ref=e162]: To address the structural limitations of existing MAG systems, we propose MAGMA, a multi-graph agentic memory architecture that explicitly models heterogeneous relational structure in an agent’s experience. MAGMA represents each memory item across four orthogonal relational graphs (i.e., semantic, temporal, causal, and entity), yielding a disentangled representation of how events, concepts, and participants are related.
        - paragraph [ref=e164]: Built on this unified multi-graph substrate, MAGMA introduces a hierarchical, intent-aware query mechanism that selects relevant relational views, traverses them independently, and fuses the resulting subgraphs into a compact, type-aligned context for generation. By decoupling memory representation from retrieval logic, MAGMA enables transparent reasoning paths, fine-grained control over memory selection, and improved alignment between query intent and retrieved evidence. This relational formulation provides a principled and extensible foundation for agentic memory, improving both long-term coherence and interpretability.
