          - 'heading "E.1 Illustrative Walkthrough: From Memory Construction to Retrieval" [level=3] [ref=e3382]':
            - generic [ref=e3383]: E.1
            - text: "Illustrative Walkthrough: From Memory Construction to Retrieval"
          - paragraph [ref=e3385]: "To make the case study more concrete, we briefly illustrate how MAGMA processes the Melanie example end to end. Consider three representative facts from the conversation history: (1) Melanie mentions playing the violin in an earlier session, (2) she later says that she also plays the clarinet, and (3) in a later family-trip session, she refers to her son, two children in a photo, and a hike done yesterday."
          - paragraph [ref=e3387]: During memory construction, MAGMA first segments these utterances into event nodes and places them along a temporal backbone. The system then incrementally enriches this memory with additional structure, such as semantic connections between related musical events, entity-centric links for recurring references to Melanie and her family members, and normalized temporal attributes for relative expressions such as yesterday. As a result, the memory is not stored as a flat list of text snippets, but as a small multi-view graph in which the same history can be accessed through different relational paths.
          - paragraph [ref=e3389]: At query time, MAGMA first identifies the dominant retrieval intent and then selects anchor events before traversing the most relevant graph views. For example, for “What instruments does Melanie play?”, retrieval focuses on the entity and semantic views, allowing MAGMA to aggregate both the earlier violin mention and the later clarinet mention. For “How many children does Melanie have?”, retrieval centers on the local entity neighborhood, combining the references to a son, two children, and brother into a single evidence set. For “When did she hike?”, MAGMA relies primarily on the temporal view, using the normalized representation of yesterday to recover the grounded date.
          - paragraph [ref=e3391]: "This example highlights the key intuition behind MAGMA: memory construction organizes conversational history into complementary relational views, and query-time retrieval activates different parts of this structure depending on the reasoning need."
