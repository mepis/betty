        - generic [ref=e2401]:
          - heading "4.5 Ablation Study" [level=3] [ref=e2402]:
            - generic [ref=e2403]: "4.5"
            - text: Ablation Study
          - paragraph [ref=e2405]:
            - text: In this subsection, we conduct a systematic ablation study to assess the contribution of individual components in MAGMA. By selectively disabling edge types and traversal mechanisms, we isolate the sources of its reasoning capability. The results in Table
            - link "4" [ref=e2406] [cursor=pointer]:
              - /url: "#S4.T4"
            - text: reveal three main findings.
          - paragraph [ref=e2408]: "First, removing the Adaptive Policy results in the largest performance drop, with the Judge score decreasing from 0.700 to 0.637. This confirms that intent-aware routing is critical: without it, retrieval degenerates into a static graph walk that introduces structurally irrelevant information and degrades reasoning quality. Second, removing either Causal Links or the Temporal Backbone leads to comparable and substantial performance losses (0.644 and 0.647, respectively), indicating that causal structure and temporal ordering provide complementary, non-substitutable axes of reasoning. Finally, removing Entity Links causes a smaller but consistent decline (0.700 to 0.666), highlighting their role in maintaining entity permanence and reducing hallucinations in entity-centric queries."
          - paragraph [ref=e2410]:
            - text: To further isolate the contribution of each relation type, we additionally conducted a single-graph-only ablation on LoCoMo, shown in Table
            - link "5" [ref=e2411] [cursor=pointer]:
              - /url: "#S4.T5"
            - text: . The results are consistent with the leave-one-out findings in Table
            - link "4" [ref=e2412] [cursor=pointer]:
              - /url: "#S4.T4"
            - text: ". Among single-graph variants, Causal Only achieves the highest overall score (0.590), suggesting that causal relations provide strong logical filtering and robustness against distractor noise. Temporal Only performs best on temporal questions (0.620), confirming that explicit temporal structure is particularly important for sequential reasoning. In contrast, Entity Only obtains the lowest overall score (0.531): while it remains helpful for concept bridging in multi-hop reasoning, it lacks both timeline awareness and logical filtering, which explains why removing entity links causes the smallest drop in the full-system ablation."
          - paragraph [ref=e2414]: Overall, these results show that no single relation type is sufficient to recover MAGMA’s full reasoning capability, as all single-graph variants remain below 0.60 overall. By explicitly decoupling causal, temporal, and entity relations and combining them with adaptive traversal, MAGMA leverages their complementary strengths to achieve the best overall performance.
      - generic [ref=e2415]:
        - heading "5 Conclusion" [level=2] [ref=e2416]:
          - generic [ref=e2417]: "5"
          - text: Conclusion
        - paragraph [ref=e2419]: We introduced MAGMA, a multi-graph agentic memory architecture that models semantic, temporal, causal, and entity relations within a unified yet disentangled memory substrate. By formulating retrieval as a policy-guided graph traversal and decoupling memory ingestion from asynchronous structural consolidation, MAGMA enables effective long-horizon reasoning while maintaining low inference-time latency. Empirical results on LoCoMo and LongMemEval demonstrate that MAGMA consistently outperforms state-of-the-art memory systems while achieving substantial efficiency gains under ultra-long contexts.
      - generic [ref=e2420]:
        - heading "6 Limitations" [level=2] [ref=e2421]:
          - generic [ref=e2422]: "6"
          - text: Limitations
        - paragraph [ref=e2424]:
          - text: While MAGMA demonstrates strong empirical performance, it has several limitations. First, the quality of the constructed memory graph depends on the reasoning fidelity of the underlying Large Language Models used during asynchronous consolidation. This dependency is a shared limitation of agentic memory systems that rely on LLM-based structural inference, as they are susceptible to extraction errors and hallucinations
          - generic [ref=e2425]:
            - text: (Pan et al.,
            - link "2024" [ref=e2426] [cursor=pointer]:
              - /url: "#bib.bib60"
            - text: ; Xi et al.,
            - link "2025" [ref=e2427] [cursor=pointer]:
              - /url: "#bib.bib62"
            - text: ; Wadhwa et al.,
            - link "2023" [ref=e2428] [cursor=pointer]:
              - /url: "#bib.bib61"
            - text: )
          - text: . Although MAGMA employs structured prompts and conservative inference thresholds to reduce spurious links, erroneous or missing relations may still arise and propagate to downstream retrieval. Nevertheless, our experimental results indicate that, even under these constraints, agentic memory systems such as MAGMA substantially outperform traditional baselines, including full-context approaches, in long-horizon reasoning tasks.
        - paragraph [ref=e2430]: Second, multi-graph substrate may introduce additional storage and engineering complexity compared to flat, vector-only memory systems. Maintaining multiple relational views and dual-stream processing incurs a little higher implementation and memory overhead, which may limit applicability in highly resource-constrained environments.
        - paragraph [ref=e2432]:
          - text: Finally, most existing agentic memory systems, including MAGMA, are primarily evaluated on long-context conversational and agentic benchmarks such as LoCoMo and LongMemEval. While these benchmarks effectively stress temporal and causal reasoning, they do not cover the full range of settings in which agentic memory may be required
          - generic [ref=e2433]:
            - text: (Hu et al.,
            - link "2025" [ref=e2434] [cursor=pointer]:
              - /url: "#bib.bib63"
            - text: ; Jiang et al.,
            - link "2026" [ref=e2435] [cursor=pointer]:
              - /url: "#bib.bib64"
            - text: )
          - text: . Extending MAGMA to other scenarios, such as multimodal agents or environments with heterogeneous observation streams, may require additional adaptation and calibration. Addressing these broader evaluation settings remains an important research direction for future work.
