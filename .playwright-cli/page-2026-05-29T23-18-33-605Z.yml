      - generic [ref=e2785]:
        - heading "Appendix A Related Work" [level=2] [ref=e2786]:
          - generic [ref=e2787]: Appendix A
          - text: Related Work
        - paragraph [ref=e2789]:
          - text: "Following the framing in main text, we organize related work along the same progression: from context window extension to retrieval augmented generation (RAG) and finally to memory augmented generation (MAG), and then discuss structured/graph memories and causal reasoning, which are central to long-horizon agentic interactions."
          - text: Context-window Extension. A direct line of work extends the effective context length of Transformers by modifying attention or positional extrapolation. Longformer
          - generic [ref=e2790]:
            - text: Beltagy et al. (
            - link "2020b" [ref=e2791] [cursor=pointer]:
              - /url: "#bib.bib53"
            - text: )
          - text: introduces sparse attention patterns to scale to long documents, reducing quadratic cost while retaining locality and selected global connectivity. ALiBi
          - generic [ref=e2792]:
            - text: Press et al. (
            - link "2021b" [ref=e2793] [cursor=pointer]:
              - /url: "#bib.bib54"
            - text: )
          - text: (Attention with Linear Biases) enables length extrapolation by injecting distance-aware linear biases into attention scores, improving robustness when testing on longer sequences than those seen in training. Recent efforts also add explicit memory modules or hybrid mechanisms to push beyond pure attention-window scaling. For example, LM2
          - generic [ref=e2794]:
            - text: Kang et al. (
            - link "2025c" [ref=e2795] [cursor=pointer]:
              - /url: "#bib.bib40"
            - text: )
          - text: proposes a decoder-only architecture augmented with an auxiliary memory to mitigate long-context limitations. MemoRAG
          - generic [ref=e2796]:
            - text: Qian et al. (
            - link "2025" [ref=e2797] [cursor=pointer]:
              - /url: "#bib.bib41"
            - text: )
          - text: similarly emphasizes global-memory-enhanced retrieval to boost long-context processing when raw context is insufficient or inefficient. While these approaches improve long-range coverage, they do not, by themselves, address the continual, evolving, and write-back nature of agent memory required for multi-session interactions.
          - text: Retrieval Augmented Generation. RAG
          - generic [ref=e2798]:
            - text: Lewis et al. (
            - link "2020" [ref=e2799] [cursor=pointer]:
              - /url: "#bib.bib28"
            - text: )
          - text: augments an LLM with external retrieval over a fixed corpus, classically retrieving supporting passages and conditioning generation on them. Subsequent work explores better integration with long-context models and more scalable retrieval pipelines. LongRAG
          - generic [ref=e2800]:
            - text: Jiang et al. (
            - link "2024" [ref=e2801] [cursor=pointer]:
              - /url: "#bib.bib44"
            - text: )
          - text: "studies how to exploit long-context LLMs together with retrieval, improving the ability to incorporate larger retrieved evidence sets. Other systems focus on structuring the retrieved memory space or optimizing the RAG serving stack: M-RAG"
          - generic [ref=e2802]:
            - text: Wang et al. (
            - link "2024" [ref=e2803] [cursor=pointer]:
              - /url: "#bib.bib43"
            - text: )
          - text: uses multiple partitions to encourage fine-grained retrieval focus, while RAGO
          - generic [ref=e2804]:
            - text: Jiang et al. (
            - link "2025" [ref=e2805] [cursor=pointer]:
              - /url: "#bib.bib42"
            - text: )
          - text: provides a systematic framework for performance optimization in RAG serving. Furthermore, to improve the reliability of retrieved context, approaches like Self-Correcting RAG
          - generic [ref=e2806]:
            - text: Xu et al. (
            - link "2026" [ref=e2807] [cursor=pointer]:
              - /url: "#bib.bib67"
            - text: )
          - text: enhance generation faithfulness via selective context filtering and inference-guided search. However, standard RAG typically assumes a static knowledge base. In contrast, agentic settings require memory that is continuously updated (the feedback loop described in the main text). This motivates the shift to MAG systems, where memory is dynamic and evolves with interaction histories.
          - text: Memory Augmented Generation and Agent Memory Systems. MAG systems maintain and update an external memory over time, enabling agents to accumulate knowledge, preserve identity, and remain coherent across sessions. Early and representative directions include memory construction and write-back strategies for long-term agent behavior, such as MemoryBank
          - generic [ref=e2808]:
            - text: Zhong et al. (
            - link "2024" [ref=e2809] [cursor=pointer]:
              - /url: "#bib.bib15"
            - text: )
          - text: and generative agents style architectures that emphasize persistent profiles and evolving state grounded in past interactions
          - generic [ref=e2810]:
            - text: Nan et al. (
            - link "2025" [ref=e2811] [cursor=pointer]:
              - /url: "#bib.bib4"
            - text: ); Maharana et al. (
            - link "2024" [ref=e2812] [cursor=pointer]:
              - /url: "#bib.bib9"
            - text: ); Zeng et al. (
            - link "2025" [ref=e2813] [cursor=pointer]:
              - /url: "#bib.bib66"
            - text: )
          - text: ". A growing body of work adopts systems metaphors and designs: MemGPT"
          - generic [ref=e2814]:
            - text: Packer et al. (
            - link "2023" [ref=e2815] [cursor=pointer]:
              - /url: "#bib.bib19"
            - text: )
          - text: frames LLM agents with an operating-system-like memory hierarchy, emphasizing paging and controlled context management. More recent memory OS systems propose explicit storage hierarchies, efficient memory modules, and controllers (e.g., MemoryOS
          - generic [ref=e2816]:
            - text: Kang et al. (
            - link "2025b" [ref=e2817] [cursor=pointer]:
              - /url: "#bib.bib55"
            - text: )
          - text: ", MemOS"
          - generic [ref=e2818]:
            - text: Li et al. (
            - link "2025" [ref=e2819] [cursor=pointer]:
              - /url: "#bib.bib5"
            - text: )
          - text: ", and Hippocampus"
          - generic [ref=e2820]:
            - text: Li et al. (
            - link "2026" [ref=e2821] [cursor=pointer]:
              - /url: "#bib.bib65"
            - text: )
          - text: ) to manage persistence, scalability, and retrieval policies at scale. In addition, practical agent-memory stacks (e.g., Zep
          - generic [ref=e2822]:
            - text: Rasmussen et al. (
            - link "2025" [ref=e2823] [cursor=pointer]:
              - /url: "#bib.bib6"
            - text: )
          - text: ) offer temporal knowledge-graph-based memory services aimed at real-world deployment constraints.
          - text: "Structured memory: chains-of-thought and graph-based representations. Beyond flat text buffers or vector stores, several methods explicitly structure memory to support reasoning. Think-in-Memory (TiM) stores evolving chains-of-thought to improve consistency across long-horizon reasoning, while A-MEM"
          - generic [ref=e2824]:
            - text: Xu et al. (
            - link "2025" [ref=e2825] [cursor=pointer]:
              - /url: "#bib.bib2"
            - text: )
          - text: is inspired by Zettelkasten-style linking of notes/experiences. These methods highlight the value of representing intermediate reasoning traces or explicit links, but many retrieval pipelines still predominantly rely on semantic similarity as the primary access mechanism. Graph-based approaches have recently gained traction as a way to capture cross-document and cross-episode dependencies. GraphRAG
          - generic [ref=e2826]:
            - text: Edge et al. (
            - link "2024b" [ref=e2827] [cursor=pointer]:
              - /url: "#bib.bib56"
            - text: )
          - text: "builds entity-centric graphs and community summaries to answer more global questions over large corpora. Zep proposes a temporally-aware knowledge-graph engine (Graphiti) that synthesizes conversational and structured business data while preserving historical relations. The main text notes these graph-based lines explicitly and motivates a key gap: many systems organize memory around associative proximity (semantic relatedness) rather than mechanistic dependency."
          - text: Causal reasoning and long-horizon evaluation. Causal reasoning has been highlighted as both important and challenging for LLMs. The work
          - generic [ref=e2828]:
            - text: Kiciman et al. (
            - link "2023" [ref=e2829] [cursor=pointer]:
              - /url: "#bib.bib47"
            - text: )
          - text: study LLMs’ ability to generate causal arguments across multiple causal tasks and emphasize robustness/failure modes, reinforcing that what happened retrieval is not sufficient for why reasoning in many settings. Benchmarking efforts such as LoCoMo
          - generic [ref=e2830]:
            - text: Maharana et al. (
            - link "2024" [ref=e2831] [cursor=pointer]:
              - /url: "#bib.bib9"
            - text: )
          - text: stress long-range temporal and causal dynamics in multi-session conversations and provide evaluation tasks that expose long-horizon memory deficits. The paper’s experimental setup also uses LongMemEval
          - generic [ref=e2832]:
            - text: Wu et al. (
            - link "2024" [ref=e2833] [cursor=pointer]:
              - /url: "#bib.bib12"
            - text: )
          - text: as an ultra-long context stress test, and evaluates via LLM-as-a-Judge protocols standard in modern instruction-following evaluation. Overall, prior work demonstrates steady progress in (i) scaling context length, (ii) improving retrieval pipelines, and (iii) building structured, evolving memories for agents. The main text positions MAGMA within this trajectory by explicitly targeting multi-relational structure (semantic/temporal/causal/entity) and intent-aware retrieval control.
