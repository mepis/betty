        - paragraph [ref=e318]: In this section, we introduce the proposed Multi-Graph based Agentic Memory (MAGMA) design and its components in detail.
        - generic [ref=e319]:
          - heading "3.1 Architectural Overview" [level=3] [ref=e320]:
            - generic [ref=e321]: "3.1"
            - text: Architectural Overview
          - paragraph [ref=e323]:
            - text: MAGMA architecture is organized into the following three logical layers, orchestrating the interaction between control logic and the memory substrate as illustrated in Figure
            - link "2" [ref=e324] [cursor=pointer]:
              - /url: "#S1.F2"
            - text: .
          - paragraph [ref=e326]: "Query Process: The inference engine responsible for retrieving and synthesizing information. It comprises the Intent-Aware Router for dispatching tasks, the Adaptive Topological Retrieval module for executing graph traversals, and the Context Synthesizer for generating the final narrative response."
          - paragraph [ref=e328]:
            - generic [ref=e329]:
              - text: Data Structure (
              - math [ref=e330]:
                - generic [ref=e332]: 𝒢
              - text: "):"
            - text: The unified storage substrate that fuses disparate modalities. As shown in the center of Figure
            - link "2" [ref=e333] [cursor=pointer]:
              - /url: "#S1.F2"
            - text: ", it maintains a Vector Database for semantic search alongside four distinct Relation Graphs (i.e., Semantic, Temporal, Causal and Entity). This layer provides the topological foundation for cross-view reasoning."
          - paragraph [ref=e335]: "Write/Update Process: A dual-stream pipeline manages memory evolution. It decouples latency-sensitive operations via Synaptic Ingestion (Fast Path) from compute-intensive reasoning via Asynchronous Consolidation (Slow Path), ensuring the system remains responsive while continuously deepening its memory structure."
          - paragraph [ref=e337]:
            - text: Functionally, the Query Layer interacts with the Data Structure Layer to execute the synchronous Query Process (Section
            - link "3.3" [ref=e338] [cursor=pointer]:
