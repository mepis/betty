        - paragraph [ref=e131]:
          - text: Large Language Models (LLMs) have demonstrated remarkable capabilities across a wide range of tasks
          - generic [ref=e132]:
            - text: Brown et al. (
            - link "2020" [ref=e133] [cursor=pointer]:
