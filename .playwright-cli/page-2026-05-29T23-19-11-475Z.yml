            - paragraph [ref=e4389]:
              - emphasis [ref=e4390]: Role of ionization.
              - text: The NV can switch between its negative and neutral charge state. These dynamics can be optically induced, for example by the laser pulse that is used for initialization or readout of the NV qubit. In our context, this switching dynamics is an undesired event that complicates the processing of the data and degrades the quality of the readout. Our rate-equation model can be extended to account for this dynamics and the corresponding changes in the quality of the readout, e.g., by using the model of Ref.
              - generic [ref=e4391]:
                - text: Wirtitsch
                - emphasis [ref=e4392]: et al.
                - text: ","
                - link "2023" [ref=e4393] [cursor=pointer]:
                  - /url: https://arxiv.org/html/2505.17605v1#bib.bib35
              - text: . We also note that ionization can be also exploited for better readout as the mechanism enabling spin-to-charge conversion
              - generic [ref=e4394]:
                - text: Shields
                - emphasis [ref=e4395]: et al.
                - text: (
                - link "2015" [ref=e4396] [cursor=pointer]:
                  - /url: https://arxiv.org/html/2505.17605v1#bib.bib36
                - text: )
              - text: .
            - paragraph [ref=e4398]:
              - emphasis [ref=e4399]: Readout errors from gate miscalibration.
              - text: In NV-based quantum computer prototypes, the qubit register is usually formed by the electronic spin qubit and a few nearby nuclear spin qubits
              - generic [ref=e4400]:
                - text: Robledo
                - emphasis [ref=e4401]: et al.
                - text: (
                - link "2011b" [ref=e4402] [cursor=pointer]:
                  - /url: https://arxiv.org/html/2505.17605v1#bib.bib37
                - text: ); Taminiau
                - emphasis [ref=e4403]: et al.
                - text: (
                - link "2014" [ref=e4404] [cursor=pointer]:
                  - /url: https://arxiv.org/html/2505.17605v1#bib.bib10
                - text: ); Bradley
                - emphasis [ref=e4405]: et al.
                - text: (
                - link "2019" [ref=e4406] [cursor=pointer]:
                  - /url: https://arxiv.org/html/2505.17605v1#bib.bib38
                - text: )
              - text: . Optical readout cannot access the nuclear spins directly; nevertheless, it is possible to read out out a nuclear qubit indirectly, e.g., by performing a SWAP gate between that qubit and the electron spin, and then doing optical readout of the electronic qubit. In such a scheme, the imperfection of the SWAP gate can introduce a readout error that is not mitigated by an increased shot number; in particular, this is the case when the SWAP is poorly calibrated, and hence causes a systematic (as opposed to stochastic) error.
        - generic [ref=e4407]:
          - heading "V Conclusions" [level=2] [ref=e4408]:
            - generic [ref=e4409]: V
            - text: Conclusions
          - paragraph [ref=e4411]: In conclusion, we have introduced a quantitative benchmark that characterizes multi-shot readout error, and evaluated how it depends on various system parameters when applied to the room-temperature readout of an electronic spin qubit of a negatively charged NV center. We have quantified how the multi-shot readout error is impacted by imperfect photon detection, background photons, as well as imperfect qubit initialization. We have also identified a simple relation between the multi-shot readout error and the signal-to-noise ratio. Room-temperature quantum computer prototypes based on point defects in semiconductors are already being commercialized, and we expect that our results will facilitate their characterization and further development.
