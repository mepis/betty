            - paragraph [ref=e4180]:
              - text: For this experiment, it is critical to understand control the error of the inference of the Pauli expectation value. An important component of that is the multi-shot readout error we describe in our work. Even if steps (i), (ii), (iii) are perfect, step (iv) will imply a nonzero error for the inferred expectation value. This error component can be mitigated by an increased number of shots, and the efficiency of this mitigation is quantified by the multi-shot readout error benchmark
              - math [ref=e4181]:
