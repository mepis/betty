              - text: was minimized over the laser pulse duration parameter. Further parameters that could be tuned and hence used for minimizing
              - math [ref=e4195]:
                - generic [ref=e4197]: Δ
              - text: are the laser intensity, magnetic field, electric field, mechanical strain, etc, which all have an effect of the transition rates governing the photocycle dynamics. Besides the
              - emphasis [ref=e4198]: in situ
              - text: tuning of certain parameters, hardware optimization often entails replacing building blocks (e.g., lasers, passive optical elements, detectors, etc) of the setup; evaluating the benchmark quantifies the resulting improvement in terms of multi-shot readout, facilitating the optimization process.
            - paragraph [ref=e4200]:
              - emphasis [ref=e4201]: Cross-platform comparison.
              - text: In this work, we express the multi-shot readout error benchmark
              - math [ref=e4202]:
                - generic [ref=e4204]: Δ
              - text: from the photon number PMFs. This is readily generalizable to other qubits which are read out by photon counting. Further, this concept is generalizable to cases where single-shot data comes in the form of real numbers, or vectors of real numbers. Hence,
              - math [ref=e4205]:
                - generic [ref=e4207]: Δ
              - text: (and its generalizations) can be considered as a cross-platform benchmark.
            - paragraph [ref=e4209]:
              - emphasis [ref=e4210]: Use in commercialization and marketing.
              - text: In commercial applications of NV centers, including quantum computer prototypes, the multi-shot readout error benchmark provides a metric to evaluate, compare, and market product performance.
            - paragraph [ref=e4212]:
