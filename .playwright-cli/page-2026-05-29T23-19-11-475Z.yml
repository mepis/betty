                  - generic [ref=e85]: "N"
              - text: ", with"
              - math [ref=e86]:
                - generic [ref=e88]: "N"
              - text: being the number of shots, suggesting to use the coefficient
              - math [ref=e89]:
                - generic [ref=e91]: Δ
              - text: as a simple multi-shot readout error benchmark. Our calculation takes into account background photons, photon loss, and initialization error. Our model enables the identification of the readout error budget, i.e., the role various imperfections play in setting the readout error. Our results enable experimentalists and engineers to focus their efforts on those hardware improvements that yield the highest performance gain for multi-shot readout.
