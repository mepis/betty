            - paragraph [ref=e4185]:
              - emphasis [ref=e4186]: Evaluation and optimization of the hardware.
              - text: Experimentalists can use the benchmark to optimize experimental parameters to maximize multi-shot readout performance, that is, minimize
              - math [ref=e4187]:
                - generic [ref=e4189]: Δ
              - text: . This we exemplified by the results shown in Figs.
