            - generic [ref=e78]:
              - text: The ground-state electronic spin of a negatively charged nitrogen-vacancy center in diamond can be used for room-temperature experiments showing coherent qubit functionality. At room temperature, photoluminescence-based qubit readout has a low single-shot fidelity; however, the populations of the qubit’s two basis states can be inferred using multi-shot readout. In this work, we calculate the dependence of the error of a multi-shot inference method on various parameters of the readout process. This multi-shot readout error scales as
              - math [ref=e79]:
