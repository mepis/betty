            - paragraph [ref=e4367]:
              - emphasis [ref=e4368]: Improvements in room-temperature readout of the NV’s electronic qubit.
              - text: A natural way to improve NV readout is to enhance the photon-collection efficiency, e.g., by embedding the NV in engineered photonic nanostructures
