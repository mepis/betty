  - generic [ref=e95]:
    - generic [ref=e96]:
      - paragraph [ref=e97]: Abstract
      - heading "The harness is becoming the binding constraint." [level=2] [ref=e98]
    - generic [ref=e99]:
      - paragraph [ref=e100]:
        - text: "The rapid deployment of large language model agents in production has revealed a recurring pattern: task execution reliability depends less on the underlying model than on the infrastructure layer that wraps it, the"
        - emphasis [ref=e101]: agent execution harness
        - text: .
      - paragraph [ref=e102]:
        - text: This survey presents agent harness engineering as an independent system layer, proposes the seven-layer
        - strong [ref=e103]: ETCLOVG
        - text: taxonomy (Execution, Tooling, Context, Lifecycle, Observability, Verification, Governance), and maps a broad corpus of open-source projects onto that taxonomy to expose ecosystem patterns, coverage gaps, and emerging design principles.
  - generic [ref=e105]:
    - generic [ref=e106]:
      - paragraph [ref=e107]: Contributions
      - heading "Three Claims" [level=2] [ref=e108]
    - generic [ref=e109]:
      - article [ref=e110]:
        - generic [ref=e111]: Claim 1
        - heading "Harnesses are independent system layers." [level=3] [ref=e112]
        - paragraph [ref=e113]: Real-world reliability is shaped by execution controls, feedback loops, governance, evaluation, and operational design, not only by model capability.
      - article [ref=e114]:
        - generic [ref=e115]: Claim 2
        - heading "ETCLOVG separates production concerns." [level=3] [ref=e116]
        - paragraph [ref=e117]: Execution, Tooling, Context, Lifecycle, Observability, Verification, and Governance expose architectural boundaries that earlier frameworks often conflate.
      - article [ref=e118]:
        - generic [ref=e119]: Claim 3
        - heading "A broad ecosystem map reveals gaps." [level=3] [ref=e120]
        - paragraph [ref=e121]: A systematic mapping of the open-source ecosystem surfaces adoption patterns across sandboxes, protocols, memory systems, orchestrators, observability platforms, benchmarks, and governance stacks.
  - generic [ref=e123]:
    - heading "Three Engineering Phases" [level=2] [ref=e124]
    - paragraph [ref=e125]: Read across 2022–2026, agent engineering has gone through a coherent shift in where the marginal effort lands. The three phases overlap in time and concept; they describe what the field has chosen to engineer, not a clean sequence of replacements.
    - list [ref=e126]:
      - listitem [ref=e127]:
        - generic [ref=e128]: 2022–2024
        - generic [ref=e129]:
          - strong [ref=e130]: Prompt engineering.
          - text: "The primary lever is the input prompt text: instructions, few-shot examples, and reasoning templates, all optimized for a single model call."
      - listitem [ref=e131]:
        - generic [ref=e132]: "2025"
        - generic [ref=e133]:
          - strong [ref=e134]: Context engineering.
          - text: The question shifts from “what is the input?” to “what should the model see at each step?” The scope expands to retrieval, compaction, tool-result ranking, and managing context-window saturation across turns.
      - listitem [ref=e135]:
        - generic [ref=e136]: 2026–
        - generic [ref=e137]:
          - strong [ref=e138]: Harness engineering.
          - text: "As models become capable enough to attempt long-running tasks, the engineering focus expands to the full infrastructure wrapper: execution environment, tool interface, context, lifecycle, observability, verification, and governance."
  - generic [ref=e139]:
    - generic [ref=e140]:
      - heading "Timeline of Agent-Harness Systems" [level=2] [ref=e141]
      - paragraph [ref=e142]: The same shift is visible in the systems themselves. The ReAct era of 2022–2023 wrapped a single model loop with a while-loop, a prompt template, and a small tool dispatch table; AutoGPT and BabyAGI exposed the resulting failures, including execution runaway, context blowout, state loss, and unmonitored side effects, as infrastructure problems rather than prompt problems. Tool integration and multi-agent coordination from 2023–2024 added learned tool use (Gorilla, ToolLLM, Toolformer), role-playing organizations (CAMEL, ChatDev, MetaGPT, Mixture-of-Agents), the first agent benchmarks (SWE-bench, AgentBench, WebArena, GAIA), and the beginnings of protocol standardization (MCP, A2A). By 2025–2026 enough deployment experience had accumulated that “harness engineering” began to be named as a discipline of its own, accompanied by automated harness optimization and a wave of results in which only the harness was varied.
    - figure "Representative agent-harness systems by ETCLOVG layer, 2022–2026." [ref=e144]:
      - img "Timeline of representative agent-harness systems, 2022 to 2026." [ref=e145]
      - generic [ref=e146]: Representative agent-harness systems by ETCLOVG layer, 2022–2026.
  - generic [ref=e147]:
    - generic [ref=e148]:
      - heading "The ETCLOVG Taxonomy" [level=2] [ref=e149]
      - paragraph [ref=e150]:
        - text: We organize the harness into seven layers. The first four describe the structural core of a harness; the last three describe the control plane around it. Compared with earlier six-component frameworks,
        - emphasis [ref=e151]: Observability
        - text: and
        - emphasis [ref=e152]: Governance
        - text: appear here as independent layers because, in production deployments, each has its own tooling stack and is owned by a different team.
      - figure "The ETCLOVG taxonomy. E, T, C, and L form the structural pillars; O provides system-wide monitoring; V delivers evaluation and feedback; G enforces governance constraints across the system." [ref=e153]:
        - img "ETCLOVG taxonomy of agent-harness engineering." [ref=e154]
        - generic [ref=e155]: The ETCLOVG taxonomy. E, T, C, and L form the structural pillars; O provides system-wide monitoring; V delivers evaluation and feedback; G enforces governance constraints across the system.
      - list [ref=e156]:
        - listitem [ref=e157]:
          - generic [ref=e158]: E
          - generic [ref=e159]:
            - strong [ref=e160]: Execution environment.
            - text: "Determines where agent code runs and what sandbox constraints bound it: managed sandboxes, microVMs, code-specialized runtimes, computer-use environments, browser sandboxes, and OS-level permission models."
        - listitem [ref=e161]:
          - generic [ref=e162]: T
          - generic [ref=e163]:
            - strong [ref=e164]: Tool interface and protocol.
            - text: Specifies how external capabilities are described, discovered, and invoked, including protocol standards (MCP, A2A), tool description and selection, tool-augmented training, and session management.
        - listitem [ref=e165]:
          - generic [ref=e166]: C
          - generic [ref=e167]:
            - strong [ref=e168]: Context and memory management.
            - text: Controls what the model can see across short-term, session-level, and persistent horizons, including long-horizon context techniques and mitigations for context drift.
        - listitem [ref=e169]:
          - generic [ref=e170]: L
          - generic [ref=e171]:
            - strong [ref=e172]: Lifecycle and orchestration.
            - text: Organizes the control flow that reads and writes state, from the single-agent inner loop to multi-agent patterns and full issue-to-pull-request task pipelines.
        - listitem [ref=e173]:
          - generic [ref=e174]: O
          - generic [ref=e175]:
            - strong [ref=e176]: Observability and operations.
            - text: Captures traces, costs, failures, and reliability signals through tracing platforms, agent-specific operations tools, cost tracking, and unified observability.
        - listitem [ref=e177]:
          - generic [ref=e178]: V
          - generic [ref=e179]:
            - strong [ref=e180]: Verification and evaluation.
            - text: Turns tasks and traces into evaluation, failure attribution, and regression feedback, including benchmark grounding, controlled execution, multi-level judgement, and deployment-time evaluation loops.
        - listitem [ref=e181]:
          - generic [ref=e182]: G
          - generic [ref=e183]:
            - strong [ref=e184]: Governance and security.
            - text: "Constrains behavior across model-level, system-level, and organizational-level sub-layers: permission models, lifecycle hooks, component hardening, declarative constitutions, and audit infrastructure."
    - figure "Detailed view of the taxonomy. Each branch corresponds to one ETCLOVG layer; the leaves list the subcategories used to organize the survey, with pointers to the sections that introduce them." [ref=e186]:
      - img "Detailed taxonomy tree of agent-harness engineering, with subcategories under each of the seven ETCLOVG layers." [ref=e187]
      - generic [ref=e188]: Detailed view of the taxonomy. Each branch corresponds to one ETCLOVG layer; the leaves list the subcategories used to organize the survey, with pointers to the sections that introduce them.
  - generic [ref=e190]:
    - heading "Mapping Open-Source Projects" [level=2] [ref=e191]
    - paragraph [ref=e192]:
      - text: To make the taxonomy concrete, the survey codes a broad corpus of open-source agent-harness projects against ETCLOVG, using the public artifact itself (README files, documentation, papers, examples, release notes) as the evidence. The corpus is maintained as a living catalog at
      - link "Awesome-Agent-Harness" [ref=e193] [cursor=pointer]:
        - /url: https://github.com/Picrew/awesome-agent-harness
      - text: ", and contributions are welcome through pull requests."
