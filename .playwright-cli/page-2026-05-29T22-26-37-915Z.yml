    - paragraph [ref=e240]: "Reading the corpus in aggregate, Execution, Tooling, Lifecycle, and Verification have the densest visible coverage: coding, web, terminal, and computer-use agents all require runnable environments, tool contracts, control loops, and repeatable evaluation before they can be useful. Context and memory appear across many projects but are often embedded inside larger frameworks rather than released as standalone components. Observability and Governance are thinner in open source and more often live inside commercial platforms, SDK features, or engineering writeups, suggesting that operational control has matured later than runtime and benchmark infrastructure."
  - generic [ref=e242]:
    - heading "Cross-Layer Synthesis" [level=2] [ref=e243]
    - paragraph [ref=e244]: Composing the seven layers creates system-level constraints that no single layer can resolve alone. The survey distils these effects into three recurring patterns.
    - list [ref=e245]:
      - listitem [ref=e246]:
        - strong [ref=e247]: Cost–quality–speed trilemma.
        - text: Stronger sandboxes, richer context, and deeper evaluation improve quality but cost tokens, latency, and infrastructure. Production harnesses cannot treat quality as a scalar objective; they must decide which risks justify expensive controls and which checks can run asynchronously or in regression suites.
      - listitem [ref=e248]:
        - strong [ref=e249]: Capability–control tradeoff.
        - text: Larger tool menus, persistent memory, and permissive sandboxes broaden task coverage but enlarge the blast radius of misaligned or compromised actions. Capability and control are therefore a single design axis spanning tool schemas, context policy, runtime permissions, identity, auditability, and human approval.
      - listitem [ref=e250]:
        - strong [ref=e251]: Harness coupling problem.
        - text: Harness layers are coupled in ways that make local optimization fragile. A prompt, tool, sandbox, verifier, or monitor may look beneficial in isolation while degrading the whole rollout when combined with the rest of the control loop. Harness changes should be tested as system changes.
    - paragraph [ref=e252]:
      - text: "A related shift runs through the corpus: from"
      - emphasis [ref=e253]: agent frameworks
      - text: ", which package local abstractions (agents, tools, memory, execution loops), to"
      - emphasis [ref=e254]: agent platforms
      - text: ", which add durable workspaces, identity, observability, evaluation, governance, and human handoff across many runs and many users."
  - generic [ref=e256]:
    - heading "Open Problems" [level=2] [ref=e257]
    - paragraph [ref=e258]: Five questions remain open across the taxonomy. Each follows from the cross-layer synthesis rather than from a single ETCLOVG layer in isolation.
    - list [ref=e259]:
      - listitem [ref=e260]:
        - strong [ref=e261]: Hardening and scaling execution environments.
        - text: Common security evaluations for prompt injection, goal misalignment, and compositional amplification; cost models that decide between containers, microVMs, OS permission boundaries, full desktop VMs, browser environments, and learned surrogates; portability that preserves semantics across self-hosted, cloud, and hybrid deployments.
      - listitem [ref=e262]:
        - strong [ref=e263]: Reliable state in long-running agents.
        - text: "Recasting context management as state estimation: characterizing the information loss at each compression, retrieval, or forgetting step; adding provenance, contradiction handling, and explicit staleness markers; recovering from durable artifacts rather than from compressed history."
      - listitem [ref=e264]:
        - strong [ref=e265]: Trace-native failure diagnosis.
        - text: Traces should be the primary object from which systems compute outcome scores, trajectory quality, failure attribution, and regression tests, not just after-the-fact debugging material. The gap between widespread observability adoption and far less common offline evaluation is the concrete starting point.
      - listitem [ref=e266]:
        - strong [ref=e267]: Standard handoffs across agents, tools, and humans.
        - text: Handoffs should transfer not only a text summary but intent, constraints, permissions, artifacts, provenance, budget state, risk level, trace history, and unresolved decisions. The open question is how to make such a protocol rich enough for safety and recovery while remaining simple enough for broad adoption.
      - listitem [ref=e268]:
        - strong [ref=e269]: Adaptive simplification as models improve.
        - text: Every wrapper encodes an assumption about what the model cannot do reliably on its own. As models improve, some interventions remain load-bearing while others become cost, latency, or operational overhead. Future harnesses need mechanisms for ablating, optimizing, and simplifying themselves under joint quality, latency, cost, and risk constraints.
