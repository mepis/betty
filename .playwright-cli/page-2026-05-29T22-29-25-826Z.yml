                - text: "]"
              - text: .
            - paragraph [ref=e3078]:
              - text: Data minimization. Agentic AI systems can mitigate exposure risks by limiting the scope, granularity, and duration of data collected or retained during task execution. For instance, temporary memory buffers used in systems like ChatDev
