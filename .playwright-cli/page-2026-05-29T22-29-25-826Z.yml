          - text: Agentic AI, LLM-based Multi-Agent Systems, TRiSM, AI Governance, Explainability, ModelOps, Application Security, Model Privacy, AI Agents, Trustworthy AI, Risk Management, AI Safety, Privacy-Preserving AI, Adversarial Robustness, Human-in-the-Loop
        - generic [ref=e101]:
          - heading "1 Introduction" [level=2] [ref=e102]:
            - generic [ref=e103]: "1"
            - text: Introduction
          - paragraph [ref=e105]:
            - text: AI governance has moved from aspiration to obligation. The EU Artificial Intelligence Act
            - generic [ref=e106]:
              - text: "["
              - generic [ref=e107]: EU_AI_Act2025
              - text: "]"
            - text: entered into force on 1 August 2024 and applies progressively (e.g., prohibited AI practices and AI literacy obligations from 2 February 2025, and governance rules plus obligations for general-purpose AI models from 2 August 2025)
            - superscript [ref=e109]: "3"
            - text: ; meanwhile, organizations are adopting management frameworks such as ISO/IEC 42001:2023
            - generic [ref=e110]:
              - text: "["
              - generic [ref=e111]: iso42001
              - text: "]"
            - text: and the NIST AI Risk Management Framework (AI RMF 1.0)
            - generic [ref=e112]:
              - text: "["
              - generic [ref=e113]: ai2023artificial
              - text: "]"
            - text: to operationalize risk controls. In parallel, enterprise use of AI continues to expand, for example, recent global surveys
            - generic [ref=e114]:
              - text: "["
              - generic [ref=e115]: McKinsey_StateOfAI2025
              - text: ","
              - generic [ref=e116]: Stanford_HAI_AIIndex2025
              - text: ","
              - generic [ref=e117]: Gartner_AI_TRiSM2024
              - text: "]"
            - text: report that a substantial majority of organizations use AI in at least one business function. Critically, the emerging paradigm of AI agents, which are systems that autonomously plan, reason, and execute complex tasks, introduces qualitatively different risks than traditional AI applications. These trends demand system-level trust, risk, and security management tailored to
            - emphasis [ref=e118]: agentic
            - text: systems.
