              - heading "Cognitive/Reasoning Layer (LLM Core + Planning)" [level=5] [ref=e890]
              - paragraph [ref=e892]:
                - text: At the center of an AMAS, a foundation model (typically an LLM) acts as the decision controller, taking a user goal plus role and tool specifications as input and generating the next actions (e.g., messages, tool calls, or structured function outputs)
                - generic [ref=e893]:
                  - text: "["
