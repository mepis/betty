                - generic [ref=e4050]: raza2025responsible
                - text: "]"
              - text: . TRiSM governance emphasizes that organizations must retain responsibility for AI actions and avoid obscuring accountability behind opaque decision-making. In practice, each autonomous agentic decisions should be transparent enough to be understood and challenged by human reviewers when necessary
              - generic [ref=e4051]:
                - text: "["
                - generic [ref=e4052]: vayani2025all
                - text: "]"
              - text: . TRiSM does not remove humans from the loop; instead, it structures human-agent collaboration through defined oversight roles and escalation pathways
              - generic [ref=e4053]:
