            - heading "6.3 Evaluation Benchmarks and Metrics for Agentic AI Security" [level=3] [ref=e3690]:
              - generic [ref=e3691]: "6.3"
              - text: Evaluation Benchmarks and Metrics for Agentic AI Security
            - paragraph [ref=e3693]: Evaluating the security and robustness of AMAS requires standardized benchmarks and well-defined metrics to assess both attack vulnerabilities and defense effectiveness. This subsection reviews current evaluation frameworks and metrics related to agentic AI security, aligned with the TRiSM pillars.
            - generic [ref=e3694]:
              - heading "Attack Evaluation Benchmarks" [level=5] [ref=e3695]
              - paragraph [ref=e3697]:
                - text: Several benchmark datasets have emerged to evaluate adversarial attacks against LLM-based agents. For prompt injection and jailbreak scenarios, HarmBench
                - generic [ref=e3698]:
                  - text: "["
                  - generic [ref=e3699]: mazeika2024harmbench
                  - text: "]"
                - text: and JailbreakBench
                - generic [ref=e3700]:
                  - text: "["
                  - generic [ref=e3701]: chao2024jailbreakbench
                  - text: "]"
                - text: provide standardized datasets for evaluating robustness against adversarial prompts, including role-playing, obfuscation, and multi-turn manipulation scenarios particularly relevant to agentic systems. Tool misuse is addressed by ToolBench
                - generic [ref=e3702]:
                  - text: "["
                  - generic [ref=e3703]: xu2023tool
                  - text: "]"
                - text: and API-Bank
                - generic [ref=e3704]:
                  - text: "["
                  - generic [ref=e3705]: li2023apibank
                  - text: "]"
                - text: ", which evaluate agents’ ability to use external tools correctly while resisting adversarial instructions that trigger unauthorized access or malicious function calls."
              - paragraph [ref=e3707]:
                - text: Multi-agent adversarial scenarios are covered by AgentBench
                - generic [ref=e3708]:
