            - generic [ref=e895]:
              - heading "Planning and Reasoning Module" [level=5] [ref=e896]
              - paragraph [ref=e898]:
                - text: To achieve complex goals, AMAS employ planning mechanisms that decompose objectives into sub-tasks and interleave reasoning with execution and feedback. This can be implemented through prompting strategies (e.g., CoT/ToT) or through explicit plan–act–observe loops such as ReAct
                - generic [ref=e899]:
