          - paragraph [ref=e128]:
            - text: An
            - emphasis [ref=e129]: AI agent
            - text: is a computational entity that perceives its environment and acts to achieve goals
            - generic [ref=e130]:
              - text: "["
              - generic [ref=e131]: russell1997rationality
              - text: "]"
            - text: . What were once task-specific and largely deterministic programs have rapidly evolved into LLM-powered
            - emphasis [ref=e132]: agentic
            - text: systems with planning, tool use, and persistent memory
            - generic [ref=e133]:
              - text: "["
              - generic [ref=e134]: sapkota2025ai
              - text: "]"
            - text: . In this paper, we refer to such LLM-based, coordinating agent systems as
            - emphasis [ref=e135]: Agentic Multi-Agent Systems (AMAS)
            - text: . These systems orchestrate multiple specialized agents to address complex tasks, coordinate functions and roles, and adapt workflows through interactions with tools, users, and other agents.
          - generic [ref=e136]:
            - heading "TRiSM for Agentic AI" [level=5] [ref=e137]
            - paragraph [ref=e139]:
              - text: AMAS exhibit emergent and often opaque behaviors, making them susceptible to cascading errors, biased decisions, and unintended interactions
              - generic [ref=e140]:
                - text: "["
                - generic [ref=e141]: yang2024multi
                - text: "]"
              - text: . These risks are amplified when agents plan, coordinate, and call external tools. Beyond traditional ML concerns (safety, fairness, and interpretability), Agentic AI must contend with threats from tool integrations, prompt-level attacks, memory poisoning, impersonation, and privacy leakage in collaborative settings
              - generic [ref=e142]:
                - text: "["
                - generic [ref=e143]: lim2012memory
                - text: ","
                - generic [ref=e144]: fang2025trustworthyaisafetybias
                - text: "]"
              - text: . To address these multifaceted system-level risks,
              - emphasis [ref=e145]: AI Trust, Risk, and Security Management (TRiSM)
              - text: frameworks provide integrated approaches emphasizing governance, explainability, security, privacy, and lifecycle controls
              - generic [ref=e146]:
                - text: "["
                - generic [ref=e147]: IBM2025AITRiSM
                - text: ","
                - generic [ref=e148]: habbal2024artificial
                - text: "]"
              - text: .
            - paragraph [ref=e150]:
              - text: Integrating TRiSM principles into the design and deployment of Agentic AI systems is increasingly urgent. Figure
              - link "1" [ref=e151] [cursor=pointer]:
                - /url: https://arxiv.org/html/2506.04133v5#S1.F1
              - text: demonstrates explosive growth in arXiv publications, with multi-agent systems papers increasing from 890 in 2019 to 18,500 in 2024, while LLM-based agent papers surged from near zero to 9,800 following ChatGPT’s release. This academic interest is mirrored by public awareness, as shown in Figure
              - link "2" [ref=e152] [cursor=pointer]:
                - /url: https://arxiv.org/html/2506.04133v5#S1.F2
              - text: ", where Google search trends for both “AI Agents” and “Agentic AI” reached peak levels by late 2024. Gartner’s designation of"
              - emphasis [ref=e153]: Agentic AI
              - text: as a top strategic technology trend for 2025, alongside AI governance platforms within its TRiSM framing
              - superscript [ref=e155]: "4"
              - text: ", and its 2026 emphasis on multiagent systems, digital provenance, and AI security platforms"
              - superscript [ref=e157]: "5"
              - text: "reflect a growing consensus: as AI systems gain autonomy, robust trust, risk mitigation, and security controls become indispensable. We emphasize that a TRiSM perspective is essential to make AMAS deployable in sensitive domains."
          - generic [ref=e158]:
            - heading "1.1 Necessity and Scope of this Survey" [level=3] [ref=e159]:
              - generic [ref=e160]: "1.1"
              - text: Necessity and Scope of this Survey
            - paragraph [ref=e162]:
              - text: Much of the Agentic AI literature prioritizes agent modeling, planning, and collaboration, while comparatively less attention is given to adversarial robustness, lifecycle governance, decision provenance, and system-level explainability. This survey addresses this gap by focusing on AMAS
              - superscript [ref=e164]: "6"
              - text: that demonstrate autonomous planning, tool use, memory retention, and emergent reasoning. As deployments expand in healthcare, finance, science, and public services, the absence of an integrated TRiSM perspective exposes stakeholders to opaque decision pathways and unmanaged risks. To our knowledge, no prior survey examines LLM-based multi-agent systems explicitly through the lens of trust, risk, security, and governance. Table
              - link "1" [ref=e165] [cursor=pointer]:
                - /url: https://arxiv.org/html/2506.04133v5#S1.T1
              - text: situates our contribution relative to prior work.
          - generic [ref=e166]:
            - heading "1.2 Contributions" [level=3] [ref=e167]:
              - generic [ref=e168]: "1.2"
              - text: Contributions
            - generic [ref=e169]:
              - paragraph [ref=e170]: "The contributions of this study are manifold:"
              - list [ref=e171]:
                - listitem [ref=e172]:
                  - text: •
                  - paragraph [ref=e174]:
                    - text: Unified TRiSM framework for Agentic AI. We present a system-level Trust, Risk and Security Management (TRiSM) framework tailored to AMAS (Section
                    - link "4" [ref=e175] [cursor=pointer]:
                      - /url: https://arxiv.org/html/2506.04133v5#S4
                    - text: ). The framework integrates explainability, ModelOps, security, privacy and lifecycle governance, contextualizing each pillar to AMAS workflows and failure modes.
                - listitem [ref=e176]:
                  - text: •
                  - paragraph [ref=e178]:
                    - text: Risk taxonomy for AMAS. We synthesize a taxonomy of threats unique to AMAS, including prompt injection, memory poisoning, collusive failure, emergent misbehavior and tool-use abuse, and map these risks to corresponding controls (Section
                    - link "3" [ref=e179] [cursor=pointer]:
                      - /url: https://arxiv.org/html/2506.04133v5#S3
                    - text: ).
                - listitem [ref=e180]:
                  - text: •
                  - paragraph [ref=e182]:
                    - text: Evaluation template and new metrics. We propose a holistic evaluation template covering trustworthiness, explainability, user-centered performance and inter-agent coordination. To operationalize this template, we introduce the Component Synergy Score (CSS) for measuring collaboration quality across agents and Tool Utilization Efficacy (TUE) for assessing the correctness and efficiency of tool calls (Section
                    - link "5" [ref=e183] [cursor=pointer]:
                      - /url: https://arxiv.org/html/2506.04133v5#S5
                    - text: ).
                - listitem [ref=e184]:
                  - text: •
                  - paragraph [ref=e186]:
                    - text: Technique mapping and gap analysis. We survey and map existing explainability methods, prompt-hygiene practices, decision-provenance tools, sandboxing strategies and ModelOps pipelines to the AMAS setting, revealing where existing approaches can be adapted and where significant gaps remain (Section
                    - link "7" [ref=e187] [cursor=pointer]:
                      - /url: https://arxiv.org/html/2506.04133v5#S7
                    - text: ).
            - paragraph [ref=e189]: Building on these contributions, we outline a research roadmap for developing scalable, verifiable and regulation-aligned agentic systems. Key directions include adversarial robustness, governance protocols, standardized benchmarks for trustworthiness and coordination, and cross-disciplinary collaboration.
          - generic [ref=e190]:
            - heading "1.3 Related Work" [level=3] [ref=e191]:
              - generic [ref=e192]: "1.3"
              - text: Related Work
            - paragraph [ref=e194]:
              - text: Prior surveys on LLM-based multi-agent systems mainly emphasize architectures, agent capabilities, communication, and domain applications
              - generic [ref=e195]:
                - text: "["
                - generic [ref=e196]: guo2024largelanguagemodelbased
