                - text: ","
                - generic [ref=e198]: yan2025selftalkcommunicationcentricsurveyllmbased
                - text: ","
                - generic [ref=e199]: tran2025multiagentcollaborationmechanismssurvey
                - text: "]"
              - text: . In parallel, broader trustworthy/responsible AI surveys discuss themes aligned with TRiSM, such as alignment, fairness, and privacy defenses; but typically focus on general ML systems and do not model AMAS-specific dynamics (e.g., inter-agent information sharing, tool-mediated actions, and emergent coordination)
              - generic [ref=e200]:
                - text: "["
                - generic [ref=e201]: fang2025trustworthyaisafetybias
                - text: ","
                - generic [ref=e202]: raza2024exploring
                - text: "]"
              - text: . As a result, key gaps remain in adversarial robustness, governance and accountability for multi-agent deployments, and explainability at scale. In comparison to these works (Table
              - link "1" [ref=e203] [cursor=pointer]:
                - /url: https://arxiv.org/html/2506.04133v5#S1.T1
              - text: ), our study addresses these gaps by mapping TRiSM principles to AMAS and operationalizing governance, explainability, security, privacy, and lifecycle controls for multi-agent settings.
