              - heading "Defense Evaluation Metrics" [level=5] [ref=e3715]
              - paragraph [ref=e3717]:
                - text: Standard metrics for assessing defense mechanisms have been established across the research community. Attack Success Rate (ASR) measures the percentage of attack attempts that successfully compromise agent behavior, bypass safety constraints, or extract sensitive information, with lower ASR indicating more robust defenses
                - generic [ref=e3718]:
                  - text: "["
                  - generic [ref=e3719]: saha2025breaking
                  - text: "]"
                - text: . Robustness Score quantifies the agent’s ability to maintain intended behavior under adversarial conditions, typically measured as the degradation in task performance when subjected to attacks compared to benign scenarios
                - generic [ref=e3720]:
                  - text: "["
                  - generic [ref=e3721]: raza2025humanibench
                  - text: "]"
                - text: .
              - paragraph [ref=e3723]:
                - text: Defense Effectiveness Rate captures the proportion of attacks successfully detected and mitigated by defense mechanisms, including input validation, output filtering, and behavioral monitoring systems. For production deployments, False Positive and False Negative Rates are critical, measuring the rate at which legitimate user requests are incorrectly flagged as attacks and actual attacks that evade detection, respectively. Our proposed Composite Security Score (CSS), introduced in Section
                - link "5" [ref=e3724] [cursor=pointer]:
