                - text: "]"
              - text: ", which can filter sensitive data, establish baselines of normal behavior, and enforce runtime policies (e.g., blocking disallowed actions such as exposing personally identifiable information). Prior work also warns about “excessive agency”"
              - generic [ref=e4042]:
                - text: "["
                - generic [ref=e4043]: owasp2025agentic
                - text: "]"
              - text: ", where overly autonomous agents with broad tool access may trigger unintended harmful actions (e.g., hallucination-driven execution or misinterpreted goals). TRiSM mitigates these risks by limiting autonomy through role separation, scoped permissions, and safety constraints. Emerging AMAS-specific threats such as prompt injection, memory poisoning, and cascading hallucinations further motivate built-in risk controls."
          - generic [ref=e4044]:
