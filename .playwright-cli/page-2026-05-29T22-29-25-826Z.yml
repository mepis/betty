                - text: ", which test resilience against coordinated attacks, impersonation, and information manipulation in multi-agent environments. Recent datasets also evaluate vulnerabilities specific to agentic architectures, including memory poisoning attacks where adversaries inject malicious information into agent memory stores, and context manipulation where attack payloads are embedded in retrieved documents or tool outputs"
