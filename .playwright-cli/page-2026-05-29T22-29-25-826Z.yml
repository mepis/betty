            - heading "Key Insights" [level=5] [ref=e3032]
            - paragraph [ref=e3034]: This section defined a multi-dimensional evaluation framework covering trustworthiness (robustness, violation rates, calibration), explainability (coverage, faithfulness, stability), user-centered performance (satisfaction and goal fulfillment), and coordination quality. CSS captures positive inter-agent enablement, while TUE decomposes tool use into selection, argument validity, execution success, outcome correctness, and efficiency. Finally, the framework emphasizes reporting a metric vector and using thresholding/Pareto analysis to reduce the risk that scalar composites mask critical single-dimension failures.
        - generic [ref=e3035]:
          - heading "6 Security and Privacy in Agentic AI Systems" [level=2] [ref=e3036]:
            - generic [ref=e3037]: "6"
            - text: Security and Privacy in Agentic AI Systems
          - paragraph [ref=e3039]: Evaluating the security and robustness of AMAS requires standardized benchmarks and well-defined metrics to assess both attack vulnerabilities and defense effectiveness. This subsection reviews current evaluation frameworks and security metrics for agentic AI, aligned with the TRiSM pillars.
          - generic [ref=e3040]:
            - heading "6.1 Security Mechanisms" [level=3] [ref=e3041]:
              - generic [ref=e3042]: "6.1"
              - text: Security Mechanisms
            - paragraph [ref=e3044]: "Agentic AI systems (multiple collaborating LLM agents) have a bigger attack surface than traditional agents, so they need layered defenses: protecting data, execution, communication, and model robustness; using encryption, access control, adversarial defenses, and runtime monitoring tailored to multi-agent setups."
            - paragraph [ref=e3046]:
              - text: Encryption. Encryption plays an important role in safeguarding data exchanged between multiple agents, especially when sensitive or regulated content (e.g., healthcare records, financial data) is involved
              - generic [ref=e3047]:
                - text: "["
                - generic [ref=e3048]: feretzakis2024privacy
                - text: "]"
              - text: . Agentic workflows often include the inter-agent handoff of partially processed results, models, or prompts. Implementations such as SSL/TLS, homomorphic encryption , and secure enclaves (e.g., Intel SGX) are increasingly integrated into Agentic AI pipelines to ensure confidentiality across message-passing protocols.
            - paragraph [ref=e3050]:
              - text: Access control. Access control is highly important when orchestrators or shared memory modules manage permissions for agents with distinct capabilities and responsibilities. For instance, in systems like AutoGen and CrewAI where agents take on specialized roles (e.g., summarizer, planner, coder); enforcing principle-of-least-privilege access prevents privilege escalation and unauthorized tool invocation
              - generic [ref=e3051]:
                - text: "["
                - generic [ref=e3052]: wu2023autogen
                - text: "]"
              - text: . Agent-based access control policies, often aligned with Role-Based Access Control (RBAC)
              - generic [ref=e3053]:
                - text: "["
                - generic [ref=e3054]: khan2024role
                - text: "]"
              - text: and Attribute-Based Access Control (ABAC)
              - generic [ref=e3055]:
                - text: "["
                - generic [ref=e3056]: khan2024role
                - text: "]"
              - text: paradigms, can dynamically restrict which agents may access sensitive APIs, files, or memory buffers, based on contextual trust levels.
            - paragraph [ref=e3058]:
              - text: Adversarial learning. Adversarial threats are increasing for LLM-based agents, including prompt injection, poisoned tool outputs, and disruption via malformed intermediate results. Recent work shows that compromising one agent can propagate misleading outputs and destabilize an entire multi-agent framework
              - generic [ref=e3059]:
                - text: "["
                - generic [ref=e3060]: zhang2024breaking
                - text: "]"
              - text: . Mitigations include adversarial training (e.g., input perturbation, reward shaping, contrastive learning) and practical safeguards such as enforcing safety constraints and validating tool outputs before execution.
            - paragraph [ref=e3062]:
              - text: Runtime Monitoring. Runtime monitoring systems support the detection of anomalous agent behaviors, especially in high-stakes domains like automated healthcare or cybersecurity. Log-based auditing, anomaly detection with LSTM or autoencoder-based detectors, and trust scoring among agents are becoming essential components of real-time surveillance layers
              - generic [ref=e3063]:
                - text: "["
                - generic [ref=e3064]: zhen2025novel
                - text: "]"
              - text: . For example, Microsoft’s Copilot governance layers monitor anomalous agent behavior across sessions to ensure compliant execution and flag potentially harmful interactions.
          - generic [ref=e3065]:
            - heading "6.2 Privacy-Preserving Techniques" [level=3] [ref=e3066]:
              - generic [ref=e3067]: "6.2"
              - text: Privacy-Preserving Techniques
            - paragraph [ref=e3069]: The decentralized and interactive nature of AMAS introduces new challenges for preserving privacy, especially as agents continuously communicate, access external data sources, and store episodic or shared memory. To ensure data confidentiality and protect personally identifiable information (PII), Agentic AI systems must adopt robust privacy-preserving techniques such as differential privacy, data minimization, and secure computation.
            - paragraph [ref=e3071]:
              - text: Differential privacy (DP). DP protects individuals by adding controlled noise, and in multi-agent LLM systems it can be used during training or inference to limit what agents can reveal to each other. Using approaches like DP in federated learning, DP-SGD, and an
              - math [ref=e3072]:
