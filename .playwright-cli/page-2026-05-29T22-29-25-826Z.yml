            - paragraph [ref=e4280]: Policymakers and industry should collaborate to create regulatory sandboxes for multi-agent AI trials. There is much to learn from other high-stakes domains. For example, the safety engineering field (e.g. aerospace, automotive) has mature practices for redundant controls and failure mode analysis; these could inspire analogous practices in AI agent design. Likewise, ethics boards in biomedical research provide a template for AI ethics committees that review agent behaviors and approve high-risk deployments. We advocate establishing multidisciplinary governance boards that include ethicists, legal experts, domain specialists, and community representatives to oversee significant deployments of autonomous AI.
        - generic [ref=e4281]:
          - heading "9 Conclusion" [level=2] [ref=e4282]:
            - generic [ref=e4283]: "9"
            - text: Conclusion
          - paragraph [ref=e4285]: "Agentic AI systems built as AMAS are rapidly changing how autonomous systems collaborate, plan, and make decisions in high-stakes domains such as healthcare, finance, and public services. At the same time, these systems expand the risk surface and raise new challenges in trust, risk, and security management (TRiSM). This review addressed those challenges and introduced a TRiSM-oriented framework for LLM-based AMAS organized around five pillars: Explainability, ModelOps, Security, Privacy, and lifecycle Governance. We contributed a risk taxonomy that captures AMAS-specific threats, including prompt injection, memory poisoning, and collusive or cascading failures. We also proposed practical evaluation metrics to measure inter-agent enablement and the correctness and efficiency of tool use. In addition, we summarized key technical mechanisms to support TRiSM in practice, including explainability methods and security/privacy protections. Looking ahead, progress will depend on stronger adversarial robustness, clearer governance and audit protocols, and standardized benchmarks that evaluate both trustworthiness and coordination under realistic deployment conditions. Aligning Agentic AI development with TRiSM principles can help ensure these systems remain not only capable and scalable, but also safe, transparent, and accountable for real-world use."
