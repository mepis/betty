                - text: "]"
              - text: emphasizes risk management, transparency, data governance, and human oversight for high-risk systems, for example capabilities directly supported by TRiSM-aligned governance and controls
              - generic [ref=e4083]:
                - text: "["
                - generic [ref=e4084]: yang2025agentic
                - text: ","
                - generic [ref=e4085]: farooq2025evaluating
                - text: "]"
              - text: . This convergence suggests that TRiSM-based practices can help organizations translate technical safeguards into compliance-ready processes and evidence.
            - paragraph [ref=e4087]: Despite progress, some gaps remain. For example, there is still no consensus on standardized benchmarks and metrics for evaluating agentic systems under TRiSM principles, which limits cross-study comparison and objective progress tracking. Many controls also lack real-world validation beyond lab settings or narrowly scoped tasks, and adversarial learning remains an ongoing challenge as attackers adapt to defenses. Future work should prioritize standardized stress-testing protocols (e.g., red-teaming), longitudinal evaluation to detect drift, and deployment case studies that report both effectiveness and operational costs.
            - paragraph [ref=e4089]:
              - text: Extension to Multimodal and Embodied Agents. While this survey focuses on LLM-based AMAS, the Agentic AI landscape increasingly encompasses multimodal agents (e.g., vision-language models such as LLaVA, GPT-4V) and embodied agents
              - generic [ref=e4090]:
                - text: "["
                - generic [ref=e4091]: xia2018gibson
                - text: "]"
              - text: operating in physical environments (e.g., robotic systems, autonomous vehicles, industrial automation). Future work should systematically extend TRiSM frameworks to address the unique challenges these systems present. Multimodal agents introduce additional security considerations including cross-modal adversarial attacks (e.g., adversarial images triggering unsafe text outputs), visual hallucinations, and sensor spoofing vulnerabilities. Embodied agents face physical safety risks, real-time decision-making constraints under uncertainty, sim-to-real transfer gaps, and complex human-robot trust calibration requirements. Extending the proposed CSS and TUE metrics to capture sensor fusion quality, physical action safety scores, and human-robot collaboration efficacy represents a promising direction for comprehensive agentic AI evaluation.
