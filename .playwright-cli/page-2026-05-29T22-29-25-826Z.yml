              - heading "Key Insights" [level=5] [ref=e3877]
              - paragraph [ref=e3879]: "This section presented a defense-in-depth view of AMAS security spanning data confidentiality (encryption and secure enclaves), access control (RBAC/ABAC with least privilege and dynamic trust), adversarial resilience (prompt/tool-output validation and training-based hardening), and runtime monitoring (auditing, anomaly detection, and trust scoring). Privacy protection was framed as a system property: differential privacy to limit re-identification risk, data minimization through scoped/ephemeral memory and pseudonymization, and secure computation (SMPC, homomorphic encryption, and TEEs) to enable collaboration without raw-data exposure. We also summarized emerging evaluation practice, such as benchmarks for prompt injection, tool misuse, and multi-agent manipulation, together with metrics such as ASR, robustness degradation, defense effectiveness, and FP/FN rates; to quantify both vulnerabilities and mitigation quality in a TRiSM-aligned manner. Overall, security and privacy shift from optional add-ons to foundational requirements for regulated deployments."
        - generic [ref=e3880]:
          - heading "7 Compliance with AI Governance and Policy Frameworks for Agentic AI Systems" [level=2] [ref=e3881]:
