              - text: enable agents to perform computations over encrypted or obfuscated data without compromising privacy. In scenarios where agents collaborate across different organizational boundaries (e.g., federated medical agents or cross-silo industrial agents), SMPC allows joint computations such as diagnostics or anomaly detection without data leakage. Homomorphic encryption, while computationally expensive, is increasingly being explored to allow arithmetic operations on encrypted vectors used in RAG workflows.
