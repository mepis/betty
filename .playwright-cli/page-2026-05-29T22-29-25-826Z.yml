                - text: . The plan is typically revised as new observations arrive, enabling adaptive long-horizon behavior.
            - generic [ref=e902]:
              - heading "Memory Module" [level=5] [ref=e903]
              - paragraph [ref=e905]:
                - text: AMAS integrate memory to maintain context across steps and sessions. Short-term memory is maintained in the working context, while long-term memory stores salient facts and past events for later retrieval (often via embedding-based search)
                - generic [ref=e906]:
                  - text: "["
                  - generic [ref=e907]: yang2024multi
                  - text: "]"
                - text: . Memory improves continuity and reduces repetition, but also increases exposure to stale context and poisoning risks.
            - generic [ref=e908]:
              - heading "Learning Module" [level=5] [ref=e909]
              - paragraph [ref=e911]: Some AMAS include learning components that adapt behavior over time (e.g., from feedback, rewards, or task outcomes), such as updating policies, prompt templates, or routing strategies based on past performance. In multi-agent settings, learning can amplify errors through feedback loops and introduce risks such as drift, poisoning, and emergent misalignment, motivating continuous monitoring and gated updates under TRiSM controls.
