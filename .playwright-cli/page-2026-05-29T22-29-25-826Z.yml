          - generic [ref=e3940]:
            - heading "7.3 Policy Enforcement" [level=3] [ref=e3941]:
              - generic [ref=e3942]: "7.3"
              - text: Policy Enforcement
            - paragraph [ref=e3944]: "While regulations and audits provide oversight and after-the-fact analysis, policy enforcement mechanisms work in real-time to keep an Agentic AI system’s behavior within allowed bounds. Policy in this context refers to the codified rules and constraints that the AI agents must obey. In practice, effective policy enforcement in agentic AI includes:"
            - list [ref=e3946]:
              - listitem [ref=e3947]:
                - text: •
                - paragraph [ref=e3949]: Orchestrator-level controls. A meta-controller enforces allow/deny policies for plans and tool calls; escalate to human approval for sensitive operations (e.g., data deletion, external writes).
              - listitem [ref=e3950]:
                - text: •
                - paragraph [ref=e3952]: Memory & retention. Implement TTLs, redaction, and scoped memory (task- and tenant-scoped) to satisfy minimization and purpose limits; support subject-access and deletion.
              - listitem [ref=e3953]:
                - text: •
                - paragraph [ref=e3955]: Tool & data access. Enforce RBAC/ABAC for agents/roles; use per-tool API tokens, least privilege, and environment scoping (dev/stage/prod). Validate/normalize tool arguments.
              - listitem [ref=e3956]:
                - text: •
                - paragraph [ref=e3958]: Isolation. Run untrusted code/tooling in sandboxes (e.g., containers/VMs) with syscall/network/file egress policies; prefer hardware isolation (TEEs) for sensitive workloads.
              - listitem [ref=e3959]:
                - text: •
                - paragraph [ref=e3961]: I/O mediation. Apply content filters and egress controls on model outputs; mediate RAG inputs to prevent injection/exfiltration; detect sensitive data (PII/PHI, secrets) before release.
              - listitem [ref=e3962]:
                - text: •
                - paragraph [ref=e3964]: Real-time monitoring. Track anomaly signals (policy violations, unusual tool chains, data exfiltration patterns) and enforce runtime kill-switches, rollbacks, and incident triggers.
