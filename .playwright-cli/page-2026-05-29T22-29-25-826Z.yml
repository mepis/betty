            - text: Recent industry surveys indicate that enterprise leaders deploying Agentic AI at scale rank security, trust, compliance, and oversight among their top concerns. A survey
            - superscript [ref=e3886]: "16"
            - text: of IT professionals found that while 98% plan to expand AI agent usage, 96% view them as growing security threats, with only 54% having full visibility into their data access. In parallel, 67% of business leaders are increasing budgets for security oversight
