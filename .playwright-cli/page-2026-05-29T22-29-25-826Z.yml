              - text: . However, several limitations remain. Human-centered evaluation is resource-intensive and does not scale to continuous deployment, and AMAS evaluation often lacks ground truth for emergent coordination behaviors. Improvements in one dimension may degrade another (e.g., verbose explanations increasing latency), and composite weights vary by domain, requiring clearer guidance for practitioners. Current protocols also struggle to capture behavioral drift over time, and subjective measures often omit inter-rater reliability. Finally, evaluation metrics may be gamed (Goodhart’s Law
