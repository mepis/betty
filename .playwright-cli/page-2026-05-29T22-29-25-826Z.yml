              - text: ". These recommendations span both technical system design improvements and governance-level policy initiatives:"
            - paragraph [ref=e4266]: The community should create open benchmarks and challenge environments to test AMAS governance. For instance, a suite of scenario-based tasks (with built-in threats and ethical dilemmas) could be used to evaluate how well a TRiSM-governed ASAM that performs relative to one without such controls. This will enable direct comparisons and drive progress on measurable metrics of trust (e.g. frequency of prevented failures or fairness outcomes).
            - paragraph [ref=e4268]:
              - text: Future system design must anticipate a continually evolving threat landscape. Techniques from cybersecurity (e.g. adversarial training, AI model “penetration testing”
              - generic [ref=e4269]:
