              - generic [ref=e2007]:
                - generic [ref=e2008]: "Figure 11:"
                - text: "TRiSM-aligned architecture for Agentic AI systems. The five TRiSM pillars are shown explicitly and in the same order as defined in the framework: Trust & Explainability, ModelOps, Application Security, Model Privacy & Data Protection, with a cross-cutting Lifecycle Governance plane. Planning & Reasoning is included as the agent-core execution layer (non-TRiSM)."
            - paragraph [ref=e2010]:
              - text: Originally highlighted in industry guidelines for AI governance
              - generic [ref=e2011]:
                - text: "["
                - generic [ref=e2012]: litan2024ai
                - text: "]"
              - text: ", TRiSM also provides a structured approach to managing the unique challenges of AMAS. In this work, we focus on five key TRiSM pillars: Explainability, ModelOps, Application Security, Model Privacy, and Governance"
              - generic [ref=e2013]:
                - text: "["
                - generic [ref=e2014]: kaur2024building
                - text: ","
                - generic [ref=e2015]: habbal2024artificial
                - text: "]"
              - text: . These five pillars also reflect established risk-surface decompositions in the NIST AI RMF
              - generic [ref=e2016]:
                - text: "["
                - generic [ref=e2017]: ai2023artificial
                - text: "]"
              - text: ", ISO/IEC 42001"
              - generic [ref=e2018]:
                - text: "["
                - generic [ref=e2019]: iso42001
                - text: "]"
              - text: ", and the EU AI Act"
              - generic [ref=e2020]:
                - text: "["
                - generic [ref=e2021]: eu_ai_act
                - text: "]"
              - text: ", where explainability, lifecycle management, security, privacy, and governance are treated as distinct and non-overlapping risk domains. We summarize this mapping in Tables LABEL:tab:trism-pillars-1 and LABEL:tab:trism-pillars-2. Figure"
              - link "11" [ref=e2022] [cursor=pointer]:
                - /url: https://arxiv.org/html/2506.04133v5#S4.F11
              - text: illustrates how these five TRiSM pillars map onto the core architectural layers of an LLM-based agentic AI system.
            - paragraph [ref=e2024]: Next, we discuss these pillars and how they can help in AMAS.
            - generic [ref=e2025]:
              - heading "4.2.1 Explainability in Multi-Agent Decision Making" [level=4] [ref=e2026]:
                - generic [ref=e2027]: 4.2.1
                - text: Explainability in Multi-Agent Decision Making
              - paragraph [ref=e2029]:
                - text: In AMAS, explainability is less about interpreting a single model and more about understanding how decisions emerge from interacting agents
                - generic [ref=e2030]:
                  - text: "["
                  - generic [ref=e2031]: yossef2024explainable
                  - text: "]"
                - text: . In AMAS settings, outcomes often emerge from interactions among specialized agents rather than from a single model prediction
                - generic [ref=e2032]:
                  - text: "["
                  - generic [ref=e2033]: rosenfeld2019explainability
                  - text: "]"
                - text: . As a result, explainability must account for both (i) individual agent decisions and (ii) the inter-agent dynamics that produce emergent system-level behavior. Recent work emphasizes that user trust depends on understanding each agent’s contribution and how collaboration is orchestrated
                - generic [ref=e2034]:
                  - text: "["
                  - generic [ref=e2035]: sanwal2025layered
                  - text: "]"
                - text: . Traditional single-model XAI methods often overlook this multi-agent dimension, motivating new approaches tailored to AMAS.
              - generic [ref=e2036]:
                - paragraph [ref=e2037]:
                  - text: Challenges. Explaining multi-agent decisions requires tracing which agent performed which sub-task, what information it used, and how inter-agent exchanges influenced the final outcome
                  - generic [ref=e2038]:
                    - text: "["
                    - generic [ref=e2039]: de2025open
                    - text: "]"
                  - text: ". Key challenges include:"
                - list [ref=e2040]:
                  - listitem [ref=e2041]:
                    - text: •
                    - paragraph [ref=e2043]: "Emergent behavior: agent interactions can produce behaviors that were not explicitly specified; explaining these patterns requires capturing and summarizing interaction chains."
                  - listitem [ref=e2044]:
                    - text: •
                    - paragraph [ref=e2046]: "Verification of intermediate steps: vanilla CoT prompting can yield plausible but unverified reasoning. Without systematic verification, small errors may propagate across agents and compound into incorrect final decisions."
              - generic [ref=e2047]:
                - paragraph [ref=e2048]: "Approaches for explainability in AMAS The following techniques adapt classical XAI ideas to AMAS:"
                - list [ref=e2049]:
                  - listitem [ref=e2050]:
                    - text: •
                    - paragraph [ref=e2052]:
                      - text: "Feature attribution (LIME/SHAP) for agents: LIME"
                      - generic [ref=e2053]:
                        - text: "["
                        - generic [ref=e2054]: ribeiro2016should
                        - text: "]"
                      - text: and SHAP
                      - generic [ref=e2055]:
                        - text: "["
                        - generic [ref=e2056]: lundberg2017unified
                        - text: "]"
                      - text: can be extended to attribute an agent’s output to specific inputs (e.g., context spans, retrieved evidence, or inter-agent messages), clarifying which signals most influenced an agent’s action
                      - generic [ref=e2057]:
                        - text: "["
                        - generic [ref=e2058]: bilal2025llms
                        - text: "]"
                      - text: .
                  - listitem [ref=e2059]:
                    - text: •
                    - paragraph [ref=e2061]:
                      - text: "Counterfactual and causal analysis: “What-if” analysis evaluates how outcomes change when an agent’s contribution or a key condition is modified"
                      - generic [ref=e2062]:
                        - text: "["
                        - generic [ref=e2063]: gyevnar2023causal
                        - text: "]"
                      - text: . This helps isolate agent roles and identify causal dependencies in collaborative decision-making.
                  - listitem [ref=e2064]:
                    - text: •
                    - paragraph [ref=e2066]:
                      - text: "Reasoning-trace logging: Logging intermediate reasoning artifacts (e.g., CoT traces, tool calls, and inter-agent dialogues) creates an auditable trail of how decisions emerged"
                      - generic [ref=e2067]:
                        - text: "["
                        - generic [ref=e2068]: yao2023reactsynergizingreasoningacting
                        - text: "]"
                      - text: . Such traces reveal which agent contributed what and how partial conclusions accumulate into final outputs.
                  - listitem [ref=e2069]:
                    - text: •
                    - paragraph [ref=e2071]:
                      - text: "Natural-language explanations: An explainer agent can synthesize traces and attributions into human-readable narratives that answer questions such as “Why did the system choose action X?” Embedded explainers in workflows (e.g., DSM5AgentFlow) can improve transparency and trust"
                      - generic [ref=e2072]:
                        - text: "["
                        - generic [ref=e2073]: ozgun2025trustworthy
                        - text: "]"
                      - text: .
                  - listitem [ref=e2074]:
                    - text: •
                    - paragraph [ref=e2076]:
                      - text: "Role-oriented modular architectures: Assigning explicit roles (e.g., reasoning, verification, summarization, credit assignment) improves inspectability because each stage is separable and reviewable"
                      - generic [ref=e2077]:
                        - text: "["
                        - generic [ref=e2078]: lo2025ai
                        - text: "]"
                      - text: .
                  - listitem [ref=e2079]:
                    - text: •
                    - paragraph [ref=e2081]:
                      - text: "Explainable reward critics: In multi-agent RL, LLM-based critics can provide transparent reward decomposition and justification, supporting debugging and governance of agent incentives"
                      - generic [ref=e2082]:
                        - text: "["
                        - generic [ref=e2083]: nagpal2025leveraging
                        - text: "]"
                      - text: .
                - paragraph [ref=e2084]: "Recent directions. Recent work proposes frameworks and techniques that embed explainability directly into multi-agent operation:"
                - list [ref=e2085]:
                  - listitem [ref=e2086]:
                    - text: •
                    - paragraph [ref=e2088]:
                      - text: "Layered Chain-of-Thought prompting: Layered-CoT decomposes reasoning into discrete layers, where each layer answers a sub-question"
                      - generic [ref=e2089]:
                        - text: "["
                        - generic [ref=e2090]: sanwal2025layered
                        - text: "]"
                      - text: . A specialized Reasoning Agent produces partial reasoning, while Verification and User-Interaction Agents cross-check intermediate outputs (e.g., against knowledge graphs or human feedback). This decomposition can localize errors, reduce contradictions, and promote validation before proceeding.
                  - listitem [ref=e2091]:
                    - text: •
                    - paragraph [ref=e2093]:
                      - text: "Integrated multi-agent workflows: Some systems integrate explanation into the workflow rather than adding it post hoc. For example, in a DSM-5 mental-health diagnosis workflow, one agent collects patient information while a diagnostician agent retrieves DSM-5 criteria and explicitly links conversational evidence to diagnostic rules, producing a self-documenting rationale"
                      - generic [ref=e2094]:
                        - text: "["
                        - generic [ref=e2095]: ozgun2025trustworthy
                        - text: "]"
                      - text: .
                  - listitem [ref=e2096]:
                    - text: •
                    - paragraph [ref=e2098]:
                      - text: "Modular resume-screening systems: In recruitment, multi-agent pipelines separate extraction, evaluation, summarization, and formatting. The evaluation agent retrieves company-specific criteria via RAG, enabling recruiters to trace how candidate evidence maps to scores"
                      - generic [ref=e2099]:
                        - text: "["
                        - generic [ref=e2100]: lo2025ai
                        - text: "]"
                      - text: .
                  - listitem [ref=e2101]:
                    - text: •
                    - paragraph [ref=e2103]:
                      - text: "Explainable credit assignment in multi-agent reinforcement learning: A centralized LLM critic can provide per-agent credit assignment and natural-language justification, explaining how global rewards are decomposed across agents"
                      - generic [ref=e2104]:
                        - text: "["
                        - generic [ref=e2105]: nagpal2025leveraging
                        - text: "]"
                      - text: .
            - generic [ref=e2106]:
              - 'heading "4.2.2 ModelOps : Lifecycle Management for LLM Agents" [level=4] [ref=e2107]':
                - generic [ref=e2108]: 4.2.2
                - text: "ModelOps : Lifecycle Management for LLM Agents"
              - paragraph [ref=e2110]:
                - text: ModelOps (Machine Learning Operations) extends the MLOps paradigm beyond model training and deployment to include governance, risk management, and continuous oversight across AI systems
                - generic [ref=e2111]:
                  - text: "["
                  - generic [ref=e2112]: lefevre2022modelops
                  - text: "]"
                - text: . In production, ModelOps provides end-to-end oversight by enforcing governance and compliance controls, including lineage, ownership, and metadata tracking to support regulatory requirements (e.g., GDPR and HIPAA), as well as policy-driven deployment gates so that only approved models go live with controlled rollouts and rollbacks
                - generic [ref=e2113]:
                  - text: "["
                  - generic [ref=e2114]: Sinha2025ModelOps
                  - text: "]"
                - text: . It also enables continuous risk monitoring to detect drift, bias and fairness issues, hallucinations, and robustness regressions.
              - generic [ref=e2115]:
                - paragraph [ref=e2116]: "For AMAS, ModelOps must additionally support prompt and toolchain versioning, enforcement of guardrails and content filtering, fine-tuning lineage tracking, usage and cost observability, and ethical compliance. Effective ModelOps for LLM agents therefore requires:"
                - list [ref=e2117]:
                  - listitem [ref=e2118]:
                    - text: •
                    - paragraph [ref=e2120]: "Version control and CI/CD pipelines: Track versions of each agent’s model, prompts, tools, and configuration. Automated pipelines should test safety, performance, and cost impacts whenever agent logic changes, using multi-agent simulations to validate that updates do not introduce regressions or unsafe interactions."
                  - listitem [ref=e2121]:
                    - text: •
                    - paragraph [ref=e2123]:
                      - text: "Hierarchical monitoring in multi-agent frameworks: Systems such as MegaAgent"
                      - generic [ref=e2124]:
                        - text: "["
                        - generic [ref=e2125]: wang2025megaagent
                        - text: "]"
                      - text: decompose tasks into subtasks and dynamically form agent groups. They apply hierarchical monitoring, where agents log actions (e.g., via checklists), group-level administrators oversee agent teams, and system-level supervisors review final outputs. This layered oversight helps ensure that changes in one agent do not compromise system-wide behavior.
                  - listitem [ref=e2126]:
                    - text: •
                    - paragraph [ref=e2128]:
                      - text: "Risk measurement and oversight policies: The NIST generative AI profile recommends documenting risks, updating measurement approaches regularly, and establishing lifecycle oversight policies. It also highlights techniques such as gradient-based attributions, occlusion tests, and counterfactual prompting to strengthen transparency and explainability"
                      - generic [ref=e2129]:
                        - text: "["
                        - generic [ref=e2130]: ai2024artificial
                        - text: "]"
                      - text: .
            - generic [ref=e2131]:
              - heading "4.2.3 Application Security for LLM Agents" [level=4] [ref=e2132]:
                - generic [ref=e2133]: 4.2.3
                - text: Application Security for LLM Agents
              - generic [ref=e2134]:
                - paragraph [ref=e2135]:
                  - text: "Security in AMAS must address vulnerabilities such as prompt injection, data exfiltration, and the misuse of external tools. OWASP identifies prompt injection as a core risk in LLM applications: attackers manipulate the model with malicious instructions, potentially causing data leakage, unauthorized tool use, or unsafe decisions"
                  - generic [ref=e2136]:
                    - text: "["
                    - generic [ref=e2137]: owasp2024llmtop10
                    - text: ","
                    - generic [ref=e2138]: owasp2025agentic
                    - text: "]"
                  - text: ". Multimodal models further face cross-modal injection, where malicious content in one modality (e.g., text in an image) influences behavior in another. To mitigate these risks:"
                - list [ref=e2139]:
                  - listitem [ref=e2140]:
                    - text: •
                    - paragraph [ref=e2142]:
                      - text: "Prompt hygiene and hardening: Sanitize and filter user inputs, apply secure system prefixes, and validate instructions before they reach an agent. Constraining output formats and enforcing guardrails can reduce the attack surface"
                      - generic [ref=e2143]:
                        - text: "["
                        - generic [ref=e2144]: raza2025justhumansneedvaccines
                        - text: "]"
                      - text: .
                  - listitem [ref=e2145]:
                    - text: •
                    - paragraph [ref=e2147]:
                      - text: "Defense-in-depth design patterns: Techniques such as adversarial training and user confirmation provide partial protection, but do not guarantee safety. Design patterns"
                      - generic [ref=e2148]:
                        - text: "["
                        - generic [ref=e2149]: beurer2025design
                        - text: "]"
                      - text: "such as Action-Selector and Plan-Then-Execute restrict capabilities after untrusted input is processed: the agent selects from a predefined set of allowed actions, or produces a plan that cannot be altered by tool outputs, thereby isolating untrusted data from execution paths"
                      - generic [ref=e2150]:
                        - text: "["
                        - generic [ref=e2151]: qiao2024agent
                        - text: "]"
                      - text: .
                  - listitem [ref=e2152]:
                    - text: •
                    - paragraph [ref=e2154]:
                      - text: "Least-privilege access and authentication: Enforce strong authentication for both users and agents, and apply role-based access control so agents can invoke only the minimum set of tools required for their task. Continuous monitoring should detect anomalous requests; if an agent deviates from expected behavior, automated systems should flag or suspend it"
                      - generic [ref=e2155]:
                        - text: "["
                        - generic [ref=e2156]: barbera2025ai
                        - text: "]"
                      - text: .
                  - listitem [ref=e2157]:
                    - text: •
                    - paragraph [ref=e2159]: "Post-processing and anomaly detection: Apply output filters to detect sensitive or inaccurate content, and update or retrain models to reduce hallucinations. Maintain robust logging and retention policies to support audits and incident response while minimizing exposure of private data."
              - paragraph [ref=e2161]:
                - text: Recent frameworks also emphasize hierarchical monitoring and cross-checking among agents to detect inconsistencies
                - generic [ref=e2162]:
                  - text: "["
                  - generic [ref=e2163]: wang2025megaagent
                  - text: "]"
                - text: . Tooling ecosystems such as LangChain
                - generic [ref=e2164]:
                  - text: "["
                  - generic [ref=e2165]: langchain2024function
                  - text: "]"
                - text: ", AutoGen"
                - generic [ref=e2166]:
                  - text: "["
                  - generic [ref=e2167]: autogen_agents_tutorial
                  - text: "]"
                - text: ", and CrewAI"
                - generic [ref=e2168]:
                  - text: "["
                  - generic [ref=e2169]: crewAI
                  - text: "]"
                - text: operationalize verification through agent-level checks (e.g., reviewers/critics) and, in some cases, trust or reputation signals that encourage agents to validate each other’s outputs and flag potential compromise. Finally, adversarial training with attack examples
                - generic [ref=e2170]:
                  - text: "["
                  - generic [ref=e2171]: standen2025adversarial
                  - text: "]"
                - text: and systematic red-teaming
                - generic [ref=e2172]:
                  - text: "["
                  - generic [ref=e2173]: ganguli_red_2022
                  - text: "]"
                - text: can further strengthen robustness against malicious inputs.
            - generic [ref=e2174]:
              - heading "4.2.4 Model Privacy and Data Protection" [level=4] [ref=e2175]:
                - generic [ref=e2176]: 4.2.4
                - text: Model Privacy and Data Protection
              - paragraph [ref=e2178]:
                - text: Without strict controls, an agent may inadvertently leak sensitive data
                - generic [ref=e2179]:
                  - text: "["
                  - generic [ref=e2180]: ko2025sevensecuritychallengessolved
                  - text: "]"
                - text: ". A layered privacy strategy should include:"
              - list [ref=e2182]:
                - listitem [ref=e2183]:
                  - text: •
                  - paragraph [ref=e2185]:
                    - text: "Differential Privacy (DP): Adding calibrated noise to training data prevents individual data points from being re‑identified and reduces the risk that models memorize or regurgitate personal information"
                    - generic [ref=e2186]:
                      - text: "["
                      - generic [ref=e2187]: dwork2006calibrating
                      - text: "]"
                    - text: . DP should be assessed on a case‑by‑case basis, since heavy noise can harm accuracy.
                - listitem [ref=e2188]:
                  - text: •
                  - paragraph [ref=e2190]:
                    - text: "Data anonymization and minimization: Apply robust anonymization and pseudonymization techniques and regularly test them for effectiveness"
                    - generic [ref=e2191]:
                      - text: "["
                      - generic [ref=e2192]: sweeney2002k
                      - text: "]"
                    - text: . Limit data collection to what is strictly necessary for the agent’s task and enforce strict retention policies.
                - listitem [ref=e2193]:
                  - text: •
                  - paragraph [ref=e2195]:
                    - text: "Secure Multi‑Party Computation (MPC): MPC allows parties to jointly compute a function without revealing their private inputs. In privacy‑preserving LLM services, secure MPC can protect user prompts from the model provider; for example, the PUMA framework uses MPC to ensure that prompts remain hidden during inference, while maintaining reasonable performance (it can evaluate a 7‑billion‑parameter model within minutes)"
                    - generic [ref=e2196]:
                      - text: "["
                      - generic [ref=e2197]: lindell2009secure
                      - text: "]"
                    - text: .
                - listitem [ref=e2198]:
                  - text: •
                  - paragraph [ref=e2200]:
                    - text: "Homomorphic Encryption (HE): HE enables computation on encrypted data and offers cryptographically provable privacy. Recent work demonstrates an encryption‑friendly LLM architecture that uses LoRA fine‑tuning and Gaussian kernels to speed up fully homomorphic encryption (FHE) operations, allowing encrypted inference with performance comparable to plaintext models"
                    - generic [ref=e2201]:
                      - text: "["
                      - generic [ref=e2202]: gentry2009fully
                      - text: "]"
                    - text: .
                - listitem [ref=e2203]:
                  - text: •
                  - paragraph [ref=e2205]:
                    - text: "Trusted Execution Environments (TEEs): TEEs provide hardware‑enforced isolation that protects code and data"
                    - generic [ref=e2206]:
                      - text: "["
                      - generic [ref=e2207]: costan2016intel
                      - text: "]"
                    - text: . They partition processors into secure and normal worlds; implementations include Intel SGX, AMD SEV and Arm TrustZone. In secure LLM inference, TEEs ensure that models run only inside authenticated enclaves, with attestation verifying model integrity.
                - listitem [ref=e2208]:
                  - text: •
                  - paragraph [ref=e2210]: "Continuous monitoring and access controls: Encrypt data at rest and in transit, restrict access to authorized personnel, and use monitoring to detect data poisoning or unusual behaviour."
            - generic [ref=e2211]:
              - heading "4.2.5 Governance" [level=4] [ref=e2212]:
                - generic [ref=e2213]: 4.2.5
                - text: Governance
              - paragraph [ref=e2215]: Governance integrates ethical, legal, and societal considerations into the design and operation of AI systems. Below, we summarize how major governance frameworks inform the TRiSM principles.
              - list [ref=e2217]:
                - listitem [ref=e2218]:
                  - text: •
                  - paragraph [ref=e2220]:
                    - text: "EU AI Act — Human Oversight (Article 14): High-risk AI systems must be designed so that natural persons can effectively oversee them and prevent or minimize risks to health, safety, or fundamental rights"
                    - generic [ref=e2221]:
                      - text: "["
                      - generic [ref=e2222]: EU_AI_Act2025
                      - text: "]"
                    - text: . Oversight mechanisms should enable users to understand capabilities and limitations, detect anomalies, interpret outputs, decide not to use the system, or stop operation (e.g., via a “stop” mechanism). In certain high-risk identification contexts, decisions may require independent verification by multiple competent individuals.
                - listitem [ref=e2223]:
                  - text: •
                  - paragraph [ref=e2225]:
                    - text: "OECD AI Principles: These intergovernmental principles (updated in 2024) promote human-centric, trustworthy AI"
                    - generic [ref=e2226]:
                      - text: "["
                      - generic [ref=e2227]: oecd_ai_catalogue
                      - text: "]"
                    - text: ". They emphasize transparency and explainability: AI actors should provide meaningful information about data sources, factors, and logic so affected individuals can understand and, where appropriate, challenge outputs. Robustness, security, and safety require systems to function appropriately under normal and adverse conditions, including mechanisms to override or decommission systems to prevent harm. Accountability requires that AI actors ensure traceability of datasets and decisions and apply systematic risk management throughout the lifecycle."
                - listitem [ref=e2228]:
                  - text: •
                  - paragraph [ref=e2230]:
                    - text: "NIST AI Risk Management Framework (AI RMF): The AI RMF and its Generative AI profile define four core functions: Govern, Map, Measure, and Manage"
                    - generic [ref=e2231]:
                      - text: "["
                      - generic [ref=e2232]: ai2023artificial
                      - text: "]"
                    - text: . For generative AI, NIST recommends documenting risks and potential impacts, applying interpretability techniques (e.g., gradient-based attributions, occlusion tests, and counterfactual prompting) to improve transparency, and establishing policies for oversight across the AI lifecycle.
                - listitem [ref=e2233]:
                  - text: •
                  - paragraph [ref=e2235]:
                    - text: "Auditability and role-based access: AMAS should maintain auditable logs of agent actions, decisions, and data flows, and assign clear roles (e.g., reasoning, verification, summarization) so responsibilities remain transparent"
                    - generic [ref=e2236]:
                      - text: "["
                      - generic [ref=e2237]: khan2024role
                      - text: "]"
                    - text: . Role-based access control (RBAC) helps enforce accountability and prevents unauthorized agents from invoking sensitive functions.
