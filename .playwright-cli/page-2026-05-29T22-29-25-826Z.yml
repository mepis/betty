              - heading "Perception and Environment Interface" [level=5] [ref=e929]
              - paragraph [ref=e931]:
                - text: For agents interacting with dynamic environments (e.g., web interfaces, simulated worlds, or physical systems), an observation–action interface is essential
                - generic [ref=e932]:
                  - text: "["
                  - generic [ref=e933]: liu2025agent
                  - text: "]"
                - text: . Perception modules translate raw inputs (sensor streams, images, or textual state) into representations the LLM can process; the agent’s selected actions are then executed in the environment, and resulting state changes are returned as new observations. This loop supports iterative sense–plan–act behavior until a task is completed or halted. In multimodal or robotic settings, additional perception models (e.g., vision encoders) may be included, while the core interaction pattern remains the same.
            - generic [ref=e934]:
              - heading "Monitoring and Governance Layer" [level=5] [ref=e935]
              - paragraph [ref=e937]: A monitoring and governance layer provides system-wide oversight by collecting logs, traces, and metrics, enforcing policy constraints, and triggering alerts or interventions when anomalous behavior is detected. From a TRiSM perspective, this layer enables auditability and lifecycle governance across agent interactions, tool calls, and memory updates.
            - generic [ref=e938]:
