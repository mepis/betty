                    - text: ". A comprehensive EU regulation with phased application: bans on certain practices apply after six months (Feb 2025), obligations for general-purpose AI begin Aug 2025, and most high-risk system obligations (e.g., risk management, documentation, human oversight, post-market monitoring) start Aug 2026. High-risk systems require ongoing risk assessment, technical documentation (Annex IV), logging/traceability (Arts. 11–12), data governance (Art. 10), human oversight (Art. 14), and robustness/accuracy (Art. 15)."
