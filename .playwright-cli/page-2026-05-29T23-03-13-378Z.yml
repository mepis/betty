          - heading "Anchor Scaling Considerations" [level=2] [ref=e255]:
            - link "Anchor" [ref=e256] [cursor=pointer]:
              - /url: "#scaling-considerations"
              - text: 
            - text: Scaling Considerations
          - paragraph [ref=e257]: The default configuration of Qdrant is sensible when you are starting to work on a POC or your side project. However, when transitioning to production and experiencing the growth of data size and concurrent users, your expectations regarding high availability, latency, or throughput will change. If you foresee scaling the service, you should build your system ready for these kinds of challenges from the outset. There are a few common scenarios you should be aware of, especially if you are taking your first steps with Qdrant, anticipate rapid growth soon, and want to make your system future-proof.
          - heading "Anchor Memory Requirements" [level=3] [ref=e258]:
            - link "Anchor" [ref=e259] [cursor=pointer]:
              - /url: "#memory-requirements"
              - text: 
            - text: Memory Requirements
          - paragraph [ref=e260]: "Memory is a critical resource when scaling vector search. By default, Qdrant stores vectors in RAM for maximum search performance, but as collections grow to millions of vectors, keeping everything in memory becomes expensive. Qdrant lets you control the memory usage by offloading data to disk, and you can enable that mechanism at any time, even on an existing collection:"
          - list [ref=e261]:
            - listitem [ref=e262]: Frequently accessed vectors naturally stay cached, while others are read from disk only when needed, if you store vectors on disk
            - listitem [ref=e263]: Graph traversal may require IO operations if you store the HNSW index on disk
          - paragraph [ref=e264]: Put both on disk only when RAM is severely constrained, and ensure you have fast NVMe storage.
          - heading "Anchor Filtering" [level=3] [ref=e265]:
            - link "Anchor" [ref=e266] [cursor=pointer]:
              - /url: "#filtering"
              - text: 
            - text: Filtering
          - paragraph [ref=e267]:
            - text: Vector search alone can provide a decent search experience to your users; however, semantic similarity is rarely the only factor you have to consider. Embeddings won’t capture attributes such as price, and typically, a filter on a specific payload attribute has to be applied. To make that filtering effective, there are some specific Qdrant mechanisms you should be aware of, including with
            - strong [ref=e268]: payload indexes
            - text: .
          - heading "Anchor Payload Indexes" [level=3] [ref=e269]:
            - link "Anchor" [ref=e270] [cursor=pointer]:
              - /url: "#payload-indexes"
              - text: 
            - text: Payload Indexes
          - paragraph [ref=e271]: The payload index is a helper data structure that enables effective filtering on a particular payload attribute. It’s a concept familiar from relational databases, where we create an index on a column that we often filter by. Similarly, in Qdrant, you should also make a payload index on a field used for filtering.
          - paragraph [ref=e272]: A unique aspect of the payload index is that it extends the HNSW graph, allowing filtering criteria to be applied during the semantic search phase. That means it’s a single-pass graph traversal, rather than pre- or post-filtering, which both have some drawbacks.
          - paragraph [ref=e273]:
            - emphasis [ref=e274]:
              - img "HNSW Graph with Filtering" [ref=e275]
          - paragraph [ref=e276]:
            - text: The fact that a payload index extends the HNSW graph means it’s more efficient to create it before indexing the data, as the optimizer will need to build the graph once. However, in some cases, you may already have a collection with a lot of vectors and recognize a need to filter by a specific attribute. In such cases, you can still create a payload index, yet
            - strong [ref=e277]: it won’t immediately affect the HNSW graph
            - text: .
          - status [ref=e278]:
            - text: ⓘ The HNSW graph will only get created once the optimizer will run the segment reconstruction, and it might be triggered by
            - link "modifying the parameters of HNSW" [ref=e279] [cursor=pointer]:
              - /url: https://qdrant.tech/documentation/manage-data/collections/#update-collection-parameters
            - text: ", such as temporarily setting up m=0 and then back to the original value (m=16 by default)."
          - paragraph [ref=e280]:
            - link "ACORN" [ref=e281] [cursor=pointer]:
              - /url: https://qdrant.tech/documentation/search/search/#acorn-search-algorithm
            - text: is an additional mechanism that can improve the search accuracy if you have multiple high cardinality filters in your search operations.
          - heading "Anchor Scaling" [level=3] [ref=e282]:
            - link "Anchor" [ref=e283] [cursor=pointer]:
              - /url: "#scaling"
              - text: 
            - text: Scaling
          - paragraph [ref=e284]:
            - text: Vertical scaling has natural limits - eventually, you’ll hit the maximum capacity of available hardware, and single-node deployments lack redundancy. Optimize scaling with
            - strong [ref=e285]: sharding
            - text: ","
            - strong [ref=e286]: replication
            - text: ", and"
            - strong [ref=e287]: segment configuration
            - text: options.
          - heading "Anchor Sharding" [level=4] [ref=e288]:
            - link "Anchor" [ref=e289] [cursor=pointer]:
              - /url: "#sharding"
              - text: 
            - text: Sharding
          - paragraph [ref=e290]: Qdrant uses sharding to split collections across multiple nodes, where each shard is an independent store of points. A common recommendation is to start with 12 shards, which provides flexibility to scale from 1 node up to 2, 3, 6, or 12 nodes without resharding. However, this approach can limit throughput on small clusters since each node manages multiple shards.
          - paragraph [ref=e291]:
            - text: For optimal throughput, set
            - code [ref=e292]: shard_number
            - text: equal to your node count (read more here). If you want to have better control over sharding, Qdrant supports
            - link "custom shards" [ref=e293] [cursor=pointer]:
              - /url: https://qdrant.tech/documentation/distributed_deployment/#user-defined-sharding
            - text: .
          - heading "Anchor Replication" [level=4] [ref=e294]:
            - link "Anchor" [ref=e295] [cursor=pointer]:
              - /url: "#replication"
              - text: 
            - text: Replication
          - paragraph [ref=e296]:
            - text: The replication factor determines how many copies of each shard exist.
            - strong [ref=e297]: For production systems, a replication factor of at least 2 is strongly recommended
            - text: .
          - paragraph [ref=e298]:
            - 'img "Choosing a Replication Factor: RF=1 causes operational problems: node restarts make parts of your collection unavailable, and data loss is permanent without backups. Use RF=1 only for non-production workloads, development environments, or when data can be easily regenerated. RF=2 provides the optimal balance for most production deployments: data remains available during single-node failures, read operations benefit from load balancing, and rolling updates work without downtime. RF>2 is a throughput optimization for read-heavy workloads. More replicas distribute read operations across more nodes, increasing cluster throughput. The cost is proportionally increased storage and higher write overhead." [ref=e299]'
          - heading "Anchor Segment Configuration" [level=4] [ref=e300]:
            - link "Anchor" [ref=e301] [cursor=pointer]:
              - /url: "#segment-configuration"
              - text: 
            - text: Segment Configuration
          - paragraph [ref=e302]:
            - text: Each shard stores data in multiple
            - link "segments" [ref=e303] [cursor=pointer]:
              - /url: https://qdrant.tech/documentation/manage-data/storage/
            - text: . A segment stores all the data structures of a subset of the points in a shard. Fewer segments create larger segments with better search throughput, as larger HNSW indexes require fewer comparisons. However, larger segments take longer to build and recreate, slowing writes and optimization. More segments mean faster indexing but lower search performance since queries scan more segments. Read more on segment configuration.
          - status [ref=e304]: ⓘ In Qdrant Cloud, replication factor changes are applied automatically, and shard rebalancing is available. In self-hosted deployments, you must manually create or drop replicas and move shards between nodes as you scale.
          - heading "Anchor Safety" [level=3] [ref=e305]:
            - link "Anchor" [ref=e306] [cursor=pointer]:
              - /url: "#safety"
              - text: 
            - text: Safety
          - paragraph [ref=e307]:
            - text: Some of the collection-level operations may degrade performance of the Qdrant cluster. Qdrant’s
            - link "strict mode" [ref=e308] [cursor=pointer]:
              - /url: https://qdrant.tech/documentation/ops-configuration/administration/#strict-mode
            - text: "prevents inefficient usage patterns through multiple controls: it may block filtering and updates on non-indexed payload fields, limit query result sizes and timeout durations, restrict the complexity and number of filter conditions, cap payload index counts, constrain batch upsert sizes, enforce maximum collection storage limits (for vectors, payloads, and point counts), and implement rate limiting for read and write operations to prevent system overload."
          - status [ref=e309]: ⓘ Qdrant Cloud disables filtering and updating by a non-indexed payload attribute by default, and also restricts the maximum number of payload indexes to 100\. You may consider disabling it temporarily if you want to execute some one-time queries on unindexed payload attributes, but in general you should need to do that.
          - paragraph [ref=e310]: The OSS version does not enforce anything, but please consider enabling and configuring strict mode settings according to the application needs. Otherwise, some of the API calls may impact the performance of your cluster by using Qdrant in a suboptimal way.
          - heading "Anchor Getting Help" [level=2] [ref=e311]:
            - link "Anchor" [ref=e312] [cursor=pointer]:
              - /url: "#getting-help"
              - text: 
            - text: Getting Help
          - paragraph [ref=e313]:
            - text: If you’re new to Qdrant, start with the free
            - link "Essentials Course" [ref=e314] [cursor=pointer]:
              - /url: https://qdrant.tech/course/essentials/
              - strong [ref=e315]: Essentials Course
            - text: ", which covers core concepts and best practices. For questions, troubleshooting, and community support, join the"
            - link "Discord Community" [ref=e316] [cursor=pointer]:
              - /url: https://qdrant.to/discord
              - strong [ref=e317]: Discord Community
            - text: "- it’s the best place to get help from both Qdrant users and the core team. Paid customers have access to the"
            - link "Support Portal" [ref=e318] [cursor=pointer]:
              - /url: https://qdrant.to/cloud
              - strong [ref=e319]: Support Portal
            - text: through the Qdrant Cloud Console, for direct technical assistance and priority response times.
