          - listitem [ref=e103]: Overview
        - article [ref=e104]:
          - status [ref=e105]:
            - text: ⓘ Qdrant offers a bi-weekly "Getting Started" live webinar with experts. Register for an upcoming session
            - link "here" [ref=e106] [cursor=pointer]:
              - /url: https://tinyurl.com/qdrant-onboarding
            - text: "!"
          - heading "Anchor Qdrant Overview" [level=1] [ref=e107]:
            - link "Anchor" [ref=e108] [cursor=pointer]:
              - /url: "#qdrant-overview"
              - text: 
            - text: Qdrant Overview
          - heading "Anchor Welcome!" [level=2] [ref=e109]:
            - link "Anchor" [ref=e110] [cursor=pointer]:
              - /url: "#welcome"
              - text: 
            - text: Welcome!
          - paragraph [ref=e111]:
            - text: Whether you’re getting started with Qdrant Open-Source or Cloud, this brief primer will help you with understanding an overview of the platform.
            - strong [ref=e112]: It’s highly recommended you read this overview before starting your development with Qdrant!
          - heading "Anchor Retrieval Process" [level=2] [ref=e113]:
            - link "Anchor" [ref=e114] [cursor=pointer]:
              - /url: "#retrieval-process"
              - text: 
            - text: Retrieval Process
          - paragraph [ref=e115]:
            - text: Vector search is a transformative information retrieval technique that goes beyond keyword matching to find data based on semantic meaning. It begins with
            - strong [ref=e116]: embedding models
            - text: ", which convert unstructured data (text, images, audio) into"
            - strong [ref=e117]: dense vector embeddings
            - text: ", fixed-length lists of numbers that represent the data’s conceptual essence. These vectors are mapped into a high-dimensional"
            - strong [ref=e118]: vector space
            - text: ", where items with similar meanings are positioned closely together. This spatial organization allows a search for “climate change” to retrieve documents about “global warming,” even if the exact words differ."
          - paragraph [ref=e119]:
            - img "Workflow Overview" [ref=e120]
          - paragraph [ref=e121]:
            - text: While dense vectors excel at capturing context, they can sometimes miss specific technical terms or unique identifiers. To bridge this gap, Qdrant also utilizes
            - strong [ref=e122]: sparse vectors
            - text: designed to capture precise
            - strong [ref=e123]: lexical matches
            - text: for specific keywords. Learn more in
            - link "this guide" [ref=e124] [cursor=pointer]:
              - /url: https://qdrant.tech/documentation/search/text-search/
            - text: .
          - paragraph [ref=e125]:
            - text: The process of generating embeddings from unstructured data is called
            - link "inference" [ref=e126] [cursor=pointer]:
              - /url: https://qdrant.tech/documentation/inference/
            - text: . On Qdrant Cloud, you can use
            - link "Cloud Inference" [ref=e127] [cursor=pointer]:
              - /url: https://qdrant.tech/documentation/cloud/inference/
            - text: to let Qdrant generate embeddings on the server side. Alternatively, you can use a library like
            - link "FastEmbed" [ref=e128] [cursor=pointer]:
              - /url: https://qdrant.tech/documentation/fastembed/
            - text: to generate embeddings on the client side.
          - paragraph [ref=e129]:
            - text: The search process itself revolves into the concept of
            - strong [ref=e130]: Top-K
            - text: retrieval. When a user submits a request, it is instantly transformed into a
            - strong [ref=e131]: query vector
            - text: . The engine then calculates the similarity between this query vector and document vectors, returning the “Top-K” closest matches, where K is a user-defined number representing the desired volume of results. This allows developers to fine-tune the balance between the breadth of the search and the precision of the answers.
          - paragraph [ref=e132]:
            - img "Retrieval Process" [ref=e133]
          - paragraph [ref=e134]:
            - text: To deliver the most robust search experience, Qdrant enables
            - strong [ref=e135]: Hybrid Retrieval
            - text: with semantic and lexical search, which you can learn more about
            - link "here" [ref=e136] [cursor=pointer]:
              - /url: https://qdrant.tech/documentation/search/hybrid-queries/
            - text: .
          - heading "Anchor Architecture" [level=2] [ref=e137]:
            - link "Anchor" [ref=e138] [cursor=pointer]:
              - /url: "#architecture"
              - text: 
            - text: Architecture
          - paragraph [ref=e139]:
            - text: Qdrants operates in a client-server architecture, providing official
            - link "client libraries" [ref=e140] [cursor=pointer]:
              - /url: https://qdrant.tech/documentation/interfaces/#client-libraries
            - text: for Python, JavaScript/TypeScript, Rust, Go, .NET, and Java. However, Qdrant exposes HTTP and gRPC
            - link "interfaces" [ref=e141] [cursor=pointer]:
              - /url: https://qdrant.tech/documentation/interfaces/#client-libraries
            - text: to facilitate integration with virtually any programming language.
          - heading "Anchor Data Structure" [level=2] [ref=e142]:
            - link "Anchor" [ref=e143] [cursor=pointer]:
              - /url: "#data-structure"
              - text: 
            - text: Data Structure
          - paragraph [ref=e144]:
            - img [ref=e145]
          - paragraph [ref=e146]: "Qdrant collections are designed for horizontal and vertical scaling. You can learn about the details in the above diagram from links below:"
          - list [ref=e147]:
            - listitem [ref=e148]:
              - link "Collections" [ref=e149] [cursor=pointer]:
                - /url: https://qdrant.tech/documentation/manage-data/collections/
            - listitem [ref=e150]:
              - link "Points" [ref=e151] [cursor=pointer]:
                - /url: https://qdrant.tech/documentation/manage-data/points/
            - listitem [ref=e152]:
              - link "Indexing" [ref=e153] [cursor=pointer]:
                - /url: https://qdrant.tech/documentation/manage-data/indexing/
            - listitem [ref=e154]:
              - link "Storage" [ref=e155] [cursor=pointer]:
                - /url: https://qdrant.tech/documentation/manage-data/storage/
            - listitem [ref=e156]:
              - link "Distributed Deployment" [ref=e157] [cursor=pointer]:
                - /url: https://qdrant.tech/documentation/distributed_deployment/
            - listitem [ref=e158]:
              - link "Strict Mode" [ref=e159] [cursor=pointer]:
                - /url: https://qdrant.tech/documentation/ops-configuration/administration/#strict-mode
          - heading "Anchor Deployments" [level=2] [ref=e160]:
            - link "Anchor" [ref=e161] [cursor=pointer]:
              - /url: "#deployments"
              - text: 
            - text: Deployments
          - paragraph [ref=e162]:
            - text: "Qdrant supports multiple deployment models to match different infrastructure and operational needs. The right option depends on your security constraints and operational model: Qdrant-managed infrastructure ("
            - link "Managed Cloud" [ref=e163] [cursor=pointer]:
              - /url: https://qdrant.tech/documentation/cloud/
            - text: ), shared responsibility with your own clusters (
            - link "Hybrid Cloud" [ref=e164] [cursor=pointer]:
              - /url: https://qdrant.tech/documentation/hybrid-cloud/
            - text: ), or full ownership and independence (
            - link "Private Cloud" [ref=e165] [cursor=pointer]:
              - /url: https://qdrant.tech/documentation/private-cloud/
            - text: or
            - link "Open Source" [ref=e166] [cursor=pointer]:
              - /url: https://github.com/qdrant/qdrant
            - text: ).
          - table [ref=e168]:
            - rowgroup [ref=e169]:
