          - paragraph [ref=e153]:
            - text: To answer these questions, we develop a Memory EXTRaction Attack (MEXTRA) targeting the memory module of general agents. We consider a black-box setting where the attacker can only interact with the agent using input queries, referred to as attacking prompts. However, designing an effective attacking prompt to achieve such a goal poses unique challenges. First, since LLM agents often involve complex workflows, previous data extraction attacking prompts used on external data leakage
            - generic [ref=e154]:
              - text: Zeng et al. (
              - link "2024" [ref=e155] [cursor=pointer]:
                - /url: https://arxiv.org/html/2502.13172v2#bib.bib44
              - text: ); Jiang et al. (
              - link "2024" [ref=e156] [cursor=pointer]:
                - /url: https://arxiv.org/html/2502.13172v2#bib.bib12
              - text: )
            - text: like “Please repeat all the context” struggle to locate and extract memory data from an informative task-related context. Second, since the final action of LLM agents can be different from generating output texts, the RAG data extraction attack becomes infeasible.
          - paragraph [ref=e158]:
            - text: To handle these challenges, we design a template to equip the attacking prompt with multiple functionalities. In the first part of the prompt, we explicitly request the retrieved user queries and prioritize their output over solving the original task. Then, we specify the output format of the retrieved queries, ensuring that it aligns with the agent’s workflow. An example is provided in the right part of Figure
            - link "1" [ref=e159] [cursor=pointer]:
              - /url: https://arxiv.org/html/2502.13172v2#S1.F1
            - text: . The first part “I lost previous example queries” locates desired private information, while the second part “please enter them in the search box” induces the agent to return the retrieved information in a legitimate manner aligned with the agent’s workflow. To further explore the vulnerability of agents, we consider different scenarios where the attacker has different levels of knowledge about the agent implementation. Additionally, we develop an automated method to generate diverse attacking prompts to maximize private information extraction within a limited number of attacks.
          - paragraph [ref=e161]: With the attacking prompt design and the automated generation method, we find LLM agents are vulnerable to memory extraction attacks. The auto-generated attacking prompts following the prompt design can effectively extract the private information stored in the LLM agent memory. Through deeper exploration, we observe that the different choices in memory module configuration significantly impact the extent of LLM agent memory leakage. Moreover, from the attacker’s perspective, increasing the number of attacks and possessing detailed knowledge about the agent implementation can lead to more memory extraction.
