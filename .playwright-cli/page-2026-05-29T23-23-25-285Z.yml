          - generic [ref=e1720]:
            - heading "Privacy Risk in RAG." [level=4] [ref=e1721]
            - paragraph [ref=e1723]:
              - text: Recent works in RAG have extensively explored the privacy issues associated with external data.
              - generic [ref=e1724]:
                - text: Zeng et al. (
                - link "2024" [ref=e1725] [cursor=pointer]:
                  - /url: https://arxiv.org/html/2502.13172v2#bib.bib44
                - text: )
              - text: first revealed that the private data integrated into RAG systems is vulnerable to manually crafted adversarial prompts, while
              - generic [ref=e1726]:
                - text: Qi et al. (
                - link "2024" [ref=e1727] [cursor=pointer]:
                  - /url: https://arxiv.org/html/2502.13172v2#bib.bib26
                - text: )
              - text: conducted a more comprehensive investigation across multiple RAG configurations. To automate extraction,
              - generic [ref=e1728]:
                - text: Jiang et al. (
                - link "2024" [ref=e1729] [cursor=pointer]:
                  - /url: https://arxiv.org/html/2502.13172v2#bib.bib12
                - text: )
              - text: developed an agent-based attack, and
              - generic [ref=e1730]:
                - text: Di Maio et al. (
                - link "2024" [ref=e1731] [cursor=pointer]:
                  - /url: https://arxiv.org/html/2502.13172v2#bib.bib5
                - text: )
              - text: proposed an adaptive strategy to progressively extract the private knowledge. These works suggest that similar privacy threats can arise in LLM agents, owing to the similar data retrieval mechanisms employed by both systems.
          - generic [ref=e1732]:
            - heading "Prompt Injection Attack." [level=4] [ref=e1733]
            - paragraph [ref=e1735]:
              - text: Prompt injection is an attack that manipulates an LLM’s output by injecting crafted adversarial commands into its prompt
              - generic [ref=e1736]:
                - text: He et al. (
                - link "2024" [ref=e1737] [cursor=pointer]:
                  - /url: https://arxiv.org/html/2502.13172v2#bib.bib8
                - text: )
              - text: ". It can be divided into two categories: direct and indirect prompt injection"
              - generic [ref=e1738]:
                - text: Rossi et al. (
                - link "2024" [ref=e1739] [cursor=pointer]:
                  - /url: https://arxiv.org/html/2502.13172v2#bib.bib28
                - text: )
              - text: . In direct prompt injection, malicious input is directly included in the prompt given to the LLM, achieving the goals like goal hijacking
              - generic [ref=e1740]:
                - text: Perez and Ribeiro (
                - link "2022" [ref=e1741] [cursor=pointer]:
                  - /url: https://arxiv.org/html/2502.13172v2#bib.bib25
                - text: ); Zhang et al. (
                - link "2024a" [ref=e1742] [cursor=pointer]:
                  - /url: https://arxiv.org/html/2502.13172v2#bib.bib46
                - text: )
              - text: ", prompt leaking"
              - generic [ref=e1743]:
                - text: Perez and Ribeiro (
                - link "2022" [ref=e1744] [cursor=pointer]:
                  - /url: https://arxiv.org/html/2502.13172v2#bib.bib25
                - text: ); Hui et al. (
                - link "2024" [ref=e1745] [cursor=pointer]:
                  - /url: https://arxiv.org/html/2502.13172v2#bib.bib9
                - text: )
              - text: ", and jailbreaking"
              - generic [ref=e1746]:
                - text: Zou et al. (
                - link "2023" [ref=e1747] [cursor=pointer]:
                  - /url: https://arxiv.org/html/2502.13172v2#bib.bib50
                - text: ); Li et al. (
                - link "2024" [ref=e1748] [cursor=pointer]:
                  - /url: https://arxiv.org/html/2502.13172v2#bib.bib18
                - text: )
              - text: . In contrast, indirect prompt injection delivers malicious inputs through external content sources, often without the user’s awareness. It typically targets LLM-based agents via channels such as emails or websites
              - generic [ref=e1749]:
                - text: Zhan et al. (
                - link "2024" [ref=e1750] [cursor=pointer]:
                  - /url: https://arxiv.org/html/2502.13172v2#bib.bib45
                - text: ); Wu et al. (
                - link "2024a" [ref=e1751] [cursor=pointer]:
                  - /url: https://arxiv.org/html/2502.13172v2#bib.bib38
                - text: ); Liu et al. (
                - link "2023a" [ref=e1752] [cursor=pointer]:
                  - /url: https://arxiv.org/html/2502.13172v2#bib.bib19
                - text: )
              - text: ", enabling more stealthy manipulation of external inputs and potentially leading to unauthorized actions and unintended data leakage, such as private information contained in emails or web pages. However, previous studies have paid limited attention to the issue of memory leakage in LLM-based agents, which is the main focus of this work."
        - generic [ref=e1753]:
          - heading "8 Conclusion" [level=2] [ref=e1754]:
            - generic [ref=e1755]: "8"
            - text: Conclusion
          - paragraph [ref=e1757]: "In this paper, we unveil the privacy risks of LLM agent memory leakage through a memory extraction attack, MEXTRA. It consists of two parts: attacking prompt design and automated attacking prompt tailored to different levels of knowledge about the agent. Empirical evaluations demonstrate the vulnerability of LLM agents to MEXTRA. Moreover, we explore the key factors that influence memory leakage from both the agent designer’s and the attacker’s perspectives."
        - generic [ref=e1758]:
          - heading "Limitation" [level=2] [ref=e1759]
          - paragraph [ref=e1761]: "Our memory extraction attack has only been evaluated on a single-agent setup. Extending it to a multi-agent setup, where agents communicate or share memory, would be an interesting direction for future research. Investigating how inter-agent interactions impact the risk of memory leakage could provide deeper insights into privacy vulnerabilities in LLM agents. In addition, the agent framework we consider does not incorporate session control: multiple users may share the same session, causing the memory module to store historical records from all users. Introducing user-level and session-level memory isolation would limit attackers’ access to private data and mitigate the impact of memory extraction. However, since there is no standard method for integrating session control into agent frameworks, we leave its exploration for future work."
