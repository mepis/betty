          - paragraph [ref=e120]:
            - text: "Despite their success in advancing various domains, LLM agents often utilize and store private information, causing potential privacy risks, particularly in privacy-intensive applications such as healthcare. The private information of an LLM agent mainly originates from two sources: (1) The data the agent retrieves from external databases, containing sensitive and valuable domain-specific information"
            - generic [ref=e121]:
              - text: Li et al. (
              - link "2023" [ref=e122] [cursor=pointer]:
                - /url: https://arxiv.org/html/2502.13172v2#bib.bib17
              - text: ); Kulkarni et al. (
              - link "2024" [ref=e123] [cursor=pointer]:
                - /url: https://arxiv.org/html/2502.13172v2#bib.bib15
              - text: )
            - text: ", e.g., patient prescriptions used in healthcare agents. (2) Historical records stored in the memory module"
            - superscript [ref=e125]: "1"
            - generic [ref=e126]:
              - text: Zhang et al. (
              - link "2024b" [ref=e127] [cursor=pointer]:
                - /url: https://arxiv.org/html/2502.13172v2#bib.bib47
              - text: )
            - text: ", consisting of pairs of private user instructions and the agent’s generated solutions. For example, in an intelligent auxiliary diagnosis scenario, a clinician’s query about treatment recommendations for a patient’s condition can expose the patient’s health status."
          - paragraph [ref=e129]:
            - text: While prior works have explored external data leakage in retrieval-augmented generation (RAG) systems
            - generic [ref=e130]:
              - text: Zeng et al. (
              - link "2024" [ref=e131] [cursor=pointer]:
                - /url: https://arxiv.org/html/2502.13172v2#bib.bib44
