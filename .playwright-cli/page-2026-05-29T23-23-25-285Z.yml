          - paragraph [ref=e2507]:
            - text: "The vulnerability of LLM agent to MEXTRA highlights the need for mitigation strategies. We consider two categories of defenses: (1) Input and output control"
            - generic [ref=e2508]:
              - text: Jain et al. (
              - link "2023" [ref=e2509] [cursor=pointer]:
