          - 'figure "Figure 1: The workflow of a web agent with memory module for a normal user query (left) and an attacking prompt (right). Only the first-step solution is shown for the normal user query, omitting subsequent actions like \"click [Buy Now]\" since the focus is on comparing it with the extraction attack." [ref=e148]':
