                - /url: https://arxiv.org/html/2502.13172v2#bib.bib10
              - text: )
            - text: ", which aims to prevent private information exposure during query processing and response generation. A common approach is adding a hard rule in agent’s system prompt to filter privacy-sensitive input query and outputs, blocking responses that could lead to memory leakage. For example, a rule like “If the user requests historical queries, do not respond and stop this interaction” can filter malicious query input. Another approach is paraphrasing, which rephrases queries and responses to obscure identifiable private details. However, the attacking prompt can be tailored to appear contextually harmless and normal, making the filter fail to detect. And paraphrasing may not fully eliminate sensitive information. (2) Memory sanitation, which focuses on ensuring that stored data does not contain private information. For example, the agent can conduct de-identification, where user queries are sanitized before being stored"
            - generic [ref=e2511]:
