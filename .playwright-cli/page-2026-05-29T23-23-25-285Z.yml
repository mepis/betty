              - link "2024" [ref=e132] [cursor=pointer]:
                - /url: https://arxiv.org/html/2502.13172v2#bib.bib12
              - text: )
            - text: ", the security implications of the memory module in LLM agents remain underexplored. RAG retrieves and integrates external data into prompts to enhance the LLM’s text generation"
            - generic [ref=e133]:
              - text: Lewis et al. (
              - link "2020" [ref=e134] [cursor=pointer]:
                - /url: https://arxiv.org/html/2502.13172v2#bib.bib16
              - text: ); Fan et al. (
              - link "2024" [ref=e135] [cursor=pointer]:
                - /url: https://arxiv.org/html/2502.13172v2#bib.bib7
              - text: )
            - text: . The integrated external data can be extracted by privacy attacks. In contrast, the memory module that stores user-agent interactions emerges as a new source of private information. It inherently contains sensitive user data, and there is limited understanding of whether private information in memory can be extracted and how vulnerable it is. Private information leakage from memory can result in serious privacy risks, such as unauthorized data access and misuse. Consider a clinician using an LLM agent to assist with patient diagnosis and treatment planning, where queries may contain sensitive patient information. If the medical agent’s memory containing such medical details was exposed, insurance companies could exploit it to impose discriminatory charges on patients.
          - generic [ref=e136]:
