                - /url: https://arxiv.org/html/2502.13172v2#bib.bib21
              - text: )
            - text: ", preventing the leakage of sensitive details. However, this operation may weaken the effectiveness of stored records as demonstrations for future queries. Based on above analysis, future research could develop effective memory safeguards in the design and deployment of LLM agents."
