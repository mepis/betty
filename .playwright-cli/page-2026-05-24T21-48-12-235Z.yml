      - generic [ref=e96]:
        - heading "Abstract" [level=6] [ref=e97]
        - paragraph [ref=e98]: LLM context is not just tokens; it is a set of commitments. Long-running conversations accumulate goals, constraints, decisions, preferences, tool results, retrieved evidence, artifacts, and safety boundaries that future responses must preserve. Existing context-management methods reduce length through truncation, retrieval, summarization, memory systems, or token-level prompt compression, but they rarely specify which semantic commitments must survive compression or how their preservation should be measured. We propose Context Codec, a commitment-level framework for compressing prompts and chat histories.
        - paragraph [ref=e99]: "Context Codec represents dialogue state as typed, source-grounded semantic atoms with canonical identity, equivalence, conflict, confidence, risk, and evidence spans. It separates five concerns—extraction, normalization, representation, rendering, and verification—and introduces metrics for Critical Atom Recall, Weighted Atom Recall, Commitment Density, and round-trip recoverability. It also defines a taxonomy of semantic compression errors, a concrete normalization procedure, conservative fallback rules for low-confidence and safety-critical atoms, and Context Compression Language (CCL), an ASCII-first compact rendering of canonical JSON atoms. In a small diagnostic study, CCL-Core occupies a useful middle ground between structured prose and JSON: more explicit and auditable than prose, usually more compact than JSON, and less risky than heavily minified notation. The result is not a claim that shorthand solves compression, but a framework for making context compression verifiable: compress the conversation, keep the commitments."
      - generic [ref=e100]:
        - heading "1 Introduction" [level=2] [ref=e101]:
          - generic [ref=e102]: "1"
          - text: Introduction
        - paragraph [ref=e104]: The context supplied to an LLM increasingly determines the behavior of the system around it. A modern assistant may rely on system instructions, user preferences, project history, source documents, retrieved passages, tool outputs, plans, intermediate artifacts, safety policies, and prior decisions. As context grows, systems must decide what to include, what to summarize, what to retrieve, and what to drop.
        - paragraph [ref=e106]:
          - text: "The naive solution is to increase the context window. However, long context alone does not solve context management. Prior work shows that LLMs may not use long contexts robustly: performance can depend on the position of relevant information, with evidence in the middle of long contexts being harder to use"
          - generic [ref=e107]:
            - text: "["
            - link "12" [ref=e108] [cursor=pointer]:
              - /url: "#bib.bib12"
            - text: "]"
          - text: . Long contexts also increase latency and cost, motivating prompt compression methods such as LLMLingua
          - generic [ref=e109]:
