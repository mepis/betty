            - list [ref=e899]:
              - listitem [ref=e900]:
                - text: "1."
                - paragraph [ref=e902]: "Closed lexicon: a hand-authored vocabulary for a narrow domain, such as web-app generation, with aliases like libs, packages, and dependencies. This is the most auditable regime and is appropriate when precision matters more than coverage."
              - listitem [ref=e903]:
                - text: "2."
                - paragraph [ref=e905]: "Corpus-derived lexicon: aliases and predicate mappings induced from a labeled or weakly labeled corpus of tasks. This improves coverage but requires drift monitoring and versioning."
              - listitem [ref=e906]:
                - text: "3."
                - paragraph [ref=e908]: "Interactive lexicon: ambiguous mappings are proposed by a model and confirmed by a human or by downstream tests, then added to a reusable project lexicon."
              - listitem [ref=e909]:
                - text: "4."
                - paragraph [ref=e911]: "Open semantic parser: an LLM or learned parser maps spans directly into canonical atoms, with the lexicon acting as a constraint set and validation target rather than as the whole parser."
            - paragraph [ref=e912]: These regimes connect CCL normalization to semantic parsing. The lexicon defines the target ontology and allowed aliases; the parser resolves surface language into that ontology under context. A closed lexicon is therefore not a replacement for semantic parsing, but a way to constrain it. In all regimes, lexicon entries should be versioned with examples, negative examples, and conflict rules. For instance, local_food and restaurants may be related preferences, but they should not collapse to the same atom unless the task ontology says they are equivalent.
