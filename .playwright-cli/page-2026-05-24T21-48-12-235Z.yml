          - heading "Extractor quality." [level=4] [ref=e2341]
          - paragraph [ref=e2343]: The extractor is the primary bottleneck. Future work should study extractors directly, including domain-specific extraction, source-grounded extraction, self-consistency, confidence calibration, and human-in-the-loop correction.
        - generic [ref=e2344]:
          - heading "Metric annotation." [level=4] [ref=e2345]
