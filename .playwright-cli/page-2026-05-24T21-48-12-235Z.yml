        - paragraph [ref=e122]:
          - text: This paper argues that context compression should be analyzed at the level of
          - emphasis [ref=e123]: semantic commitments
          - text: ". A semantic commitment is any proposition, constraint, decision, preference, state variable, or safety boundary that can change the correctness of a future response. Examples include: “the output must be a single HTML file,” “no external libraries are allowed,” “deduplicate by customer id,” “the user rejected SVG and chose Canvas,” or “the open question is whether the notation should be ASCII-only.” Losing one of these commitments may make a future answer wrong even if a summary remains fluent."
