        - generic [ref=e2348]:
          - heading "Tokenizer dependence." [level=4] [ref=e2349]
          - paragraph [ref=e2351]: Our experiment uses a lexical-token proxy. Real gains depend on the target tokenizer. ASCII-only CCL was chosen to reduce tokenizer instability, but tokenizer-specific measurements remain necessary. We provide a protocol but do not claim that lexical counts predict all BPE tokenizer behavior.
        - generic [ref=e2352]:
          - heading "Model familiarity." [level=4] [ref=e2353]
