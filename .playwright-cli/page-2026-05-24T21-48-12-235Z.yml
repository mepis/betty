          - paragraph [ref=e1794]: We include a small practical experiment to ground the framework. The goal is not to claim broad empirical superiority. Instead, the experiment asks whether commitment-level metrics reveal useful tradeoffs among prose, structured prose, JSON, CCL-Core, and CCL-Min.
