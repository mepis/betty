          - heading "Small diagnostic experiment and author scoring." [level=4] [ref=e2357]
          - paragraph [ref=e2359]: The results here are illustrative, not definitive. They should be treated as a sanity check and design probe, not as a benchmark claim. The current study is author-annotated and author-scored; a round-trip decompression experiment with independent decoders is needed before making strong claims about recoverability.
      - generic [ref=e2360]:
