          - heading "9.4 Interpretation" [level=3] [ref=e2081]:
            - generic [ref=e2082]: "9.4"
            - text: Interpretation
          - generic [ref=e2083]:
            - paragraph [ref=e2084]: "The diagnostic results support several limited observations:"
            - list [ref=e2085]:
              - listitem [ref=e2086]:
                - text: •
                - paragraph [ref=e2088]: Free prose is very compact but loses many commitments, especially exact counts, output contracts, and negations.
              - listitem [ref=e2089]:
                - text: •
                - paragraph [ref=e2091]: Structured prose can preserve all annotated commitments, but its gains are modest and depend on careful prompting.
              - listitem [ref=e2092]:
                - text: •
                - paragraph [ref=e2094]: JSON is highly faithful and validatable but often longer than the original short prompt. This is expected for small examples; JSON may become more favorable for long histories or automated processing.
              - listitem [ref=e2095]:
                - text: •
                - paragraph [ref=e2097]: CCL-Core matches structured prose on atom recall in these cases and is slightly more compact on average, but not always dramatically so.
              - listitem [ref=e2098]:
                - text: •
                - paragraph [ref=e2100]: CCL-Min offers the largest faithful compression among structured methods but begins to lose atoms and should be treated as risky.
          - paragraph [ref=e2102]: "The Trip CCL-Min row is an anomaly: unlike the other CCL-Min examples, it scores perfect CAR and WAR. This should not be read as evidence that CCL-Min is generally safe. The trip case uses short enum-like fields and a small preference list, so minification preserved every author-annotated atom under the paper’s own normalizer. It is also exactly the kind of result most vulnerable to author-scoring circularity: an independent decoder might misread abbreviated fields such as C= or OUT= even though the author-normalizer recovers them. The anomaly therefore strengthens, rather than weakens, the need for the round-trip protocol in Section 9.5."
          - paragraph [ref=e2104]: "The most important result is not that CCL “wins.” Rather, the metrics reveal a tradeoff: prose maximizes compression at the cost of commitment loss; JSON maximizes structure at the cost of length; CCL occupies a middle region that may be useful for structured, commitment-heavy contexts. The structured-prose baseline is especially important: in these five cases it preserved all author-annotated atoms with only slightly weaker compression than CCL-Core. This means that CCL’s argument must rest on systematicity, validation, diffability, and minification control, not merely on raw compression ratio."
