          - paragraph [ref=e1817]: "For each case, we manually annotated 12–15 critical atoms and assigned simple integer weights. These weights are illustrative and should be treated as a transparent scoring aid, not as validated user-utility estimates. We then wrote five compressed versions: free prose, structured prose, JSON, CCL-Core, and CCL-Min. Token counts use a reproducible lexical-token proxy that splits alphanumeric spans and punctuation. This is not a vendor tokenizer; the purpose is relative comparison under a transparent counting rule. The author-controlled nature of this study is a methodological limitation: because the same authors wrote the annotations and the compressed representations, perfect recall for structured prose and CCL-Core should not be interpreted as independent evidence of reliability. The experiment is useful as a design probe, not as a benchmark. Section 9.5 defines the round-trip decompression experiment needed to break this circularity, and Section 9.6 provides tokenizer counts for concrete examples and defines the protocol needed to replace the lexical proxy for the full table."
