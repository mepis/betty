        - heading "10 Safety-Critical Compression" [level=2] [ref=e2263]:
          - generic [ref=e2264]: "10"
          - text: Safety-Critical Compression
        - generic [ref=e2265]:
          - paragraph [ref=e2266]:
            - text: Compression can amplify risk if safety boundaries, refusals, privacy conditions, or scope limits are dropped. The safety_flag predicate should therefore be an OR over raw-source policy checks, safety classifiers, extractor labels, atom types, and human policy tags, as defined in Section
            - link "4.6" [ref=e2267] [cursor=pointer]:
              - /url: "#S4.SS6"
            - text: ". We propose the following conservative rules:"
          - list [ref=e2268]:
            - listitem [ref=e2269]:
              - text: "1."
              - paragraph [ref=e2271]: Safety policies and system/developer constraints are never minified unless a validated formal policy representation exists.
            - listitem [ref=e2272]:
              - text: "2."
              - paragraph [ref=e2274]: Safety-relevant atoms must include source evidence and high criticality.
            - listitem [ref=e2275]:
              - text: "3."
              - paragraph [ref=e2277]: "Compression should be checked at four stages: original context, extracted atoms, compressed packet, and decompressed reconstruction."
            - listitem [ref=e2278]:
              - text: "4."
              - paragraph [ref=e2280]: If safety atom extraction confidence is low, use raw source spans or avoid compression.
            - listitem [ref=e2281]:
              - text: "5."
              - paragraph [ref=e2283]: The compressor should preserve refusals and boundaries as positive state, such as a defensive-only scope flag, not merely omit unsafe details.
        - paragraph [ref=e2285]: Adversarial failure modes include instruction laundering, negation deletion, refusal erasure, scope narrowing, and policy-boundary weakening. These should be included in future diagnostic benchmarks.
