        - generic [ref=e1719]:
          - heading "7.6 When Structured Prose Wins" [level=3] [ref=e1720]:
            - generic [ref=e1721]: "7.6"
            - text: When Structured Prose Wins
          - paragraph [ref=e1723]: Structured prose is a strong baseline and may be preferable when token budgets are loose, receiver models are unknown, or human readability dominates. A carefully prompted summary can explicitly require preservation of negations, counts, decisions, and output contracts. CCL is motivated when contexts must be diffed, validated, minified, merged across sessions, round-trip tested, or audited against source spans. Thus the practical claim is not that CCL universally beats structured prose; rather, CCL provides a more systematic interface between extracted commitments and compressed context.
