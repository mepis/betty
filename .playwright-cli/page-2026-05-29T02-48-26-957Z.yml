    - article [ref=e38]:
      - heading "Running llama.cpp locally with Qwen3.6 35B A3B and systemd" [level=1] [ref=e39]
      - paragraph [ref=e40]:
        - text: There is a moment in every local-LLM journey where the toy
        - code [ref=e41]: "`ollama run`"
        - text: command is no longer enough. You want a real OpenAI-compatible endpoint sitting on a stable port. You want it to come back after a reboot. You want to pick the model, pick the quantisation, pick the context window, and pick how the experts of a mixture-of-experts model are laid out across CPU and GPU. That is the job
        - code [ref=e42]: "`llama.cpp`"
        - text: was built for, and the version of
        - code [ref=e43]: "`llama-server`"
        - text: shipping in 2026 has finally caught up to a point where running a 35-billion-parameter MoE on a single workstation is genuinely practical.
      - paragraph [ref=e44]:
        - text: This lesson is the end-to-end recipe. We will build
        - code [ref=e45]: "`llama.cpp`"
        - text: from source with CUDA support, download Unsloth's GGUF conversion of
        - strong [ref=e46]: Qwen3.6 35B A3B
        - text: ", work through the runtime flags that actually matter for an MoE this size, and wrap the whole thing in a systemd unit that starts on boot, restarts on failure, and logs to the journal. By the end you will have a local"
        - code [ref=e47]: "`/v1/chat/completions`"
        - text: endpoint that behaves like a tiny private OpenAI account.
      - paragraph [ref=e48]: The target audience is someone comfortable with the Linux command line who has either an NVIDIA GPU with 12–24 GB of VRAM or a recent workstation CPU with enough system RAM to host the routed experts. The exact split is tunable, which is most of what makes this interesting.
      - heading "The model in one paragraph" [level=2] [ref=e49]
      - paragraph [ref=e50]:
        - strong [ref=e51]: Qwen3.6 35B A3B
        - text: is a mixture-of-experts model from Alibaba's Qwen team. The number "35B" is the total parameter count; "A3B" —
        - emphasis [ref=e52]: active 3B
        - text: — is the number of parameters actually doing work per token. The architecture has 256 experts per MoE layer, of which 8 are routed plus 1 shared expert per forward pass. The practical consequence is that memory cost scales with 35B but compute scales closer to a 3B dense model, which is why these models punch far above their compute weight on consumer hardware. Native context is 262,144 tokens, extensible further with YaRN. Unsloth's GGUF builds publish quantisations from
        - code [ref=e53]: "`UD-IQ1_M`"
        - text: (around 10 GB) up to
        - code [ref=e54]: "`BF16`"
        - text: (around 70 GB); for a 24 GB VRAM card the
        - code [ref=e55]: "`UD-Q4_K_M`"
        - text: build at roughly 22 GB is the usual sweet spot, and even an 8–12 GB card is reachable if you route the routed-expert FFN weights to CPU.
      - 'heading "Step 1: build llama.cpp from source" [level=2] [ref=e56]'
      - paragraph [ref=e57]:
        - text: You can install
        - code [ref=e58]: "`llama.cpp`"
        - text: "from Homebrew, winget, Docker images, or the pre-built release tarballs on GitHub. For a Linux server we will build from source: it is the only way to get a binary tuned to your specific CUDA setup, and the project moves fast enough that a checkout from"
        - code [ref=e59]: "`master`"
        - text: is often weeks ahead of any package.
      - paragraph [ref=e60]: "Prerequisites on a Debian or Ubuntu host:"
      - code [ref=e63]: "sudo apt update sudo apt install -y git cmake build-essential libcurl4-openssl-dev ccache # For NVIDIA GPU acceleration, install the CUDA toolkit from NVIDIA's apt repo. # The package name is cuda-toolkit-12-x or similar; verify nvcc --version works."
      - paragraph [ref=e64]: "Clone the repository and build with CUDA enabled:"
      - code [ref=e67]: git clone https://github.com/ggml-org/llama.cpp.git cd llama.cpp cmake -B build -DGGML_CUDA=ON -DLLAMA_CURL=ON cmake --build build --config Release -j --clean-first \ --target llama-server llama-cli llama-gguf-split
      - paragraph [ref=e68]:
        - text: A few notes on the flags.
        - code [ref=e69]: "`-DGGML_CUDA=ON`"
        - text: is what compiles the CUDA kernels.
        - code [ref=e70]: "`-DLLAMA_CURL=ON`"
        - text: is what lets
        - code [ref=e71]: "`llama-server`"
        - text: resolve
        - code [ref=e72]: "`-hf user/repo:quant`"
        - text: shortcuts directly from Hugging Face — without it you are stuck pre-downloading every GGUF by hand. The explicit
        - code [ref=e73]: "`--target`"
        - text: list keeps the build narrow; without it you compile every example, which doubles the compile time for binaries you will never touch.
      - paragraph [ref=e74]:
        - text: If you do not have a GPU, drop
        - code [ref=e75]: "`-DGGML_CUDA=ON`"
        - text: . The CPU build is the same in every other respect; runtime performance on a 35B A3B model will be in the 2–5 tokens-per-second range on a recent workstation, which is fine for chat-shaped workloads but slow for batch jobs.
      - paragraph [ref=e76]:
        - text: When the build finishes, the binaries live under
        - code [ref=e77]: "`build/bin/`"
        - text: . Put that directory on your
        - code [ref=e78]: "`PATH`"
        - text: ", or symlink the two binaries you actually use into"
        - code [ref=e79]: "`/usr/local/bin`"
        - text: ":"
      - code [ref=e82]: sudo ln -s "$PWD/build/bin/llama-server" /usr/local/bin/llama-server sudo ln -s "$PWD/build/bin/llama-cli" /usr/local/bin/llama-cli
      - paragraph [ref=e83]:
        - text: Verify with
        - code [ref=e84]: "`llama-server --version`"
        - text: .
      - 'heading "Step 2: get the GGUF weights" [level=2] [ref=e85]'
      - paragraph [ref=e86]:
        - text: The model lives at
        - link "https://huggingface.co/unsloth/Qwen3.6-35B-A3B-GGUF" [ref=e87] [cursor=pointer]:
          - /url: https://huggingface.co/unsloth/Qwen3.6-35B-A3B-GGUF
        - text: . There are three reasonable ways to pull it down.
      - paragraph [ref=e88]:
        - strong [ref=e89]:
          - text: Option A — let
          - code [ref=e90]: "`llama-server`"
          - text: do it.
        - text: If you built with
        - code [ref=e91]: "`LLAMA_CURL=ON`"
        - text: ", you can pass"
        - code [ref=e92]: "`-hf`"
        - text: and the server will resolve the file on first run, cache it under
        - code [ref=e93]: "`~/.cache/llama.cpp/`"
        - text: ", and reuse it afterwards:"
      - code [ref=e96]: llama-server -hf unsloth/Qwen3.6-35B-A3B-GGUF:UD-Q4_K_M
      - paragraph [ref=e97]:
        - text: The colon-suffix is the quantisation tag, matching the file naming on the repo (e.g.
        - code [ref=e98]: "`Qwen3.6-35B-A3B-UD-Q4_K_M.gguf`"
        - text: ).
      - paragraph [ref=e99]:
        - strong [ref=e100]:
          - text: Option B —
          - code [ref=e101]: "`huggingface-cli`"
          - text: .
        - text: "More explicit, easier to script, and gives you a known on-disk path:"
      - code [ref=e104]: pip install --upgrade "huggingface_hub[cli]" huggingface-cli download unsloth/Qwen3.6-35B-A3B-GGUF \ Qwen3.6-35B-A3B-UD-Q4_K_M.gguf \ --local-dir /srv/models/qwen3.6-35b-a3b
      - paragraph [ref=e105]:
        - text: You can swap in any quantisation tag from the repo. The Unsloth "Unsloth Dynamic 2.0" (
        - code [ref=e106]: "`UD-*`"
        - text: ) builds use a calibrated importance matrix to bump load-bearing tensors to higher precision than vanilla
        - code [ref=e107]: "`Q4_K_M`"
        - text: ", which materially helps MoE models at 3-bit and 4-bit."
      - paragraph [ref=e108]:
        - strong [ref=e109]:
          - text: Option C —
          - code [ref=e110]: "`wget`"
          - text: /
          - code [ref=e111]: "`curl`"
          - text: the file directly
        - text: from the Hugging Face LFS URL. Fine for one-off runs; awkward to keep in sync with the repo's revisions.
      - paragraph [ref=e112]: "Pick a quantisation that fits your hardware:"
      - table [ref=e113]:
        - rowgroup [ref=e114]:
          - row "Quantisation Approx. size Fits Notes" [ref=e115]:
            - columnheader "Quantisation" [ref=e116]
            - columnheader "Approx. size" [ref=e117]
            - columnheader "Fits" [ref=e118]
            - columnheader "Notes" [ref=e119]
        - rowgroup [ref=e120]:
          - 'row "`UD-IQ2_M` 11.5 GB 12 GB VRAM card Acceptable quality for a 35B MoE at 2-bit" [ref=e121]':
            - 'cell "`UD-IQ2_M`" [ref=e122]':
              - code [ref=e123]: "`UD-IQ2_M`"
            - cell "11.5 GB" [ref=e124]
            - cell "12 GB VRAM card" [ref=e125]
            - cell "Acceptable quality for a 35B MoE at 2-bit" [ref=e126]
          - 'row "`UD-Q3_K_M` 16.6 GB 16 GB VRAM card Good 3-bit balance" [ref=e127]':
            - 'cell "`UD-Q3_K_M`" [ref=e128]':
              - code [ref=e129]: "`UD-Q3_K_M`"
            - cell "16.6 GB" [ref=e130]
            - cell "16 GB VRAM card" [ref=e131]
            - cell "Good 3-bit balance" [ref=e132]
          - 'row "`UD-Q4_K_M` 22.1 GB 24 GB VRAM card The default recommendation" [ref=e133]':
            - 'cell "`UD-Q4_K_M`" [ref=e134]':
              - code [ref=e135]: "`UD-Q4_K_M`"
            - cell "22.1 GB" [ref=e136]
            - cell "24 GB VRAM card" [ref=e137]
            - cell "The default recommendation" [ref=e138]
          - 'row "`Q8_0` 36.9 GB dual GPU or partial CPU offload Near-lossless quality" [ref=e139]':
            - 'cell "`Q8_0`" [ref=e140]':
              - code [ref=e141]: "`Q8_0`"
            - cell "36.9 GB" [ref=e142]
            - cell "dual GPU or partial CPU offload" [ref=e143]
            - cell "Near-lossless quality" [ref=e144]
          - 'row "`BF16` 69.4 GB system RAM or CPU offload Reference weights" [ref=e145]':
            - 'cell "`BF16`" [ref=e146]':
              - code [ref=e147]: "`BF16`"
            - cell "69.4 GB" [ref=e148]
            - cell "system RAM or CPU offload" [ref=e149]
            - cell "Reference weights" [ref=e150]
      - 'heading "Step 3: the runtime flags that matter" [level=2] [ref=e151]'
      - paragraph [ref=e152]:
        - code [ref=e153]: "`llama-server`"
        - text: has dozens of flags. For a model like this, six of them are load-bearing and the rest are noise.
      - code [ref=e156]: llama-server \ -m /srv/models/qwen3.6-35b-a3b/Qwen3.6-35B-A3B-UD-Q4_K_M.gguf \ --host 127.0.0.1 \ --port 8080 \ --ctx-size 32768 \ --n-gpu-layers 999 \ --threads 8 \ --threads-batch 16 \ --batch-size 2048 \ --ubatch-size 512 \ --parallel 2 \ --jinja \ --api-key "$LLAMA_API_KEY"
      - paragraph [ref=e157]: "The flags, in the order they actually affect what happens:"
      - list [ref=e158]:
        - listitem [ref=e159]:
          - strong [ref=e160]:
            - code [ref=e161]: "`-m, --model`"
          - text: — path to the GGUF file. The single non-optional flag.
        - listitem [ref=e162]:
          - strong [ref=e163]:
            - code [ref=e164]: "`--host`"
            - text: /
            - code [ref=e165]: "`--port`"
          - text: — bind address. Default is
          - code [ref=e166]: "`127.0.0.1:8080`"
          - text: ", which is what you want unless you are also putting a reverse proxy in front. Do not bind to"
          - code [ref=e167]: "`0.0.0.0`"
          - text: without an auth gate.
        - listitem [ref=e168]:
          - strong [ref=e169]:
            - code [ref=e170]: "`-c, --ctx-size`"
          - text: — context window in tokens, allocated up front in VRAM as a KV cache.
          - code [ref=e171]: "`0`"
          - text: lets the model pick its native size (262K for this model), which will not fit in any sane GPU; pick a realistic working number. 32K is a good starting point. Doubling the context roughly doubles KV-cache memory.
        - listitem [ref=e172]:
          - strong [ref=e173]:
            - code [ref=e174]: "`-ngl, --n-gpu-layers`"
          - text: — number of transformer layers to offload to GPU. The conventional value is
          - code [ref=e175]: "`999`"
          - text: (or
          - code [ref=e176]: "`-1`"
          - text: ) which means "all layers", and is correct when you want everything on the GPU. Combine with the MoE offload flags below if you need to claw back VRAM.
        - listitem [ref=e177]:
          - strong [ref=e178]:
            - code [ref=e179]: "`-t, --threads`"
            - text: /
            - code [ref=e180]: "`-tb, --threads-batch`"
          - text: — CPU threads for generation and for batch processing. Set
          - code [ref=e181]: "`threads`"
          - text: to your physical core count and
          - code [ref=e182]: "`threads-batch`"
          - text: higher (e.g. logical core count) since batch-mode is more parallel-friendly. With full GPU offload this has marginal effect; with CPU experts it is everything.
        - listitem [ref=e183]:
          - strong [ref=e184]:
            - code [ref=e185]: "`-b, --batch-size`"
            - text: /
            - code [ref=e186]: "`-ub, --ubatch-size`"
          - text: — logical and physical batch sizes for prompt processing. Larger batches improve prefill throughput at the cost of memory; defaults of 2048/512 are fine for most setups.
        - listitem [ref=e187]:
          - strong [ref=e188]:
            - code [ref=e189]: "`-np, --parallel`"
          - text: — number of concurrent request slots.
          - code [ref=e190]: "`--ctx-size`"
          - text: is divided across slots, so
          - code [ref=e191]: "`--ctx-size 32768 --parallel 2`"
          - text: gives each request a 16K window. Default is
          - code [ref=e192]: "`-1`"
          - text: (auto).
        - listitem [ref=e193]:
          - strong [ref=e194]:
            - code [ref=e195]: "`--jinja`"
          - text: — use the model's embedded Jinja chat template, which is what gives you correct system/user/assistant turn formatting and tool-calling support. Leave it on for chat models; turn it off only if you have a strict reason.
        - listitem [ref=e196]:
          - strong [ref=e197]:
            - code [ref=e198]: "`--api-key`"
          - text: — require this token on every request. Without it your endpoint is wide open to anyone who can reach the port. With it, OpenAI clients pointed at your URL with this string as
          - code [ref=e199]: "`OPENAI_API_KEY`"
          - text: will just work.
      - 'heading "Step 4: the MoE-specific flags" [level=2] [ref=e200]'
      - paragraph [ref=e201]:
        - text: This is the part of the lesson that pays the rent. A naive
        - code [ref=e202]: "`-ngl 999`"
        - text: says "put everything on the GPU", which for a 22 GB quantisation on a 24 GB card leaves no room for the KV cache. The trick for MoE models is that the routed-expert weights are touched only when their expert is selected for a given token — they are the largest tensors in the model and the least-frequently used. If you push them to CPU and keep attention plus the shared expert on GPU, you get most of the speed of a fully-resident model for a fraction of the VRAM.
      - paragraph [ref=e203]: Two flags do this.
      - paragraph [ref=e204]:
        - strong [ref=e205]:
          - code [ref=e206]: "`-cmoe, --cpu-moe`"
        - text: keeps
        - emphasis [ref=e207]: all
        - text: MoE weights on the CPU. Simplest possible knob. Use it when you have minimal VRAM and a fast CPU.
      - paragraph [ref=e208]:
        - strong [ref=e209]:
          - code [ref=e210]: "`-ncmoe, --n-cpu-moe N`"
        - text: keeps the MoE weights of the
        - emphasis [ref=e211]: first N layers
        - text: on CPU and lets the remaining layers' experts live on the GPU. This is the dial you turn to fill exactly the VRAM you have, no more and no less. There is no formula — you start at a low value, watch
        - code [ref=e212]: "`nvidia-smi`"
        - text: ", and creep upward until you are comfortably under the VRAM ceiling."
      - paragraph [ref=e213]:
        - text: A 12 GB card with
        - code [ref=e214]: "`UD-Q4_K_M`"
        - text: "looks like this:"
      - code [ref=e217]: llama-server \ -m /srv/models/qwen3.6-35b-a3b/Qwen3.6-35B-A3B-UD-Q4_K_M.gguf \ --ctx-size 16384 \ --n-gpu-layers 999 \ --n-cpu-moe 32 \ --threads 12
      - paragraph [ref=e218]:
        - text: For finer-grained control,
        - code [ref=e219]: "`-ot, --override-tensor`"
        - text: "accepts a regex matching tensor names. The canonical \"push every routed-expert FFN to CPU\" recipe is:"
      - code [ref=e222]: llama-server \ -m /srv/models/qwen3.6-35b-a3b/Qwen3.6-35B-A3B-UD-Q4_K_M.gguf \ --ctx-size 32768 \ --n-gpu-layers 999 \ --override-tensor "exps=CPU"
      - paragraph [ref=e223]:
        - text: That single
        - code [ref=e224]: "`exps=CPU`"
        - text: regex catches all the expert FFN weights — the bulky, rarely-touched part — and leaves everything else, including attention and the shared expert, on the GPU. On a 24 GB card you can usually run a full 64K context this way.
      - paragraph [ref=e225]:
        - text: "A note on sampling defaults. Qwen3 publishes recommended sampler settings, and they matter more than people expect. For the thinking-mode general case:"
        - code [ref=e226]: "`--temp 1.0 --top-p 0.95 --top-k 20 --presence-penalty 1.5`"
        - text: ". For instruct-style chat:"
        - code [ref=e227]: "`--temp 0.7 --top-p 0.8 --top-k 20`"
        - text: . The server will accept these as CLI flags or as per-request overrides in the chat-completions body.
      - 'heading "Step 5: verify the endpoint by hand" [level=2] [ref=e228]'
      - paragraph [ref=e229]:
        - text: With the server running, the obvious smoke test is a
        - code [ref=e230]: "`GET /v1/models`"
        - text: ":"
      - code [ref=e233]: "curl -s http://127.0.0.1:8080/v1/models \\ -H \"Authorization: Bearer $LLAMA_API_KEY\" | jq"
      - paragraph [ref=e234]:
        - text: You should see a single model object whose
        - code [ref=e235]: "`id`"
        - text: matches the GGUF filename (or whatever you passed with
        - code [ref=e236]: "`--alias`"
        - text: ). If you get an empty list, the server is still loading; if you get a 401, your
        - code [ref=e237]: "`--api-key`"
        - text: flag and
        - code [ref=e238]: "`Authorization`"
        - text: header disagree.
      - paragraph [ref=e239]: "Then a real chat completion:"
      - code [ref=e242]: "curl -s http://127.0.0.1:8080/v1/chat/completions \\ -H \"Authorization: Bearer $LLAMA_API_KEY\" \\ -H \"Content-Type: application/json\" \\ -d '{ \"model\": \"qwen3.6-35b-a3b\", \"messages\": [ {\"role\": \"system\", \"content\": \"You are a concise assistant.\"}, {\"role\": \"user\", \"content\": \"In one sentence, what is a mixture-of-experts model?\"} ], \"temperature\": 0.7 }' | jq"
      - paragraph [ref=e243]:
        - text: If that returns a sensible answer, your endpoint is live and OpenAI-shaped. Pointing the Python
        - code [ref=e244]: "`openai`"
        - text: SDK at
        - code [ref=e245]: "`http://127.0.0.1:8080/v1`"
        - text: with any non-empty API key works without further changes.
      - 'heading "Step 6: wrap it in a systemd service" [level=2] [ref=e246]'
      - paragraph [ref=e247]:
        - text: Running
        - code [ref=e248]: "`llama-server`"
        - text: in a terminal is fine to confirm the model works. For day-to-day use you want it managed by
        - code [ref=e249]: "`systemd`"
        - text: ": starts on boot, restarts on crash, logs to the journal, runs as a non-privileged user."
      - heading "Create a dedicated system user" [level=3] [ref=e250]
      - code [ref=e253]: sudo useradd --system --create-home --home /var/lib/llama \ --shell /usr/sbin/nologin llama sudo mkdir -p /srv/models /var/log/llama sudo chown -R llama:llama /var/lib/llama /var/log/llama sudo chown -R llama:llama /srv/models
      - paragraph [ref=e254]:
        - text: If you have an NVIDIA GPU, the
        - code [ref=e255]: "`llama`"
        - text: user needs to be able to talk to the device nodes under
        - code [ref=e256]: "`/dev/nvidia*`"
        - text: . On most installs the default permissions on those nodes already allow this; if not, add the user to the
        - code [ref=e257]: "`video`"
        - text: group.
      - heading "Drop an environment file" [level=3] [ref=e258]
      - paragraph [ref=e259]:
        - text: Putting parameters in a separate
        - code [ref=e260]: "`EnvironmentFile`"
        - text: keeps the unit clean and makes tuning a one-line edit instead of a unit-file rewrite. Save this as
        - code [ref=e261]: "`/etc/llama-server.env`"
        - text: ":"
      - code [ref=e264]: LLAMA_MODEL=/srv/models/qwen3.6-35b-a3b/Qwen3.6-35B-A3B-UD-Q4_K_M.gguf LLAMA_HOST=127.0.0.1 LLAMA_PORT=8080 LLAMA_CTX=32768 LLAMA_NGL=999 LLAMA_NCMOE=0 LLAMA_THREADS=8 LLAMA_API_KEY=replace-me-with-a-long-random-string
      - paragraph [ref=e265]:
        - text: "Lock it down:"
        - code [ref=e266]: "`sudo chmod 600 /etc/llama-server.env && sudo chown root:llama /etc/llama-server.env`"
        - text: .
      - heading "Write the unit file" [level=3] [ref=e267]
      - paragraph [ref=e268]:
        - text: Save this as
        - code [ref=e269]: "`/etc/systemd/system/llama-server.service`"
        - text: ":"
      - code [ref=e272]: "[Unit] Description=llama.cpp HTTP server (Qwen3.6 35B A3B) After=network-online.target Wants=network-online.target [Service] Type=simple User=llama Group=llama EnvironmentFile=/etc/llama-server.env ExecStart=/usr/local/bin/llama-server \\ --model ${LLAMA_MODEL} \\ --host ${LLAMA_HOST} \\ --port ${LLAMA_PORT} \\ --ctx-size ${LLAMA_CTX} \\ --n-gpu-layers ${LLAMA_NGL} \\ --n-cpu-moe ${LLAMA_NCMOE} \\ --threads ${LLAMA_THREADS} \\ --jinja \\ --api-key ${LLAMA_API_KEY} Restart=on-failure RestartSec=10 TimeoutStartSec=600 # Sandboxing NoNewPrivileges=yes ProtectSystem=strict ProtectHome=yes PrivateTmp=yes ReadWritePaths=/var/lib/llama /var/log/llama ProtectKernelTunables=yes ProtectKernelModules=yes ProtectControlGroups=yes RestrictNamespaces=yes RestrictSUIDSGID=yes LockPersonality=yes # Resource limits LimitNOFILE=65536 [Install] WantedBy=multi-user.target"
      - paragraph [ref=e273]: A few notes on what's doing work.
      - paragraph [ref=e274]:
        - code [ref=e275]: "`After=network-online.target`"
        - text: "matters more than you'd think: the"
        - code [ref=e276]: "`-hf`"
        - text: shortcut hits Hugging Face, and on first boot you need the network to actually be up rather than just configured. If you pre-downloaded the model, this is less critical, but it costs nothing.
      - paragraph [ref=e277]:
        - code [ref=e278]: "`TimeoutStartSec=600`"
        - text: exists because loading a 22 GB GGUF into VRAM is not instant. Without an extended timeout, systemd will declare the unit failed before the model finishes loading, especially on a cold page cache. Ten minutes is generous; reduce once you know your actual startup time.
      - paragraph [ref=e279]:
        - text: The sandboxing block is standard systemd hygiene.
        - code [ref=e280]: "`NoNewPrivileges=yes`"
        - text: blocks
        - code [ref=e281]: "`setuid`"
        - text: escalations from inside the service.
        - code [ref=e282]: "`ProtectSystem=strict`"
        - text: makes the filesystem read-only except for explicitly listed
        - code [ref=e283]: "`ReadWritePaths`"
        - text: .
        - code [ref=e284]: "`ProtectHome=yes`"
        - text: hides every home directory other than the service user's.
        - code [ref=e285]: "`PrivateTmp=yes`"
        - text: gives the service its own ephemeral
        - code [ref=e286]: "`/tmp`"
        - text: . These are not security theatre — they meaningfully reduce blast radius if the service is ever compromised, and they cost nothing on a service that just reads model files and serves HTTP.
      - heading "Enable and start" [level=3] [ref=e287]
      - code [ref=e290]: sudo systemctl daemon-reload sudo systemctl enable --now llama-server.service
      - paragraph [ref=e291]:
        - text: The
        - code [ref=e292]: "`--now`"
        - text: "flag is a shorthand for \"enable for boot and also start it right now.\" Check status with:"
      - code [ref=e295]: systemctl status llama-server.service journalctl -fu llama-server.service
      - paragraph [ref=e296]:
        - text: The first
        - code [ref=e297]: "`journalctl`"
        - text: line should be
        - code [ref=e298]: "`llama-server`"
        - text: printing its build info, followed by GGUF metadata, then layer-load progress. When you see
        - code [ref=e299]: "`HTTP server listening, hostname: 127.0.0.1, port: 8080`"
        - text: ", the endpoint is live."
      - paragraph [ref=e300]:
        - text: To change the context size or VRAM layout, edit
        - code [ref=e301]: "`/etc/llama-server.env`"
        - text: and
        - code [ref=e302]: "`sudo systemctl restart llama-server.service`"
        - text: . The unit file itself rarely needs to change once it works.
      - heading "What we deliberately skipped" [level=2] [ref=e303]
      - paragraph [ref=e304]: A few things are intentionally out of scope.
      - list [ref=e305]:
        - listitem [ref=e306]:
          - strong [ref=e307]: Reverse proxy and TLS.
          - text: If you are exposing this beyond localhost, put nginx or Caddy in front of port 8080 with a real certificate. Do not bind
          - code [ref=e308]: "`llama-server`"
          - text: directly to a public address.
        - listitem [ref=e309]:
          - strong [ref=e310]: GPU drivers.
          - text: This lesson assumes a working CUDA stack. Installing the driver and matching toolkit is its own topic.
        - listitem [ref=e311]:
          - strong [ref=e312]: Multi-GPU layouts.
          - text: With two or more GPUs you can split layers across devices with
          - code [ref=e313]: "`-ts, --tensor-split`"
          - text: and assign experts per-device with
          - code [ref=e314]: "`--override-tensor`"
          - text: . The same principles apply, but the regex tuning gets fiddly.
        - listitem [ref=e315]:
          - strong [ref=e316]: Speculative decoding.
          - text: Recent llama.cpp supports a draft model speeding up the main one. Public benchmarks on Qwen3.6 35B A3B with an Ampere-class GPU suggest no net speedup on this specific MoE, so it is not worth the complexity here.
        - listitem [ref=e317]:
          - strong [ref=e318]: llama-swap and model rotation.
          - text: If you want to serve multiple models from the same port and swap them on demand,
          - code [ref=e319]: "`llama-swap`"
          - text: sits in front of multiple
          - code [ref=e320]: "`llama-server`"
          - text: instances and routes requests. Once you have one model running stably as a service, swapping it out is a small extension of the same systemd pattern.
      - paragraph [ref=e321]: "What you have at this point is a reproducible, version-controlled local inference endpoint: identical API surface to OpenAI, predictable startup behaviour, sensible sandboxing, and a single environment file to tune. From here it is just a question of what you point at it."
