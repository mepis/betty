                    - heading "Overview" [level=2] [ref=e249]
                    - paragraph [ref=e250]: "This PR adds support for MTP (Multi Token Prediction) heads. I tested this on Qwen3.6 27B and Qwen3.6 35BA3B but in principle it should work for any MTP model. I've posted the detailed results below, but typically I see a steady-state acceptance of around 75% with 3 draft tokens, which is more than >2x speed-up over baseline. The design decisions I took to get to this stage are as follows:"
                    - list [ref=e251]:
                      - listitem [ref=e252]: The MTP model is a separate model which loads from the same GGUF, the idea is that MTP should automatically start and we shouldn't need to distribute the MTP gguf separately but also it has it's own context/kv-cache etc.
                      - listitem [ref=e253]:
                        - text: I saw a problem in
                        - generic [ref=e254]:
                          - img [ref=e255]
                          - 'link "[Speculative decoding] feat: add EAGLE3 speculative decoding support #18039" [ref=e257] [cursor=pointer]':
                            - /url: https://github.com/ggml-org/llama.cpp/pull/18039
                        - text: where the hidden features weren't propagated correctly across multiple ubatches, so this PR adds a separate "hook" for the MTP to consume after each
                        - code [ref=e258]: ubatch
                      - listitem [ref=e259]:
                        - text: The MTP speculative class is fairly trivial (although it does depend on
                        - generic [ref=e260]:
                          - img [ref=e261]
                          - 'link "llama: allow partial seq_rm for GDN models for speculative decoding #22400" [ref=e263] [cursor=pointer]':
                            - /url: https://github.com/ggml-org/llama.cpp/pull/22400
                        - text: ", but could work without it)"
                    - generic [ref=e264]:
                      - paragraph [ref=e265]:
                        - img [ref=e266]
                        - text: Tip
                      - paragraph [ref=e268]: MTP is compatible with Vision input and Tensor/Pipeline Parallelism
                    - generic [ref=e269]:
                      - paragraph [ref=e270]:
                        - img [ref=e271]
                        - text: Note
                      - paragraph [ref=e273]: Prompt processing (PP) speed typically takes a negative hit when MTP is enabled mainly due to Device-To-Host (D2H) embedding transfers. It's something to be optimized in the future.
                    - generic [ref=e274]:
                      - paragraph [ref=e275]:
                        - img [ref=e276]
                        - text: Note
                      - paragraph [ref=e278]: Parallel decoding with MTP is supported, but not fully optimized yet.
                    - heading "Performance" [level=2] [ref=e279]
