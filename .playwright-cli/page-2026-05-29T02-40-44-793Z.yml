                                - code [ref=e1874]: gated_delta_net.comp
                                - text: "): patched"
                                - code [ref=e1875]: ggml-vulkan.cpp
                                - text: "locally to env-override and swept {1,2,4,8,16}. Clean U-curve with the upstream default of"
                                - code [ref=e1876]: "8"
                                - text: at the peak. The auto-chosen value for
                                - code [ref=e1877]: S_V=128 + subgroup_clustered
                                - text: is correct on gfx1150.
