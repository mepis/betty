                            - list [ref=e1854]:
                              - listitem [ref=e1855]:
                                - strong [ref=e1856]:
                                  - text: Sweet spot is
                                  - code [ref=e1857]: n=2
                                  - text: on this hardware, not
                                  - code [ref=e1858]: n=3-6
                                  - text: .
                                - text: Per-step Vulkan verify overhead grows faster than accepted-token throughput beyond n=2.
                              - listitem [ref=e1859]:
                                - strong [ref=e1860]:
                                  - text: Consistent with what
                                  - link "@sheevy" [ref=e1861] [cursor=pointer]:
                                    - /url: https://github.com/sheevy
                                  - text: reported earlier on Strix Halo for this same MoE model
                                - text: (51→60 tg/s ≈ 1.18×). The bigger Strix Halo speedups in this thread are on
                                - strong [ref=e1862]: dense Qwen3.6-27B
                                - text: (~2.5×) or higher quants — MoE A3B has less MTP headroom because only ~3 GB of expert weights are read per token, so even baseline is already near memory-bw ceiling on these LPDDR5x APUs. Would predict 27B-dense to give ~2× on gfx1150 as well, by the same ratio.
                              - listitem [ref=e1863]:
                                - strong [ref=e1864]: wave32 vs wave64
                                - text: ":"
                                - code [ref=e1865]: RADV_DEBUG=nosubgroupsizectrl
                                - text: to force wave64 = identical perf (25.82 vs 25.77 tok/s). Both subgroup modes are equally well-tuned on RDNA 3.5.
                              - listitem [ref=e1866]:
                                - strong [ref=e1867]: Default config is near-optimal on gfx1150.
                                - text: Swept KV cache quant (f16/q8_0/q4_0 combos), ctx (4k/8k/16k), ubatch (256-2048), threads (8-24), and all RADV_PERFTEST/DEBUG flags. All within ±1% of
                                - code [ref=e1868]: mtp-d2
                                - text: default. q4_0 KV is the one degradation worth flagging (-4% tps
                                - strong [ref=e1869]: and
                                - text: "-4pp accept rate). Default"
                                - code [ref=e1870]: "-ctk q8_0 -ctv q8_0"
                                - text: is correct.
                              - listitem [ref=e1871]:
                                - strong [ref=e1872]:
                                  - text: GDN shader
