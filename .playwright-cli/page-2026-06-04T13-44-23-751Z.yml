      - main [ref=e152]:
        - generic [ref=e154]:
          - heading "Permissions" [level=1] [ref=e155]
          - paragraph [ref=e156]: Control which actions require approval to run.
        - generic [ref=e158]:
          - generic [ref=e159]:
            - paragraph [ref=e160]:
              - text: OpenCode uses the
              - code [ref=e161]: "`permission`"
              - text: config to decide whether a given action should run automatically, prompt you, or be blocked.
            - paragraph [ref=e162]:
              - text: As of
              - code [ref=e163]: "`v1.1.1`"
              - text: ", the legacy"
              - code [ref=e164]: "`tools`"
              - text: boolean config is deprecated and has been merged into
              - code [ref=e165]: "`permission`"
              - text: . The old
              - code [ref=e166]: "`tools`"
              - text: config is still supported for backwards compatibility.
            - separator [ref=e167]
            - heading "Actions" [level=2] [ref=e168]:
              - link "Actions" [ref=e169]:
                - /url: "#actions"
            - paragraph [ref=e170]: "Each permission rule resolves to one of:"
            - list [ref=e171]:
              - listitem [ref=e172]:
                - code [ref=e173]: "`\"allow\"`"
                - text: — run without approval
              - listitem [ref=e174]:
                - code [ref=e175]: "`\"ask\"`"
                - text: — prompt for approval
              - listitem [ref=e176]:
                - code [ref=e177]: "`\"deny\"`"
                - text: — block the action
            - separator [ref=e178]
            - heading "Configuration" [level=2] [ref=e179]:
              - link "Configuration" [ref=e180]:
                - /url: "#configuration"
            - paragraph [ref=e181]:
              - text: You can set permissions globally (with
              - code [ref=e182]: "`*`"
              - text: ), and override specific tools.
            - figure "opencode.json" [ref=e184]:
              - generic [ref=e186]: opencode.json
              - code [ref=e188]:
                - generic [ref=e190]: "{"
                - generic [ref=e192]: "\"$schema\": \"https://opencode.ai/config.json\","
                - generic [ref=e194]: "\"permission\": {"
                - generic [ref=e196]: "\"*\": \"ask\","
                - generic [ref=e198]: "\"bash\": \"allow\","
                - generic [ref=e200]: "\"edit\": \"deny\""
                - generic [ref=e202]: "}"
                - generic [ref=e205]: "}"
              - button "Copy to clipboard" [ref=e207] [cursor=pointer]
            - paragraph [ref=e209]: "You can also set all permissions at once:"
            - figure "opencode.json" [ref=e211]:
              - generic [ref=e213]: opencode.json
              - code [ref=e215]:
                - generic [ref=e217]: "{"
                - generic [ref=e219]: "\"$schema\": \"https://opencode.ai/config.json\","
                - generic [ref=e221]: "\"permission\": \"allow\""
                - generic [ref=e223]: "}"
              - button "Copy to clipboard" [ref=e225] [cursor=pointer]
            - separator [ref=e227]
            - heading "Granular Rules (Object Syntax)" [level=2] [ref=e228]:
              - link "Granular Rules (Object Syntax)" [ref=e229]:
                - /url: "#granular-rules-object-syntax"
            - paragraph [ref=e230]: For most permissions, you can use an object to apply different actions based on the tool input.
            - figure "opencode.json" [ref=e232]:
              - generic [ref=e234]: opencode.json
              - code [ref=e236]:
                - generic [ref=e238]: "{"
                - generic [ref=e240]: "\"$schema\": \"https://opencode.ai/config.json\","
                - generic [ref=e242]: "\"permission\": {"
                - generic [ref=e244]: "\"bash\": {"
                - generic [ref=e246]: "\"*\": \"ask\","
                - generic [ref=e248]: "\"git *\": \"allow\","
                - generic [ref=e250]: "\"npm *\": \"allow\","
                - generic [ref=e252]: "\"rm *\": \"deny\","
                - generic [ref=e254]: "\"grep *\": \"allow\""
                - generic [ref=e256]: "},"
                - generic [ref=e259]: "\"edit\": {"
                - generic [ref=e261]: "\"*\": \"deny\","
                - generic [ref=e263]: "\"packages/web/src/content/docs/*.mdx\": \"allow\""
                - generic [ref=e265]: "}"
                - generic [ref=e268]: "}"
                - generic [ref=e271]: "}"
              - button "Copy to clipboard" [ref=e273] [cursor=pointer]
            - paragraph [ref=e275]:
              - text: Rules are evaluated by pattern match, with the
              - strong [ref=e276]: last matching rule winning
              - text: . A common pattern is to put the catch-all
              - code [ref=e277]: "`\"*\"`"
              - text: rule first, and more specific rules after it.
            - heading "Wildcards" [level=3] [ref=e278]:
              - link "Wildcards" [ref=e279]:
                - /url: "#wildcards"
            - paragraph [ref=e280]: "Permission patterns use simple wildcard matching:"
            - list [ref=e281]:
              - listitem [ref=e282]:
                - code [ref=e283]: "`*`"
                - text: matches zero or more of any character
              - listitem [ref=e284]:
                - code [ref=e285]: "`?`"
                - text: matches exactly one character
              - listitem [ref=e286]: All other characters match literally
            - heading "Home Directory Expansion" [level=3] [ref=e287]:
              - link "Home Directory Expansion" [ref=e288]:
                - /url: "#home-directory-expansion"
            - paragraph [ref=e289]:
              - text: You can use
              - code [ref=e290]: "`~`"
              - text: or
              - code [ref=e291]: "`$HOME`"
              - text: at the start of a pattern to reference your home directory. This is particularly useful for
              - 'link "`external_directory`" [ref=e292] [cursor=pointer]':
                - /url: "#external-directories"
                - code [ref=e293]: "`external_directory`"
              - text: rules.
            - list [ref=e294]:
              - listitem [ref=e295]:
                - code [ref=e296]: "`~/projects/*`"
                - text: "->"
                - code [ref=e297]: "`/Users/username/projects/*`"
              - listitem [ref=e298]:
                - code [ref=e299]: "`$HOME/projects/*`"
                - text: "->"
                - code [ref=e300]: "`/Users/username/projects/*`"
              - listitem [ref=e301]:
                - code [ref=e302]: "`~`"
                - text: "->"
                - code [ref=e303]: "`/Users/username`"
            - heading "External Directories" [level=3] [ref=e304]:
              - link "External Directories" [ref=e305]:
                - /url: "#external-directories"
            - paragraph [ref=e306]:
              - text: Use
              - code [ref=e307]: "`external_directory`"
              - text: to allow tool calls that touch paths outside the working directory where OpenCode was started. This applies to any tool that takes a path as input (for example
              - code [ref=e308]: "`read`"
              - text: ","
              - code [ref=e309]: "`edit`"
              - text: ","
              - code [ref=e310]: "`glob`"
              - text: ","
              - code [ref=e311]: "`grep`"
              - text: ", and many"
              - code [ref=e312]: "`bash`"
              - text: commands).
            - paragraph [ref=e313]:
              - text: Home expansion (like
              - code [ref=e314]: "`~/...`"
              - text: ) only affects how a pattern is written. It does not make an external path part of the current workspace, so paths outside the working directory must still be allowed via
              - code [ref=e315]: "`external_directory`"
              - text: .
            - paragraph [ref=e316]:
              - text: For example, this allows access to everything under
              - code [ref=e317]: "`~/projects/personal/`"
              - text: ":"
            - figure "opencode.json" [ref=e319]:
              - generic [ref=e321]: opencode.json
              - code [ref=e323]:
                - generic [ref=e325]: "{"
                - generic [ref=e327]: "\"$schema\": \"https://opencode.ai/config.json\","
                - generic [ref=e329]: "\"permission\": {"
                - generic [ref=e331]: "\"external_directory\": {"
                - generic [ref=e333]: "\"~/projects/personal/**\": \"allow\""
                - generic [ref=e335]: "}"
                - generic [ref=e338]: "}"
                - generic [ref=e341]: "}"
              - button "Copy to clipboard" [ref=e343] [cursor=pointer]
            - paragraph [ref=e345]:
              - text: Any directory allowed here inherits the same defaults as the current workspace. Since
              - 'link "`read` defaults to `allow`" [ref=e346] [cursor=pointer]':
                - /url: "#defaults"
                - code [ref=e347]: "`read`"
                - text: defaults to
                - code [ref=e348]: "`allow`"
              - text: ", reads are also allowed for entries under"
              - code [ref=e349]: "`external_directory`"
              - text: "unless overridden. Add explicit rules when a tool should be restricted in these paths, such as blocking edits while keeping reads:"
            - figure "opencode.json" [ref=e351]:
              - generic [ref=e353]: opencode.json
              - code [ref=e355]:
                - generic [ref=e357]: "{"
                - generic [ref=e359]: "\"$schema\": \"https://opencode.ai/config.json\","
                - generic [ref=e361]: "\"permission\": {"
                - generic [ref=e363]: "\"external_directory\": {"
                - generic [ref=e365]: "\"~/projects/personal/**\": \"allow\""
                - generic [ref=e367]: "},"
                - generic [ref=e370]: "\"edit\": {"
                - generic [ref=e372]: "\"~/projects/personal/**\": \"deny\""
                - generic [ref=e374]: "}"
                - generic [ref=e377]: "}"
                - generic [ref=e380]: "}"
              - button "Copy to clipboard" [ref=e382] [cursor=pointer]
            - paragraph [ref=e384]:
              - text: Keep the list focused on trusted paths, and layer extra allow or deny rules as needed for other tools (for example
              - code [ref=e385]: "`bash`"
              - text: ).
            - separator [ref=e386]
            - heading "Available Permissions" [level=2] [ref=e387]:
              - link "Available Permissions" [ref=e388]:
                - /url: "#available-permissions"
            - paragraph [ref=e389]: "OpenCode permissions are keyed by tool name, plus a couple of safety guards:"
            - list [ref=e390]:
              - listitem [ref=e391]:
                - code [ref=e392]: "`read`"
                - text: — reading a file (matches the file path)
              - listitem [ref=e393]:
                - code [ref=e394]: "`edit`"
                - text: — all file modifications (covers
                - code [ref=e395]: "`edit`"
                - text: ","
                - code [ref=e396]: "`write`"
                - text: ","
                - code [ref=e397]: "`patch`"
                - text: )
              - listitem [ref=e398]:
                - code [ref=e399]: "`glob`"
                - text: — file globbing (matches the glob pattern)
              - listitem [ref=e400]:
                - code [ref=e401]: "`grep`"
                - text: — content search (matches the regex pattern)
              - listitem [ref=e402]:
                - code [ref=e403]: "`bash`"
                - text: — running shell commands (matches parsed commands like
                - code [ref=e404]: "`git status --porcelain`"
                - text: )
              - listitem [ref=e405]:
                - code [ref=e406]: "`task`"
                - text: — launching subagents (matches the subagent type)
              - listitem [ref=e407]:
                - code [ref=e408]: "`skill`"
                - text: — loading a skill (matches the skill name)
              - listitem [ref=e409]:
                - code [ref=e410]: "`lsp`"
                - text: — running LSP queries (currently non-granular)
              - listitem [ref=e411]:
                - code [ref=e412]: "`question`"
                - text: — asking the user questions during execution
              - listitem [ref=e413]:
                - code [ref=e414]: "`webfetch`"
                - text: — fetching a URL (matches the URL)
              - listitem [ref=e415]:
                - code [ref=e416]: "`websearch`"
                - text: — web search (matches the query)
              - listitem [ref=e417]:
                - code [ref=e418]: "`external_directory`"
                - text: — triggered when a tool touches paths outside the project working directory
              - listitem [ref=e419]:
                - code [ref=e420]: "`doom_loop`"
                - text: — triggered when the same tool call repeats 3 times with identical input
            - separator [ref=e421]
            - heading "Defaults" [level=2] [ref=e422]:
              - link "Defaults" [ref=e423]:
                - /url: "#defaults"
            - paragraph [ref=e424]: "If you don’t specify anything, OpenCode starts from permissive defaults:"
            - list [ref=e425]:
              - listitem [ref=e426]:
                - text: Most permissions default to
                - code [ref=e427]: "`\"allow\"`"
                - text: .
              - listitem [ref=e428]:
                - code [ref=e429]: "`doom_loop`"
                - text: and
                - code [ref=e430]: "`external_directory`"
                - text: default to
                - code [ref=e431]: "`\"ask\"`"
                - text: .
              - listitem [ref=e432]:
                - code [ref=e433]: "`read`"
                - text: is
                - code [ref=e434]: "`\"allow\"`"
                - text: ", but"
                - code [ref=e435]: "`.env`"
                - text: "files are denied by default:"
            - figure "opencode.json" [ref=e437]:
              - generic [ref=e439]: opencode.json
              - code [ref=e441]:
                - generic [ref=e443]: "{"
                - generic [ref=e445]: "\"permission\": {"
                - generic [ref=e447]: "\"read\": {"
                - generic [ref=e449]: "\"*\": \"allow\","
                - generic [ref=e451]: "\"*.env\": \"deny\","
                - generic [ref=e453]: "\"*.env.*\": \"deny\","
                - generic [ref=e455]: "\"*.env.example\": \"allow\""
                - generic [ref=e457]: "}"
                - generic [ref=e460]: "}"
                - generic [ref=e463]: "}"
              - button "Copy to clipboard" [ref=e465] [cursor=pointer]
            - separator [ref=e467]
            - heading "What “Ask” Does" [level=2] [ref=e468]:
              - link "What “Ask” Does" [ref=e469]:
                - /url: "#what-ask-does"
            - paragraph [ref=e470]: "When OpenCode prompts for approval, the UI offers three outcomes:"
            - list [ref=e471]:
              - listitem [ref=e472]:
                - code [ref=e473]: "`once`"
                - text: — approve just this request
              - listitem [ref=e474]:
                - code [ref=e475]: "`always`"
                - text: — approve future requests matching the suggested patterns (for the rest of the current OpenCode session)
              - listitem [ref=e476]:
                - code [ref=e477]: "`reject`"
                - text: — deny the request
            - paragraph [ref=e478]:
              - text: The set of patterns that
              - code [ref=e479]: "`always`"
              - text: would approve is provided by the tool (for example, bash approvals typically whitelist a safe command prefix like
              - code [ref=e480]: "`git status*`"
              - text: ).
            - separator [ref=e481]
            - heading "Agents" [level=2] [ref=e482]:
              - link "Agents" [ref=e483]:
                - /url: "#agents"
            - paragraph [ref=e484]:
              - text: You can override permissions per agent. Agent permissions are merged with the global config, and agent rules take precedence.
              - link "Learn more" [ref=e485] [cursor=pointer]:
                - /url: /docs/agents#permissions
              - text: about agent permissions.
