            - text: Back to Articles
          - heading "Performant local mixture-of-experts CPU inference with GPU acceleration in llama.cpp" [level=1] [ref=e173]:
            - link [ref=e174] [cursor=pointer]:
              - /url: "#performant-local-mixture-of-experts-cpu-inference-with-gpu-acceleration-in-llamacpp"
              - img [ref=e176]
            - generic [ref=e178]: Performant local mixture-of-experts CPU inference with GPU acceleration in llama.cpp
          - generic [ref=e180]:
            - link "Community Article" [ref=e181] [cursor=pointer]:
              - /url: /blog/community
              - img [ref=e182]
              - generic [ref=e185]: Community Article
            - generic [ref=e186]: Published January 30, 2026
          - generic [ref=e190]:
            - generic [ref=e191]:
              - link "Doctor Shotgun's avatar" [ref=e194] [cursor=pointer]:
                - /url: /Doctor-Shotgun
                - img "Doctor Shotgun's avatar" [ref=e195]
              - link "Doctor Shotgun Doctor-Shotgun Follow" [ref=e197] [cursor=pointer]:
