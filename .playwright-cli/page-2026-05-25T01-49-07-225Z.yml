            - text: XTTS v2 remains the gold standard for zero-shot voice cloning. With
            - strong [ref=e266]: six seconds of reference audio
            - text: it produces remarkably faithful voices across 17 languages. The architecture combines a GPT-style autoregressive model with DVAE and a HiFi-GAN vocoder. The main caveat is the CPML licence, which restricts commercial use without a separate agreement — for commercial projects, Fish Speech or F5-TTS are the alternatives.
