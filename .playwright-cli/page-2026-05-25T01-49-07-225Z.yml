          - heading "Piper · Rhasspy" [level=3] [ref=e311]: Piper · Rhasspy
          - paragraph [ref=e313]:
            - text: Piper is the go-to TTS for edge devices. Built on VITS / VITS2 and exported to ONNX, it achieves RTF 0.008 — a ten-second clip in eighty milliseconds. It runs entirely on CPU with under 100 MB of RAM. With
            - strong [ref=e314]: 30+ pre-trained language models
            - text: it is the most broadly multilingual option. The trade-off is lower naturalness (MOS 3.5) and no voice cloning; you pick from pre-trained voices. Ideal for home assistants, kiosks and offline applications.
