      - complementary [ref=e121]:
        - generic [ref=e122]:
          - generic [ref=e123]: What MOS is
          - generic [ref=e124]: A subjective score collected from listeners rating short clips for naturalness. It is noisy — differences under 0.1 are usually within evaluator variance — but it remains the field's working language for perceived quality.
        - generic [ref=e125]:
          - generic [ref=e126]: How we report
          - generic [ref=e127]: We reproduce each team's published MOS rather than re-running our own listener study. Where authors report multiple numbers, we quote the one in the model card for the public checkpoint.
