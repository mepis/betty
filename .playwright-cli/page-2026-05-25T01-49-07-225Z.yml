          - heading "Kokoro · Hexgrad" [level=3] [ref=e239]: Kokoro · Hexgrad
          - paragraph [ref=e241]:
            - text: Kokoro is the efficiency champion. Built on StyleTTS 2, it achieves the highest MOS in this comparison (4.2) with
            - strong [ref=e242]: 82M parameters
            - text: — orders of magnitude smaller than competitors. It runs comfortably on CPU and reaches RTF 0.03 on GPU, which means a ten-second clip synthesises in 0.3 seconds. It ships with curated style presets for different voices but does not do arbitrary voice cloning. As of early 2026 it supports 9 languages including English, Japanese, Korean and major European languages.
