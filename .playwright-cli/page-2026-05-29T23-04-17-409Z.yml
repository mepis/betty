            - text: GPU Accelerated Indexing
          - paragraph [ref=e113]:
            - img "gpu-accelerated-indexing" [ref=e114]
          - paragraph [ref=e115]:
            - text: We are making it easier for you to handle even
            - strong [ref=e116]: the most demanding workloads
            - text: .
          - paragraph [ref=e117]:
            - text: Qdrant now supports GPU-accelerated HNSW indexing
            - strong [ref=e118]: on all major GPU vendors, including NVIDIA, AMD and Intel
            - text: . This new feature reduces indexing times, making it a game-changer for projects where speed truly matters.
          - blockquote [ref=e119]:
            - paragraph [ref=e120]: Indexing over GPU now delivers speeds up to 10x faster than CPU-based methods for the equivalent hardware price.
          - paragraph [ref=e121]:
            - text: Our custom implementation of GPU-accelerated HNSW indexing
            - strong [ref=e122]: is built entirely in-house
            - text: . Unlike solutions that depend on third-party libraries, our approach is vendor-agnostic, meaning it works seamlessly with any modern GPU that supports
            - strong [ref=e123]: Vulkan API
            - text: . This ensures broad compatibility and flexibility for a wide range of systems.
          - paragraph [ref=e124]:
            - emphasis [ref=e125]: "Here is a picture of us, running Qdrant with GPU support on a SteamDeck (AMD Van Gogh GPU):"
          - figure "Qdrant on SteamDeck with integrated AMD GPU" [ref=e126]:
            - img "Qdrant on SteamDeck" [ref=e127]
            - paragraph [ref=e129]: Qdrant on SteamDeck with integrated AMD GPU
          - paragraph [ref=e130]: This experiment didn’t require any changes to the codebase, and everything worked right out of the box with our AMD Docker image.
          - blockquote [ref=e131]:
            - paragraph [ref=e132]: As of right now this solution supports only on-premises deployments, but we will introduce support for Qdrant Cloud shortly.
          - heading "Anchor Benchmarks on Common GPUs" [level=3] [ref=e133]:
