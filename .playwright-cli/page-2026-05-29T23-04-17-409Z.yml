          - heading "Anchor Strict Mode for Operational Control" [level=2] [ref=e200]:
            - link "Anchor" [ref=e201] [cursor=pointer]:
              - /url: "#strict-mode-for-operational-control"
              - text: 
            - text: Strict Mode for Operational Control
          - paragraph [ref=e202]:
            - img "strict-mode" [ref=e203]
          - paragraph [ref=e204]:
            - strong [ref=e205]: Strict Mode
            - text: ensures consistent performance in distributed deployments by enforcing operational controls. It limits computationally intensive operations like unindexed filtering, batch sizes, and search parameters (
            - code [ref=e206]: hnsw_ef
            - text: ","
            - code [ref=e207]: oversampling
            - text: ) This prevents inefficient usage that could overload your system.
          - paragraph [ref=e208]:
            - text: Additional safeguards, including limits on
            - strong [ref=e209]: payload sizes
            - text: ","
            - strong [ref=e210]: filter conditions
            - text: ", and"
            - strong [ref=e211]: timeouts
            - text: ", keep high-demand applications fast and reliable. This feature is configured via"
            - code [ref=e212]: strict_mode_config
            - text: ", and it allows collection-level customization while maintaining backward compatibility."
          - blockquote [ref=e213]:
            - paragraph [ref=e214]:
              - text: New collections will default to
              - strong [ref=e215]: Strict Mode
              - text: ", ensuring compliance by design and balancing workloads across tenants."
          - paragraph [ref=e216]:
            - text: This feature also enhances usability by providing
            - strong [ref=e217]: detailed error messages
            - text: when requests exceed defined limits. The system will give you clear guidance on resolution steps.
          - paragraph [ref=e218]:
            - strong [ref=e219]: Strict Mode
            - text: solves the “
            - emphasis [ref=e220]: noisy neighbor
            - text: ” problem and optimizes resource allocation, making multi-tenancy work nicely in serverless mode.
          - heading "Anchor Enable Strict Mode" [level=3] [ref=e221]:
            - link "Anchor" [ref=e222] [cursor=pointer]:
              - /url: "#enable-strict-mode"
              - text: 
            - text: Enable Strict Mode
          - paragraph [ref=e223]:
            - text: To configure
            - strong [ref=e224]: Strict Mode
            - text: ", refer to the"
            - link "schema definitions" [ref=e225] [cursor=pointer]:
              - /url: https://api.qdrant.tech/api-reference/collections/create-collection#request.body.strict_mode_config
              - strong [ref=e226]: schema definitions
            - text: for all available
            - code [ref=e227]: strict_mode_config
            - text: parameters.
          - paragraph [ref=e228]: When a defined limit is crossed, Qdrant responds with a client-side error that includes details about the specific limit exceeded. This can make troubleshooting much simpler.
          - blockquote [ref=e229]:
            - paragraph [ref=e230]:
              - text: The
              - code [ref=e231]: enabled
              - text: field in the configuration acts as a dynamic toggle, allowing you to activate or deactivate Strict Mode as needed.
          - paragraph [ref=e232]:
            - text: In this example we enable
            - strong [ref=e233]: Strict Mode
            - text: when creating a collection to activate the
            - code [ref=e234]: unindexed_filtering_retrieve
            - text: "limit:"
