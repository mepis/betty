          - paragraph [ref=e416]: This feature makes it easier to manage and query collections with heterogeneous data. It will give you more flexibility and control over your vector search workflows.
          - paragraph [ref=e417]:
            - emphasis [ref=e418]:
              - text: To dive deeper into filtering by named vectors, check out the
              - link "Filtering Documentation" [ref=e419] [cursor=pointer]:
                - /url: https://qdrant.tech/documentation/search/filtering/#has-vector
                - strong [ref=e420]: Filtering Documentation
          - heading "Anchor Custom Storage Engine" [level=2] [ref=e421]:
            - link "Anchor" [ref=e422] [cursor=pointer]:
              - /url: "#custom-storage-engine"
              - text: 
            - text: Custom Storage Engine
          - paragraph [ref=e423]:
            - img "custom-storage-engine" [ref=e424]
          - paragraph [ref=e425]:
            - text: When Qdrant started, we used
            - strong [ref=e426]: RocksDB
            - text: as the storage backend for payloads and sparse vectors. RocksDB, known for its versatility and ability to handle random reads and writes, seemed like a solid choice. But as our needs evolved, its “
            - emphasis [ref=e427]: general-purpose
            - text: ” design began to show cracks.
          - blockquote [ref=e428]:
            - paragraph [ref=e429]: RocksDB is built to handle arbitrary keys and values of any size, but this flexibility comes at a cost.
          - paragraph [ref=e430]:
            - text: A key example is compaction, a process that reorganizes data on disk to maintain performance.
            - strong [ref=e431]: Under heavy write loads, compaction can become a bottleneck
            - text: ", causing significant slowdowns. For Qdrant, this meant huge latency spikes at random moments causing timeout errors during large uploads—a frustrating roadblock."
          - paragraph [ref=e432]:
            - text: To solve this, we built a
            - strong [ref=e433]: custom storage backend
            - text: optimized for our specific use case. Unlike RocksDB, our system delivers consistent performance by ensuring reads and writes require a constant number of disk operations, regardless of data size. As a result, you will get faster and reliable performance - free from latency-spikes.
          - heading "Anchor Our New Storage Architecture" [level=3] [ref=e434]:
            - link "Anchor" [ref=e435] [cursor=pointer]:
              - /url: "#our-new-storage-architecture"
              - text: 
            - text: Our New Storage Architecture
          - paragraph [ref=e436]:
            - text: "There are four elements: the"
            - strong [ref=e437]: Data Layer
            - text: ","
            - strong [ref=e438]: Mask Layer
            - text: ","
            - strong [ref=e439]: the Region
            - text: and
            - strong [ref=e440]: Tracker Layer
            - text: .
          - figure "Qdrant’s New Storage Backend" [ref=e441]:
            - img "Qdrant's New Storage Backend" [ref=e442]
            - paragraph [ref=e444]: Qdrant’s New Storage Backend
          - paragraph [ref=e445]:
            - strong [ref=e446]: The Data Layer
            - text: consists of fixed-size blocks that store the actual data. The block size is a configurable parameter that can be adjusted based on the workload. Each record occupies the required number of blocks. If the data size exceeds the block size, it is split into multiple blocks. If the data size is smaller than the block size, it still occupies an entire block.
          - paragraph [ref=e447]:
            - strong [ref=e448]: The Mask Layer
            - text: contains a bitmask that indicates which blocks are occupied and which are free. The size of the mask corresponds to the number of blocks in the Data Layer. For instance, if we have 64 blocks of 128 bytes each, the bitmask will allocate 1 bit for every block in the Data Layer resulting in 8 bytes. This results in an overhead of 1/1024 of the Data Layer size, because each byte in the mask covers 1024 bytes of blocked storage. The bitmask is stored on disk and does not need to be loaded into memory.
          - paragraph [ref=e449]:
            - strong [ref=e450]: The Region
            - text: is an additional structure which tracks gaps in regions of the bitmask. This is to get an even smaller overhead against the data, which can be loaded into memory easily. Each region summarizes 1KB of bits in the bitmask, which represents a millionth scale of the Data Layer size, or 6 KB of RAM per GB of data.
          - paragraph [ref=e451]:
            - strong [ref=e452]: The Tracker Layer
            - text: is in charge of fast lookups, it directly links the IDs of the points to the place where the data is located.
          - heading "Anchor Get Started with Qdrant" [level=2] [ref=e453]:
            - link "Anchor" [ref=e454] [cursor=pointer]:
              - /url: "#get-started-with-qdrant"
              - text: 
            - text: Get Started with Qdrant
          - paragraph [ref=e455]:
            - img "get-started" [ref=e456]
          - paragraph [ref=e457]:
            - text: The easiest way to reach that
            - strong [ref=e458]: Hello World
            - text: moment is to
            - link "try vector search in a live cluster" [ref=e459] [cursor=pointer]:
              - /url: https://qdrant.tech/documentation/cloud-quickstart/
              - strong [ref=e460]: try vector search in a live cluster
            - text: . Our
            - strong [ref=e461]: interactive tutorial
            - text: will show you how to create a cluster, add data and try some filtering clauses.
