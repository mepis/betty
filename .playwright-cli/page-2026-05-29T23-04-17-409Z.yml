          - heading "Anchor HNSW Graph Compression" [level=2] [ref=e288]:
            - link "Anchor" [ref=e289] [cursor=pointer]:
              - /url: "#hnsw-graph-compression"
              - text: 
            - text: HNSW Graph Compression
          - paragraph [ref=e290]:
            - img "hnsw-graph-compression" [ref=e291]
          - paragraph [ref=e292]:
            - text: "We’re always looking for ways to make your search experience faster and more efficient. That’s why we are introducing a new optimization method for our HNSW graph technology:"
            - link "Delta Encoding" [ref=e293] [cursor=pointer]:
              - /url: https://en.wikipedia.org/wiki/Delta_encoding
              - strong [ref=e294]: Delta Encoding
            - text: . This improvement makes your searches lighter on memory without sacrificing speed.
          - paragraph [ref=e295]:
            - strong [ref=e296]: Delta Encoding
            - text: is a clever way to compress data by storing only the differences (or “deltas”) between values. It’s commonly used in search engines (
            - emphasis [ref=e297]: for the classical inverted index
            - text: ) to save space and improve performance. We’ve now
            - link "adapted this technique" [ref=e298] [cursor=pointer]:
              - /url: https://github.com/qdrant/qdrant/pull/5487
              - strong [ref=e299]: adapted this technique
            - text: for the HNSW graph structure that powers Qdrant’s search.
          - paragraph [ref=e300]:
            - text: In contrast with traditional compression algorithms, like gzip or lz4,
            - strong [ref=e301]: Delta Encoding
            - text: requires very little CPU overhead for decompression, which makes it a perfect fit for the HNSW graph links.
          - blockquote [ref=e302]:
            - paragraph [ref=e303]:
              - text: Our experiments didn’t observe any measurable performance degradation. However, the memory footprint of the HNSW graph was
              - strong [ref=e304]: reduced by up to 30%
              - text: .
          - paragraph [ref=e305]:
            - emphasis [ref=e306]:
              - text: For more general info, read about
              - link "Indexing and Data Structures in Qdrant" [ref=e307] [cursor=pointer]:
                - /url: https://qdrant.tech/documentation/manage-data/indexing/
                - strong [ref=e308]: Indexing and Data Structures in Qdrant
          - heading "Anchor Filter by Named Vectors" [level=2] [ref=e309]:
            - link "Anchor" [ref=e310] [cursor=pointer]:
              - /url: "#filter-by-named-vectors"
              - text: 
            - text: Filter by Named Vectors
          - paragraph [ref=e311]:
            - img "filter-named-vectors" [ref=e312]
          - paragraph [ref=e313]: In Qdrant, you can store multiple vectors of different sizes and types in a single data point. This is useful when you have to representing data with multiple embeddings, such as image, text, or video features.
          - blockquote [ref=e314]:
            - paragraph [ref=e315]:
              - text: We previously introduced this feature as
              - link "Named Vectors" [ref=e316] [cursor=pointer]:
                - /url: https://qdrant.tech/documentation/manage-data/vectors/#named-vectors
                - strong [ref=e317]: Named Vectors
              - text: . Now, you can filter points by checking if a specific named vector exists.
          - paragraph [ref=e318]:
            - text: This makes it easy to search for points based on the presence of specific vectors. For example,
            - emphasis [ref=e319]: if your collection includes image and text vectors, you can filter for points that only have the image vector defined
            - text: .
          - heading "Anchor Create a Collection with Named Vectors" [level=3] [ref=e320]:
