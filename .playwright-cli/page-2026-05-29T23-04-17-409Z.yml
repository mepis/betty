            - text: Sample Request
          - paragraph [ref=e367]:
            - text: Some points might include both
            - strong [ref=e368]: image
            - text: and
            - strong [ref=e369]: text
            - text: vectors, while others might include just one. With this new feature, you can easily filter for points that specifically have the
            - strong [ref=e370]: image
            - text: vector defined.
          - generic [ref=e372]:
