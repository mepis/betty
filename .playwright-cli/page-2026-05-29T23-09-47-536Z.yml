                - list [ref=e600]:
                  - listitem [ref=e601]: → Your team has zero DevOps capacity and cannot manage a Linux server
                  - listitem [ref=e602]: → You need 99.5%–99.9% uptime SLA backed by a contract
                  - listitem [ref=e603]: → You need professional support response times (hours, not community forums)
                  - listitem [ref=e604]: → You are in active development and need to iterate cluster size without infrastructure management
                  - listitem [ref=e605]: → You are pre-product and $96/month operational certainty is worth more than $96/month infra savings
                  - listitem [ref=e606]: → You need automatic Qdrant version upgrades (v1.17 → v1.18 without downtime)
              - generic [ref=e607]:
                - generic [ref=e608]: "QDRANT CLOUD IS NOT THE CORRECT CHOICE WHEN:"
                - list [ref=e609]:
                  - listitem [ref=e610]: → Your data cannot leave your infrastructure (GDPR Article 44 hard requirement, HIPAA PHI processing, financial sector data residency)
                  - listitem [ref=e611]: → Self-hosted or Hybrid Cloud is the only architecturally correct answer
                  - listitem [ref=e612]: → Your monthly Qdrant Cloud Standard cost exceeds $96/month
                  - listitem [ref=e613]: → Self-hosted on DigitalOcean gives you MORE RAM for equal or lower cost
                  - listitem [ref=e614]: → Your AI agent system writes more than 50,000 vectors/day
                  - listitem [ref=e615]: → Write frequency is the cost driver. Qdrant Cloud charges for cluster size (not writes), but clusters need to grow with write volume. Self-hosted stays at $96/month fixed regardless of write volume.
                  - listitem [ref=e616]: → Your vector count will exceed 5M in the next 90 days
                  - listitem [ref=e617]: → Plan the infrastructure architecture now. Migrating from cloud to self-hosted under production load is the most expensive engineering time you will spend in Year 1.
                  - listitem [ref=e618]: → You want full control over Qdrant version pinning
                  - listitem [ref=e619]: → Qdrant Cloud auto-upgrades. Self-hosted lets you test v1.18 before upgrading production from v1.17.
