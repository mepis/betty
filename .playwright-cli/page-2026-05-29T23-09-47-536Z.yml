                  - text: "is the wrong question. The right question is:"
                  - strong [ref=e207]: “At what vector count and write frequency does Qdrant Cloud cost more than running Qdrant on infrastructure I own?”
                  - text: That question has a specific, calculable answer — and it determines whether you are on the right side of a $200/month cost difference.
              - generic [ref=e208]:
                - generic [ref=e209]: THE SHIFT
                - paragraph [ref=e210]: From treating vector database pricing as a SaaS subscription to evaluating it as an infrastructure cost decision with a clear crossover point. Qdrant Cloud charges for allocated cluster resources. Self-hosted Qdrant charges for the server. At a specific cluster size, those costs are equal. Above that size, self-hosted is cheaper.
              - generic [ref=e211]:
                - generic [ref=e212]: THE OUTCOME
                - paragraph [ref=e213]: A pricing decision that is made once, with full information, before you build the production system — not after the first month-three billing review when the cluster has grown and migration is expensive.
