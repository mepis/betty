              - heading "What is Qdrant Cloud pricing in 2026?" [level=3] [ref=e766]
              - generic [ref=e767]:
                - paragraph [ref=e768]: Qdrant Cloud pricing in 2026 operates on four tiers. The free tier is permanent 0.5 vCPU, 1GB RAM, 4GB disk, zero cost, no credit card required. The standard tier uses hourly usage-based billing for dedicated cluster resources (RAM, vCPU, disk), estimated at $30–60/month for a 2GB cluster and $120–200/month for an 8GB cluster.
                - paragraph [ref=e769]: The premium tier adds 99.9% SLA, SSO, and private networking with a minimum spend requirement. The hybrid cloud tier runs Qdrant on your own infrastructure while Qdrant manages operations custom pricing via sales. Self-hosting Qdrant OSS is always free you pay only for the server you run it on.
            - generic [ref=e770]:
              - heading "How much RAM does Qdrant need for 1 million vectors?" [level=3] [ref=e771]
              - generic [ref=e772]:
                - paragraph [ref=e773]:
                  - text: One million 1,536-dimension vectors in float32 format requires approximately 6.14GB of RAM for the raw vector storage, plus approximately 20–30% overhead for the HNSW graph structure totaling approximately 8GB of RAM for a production deployment without quantization. With Scalar Quantization (4× compression),
                  - text: the same 1 million vectors requires approximately 2GB.
                - paragraph [ref=e774]: "With Binary Quantization (32× compression), approximately 200MB. The RankSquire rule: always enable Binary Quantization for production deployments above 100K vectors. At 10 million vectors with BQ, the entire collection fits in 1.92GB RAM within the 16GB DigitalOcean Droplet at $96/month with significant headroom."
            - generic [ref=e775]:
              - heading "Is Qdrant free to use?" [level=3] [ref=e776]
              - generic [ref=e777]:
                - paragraph [ref=e778]:
                  - text: Qdrant has two free options. Qdrant Cloud free tier is permanently free with 0.5 vCPU, 1GB RAM, and 4GB disk no time limit and no credit card required. It includes free cloud inference for selected embedding models. Qdrant OSS (open-source, Apache 2.0) is always free at any scale you self-host it on your own infrastructure
                  - text: and pay only for the server.
                - paragraph [ref=e779]: There is zero licensing cost for self-hosted Qdrant regardless of vector count, query volume, or number of collections.
            - generic [ref=e780]:
              - heading "When should I choose self-hosted Qdrant instead of Qdrant Cloud?" [level=3] [ref=e781]
              - generic [ref=e782]:
                - paragraph [ref=e783]:
                  - text: Self-hosted Qdrant is the correct choice in four situations. First, when data sovereignty is required
                  - link "GDPR Article 44" [ref=e784] [cursor=pointer]:
                    - /url: https://gdpr-info.eu/art-44-gdpr/
                  - text: ", HIPAA PHI, or any regulatory requirement that data cannot leave your infrastructure. Qdrant Cloud stores data in Qdrant’s managed infrastructure; self-hosted keeps it on your servers. Second, when your equivalent Qdrant Cloud Standard cluster costs more than $96/month a 16GB Droplet runs 4× the vector capacity of an 8GB cloud cluster"
                  - text: at the same or lower price.
                - paragraph [ref=e785]: Third, when write volume is high AI agent memory systems write on every loop iteration; self-hosted has zero per-infrastructure-write overhead growth. Fourth, when you need to pin to a specific Qdrant version cloud auto upgrades, self-hosted lets you control exactly which version runs in production.
            - generic [ref=e786]:
              - heading "What is the difference between Qdrant Cloud and Qdrant self-hosted?" [level=3] [ref=e787]
              - generic [ref=e788]:
                - paragraph [ref=e789]:
                  - text: Qdrant Cloud is Qdrant’s managed infrastructure service you pay for a dedicated cluster (RAM, vCPU, disk) and Qdrant handles operations, backups, upgrades, and support. Your data is in Qdrant’s cloud environment on DigitalOcean, AWS, or GCP. Qdrant self-hosted is the open-source Qdrant OSS running on your own
                  - text: server (DigitalOcean Droplet, AWS EC2, on-premise).
                - paragraph [ref=e790]: "You manage the Docker container and backups. The data never leaves your infrastructure. Zero licensing cost. You pay only for the server. The functional difference is zero same HNSW engine, same API, same Python client, same v1.17 features. The operational difference is everything: managed ops versus self-managed ops."
            - generic [ref=e791]:
              - heading "How does Qdrant compare to Pinecone on pricing?" [level=3] [ref=e792]
              - generic [ref=e793]:
                - paragraph [ref=e794]: "For write-heavy workloads (AI agent memory systems), Qdrant is categorically cheaper than Pinecone. Pinecone charges $0.0000004 per write unit a 1,536-dimension vector with payload costs 3–4 write units. At 50,000 writes/day over a month: 1.5M writes × 4 units = 6M write units × $0.0000004 = $2.40/month in write costs manageable."
                - paragraph [ref=e795]: "At 1M writes/day: $48/month in write units alone, plus storage. Qdrant Cloud charges zero for writes only for cluster size. Qdrant self-hosted charges zero for everything except the $96/month Droplet. At scale, the write billing difference becomes the primary cost driver and Qdrant eliminates it entirely."
