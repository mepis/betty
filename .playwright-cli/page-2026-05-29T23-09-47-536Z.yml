                - paragraph [ref=e216]: The correct Qdrant deployment model is the one whose monthly cost at your production vector count and write frequency is lower — plus operational overhead. At vector counts above the self-hosting crossover, the infrastructure savings pay for the engineering time to set it up within 30 days.
