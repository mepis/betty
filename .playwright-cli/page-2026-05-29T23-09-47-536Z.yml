                - generic [ref=e189]: → The Qdrant Cloud free tier holds approximately 250,000 uncompressed 1,536-dimension vectors in 1GB RAM. With Binary Quantization enabled (32× compression), the same 1GB holds approximately 7–8 million vectors. This single optimization extends free tier utility by 30×.
                - generic [ref=e190]: → The standard tier’s hourly billing is not per-query. It scales with cluster size — RAM, vCPU, and disk allocated. An AI agent memory system that writes 100,000 vectors/day but maintains a 2GB cluster pays for the cluster size, not the write volume. This is the key difference from Pinecone’s per-write-unit billing.
                - generic [ref=e191]: → The $96/month crossover is real and specific. When a Qdrant Cloud Standard cluster reaches the cost of a DigitalOcean 16GB Droplet ($96/month), self-hosting becomes cost-neutral on infrastructure — and from that point forward, every dollar of scale savings goes to you.
                - generic [ref=e192]: "→ The biggest mistake engineers make with Qdrant Cloud pricing: sizing the cluster for current vector count instead of projected 3-month growth. A team with 500K vectors that will grow to 5M in 90 days needs a 16GB cluster now, not a 4GB cluster that will need emergency resizing mid-production."
                - generic [ref=e193]: → Self-hosted Qdrant OSS is Apache 2.0 licensed — zero licensing cost at any scale. The only cost is your compute infrastructure. At DigitalOcean $96/month (16GB RAM, 8 vCPU), this runs 10M+ vectors with Binary Quantization with 26–35ms p99 retrieval latency.
                - generic [ref=e194]: "→ Qdrant Cloud pricing does not include per-query billing. Pinecone charges $0.00000025 per read unit. At 20M queries/month against a 5GB namespace: $4,000/month in read costs alone. Qdrant Cloud charges zero for queries — only for the cluster."
