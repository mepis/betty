            - text: ": affected by weights, KV cache, context length, runtime backend, multimodal modules, and batch size."
        - paragraph [ref=e155]:
          - text: Qwen3.6 has a very long default context. The official model card states native support for
          - code [ref=e156]: 262,144
          - text: tokens and extension to
          - code [ref=e157]: 1,010,000
          - text: tokens. So the “minimum VRAM” column below only applies to short or medium context. If you really want 128K, 256K, or longer context, reserve much more room for KV cache.
