            - code [ref=e142]: Qwen3.6-27B
            - text: ": a 27B dense model."
          - listitem [ref=e143]:
            - code [ref=e144]: Qwen3.6-35B-A3B
            - text: ": a 35B total / 3B active MoE model."
        - paragraph [ref=e145]:
          - text: There are also online product or API model names such as
          - code [ref=e146]: Qwen3.6-Plus
          - text: and
          - code [ref=e147]: Qwen3.6-Max
          - text: . If a model does not have public full weights and stable quantized files, it is not suitable for a local VRAM table. This article only covers versions that can be deployed around Hugging Face weights and GGUF quantized files.
        - paragraph [ref=e148]:
          - text: As with the Gemma 4 table in
          - code [ref=e149]: /05/10
          - text: ", two concepts need to be separated first:"
        - list [ref=e150]:
