        - paragraph [ref=e479]:
          - text: If you mainly write code, run agents, or use tools,
          - code [ref=e480]: 35B-A3B
          - text: is worth trying first. If you care more about dense-model stability and consistency,
          - code [ref=e481]: 27B
          - text: is more straightforward.
        - heading "Why Long Context Uses So Much VRAM" [level=2] [ref=e482]
        - paragraph [ref=e483]:
          - text: The Qwen3.6 model card recommends keeping longer context for complex tasks and even notes that 128K+ context can help reasoning. But for local deployment, long context means a much larger
          - code [ref=e484]: KV cache
          - text: .
        - paragraph [ref=e485]: "Actual VRAM usage is affected by:"
        - list [ref=e486]:
          - listitem [ref=e487]:
            - code [ref=e488]: KV cache
            - text: ": longer context means higher usage."
          - listitem [ref=e489]: "Whether vision input is enabled: Qwen3.6 includes a vision encoder, and multimodal use adds overhead."
          - listitem [ref=e490]:
            - text: Whether
            - code [ref=e491]: "--language-model-only"
            - text: "is used: in runtimes such as vLLM, skipping vision can free memory for KV cache."
          - listitem [ref=e492]: "Batch size and concurrency: more concurrency requires more VRAM."
          - listitem [ref=e493]:
            - text: "KV cache quantization:"
            - code [ref=e494]: q8_0
            - text: ","
            - code [ref=e495]: q4_0
            - text: ", and similar settings can save VRAM, but may affect details."
          - listitem [ref=e496]: "Runtime differences: llama.cpp, vLLM, SGLang, KTransformers, and LM Studio do not use exactly the same amount of memory."
        - paragraph [ref=e497]: So do not look only at GGUF file size. If the file is already close to the VRAM limit, the model may load but still OOM when generating long outputs or using long context.
        - heading "How to Choose" [level=2] [ref=e498]
        - paragraph [ref=e499]: "If you just want to try Qwen3.6 locally:"
        - list [ref=e500]:
          - listitem [ref=e501]:
            - text: "12GB VRAM: try"
            - code [ref=e502]: 27B UD-IQ2_M
            - text: or
            - code [ref=e503]: 35B-A3B UD-IQ2_M
            - text: ", with short context."
          - listitem [ref=e504]:
            - text: "16GB VRAM: try"
            - code [ref=e505]: 27B Q3_K_M
            - text: or
            - code [ref=e506]: 35B-A3B UD-IQ3_XXS
            - text: .
          - listitem [ref=e507]:
            - text: "24GB VRAM: prefer"
            - code [ref=e508]: 27B Q4_K_M
            - text: ","
            - code [ref=e509]: 35B-A3B UD-IQ4_NL
            - text: ", or"
            - code [ref=e510]: 35B-A3B UD-Q4_K_M
            - text: .
          - listitem [ref=e511]:
            - text: "32GB VRAM: consider"
            - code [ref=e512]: 27B Q5/Q6
            - text: or
            - code [ref=e513]: 35B-A3B Q5/Q6
            - text: .
          - listitem [ref=e514]:
            - text: "48GB and above: try"
            - code [ref=e515]: Q8_0
            - text: ", or reserve more room for long context."
        - paragraph [ref=e516]: Most users do not need BF16. The point of local Qwen3.6 deployment is not to choose the largest file, but to balance VRAM, context length, speed, and output quality.
