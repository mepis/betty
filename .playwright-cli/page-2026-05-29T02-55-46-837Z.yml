        - paragraph [ref=e443]:
          - text: With 24GB VRAM,
          - code [ref=e444]: UD-Q4_K_M
          - text: is a key option, but do not set the context too high. If you want room for 128K+ context,
          - code [ref=e445]: UD-IQ4_XS
          - text: ","
          - code [ref=e446]: UD-IQ4_NL
          - text: ", or 3-bit versions are more realistic."
        - heading "27B vs 35B-A3B" [level=2] [ref=e447]
        - table [ref=e449]:
