                    - /url: https://www.linkedin.com/in/femke-plantinga/
                    - generic [ref=e110]: Femke Plantinga
                  - generic "Team Lead Growth" [ref=e111]
              - generic [ref=e113]:
                - link "Victoria Slocum" [ref=e114] [cursor=pointer]:
                  - /url: https://www.linkedin.com/in/victorialslocum/
                  - img "Victoria Slocum" [ref=e115]
                - generic [ref=e116]:
                  - link "Victoria Slocum" [ref=e118] [cursor=pointer]:
                    - /url: https://www.linkedin.com/in/victorialslocum/
                    - generic [ref=e119]: Victoria Slocum
                  - generic "Machine Learning Engineer" [ref=e120]
          - generic [ref=e121]:
            - paragraph [ref=e122]:
              - img "Chunking Strategies to Improve Your RAG Performance" [ref=e123]
            - paragraph [ref=e124]:
              - text: If you’re building AI applications with Large Language Models (LLMs), grounding generated text responses with your specific data is key to accurate answers.
              - link "Retrieval-Augmented Generation (RAG)" [ref=e125] [cursor=pointer]:
                - /url: /blog/introduction-to-rag
              - text: ", often referred to as LLM RAG, connects a large language model to an outside knowledge source as part of a broader RAG pipeline."
            - paragraph [ref=e126]: In agent-based systems, this retrieval step also acts as a context layer, allowing AI agents to recall relevant information across tasks and interactions.
            - paragraph [ref=e127]:
              - text: This lets it find relevant facts before creating a response. The quality of your retrieval process is one of the biggest factors influencing your application's performance. Many developers focus on picking the right vector database or embedding model. But the most important step is often
              - strong [ref=e128]: how you prepare the data itself.
            - paragraph [ref=e129]:
              - text: This is where
              - strong [ref=e130]: chunking
              - text: comes in.
            - paragraph [ref=e131]: In modern LLM RAG pipelines and agent memory systems, chunking directly determines how effectively an agent can retrieve, reason over, and reuse information.
            - paragraph [ref=e132]: In this post, we’ll review some essential chunking strategies, from fundamentals to advanced techniques, their trade-offs, and tips for choosing the right approach for your RAG application.
            - heading "What is Chunking?Direct link to What is Chunking?" [level=2] [ref=e133]:
              - text: What is Chunking?
              - link "Direct link to What is Chunking?" [ref=e134] [cursor=pointer]:
                - /url: "#what-is-chunking"
                - text: "#"
            - paragraph [ref=e135]:
              - text: In simple terms,
              - strong [ref=e136]: chunking
              - text: is the process of breaking down large documents into smaller, manageable pieces called
              - emphasis [ref=e137]: chunks
              - text: . This is a crucial first step when preparing data for use with Large Language Models (LLMs).
            - paragraph [ref=e138]:
              - text: The main reason is that LLMs have a limited
              - strong [ref=e139]: context window,
              - text: meaning they can only focus on a certain amount of text at once. If there is too much text within the context window, important details are lost, resulting in incomplete or inaccurate answers.
            - paragraph [ref=e140]: Chunking solves this by creating smaller, focused pieces of content that an LLM can use to answer the users query without getting lost in irrelevant information.
            - paragraph [ref=e141]:
              - text: The
              - strong [ref=e142]: size, content, and semantic boundaries
              - text: of each chunk influence retrieval performance, and so deciding which technique to use can have a huge downstream impact on your RAG system’s performance.
            - heading "Why is Chunking so Important for RAG?Direct link to Why is Chunking so Important for RAG?" [level=2] [ref=e143]:
              - text: Why is Chunking so Important for RAG?
              - link "Direct link to Why is Chunking so Important for RAG?" [ref=e144] [cursor=pointer]:
                - /url: "#why-is-chunking-so-important-for-rag"
                - text: "#"
            - paragraph [ref=e145]:
              - text: Getting chunking right is one of the
              - strong [ref=e146]: most important decisions in building your RAG pipeline
              - text: . How you split your documents affects your system’s ability to find relevant information and give accurate answers. When a RAG system performs poorly, the issue is often not the retriever—it’s the
              - strong [ref=e147]: chunks
              - text: . Even a perfect retrieval system fails if it searches over poorly prepared data.
            - paragraph [ref=e148]:
              - text: "This creates a fundamental challenge: your chunks need to be easy for vector search to find, while also"
              - strong [ref=e149]: giving the LLM enough context
              - text: to create useful answers.
            - heading "1. Optimizing for Retrieval AccuracyDirect link to 1. Optimizing for Retrieval Accuracy" [level=3] [ref=e150]:
              - text: 1. Optimizing for Retrieval Accuracy
              - link "Direct link to 1. Optimizing for Retrieval Accuracy" [ref=e151] [cursor=pointer]:
                - /url: "#1-optimizing-for-retrieval-accuracy"
                - text: "#"
            - paragraph [ref=e152]:
              - text: The first step is making sure your system can
              - emphasis [ref=e153]: find
              - text: the right information in your vector database. Vector search does this by comparing user queries with the embeddings of your chunks.
            - list [ref=e154]:
              - listitem [ref=e155]:
                - text: Here's the problem with
                - strong [ref=e156]: chunks that are too large
                - text: ": they often mix multiple ideas together, and subtopics can get lost or muddled. Think of it like trying to describe a book by averaging all its chapters. This creates a noisy, “averaged” embedding that doesn’t clearly represent any single topic, making it hard for the vector retrieval step to find all the relevant context."
              - listitem [ref=e157]:
                - strong [ref=e158]: Chunks that are small and focused
                - text: capture one clear idea. This results in a precise embedding that can encode all the nuanced parts of the content. This makes it much easier for your system to find the right information.
              - listitem [ref=e159]: For AI agents, this retrieval step effectively becomes a form of long-term memory, where well-formed chunks determine what the agent can recall later.
            - heading "2. Preserving Context for GenerationDirect link to 2. Preserving Context for Generation" [level=3] [ref=e160]:
              - text: 2. Preserving Context for Generation
              - link "Direct link to 2. Preserving Context for Generation" [ref=e161] [cursor=pointer]:
                - /url: "#2-preserving-context-for-generation"
                - text: "#"
            - paragraph [ref=e162]: After your system finds the best chunks, they’re passed to the LLM. This is where context quality determines the quality of the outputted response.
            - paragraph [ref=e163]:
              - text: "Here's a simple test:"
              - strong [ref=e164]: if a chunk makes sense to you when read alone, it will make sense to the LLM too.
            - list [ref=e165]:
              - listitem [ref=e166]:
                - strong [ref=e167]: Chunks that are too small
                - text: fail this test. Imagine reading a single sentence from the middle of a research paper—even humans would struggle to understand what's happening without more context.
              - listitem [ref=e168]:
                - strong [ref=e169]: Chunks that are too large
                - text: create a different problem. LLM performance degrades with longer context inputs due to attention dilution and the "lost in the middle" effect, where models have trouble accessing information buried in the middle of long contexts while still handling the beginning and end reasonably well. As context length increases, the model's attention gets spread too thin across all the input, making it less accurate at finding relevant information, causing more errors in reasoning, and increasing the likelihood of hallucinating responses.
            - heading "The Chunking Sweet SpotDirect link to The Chunking Sweet Spot" [level=3] [ref=e170]:
              - text: The Chunking Sweet Spot
              - link "Direct link to The Chunking Sweet Spot" [ref=e171] [cursor=pointer]:
                - /url: "#the-chunking-sweet-spot"
                - text: "#"
            - paragraph [ref=e172]:
              - text: You want to preserve the author's
              - strong [ref=e173]: "\"train of thought\""
              - text: while creating chunks that are small enough for precise retrieval but complete enough to give the LLM full context. This is part of
              - strong [ref=e174]: context engineering
              - text: ": preparing the input to the LLM in a way that it can understand it and generate accurate responses."
            - paragraph [ref=e175]: "When you get this balance right, several things improve:"
            - list [ref=e176]:
              - listitem [ref=e177]:
                - strong [ref=e178]: "Improves Retrieval Quality:"
                - text: By creating focused, semantically complete chunks, you enable the retrieval system to pinpoint the most precise context for a query.
              - listitem [ref=e179]:
                - strong [ref=e180]: "Manages the LLM's Context Window:"
                - text: Effective chunking ensures only relevant data gets passed to the LLM, helping to avoid too long context lengths that can confuse the model
              - listitem [ref=e181]:
                - strong [ref=e182]: "Reduces Hallucinations:"
                - text: By providing the model with small, highly relevant chunks, you ground its response in factual data and minimize the risk that it will invent information.
              - listitem [ref=e183]:
                - strong [ref=e184]: "Enhances Efficiency and Reduces Cost:"
                - text: Processing smaller chunks is faster and more computationally efficient, which leads to quicker response times and lower costs from LLM usage.
            - generic [ref=e185]:
              - generic [ref=e186]:
                - img [ref=e188]
                - text: info
              - paragraph [ref=e191]:
                - text: "If you’re looking for a hands-on Python tutorial, check out this unit in the Weaviate Academy:"
                - link "https://docs.weaviate.io/academy/py/standalone/chunking" [ref=e192] [cursor=pointer]:
                  - /url: https://docs.weaviate.io/academy/py/standalone/chunking
            - heading "Pre-Chunking vs Post-ChunkingDirect link to Pre-Chunking vs Post-Chunking" [level=2] [ref=e193]:
              - text: Pre-Chunking vs Post-Chunking
              - link "Direct link to Pre-Chunking vs Post-Chunking" [ref=e194] [cursor=pointer]:
                - /url: "#pre-chunking-vs-post-chunking"
                - text: "#"
            - paragraph [ref=e195]:
              - text: Now that we covered the fundamental dilemma of chunking, we can explore
              - emphasis [ref=e196]: when
              - text: "to perform the chunking step in an LLM RAG pipeline. This decision leads to two primary strategies: the standard"
              - strong [ref=e197]: pre-chunking
              - text: and a more advanced alternative,
              - strong [ref=e198]: post-chunking
              - text: .
            - paragraph [ref=e199]:
              - strong [ref=e200]: Pre-chunking
              - text: is the most common method. It processes documents asynchronously by breaking them into smaller pieces before embedding and storing them in the vector database. This approach requires upfront decisions about chunk size and boundaries, but enables fast retrieval at query time since all chunks are pre-computed and indexed.
            - paragraph [ref=e201]:
              - 'img "Retrieval Augmented Generation Workflow: Pre-Chunking" [ref=e202]'
            - paragraph [ref=e203]:
              - strong [ref=e204]: Post-chunking
              - text: takes a different approach by embedding entire documents first, then performing chunking at query time
              - emphasis [ref=e205]: only on the documents that are actually retrieved
              - text: . The chunked results can be cached, so the system becomes faster over time as frequently accessed documents build up cached chunks. This method avoids chunking documents that may never be queried while allowing for more dynamic, context-aware chunking strategies based on the specific query. However, it introduces latency on first access and requires additional infrastructure decisions.
            - paragraph [ref=e206]:
              - 'img "Retrieval Augmented Generation Workflow: Post-Chunking" [ref=e207]'
            - generic [ref=e208]:
              - generic [ref=e209]:
                - img [ref=e211]
                - text: info
              - paragraph [ref=e214]:
                - text: We built a post-chunking strategy into Elysia, our open source agentic RAG framework. You can read more about that
                - link "here" [ref=e215] [cursor=pointer]:
                  - /url: /blog/elysia-agentic-rag#chunk-on-demand-smarter-document-processing
                - text: .
            - heading "Chunking StrategiesDirect link to Chunking Strategies" [level=2] [ref=e216]:
              - text: Chunking Strategies
              - link "Direct link to Chunking Strategies" [ref=e217] [cursor=pointer]:
                - /url: "#chunking-strategies"
                - text: "#"
            - paragraph [ref=e218]: The best chunking strategy depends on the type of documents you are working with and the needs of your RAG application. The methods below are designed primarily for text-based documents. For other formats, like PDFs, additional steps are needed to convert them into clean text.
            - generic [ref=e219]:
              - generic [ref=e220]:
                - img [ref=e222]
                - text: info
              - generic [ref=e224]:
                - paragraph [ref=e225]:
                  - strong [ref=e226]: Working with PDFs
                - paragraph [ref=e227]:
                  - text: Before chunking a PDF, you need clean, structured text. PDFs are a visual format, so extracting text can be tricky. Columns, tables, headers, or scanned pages can make text extraction unreliable. For scanned documents,
                  - strong [ref=e228]: Optical Character Recognition (OCR)
                  - text: is required to get any text.
                - paragraph [ref=e229]:
                  - strong [ref=e230]: Pro Tip
                  - text: ": The most reliable approach is first to convert PDFs into a structured format like Markdown. This preprocessing step ensures you have clean, logically ordered text before applying any of the chunking strategies below."
            - heading "Simple Chunking TechniquesDirect link to Simple Chunking Techniques" [level=2] [ref=e231]:
              - text: Simple Chunking Techniques
              - link "Direct link to Simple Chunking Techniques" [ref=e232] [cursor=pointer]:
                - /url: "#simple-chunking-techniques"
                - text: "#"
            - heading "Fixed-Size Chunking (or Token Chunking)Direct link to Fixed-Size Chunking (or Token Chunking)" [level=3] [ref=e233]:
              - text: Fixed-Size Chunking (or Token Chunking)
              - link "Direct link to Fixed-Size Chunking (or Token Chunking)" [ref=e234] [cursor=pointer]:
                - /url: "#fixed-size-chunking-or-token-chunking"
                - text: "#"
            - paragraph [ref=e235]:
              - text: Fixed-size chunking is the simplest and most straightforward approach. It splits text into chunks of a
              - strong [ref=e236]: predetermined size
              - text: ", often measured in tokens (pieces of text that the model processes) or characters. This method is easy to implement but does not respect the semantic structure of the text. As a result, it can cut off in the middle of sentences or even words, resulting in awkward breaks."
            - paragraph [ref=e237]:
              - text: A common solution is
              - strong [ref=e238]: chunk overlap
              - text: ", where some tokens from the end of one chunk are repeated at the beginning of the next. This preserves context that might otherwise be lost at chunk boundaries."
            - paragraph [ref=e239]:
              - strong [ref=e240]: "Key considerations:"
            - list [ref=e241]:
              - listitem [ref=e242]:
                - strong [ref=e243]: "Chunk Size:"
                - text: A common starting point is a chunk size that aligns with the context window of the embedding model. Smaller chunks can be better for capturing fine-grained details, while larger chunks might be more suitable for understanding broader themes.
              - listitem [ref=e244]:
                - strong [ref=e245]: "Chunk Overlap:"
                - text: A typical overlap is between 10% and 20% of the chunk size.
            - generic [ref=e246]:
              - generic [ref=e247]:
                - img [ref=e249]
                - text: info
              - paragraph [ref=e252]:
                - strong [ref=e253]: "When to use:"
                - text: Quick prototyping and getting a baseline for how well your RAG system performs. It's the easiest place to start, especially when you're dealing with documents that don't have a consistent structure or when you're not sure what you're working with yet. Just make sure to use a decent overlap - 10-20% - so you don't lose important context when information gets split across chunks.
            - paragraph [ref=e254]:
              - img "Fixed-Size Chunking" [ref=e255]
            - paragraph [ref=e256]:
              - strong [ref=e257]: "Code example:"
            - generic [ref=e259]:
              - code [ref=e261]:
                - generic [ref=e262]: from typing import List
                - generic [ref=e263]: import re
                - generic [ref=e264]: "# Split the text into units (words, in this case)"
                - generic [ref=e265]: "def word_splitter(source_text: str) -> List[str]:"
                - generic [ref=e266]: "source_text = re.sub(\"\\s+\", \" \", source_text) # Replace multiple whitespces"
                - generic [ref=e267]: "return re.split(\"\\s\", source_text) # Split by single whitespace"
                - generic [ref=e268]: "def get_chunks_fixed_size_with_overlap(text: str, chunk_size: int, overlap_fraction: float = 0.2) -> List[str]:"
                - generic [ref=e269]: text_words = word_splitter(text)
                - generic [ref=e270]: overlap_int = int(chunk_size * overlap_fraction)
                - generic [ref=e271]: chunks = []
                - generic [ref=e272]: "for i in range(0, len(text_words), chunk_size):"
                - generic [ref=e273]: "chunk_words = text_words[max(i - overlap_int, 0): i + chunk_size]"
                - generic [ref=e274]: chunk = " ".join(chunk_words)
                - generic [ref=e275]: chunks.append(chunk)
                - generic [ref=e276]: return chunks
              - generic [ref=e277]:
