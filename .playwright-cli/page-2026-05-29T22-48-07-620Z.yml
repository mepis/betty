                  - img [ref=e431]
                  - img [ref=e433]
            - heading "Advanced Chunking TechniquesDirect link to Advanced Chunking Techniques" [level=2] [ref=e435]:
              - text: Advanced Chunking Techniques
              - link "Direct link to Advanced Chunking Techniques" [ref=e436] [cursor=pointer]:
                - /url: "#advanced-chunking-techniques"
                - text: "#"
            - heading "Semantic Chunking (Context-Aware Chunking)Direct link to Semantic Chunking (Context-Aware Chunking)" [level=3] [ref=e437]:
              - text: Semantic Chunking (Context-Aware Chunking)
              - link "Direct link to Semantic Chunking (Context-Aware Chunking)" [ref=e438] [cursor=pointer]:
                - /url: "#semantic-chunking-context-aware-chunking"
                - text: "#"
            - paragraph [ref=e439]: "Semantic chunking shifts from traditional rule-based splitting to meaning-based segmentation. Instead of relying on character counts or document structure, this more advanced technique divides text based on its semantic similarity. The process involves:"
            - list [ref=e440]:
              - listitem [ref=e441]:
                - strong [ref=e442]: Sentence Segmentation
                - text: ": Breaking the text into individual sentences"
              - listitem [ref=e443]:
                - strong [ref=e444]: Embedding Generation
                - text: ": Converting each sentence into a vector embedding"
              - listitem [ref=e445]:
                - strong [ref=e446]: Similarity Analysis
                - text: ": Comparing the embeddings to detect semantic breakpoints (places where the topic changes)"
              - listitem [ref=e447]:
                - strong [ref=e448]: Chunk Formation
                - text: ": Creating new chunks between these breakpoints"
            - paragraph [ref=e449]: The result is a set of highly coherent semantic chunks, each containing a self-contained idea or topic. This method works well for dense, unstructured text where you want to preserve the logical flow of arguments or narratives.
            - generic [ref=e450]:
              - generic [ref=e451]:
                - img [ref=e453]
                - text: info
              - paragraph [ref=e456]:
                - strong [ref=e457]: "Recommended for:"
                - text: Dense, unstructured text to preserve the complete semantic context of an idea. This method works well for academic papers, legal documents, or long stories. These texts do not always use clear separators like paragraphs to show topic changes. This approach is great when you're dealing with complex content where the semantic boundaries don't line up neatly with the document structure.
            - paragraph [ref=e458]:
              - img "Semantic Chunking" [ref=e459]
            - heading "LLM-Based ChunkingDirect link to LLM-Based Chunking" [level=3] [ref=e460]:
              - text: LLM-Based Chunking
              - link "Direct link to LLM-Based Chunking" [ref=e461] [cursor=pointer]:
                - /url: "#llm-based-chunking"
                - text: "#"
            - paragraph [ref=e462]:
              - text: LLM-based chunking uses a
              - strong [ref=e463]: large language model (LLM)
              - text: "to decide how to split the text. Instead of relying on fixed rules or vector-based similarity scores, the LLM processes the document and generates semantically coherent chunks, often also adding additional context, summaries, or other information. This can be done by:"
            - list [ref=e464]:
              - listitem [ref=e465]:
                - strong [ref=e466]: Identifying propositions
                - text: (breaking text into clear, logical statements)
              - listitem [ref=e467]:
                - strong [ref=e468]: Summarizing sections
                - text: into smaller, meaning-preserving chunks
              - listitem [ref=e469]:
                - strong [ref=e470]: Highlighting key points
                - text: to ensure the most relevant information is captured
            - paragraph [ref=e471]: The result is a set of chunks that preserve semantic meaning more accurately than traditional methods. This makes LLM-based chunking one of the most powerful strategies for retrieval-augmented generation (RAG).
            - generic [ref=e472]:
              - generic [ref=e473]:
                - img [ref=e475]
                - text: info
              - paragraph [ref=e478]:
                - strong [ref=e479]: "When to use:"
                - text: High-value, complex documents where retrieval quality is critical and budget is less of a concern. Ideal for legal contracts, research papers, compliance documents, or enterprise knowledge bases. This approach can produce chunks that summarize or highlight key ideas, but it comes with trade-offs. It is the most computationally expensive and slowest method compared to other chunking techniques.
            - paragraph [ref=e480]:
              - img "LLM-Based Chunking" [ref=e481]
            - heading "Agentic ChunkingDirect link to Agentic Chunking" [level=3] [ref=e482]:
              - text: Agentic Chunking
              - link "Direct link to Agentic Chunking" [ref=e483] [cursor=pointer]:
                - /url: "#agentic-chunking"
                - text: "#"
            - paragraph [ref=e484]: Agentic chunking takes the concept of LLM-based chunking one step further. Instead of applying a single method, an AI agent dynamically decides how to split your documents. It looks at the whole document, including its structure, density, and content. Then it decides on the best chunking strategy or mix of strategies to use. For example, the agent might see that a document is a Markdown file. Then it splits the file by headers. It might also find that a denser document needs a propositional approach. It can even enrich chunks with metadata tags for more advanced retrieval.
            - paragraph [ref=e485]: These 'LLM-powered methods' can create very clear and context-rich chunks. However, they use a lot of computing power and cost more. They often need many calls to a strong model for each document.
            - paragraph [ref=e486]: In practice, agentic chunking is often used as part of a broader agent memory architecture, where the agent actively manages how information is stored and recalled.
            - generic [ref=e487]:
              - generic [ref=e488]:
                - img [ref=e490]
                - text: info
              - paragraph [ref=e493]:
                - strong [ref=e494]: "When to use:"
                - text: High-stakes RAG systems where you need the best possible chunks and cost isn't a dealbreaker. Perfect when you need custom chunking strategies tailored to each document's unique characteristics.
            - paragraph [ref=e495]:
              - img "Agentic Chunking" [ref=e496]
            - heading "Late ChunkingDirect link to Late Chunking" [level=3] [ref=e497]:
              - text: Late Chunking
              - link "Direct link to Late Chunking" [ref=e498] [cursor=pointer]:
                - /url: "#late-chunking"
                - text: "#"
            - paragraph [ref=e499]:
              - link "Late chunking" [ref=e500] [cursor=pointer]:
                - /url: /blog/late-chunking
              - text: "is a slightly different type of technique that aims to solve a common problem in other chunking strategies:"
              - strong [ref=e501]: context loss
              - text: .
            - paragraph [ref=e502]: In other chunking techniques, when you split a document first and then create embeddings, each chunk becomes isolated. This can result in ambiguous or lost context within the chunk that was explained or referenced earlier in a document.
            - paragraph [ref=e503]: Late chunking works backwards. Instead of splitting first, you start by feeding the entire document into a long-context embedding model. This creates detailed, token-level embeddings that understand the full picture. Only then do you split the document into chunks.
            - paragraph [ref=e504]: When you create the embedding for each chunk, you use the token embeddings that were already created with full context. You simply average the relevant token embeddings for that chunk. This means every chunk retains context about the whole document.
            - generic [ref=e505]:
              - generic [ref=e506]:
                - img [ref=e508]
                - text: info
              - paragraph [ref=e511]:
                - strong [ref=e512]: "When to use:"
                - text: Use this in RAG systems where retrieval quality depends on understanding relationships between chunks and the whole document. This is very useful for technical documents, research papers, or legal texts. These documents have sections that refer to ideas, methods, or definitions mentioned elsewhere. This helps capture connections between different parts of the document that regular chunking methods miss.
            - paragraph [ref=e513]:
              - img "Late Chunking" [ref=e514]
            - heading "Hierarchical ChunkingDirect link to Hierarchical Chunking" [level=3] [ref=e515]:
              - text: Hierarchical Chunking
              - link "Direct link to Hierarchical Chunking" [ref=e516] [cursor=pointer]:
                - /url: "#hierarchical-chunking"
                - text: "#"
            - paragraph [ref=e517]: "Hierarchical chunking can be a game-changer for very large and complex documents. The idea is pretty straightforward: You create multiple layers of chunks at different levels of detail."
            - list [ref=e518]:
              - listitem [ref=e519]:
                - text: At the
                - strong [ref=e520]: top layer
                - text: ", you create large chunks that summarize broad sections or themes, like the title and abstract."
              - listitem [ref=e521]:
                - text: At the
                - strong [ref=e522]: next layers
                - text: ", you split those sections into progressively smaller chunks that capture finer details such as arguments, examples, or definitions."
            - paragraph [ref=e523]:
              - text: This lets your RAG system start with the high-level overview and then drill down into specifics when users need more detail. LlamaIndex's
              - link "HierarchicalNodeParser" [ref=e524] [cursor=pointer]:
                - /url: https://docs.llamaindex.ai/en/v0.10.19/api/llama_index.core.node_parser.HierarchicalNodeParser.html
                - code [ref=e525]: HierarchicalNodeParser
              - text: makes it easy to implement this approach.
            - generic [ref=e526]:
              - generic [ref=e527]:
                - img [ref=e529]
                - text: info
              - paragraph [ref=e532]:
                - strong [ref=e533]: "When to use:"
                - text: Very large and complex documents, such as textbooks, legal contracts, or extensive technical manuals. This strategy is ideal when you need to answer both high-level, summary-based questions and highly specific, detailed queries. It gives you a good middle ground between broad context and granular access without the full complexity of hierarchical chunking, though it's more involved than basic splitting methods.
            - paragraph [ref=e534]:
              - img "Hierarchical Chunking" [ref=e535]
            - heading "Adaptive ChunkingDirect link to Adaptive Chunking" [level=3] [ref=e536]:
              - text: Adaptive Chunking
              - link "Direct link to Adaptive Chunking" [ref=e537] [cursor=pointer]:
                - /url: "#adaptive-chunking"
                - text: "#"
            - paragraph [ref=e538]:
              - text: Adaptive chunking techniques dynamically adjust key
              - strong [ref=e539]: parameters
              - text: (like chunk size and overlap) based on the document's content.
            - paragraph [ref=e540]: Instead of applying a single, fixed rule for an entire document, this method treats the text as a varied landscape. It might use machine learning models to analyze the semantic density and structure of different sections. For example, it could automatically create smaller, more granular chunks for a complex, information-rich paragraph to capture fine-grained details, while using larger chunks for a more general, introductory section.
            - paragraph [ref=e541]:
              - text: The goal is to create chunks whose size and boundaries are tailored to the specific content they contain, leading to more precise and context-aware retrieval. This differs from Agentic Chunking, where the agent decides
              - emphasis [ref=e542]: which chunking strategy to use
              - text: ", rather than just adjusting the parameters of one."
            - generic [ref=e543]:
              - generic [ref=e544]:
                - img [ref=e546]
                - text: info
              - paragraph [ref=e549]:
                - strong [ref=e550]: "When to use:"
                - text: Documents with varied and inconsistent internal structures. Think of a long report that contains dense, technical paragraphs alongside sparse, narrative sections. An adaptive strategy excels here because it avoids the "one-size-fits-all" problem. It can create small, granular chunks for the complex parts to capture every detail, and larger chunks for the simpler text to preserve context, all within the same document.
            - heading "How to Choose the Best Chunking StrategyDirect link to How to Choose the Best Chunking Strategy" [level=2] [ref=e551]:
              - text: How to Choose the Best Chunking Strategy
              - link "Direct link to How to Choose the Best Chunking Strategy" [ref=e552] [cursor=pointer]:
                - /url: "#how-to-choose-the-best-chunking-strategy"
                - text: "#"
            - paragraph [ref=e553]: "There is no single \"best\" chunking method; the optimal strategy always depends on your specific use case. But before diving into different techniques, the most important question to ask is:"
            - paragraph [ref=e554]:
              - emphasis [ref=e555]:
                - strong [ref=e556]: “Does my data need chunking at all?”
            - paragraph [ref=e557]: Chunking is designed to break down long, unstructured documents. If your data source already has small, complete pieces of information like FAQs, product descriptions, or social media posts, you usually do not need to chunk them. Chunking can even cause problems. The goal is to create meaningful semantic units, and if your data is already in that format, you're ready for the embedding stage.
            - paragraph [ref=e558]: "Once you've confirmed that your documents are long enough to benefit from chunking, you can use the following questions to guide your choice of strategy:"
            - list [ref=e559]:
              - listitem [ref=e560]:
                - strong [ref=e561]: What is the nature of my documents?
                - text: Are they highly structured (like code or JSON), or are they unstructured narrative text?
              - listitem [ref=e562]:
                - strong [ref=e563]: What level of detail does my RAG system need?
                - text: Does it need to retrieve specific, granular facts or summarize broader concepts?
              - listitem [ref=e564]:
                - strong [ref=e565]: Which embedding model am I using?
                - text: What are the size of the output vectors (more dimensions increases the ability for more granular information to be stored)??
              - listitem [ref=e566]:
                - strong [ref=e567]: How complex will my user queries be?
                - text: Will they be simple questions that need small, targeted chunks, or complex ones that require more context?
            - table [ref=e568]:
              - rowgroup [ref=e569]:
                - row "Chunking Strategy How It Works Complexity Best For Examples" [ref=e570]:
                  - columnheader "Chunking Strategy" [ref=e571]
