            - heading "Tools and Libraries for ChunkingDirect link to Tools and Libraries for Chunking" [level=2] [ref=e647]:
              - text: Tools and Libraries for Chunking
              - link "Direct link to Tools and Libraries for Chunking" [ref=e648] [cursor=pointer]:
                - /url: "#tools-and-libraries-for-chunking"
                - text: "#"
            - paragraph [ref=e649]: "When setting up a data ingestion pipeline for your RAG application, you often face a classic trade-off with chunking: you can rely on a specialized library for speed and ease, or build the logic yourself to have full control."
            - heading "Using a LibraryDirect link to Using a Library" [level=3] [ref=e650]:
              - text: Using a Library
              - link "Direct link to Using a Library" [ref=e651] [cursor=pointer]:
                - /url: "#using-a-library"
                - text: "#"
            - paragraph [ref=e652]:
              - emphasis [ref=e653]: Luckily
              - text: ", you don’t have to start from scratch. The LLM community often turns to two powerful open-source libraries: LangChain and LlamaIndex, each with a different approach to chunking:"
            - list [ref=e654]:
              - listitem [ref=e655]:
                - strong [ref=e656]: "LangChain:"
                - text: A broad framework for building LLM applications. Its flexible
                - link "TextSplitters" [ref=e657] [cursor=pointer]:
                  - /url: https://python.langchain.com/docs/concepts/text_splitters/
                  - code [ref=e658]: TextSplitters
                - text: make it easy to integrate chunking as part of a larger system, like a multi-step AI agent.
                - list [ref=e659]:
                  - listitem [ref=e660]:
                    - strong [ref=e661]: "Best for:"
                    - text: modular workflows where chunking is just one piece of the puzzle.
              - listitem [ref=e662]:
                - strong [ref=e663]: "LlamaIndex:"
                - text: Designed specifically for RAG pipelines. Its sophisticated
                - link "NodeParsers" [ref=e664] [cursor=pointer]:
                  - /url: https://docs.llamaindex.ai/en/stable/module_guides/loading/node_parsers/modules/
                  - code [ref=e665]: NodeParsers
                - text: produce “Nodes,” optimized for ingestion and retrieval.
                - list [ref=e666]:
                  - listitem [ref=e667]:
                    - strong [ref=e668]: "Best for:"
                    - text: high-performance, data-centric retrieval systems.
              - listitem [ref=e669]:
                - strong [ref=e670]: "chonkie:"
                - text: A lightweight, dedicated chunking library that focuses solely on splitting text. It offers a variety of chunking strategies such as
                - link "SemanticChunker" [ref=e671] [cursor=pointer]:
                  - /url: https://docs.chonkie.ai/python-sdk/chunkers/semantic-chunker
                  - code [ref=e672]: SemanticChunker
                - text: and is easy to integrate with other RAG libraries.
                - list [ref=e673]:
                  - listitem [ref=e674]:
                    - strong [ref=e675]: "Best for:"
                    - text: projects where you want a simple, focused solution without the overhead of a larger framework.
            - heading "Manual ImplementationDirect link to Manual Implementation" [level=3] [ref=e676]:
              - text: Manual Implementation
              - link "Direct link to Manual Implementation" [ref=e677] [cursor=pointer]:
                - /url: "#manual-implementation"
                - text: "#"
            - paragraph [ref=e678]: The alternative to using a library is to implement the chunking logic yourself. Strategies like fixed-size or recursive chunking are straightforward to code in Python, giving you complete authority over how your data is processed and avoiding the need to add external dependencies to your project.
            - list [ref=e679]:
              - listitem [ref=e680]:
                - strong [ref=e681]: "Best for:"
                - text: Projects where you want to avoid adding large libraries, need to implement a highly custom chunking strategy, or require full transparency in your data pipeline.
            - heading "How to Optimize The Chunk Size for RAG in ProductionDirect link to How to Optimize The Chunk Size for RAG in Production" [level=2] [ref=e682]:
              - text: How to Optimize The Chunk Size for RAG in Production
              - link "Direct link to How to Optimize The Chunk Size for RAG in Production" [ref=e683] [cursor=pointer]:
                - /url: "#how-to-optimize-the-chunk-size-for-rag-in-production"
                - text: "#"
            - paragraph [ref=e684]: "Optimizing chunk size in a production setting takes many tests and reviews. Here are some steps you can take:"
            - list [ref=e685]:
              - listitem [ref=e686]: Begin with a common baseline strategy, such as fixed-size chunking. A good place to start is a chunk size of 512 tokens and a chunk overlap of 50-100 tokens. This gives you a solid baseline that's easy to reproduce and compare other chunking strategies against.
              - listitem [ref=e687]: Experiment with different chunking approaches by tweaking parameters like chunk size and overlap to find what works best for your data.
              - listitem [ref=e688]: Test how well your retrieval works by running typical queries and checking metrics like hit rate, precision, and recall to see which strategy delivers.
              - listitem [ref=e689]: Involve humans to review both the retrieved chunks and LLM-generated responses - their feedback will catch things metrics might miss.
              - listitem [ref=e690]: Continuously monitor the performance of your RAG system in production and be prepared to iterate on your chunking strategy as needed.
              - listitem [ref=e691]: In production LLM RAG pipelines, chunking is not just a preprocessing step — it defines the quality of retrieval and the effectiveness of agent memory.
              - listitem [ref=e692]: As AI systems evolve from simple RAG setups to long-running agents, chunking becomes a foundational decision for memory, reasoning, and cost efficiency.
