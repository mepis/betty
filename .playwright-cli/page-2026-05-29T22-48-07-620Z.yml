                  - cell "Complex, nuanced documents that require custom strategies" [ref=e617]
                  - cell "Regulatory filings, multi-section contracts, corporate policies" [ref=e618]
                - row "Late Embeds the whole document first, then derives chunk embeddings from it. High Use cases where chunks need awareness of full document context Case studies, comprehensive manuals, long-form analysis reports" [ref=e619]:
