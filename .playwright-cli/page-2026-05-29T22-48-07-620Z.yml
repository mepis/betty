            - heading "Document-Based ChunkingDirect link to Document-Based Chunking" [level=3] [ref=e361]:
              - text: Document-Based Chunking
              - link "Direct link to Document-Based Chunking" [ref=e362] [cursor=pointer]:
                - /url: "#document-based-chunking"
                - text: "#"
            - paragraph [ref=e363]:
              - text: Document-based chunking uses the
              - strong [ref=e364]: intrinsic structure of a document
              - text: ". Instead of relying on generic separators, it parses the document based on its format-specific elements. For example:"
            - list [ref=e365]:
              - listitem [ref=e366]:
                - strong [ref=e367]: Markdown
                - text: ": Split by headings ("
                - code [ref=e368]: "#"
                - text: ","
                - code [ref=e369]: "##"
                - text: ) to capture sections or subsections.
              - listitem [ref=e370]:
                - strong [ref=e371]: HTML
                - text: ": Split by tags ("
                - code [ref=e372]: <p>
                - text: ","
                - code [ref=e373]: <div>
                - text: ) to preserve logical content blocks.
              - listitem [ref=e374]:
                - strong [ref=e375]: PDF
                - text: ": After preprocessing (e.g., OCR or conversion to Markdown), split by headers, paragraphs, tables, or other structural elements."
              - listitem [ref=e376]:
                - strong [ref=e377]: Programming Code
                - text: ": Split by functions or classes (e.g.,"
                - code [ref=e378]: def
                - text: in Python) to maintain logical units of code.
            - paragraph [ref=e379]: With this method, chunks stay aligned with the document’s logical organization, which often also correlates with semantic meaning as well. Both LangChain and LlamaIndex offer specialized splitters for various document types, including Markdown, code, and JSON.
            - generic [ref=e380]:
              - generic [ref=e381]:
                - img [ref=e383]
                - text: info
              - paragraph [ref=e386]:
                - strong [ref=e387]: "When to use:"
                - text: Highly structured documents where the format can easily define logical separations. Ideal for Markdown, HTML, source code, or any document with clear structural markers.
            - paragraph [ref=e388]:
              - img "Document-Based Chunking" [ref=e389]
            - paragraph [ref=e390]:
              - strong [ref=e391]: "Code example:"
            - generic [ref=e393]:
              - code [ref=e395]:
                - generic [ref=e396]: from typing import List
                - generic [ref=e397]: import re
                - generic [ref=e398]: "def markdown_document_chunking(text: str) -> List[str]:"
                - generic [ref=e399]: "# Split by markdown headers (# ## ### etc.)"
                - generic [ref=e400]: "header_pattern = r'^#{1,6}\\s+.+$'"
                - generic [ref=e401]: lines = text.split('\n')
                - generic [ref=e403]: chunks = []
                - generic [ref=e404]: current_chunk = []
