              - text: · 23 min read
            - generic [ref=e102]:
              - generic [ref=e104]:
                - link "Femke Plantinga" [ref=e105] [cursor=pointer]:
                  - /url: https://www.linkedin.com/in/femke-plantinga/
                  - img "Femke Plantinga" [ref=e106]
                - generic [ref=e107]:
