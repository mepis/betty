                  - columnheader "Complexity" [ref=e573]
                  - columnheader "Best For" [ref=e574]
                  - columnheader "Examples" [ref=e575]
              - rowgroup [ref=e576]:
                - row "Fixed-Size (or Token) Splits by token or character count. Low Small or simple docs, or when speed matters most Meeting notes, short blog posts, emails, simple FAQs" [ref=e577]:
