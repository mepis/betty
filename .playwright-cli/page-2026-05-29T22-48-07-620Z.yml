                - row "Recursive Splits text by repeatedly dividing it until it fits the desired chunk size, often preserving some structure. Medium Documents where some structure should be maintained but speed is still important Research articles, product guides, short reports" [ref=e584]:
                  - cell "Recursive" [ref=e585]:
                    - strong [ref=e586]: Recursive
                  - cell "Splits text by repeatedly dividing it until it fits the desired chunk size, often preserving some structure." [ref=e587]
