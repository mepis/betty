                    - img [ref=e285]
            - heading "Recursive ChunkingDirect link to Recursive Chunking" [level=3] [ref=e287]:
              - text: Recursive Chunking
              - link "Direct link to Recursive Chunking" [ref=e288] [cursor=pointer]:
                - /url: "#recursive-chunking"
                - text: "#"
            - paragraph [ref=e289]:
              - text: Recursive chunking is a more nuanced approach. It splits text using a prioritized list of common separators, such as double newlines (for paragraphs) or single newlines (for sentences). It first tries to split the text by the highest-priority separator (paragraphs). If any resulting chunk is still too large, the algorithm
              - emphasis [ref=e290]: recursively
              - text: applies the next separator (sentences) to that specific chunk.
            - paragraph [ref=e291]: This method adapts to the document’s structure, keeping structurally related units together as much as possible. It avoids the abrupt cuts of fixed-size chunking and ensures that chunks retain the structure of their original format.
            - generic [ref=e292]:
              - generic [ref=e293]:
                - img [ref=e295]
                - text: info
              - paragraph [ref=e298]:
                - strong [ref=e299]: "Recommended for:"
                - text: Unstructured text documents, such as articles, blog posts, and research papers. This is usually a solid default choice because it respects the natural organization of the text, rather than splitting it randomly.
            - paragraph [ref=e300]:
              - img "Recursive Chunking" [ref=e301]
            - paragraph [ref=e302]:
              - strong [ref=e303]: "Code example:"
            - generic [ref=e305]:
              - code [ref=e307]:
                - generic [ref=e308]: from typing import List
                - generic [ref=e309]: "def recursive_chunking(text: str, max_chunk_size: int = 1000) -> List[str]"
                - generic [ref=e310]: "# Base case: if text is small enough, return as single chunk"
                - generic [ref=e311]: "if len(text) <= max_chunk_size:"
                - generic [ref=e312]: return [text.strip()] if text.strip() else []
                - generic [ref=e314]: "# Try separators in priority order"
                - generic [ref=e315]: separators = ["\n\n", "\n", ". ", " "]
                - generic [ref=e317]: "for separator in separators:"
                - generic [ref=e318]: "if separator in text:"
                - generic [ref=e319]: parts = text.split(separator)
                - generic [ref=e320]: chunks = []
                - generic [ref=e321]: current_chunk = ""
                - generic [ref=e323]: "for part in parts:"
                - generic [ref=e324]: "# Check if adding this part would exceed the limit"
                - generic [ref=e325]: test_chunk = current_chunk + separator + part if current_chunk else part
                - generic [ref=e327]: "if len(test_chunk) <= max_chunk_size:"
                - generic [ref=e328]: current_chunk = test_chunk
                - generic [ref=e329]: "else:"
                - generic [ref=e330]: "# Save current chunk and start new one"
                - generic [ref=e331]: "if current_chunk:"
                - generic [ref=e332]: chunks.append(current_chunk.strip())
                - generic [ref=e333]: current_chunk = part
                - generic [ref=e335]: "# Add the final chunk"
                - generic [ref=e336]: "if current_chunk:"
                - generic [ref=e337]: chunks.append(current_chunk.strip())
                - generic [ref=e339]: "# Recursively process any chunks that are still too large"
                - generic [ref=e340]: final_chunks = []
                - generic [ref=e341]: "for chunk in chunks:"
                - generic [ref=e342]: "if len(chunk) > max_chunk_size:"
                - generic [ref=e343]: final_chunks.extend(recursive_chunking(chunk, max_chunk_size))
                - generic [ref=e344]: "else:"
                - generic [ref=e345]: final_chunks.append(chunk)
                - generic [ref=e347]: return [chunk for chunk in final_chunks if chunk]
                - generic [ref=e349]: "# Fallback: split by character limit if no separators work"
                - generic [ref=e350]: return [text[i:i + max_chunk_size] for i in range(0, len(text), max_chunk_size)]
              - generic [ref=e351]:
