                - generic [ref=e407]: "# Check if this line is a header"
                - generic [ref=e408]: "if re.match(header_pattern, line, re.MULTILINE):"
                - generic [ref=e409]: "# Save previous chunk if it has content"
                - generic [ref=e410]: "if current_chunk:"
                - generic [ref=e411]: chunk_text = '\n'.join(current_chunk).strip()
                - generic [ref=e412]: "if chunk_text:"
                - generic [ref=e413]: chunks.append(chunk_text)
                - generic [ref=e415]: "# Start new chunk with this header"
                - generic [ref=e416]: current_chunk = [line]
                - generic [ref=e417]: "else:"
