      - generic [ref=e152]:
        - 'heading "Automation for GPU layers, tensor split, tensor overrides, and context size (with MoE optimizations) #18049" [level=1] [ref=e153]'
        - generic [ref=e155]:
          - link "JohannesGaessler" [ref=e156] [cursor=pointer]:
            - /url: /JohannesGaessler
          - text: started this conversation in
          - link "Show and tell" [ref=e157] [cursor=pointer]:
            - /url: /ggml-org/llama.cpp/discussions/categories/show-and-tell
      - generic [ref=e159]:
        - generic [ref=e160]:
          - generic [ref=e165]:
            - generic [ref=e167]:
              - button "Discussion options" [ref=e172] [cursor=pointer]:
                - img
              - heading "JohannesGaessler Dec 15, 2025on Dec 15, 2025 Collaborator" [level=2] [ref=e173]:
                - generic [ref=e174]:
                  - link "JohannesGaessler" [ref=e175] [cursor=pointer]:
                    - /url: /JohannesGaessler
                    - img [ref=e176]
                    - generic [ref=e178]: JohannesGaessler
                  - link "Dec 15, 2025on Dec 15, 2025" [ref=e179] [cursor=pointer]:
                    - /url: "#discussion-9247802"
                  - generic "This user is a collaborator on this repository." [ref=e181]: Collaborator
            - generic [ref=e183]:
              - generic [ref=e184]:
                - paragraph [ref=e185]:
                  - text: CPU + GPU hybrid inference has been a core feature of llama.cpp since early on, and I would argue, one of the major selling points vs. projects like ExLlama.
                  - text: The way to control memory use until now was to manually set parameter like
                  - code [ref=e186]: "--n-gpu-layers"
                  - text: and
                  - code [ref=e187]: "--tensor-split"
                  - text: to fit memory use to free VRAM.
                  - text: However, this is of course suboptimal in terms of usability.
                  - text: Downstream projects like Ollama and KoboldCpp have implemented mechanisms for automating memory allocation but those rely on rough heuristics and tend to be inaccurate.
                  - text: As a consequence, to avoid running out of memory in some cases the heuristics are rather conservative and leave potential performance on the table.
                  - text: The problem becomes even harder when running models across multiple GPUs or when running MoE models where the dense tensors
                  - text: should be prioritized over the sparse MoE tensors for optimal performance.
                - paragraph [ref=e188]:
                  - text: On the latest llama.cpp version following
                  - link "#16653" [ref=e189] [cursor=pointer]:
                    - /url: https://github.com/ggml-org/llama.cpp/pull/16653
                  - text: I implemented code to automate memory allocations across GPUs.
                  - text: It works by doing virtual test allocations and using those as feedback to iteratively reduce memory use until the model fits across all GPUs.
                  - text: The metric for memory use is the same as in the "memory breakdown" that you may have seen in recent llama.cpp versions.
                  - text: The implementation is generic and should work for any ggml backend as long as it supports CPU + GPU hybrid inference and the memory breakdown is correct.
                  - text: If you encounter problems using this new functionality, please open an issue instead of commenting here as this will make the process easier from my side.
                - paragraph [ref=e190]:
                  - text: The code starts by first checking whether the model is projected to fit as-is.
                  - text: If yes, no changes are made.
                  - text: If not, it first reduces the context size to free up memory.
                  - text: If that is still not enough it starts moving tensors from VRAM to RAM.
                  - text: Dense tensors are prioritized for better MoE performance.
                  - text: Ideally one would only assign whole layers to GPUs for simplicity.
                  - text: However, as individual layers can be very large against "small" GPUs with only 24 GiB VRAM this would result in significant waste.
                  - text: For this reason, layers can "overflow", meaning that parts of them are moved to the next GPU in line or to system RAM.
                - heading "Command-Line Interface" [level=3] [ref=e191]
                - paragraph [ref=e192]: "The fitting of runtime parameters can be controlled as follows:"
                - list [ref=e193]:
                  - listitem [ref=e194]:
                    - code [ref=e195]: "--fit"
                    - text: ","
                    - code [ref=e196]: "-fit"
                    - text: ": set to"
                    - code [ref=e197]: "on"
                    - text: by default, can be set to
                    - code [ref=e198]: "off"
                    - text: to disable parameter fitting.
                  - listitem [ref=e199]:
                    - code [ref=e200]: "--fit-target"
                    - text: ","
                    - code [ref=e201]: "-fitt"
                    - text: ": target amount of free memory to leave on each GPU. As of right now this is the same value for all GPUs and it is not possible to specify e.g. an amount that should be used regardless of free memory."
                  - listitem [ref=e202]:
                    - code [ref=e203]: "--fit-ctx"
                    - text: ","
                    - code [ref=e204]: "-fitc"
                    - text: ": minimum context size that can be set automatically. If"
                    - code [ref=e205]: "--ctx-size"
                    - text: is explicitly set by the user it is not changed.
                  - listitem [ref=e206]:
                    - text: If arguments like
                    - code [ref=e207]: "--n-gpu-layers"
                    - text: ","
                    - code [ref=e208]: "--tensor-split"
                    - text: ", or"
                    - code [ref=e209]: "--override-tensor"
                    - text: that affect memory allocation are set by the user, there is no change to that memory allocation. There is no support for automatic modification of only one of these arguments, they are either wholly under user control or wholly under program control.
                - paragraph [ref=e210]:
                  - text: There is a new tool
                  - code [ref=e211]: llama-fit-params
                  - text: that can be used to retrieve the parameters that would be set by the new parameter fitting logic.
                  - text: "For example:"
                - generic [ref=e212]:
                  - generic [ref=e213]: "> $ ./build/bin/llama-fit-params --model models/opt/gpt-oss-120b-mxfp4-00001-of-00003.gguf -ub 4096 -b 4096 ggml_cuda_init: GGML_CUDA_FORCE_MMQ: no ggml_cuda_init: GGML_CUDA_FORCE_CUBLAS: no ggml_cuda_init: found 2 CUDA devices: Device 0: NVIDIA GeForce RTX 4090, compute capability 8.9, VMM: yes Device 1: NVIDIA GeForce RTX 4090, compute capability 8.9, VMM: yes build: 7413 (ae534ec0c) with GNU 15.2.1 for Linux x86_64 llama_params_fit_impl: projected memory use with initial parameters [MiB]: llama_params_fit_impl: - CUDA0 (NVIDIA GeForce RTX 4090): 24080 total, 34873 used, 11187 deficit llama_params_fit_impl: - CUDA1 (NVIDIA GeForce RTX 4090): 24080 total, 31847 used, 8161 deficit llama_params_fit_impl: projected to use 66721 MiB of device memory vs. 48161 MiB of free device memory llama_params_fit_impl: cannot fulfill margin of 1024 MiB on all devices, need to use 21397 MiB less in total llama_params_fit_impl: context size reduced from 131072 to 4096 -> need 4490 MiB less memory in total llama_params_fit_impl: with only dense weights in device memory there is a total surplus of 42064 MiB llama_params_fit_impl: filling dense-only layers back-to-front: llama_params_fit_impl: - CUDA1 (NVIDIA GeForce RTX 4090): 36 layers, 2201 MiB used, 21484 MiB free llama_params_fit_impl: - CUDA0 (NVIDIA GeForce RTX 4090): 0 layers, 985 MiB used, 22700 MiB free llama_params_fit_impl: converting dense-only layers to full layers and filling them front-to-back with overflow to next device/system memory: llama_params_fit_impl: - CUDA0 (NVIDIA GeForce RTX 4090): 14 layers ( 1 overflowing), 22576 MiB used, 1109 MiB free llama_params_fit_impl: - CUDA1 (NVIDIA GeForce RTX 4090): 22 layers (11 overflowing), 22208 MiB used, 1477 MiB free llama_params_fit: successfully fit params to free device memory llama_params_fit: fitting params to free memory took 8.81 seconds Printing fitted CLI arguments to stdout... -c 4096 -ngl 37 -ts 14,23 -ot blk\\.13\\.ffn_(