                - paragraph [ref=e386]:
                  - text: The VRAM utilization is at ~85-90%.
                  - text: As the default
                  - code [ref=e387]: "--fit-target"
                  - text: is 1024 MiB, that would ideally leave ~4% of free VRAM on each GPU.
                  - text: However, since individual tensors can be several GB in size some amount of waste is inevitable.
                - paragraph [ref=e388]:
                  - text: The time to fit the parameters increases roughly linearly with the number of GPUs.
