            - cell "Abstractive QA pipelines, document summarization, report generation" [ref=e111]
      - heading "Computational Requirements" [level=3] [ref=e112]
      - paragraph [ref=e113]: Larger models often produce higher-quality embeddings. However, that quality comes with higher costs in the form of GPU memory, slower inference, and infrastructure expenses.
      - paragraph [ref=e114]:
        - text: Smaller models, especially those with compression techniques like
        - link "Matryoshka representation learning" [ref=e115] [cursor=pointer]:
          - /url: https://huggingface.co/blog/matryoshka
        - text: ", can offer a better balance. By producing embeddings at multiple dimensionalities, they allow teams to trade vector size for speed and memory savings (without having to retrain from scratch)."
      - paragraph [ref=e116]: For workloads constrained by hardware or operating over very large indexes, it’s worth weighing model size and throughput first, before worrying about a gap on the leaderboard.
      - heading "Domain Relevance" [level=3] [ref=e117]
      - paragraph [ref=e118]:
        - img "domain embed diagram" [ref=e119]
      - paragraph [ref=e120]: When the workload involves specialized languages like biomedical text, financial filings, or source code, domain-specific models almost always outperform general-purpose ones.
      - paragraph [ref=e121]: The reason is simple. They are fine-tuned on terminology, structures, and conventions that generalist models can’t capture. A biomedical model will understand MeSH terms and clinical shorthand. A code model will encode syntax into its responses.
      - paragraph [ref=e122]: General-purpose embeddings are strong baselines, but when accuracy in a specific domain is a goal, in-domain training is the only way to deliver truly relevant results.
      - heading "Licensing and Deployment" [level=3] [ref=e123]
      - paragraph [ref=e124]: Not all open-weight models can be used commercially. Some are released under research-only licenses (i.e., CC-BY-NC-4.0) while others are available under permissive licenses (i.e., Apache 2.0).
      - paragraph [ref=e125]: Similarly, deployment constraints can also vary. Some models are designed for GPU inference at scale, while others are optimized for CPU environments or variable embedding dimensions to fit tighter hardware budgets.
      - paragraph [ref=e126]: Before embedding sensitive data, verify both the license terms and the deployment requirements of the model you’re choosing.
      - heading "Evaluation of Your Data" [level=3] [ref=e127]
      - paragraph [ref=e128]:
        - text: No benchmark can fully capture the nuances of a specific dataset. Document style, query phrasing, and domain vocabulary all interact in ways that shape retrieval quality. The MTEB leaderboards are a solid starting point, but the decisive factor should always be how a model performs on
        - emphasis [ref=e129]: your
        - text: corpus.
      - paragraph [ref=e130]: Running small-scale evaluations with metrics like Mean Reciprocal Rank (MRR) and NDCG provides real data on how a model fits your use case. These metrics reveal not only if a model retrieves the right documents, but also whether it can consistently do so.
      - paragraph [ref=e131]: With these factors in mind, we can now look at the models that consistently performed well in the MTEB leaderboard as of 2025.
      - heading "Top 6 Models on the MTEB Leaderboard" [level=2] [ref=e132]
      - paragraph [ref=e133]: As of 2025, here are some of the top open-weight models on the MTEB leaderboard and their backgrounds.
      - heading "1. Qwen3-Embedding-8B" [level=3] [ref=e134]:
        - text: "1."
        - link "Qwen3-Embedding-8B" [ref=e135] [cursor=pointer]:
          - /url: https://huggingface.co/Qwen/Qwen3-Embedding-8B
      - paragraph [ref=e136]:
        - strong [ref=e137]: What is it?
      - paragraph [ref=e138]: The largest of a family of new embedding models built on top of Qwen3. Also available in 4B and 0.6B. Outperforms the previous generation of Qwen embedding models (i.e. gte-Qwen2-7B-instruct) on MTEB benchmarks. It ranks high on both the multi-lingual and English-only MTEB leaderboards.
      - paragraph [ref=e139]:
        - strong [ref=e140]: What is its license?
      - paragraph [ref=e141]: Apache-2.0 (commercial use permitted).
      - paragraph [ref=e142]:
        - strong [ref=e143]: Who should use it?
      - paragraph [ref=e144]: Teams that require strong multi-lingual support or state-of-the-art performance on retrieval, classification, or semantic similarity tasks. The model is particularly strong at long-text understanding.
      - paragraph [ref=e145]:
        - strong [ref=e146]: What are the trade-offs?
      - paragraph [ref=e147]: VRAM-heavy at 8B parameters and therefore more costly and slow to run. However, smaller versions with 4B and 0.6B parameters exist.
      - heading "2. llama-embed-nemotron-8b" [level=3] [ref=e148]:
        - text: "2."
        - link "llama-embed-nemotron-8b" [ref=e149] [cursor=pointer]:
          - /url: https://huggingface.co/nvidia/llama-embed-nemotron-8b
      - paragraph [ref=e150]:
        - strong [ref=e151]: What is it?
      - paragraph [ref=e152]: Released in October 2025, this is the latest embedding model from NVIDIA. It is fine-tuned from Llama-3.1-8B and is particularly powerful at understanding multilingual text.
      - paragraph [ref=e153]:
        - strong [ref=e154]: What is its license?
      - paragraph [ref=e155]: Customized-nscl-v1 (non-commercial only).
      - paragraph [ref=e156]:
        - strong [ref=e157]: Who should use it?
      - paragraph [ref=e158]: Researchers building applications that need text understanding, especially multilingual RAG systems.
      - paragraph [ref=e159]:
        - strong [ref=e160]: What are the trade-offs?
      - paragraph [ref=e161]: It cannot be used commercially.
      - heading "3. bge-m3" [level=3] [ref=e162]:
        - text: "3."
        - link "bge-m3" [ref=e163] [cursor=pointer]:
          - /url: https://huggingface.co/BAAI/bge-m3
      - paragraph [ref=e164]:
        - strong [ref=e165]: What is it?
      - paragraph [ref=e166]: A versatile text embedding model released in 2024 by the Beijing Academy of Artificial Intelligence (BAAI). It is multilingual, supports long inputs, and supports multiple retrieval methods (dense, sparse, multi-vector).
      - paragraph [ref=e167]:
        - strong [ref=e168]: What is its license?
      - paragraph [ref=e169]: MIT License (also permissive for commercial use).
      - paragraph [ref=e170]:
        - strong [ref=e171]: Who should use it?
      - paragraph [ref=e172]: Teams that want a production-ready, open-weight model for retrieval/search pipelines.
      - paragraph [ref=e173]:
        - strong [ref=e174]: What are the trade-offs?
      - paragraph [ref=e175]: Since this model was released in 2024, there may be newer models that have better performance for your tasks.
      - heading "4. stella_en_1.5B_v5" [level=3] [ref=e176]:
        - text: "4."
        - link "stella_en_1.5B_v5" [ref=e177] [cursor=pointer]:
          - /url: https://huggingface.co/dunzhang/stella_en_1.5B_v5
      - paragraph [ref=e178]:
        - strong [ref=e179]: What is it?
      - paragraph [ref=e180]:
        - text: A compact, English-only embedding model (~1.5B parameters) built on top of the
        - code [ref=e181]: Alibaba-NLP/gte-large-en-v1.5
        - text: and
        - code [ref=e182]: Alibaba-NLP/gte-Qwen2-1.5B-instruct
        - text: models. It produces 1,024-d embeddings by default, but supports Matryoshka for other dimensions.
      - paragraph [ref=e183]:
        - strong [ref=e184]: What is its license?
      - paragraph [ref=e185]: MIT License.
      - paragraph [ref=e186]:
        - strong [ref=e187]: Who should use it?
      - paragraph [ref=e188]: Teams with limited GPU resources or CPU-only environments that still need strong English retrieval.
      - paragraph [ref=e189]:
        - strong [ref=e190]: What are the trade-offs?
      - paragraph [ref=e191]: Not being multilingual and having a smaller capacity means it lags behind 7B models in raw accuracy.
      - heading "5. embeddinggemma-300m" [level=3] [ref=e192]:
        - text: "5."
        - link "embeddinggemma-300m" [ref=e193] [cursor=pointer]:
          - /url: https://huggingface.co/google/embeddinggemma-300m
      - paragraph [ref=e194]:
        - strong [ref=e195]: What is it?
      - paragraph [ref=e196]: A 300M-parameter open embedding model from Google, built on Gemma 3 and T5Gemma, designed for search, retrieval, and semantic similarity across 100+ languages. Its smaller size makes it suitable for resource-limited hardware like phones or laptops.
      - paragraph [ref=e197]:
        - strong [ref=e198]: What is its license?
      - paragraph [ref=e199]: Apache-2.0.
      - paragraph [ref=e200]:
        - strong [ref=e201]: Who should use it?
      - paragraph [ref=e202]: Companies who want to balance cost and performance.
      - paragraph [ref=e203]:
        - strong [ref=e204]: What are the tradeoffs?
      - paragraph [ref=e205]: The smaller size of this model means that it will be less accurate than the largest state-of-the-art embedding models.
      - heading "Domain-Specific Embedding Models" [level=2] [ref=e206]
      - paragraph [ref=e207]: While the MTEB leaderboard is dominated by general-purpose models, specialized domains benefit from embeddings tuned on in-domain corpora. Here are some of the top ones.
      - list [ref=e208]:
        - listitem [ref=e209]:
          - strong [ref=e210]: Medicine
          - text: ":"
          - link "PubMedBERT" [ref=e211] [cursor=pointer]:
            - /url: https://huggingface.co/microsoft/BiomedNLP-PubMedBERT-base-uncased-abstract-fulltext
          - text: is fine-tuned on medical literature and clinical notes, making it well-suited for tasks in healthcare and biomedical research. Additionally,
          - link "BioLORD" [ref=e212] [cursor=pointer]:
            - /url: https://huggingface.co/FremyCompany/BioLORD-2023
          - text: is another model tailored for similar applications.
        - listitem [ref=e213]:
          - strong [ref=e214]: Finance
          - text: ":"
          - link "Finance Embeddings from Investopedia" [ref=e215] [cursor=pointer]:
            - /url: https://huggingface.co/FinLang/finance-embeddings-investopedia
          - text: ","
          - link "Voyage Finance" [ref=e216] [cursor=pointer]:
            - /url: https://blog.voyageai.com/2024/06/03/domain-specific-embeddings-finance-edition-voyage-finance-2/
          - text: ", and"
          - link "BGE Base Financial Matryoshka" [ref=e217] [cursor=pointer]:
            - /url: https://huggingface.co/philschmid/bge-base-financial-matryoshka
          - text: are examples of models fine-tuned on financial datasets, offering improved performance for tasks such as sentiment analysis of financial news or SEC filings.
        - listitem [ref=e218]:
          - strong [ref=e219]: Law
          - text: ": For legal applications, consider exploring the"
          - 'link "Domain-Specific Embeddings and Retrieval: Legal Edition" [ref=e220] [cursor=pointer]':
            - /url: https://blog.voyageai.com/2024/04/15/domain-specific-embeddings-and-retrieval-legal-edition-voyage-law-2/
          - text: ", which discusses models fine-tuned on legal documents, enhancing their utility for legal research, contract analysis, and other law-related NLP tasks."
        - listitem [ref=e221]:
          - strong [ref=e222]: Code
          - text: ":"
          - link "CodeBERT" [ref=e223] [cursor=pointer]:
            - /url: https://huggingface.co/microsoft/codebert-base
          - text: and
          - link "GraphCodeBERT" [ref=e224] [cursor=pointer]:
            - /url: https://huggingface.co/microsoft/graphcodebert-base
          - text: are designed specifically for programming language understanding, making them useful for code search, code completion, and bug detection tasks.
        - listitem [ref=e225]:
          - strong [ref=e226]: Math
          - text: ":"
          - link "Math Similarity Model" [ref=e227] [cursor=pointer]:
            - /url: https://huggingface.co/math-similarity/Bert-MLM_arXiv-MP-class_zbMath
          - text: is tailored for formula-aware embeddings and captures mathematical structure in LaTeX (or other symbolic formats). This can be useful for research search engines and technical Q&A systems.
        - listitem [ref=e228]:
          - strong [ref=e229]: Language-Specific
          - text: ": Beyond English, strong monolingual models exist, such as"
          - link "RoSEtta-base-ja" [ref=e230] [cursor=pointer]:
            - /url: https://huggingface.co/pkshatech/RoSEtta-base-ja
          - text: (Japanese),
          - link "KoSimCSE-roberta" [ref=e231] [cursor=pointer]:
            - /url: https://huggingface.co/BM-K/KoSimCSE-roberta
          - text: (Korean),
          - link "GTE-Qwen2-7B-instruct" [ref=e232] [cursor=pointer]:
            - /url: https://huggingface.co/Alibaba-NLP/gte-Qwen2-7B-instruct
          - text: (Chinese),
          - link "Sentence-Camembert-large" [ref=e233] [cursor=pointer]:
            - /url: https://huggingface.co/dangvantuan/sentence-camembert-large
          - text: (French), and
          - link "Arabic-STS-Matryoshka" [ref=e234] [cursor=pointer]:
            - /url: https://huggingface.co/omarelshehy/Arabic-STS-Matryoshka
          - text: (Arabic).
      - heading "Closing Thoughts" [level=2] [ref=e235]
      - paragraph [ref=e236]: The MTEB leaderboard has grown into the most comprehensive benchmark for models, covering classification, clustering, retrieval, and more. Its overall score is a useful signal, but production systems succeed when engineers look deeper. Which tasks matter? What cost constraints do you have? Does it make sense to look into a domain-specific model? The right approach is to use MTEB to narrow your options, and then benchmark on your own dataset.
      - paragraph [ref=e237]:
        - text: Looking for an easy way to deploy open-source text embedding models on GPUs? Check out Modal’s text embedding tutorial
        - link "here" [ref=e238] [cursor=pointer]:
          - /url: /docs/examples/amazon_embeddings
        - text: .
