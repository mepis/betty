    - article [ref=e47]:
      - paragraph [ref=e48]:
        - text: The Hugging Face
        - link "MTEB leaderboard" [ref=e49] [cursor=pointer]:
          - /url: https://huggingface.co/spaces/mteb/leaderboard
        - text: has become a standard way to compare embedding models. But the rankings are volatile. New submissions constantly reshuffle the order, and the overall score often hides which models are actually strongest for a given task (i.e., classification, semantic similarity).
      - paragraph [ref=e50]: As a team building scalable and serverless AI infrastructure, we wanted to create a guide that helps cut through that noise. We’ll break down how to read MTEB scores, highlight which open-weight models stand out today, and show where domain-specific models like those tuned for finance or law deliver better results than general-purpose ones.
      - heading "What is the MTEB leaderboard?" [level=2] [ref=e51]
      - paragraph [ref=e52]: "The Massive Text Embedding Benchmark or MTEB evaluates models across eight categories:"
      - list [ref=e53]:
        - listitem [ref=e54]: Classification
        - listitem [ref=e55]: Clustering
        - listitem [ref=e56]: Pair classification
        - listitem [ref=e57]: Reranking
        - listitem [ref=e58]: Retrieval
        - listitem [ref=e59]: Semantic textual similarity (STS)
        - listitem [ref=e60]: Summarization
        - listitem [ref=e61]: Bitext Mining
      - paragraph [ref=e62]: Each model gets a score for every category plus an overall average. The overall score is a useful headline number, but should not be thought of as the whole story.
      - paragraph [ref=e63]: For example, a model tuned for retrieval and semantic textual similarity (the two categories most correlated with production performance in RAG and search) may underperform on clustering or classification, which brings down the average. Conversely, a model that performs steadily across all tasks (but not exceptionally) can end up with a higher average while being weaker at retrieval.
      - paragraph [ref=e64]:
        - text: In other words, the best overall model is not always the top choice for
        - emphasis [ref=e65]: your
        - text: workload. A team that builds retrieval pipelines
        - emphasis [ref=e66]: should
        - text: focus on retrieval and semantic textual similarity over the global average.
      - paragraph [ref=e67]: The next section goes over the factors that matter most when choosing a model.
      - heading "How to Choose a Model" [level=2] [ref=e68]
      - paragraph [ref=e69]: Selecting an embedding model should be driven by context. The following factors matter far more than what the leaderboard highlights.
      - heading "Task Relevance" [level=3] [ref=e70]
      - paragraph [ref=e71]: Not all models are trained with the same end use case in mind. A model that clusters documents cleanly might fail miserably at ranking passages for retrieval, and a model that excels at pair classification could still struggle when used for unsupervised grouping.
      - paragraph [ref=e72]: The danger of relying on the overall score is that it blends these strengths and weaknesses, which conceals the trade-offs that matter in practice. By aligning model choice with the category that matches your workload, you give the embeddings the best chance of capturing the relevant information.
      - paragraph [ref=e73]: The table below shows which factors are most important across different MTEB task categories and how they map to common use cases.
      - table [ref=e74]:
        - rowgroup [ref=e75]:
          - row "Task Category What Matters Most for Models Example Use Cases" [ref=e76]:
            - columnheader "Task Category" [ref=e77]:
              - strong [ref=e78]: Task Category
