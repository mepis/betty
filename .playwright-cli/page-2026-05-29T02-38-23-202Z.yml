        - paragraph [ref=e90]: "Local inference provides developers and researchers with the ability to run Qwen3.6 and Qwen3.5 models on their own hardware, ensuring data privacy and reducing reliance on external APIs. This page provides technical guidance for three primary local execution paths: Hugging Face Transformers for standard GPU environments, llama.cpp for CPU/GPU cross-platform execution via GGUF quantization, and MLX for optimized performance on Apple Silicon."
        - heading "1. Hugging Face Transformers Copy link to header" [level=2] [ref=e91]:
          - text: 1. Hugging Face Transformers
          - button "Copy link to header" [ref=e92] [cursor=pointer]:
            - img [ref=e93]
        - paragraph [ref=e95]:
          - text: The
          - code [ref=e96]: transformers
          - text: library is the primary method for running Qwen models in Python environments. Qwen3.6 models utilize the
          - code [ref=e97]: AutoModelForCausalLM
          - text: and
          - code [ref=e98]: AutoTokenizer
          - text: classes to handle model loading and text generation.
        - heading "Implementation Details Copy link to header" [level=3] [ref=e99]:
          - text: Implementation Details
          - button "Copy link to header" [ref=e100] [cursor=pointer]:
            - img [ref=e101]
        - paragraph [ref=e103]:
          - text: When loading Qwen3.6 models, the
          - code [ref=e104]: trust_remote_code=True
          - text: flag is often required if custom architectural components (like specific MoE kernels or Gated Delta Networks) are not yet merged into the main
          - code [ref=e105]: transformers
          - text: branch. For the sparse MoE models, such as Qwen3.6-35B-A3B, the library manages the routing logic between experts during the forward pass.
        - 'heading "Data Flow: Transformers Inference Copy link to header" [level=3] [ref=e106]':
