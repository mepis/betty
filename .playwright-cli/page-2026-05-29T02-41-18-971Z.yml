        - paragraph [ref=e235]: Developers can adapt Qwen3.6 and Qwen3.5 to specific domains using popular fine-tuning frameworks. The models support diverse training paradigms, including Supervised Fine-Tuning (SFT) and Reinforcement Learning techniques like DPO and GRPO.
