        - paragraph [ref=e126]:
          - text: For users seeking a managed experience without infrastructure overhead, Qwen provides several official entry points. These interfaces leverage the
          - strong [ref=e127]: Thinking Preservation
          - text: and
          - strong [ref=e128]: Agentic Coding
          - text: capabilities inherent in the Qwen3.6 architecture.
        - list [ref=e129]:
          - listitem [ref=e130]:
            - strong [ref=e131]: "Qwen Studio:"
            - text: A full-featured UI available across web, desktop, and mobile platforms.
          - listitem [ref=e132]:
            - strong [ref=e133]: "Alibaba Cloud Model Studio:"
            - text: Provides enterprise-grade APIs compatible with OpenAI and Anthropic specifications, facilitating easy migration for existing applications.
          - listitem [ref=e134]:
            - strong [ref=e135]: "Qwen Code:"
            - text: A specialized terminal-based AI agent optimized for repository-level reasoning and front-end workflows.
          - listitem [ref=e136]:
            - strong [ref=e137]: "Qwen Agent:"
            - text: A framework for programmatic application development.
