        - paragraph [ref=e90]: This page serves as the entry point for developers and researchers looking to integrate Qwen3.6 and Qwen3.5 into their workflows. It outlines the primary pathways for interaction—ranging from managed cloud services to local hardware execution and production-scale deployment.
        - heading "Overview of Integration Paths Copy link to header" [level=2] [ref=e91]:
