          - button "Copy link to header" [ref=e92] [cursor=pointer]:
            - img [ref=e93]
        - paragraph [ref=e95]: The Qwen ecosystem is designed for flexibility, supporting a wide spectrum of hardware and use cases. Users can choose between hosted solutions for rapid prototyping, local inference for privacy and offline development, or high-throughput serving for enterprise applications.
