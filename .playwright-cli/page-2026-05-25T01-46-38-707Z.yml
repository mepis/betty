            - paragraph [ref=e557]: Use a voice-agent session when your application needs an assistant that responds to the user. Use a translation session when your application needs an interpreter that translates the speaker. Use a transcription session when your application needs text from audio without model-generated responses.
            - heading "Voice-agent sessions Copy link to voice agent sessions" [level=3] [ref=e558]:
              - generic [ref=e559]: Voice-agent sessions
              - button "Copy link to voice agent sessions" [ref=e560] [cursor=pointer]:
                - img [ref=e561]
            - paragraph [ref=e563]:
              - text: Voice-agent sessions use the standard Realtime API conversation lifecycle. The client connects to
              - code [ref=e564]: /v1/realtime
              - text: ", sends audio or text, and listens for model responses, tool calls, and session events."
            - paragraph [ref=e565]:
              - text: For most browser voice agents, start with the
              - link "Voice agents" [ref=e566] [cursor=pointer]:
                - /url: /api/docs/guides/voice-agents
              - text: guide. It uses the Agents SDK with WebRTC for browser audio and can connect to server-side tools.
            - generic [ref=e568]:
              - img [ref=e570]
              - paragraph [ref=e576]:
                - text: Realtime 2 adds reasoning to speech-to-speech workflows. Start with
                - code [ref=e577]: reasoning.effort
                - text: set to
                - code [ref=e578]: low
                - text: for most production voice agents, then adjust based on latency tolerance and task complexity. Use the
                - link "Realtime prompting guide" [ref=e579] [cursor=pointer]:
                  - /url: /api/docs/guides/realtime-models-prompting
                - text: to tune reasoning, preambles, tool use, unclear audio, and exact entity capture.
            - heading "Translation sessions Copy link to translation sessions" [level=3] [ref=e580]:
              - generic [ref=e581]: Translation sessions
              - button "Copy link to translation sessions" [ref=e582] [cursor=pointer]:
                - img [ref=e583]
            - paragraph [ref=e585]: "Realtime translation uses a dedicated translation endpoint instead of the standard voice-agent endpoint. Translation sessions are continuous: the client streams audio into the session, and the service streams translated audio and transcript deltas out."
            - paragraph [ref=e586]:
              - text: Translation sessions don’t use the normal assistant turn lifecycle. Don’t call
              - code [ref=e587]: response.create
              - text: ", and don’t wait for the client to commit a user turn before translation begins. For browser media, use WebRTC. For server media pipelines such as phone calls or broadcast ingest, use WebSockets."
            - paragraph [ref=e588]:
              - text: See
              - link "Realtime translation" [ref=e589] [cursor=pointer]:
                - /url: /api/docs/guides/realtime-translation
              - text: for the dedicated endpoint, session configuration, and architecture patterns.
            - heading "Transcription sessions Copy link to transcription sessions" [level=3] [ref=e590]:
              - generic [ref=e591]: Transcription sessions
              - button "Copy link to transcription sessions" [ref=e592] [cursor=pointer]:
                - img [ref=e593]
            - paragraph [ref=e595]:
              - text: You can transcribe audio in more than one way. Use a realtime transcription session when your application needs live transcript deltas from streaming audio. Use the
              - link "Speech to text" [ref=e596] [cursor=pointer]:
                - /url: /api/docs/guides/speech-to-text
              - text: guide for file uploads, request-based transcription, or diarization-focused workflows.
            - paragraph [ref=e597]:
              - text: For realtime transcription,
              - link "gpt-realtime-whisper" [ref=e598] [cursor=pointer]:
                - /url: /api/docs/models/gpt-realtime-whisper
                - code [ref=e599]: gpt-realtime-whisper
              - text: gives you controllable latency. Lower delay settings produce earlier partial text, while higher delay settings can improve transcript quality. Test with your real audio conditions, target languages, accents, and domain vocabulary before choosing a production default.
            - paragraph [ref=e600]:
              - text: See
              - link "Realtime transcription" [ref=e601] [cursor=pointer]:
                - /url: /api/docs/guides/realtime-transcription
              - text: for session configuration and event handling.
            - heading "Choose a connection method Copy link to choose a connection method" [level=2] [ref=e602]:
              - generic [ref=e603]: Choose a connection method
              - button "Copy link to choose a connection method" [ref=e604] [cursor=pointer]:
