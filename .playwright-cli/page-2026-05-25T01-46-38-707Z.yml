            - heading "Safety identifiers Copy link to safety identifiers" [level=2] [ref=e650]:
              - generic [ref=e651]: Safety identifiers
              - button "Copy link to safety identifiers" [ref=e652] [cursor=pointer]:
                - img [ref=e653]
            - paragraph [ref=e655]:
              - text: If your application identifies individual end users, include a
              - link "safety identifier" [ref=e656] [cursor=pointer]:
                - /url: /api/docs/guides/safety-best-practices#implement-safety-identifiers
              - text: with Realtime API requests. Safety identifiers are recommended but not required. They help OpenAI monitor and detect abuse while allowing enforcement to target an individual user rather than your entire organization. Use a stable, privacy-preserving value, such as a hashed internal user ID.
            - paragraph [ref=e657]:
              - text: For Realtime API requests, send the identifier in the
              - code [ref=e658]: OpenAI-Safety-Identifier
              - text: header. When using ephemeral tokens, set the header on the server-side request that creates the client secret so the identifier is bound to that session. When connecting from a trusted server with WebSocket or the unified WebRTC interface, set the header on the connection request.
            - paragraph [ref=e659]:
              - text: Safety identifiers do not carry over from Responses API requests or from other sessions. If you use the Responses API
              - code [ref=e660]: safety_identifier
              - text: parameter elsewhere in your application, pass the same stable value separately when you create or connect each Realtime session.
