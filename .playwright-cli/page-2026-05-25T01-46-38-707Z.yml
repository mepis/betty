            - paragraph [ref=e666]: "If you still have a beta Realtime integration, migrate it to the GA interface before moving forward with new work. The most important changes are:"
            - list [ref=e667]:
              - listitem [ref=e668]:
                - text: Remove the
                - code [ref=e669]: "OpenAI-Beta: realtime=v1"
                - text: header when calling the GA interface.
              - listitem [ref=e670]:
                - text: Use
                - link "POST /v1/realtime/client_secrets" [ref=e671] [cursor=pointer]:
                  - /url: /api/docs/api-reference/realtime-sessions/create-realtime-client-secret
                  - code [ref=e672]: POST /v1/realtime/client_secrets
                - text: to create ephemeral credentials for browser or mobile clients.
              - listitem [ref=e673]:
                - text: Use
                - code [ref=e674]: /v1/realtime/calls
                - text: when establishing WebRTC sessions.
              - listitem [ref=e675]:
                - text: Update session and event shapes for the GA interface. In particular, set
                - code [ref=e676]: session.type
                - text: ", move output audio configuration under"
                - code [ref=e677]: session.audio.output
                - text: ", and use the newer response event names like"
                - code [ref=e678]: response.output_text.delta
                - text: ","
                - code [ref=e679]: response.output_audio.delta
                - text: ", and"
                - code [ref=e680]: response.output_audio_transcript.delta
                - text: .
              - listitem [ref=e681]:
                - text: If you are moving a speech-to-speech app forward, start from the
                - link "Voice agents" [ref=e682] [cursor=pointer]:
                  - /url: /api/docs/guides/voice-agents
                - text: guide. If you are moving a transcription workflow forward, use
                - link "Realtime transcription" [ref=e683] [cursor=pointer]:
                  - /url: /api/docs/guides/realtime-transcription
                - text: .
            - paragraph [ref=e684]:
              - text: See the
