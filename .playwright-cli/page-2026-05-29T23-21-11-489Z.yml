          - paragraph [ref=e170]: This combination prevents optimizing on one axis at the expense of others. A system that scores well on accuracy but requires 26,000 tokens per query is not production-viable. A system with low latency but poor recall is not useful.
          - heading "The research foundation" [level=3] [ref=e171]:
            - strong [ref=e172]: The research foundation
          - paragraph [ref=e173]:
            - text: The Mem0 research paper published at ECAI 2025 (
            - link "arXiv:2504.19413" [ref=e174] [cursor=pointer]:
              - /url: https://arxiv.org/abs/2504.19413
            - text: ) established the first broad head-to-head comparison of ten memory approaches, including literature baselines, open-source tools, RAG, full-context, OpenAI Memory, and Zep on the LoCoMo benchmark. The paper sets the baseline for what selective memory could achieve. Mem0's new algorithm significantly raised that baseline.
          - paragraph [ref=e175]: "In April 2026, we released a new token-efficient memory algorithm built on single-pass hierarchical extraction and multi-signal retrieval. These are the improved benchmark results:"
