            - listitem [ref=e279]:
              - text: •
              - paragraph [ref=e280]: Mastra is a TypeScript-native agent framework.
          - paragraph [ref=e281]:
            - text: The Mastra integration is notable because it is TypeScript-first. The
            - code [ref=e282]: "@mastra/mem0"
            - text: "package provides a first-party integration that does not require managing a Python server. It exposes memory as two tools:"
            - code [ref=e283]: Mem0-memorize
            - text: and
            - code [ref=e284]: Mem0-remember
            - text: ", that Mastra agents use through standard tool-calling, with memories saved asynchronously to avoid blocking response generation."
          - heading "Voice agent integrations" [level=3] [ref=e285]:
            - strong [ref=e286]: Voice agent integrations
          - paragraph [ref=e287]: "Three dedicated voice integrations represent one of the most significant emerging use cases for persistent memory: ElevenLabs for conversational voice AI, LiveKit for real-time voice and video agents, and Pipecat for voice-first AI applications."
          - paragraph [ref=e288]: Voice agents have a memory problem that is qualitatively different from text agents. In a voice interaction, the user cannot scroll back, copy-paste context from a previous session, or manually remind the agent of past conversations. If the agent does not remember, the friction is immediate and obvious.
          - paragraph [ref=e289]:
            - text: "The ElevenLabs integration handles this by exposing two async tool functions:"
            - code [ref=e290]: addMemories
            - text: and
            - code [ref=e291]: retrieveMemories
            - text: ", that the voice agent calls through ElevenLabs' function-calling system. Memory writes are async, so they do not add to voice latency. The"
            - code [ref=e292]: USER_ID
            - text: that scopes memories is derived from the authenticated user's identity in the calling application, not generated by the memory system, keeping memory isolation tied to application-level auth rather than requiring a separate identity layer.
          - heading "Developer tool integrations" [level=3] [ref=e293]:
            - strong [ref=e294]: Developer tool integrations
          - paragraph [ref=e295]:
            - text: Vercel AI SDK (TypeScript web applications via
            - code [ref=e296]: "@mem0/vercel-ai-provider"
            - text: ", supporting Vercel AI SDK V5 as of August 2025 with multimodal file support and Google provider support), AgentOps for agent monitoring and observability, Raycast for AI-powered developer productivity, and OpenClaw via"
            - code [ref=e297]: "@mem0/openclaw-mem0"
            - text: ", and AWS Bedrock for managed LLM infrastructure."
          - heading "The vector store proliferation" [level=3] [ref=e298]:
            - strong [ref=e299]: The vector store proliferation
          - paragraph [ref=e300]: 20 vector store backends are currently supported across Mem0's open-source and cloud offerings.
          - list [ref=e301]:
            - listitem [ref=e302]:
              - text: •
              - paragraph [ref=e303]:
                - strong [ref=e304]: "Self-hosted and open-source:"
                - text: Qdrant, Chroma, Weaviate, Milvus, PGVector, Redis, Elasticsearch, FAISS, Apache Cassandra, Valkey, Kuzu (graph)
            - listitem [ref=e305]:
              - text: •
              - paragraph [ref=e306]:
                - strong [ref=e307]: "Cloud and managed:"
                - text: Pinecone, ChromaDB Cloud, Azure AI Search, Azure MySQL, Amazon S3 Vectors, Databricks Mosaic AI, Neptune Analytics, OpenAI Store, MongoDB
          - paragraph [ref=e308]: The Neptune Analytics additions (September 2025) bring AWS-native graph memory support. Teams running on AWS can use Neptune as a graph backend rather than running a separate Neo4j or Kuzu instance. Apache Cassandra support (v1.0.1, November 2025) and Valkey support (v0.1.118, September 2025) address teams running high-throughput, distributed storage. The FastEmbed integration for local embeddings allows teams to run the entire embedding pipeline on-device without an API call, reducing cost and data egress for privacy-sensitive deployments.
          - 'heading "Graph Memory: From External Graph Stores to Built-In Entity Linking" [level=2] [ref=e309]':
            - strong [ref=e310]: "Graph Memory: From External Graph Stores to Built-In Entity Linking"
          - paragraph [ref=e311]:
            - link "Graph memory" [ref=e312] [cursor=pointer]:
              - /url: https://docs.mem0.ai/migration/oss-v2-to-v3#graph-memory-%E2%86%92-entity-linking
            - text: in AI agents was largely experimental in 2024. By 2026, the production pattern will have changed. The important shift is not “every agent now needs a graph database.” It is that memory systems are moving beyond pure vector similarity.
          - img "Side-by-side comparison of vector memory versus graph memory — vector memory uses embedding similarity while graph memory maps entity relationships and connections" [ref=e313]
          - paragraph [ref=e314]:
            - emphasis [ref=e315]:
              - strong [ref=e316]: "Fig: Comparing vector memory to graph memory"
          - paragraph [ref=e317]:
            - strong [ref=e318]: Vector memory
            - text: retrieves semantically similar facts.
            - strong [ref=e319]: Graph-style memory
            - text: retrieves facts through entities and relationships. Both are useful; neither is sufficient alone.
          - paragraph [ref=e320]:
            - text: In our new
            - link "open-source algorithm" [ref=e321] [cursor=pointer]:
              - /url: https://mem0.ai/research
            - text: ", we replaced external graph store support with built-in entity linking. During"
            - code [ref=e322]: add()
            - text: ", Mem0 extracts entities from each memory and stores them in a parallel entity collection named"
            - code [ref=e323]: "{collection}_entities"
            - text: . At search time, entities from the query are matched against that collection. Those matches then boost relevant memories inside the final combined score.
          - paragraph [ref=e324]: "This is part of the broader multi-signal retrieval redesign: semantic similarity, BM25 keyword matching, and entity matching - all three normalized and fused into one result score."
          - paragraph [ref=e325]:
            - emphasis [ref=e326]:
              - strong [ref=e327]: "The tradeoff:"
            - text: this is no longer a queryable graph interface. The
            - code [ref=e328]: relations
            - text: field from prior versions is gone. Entity relationships now influence retrieval ranking but cannot be traversed directly. For teams that needed the graph interface for custom reasoning, this is a regression. For teams that needed entity-aware retrieval without the deployment overhead of a Neo4j instance, this is a net improvement.
          - 'heading "Multi-Scope Memory: The API Design That Stuck" [level=2] [ref=e329]':
            - strong [ref=e330]: "Multi-Scope Memory: The API Design That Stuck"
          - paragraph [ref=e331]: "One of the cleaner design decisions in the AI agent memory space has been Mem0's four-scope memory model. Every memory write is associated with at least one of:"
          - list [ref=e332]:
            - listitem [ref=e333]:
              - text: •
              - paragraph [ref=e334]:
                - code [ref=e335]: user_id
                - text: for memories that belong to a specific user and persist across all sessions,
            - listitem [ref=e336]:
              - text: •
              - paragraph [ref=e337]:
                - code [ref=e338]: agent_id
                - text: for memories that belong to a specific agent instance,
            - listitem [ref=e339]:
              - text: •
              - paragraph [ref=e340]:
                - code [ref=e341]: run_id
                - text: or
                - code [ref=e342]: session_id
                - text: for memories scoped to a single conversation or workflow run, and
            - listitem [ref=e343]:
              - text: •
              - paragraph [ref=e344]:
                - code [ref=e345]: app_id
                - text: or
                - code [ref=e346]: org_id
                - text: for a shared organizational context.
          - paragraph [ref=e347]: These identifiers determine what gets retrieved at search time, and they compose. A query can scope to a specific user within a specific run, or retrieve all memories for a user across all runs. The retrieval pipeline handles the merge automatically, ranking user memories above session context above raw history.
          - paragraph [ref=e348]:
            - text: The scope model became significantly more useful with metadata filtering in v1.0.0. Before this, memory search was purely semantic. With metadata filtering, memories can carry structured attributes
            - code [ref=e349]: "{\"context\": \"healthcare\"}"
            - text: that are queryable independently of semantic content. This matters for multi-tenant applications where the same user memory store handles different application contexts.
          - heading "Actor-Aware Memory in Multi-Agent Systems" [level=2] [ref=e350]:
            - strong [ref=e351]: Actor-Aware Memory in Multi-Agent Systems
          - paragraph [ref=e352]: "Group Chat with actor-aware memory addresses a real failure mode in multi-agent systems: losing track of who said what."
          - paragraph [ref=e353]: In a shared conversation, a memory like “the user needs help with deployment” is ambiguous. Did the user say that directly? Did a monitoring agent infer it? Or did a planning agent create it as an intermediate step?
          - paragraph [ref=e354]:
            - text: Mem0’s current Group Chat flow uses the message
            - code [ref=e355]: name
            - text: field for attribution. User messages are stored under
            - code [ref=e356]: user_id
            - text: assistant or agent messages are stored under
            - code [ref=e357]: agent_id
            - text: . At retrieval time, agents can filter by participant and session, which helps separate user-stated facts from agent-generated inferences. As multi-agent systems grow more complex, provenance in the memory layer becomes part of reliability, not just debugging.
          - 'heading "Procedural Memory: The Third Memory Type" [level=2] [ref=e358]':
            - strong [ref=e359]: "Procedural Memory: The Third Memory Type"
          - paragraph [ref=e360]: "Most AI memory systems focus on two types:"
          - list [ref=e361]:
            - listitem [ref=e362]:
              - text: •
              - paragraph [ref=e363]:
                - emphasis [ref=e364]: Episodic memory
                - text: ": what happened"
            - listitem [ref=e365]:
              - text: •
              - paragraph [ref=e366]:
                - emphasis [ref=e367]: Semantic memory
                - text: ": what is known"
          - paragraph [ref=e368]:
            - text: "Production agents also need a third:"
            - emphasis [ref=e369]: procedural memory
            - text: .
          - paragraph [ref=e370]: Procedural memory stores how things should be done. For agents, that means learned workflows, coding patterns, tool-use habits, review conventions, and deployment steps. A coding assistant might learn how a team structures pull requests, which test commands they run before merging, and how they handle release notes. This is not just a preference or a fact. It is the process knowledge that the agent should apply consistently.
          - paragraph [ref=e371]: This is an area where Mem0's architecture supports the concept, but the tooling for managing procedural memory specifically is still early-stage.
          - 'heading "OpenMemory MCP: The Privacy-First Branch" [level=2] [ref=e372]':
            - strong [ref=e373]: "OpenMemory MCP: The Privacy-First Branch"
          - paragraph [ref=e374]:
            - link "OpenMemory" [ref=e375] [cursor=pointer]:
              - /url: https://mem0.ai/openmemory
            - text: is Mem0’s local-first memory layer for developers who want persistent memory across AI tools. It runs as an MCP-compatible memory server and works with
            - link "Claude Desktop" [ref=e376] [cursor=pointer]:
              - /url: https://claude.ai/download
            - text: ","
            - link "Cursor" [ref=e377] [cursor=pointer]:
              - /url: https://cursor.so/
            - text: ","
            - link "Windsurf" [ref=e378] [cursor=pointer]:
              - /url: https://codeium.com/windsurf
            - text: ", VS Code, and other MCP-compatible agents. Memory stores locally, with a dashboard for browsing and managing what has been saved."
          - paragraph [ref=e379]: "The key distinction is control. OpenMemory MCP stores memory locally, with a dashboard for browsing and managing what has been saved. Mem0 also offers hosted OpenMemory and a cloud MCP path for lower setup overhead. The audience is different from the managed platform: individual developers, coding-agent users, and teams that want portable memory across tools without building a product-specific memory backend."
          - heading "What Production Memory Actually Requires?" [level=2] [ref=e380]:
            - strong [ref=e381]: What Production Memory Actually Requires?
          - paragraph [ref=e382]: "Six features shipped over the past 18 months that signal what real deployments actually need:"
          - 'img "Diagram showing six production memory requirements shipped by Mem0 over 18 months: async mode, reranking, metadata filtering, timestamp on update, memory depth config, and structured exceptions" [ref=e383]'
          - paragraph [ref=e384]:
            - emphasis [ref=e385]:
              - strong [ref=e386]: "Fig: Production memory requirements"
          - list [ref=e387]:
            - listitem [ref=e388]:
              - text: •
              - paragraph [ref=e389]:
                - strong [ref=e390]: "Async mode as default:"
                - text: Memory writes that block the response pipeline add latency that the user feels. Making
                - code [ref=e391]: async_mode=True
                - text: by default in v1.0.0, the most common production footgun.
            - listitem [ref=e392]:
              - text: •
              - paragraph [ref=e393]:
                - strong [ref=e394]: "Reranking:"
                - text: Vector similarity returns the right candidates but often in the wrong order. A second-pass reranker uses Cohere, Hugging Face, Sentence Transformers, or an LLM-based model to re-score against the query before anything hits the context window.
            - listitem [ref=e395]:
              - text: •
              - paragraph [ref=e396]:
                - strong [ref=e397]: "Metadata filtering:"
                - text: Structured attributes on memories (
                - code [ref=e398]: "{\"context\": \"healthcare\"}"
                - text: ) make scoped queries possible. Filter by project, time range, or any structured property.
            - listitem [ref=e399]:
              - text: •
              - paragraph [ref=e400]:
                - strong [ref=e401]: "Timestamp on update:"
                - text: Backfilling memory stores with accurate creation times matters when migrating historical data. Temporal ordering affects how recency is weighted at retrieval time.
            - listitem [ref=e402]:
              - text: •
              - paragraph [ref=e403]:
                - strong [ref=e404]: "Memory depth and use case config:"
                - text: Inclusion prompts, exclusion prompts, and depth are now project-level settings. A medical assistant stores less and excludes medication specifics; a support bot stores only product and issue history.
            - listitem [ref=e405]:
              - text: •
              - paragraph [ref=e406]:
                - strong [ref=e407]: "Structured exceptions:"
                - text: Error codes and suggested actions in exceptions replace unparseable strings. Boring in the changelog, valuable at 2 am during a production incident.
          - heading "Open Problems" [level=2] [ref=e408]:
            - strong [ref=e409]: Open Problems
          - paragraph [ref=e410]: "Despite the progress, several problems remain genuinely unsolved or only partially addressed:"
          - 'img "Diagram of six open problems in AI agent memory: temporal abstraction, cross-session structure, application-level evaluation, privacy and consent architecture, cross-session identity resolution, and memory staleness" [ref=e411]'
          - paragraph [ref=e412]:
            - emphasis [ref=e413]:
              - strong [ref=e414]: "Fig: Open problems in AI agent memory"
          - list [ref=e415]:
            - listitem [ref=e416]:
              - text: •
              - paragraph [ref=e417]:
                - strong [ref=e418]: "Temporal abstraction:"
                - text: The BEAM 1M to BEAM 10M drop (64.1 -> 48.6) is a ~25% performance loss as context scales 10x. Temporal queries are the hardest category, and the headroom is significant even after the +29.6 point gain in the new algorithm.
            - listitem [ref=e419]:
              - text: •
              - paragraph [ref=e420]:
                - strong [ref=e421]: "Cross-session structure:"
                - text: A user who moves from New York to San Francisco should have that transition understood, not just the new city stored. Most systems treat change as replacement. The right behavior treats it as evolution.
            - listitem [ref=e422]:
              - text: •
              - paragraph [ref=e423]:
                - strong [ref=e424]: "Application-level evaluation:"
                - text: A 91.6 on LoCoMo does not tell you how the system performs on your healthcare or legal workload. Benchmarks measure general recall. Application-level evaluation is still a manual, bespoke process for most teams.
            - listitem [ref=e425]:
              - text: •
              - paragraph [ref=e426]:
                - strong [ref=e427]: "Privacy and consent architecture:"
                - text: Who can inspect stored memories? How long are they retained? How does a user delete them? These are application-layer decisions today. As consumer products add persistent memory, regulatory expectations will become more specific.
            - listitem [ref=e428]:
              - text: •
              - paragraph [ref=e429]:
                - strong [ref=e430]: "Cross-session identity resolution:"
                - text: The memory model assumes a stable
                - code [ref=e431]: user_id
                - text: . Anonymous sessions, multi-device users, and mixed auth flows break that assumption. Resolving whether two interactions came from the same person is an unsolved identity problem at the memory layer.
            - listitem [ref=e432]:
              - text: •
              - paragraph [ref=e433]:
                - strong [ref=e434]: "Memory staleness:"
                - text: A highly-retrieved memory about a user's employer is accurate until they change jobs, at which point it becomes confidently wrong. Decay handles low-relevance memories. Staleness in high-relevance memories is a harder, open problem.
          - heading "Quickstart" [level=2] [ref=e435]:
            - strong [ref=e436]: Quickstart
          - paragraph [ref=e437]: AI agent memory in 2026 is a production engineering discipline with real benchmarks, measurable trade-offs, and a growing body of operational knowledge.
          - paragraph [ref=e438]: The infrastructure to deploy memory has expanded to cover 21 frameworks, 20 vector stores, and three distinct hosting models, including managed cloud, open-source self-hosted, and local MCP. The remaining open problems are real, but they are specific and bounded rather than fundamental.
          - list [ref=e439]:
            - listitem [ref=e440]:
              - text: •
              - paragraph [ref=e441]:
                - strong [ref=e442]: Engineers
                - text: building an agent now can wire in persistent memory in a single afternoon. The
                - link "Mem0 Docker self-host guide" [ref=e443] [cursor=pointer]:
                  - /url: ./self-host-mem0-docker
                - text: covers Qdrant as the vector backend and a working local API in under 20 minutes. If you are running a local open-weight model, the
                - link "Hermes agent tutorial" [ref=e444] [cursor=pointer]:
                  - /url: ./how-to-add-memory-to-your-hermes-agent
                - text: shows how to add session-persistent memory without a cloud dependency.
            - listitem [ref=e445]:
              - text: •
              - paragraph [ref=e446]:
                - strong [ref=e447]: Founders and architects
                - text: "evaluating memory layers: the token efficiency number is the one to stress-test. 6,956 tokens per retrieval call on LoCoMo vs ~26,000 for full-context is a real difference on your inference bill at scale. The"
                - link "benchmark eval framework" [ref=e448] [cursor=pointer]:
                  - /url: https://github.com/mem0ai/memory-benchmarks
                - text: is open-sourced - run it on your own workload before committing to an architecture.
