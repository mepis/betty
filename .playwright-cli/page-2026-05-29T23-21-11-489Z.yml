          - list [ref=e483]:
            - listitem [ref=e484]:
              - text: •
              - paragraph [ref=e485]:
                - strong [ref=e486]: Researchers
                - text: "who want to dig into the evaluation methodology: Our latest"
                - link "token-efficient memory algorithm" [ref=e487] [cursor=pointer]:
                  - /url: ../research
                - text: is the best starting point. The two architectural changes combine semantic similarity, BM25, and entity matching into a single fused score. The biggest gains are on temporal queries (+29.6 points) and multi-hop reasoning (+23.1 points), which are the two categories that most directly reflect how agents handle real user histories.
          - heading "Frequently Asked Questions" [level=2] [ref=e488]:
            - strong [ref=e489]: Frequently Asked Questions
          - heading "Q. What is AI agent memory?" [level=3] [ref=e490]
          - paragraph [ref=e491]: AI agent memory is a persistent storage layer that lets an agent retain information across sessions. Without it, every conversation starts from zero—no user preferences, no prior context, no continuity. With memory, the agent remembers what a user said previously, how their needs changed, and which issues were resolved. In 2026, memory is treated as a dedicated architectural component separate from the model’s context window, not just a longer prompt.
          - heading "Q. How does an AI agent's memory work?" [level=3] [ref=e492]
          - paragraph [ref=e493]: During conversations, the memory layer extracts facts and stores them in a vector database indexed by user, session, and agent identifiers. At the start of a new session, relevant memories are retrieved using semantic similarity, keyword matching, and entity matching, then injected into the context window before the model responds. Only the most relevant facts surface, keeping token usage low and retrieval precise.
          - heading "Q. What are the open problems in AI agent memory?" [level=3] [ref=e494]
          - paragraph [ref=e495]: Key remaining challenges include temporal abstraction at scale; modeling cross-session structure so memories evolve rather than overwrite; application-level evaluation frameworks; robust privacy and consent architectures; cross-session identity resolution across devices and anonymous sessions; and handling memory staleness when previously retrieved facts become incorrect after a user’s circumstances change.
          - heading "Q. What is multi-scope memory?" [level=3] [ref=e496]
          - paragraph [ref=e497]: "Multi-scope memory is a design pattern where each memory write is tagged with one or more identity scopes: user_id for facts that persist across sessions, agent_id for facts tied to a specific agent instance, run_id or session_id for conversation-scoped facts, and app_id or org_id for shared organizational context. These scopes are composed at retrieval time, and the pipeline merges and ranks results automatically."
          - heading "Q. What benchmarks measure AI agent memory quality?" [level=3] [ref=e498]
          - paragraph [ref=e499]: "Three benchmarks commonly define the field: LoCoMo (1,540 questions covering single-hop, multi-hop, open-domain, and temporal recall), LongMemEval (500 questions across categories, including knowledge updates and multi-session recall), and BEAM (evaluations at 1M and 10M token scales across multiple categories). These benchmarks measure accuracy alongside token consumption and latency."
