          - paragraph [ref=e218]:
            - emphasis [ref=e219]:
              - strong [ref=e220]: "Note:"
            - text: The 2025 paper reports tokens per conversation (~26,000 for full-context). The 2026 algorithm reports the average number of tokens per retrieval call (~6,956 for LoCoMo). These are different units measuring the same underlying efficiency.
          - paragraph [ref=e221]: The two largest gains in the new algorithm are on temporal queries (+29.6 points over the old algorithm) and multi-hop reasoning (+23.1 points). These are the two categories that most directly reflect how agents handle real user histories, in which facts accumulate, change, and relate to one another over time.
          - paragraph [ref=e222]:
            - strong [ref=e223]: "Two architectural changes drove these results:"
          - list [ref=e224]:
            - listitem [ref=e225]:
              - text: •
              - paragraph [ref=e226]:
                - strong [ref=e227]: "Single-pass ADD-only extraction:"
                - text: Mem0 now treats agent-generated facts as first-class, storing agent confirmations and recommendations with equal weight to user-stated facts, closing a significant gap in memory coverage.
            - listitem [ref=e228]:
              - text: •
              - paragraph [ref=e229]:
                - strong [ref=e230]: "Multi-signal retrieval:"
                - text: The retrieval stack runs three scoring passes in parallel, including semantic similarity, keyword matching, and entity matching, and fuses the results. The combined score outperforms any individual signal.
