          - heading "The Integration Ecosystem" [level=2] [ref=e249]:
            - strong [ref=e250]: The Integration Ecosystem
          - paragraph [ref=e251]: The fastest-growing surface area in AI agent memory is not the core pipeline. It is the integration layer. As of early 2026, Mem0's official integration documentation covers 21 frameworks and platforms across Python and TypeScript.
          - heading "Agent frameworks" [level=3] [ref=e252]:
            - strong [ref=e253]: Agent frameworks
          - paragraph [ref=e254]: The agent framework coverage reflects how fragmented the agentic ecosystem remains. No single framework has won. Developers are building across all of them, and a memory layer that locks to one framework is a memory layer that developers will not adopt at scale.
          - paragraph [ref=e255]: "The 13 agent framework integrations currently documented:"
          - list [ref=e256]:
            - listitem [ref=e257]:
              - text: •
              - paragraph [ref=e258]: LangChain (Python, plus a separate LangChain Tools integration),
            - listitem [ref=e259]:
              - text: •
              - paragraph [ref=e260]: LangGraph for stateful agent workflows,
            - listitem [ref=e261]:
              - text: •
              - paragraph [ref=e262]: LlamaIndex for document-heavy RAG pipelines,
            - listitem [ref=e263]:
              - text: •
              - paragraph [ref=e264]: CrewAI for multi-agent teams,
            - listitem [ref=e265]:
              - text: •
              - paragraph [ref=e266]: AutoGen for conversational multi-agent systems,
            - listitem [ref=e267]:
              - text: •
