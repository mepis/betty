          - 'heading "Copy link to section Reasoning Mode: Voice-Unviable" [level=3] [ref=e360]':
            - generic "Copy link to section" [ref=e361] [cursor=pointer]:
              - img [ref=e362]
            - strong [ref=e364]: "Reasoning Mode: Voice-Unviable"
          - paragraph [ref=e365]: "Every flagship LLM in 2026 ships with a “reasoning” or “thinking” toggle that allocates extra compute before producing the first token. Reasoning produces meaningfully better answers on hard tasks, but TTFT explodes:"
          - list [ref=e366]:
            - listitem [ref=e367]:
              - strong [ref=e368]: Claude Sonnet 4.6
              - text: – non-reasoning TTFT 1.36s, reasoning TTFT ~135s
            - listitem [ref=e369]:
              - strong [ref=e370]: GPT-5.4
              - text: – high-effort reasoning TTFT ~166s on Artificial Analysis
            - listitem [ref=e371]:
              - strong [ref=e372]: Gemini 3 Flash Preview
              - text: – non-reasoning TTFT ~1.35s; reasoning TTFT higher, voice-unsuitable
            - listitem [ref=e373]:
              - strong [ref=e374]: GPT-5.4 mini
              - text: – medium-effort reasoning TTFT ~8.24s; minimal effort suitable for voice
          - paragraph [ref=e375]:
            - text: "For voice agents, treat reasoning as off by default for the user-facing turn. Use it only on offline agent steps (planning, summarization, post-call analysis) where the latency cost is acceptable. Provider-specific controls: Anthropic’s extended thinking budget, OpenAI’s reasoning effort (minimal/low/medium/high), Gemini’s"
            - code [ref=e376]: thinkingBudget
            - text: / minimal mode.
          - heading "Copy link to section Prompt Caching Math (Voice-Critical)" [level=3] [ref=e377]:
            - generic "Copy link to section" [ref=e378] [cursor=pointer]:
              - img [ref=e379]
            - strong [ref=e381]: Prompt Caching Math (Voice-Critical)
          - paragraph [ref=e382]: Voice agents replay the same system prompt every turn. Without caching, those tokens are re-charged each time. With caching, providers charge a one-time write premium and then read at ~10% of base price for the cache TTL window.
          - paragraph [ref=e383]: "Provider policies as of April 2026:"
          - list [ref=e384]:
            - listitem [ref=e385]:
              - strong [ref=e386]: Anthropic
              - text: ": 5-minute TTL cache write 1.25× base, 1-hour TTL write 2× base, read 0.1× base. The default reverted from 1h back to 5m in March 2026 – set TTL explicitly when constructing requests."
            - listitem [ref=e387]:
              - strong [ref=e388]: Gemini
              - text: ": Implicit caching applies automatically with no code change and zero cost (1,024-token minimum on Flash, 2,048 on Pro). Explicit caching offers a 75% discount on Gemini 2.5+ models with a 32,768-token minimum."
            - listitem [ref=e389]:
              - strong [ref=e390]: OpenAI
              - text: ": Cached input billed at 10% of standard input price; no API change required."
            - listitem [ref=e391]:
              - strong [ref=e392]: DeepSeek
              - text: ": Cache hit roughly 90% off miss price (e.g., V4-Flash ~$0.014 hit vs. $0.14 miss)."
          - paragraph [ref=e393]: Break-even on a cache write usually arrives after 3–4 cache hits within the TTL window. For a voice agent with a 5K-token system prompt and 30-second turn rate, caching reduces system-prompt cost by roughly 90% across a typical 10-minute call.
          - heading "Copy link to section Voice Latency Budget" [level=3] [ref=e394]:
            - generic "Copy link to section" [ref=e395] [cursor=pointer]:
              - img [ref=e396]
            - strong [ref=e398]: Voice Latency Budget
          - paragraph [ref=e399]: "Roughly 70% of voice agent latency comes from LLM inference. A workable target budget for sub-1-second perceived latency:"
          - list [ref=e400]:
            - listitem [ref=e401]: "VAD: ~50ms"
            - listitem [ref=e402]: "STT: ~150ms"
            - listitem [ref=e403]: "LLM TTFT: ~400ms (this is the squeeze point)"
            - listitem [ref=e404]: "TTS: ~150ms"
            - listitem [ref=e405]: "Network round-trip: ~50ms"
            - listitem [ref=e406]:
              - strong [ref=e407]: "Total: ~800ms"
          - paragraph [ref=e408]: That budget is achievable only with non-reasoning LLM variants and well-tuned streaming.
          - heading "Copy link to section Context Window Impact or Input Length" [level=3] [ref=e409]:
            - generic "Copy link to section" [ref=e410] [cursor=pointer]:
              - img [ref=e411]
            - strong [ref=e413]: Context Window Impact or Input Length
          - paragraph [ref=e414]: The context window determines how much conversation history or documents the model can consider at once. Current voice-suitable models sit between 128k (DeepSeek V4-Flash) and 2M tokens (Grok 4.1 Fast), with most at 1M. Larger context enables sophisticated use cases (feeding entire knowledge bases, long dialogs, persistent user preferences) but increases per-turn cost whenever the model re-reads the full context. Prompt caching mitigates most of that cost, as covered above. For a typical customer-support call (10–30 minutes, a few thousand tokens of dialog), any current voice-suitable model has more than enough context; context-window choice becomes a factor only when stuffing large knowledge bases, long multi-session memory, or document attachments into every turn.
          - 'heading "Copy link to section API vs. Self-Hosting: Which is More Cost-Effective?" [level=3] [ref=e415]':
            - generic "Copy link to section" [ref=e416] [cursor=pointer]:
              - img [ref=e417]
            - strong [ref=e419]: "API vs. Self-Hosting: Which is More Cost-Effective?"
          - paragraph [ref=e420]:
            - text: Using a managed API (
            - link "OpenAI" [ref=e421] [cursor=pointer]:
              - /url: https://openai.com/
            - text: ","
            - link "Anthropic" [ref=e422] [cursor=pointer]:
              - /url: https://www.anthropic.com/
            - text: ","
            - link "Google" [ref=e423] [cursor=pointer]:
              - /url: https://cloud.google.com/vertex-ai
            - text: ", etc.) means paying per token, which is easy to manage and automatically scales with usage. Self-hosting an LLM means running it on your own servers or cloud machines, avoiding token fees but paying for the infrastructure instead. The cost trade-off depends on usage volume:"
          - list [ref=e424]:
            - listitem [ref=e425]:
              - text: For
              - strong [ref=e426]: low to moderate usage
              - text: ", APIs are often cheaper and easier (you don’t pay for idle time, and don’t need MLOps engineers to maintain the model). There’s also no large up-front investment."
            - listitem [ref=e427]:
              - text: For
              - strong [ref=e428]: very high usage
              - text: ", self-hosting can save money in the long run. But the general point stands: at large scale, owning the means of generation can be more cost-efficient."
          - paragraph [ref=e429]:
            - text: "There’s a middle ground: managed cloud services like"
            - link "AWS Bedrock" [ref=e430] [cursor=pointer]:
              - /url: https://aws.amazon.com/bedrock/
            - text: (offers pay-per-token access to Claude, Llama, Nova, and other models) or spinning up your own instances on AWS/GCP/Lambda/RunPod to self-host open-weight models like
            - link "Llama 4 Maverick" [ref=e431] [cursor=pointer]:
              - /url: https://www.llama.com/
            - text: ","
            - link "DeepSeek V4-Flash" [ref=e432] [cursor=pointer]:
              - /url: https://api-docs.deepseek.com/
            - text: ","
            - link "Kimi K2.6" [ref=e433] [cursor=pointer]:
              - /url: https://platform.kimi.ai/
            - text: ","
            - link "Qwen 3.5" [ref=e434] [cursor=pointer]:
              - /url: https://qwenlm.github.io/
            - text: ", or"
            - link "GLM-4.6" [ref=e435] [cursor=pointer]:
              - /url: https://z.ai/
            - text: ". With Bedrock, the convenience of pay-per-use pricing comes with enterprise features like VPC integration and data residency controls. For self-hosting, the math depends on GPU rental rates and utilization. April 2026 GPU pricing:"
          - list [ref=e436]:
            - listitem [ref=e437]:
              - strong [ref=e438]: H100
              - text: ": $1.49–$2.99/hr on specialist providers (Lambda, RunPod, CoreWeave); $3–$4/hr on AWS/GCP"
            - listitem [ref=e439]:
              - strong [ref=e440]: B200
              - text: ": from ~$2.65/hr reserved up to ~$3.79/hr on-demand on specialist providers"
            - listitem [ref=e441]:
              - strong [ref=e442]: GB200
              - text: ": reservation-only on most providers; availability expanding through 2026"
          - paragraph [ref=e443]: Keep GPUs busy close to 24/7 and the effective token cost can approach the theoretical hardware cost. With idle time, usage-based API pricing usually wins.
          - paragraph [ref=e444]:
            - text: Another consideration is
            - strong [ref=e445]: rate limits and scaling
            - text: . API providers have request quotas. OpenAI’s enterprise tier on GPT-5.4 supports 10,000+ requests per minute and tens of millions of tokens per minute, but a large call center needs to negotiate enterprise quotas explicitly.
          - blockquote [ref=e446]:
            - paragraph [ref=e447]:
              - strong [ref=e448]:
                - text: Use our
                - link "AI voice agent calculator" [ref=e449] [cursor=pointer]:
                  - /url: https://softcery.com/ai-voice-agents-calculator
                - text: to get a clear monthly estimate based on your model, usage, and setup.
          - 'heading "Copy link to section Deployment Factors: Cloud vs. Self-Hosted, Security & Scalability" [level=2] [ref=e450]':
            - generic "Copy link to section" [ref=e451] [cursor=pointer]:
              - img [ref=e452]
            - strong [ref=e454]: "Deployment Factors: Cloud vs. Self-Hosted, Security & Scalability"
          - paragraph [ref=e455]: Selecting an LLM for enterprise deployment involves more than just model quality; infrastructure, data security, compliance, and scalability are equally critical considerations.
          - heading "Copy link to section Cloud-based APIs (OpenAI, Anthropic, Google, etc.):" [level=3] [ref=e456]:
            - generic "Copy link to section" [ref=e457] [cursor=pointer]:
              - img [ref=e458]
            - strong [ref=e460]: "Cloud-based APIs (OpenAI, Anthropic, Google, etc.):"
          - paragraph [ref=e461]:
            - strong [ref=e462]: "Pros:"
            - text: Easiest to integrate (simple API calls), no ML ops burden, and providers optimize the model’s performance for you. They also handle scaling. If your voice agent’s call volume spikes, the cloud service can accommodate (within your rate limit) by allocating more compute. Updates and improvements to the model are delivered automatically.
          - paragraph [ref=e463]:
            - strong [ref=e464]: "Cons:"
            - text: "Ongoing cost per use, potential data privacy concerns (since user queries are sent to a third-party server), and dependence on the provider’s uptime and policies. While major providers have strong security, some organisations are uneasy sending sensitive data off-site. Compliance requirements can be a barrier - for example, a healthcare company may be legally restricted from using a cloud AI unless certain certifications are in place. There’s also less flexibility: you can’t customize the model beyond what the API allows."
          - heading "Copy link to section Self-hosting (on-prem or private cloud):" [level=3] [ref=e465]:
            - generic "Copy link to section" [ref=e466] [cursor=pointer]:
              - img [ref=e467]
            - strong [ref=e469]: "Self-hosting (on-prem or private cloud):"
          - paragraph [ref=e470]:
            - strong [ref=e471]: "Pros:"
            - text: Full control over data (nothing leaves your servers, which aids privacy and regulatory compliance), and potentially lower marginal cost at scale as discussed. You can also customize the stack - for instance, run real-time voice ASR (speech recognition) and the LLM on the same machine to minimize latency, or fine-tune the model on proprietary data. It also allows using open-source models that aren’t available via API. Data residency and sovereignty concerns are alleviated since you decide where the system runs (important for EU GDPR, which requires controlling cross-border data flow; self-hosting lets you keep data in-country).
          - paragraph [ref=e472]:
            - strong [ref=e473]: "Cons:"
            - text: "The team now owns operations and security. An open-source model server, like any sensitive system, can leak data or face attacks if it’s not set up securely. Maintaining uptime, applying model updates, and scaling the system require skilled engineers. Hardware cost and maintenance add up – running a fleet of GPUs or specialized AI accelerators has a meaningful monthly bill. If usage is sporadic or low-volume, those resources sit idle while still costing money. The quality gap to top proprietary models has narrowed dramatically: GLM-4.6 and GLM-5 from z.AI now lead open-source benchmarks (Quality Index 49.64, comparable to Claude Opus 4.6), DeepSeek V4-Flash matches mid-tier proprietary chat quality, and Llama 4 Maverick competes on latency for self-hosted voice. For most voice use cases in 2026, the gap is no longer a blocker – operations complexity is."
          - heading "Copy link to section Security & Compliance" [level=3] [ref=e474]:
            - generic "Copy link to section" [ref=e475] [cursor=pointer]:
              - img [ref=e476]
            - strong [ref=e478]: Security & Compliance
          - paragraph [ref=e479]: All major cloud LLM providers have taken steps to alleviate data privacy concerns. OpenAI, Google, and Anthropic state that API data is not used to train their models (unlike consumer-facing free services). OpenAI even offers a “zero data retention” mode for enterprises where they don’t store API prompts at all. Microsoft Azure OpenAI service will sign a BAA (Business Associate Agreement) for HIPAA compliance in healthcare and ensures data is siloed to specific regions. These measures mean using a closed model via API can meet strict requirements, but it relies on trusting the vendor and legal safeguards. Some organizations, especially in finance and government, still prefer that sensitive data never leaves their own infrastructure - hence a tilt toward open-source models they can deploy internally.
          - heading "Copy link to section Scalability" [level=3] [ref=e480]:
            - generic "Copy link to section" [ref=e481] [cursor=pointer]:
              - img [ref=e482]
            - strong [ref=e484]: Scalability
          - paragraph [ref=e485]: Cloud APIs abstract this – teams only need to watch their rate limits. For high-throughput scenarios, request higher quotas or move to an enterprise tier. Self-hosting requires scaling out infrastructure. The good news is LLM workloads scale horizontally, so if you need to handle N concurrent calls, you can run N (or fewer, if each can handle multiple threads) instances of the model. Tools like Kubernetes or auto-scaling groups in cloud can spin up more instances when load increases. The latency difference is that cloud API calls might go to geographically load-balanced servers, whereas if you self-host in one region, global users might experience more network latency (unless you deploy servers in multiple regions). For a voice agent, this is usually minor compared to generation time.
          - heading "Copy link to section Fine-tuning and Customisation" [level=2] [ref=e486]:
            - generic "Copy link to section" [ref=e487] [cursor=pointer]:
              - img [ref=e488]
            - strong [ref=e490]: Fine-tuning and Customisation
          - paragraph [ref=e491]: Many providers now allow limited fine-tuning of their models. For example, OpenAI offers fine-tuning on the current GPT-5.4 family (the GPT-4.1 family was retired from ChatGPT on February 13, 2026; API access sunsets on a rolling schedule). Anthropic still does not allow direct fine-tuning of Claude Sonnet 4.6 or Claude Haiku 4.5, but AWS Bedrock supports fine-tuning select models including Claude (with guardrails). Open-weight models like Llama 4 Maverick, DeepSeek V4-Flash, Kimi K2.6, and GLM-4.6 can be fine-tuned freely on private data, which helps when the model needs to learn domain-specific terminology or style (e.g., fine-tuning Llama 4 Maverick on past support transcripts to better handle industry-specific vocabulary).
          - paragraph [ref=e492]: When you fine-tune a closed model through an API, your custom dataset is sent to the provider. Make sure the data isn’t used to retrain the provider’s base model (typically, it isn’t). Fine-tuning usually creates a separate model instance that’s only accessible to you.
          - paragraph [ref=e493]:
            - strong [ref=e494]: "Important:"
            - text: "Fine-tuning is complex, resource-intensive, and requires significant expertise to get right. For most domain-specific use cases, follow this recommended approach:"
          - list [ref=e495]:
            - listitem [ref=e496]:
              - strong [ref=e497]: Start with prompt engineering and context augmentation
              - text: "- Provide relevant domain-specific information directly in the prompt. This is the simplest and fastest approach for most scenarios."
            - listitem [ref=e498]:
              - strong [ref=e499]: Move to RAG (Retrieval-Augmented Generation)
              - text: "- If you have a large knowledge base, implement RAG to dynamically retrieve and inject relevant context into prompts. This scales better than stuffing everything into the prompt."
            - listitem [ref=e500]:
              - strong [ref=e501]: Consider fine-tuning only as a last resort
              - text: "- Fine-tuning should be reserved for cases where the model fundamentally needs to learn new patterns, terminology, or behavior that can’t be achieved through prompting or RAG. It requires substantial training data (typically thousands of examples), computational resources, ongoing maintenance, and expertise to avoid degrading the model’s general capabilities."
          - heading "Copy link to section Tool Integration and Function Calling" [level=2] [ref=e502]:
            - generic "Copy link to section" [ref=e503] [cursor=pointer]:
              - img [ref=e504]
            - strong [ref=e506]: Tool Integration and Function Calling
          - paragraph [ref=e507]: Many voice agents need the LLM to interface with external systems (booking appointments, fetching account info, etc.). All major models discussed in this guide – including GPT-5.4 family, Claude Sonnet 4.6, Claude Haiku 4.5, Gemini 3 Flash, Grok 4.1 Fast, Kimi K2.6, and open-weight models like Llama 4 Maverick, DeepSeek V4-Flash, and GLM-4.6 – support function calling and structured output generation natively. This means they can reliably output JSON, call predefined functions, and interact with external APIs as part of their standard capabilities.
          - paragraph [ref=e508]: "For voice agent applications, function calling enables the LLM to:"
          - list [ref=e509]:
            - listitem [ref=e510]: Query databases for customer information
            - listitem [ref=e511]: Book appointments or update calendars
            - listitem [ref=e512]: Process transactions or check account balances
            - listitem [ref=e513]: Retrieve real-time data (weather, stock prices, etc.)
            - listitem [ref=e514]: Trigger workflows in CRM or ticketing systems
          - paragraph [ref=e515]:
            - text: The quality of function calling varies by model. The
            - link "Berkeley Function Calling Leaderboard (BFCL v3)" [ref=e516] [cursor=pointer]:
              - /url: https://gorilla.cs.berkeley.edu/leaderboard.html
            - text: ranks GLM 4.5 at 76.7% and Qwen3 32B at 75.7% among open models; closed-source leaders include Claude Sonnet 4.6, GPT-5.4, and Gemini 3 Flash. For voice-specific tool reliability, see
            - link "τ-bench / τ²-bench / τ³-bench" [ref=e517] [cursor=pointer]:
              - /url: https://sierra.ai/blog/bench-advancing-agent-benchmarking-to-knowledge-and-voice
            - text: (Sierra) and
            - link "VoiceAgentBench" [ref=e518] [cursor=pointer]:
              - /url: https://arxiv.org/html/2510.07978v1
            - text: .
          - heading "Copy link to section Implementation Strategies for AI Voice Agents" [level=2] [ref=e519]:
            - generic "Copy link to section" [ref=e520] [cursor=pointer]:
              - img [ref=e521]
            - strong [ref=e523]: Implementation Strategies for AI Voice Agents
          - paragraph [ref=e524]: Now that we’ve analysed the key performance metrics, costs, and business impact of different LLMs, the next step is to focus on how to effectively implement AI voice agents using these models. Successful deployment requires careful consideration of model selection, performance optimisation, system integration, security, and continuous improvement.
          - heading "Copy link to section Integrating AI Voice Agents with Business Systems" [level=3] [ref=e525]:
            - generic "Copy link to section" [ref=e526] [cursor=pointer]:
              - img [ref=e527]
            - strong [ref=e529]: Integrating AI Voice Agents with Business Systems
          - paragraph [ref=e530]: For AI voice agents to be truly effective, they must seamlessly integrate with existing business systems. This includes customer databases, CRMs, and support ticketing platforms.
          - list [ref=e531]:
            - listitem [ref=e532]:
              - strong [ref=e533]: CRM integration
              - text: allows AI to retrieve customer history and personalize responses, improving engagement;
            - listitem [ref=e534]:
              - strong [ref=e535]: ERP and order management systems
              - text: enable AI to check order status, process refunds, or update customer records in real-time;
            - listitem [ref=e536]:
              - strong [ref=e537]: Function calling and API integration
              - text: let AI trigger automated actions, such as scheduling appointments or fetching account details.
          - paragraph [ref=e538]:
            - text: For voice-based AI to interpret user requests correctly and sound natural, it’s critical to choose the right Speech-to-Text (STT) and Text-to-Speech (TTS) solutions. See our
            - link "comprehensive STT and TTS selection guide" [ref=e539] [cursor=pointer]:
              - /url: /lab/how-to-choose-stt-tts-for-ai-voice-agents-in-2025-a-comprehensive-guide
            - text: comparing 13 providers with latency benchmarks, accuracy metrics, and cost analysis.
          - heading "Copy link to section Measuring Success and Continuous Improvement" [level=3] [ref=e540]:
            - generic "Copy link to section" [ref=e541] [cursor=pointer]:
              - img [ref=e542]
            - strong [ref=e544]: Measuring Success and Continuous Improvement
          - paragraph [ref=e545]: "AI voice agents require ongoing optimisation to maintain high-quality interactions. Businesses should track key performance indicators (KPIs) to evaluate effectiveness:"
          - list [ref=e546]:
            - listitem [ref=e547]:
