            - strong [ref=e290]: Pricing per Million Tokens
          - paragraph [ref=e291]: Each model has different pricing, especially the proprietary ones offered via API. The table below summarizes the API usage costs (in USD per 1 million tokens processed). “Input” refers to prompt tokens and “output” refers to generated tokens. For reference, 1 million tokens is roughly 750k words (about 3,000-4,000 pages of text).
