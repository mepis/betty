          - paragraph [ref=e270]:
            - text: The most reliable models for accuracy-first voice deployments –
            - link "Claude Sonnet 4.6" [ref=e271] [cursor=pointer]:
              - /url: https://www.anthropic.com/
            - text: ","
            - link "GPT-5.4" [ref=e272] [cursor=pointer]:
              - /url: https://developers.openai.com/
            - text: ", and"
            - link "Gemini 3 Flash" [ref=e273] [cursor=pointer]:
              - /url: https://ai.google.dev/
            - text: – score among the highest available benchmarks. Reserve their reasoning modes for non-voice agent steps (planning, summarization, post-call analysis) where 5–200+ second TTFT is acceptable. Use their non-reasoning variants for the user-facing voice turn, and use cheaper fast models (Haiku 4.5, GPT-5.4 nano, Grok 4.1 Fast, Gemini 3.1 Flash-Lite) for routing and high-volume work.
          - 'heading "Business Impact: Why Accuracy Matters" [level=4] [ref=e274]':
            - strong [ref=e275]: "Business Impact: Why Accuracy Matters"
          - list [ref=e276]:
            - listitem [ref=e277]:
              - strong [ref=e278]: Finance
              - text: ": Mistakes in AI-generated advice on loans, interest rates, or transactions can lead to compliance issues and financial losses. Banks typically use high-accuracy models and validate responses with real-time data sources or human review."
            - listitem [ref=e279]:
              - strong [ref=e280]: Healthcare
              - text: ": AI in medical support must be highly reliable. Even the best models (~80% accuracy) can still make errors, so they should be used to assist, not replace human professionals. A voice agent might draft an answer, but a curated medical database or human expert should verify before providing final information."
