          - heading "Business Impact of Latency" [level=4] [ref=e176]:
            - strong [ref=e177]: Business Impact of Latency
          - paragraph [ref=e178]:
            - text: In real-world deployments, lower latency has direct benefits for user engagement and efficiency. Users are more likely to continue interacting when responses are prompt - a delay beyond about one second can start to feel awkward, and indeed studies show that delays over 1 second can frustrate users in voice interactions. Especially in customer-facing scenarios (e.g. a support hotline), shaving even a second off response times can yield measurable improvements in satisfaction. For instance, McKinsey industry
            - link "report" [ref=e179] [cursor=pointer]:
              - /url: https://www.mckinsey.com/capabilities/operations/our-insights/smart-scheduling-how-to-solve-workforce-planning-challenges-with-ai
            - text: found that a one-minute increase in average call handle time leads to a 10% drop in customer satisfaction scores.
          - paragraph [ref=e180]: "While our focus is on seconds or fractions of a second per response, it all adds up: when AI agents respond in seconds or fractions of a second, they resolve queries faster, which shortens call times and reduces customer wait times. Faster responses also lower operating costs: if an AI agent works 10–20% faster due to low latency, it can handle more calls or free up human agents sooner, improving overall contact center efficiency."
          - heading "Copy link to section Accuracy & Coherence Metrics" [level=3] [ref=e181]:
            - generic "Copy link to section" [ref=e182] [cursor=pointer]:
              - img [ref=e183]
            - strong [ref=e185]: Accuracy & Coherence Metrics
          - paragraph [ref=e186]: "Accuracy evaluation for voice-agent use cases relies on a mix of general-reasoning benchmarks and agentic / tool-use benchmarks. The most relevant in April 2026:"
          - list [ref=e187]:
            - listitem [ref=e188]:
              - strong [ref=e189]: MMLU-Pro
              - text: evaluates the model on a harder, more discriminating expansion of the original MMLU 57-subject test. Higher MMLU-Pro (%) means stronger broad world knowledge.
            - listitem [ref=e190]:
              - link "GPQA (Graduate-Level Google-Proof Q&A)" [ref=e191] [cursor=pointer]:
                - /url: https://arxiv.org/abs/2311.12022
                - strong [ref=e192]: GPQA (Graduate-Level Google-Proof Q&A)
              - text: presents extremely challenging questions (often college or grad-level problems in sciences) that aren’t easily solved by memorization or a quick web search.
            - listitem [ref=e193]:
              - strong [ref=e194]: BFCL v3
              - text: (
              - link "Berkeley Function Calling Leaderboard" [ref=e195] [cursor=pointer]:
                - /url: https://gorilla.cs.berkeley.edu/leaderboard.html
              - text: ) measures real-world function-calling reliability – directly relevant for voice agents that book appointments, query CRMs, or trigger workflows.
            - listitem [ref=e196]:
              - strong [ref=e197]: τ-bench / τ²-bench / τ³-bench
              - text: (
              - link "Sierra benchmarks" [ref=e198] [cursor=pointer]:
                - /url: https://sierra.ai/blog/bench-advancing-agent-benchmarking-to-knowledge-and-voice
              - text: ) measure tool-agent-user interaction quality. The 2026 update added voice full-duplex support (τ-Voice), making it a natural fit for voice agent selection.
            - listitem [ref=e199]:
              - strong [ref=e200]: VoiceAgentBench
              - text: (
              - link "arXiv 2510.07978" [ref=e201] [cursor=pointer]:
                - /url: https://arxiv.org/html/2510.07978v1
              - text: ) is a voice-native evaluation suite that emerged in 2026 specifically for voice agent reasoning and tool use.
