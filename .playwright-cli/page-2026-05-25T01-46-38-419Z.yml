                  - listitem [ref=e143]:
                    - strong [ref=e144]: "Transport:"
                    - text: WebRTC is the default recommendation for browser or mobile clients; WebSocket is the server-to-server path.
                  - listitem [ref=e145]:
                    - strong [ref=e146]: "Security:"
                    - text: standard OpenAI API keys belong only on your backend. Browser/mobile sessions should use the unified WebRTC interface or short-lived client secrets created by your server.
                  - listitem [ref=e147]:
                    - strong [ref=e148]: "Cost control:"
                    - text: Realtime billing is token/session based for conversational sessions and varies by model. Read usage from
                    - code [ref=e149]: "`response.done`"
                    - text: ", account for separate input transcription costs, and use prompt caching-friendly session design."
