                    - strong [ref=e136]: "Best fit:"
                    - text: low-latency speech-to-speech agents, live support copilots, language practice, interruptible voice search, and workflows where users expect natural turn taking.
                  - listitem [ref=e137]:
                    - strong [ref=e138]: "Not always best:"
                    - text: file transcription, voice notes, batch summarization, or approval-heavy workflows where a chained speech-to-text → text agent → text-to-speech pipeline is easier to inspect and control.
                  - listitem [ref=e139]:
                    - strong [ref=e140]: "Model path:"
                    - text: OpenAI's Realtime overview points low-latency voice agents at
                    - code [ref=e141]: "`gpt-realtime-2`"
                    - text: ; older
                    - code [ref=e142]: "`gpt-4o-realtime-preview`"
