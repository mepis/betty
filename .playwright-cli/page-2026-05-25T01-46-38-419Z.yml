                  - text: helpers. Use WebSocket from a trusted server for phone, contact-center, or backend media pipelines. Keep API keys server-side, create ephemeral client secrets for browser/mobile clients, set
                  - code [ref=e117]: "`OpenAI-Safety-Identifier`"
                  - text: from your backend, and confirm current model, voice, and pricing details before launch because Realtime API surfaces change faster than standard text APIs.
