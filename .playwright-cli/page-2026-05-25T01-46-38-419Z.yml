                - paragraph [ref=e212]: "Two caveats matter in production:"
                - list [ref=e213]:
                  - listitem [ref=e214]:
                    - strong [ref=e215]: Voice availability is model-specific.
                    - text: The Realtime conversations guide is the source to check before launch because Text-to-Speech and Realtime voice lists are not identical.
                  - listitem [ref=e216]:
                    - strong [ref=e217]: Voice is effectively a session-level product decision.
                    - text: OpenAI documents that most session properties can be updated at any time, but
                    - code [ref=e218]: "`voice`"
                    - text: cannot be changed after the model has responded with audio once. If enterprise and consumer users need different tones, choose the voice before audio output begins.
                - heading "Recommended architecture for a browser voice agent" [level=2] [ref=e219]:
                  - link "Recommended architecture for a browser voice agent" [ref=e220] [cursor=pointer]:
                    - /url: "#recommended-architecture-for-a-browser-voice-agent"
                - paragraph [ref=e221]:
                  - text: "OpenAI's voice-agent guidance describes the usual browser flow this way: your server creates an ephemeral client secret, the frontend creates a"
                  - code [ref=e222]: "`RealtimeSession`"
                  - text: ", the session connects over WebRTC, and the agent handles audio turns, tools, interruptions, and handoffs in that session."
                - paragraph [ref=e223]: "A production browser architecture usually looks like this:"
                - code [ref=e225]: Browser microphone → WebRTC peer connection → OpenAI Realtime session → remote audio stream back to browser Browser data channel ↔ session events, tool results, UI state, transcripts Your backend → creates client secret / unified WebRTC call → attaches safety identifier → owns tools, account permissions, logging policy, budgets
                - paragraph [ref=e226]: Use this shape when latency is the product. Do not route all browser audio through your application server unless you need server-side media processing, compliance recording, telephony integration, or a network environment where WebRTC is not viable.
                - 'heading "WebRTC setup choices: unified interface vs client secrets" [level=2] [ref=e227]':
                  - 'link "WebRTC setup choices: unified interface vs client secrets" [ref=e228] [cursor=pointer]':
                    - /url: "#webrtc-setup-choices-unified-interface-vs-client-secrets"
                - paragraph [ref=e229]: "OpenAI's WebRTC guide describes two browser connection options:"
                - table [ref=e230]:
                  - rowgroup [ref=e231]:
                    - row "WebRTC option How it works Tradeoff" [ref=e232]:
                      - columnheader "WebRTC option" [ref=e233]
                      - columnheader "How it works" [ref=e234]
                      - columnheader "Tradeoff" [ref=e235]
                  - rowgroup [ref=e236]:
                    - 'row "Unified interface Browser posts SDP to your server; your server sends SDP + session config to `/v1/realtime/calls` with a standard API key and returns OpenAI''s SDP answer. Simpler credential model; your server is in the critical path during session initialization." [ref=e237]':
                      - cell "Unified interface" [ref=e238]
                      - 'cell "Browser posts SDP to your server; your server sends SDP + session config to `/v1/realtime/calls` with a standard API key and returns OpenAI''s SDP answer." [ref=e239]':
                        - text: Browser posts SDP to your server; your server sends SDP + session config to
                        - code [ref=e240]: "`/v1/realtime/calls`"
                        - text: with a standard API key and returns OpenAI's SDP answer.
                      - cell "Simpler credential model; your server is in the critical path during session initialization." [ref=e241]
                    - row "Ephemeral client secret Browser asks your server for a client secret; browser then sends SDP to the Realtime API with that short-lived credential. Keeps the standard API key off the client while letting the browser establish the peer connection directly." [ref=e242]:
                      - cell "Ephemeral client secret" [ref=e243]
                      - cell "Browser asks your server for a client secret; browser then sends SDP to the Realtime API with that short-lived credential." [ref=e244]
                      - cell "Keeps the standard API key off the client while letting the browser establish the peer connection directly." [ref=e245]
                - paragraph [ref=e246]:
                  - text: In both designs, the standard OpenAI API key stays on your backend. If you assign stable end-user identifiers, set
                  - code [ref=e247]: "`OpenAI-Safety-Identifier`"
                  - text: from your trusted server. OpenAI's docs call out that with ephemeral tokens, the safety identifier should be set on the server-side request that creates the client secret so the identifier is bound to the resulting session.
                - paragraph [ref=e248]:
                  - text: A current-style session configuration puts audio settings under
                  - code [ref=e249]: "`session.audio`"
                  - text: ":"
                - code [ref=e251]: "const session = { type: \"realtime\", model: \"gpt-realtime-2\", output_modalities: [\"audio\"], audio: { input: { format: { type: \"audio/pcm\", rate: 24000 }, turn_detection: { type: \"semantic_vad\" }, }, output: { format: { type: \"audio/pcm\" }, voice: \"marin\", }, }, instructions: \"Speak clearly and briefly. Confirm before taking actions.\", };"
                - paragraph [ref=e252]:
                  - text: If you are updating an older tutorial, check for stale fields. The GA-shaped docs use
                  - code [ref=e253]: "`session.type`"
                  - text: ","
                  - code [ref=e254]: "`output_modalities`"
                  - text: ","
                  - code [ref=e255]: "`audio.input`"
                  - text: ","
                  - code [ref=e256]: "`audio.output`"
                  - text: ", and newer response events such as"
                  - code [ref=e257]: "`response.output_audio.delta`"
                  - text: and
                  - code [ref=e258]: "`response.output_audio_transcript.delta`"
                  - text: . Older snippets that use
                  - code [ref=e259]: "`gpt-4o-realtime-preview`"
                  - text: ","
                  - code [ref=e260]: "`modalities`"
                  - text: ","
                  - code [ref=e261]: "`voice`"
                  - text: at the top level, or
                  - code [ref=e262]: "`response.audio.delta`"
                  - text: need review before copy-paste.
                - heading "When to choose WebSocket instead" [level=2] [ref=e263]:
                  - link "When to choose WebSocket instead" [ref=e264] [cursor=pointer]:
                    - /url: "#when-to-choose-websocket-instead"
                - paragraph [ref=e265]: WebSocket is still the right path for server-to-server Realtime integrations. OpenAI's WebSocket guide explicitly positions it for backend systems and recommends WebRTC for browser/mobile clients.
                - paragraph [ref=e266]: "Choose WebSocket when:"
                - list [ref=e267]:
                  - listitem [ref=e268]: you are connecting a phone/SIP/contact-center media stream;
                  - listitem [ref=e269]: you need your backend to inspect, transform, or store audio packets before they reach OpenAI;
                  - listitem [ref=e270]: your workflow already runs in a stateful worker and browser WebRTC is not involved;
                  - listitem [ref=e271]: you need tighter control over reconnect behavior, call recording, region routing, or custom queueing.
                - paragraph [ref=e272]: "The minimal server-side connection shape is simple:"
                - code [ref=e274]:
                  - text: "import WebSocket from \"ws\"; const ws = new WebSocket( \"wss://api.openai.com/v1/realtime?model=gpt-realtime-2\", { headers: { Authorization:"
                  - generic [ref=e275]: "`Bearer ${process.env.OPENAI_API_KEY}`"
                  - text: ", \"OpenAI-Safety-Identifier\": \"hashed-internal-user-id\", }, }, ); ws.on(\"open\", () => { ws.send(JSON.stringify({ type: \"session.update\", session: { type: \"realtime\", model: \"gpt-realtime-2\", output_modalities: [\"audio\"], audio: { input: { format: { type: \"audio/pcm\", rate: 24000 } }, output: { format: { type: \"audio/pcm\" }, voice: \"marin\" }, }, instructions: \"Be concise and ask before taking irreversible actions.\", }, })); });"
                - paragraph [ref=e276]: "With WebSocket you also own more of the audio loop: base64-encoded input audio chunks, playback buffering, interruption handling, transcript storage, reconnect UI, and session cleanup. That extra control is useful for backend media products, but it is unnecessary work for most browser assistants."
                - heading "Build the product contract before the demo" [level=2] [ref=e277]:
                  - link "Build the product contract before the demo" [ref=e278] [cursor=pointer]:
                    - /url: "#build-the-product-contract-before-the-demo"
                - paragraph [ref=e279]: "A Realtime demo can feel impressive in an afternoon. A production voice app needs a stricter product contract:"
                - list [ref=e280]:
                  - listitem [ref=e281]:
                    - strong [ref=e282]: "Allowed actions:"
                    - text: which tools may run during a spoken session, which need confirmation, and which are read-only.
                  - listitem [ref=e283]:
                    - strong [ref=e284]: "Turn-taking rules:"
                    - text: when the assistant should interrupt itself, ask a clarifying question, or stop speaking.
                  - listitem [ref=e285]:
                    - strong [ref=e286]: "Transcript policy:"
                    - text: what is stored, for how long, and whether users can delete it.
                  - listitem [ref=e287]:
                    - strong [ref=e288]: "Fallback path:"
                    - text: what the UI does when the session expires, the network drops, or Realtime rate limits update mid-call.
                  - listitem [ref=e289]:
                    - strong [ref=e290]: "Voice identity disclosure:"
                    - text: users should know they are speaking with an AI-generated voice, especially in support, sales, education, healthcare, or regulated workflows.
                - paragraph [ref=e291]: "OpenAI's voice-agent docs also make a strategic point: voice uses the same core agent concepts as text. Tools, handoffs, guardrails, human review, observability, and durable state still belong in your application design; the audio surface only changes the transport and interaction loop."
                - heading "Pricing and usage caveats" [level=2] [ref=e292]:
                  - link "Pricing and usage caveats" [ref=e293] [cursor=pointer]:
                    - /url: "#pricing-and-usage-caveats"
                - paragraph [ref=e294]: Avoid hard-coding dollar math into the product plan unless you have just checked the current model page. OpenAI's Realtime cost guide says conversational Realtime sessions accrue input and output tokens across text, audio, and image modalities, while streaming translation and transcription sessions are billed by audio duration. Prices vary by model and are listed on the model pages.
                - paragraph [ref=e295]: "What you can monitor reliably:"
                - list [ref=e296]:
                  - listitem [ref=e297]:
                    - code [ref=e298]: "`response.done`"
                    - text: events include usage details such as
                    - code [ref=e299]: "`input_tokens`"
                    - text: ","
                    - code [ref=e300]: "`output_tokens`"
                    - text: ", audio token details, and cached token details."
                  - listitem [ref=e301]:
                    - text: Input transcription, if enabled, is billed separately from the speech-to-speech response model and has usage details on the
                    - code [ref=e302]: "`conversation.item.input_audio_transcription.completed`"
                    - text: event.
                  - listitem [ref=e303]: Prompt caching can reduce repeated input cost in multi-turn sessions, but it is best-effort. Keep instructions, tool definitions, and stable context early in the session history to improve cache reuse.
                - paragraph [ref=e304]: "Practical cost controls:"
                - list [ref=e305]:
                  - listitem [ref=e306]: cap session length at the product level instead of letting idle tabs run;
                  - listitem [ref=e307]: use concrete output token limits for verbose assistants;
                  - listitem [ref=e308]: summarize or trim transcript history deliberately rather than constantly mutating the whole conversation;
                  - listitem [ref=e309]: track cost per completed task, not just cost per minute, because low latency may increase completion rates enough to justify the premium;
                  - listitem [ref=e310]: keep a chained STT → text agent → TTS fallback in the comparison set for high-volume or compliance-heavy workloads.
                - heading "Testing checklist before launch" [level=2] [ref=e311]:
                  - link "Testing checklist before launch" [ref=e312] [cursor=pointer]:
                    - /url: "#testing-checklist-before-launch"
                - paragraph [ref=e313]: "Use a small live test suite, not only happy-path microphone demos:"
                - list [ref=e314]:
                  - listitem [ref=e315]: Can a new user complete the first WebRTC permission prompt and hear a response?
                  - listitem [ref=e316]: Does barge-in stop local playback quickly when the user interrupts?
                  - listitem [ref=e317]:
