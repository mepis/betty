          - listitem [ref=e281]: Need strong consistency
          - listitem [ref=e282]: Have DevOps expertise
        - heading "Choose FAISS if:" [level=3] [ref=e283]
        - list [ref=e284]:
          - listitem [ref=e285]: Dataset fits in memory (<10M vectors)
          - listitem [ref=e286]: Need absolute fastest search
          - listitem [ref=e287]: Have engineering resources to build wrapper
        - heading "Migration Strategy" [level=2] [ref=e288]
        - paragraph [ref=e289]: Start with Pinecone for speed, migrate to self-hosted (Qdrant/Weaviate) at scale for cost optimization. Typical migration at 50-100M vectors or $500+/month cloud costs.
