                - generic [ref=e307]:
                  - code [ref=e308]: "from deepeval.test_case import LLMTestCase from deepeval.metrics import ContextualPrecisionMetric # Replace this with the actual output from your LLM application actual_output = \"We offer a 30-day full refund at no extra cost.\" # Replace this with the expected output of your RAG generator expected_output = \"You are eligible for a 30 day full refund at no extra cost.\" # Replace this with the actual retrieved context from your RAG pipeline retrieval_context = [\"All customers are eligible for a 30 day full refund at no extra cost.\"] metric = ContextualPrecisionMetric(threshold=0.7, model=\"gpt-4\") test_case = LLMTestCase( input=\"What if these shoes don't fit?\", actual_output=actual_output, expected_output=expected_output, retrieval_context=retrieval_context ) metri.measure(test_case) print(metric.score, metric.reason)"
