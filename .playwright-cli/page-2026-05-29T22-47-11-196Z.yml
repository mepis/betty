          - generic [ref=e66]:
            - paragraph [ref=e67]: Building a Retrieval-Augmented Generation (RAG) pipeline isn’t the mission impossible — knowing if it’s actually working is. You might fine-tune prompts, tweak retrievers, and switch models, but if your system is still hallucinating or citing the wrong context, what’s really broken? Without the right RAG evaluation metrics, it’s guesswork.
            - paragraph [ref=e68]: "Sure, 2025 is the year of AI agents, but let’s face it: most agentic system still has a RAG pipeline somewhere in their AI workflow, and it’s vital that you’re about to secure the quality of that too."
            - paragraph [ref=e69]: "So, in this article, we’ll go through everything you’ll need for RAG evaluation:"
            - list [ref=e70]:
              - listitem [ref=e71]: What is RAG evaluation, how is it different from regular LLM and AI agent evaluation, and common points of failure
              - listitem [ref=e72]: Retriever metrics such as contextual relevancy, recall, and precision
              - listitem [ref=e73]: Generator metrics such as answer relevancy and faithfulness
              - listitem [ref=e74]: "How to run RAG evaluation: both end-to-end and at a component-level"
              - listitem [ref=e75]: Best practices, including RAG evaluation in CI pipelines and post-deployment monitoring
            - paragraph [ref=e76]:
              - text: All of course, this all includes code samples using
              - link "DeepEval ⭐, an open-source LLM evaluation framework" [ref=e77] [cursor=pointer]:
                - /url: https://github.com/confident-ai/deepeval
              - text: . Let’s get started.
            - generic [ref=e78]:
              - heading "TL;DR" [level=2] [ref=e79]:
