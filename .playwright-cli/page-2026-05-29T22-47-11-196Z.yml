              - heading "Agentic RAG Evaluation Metrics" [level=2] [ref=e517]:
                - link "Agentic RAG Evaluation Metrics" [ref=e518] [cursor=pointer]:
                  - /url: "#agentic-rag-evaluation-metrics"
              - paragraph [ref=e519]:
                - text: When working with RAG in AI agents, the retrieval and generation metrics from above still apply. However, you'll want to also include end-to-end metrics to assess the overall success of your RAG AI agent. We already went through more of
                - link "evaluating AI agents in this article" [ref=e520] [cursor=pointer]:
                  - /url: https://www.confident-ai.com/blog/definitive-ai-agent-evaluation-guide
                - text: "in-depth, but here is a quick diagram of a what an AI agent is:"
              - img "Single-turn AI agent with tools and ability to handoff to other agents"
              - paragraph [ref=e521]:
                - emphasis [ref=e522]: Single-turn AI agent with tools and ability to handoff to other agents
              - paragraph [ref=e523]: As you can see, an AI agent is an AI system with an LLM which has the ability to reason and determine whether certain tools has to be involved in order to complete a task. In the context of agentic RAG, this means tools that can have access to knowledge bases, which includes things like Qdrant's MCP server if you data is kept in this vector database, or an API to hit ChomaDB's servers directly to fetch data you have indexed.
              - paragraph [ref=e524]: When considering agentic RAG, a common reason things fail is because it is not able to call the correct tools with the correct arguments. This leads to a failure in completing the task at hand, leading to a decrease in your agentic RAG's overall success rate.
              - paragraph [ref=e525]:
                - text: You should 100% click on
                - link "this article" [ref=e526] [cursor=pointer]:
                  - /url: https://www.confident-ai.com/blog/definitive-ai-agent-evaluation-guide
                - text: "to learn more about the task completion and argument correctness metric, but in summary the two main metrics you ought to consider are:"
              - list [ref=e527]:
                - listitem [ref=e528]:
                  - text: "Task completion: A"
                  - strong [ref=e529]: single-turn, end-to-end
                  - text: LLM-as-a-judge metric that measures an AI agent’s degree of task completion based on an LLM trace
                - listitem [ref=e530]:
                  - text: "Argument correctness: A"
                  - strong [ref=e531]: component-level
                  - text: LLM-as-a-judge metric that assesses an LLM’s ability to generate the correct input argument parameters for a certain tool call
            - generic [ref=e532]:
              - heading "RAG Evaluation Workflows Best Practices" [level=2] [ref=e533]:
                - link "RAG Evaluation Workflows Best Practices" [ref=e534] [cursor=pointer]:
                  - /url: "#rag-evaluation-workflows-best-practices"
              - paragraph [ref=e535]: There are a few evaluation workflows you can adopt, mainly around automating the testing of your RAG pipeline in different ways (end-to-end vs component-level) and environments (in a script vs in CI/CD).
              - heading "End-to-end" [level=3] [ref=e536]
              - paragraph [ref=e537]:
                - text: End-to-end evaluation refers to the process of treating your RAG pipeline as a blackbox and only caring about the “observable” inputs, outputs, and retrieval context of your LLM system. Most RAG evaluation modeled as end-to-end systems, while
                - link "LLM agent evaluation is more appropriate on the component-level" [ref=e538] [cursor=pointer]:
                  - /url: https://www.confident-ai.com/blog/llm-agent-evaluation-complete-guide
                - text: (more on this later).
              - paragraph [ref=e539]: "This is straightforward using tools like DeepEval, simply have a dataset of inputs to loop through, and generate responses for each input. Finally, apply the 5 metrics you’ve learnt from above (as well as any custom ones), and that’s all:"
              - generic [ref=e540]:
                - generic [ref=e541]:
                  - img [ref=e542]
                  - generic [ref=e547]: python
                - generic [ref=e548]:
                  - code [ref=e549]: "from deepeval.metrics import ( AnswerRelevancyMetric, FaithfulnessMetric, ContextualRelevancyMetric, ContextualRecallMetric, ContextualPrecisionMetric ) from deepeval import evaluate test_cases = [] inputs = [\"...\", \"...\", \"...\", \"...\"] for input in inputs: # Replace your_llm_app() actual_output, retrieval_context = your_llm_app(input) test_case = LLMTestCase( input=input, actual_output=res, retrieval_context=retrieval_context ) test_cases.append(test_case) evaluate( test_cases=test_cases, metrics=[ AnswerRelevancyMetric(), FaithfulnessMetric(), ContextualRelevancyMetric(), ContextualRecallMetric(), ContextualPrecisionMetric(), ] )"
                  - button "Copy code" [ref=e550] [cursor=pointer]:
                    - img [ref=e551]
              - paragraph [ref=e554]:
                - text: The full documentation for end-to-end evaluation
                - link "available here" [ref=e555] [cursor=pointer]:
                  - /url: https://deepeval.com/docs/evaluation-end-to-end-llm-evals
                - text: ", which you’ll also get a nice testing report if used alongside DeepEval’s cloud platform Confident AI."
              - paragraph [ref=e556]:
                - img "Testing Reports on Confident AI" [ref=e557]
                - text: "*Testing Reports on"
                - link "Confident AI" [ref=e558] [cursor=pointer]:
                  - /url: https://www.confident-ai.com/
                - text: "*"
              - heading "Component-Level" [level=3] [ref=e559]
              - paragraph [ref=e560]: Component-level evaluation works similar to end-to-end in the context of RAG evaluation, but only now we treat your retriever and generator as a nested component within your RAG pipeline instead.
              - paragraph [ref=e561]:
                - text: This avoids messy rewrites of your codebase, returning variables in awkward places just to run evals (as seen in the previous example where we had to return both the response and retrieval context from
                - code [ref=e562]: your_llm_app
                - text: )
              - paragraph [ref=e563]: "You’ll also create test cases at runtime instead of outside the context of an evaluation. Here’s a quick example:"
              - generic [ref=e564]:
                - generic [ref=e565]:
                  - img [ref=e566]
                  - generic [ref=e571]: python
                - generic [ref=e572]:
                  - code [ref=e573]: "from typing import List import openai from deepeval.tracing import observe, update_current_span from deepeval.test_case import LLMTestCase from deepeval.metrics import AnswerRelevancyMetric def your_llm_app(input: str): def retriever(input: str): return [\"Hardcoded text chunks from your vector database\"] @observe(metrics=[AnswerRelevancyMetric()]) def generator(input: str, retrieved_chunks: List[str]): res = openai.ChatCompletion.create( model=\"gpt-4o\", messages=[ {\"role\": \"system\", \"content\": \"Use the provided context to answer the question.\"}, {\"role\": \"user\", \"content\": \"\\n\\n\".join(retrieved_chunks) + \"\\n\\nQuestion: \" + input} ] ).choices[0].message[\"content\"] # Create test case at runtime update_current_span(test_case=LLMTestCase(input=input, actual_output=res)) return res return generator(input, retriever(input)) evaluate(goldens=goldens, observed_callback=your_llm_app)"
                  - button "Copy code" [ref=e574] [cursor=pointer]:
                    - img [ref=e575]
              - paragraph [ref=e578]: "For simplicity purposes, we did not:"
              - list [ref=e579]:
                - listitem [ref=e580]: Use all the metrics, just answer relevancy
                - listitem [ref=e581]:
                  - text: Explain what a golden is, as you can
                  - link "learn more here" [ref=e582] [cursor=pointer]:
                    - /url: https://deepeval.com/docs/evaluation-datasets#what-are-goldens
              - paragraph [ref=e583]:
                - text: However notice how we have an
                - code [ref=e584]: "@observe"
                - text: decorator on top of the
                - code [ref=e585]: generator
                - text: function? DeepEval is great because it allows you to run targetted evals to any individual component instead.
              - paragraph [ref=e586]:
                - text: The full documentation for component-level evals is
                - link "available here" [ref=e587] [cursor=pointer]:
                  - /url: https://deepeval.com/docs/evaluation-component-level-llm-evals
                - text: ", which again when used alongside Confident AI gives you an entire debugging UI:"
              - paragraph [ref=e588]:
                - img "RAG Component-Level Evals on Confident AI" [ref=e589]
                - emphasis [ref=e590]:
                  - text: RAG Component-Level Evals on
                  - link "Confident AI" [ref=e591] [cursor=pointer]:
                    - /url: https://www.confident-ai.com/
              - heading "In CI/CD Pipelines" [level=3] [ref=e592]
              - paragraph [ref=e593]:
                - text: As introduced in
                - link "one of my earlier articles on LLM testing" [ref=e594] [cursor=pointer]:
                  - /url: https://www.confident-ai.com/blog/llm-testing-in-2024-top-methods-and-strategies
                - text: ", you can incorporate BOTH end-to-end and component-level evals in CI/CD. Here, we’ll show end-to-end RAG evaluation, but you’ll equally find how to do component-level evals in CI/CD in the links I showed above."
              - paragraph [ref=e595]: "First create a test file:"
              - generic [ref=e596]:
                - generic [ref=e597]:
                  - img [ref=e598]
                  - generic [ref=e603]: python
                - generic [ref=e604]:
                  - code [ref=e605]:
                    - text: "import pytest from deepeval.metrics import ( AnswerRelevancyMetric, FaithfulnessMetric, ContextualRelevancyMetric, ContextualRecallMetric, ContextualPrecisionMetric ) from deepeval import assert_test inputs = [\"...\", \"...\", \"...\", \"...\"] # Loop through goldens using pytest"
                    - generic [ref=e606]: "@pytest.mark.parametrize"
                    - text: "(\"input\", inputs) def test_llm_app(input: str): res, text_chunks = your_llm_app(str) test_case = LLMTestCase(input=golden.input, actual_output=res, retrieval_context=text_chunks) assert_test(test_case=test_case, metrics=[...])"
                  - button "Copy code" [ref=e607] [cursor=pointer]:
                    - img [ref=e608]
              - paragraph [ref=e611]: "Then run it using DeepEval’s native Pytest integration:"
              - generic [ref=e612]:
                - generic [ref=e613]:
                  - img [ref=e614]
                  - generic [ref=e616]: bash
                - generic [ref=e617]:
                  - code [ref=e618]: deepeval test run test_filename.py
                  - button "Copy code" [ref=e619] [cursor=pointer]:
                    - img [ref=e620]
              - paragraph [ref=e623]:
                - text: And that’s it! Full
                - link "documentation here." [ref=e624] [cursor=pointer]:
                  - /url: https://deepeval.com/docs/getting-started
            - generic [ref=e625]:
              - heading "Conclusion" [level=2] [ref=e626]:
                - link "Conclusion" [ref=e627] [cursor=pointer]:
                  - /url: "#conclusion"
              - paragraph [ref=e628]: In this article, we talked about how a RAG pipeline is only as good as it’s worst performing component, hence why we separate the evaluation of the retriever and generator.
              - paragraph [ref=e629]: Retriever has targeted LLM-as-a-judge metrics such as contextual relevancy, recall, and precision, while the generator has answer relevancy, faithfulness, and G-Eval to evaluate it’s performance. We also learnt that these metrics can be applied to evaluate RAG pipelines from an end-to-end perspective, or at a component-level. Both of these modes of evaluation can then be ran using a raw Python script, or in CI/CD pipelines.
              - paragraph [ref=e630]: Beyond the theory, all of this can be implemented in a few lines of code code using DeepEval, as it takes care of a lot of boring repetitive tasks such as running tests async in CI/CD, handling exceptions during evaluation, implementation of metrics, etc.
              - paragraph [ref=e631]:
                - text: Don’t forget to give
                - link "⭐ DeepEval a star on Github ⭐" [ref=e632] [cursor=pointer]:
                  - /url: https://github.com/confident-ai/deepeval
                - text: if you found this article useful, and as always, till next time.
