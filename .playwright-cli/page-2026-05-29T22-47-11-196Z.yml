            - generic [ref=e215]:
              - heading "Retrieval Evaluation Metrics" [level=2] [ref=e216]:
                - link "Retrieval Evaluation Metrics" [ref=e217] [cursor=pointer]:
                  - /url: "#retrieval-evaluation-metrics"
              - paragraph [ref=e218]: "The retrieval step typically consists of three main stages:"
              - list [ref=e219]:
                - listitem [ref=e220]:
                  - strong [ref=e221]: Embedding the query
                  - text: ": Convert the input into a vector representation using an embedding model of your choice (e.g., OpenAI’s"
                  - code [ref=e222]: text-embedding-3-large
                  - text: ).
                - listitem [ref=e223]:
                  - strong [ref=e224]: Vector search
                  - text: ": Use this embedded query to search a vector store containing your pre-embedded knowledge base, retrieving the top-K most similar text chunks."
                - listitem [ref=e225]:
                  - strong [ref=e226]: Reranking
                  - text: ": Refine the initial results by reranking the retrieved chunks, since raw vector similarity may not always reflect true relevance for your specific use case."
              - img "Retriever in RAG"
              - paragraph [ref=e227]:
                - emphasis [ref=e228]: Retriever in RAG
              - paragraph [ref=e229]: "Which involves several tunable hyperparameters — like the embedding model, chunk size, and top-K. Retrieval metrics help answer key questions such as:"
              - list [ref=e230]:
                - listitem [ref=e231]:
                  - strong [ref=e232]: Is your embedding model domain-aware?
              - paragraph [ref=e233]: A generic model might miss nuances in specialized fields like medicine.
              - list [ref=e234]:
                - listitem [ref=e235]:
                  - strong [ref=e236]: Is your reranker ordering results correctly?
              - separator [ref=e237]: "* * * * *"
              - paragraph [ref=e238]: Initial vector search may not reflect true relevance.
              - list [ref=e239]:
                - listitem [ref=e240]:
                  - strong [ref=e241]: Are you retrieving the right amount of context?
              - separator [ref=e242]: "* * * * *"
              - paragraph [ref=e243]: Chunk size and Top-K directly affect how much and what gets passed to the generator.
              - paragraph [ref=e244]:
                - text: Retrieval metrics uses a variation of QAG (question-answer-generation) to compute metric scores, which is a
                - link "great technique used by LLM evaluators to combat arbitary score calculations." [ref=e245] [cursor=pointer]:
                  - /url: https://www.confident-ai.com/blog/top-llm-evaluators-for-testing-llms-at-scale
              - heading "Contextual Relevancy" [level=3] [ref=e246]
              - paragraph [ref=e247]:
                - text: The contextual relevancy metric uses
                - link "LLM-as-a-judge" [ref=e248] [cursor=pointer]:
                  - /url: https://www.confident-ai.com/blog/why-llm-as-a-judge-is-the-best-llm-evaluation-method
                - text: to quantify the proportion of retrieved text chunks that are relevant to the input. It is a measure of how well your
                - strong [ref=e249]: top-K
                - text: and
                - strong [ref=e250]: chunk size
                - text: is configured. Smaller chunks can give you more precise information, but they often require retrieving more of them (higher top-K) to cover enough context, while larger chunks may capture broader meaning but risk including irrelevant details.
              - paragraph [ref=e251]:
                - text: You can definitely build something to loop through all your text chunks, handle asynchronously LLM-as-a-judge evals for judging relevancy, and compute the final score, however if you want something that just works out of the box, I’d recommend
                - link "DeepEval ⭐, the open-source LLM evaluation framework" [ref=e252] [cursor=pointer]:
                  - /url: https://github.com/confident-ai/deepeval
                - text: "with all the RAG metrics you can imagine:"
              - generic [ref=e253]:
                - generic [ref=e254]:
                  - img [ref=e255]
                  - generic [ref=e260]: python
                - generic [ref=e261]:
                  - code [ref=e262]: "from deepeval.test_case import LLMTestCase from deepeval.metrics import ContextualRelevancyMetric # Replace this with the actual output from your LLM application actual_output = \"We offer a 30-day full refund at no extra cost.\" # Replace this with the actual retrieved context from your RAG pipeline retrieval_context = [\"All customers are eligible for a 30 day full refund at no extra cost.\"] metric = ContextualRelevancyMetric(threshold=0.7, model=\"gpt-4\") test_case = LLMTestCase( input=\"What if these shoes don't fit?\", actual_output=actual_output, retrieval_context=retrieval_context ) metric.measure(test_case) print(metric.score, metric.reason)"
                  - button "Copy code" [ref=e263] [cursor=pointer]:
                    - img [ref=e264]
              - paragraph [ref=e267]:
                - text: Note that you should
                - link "click here" [ref=e268] [cursor=pointer]:
                  - /url: https://deepeval.com/docs/evaluation-test-cases
                - text: to learn what a test case is.
              - paragraph [ref=e269]:
                - text: The
                - code [ref=e270]: threshold
                - text: parameter in the
                - code [ref=e271]: ContextualRelevancyMetric
                - text: tells DeepEval what is the acceptable proportion of relevant text chunks for a test case to pass, while the
                - code [ref=e272]: model
                - text: determines which model should be used to determine each text chunk’s relevancy.
              - paragraph [ref=e273]:
                - text: For more information, find DeepEval’s full documentation
                - link "here." [ref=e274] [cursor=pointer]:
                  - /url: https://deepeval.com/docs/metrics-contextual-relevancy
              - heading "Contextual Recall" [level=3] [ref=e275]
              - paragraph [ref=e276]: The contextual recall metric is a reference-baed metric that uses LLM-as-a-judge to quantify the proportion undisputed facts found in the labelled, expected output for a given input can be attributed to the retrieved text chunks. It measures the embedding model parameter.
              - paragraph [ref=e277]: The whole purpose of contextual recall is to assess whether the retrieval context actually contains all the necessary information to produce the ideal output. Without contextual recall, anyone can achieve perfect contextual relevancy by retrieving as little information as possible.
              - paragraph [ref=e278]:
                - text: Here’s the code implementation in DeepEval (
                - link "docs here" [ref=e279] [cursor=pointer]:
                  - /url: https://deepeval.com/docs/metrics-contextual-recall
                - text: "):"
              - generic [ref=e280]:
                - generic [ref=e281]:
                  - img [ref=e282]
                  - generic [ref=e287]: python
                - generic [ref=e288]:
                  - code [ref=e289]: "from deepeval.test_case import LLMTestCase from deepeval.metrics import ContextualRecallMetric # Replace this with the actual output from your LLM application actual_output = \"We offer a 30-day full refund at no extra cost.\" # Replace this with the expected output from your RAG generator expected_output = \"You are eligible for a 30 day full refund at no extra cost.\" # Replace this with the actual retrieved context from your RAG pipeline retrieval_context = [\"All customers are eligible for a 30 day full refund at no extra cost.\"] metric = ContextualRecallMetric(threshold=0.7, model=\"gpt-4\") test_case = LLMTestCase( input=\"What if these shoes don't fit?\", actual_output=actual_output, expected_output=expected_output, retrieval_context=retrieval_context ) metric.measure(test_case) print(metric.score, metric.reason)"
                  - button "Copy code" [ref=e290] [cursor=pointer]:
                    - img [ref=e291]
              - heading "Contextual Precision" [level=3] [ref=e294]
              - paragraph [ref=e295]:
                - text: The contextual precision metric is a reference-baed metric that uses LLM-as-a-judge to quantify whether relevant text chunks are ranked higher than irrelevant ones. It measures the quality of your reranker, and follows a rather complicated equation that you can learn more
                - link "about here." [ref=e296] [cursor=pointer]:
                  - /url: https://deepeval.com/docs/metrics-contextual-precision#how-is-it-calculated
              - paragraph [ref=e297]: The purpose of precision is to make sure that the context you are feeding into your generator is not just relevant, contains all the information, but also in the correct order for an LLM to consider each text chunk’s importance appropriately.
              - paragraph [ref=e298]: "Here’s how you can use it in DeepEval:"
              - generic [ref=e299]:
                - generic [ref=e300]:
                  - img [ref=e301]
