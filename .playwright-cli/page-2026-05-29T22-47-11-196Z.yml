                - listitem [ref=e399]: How sensitive is output to prompt template changes?
              - paragraph [ref=e400]:
                - text: You’ll also likely need custom, task specific metrics to evaluate RAG generation, as we’ll go through why and how later. Similar to retrieval metrics, generation metrics also leverages
                - link "LLM evaluators with QAG." [ref=e401] [cursor=pointer]:
                  - /url: https://www.confident-ai.com/blog/top-llm-evaluators-for-testing-llms-at-scale
              - heading "Answer Relevancy" [level=3] [ref=e402]
              - paragraph [ref=e403]: The answer relevancy metric quantifies the proportion of the generated output that is relevant to the given input. It is extremely straightforward and a direct measure of how well your model is able to follow instructions in your prompt template.
              - paragraph [ref=e404]: "Here’s how you can use answer relevancy in DeepEval:"
              - generic [ref=e405]:
                - generic [ref=e406]:
                  - img [ref=e407]
                  - generic [ref=e412]: python
                - generic [ref=e413]:
                  - code [ref=e414]: "from deepeval.metrics import AnswerRelevancyMetric from deepeval.test_case import LLMTestCase metric = AnswerRelevancyMetric(threshold=0.7, model=\"gpt-4\") test_case = LLMTestCase( input=\"What if these shoes don't fit?\", # Replace this with the output from your LLM app actual_output=\"We offer a 30-day full refund at no extra cost.\" ) metric.measure(test_case) print(metric.score, metric.reason)"
                  - button "Copy code" [ref=e415] [cursor=pointer]:
                    - img [ref=e416]
              - paragraph [ref=e419]:
                - text: Full documentation
                - link "here." [ref=e420] [cursor=pointer]:
                  - /url: https://deepeval.com/docs/metrics-answer-relevancy
              - heading "Faithfulness" [level=3] [ref=e421]
              - paragraph [ref=e422]: The faithfulness metric quantifies the proportion of undisputed, truthful facts in the retrieval context that were not contradicted in the generated output. In other words, it measures the hallucination rate of your LLM.
              - paragraph [ref=e423]: "Here’s how to use it in DeepEval:"
              - generic [ref=e424]:
                - generic [ref=e425]:
                  - img [ref=e426]
                  - generic [ref=e431]: python
                - generic [ref=e432]:
                  - code [ref=e433]: "from deepeval.test_case import LLMTestCase from deepeval.metrics import FaithfulnessMetric # Replace this with the actual output from your LLM application actual_output = \"We offer a 30-day full refund at no extra cost.\" # Replace this with the actual retrieved context from your RAG pipeline retrieval_context = [\"All customers are eligible for a 30 day full refund at no extra cost.\"] metric = FaithfulnessMetric( threshold=0.7, model=\"gpt-4\", include_reason=True ) test_case = LLMTestCase( input=\"What if these shoes don't fit?\", actual_output=actual_output, retrieval_context=retrieval_context ) metric.measure(test_case) print(metric.score, metric.reason)"
                  - button "Copy code" [ref=e434] [cursor=pointer]:
                    - img [ref=e435]
              - paragraph [ref=e438]:
                - text: Full documentation
                - link "here." [ref=e439] [cursor=pointer]:
                  - /url: https://deepeval.com/docs/metrics-faithfulness
              - heading "Custom G-Eval" [level=3] [ref=e440]
              - paragraph [ref=e441]: Often times your RAG pipeline is not a generic QA, and has some aspects of customizations. It might be that responses has to be generated in a certain format (e.g. bullet points, markdown, JSON, etc.), which the generic RAG metrics can’t account for.
              - paragraph [ref=e442]: For this reason, you’ll want custom metrics that evaluates based on your unique use case. Also note that a custom RAG metric belongs to the generation category of metrics because a retriever is not where task-specific customizations are done.
              - paragraph [ref=e443]: There are various ways you can built a custom metric, but here we are going to use one of DeepEval’s most versatile metric, G-Eval. G-Eval (full read here) is almost capable of evaluating any task and you can define its criteria in everyday language.
              - generic [ref=e444]:
                - generic [ref=e445]:
                  - img [ref=e446]
                  - generic [ref=e451]: python
                - generic [ref=e452]:
                  - code [ref=e453]: from deepeval.metrics import GEval from deepeval.test_case import LLMTestCase, LLMTestCaseParams metric = GEval( name="Format", criteria="Determine whether the actual output is in Spanish.", evaluation_params=[LLMTestCaseParams.ACTUAL_OUTPUT], strict_mode=True ) test_case = LLMTestCase( input="What if these shoes don't fit?", actual_output="Ofrecemos un reembolso completo de 30 días sin costo adicional." ) metric.measure(test_case) print(metric.score, metric.reason)
                  - button "Copy code" [ref=e454] [cursor=pointer]:
                    - img [ref=e455]
              - paragraph [ref=e458]:
                - text: In this example, we set our criteria as whether our generator is able to generate outputs in spanish consistently. You’ll notice that we set the
                - code [ref=e459]: strict_mode
                - text: parameter on G-Eval as
                - code [ref=e460]: "True"
                - text: . This tells DeepEval that G-Eval should only output a binary score (0 or 1) instead of a continuous one. which makes a lot of sense for this use case.
              - paragraph [ref=e461]:
                - text: You can find the documentation for
                - link "G-Eval here" [ref=e462] [cursor=pointer]:
                  - /url: https://deepeval.com/docs/metrics-llm-evals
                - text: and the most used G-Eval use cases in DeepEval
                - link "here." [ref=e463] [cursor=pointer]:
                  - /url: https://deepeval.com/blog/top-5-geval-use-cases
              - generic [ref=e465]:
