            - generic [ref=e97]:
              - heading "What is RAG Evaluation?" [level=2] [ref=e98]:
                - link "What is RAG Evaluation?" [ref=e99] [cursor=pointer]:
                  - /url: "#what-is-rag-evaluation"
              - paragraph [ref=e100]:
                - text: RAG evaluation is the process of using metrics such as answer relevancy, faithfulness, and contextual relevancy to test the quality of a RAG pipeline’s “
                - strong [ref=e101]: retriever”
                - text: and the “
                - strong [ref=e102]: generator”
                - text: separately to measure each component’s contribution to the final response quality
              - paragraph [ref=e103]: "To do this, RAG evaluation involves 5 key industry-standard metrics:"
              - list [ref=e104]:
                - listitem [ref=e105]:
                  - strong [ref=e106]: "Answer Relevancy:"
                  - text: How relevant the generated response is to the given input.
                - listitem [ref=e107]:
                  - strong [ref=e108]: "Faithfulness:"
                  - text: Whether the generated response contains hallucinations to the retrieval context.
                - listitem [ref=e109]:
                  - strong [ref=e110]: Contextual Relevancy
                  - text: ": How relevant the retrieval context is to the input."
                - listitem [ref=e111]:
                  - strong [ref=e112]: "Contextual Recall:"
                  - text: Whether the retrieval context contains all the information required to produce the ideal output (for a given input).
                - listitem [ref=e113]:
                  - strong [ref=e114]: "Contextual Precision:"
                  - text: Whether the retrieval context is ranked in the correct order (higher relevancy goes first) for a given input.
              - paragraph [ref=e115]:
                - text: For agentic RAG use cases, which we'll cover more in a later section, you might also find it useful to include a task completion metric to
                - link "evaluate your AI agent" [ref=e116] [cursor=pointer]:
                  - /url: https://www.confident-ai.com/blog/definitive-ai-agent-evaluation-guide
                - text: RAG pipeline as well.
              - paragraph [ref=e117]:
                - text: Before we get too into the metrics though and RAG agents, let’s recap what RAG is. A RAG pipeline is an architecture where an LLM’s output is informed by external data that is
                - emphasis [ref=e118]: retrieved at runtime
                - text: "based on an input. Rather than relying solely on the model’s trained knowledge, a RAG system first:"
              - list [ref=e119]:
                - listitem [ref=e120]: Searches a knowledge source — like a document database, vector store, or API, then
                - listitem [ref=e121]: Feeds the retrieved content into the prompt for the LLM to generate a response.
              - paragraph [ref=e122]: "Here’s a diagram showing how RAG works:"
              - img "A RAG Pipeline Architecture"
              - paragraph [ref=e123]:
                - emphasis [ref=e124]: A RAG Pipeline Architecture
              - paragraph [ref=e125]:
                - text: You’ll notice that the quality of the final generation is
                - strong [ref=e126]: highly dependent on the retriever doing its job well
                - text: ". A RAG pipeline can only produce a helpful, factually correct response if it:"
              - list [ref=e127]:
                - listitem [ref=e128]: Has access to the right context.
                - listitem [ref=e129]: Does not hallucinate, and follows instructions given the right context.
              - paragraph [ref=e130]:
                - text: In fact, the quality of your RAG generation is only as strong as its weakest component — retriever or generator. Think of it as a
                - strong [ref=e131]: product, not a sum
                - text: ": if either the retriever or the generator performs poorly (or fails entirely), the overall quality of the output can drop to zero, regardless of how well the other performs."
              - paragraph [ref=e132]: "So the question becomes: how do we evaluate both the retriever and the generator independently to understand where the failures are happening in a RAG pipeline?"
            - generic [ref=e133]:
              - heading "Ways In Which Your RAG Pipeline Can Fail" [level=2] [ref=e134]:
                - link "Ways In Which Your RAG Pipeline Can Fail" [ref=e135] [cursor=pointer]:
                  - /url: "#ways-in-which-your-rag-pipeline-can-fail"
              - paragraph [ref=e136]:
                - text: You can address this by using
                - strong [ref=e137]: retriever-targeted
                - text: and
                - strong [ref=e138]: generator-targeted
                - text: metrics that evaluate each component separately, focusing on the most common failure modes within each stage of the pipeline.
              - paragraph [ref=e139]:
                - text: When the
                - strong [ref=e140]: retriever fails
                - text: ", it often due to the following:"
              - list [ref=e141]:
                - listitem [ref=e142]: Uninformative embeddings (by your embedding model)
                - listitem [ref=e143]: Poor chunking strategy (caused by chunk size, partitioning logic, etc.)
                - listitem [ref=e144]: Weak reranking logic
                - listitem [ref=e145]: Suboptimal Top-K setting
              - paragraph [ref=e146]:
                - text: This forces the LLM to “fill in the blanks,” leading to hallucinations or confidently wrong answers. Even with
                - strong [ref=e147]: good retrieval
                - text: ", the"
                - strong [ref=e148]: generator can still fail
                - text: "to use the context effectively:"
              - list [ref=e149]:
                - listitem [ref=e150]: Ignores key information
                - listitem [ref=e151]: Focuses on the wrong details
                - listitem [ref=e152]: Misreads the prompt structure
                - listitem [ref=e153]: Suffers from weak prompts or model limitations
              - paragraph [ref=e154]: Now with this in mind, it’s time to talk about how retrieval and generation metrics tackle each one of them.
              - paragraph [ref=e155]:
                - emphasis [ref=e156]: "Important Note: If your “RAG” pipeline involves “hard-coded” retrieval, where retrieval literally cannot go wrong (for example, fetching user data based on user ID and supplying that information into your prompt), there is no need for RAG evaluation per se, you can just do regular"
                - link "LLM system evaluation" [ref=e157] [cursor=pointer]:
