                - generic [ref=e388]:
                  - code [ref=e389]: "prompt = \"\"\"You are a helpful assistant. Use the information provided in the context below to answer the user's question. If the answer is not found in the context, say \"I don't know based on the provided information.\" Context: {retrieval_context} Question: {user_query} Answer:\"\"\" res = openai.ChatCompletion.create( model=\"gpt-4\", messages=[ {\"role\": \"system\", \"content\": \"You are a helpful assistant.\"}, {\"role\": \"user\", \"content\": prompt} ], temperature=0.2 ) print(res.choices[0].message[\"content\"])"
                  - button "Copy code" [ref=e390] [cursor=pointer]:
