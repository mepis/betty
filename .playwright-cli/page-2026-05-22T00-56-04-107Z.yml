- generic [ref=e2]: "{\"query\": \"pi.dev coding agent earendil\", \"number_of_results\": 0, \"results\": [{\"url\": \"https://github.com/earendil-works/pi\", \"title\": \"GitHub - earendil-works/pi: AI agent toolkit: coding agent CLI, unified LLM API, TUI & web UI libraries, Slack bot, vLLM pods \\u00b7 GitHub\", \"content\": \"Share your OSS coding agent sessions If you use pi or other coding agents for open source work, please share your sessions. Public OSS session data helps improve coding agents with real-world tasks, tool use, failures, and fixes instead of toy benchmarks. For the full explanation, see this post on X.\", \"publishedDate\": null, \"engine\": \"startpage\", \"template\": \"default.html\", \"parsed_url\": [\"https\", \"github.com\", \"/earendil-works/pi\", \"\", \"\", \"\"], \"img_src\": \"\", \"thumbnail\": \"\", \"priority\": \"\", \"engines\": [\"startpage\", \"brave\", \"duckduckgo\"], \"positions\": [1, 2, 1], \"score\": 7.5, \"category\": \"general\"}, {\"url\": \"https://pi.dev/\", \"title\": \"Pi Coding Agent\", \"content\": \"Pi is a minimal terminal coding harness. Adapt Pi to your workflows, not the other way around. Customize Pi with extensions, skills, prompt templates, and themes. Bundle them as Pi packages and share via npm or git. Pi ships with powerful defaults but skips features like sub-agents and plan mode.\", \"publishedDate\": null, \"engine\": \"startpage\", \"template\": \"default.html\", \"parsed_url\": [\"https\", \"pi.dev\", \"/\", \"\", \"\", \"\"], \"img_src\": \"\", \"thumbnail\": \"\", \"priority\": \"\", \"engines\": [\"startpage\", \"brave\", \"duckduckgo\"], \"positions\": [4, 4, 2], \"score\": 3.0, \"category\": \"general\"}, {\"url\": \"https://www.reddit.com/r/LocalLLaMA/comments/1sg37af/pidev_coding_agent_is_moving_to_earendil/\", \"title\": \"pi.dev coding agent is moving to Earendil : r/LocalLLaMA - Reddit\", \"content\": \"If you're exploring memory options for agents, Hindsight could be another worthwhile project to compare against. https://github.com/vectorize-io/hindsight ... Mario feels like a pretty level-headed, pragmatic chap with a long history developing OSS. Yes, no one can rule things out a 100%, but there are perhaps 2 dozen ways in which this could've ended up worse. ... JRR Tolkien rolls in his grave. ... Despite its Tolkien-inspired name, Earendil is not a tech company with fascist tendencies.\", \"publishedDate\": null, \"engine\": \"startpage\", \"template\": \"default.html\", \"parsed_url\": [\"https\", \"www.reddit.com\", \"/r/LocalLLaMA/comments/1sg37af/pidev_coding_agent_is_moving_to_earendil/\", \"\", \"\", \"\"], \"img_src\": \"\", \"thumbnail\": \"\", \"priority\": \"\", \"engines\": [\"startpage\", \"brave\"], \"positions\": [3, 3], \"score\": 1.3333333333333333, \"category\": \"general\", \"pubdate\": \"2026-04-08 00:00:00\"}, {\"template\": \"default.html\", \"url\": \"https://github.com/earendil-works/pi/tree/main/packages/coding-agent\", \"title\": \"pi/packages/coding-agent at main \\u00b7 earendil-works/pi\", \"content\": \"AI agent toolkit: coding agent CLI, unified LLM API, TUI & web UI libraries, Slack bot, vLLM pods - earendil-works/pi\", \"publishedDate\": null, \"thumbnail\": \"\", \"engine\": \"brave\", \"parsed_url\": [\"https\", \"github.com\", \"/earendil-works/pi/tree/main/packages/coding-agent\", \"\", \"\", \"\"], \"img_src\": \"\", \"priority\": \"\", \"engines\": [\"brave\"], \"positions\": [1], \"score\": 1.0, \"category\": \"general\"}, {\"url\": \"https://pi.dev/news/2026/5/7/pi-has-a-new-home\", \"title\": \"Pi Has a New Home at Earendil \\u00b7 News - Pi Coding Agent\", \"content\": \"May 7, 2026 ... ... development direction. What Changed. The primary install package changed to: npm install -g @earendil-works/pi-coding-agent. The repository\\u00a0...\", \"publishedDate\": null, \"engine\": \"startpage\", \"template\": \"default.html\", \"parsed_url\": [\"https\", \"pi.dev\", \"/news/2026/5/7/pi-has-a-new-home\", \"\", \"\", \"\"], \"img_src\": \"\", \"thumbnail\": \"\", \"priority\": \"\", \"engines\": [\"startpage\"], \"positions\": [2], \"score\": 0.5, \"category\": \"general\"}, {\"url\": \"https://mariozechner.at/posts/2026-04-08-ive-sold-out/\", \"title\": \"I've sold out - { Mario Zechner }\", \"content\": \"Similarly, the package name changes from @mariozechner/pi-coding-agent to @earendil/pi. We\\u2019ll set up a sort of redirect here as well. pi.dev remains pi's home. It will get an Earendil logo alongside what's already there.\", \"publishedDate\": null, \"engine\": \"startpage\", \"template\": \"default.html\", \"parsed_url\": [\"https\", \"mariozechner.at\", \"/posts/2026-04-08-ive-sold-out/\", \"\", \"\", \"\"], \"img_src\": \"\", \"thumbnail\": \"\", \"priority\": \"\", \"engines\": [\"startpage\", \"brave\"], \"positions\": [9, 9], \"score\": 0.4444444444444444, \"category\": \"general\", \"pubdate\": \"2026-04-08 00:00:00\"}, {\"template\": \"default.html\", \"title\": \"pi-coding-agent SDK | earendil-works/pi | DeepWiki\", \"content\": \"The pi-coding-agent SDK provides programmatic access to the agent's capabilities, allowing developers to embed the agent into custom UIs, automated workflows, or specialized toolchains. It encapsulates the complex orchestration of LLM providers, tool execution, session persistence, and resource loading into a unified TypeScript API.\", \"img_src\": \"\", \"iframe_src\": \"\", \"audio_src\": \"\", \"thumbnail\": \"\", \"publishedDate\": null, \"pubdate\": \"\", \"length\": null, \"views\": \"\", \"author\": \"\", \"metadata\": \"\", \"priority\": \"\", \"engines\": [\"duckduckgo\"], \"open_group\": false, \"close_group\": false, \"positions\": [3], \"score\": 0.3333333333333333, \"category\": \"general\", \"url\": \"https://deepwiki.com/earendil-works/pi/7.1-pi-coding-agent-sdk\", \"engine\": \"duckduckgo\", \"parsed_url\": [\"https\", \"deepwiki.com\", \"/earendil-works/pi/7.1-pi-coding-agent-sdk\", \"\", \"\", \"\"]}, {\"tem