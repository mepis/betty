                  - strong [ref=e215]: CUDA 12.8 + cuBLAS
                  - text: ":"
                - list [ref=e216]:
                  - listitem [ref=e217]:
                    - strong [ref=e218]: "Prompt processing (pp): 5.7x–6.3x difference"
                  - listitem [ref=e219]:
                    - strong [ref=e220]: "Text generation (tg): 1.4x difference"
                - paragraph [ref=e221]: Furthermore, since MMQ crashes with CUDA 13.1, you are forced to fall back to cuBLAS, which results in even slower performance.
                - heading "Why Does This Happen?" [level=2] [ref=e222]
                - 'heading "Trap 1: CUDA 13.1 Breaks the Blackwell MMQ Kernel" [level=3] [ref=e223]'
                - paragraph [ref=e224]: llama.cpp's MMQ (Matrix Multiply Quantized) kernel is a high-speed path that performs matrix calculations while maintaining quantization. cuBLAS fallback is more generic but incurs the overhead of quantization decoding → FP16 conversion → cuBLAS operation.
                - paragraph [ref=e225]:
                  - text: When you build with CUDA 13.1,
                  - strong [ref=e226]: the Blackwell MMQ kernel crashes with a Segmentation fault.
                  - text: NVIDIA's official migration guide also explicitly recommends
                  - strong [ref=e227]: building llama.cpp for Blackwell (SM120) with CUDA 12.8.
                - blockquote [ref=e228]:
                  - paragraph [ref=e229]:
                    - emphasis [ref=e230]: "\"Building with CUDA 12.8 for compute capability 120 and an upgraded cuBLAS avoids PTX JIT compilation for end users and provides Blackwell-optimized cuBLAS routines.\""
                    - text: —
                    - link "NVIDIA Software Migration Guide for Blackwell RTX GPUs" [ref=e231] [cursor=pointer]:
                      - /url: https://forums.developer.nvidia.com/t/software-migration-guide-for-nvidia-blackwell-rtx-gpus-a-guide-to-cuda-12-8-pytorch-tensorrt-and-llama-cpp/321330
                - 'heading "Trap 2: FORCE_CUBLAS=ON Remains in the CMake Cache" [level=3] [ref=e232]'
                - paragraph [ref=e233]:
                  - text: During the early days of Blackwell support (before llama.cpp b8157), the MMQ kernel was crashing, so it was necessary to build with
                  - code [ref=e234]: "-DGGML_CUDA_FORCE_CUBLAS=ON"
                  - text: .
                - paragraph [ref=e235]:
                  - text: The problem is that
                  - strong [ref=e236]:
                    - text: this setting remains in
                    - code [ref=e237]: CMakeCache.txt
                    - text: permanently.
                - generic [ref=e239]:
                  - code [ref=e241]:
                    - generic [ref=e242]: "# Checking the cache of the old build"
                    - generic [ref=e243]: grep FORCE_CUBLAS build/CMakeCache.txt
                    - generic [ref=e244]: "# → GGML_CUDA_FORCE_CUBLAS:BOOL=ON ← It's still there!"
                  - button "クリップボードにコピー" [ref=e245] [cursor=pointer]:
                    - img [ref=e246]
                  - button "右端で折り返す" [ref=e247] [cursor=pointer]:
                    - img [ref=e248]
                - paragraph [ref=e249]:
                  - text: Even if you reconfigure with
                  - code [ref=e250]: cmake -B build
                  - text: ", cached values are not overwritten. You must either explicitly specify"
                  - code [ref=e251]: "OFF"
                  - text: or delete the
                  - code [ref=e252]: build/
                  - text: directory.
                - paragraph [ref=e253]:
                  - strong [ref=e254]: I myself did not notice this cache during the benchmarking of my previous article and reported slow values due to the cuBLAS fallback.
                - heading "Correct Build Procedure" [level=2] [ref=e255]
                - generic [ref=e257]:
                  - code [ref=e259]:
                    - generic [ref=e260]: "# 1. Explicitly use CUDA 12.8 (It is okay if it coexists with 13.1)"
                    - generic [ref=e261]: export PATH=/usr/local/cuda-12.8/bin:$PATH
                    - generic [ref=e262]: "# 2. Delete the build directory entirely (to prevent cache residue)"
                    - generic [ref=e263]: rm -rf build
                    - generic [ref=e264]: "# 3. CMake — Explicitly specify CUDA 12.8, FORCE_CUBLAS set to OFF"
                    - generic [ref=e265]: cmake -B build \
                    - generic [ref=e266]: "-DGGML_CUDA=ON \\"
                    - generic [ref=e267]: "-DCMAKE_CUDA_ARCHITECTURES=120 \\"
                    - generic [ref=e268]: "-DGGML_CUDA_FORCE_CUBLAS=OFF \\"
                    - generic [ref=e269]: "-DCUDAToolkit_ROOT=/usr/local/cuda-12.8"
                    - generic [ref=e270]: "# 4. Build"
                    - generic [ref=e271]: cmake --build build --config Release -j $(nproc)
                  - button "クリップボードにコピー" [ref=e272] [cursor=pointer]:
                    - img [ref=e273]
                  - button "右端で折り返す" [ref=e274] [cursor=pointer]:
                    - img [ref=e275]
                - heading "Verification After Build" [level=3] [ref=e276]
