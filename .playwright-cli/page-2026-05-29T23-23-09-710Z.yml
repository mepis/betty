          - paragraph [ref=e4897]: The sequential regime is the strongest of the three because hidden information can matter not only for the current optimizer but for the future evolution of the decision problem. Static certification asks whether bad state pairs exist; stochastic certification asks whether conditional averages cross a threshold; sequential certification asks whether omitted coordinates can change the induced optimizer after temporal structure is taken into account. That added temporal contingency is exactly what the TQBF reduction exploits.
          - paragraph [ref=e4899]: "The reduction follows the same structural pattern as quantified formulas and temporally structured control problems elsewhere in the planning literature. Existential quantifier blocks correspond to controller-side choices, universal blocks correspond to adversarial or environment-controlled resolutions, and the truth value of the quantified formula is encoded into the induced optimizer of the reduced sequential instance. A hidden coordinate can look locally irrelevant after one transition yet still encode which branch of the quantified game has been entered. The reduction exposes the source of PSPACE hardness: exact relevance certification must reason about information whose effect is mediated by temporal contingency rather than by a single one-shot comparison."
