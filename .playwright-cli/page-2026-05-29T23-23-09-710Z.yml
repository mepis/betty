          - heading "Mechanized Witness Schemas and Oracle-Class Arguments" [level=3] [ref=e12766]
          - paragraph [ref=e12768]:
            - text: The paper uses standard oracle-class language for several stochastic upper bounds, especially the
            - math [ref=e12769]:
              - generic [ref=e12771]:
                - generic [ref=e12772]: coNP
                - generic [ref=e12773]: PP
            - text: "-style complement packaging for decisiveness and the"
            - math [ref=e12774]:
              - generic [ref=e12776]:
                - generic [ref=e12777]: NP
                - generic [ref=e12778]: PP
            - text: upper bounds for the anchor and minimum decisiveness queries. The corresponding oracle-class memberships are proved in the paper text, following standard complexity-theoretic proof conventions. The proof artifact complements those proofs by mechanizing the finite witness/checking schemata and reduction cores that the oracle arguments require.
          - paragraph [ref=e12780]: "Concretely, the mechanized layer certifies ingredients of the following form: a bad fiber witnesses failure of decisiveness; an existentially guessed coordinate set or anchor witness reduces the anchor/minimum queries to the corresponding decisiveness-style verifier; and the bounded explicit-state procedures agree with the abstract predicates they are intended to decide. The paper then translates these certified witness/checking packages into the stated oracle-class membership arguments by the usual guess-and-query reasoning in complexity theory. Thus the artifact provides independent verification of the finite combinatorial core, while the oracle-class interpretation is established in the manuscript."
