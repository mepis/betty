strange that Opencode allows any actions by default. I did not know any other AI tool with the same behaviour. It would be cool to have default permissions set \\u2013 always ask for editing, and also always ask for critical commands, etc. ... No fields configured for issues without a type.\", \"thumbnail\": null, \"engine\": \"google\", \"template\": \"default.html\", \"parsed_url\": [\"https\", \"github.com\", \"/anomalyco/opencode/issues/2632\", \"\", \"\", \"\"], \"img_src\": \"\", \"priority\": \"\", \"engines\": [\"google\", \"brave\"], \"positions\": [8, 11], \"score\": 0.4318181818181818, \"category\": \"general\", \"publishedDate\": null, \"pubdate\": \"2025-09-16 00:00:00\"}, {\"template\": \"default.html\", \"title\": \"opencode-docs/docs/12-permissions.md at main \\u00b7 mudrii ... - GitHub\", \"content\": \"Comprehensive documentation for OpenCode (opencode.ai) \\u2014 the open source AI coding agent. v1.2.27 - mudrii/opencode-docs\", \"img_src\": \"\", \"iframe_src\": \"\", \"audio_src\": \"\", \"thumbnail\": \"\", \"publishedDate\": null, \"pubdate\": \"\", \"length\": null, \"views\": \"\", \"author\": \"\", \"metadata\": \"\", \"priority\": \"\", \"engines\": [\"duckduckgo\"], \"open_group\": false, \"close_group\": false, \"positions\": [5], \"score\": 0.2, \"category\": \"general\", \"url\": \"https://github.com/mudrii/opencode-docs/blob/main/docs/12-permissions.md\", \"engine\": \"duckduckgo\", \"parsed_url\": [\"https\", \"github.com\", \"/mudrii/opencode-docs/blob/main/docs/12-permissions.md\", \"\", \"\", \"\"]}, {\"url\": \"https://github.com/anomalyco/opencode/issues/5395\", \"title\": \"Split external_directory permission into read vs write #5395 - GitHub\", \"content\": \"Dec 11, 2025 ... It would be nice if instead of just ask/allow/deny we can configure it even on directory bases: ... { \\\"$schema\\\": \\\"https://opencode.ai/config.json\\\"\\u00a0...\", \"publishedDate\": null, \"engine\": \"startpage\", \"template\": \"default.html\", \"parsed_url\": [\"https\", \"github.com\", \"/anomalyco/opencode/issues/5395\", \"\", \"\", \"\"], \"img_src\": \"\", \"thumbnail\": \"\", \"priority\": \"\", \"engines\": [\"startpage\"], \"positions\": [6], \"score\": 0.16666666666666666, \"category\": \"general\"}, {\"template\": \"default.html\", \"title\": \"GitHub - joelhooks/opencode-config: Personal OpenCode configuration ...\", \"content\": \"Configuration & Permissions OpenCode merges configuration from multiple sources with defined precedence. Higher-precedence sources override earlier ones, so keep defaults in shared configs and project-specific overrides close to the repo. Permissions support allow, ask, and deny rules. When multiple rules match, the last match wins.\", \"img_src\": \"\", \"iframe_src\": \"\", \"audio_src\": \"\", \"thumbnail\": \"\", \"publishedDate\": null, \"pubdate\": \"\", \"length\": null, \"views\": \"\", \"author\": \"\", \"metadata\": \"\", \"priority\": \"\", \"engines\": [\"duckduckgo\"], \"open_group\": false, \"close_group\": false, \"positions\": [6], \"score\": 0.16666666666666666, \"category\": \"general\", \"url\": \"https://github.com/joelhooks/opencode-config\", \"engine\": \"duckduckgo\", \"parsed_url\": [\"https\", \"github.com\", \"/joelhooks/opencode-config\", \"\", \"\", \"\"]}, {\"url\": \"https://github.com/anomalyco/opencode/issues/3205\", \"title\": \"Agent should request permission before reading or editing files #3205\", \"content\": \"Oct 15, 2025 ... Currently, when using the OpenCode agent, it automatically reads or edits project files without explicitly asking for permission from the\\u00a0...\", \"publishedDate\": null, \"engine\": \"startpage\", \"template\": \"default.html\", \"parsed_url\": [\"https\", \"github.com\", \"/anomalyco/opencode/issues/3205\", \"\", \"\", \"\"], \"img_src\": \"\", \"thumbnail\": \"\", \"priority\": \"\", \"engines\": [\"startpage\"], \"positions\": [8], \"score\": 0.125, \"category\": \"general\"}, {\"url\": \"https://github.com/anomalyco/opencode/issues/13346\", \"title\": \"agent often asking to access external_directory which is the one we ...\", \"content\": \"Feb 12, 2026 ... The main agent often ask for permission to access \\\"external_dir\\\" which is the directory of the worktree itself inside the ~/.opencode directory.\", \"publishedDate\": null, \"engine\": \"startpage\", \"template\": \"default.html\", \"parsed_url\": [\"https\", \"github.com\", \"/anomalyco/opencode/issues/13346\", \"\", \"\", \"\"], \"img_src\": \"\", \"thumbnail\": \"\", \"priority\": \"\", \"engines\": [\"startpage\"], \"positions\": [9], \"score\": 0.1111111111111111, \"category\": \"general\"}, {\"url\": \"https://github.com/anomalyco/opencode/issues/4743\", \"title\": \"[FEATURE]: allow /tmp or $TMPDIR folder access option #4743 - GitHub\", \"content\": \"Nov 25, 2025 \\u00b7 Setting BUN_TMPDIR to a directory on a partition mounted with the exec option helped resolve my \\\"Failed to initialize OpenTUI render library: ...\", \"thumbnail\": null, \"engine\": \"google\", \"template\": \"default.html\", \"parsed_url\": [\"https\", \"github.com\", \"/anomalyco/opencode/issues/4743\", \"\", \"\", \"\"], \"img_src\": \"\", \"priority\": \"\", \"engines\": [\"google\"], \"positions\": [9], \"score\": 0.1111111111111111, \"category\": \"general\", \"publishedDate\": null}, {\"url\": \"https://github.com/anomalyco/opencode/issues/1445\", \"title\": \"[Feature Request] Allow for setting read-only files and directories.\", \"content\": \"Jul 30, 2025 ... Is there a configuration option to allow read access to other location? ... { \\\"$schema\\\": \\\"https://opencode.ai/config.json\\\", \\\"mcp\\\": { \\\"reference\\u00a0...\", \"publishedDate\": null, \"engine\": \"startpage\", \"template\": \"default.html\", \"parsed_url\": [\"https\", \"github.com\", \"/anomalyco/opencode/issues/1445\", \"\", \"\", \"\"], \"img_src\": \"\", \"thumbnail\": \"\", \"priority\": \"\", \"engines\": [\"startpage\"], \"positions\": [10], \"score\": 0.1, \"category\": \"general\"}, {\"url\": \"https://github.com/anomalyco/opencode/issues/20045\", \"title\": \"edit permission uses relative paths but external_directory uses absolute ...\", \"content\": \"Mar 30, 2026 \\u00b7 When configuring agent-level permissions with absolute path patterns, external_directory works correctly but edit silently fails to match ...Missing: restrict | Show results with:restrict\", \"thumbnail\": null, \"engine\": \"google\", \"template\": \"default.html\", \"parsed_url\": [\"https\", \"github.com\", \"/anomalyco/opencode/issues/20045\", \"\", \"\", \"\"], \"img_src\": \"\", \"priority\": \"\", \"engines\": [\"google\"], \"positions\": [10], \"score\": 0.1, \"category\": \"general\", \"publishedDate\": null}, {\"template\": \"default.html\", \"title\": \"Desktop and web interface for OpenCode AI agent - GitHub\", \"content\": \"Data Directory Permission Note: The data/ directory is mounted into the container for persistent storage (config, sessions, SSH keys, workspaces). Before running, ensure the directory exists and has proper permissions:\", \"img_src\": \"\", \"iframe_src\": \"\", \"audio_src\": \"\", \"thumbnail\": \"\", \"publishedDate\": null, \"pubdate\": \"\", \"length\": null, \"views\": \"\", \"author\": \"\", \"metadata\": \"\", \"priority\": \"\", \"engines\": [\"duckduckgo\"], \"open_group\": false, \"close_group\": false, \"positions\": [10], \"score\": 0.1, \"category\": \"general\", \"url\": \"https://github.com/openchamber/openchamber\", \"engine\": \"duckduckgo\", \"parsed_url\": [\"https\", \"github.com\", \"/openchamber/openchamber\", \"\", \"\", \"\"]}, {\"template\": \"default.html\", \"url\": \"https://github.com/marauder-os/opencode/blob/main/docs/permissions.md\", \"title\": \"opencode/docs/permissions.md at main \\u00b7 marauder-os/opencode\", \"content\": \"Since read defaults to allow, reads are also allowed for entries under external_directory unless overridden. Add explicit rules when a tool should be restricted in these paths, such as blocking edits while keeping reads: Keep the list focused on trusted paths, and layer extra allow or deny rules as needed for other tools (for example bash). OpenCode permissions are keyed by tool name, plus a couple of safety guards:\", \"publishedDate\": null, \"thumbnail\": \"https://imgs.search.brave.com/36x6rRb4l1rG-WCW2BSj6XYvJ-NevvNGb8n9NieKwfE/rs:fit:200:200:1:0/g:ce/aHR0cHM6Ly9vcGVu/Z3JhcGguZ2l0aHVi/YXNzZXRzLmNvbS84/MWZlZDA2MmMwYjdj/YmU4ZDM1MzA5ODVh/NDEyMmFjNzNmNmEz/ZjVjMmE1ODlmZWRm/MDI3Mzc5N2E0ODM1/ODA1L21hcmF1ZGVy/LW9zL29wZW5jb2Rl\", \"engine\": \"brave\", \"parsed_url\": [\"https\", \"github.com\", \"/marauder-os/opencode/blob/main/docs/permissions.md\", \"\", \"\", \"\"], \"img_src\": \"\", \"priority\": \"\", \"engines\": [\"brave\"], \"positions\": [14], \"score\": 0.07142857142857142, \"category\": \"general\"}, {\"template\": \"default.html\", \"url\": \"https://github.com/anomalyco/opencode/issues/7810\", \"title\": \"Opencode will not launch if you set Agent permissions as True/False instead of Allow/Deny \\u00b7 Issue #7810 \\u00b7 anomalyco/opencode\", \"content\": \"description: Test agent mode: subagent tools: read: true permission: write: false --- # Test Agent This is a minimal test agent to debug the loading issue. Save this to .opencode/agent/testing.md then try to launch opencode in your project directory. ... luke@wsl-desktop:~/projects/myproject$ opencode --print-logs --log-level DEBUG INFO 2026-01-11T15:28:46 +361ms service=default version=1.1.13 args=[\\\"--print-logs\\\",\\\"--log-level\\\",\\\"DEBUG\\\"] opencode INFO 2026-01-11T15:28:46 +2ms service=config path=/home/luke/.config/opencode/config.json loading INFO 2026-01-11T15:28:46 +1ms service=config path=/home/luke/.config/opencode/opencode.json loading INFO 2026-01-11T15:28:46 +3ms service=config path=/home/luke/.config/opencode/opencode.jsonc loading\", \"publishedDate\": \"2026-01-11T00:00:00\", \"thumbnail\": \"https://imgs.search.brave.com/M80P6AzMcaikoblyWpC812a0c-L1GmNsE6gS738eqME/rs:fit:200:200:1:0/g:ce/aHR0cHM6Ly9vcGVu/Z3JhcGguZ2l0aHVi/YXNzZXRzLmNvbS9i/MmQ2ODBhMTY4Mjcx/NGEzZTVhYTZjODAz/MmY5NTcxZWM3MTk4/NDY2ZjJmY2ViMDdi/MWFhZDNmYzgwNWFj/ZmU2L2Fub21hbHlj/by9vcGVuY29kZS9p/c3N1ZXMvNzgxMA\", \"engine\": \"brave\", \"parsed_url\": [\"https\", \"github.com\", \"/anomalyco/opencode/issues/7810\", \"\", \"\", \"\"], \"img_src\": \"\", \"priority\": \"\", \"engines\": [\"brave\"], \"positions\": [15], \"score\": 0.06666666666666667, \"category\": \"general\", \"pubdate\": \"2026-01-11 00:00:00\"}, {\"template\": \"default.html\", \"url\": \"https://github.com/anomalyco/opencode/issues/7063\", \"title\": \"Permission denied, yet command is executed regardless \\u00b7 Issue #7063 \\u00b7 anomalyco/opencode\", \"content\": \"My settings: { \\\"$schema\\\": \\\"https://opencode.ai/config.json\\\", \\\"permission\\\": { \\\"bash\\\": { \\\"yarn\\\": \\\"deny\\\", \\\"npx\\\": \\\"deny\\\", \\\"pnpx\\\": \\\"deny\\\", \\\"npm\\\": \\\"deny\\\", \\\"pnpm\\\": \\\"deny\\\" }, \\\"doom_loop\\\": \\\"ask\\\" } I've also set restriction to run these commands i...\", \"publishedDate\": null, \"thumbnail\": \"https://imgs.search.brave.com/RX-CFaUWyESmyfRmL__ZPzo3H5dK6tkD7z2-BRuZmls/rs:fit:200:200:1:0/g:ce/aHR0cHM6Ly9vcGVu/Z3JhcGguZ2l0aHVi/YXNzZXRzLmNvbS80/M2JmYmQ5ZTMwYzEx/YzAxYmYzYWZjOGQz/N2NjZjYyNjk4ODdl/ZmQ5ZGFmODg0NDJi/YTNhZDI3YWVkMTEz/Njk3L2Fub21hbHlj/by9vcGVuY29kZS9p/c3N1ZXMvNzA2Mw\", \"engine\": \"brave\", \"parsed_url\": [\"https\", \"github.com\", \"/anomalyco/opencode/issues/7063\", \"\", \"\", \"\"], \"img_src\": \"\", \"priority\": \"\", \"engines\": [\"brave\"], \"positions\": [16], \"score\": 0.0625, \"category\": \"general\"}, {\"template\": \"default.html\", \"url\": \"https://github.com/anomalyco/opencode/issues/20549\", \"title\": \"Improve transitive permissions for agents subagents and tasks \\u00b7 Issue #20549 \\u00b7 anomalyco/opencode\", \"content\": \"Because I did not use a direct write tool - I used the task subagent, and that path was still available in this session. Your config says write: false, edit: false, bash: false, webfetch: true.\", \"publishedDate\": \"2026-04-01T00:00:00\", \"thumbnail\": \"https://imgs.search.brave.com/XnT5HApIO0HEGWh7YhrgxuYCEksIX125OryQhdPSuZA/rs:fit:200:200:1:0/g:ce/aHR0cHM6Ly9vcGVu/Z3JhcGguZ2l0aHVi/YXNzZXRzLmNvbS81/YjA1MDU0MTAwNDJl/MmYxM2Q1ZWY0N2U5/ZWZkYWNiMzU2YzZl/ZjUwNGNiNWEzNTI1/NmM5MDA0NmZmZWQ5/ZDdiL2Fub21hbHlj/by9vcGVuY29kZS9p/c3N1ZXMvMjA1NDk\", \"engine\": \"brave\", \"parsed_url\": [\"https\", \"github.com\", \"/anomalyco/opencode/issues/20549\", \"\", \"\", \"\"], \"img_src\": \"\", \"priority\": \"\", \"engines\": [\"brave\"], \"positions\": [18], \"score\": 0.05555555555555555, \"category\": \"general\", \"pubdate\": \"2026-04-01 00:00:00\"}, {\"template\": \"default.html\", \"url\": \"https://github.com/anomalyco/opencode/issues/11272\", \"title\": \"[BUG] opencode's folder permission control is not working \\u00b7 Issue #11272 \\u00b7 anomalyco/opencode\", \"content\": \"The permission control for folders in opencode is not working. I set up opencode.json in the project root directory like this: { \\\"$schema\\\": \\\"https://opencode.ai/config.json\\\", \\\"permission\\\": { \\\"edit\\\": \\\"ask\\\", \\\"bash\\\": { \\\"*\\\": \\\"ask\\\", \\\"env *\\\": \\\"deny\\\", \\\"env\\\": \\\"deny\\\", \\\"printenv *\\\": \\\"deny\\\", \\\"printenv\\\": \\\"deny\\\", \\\"export *\\\": \\\"deny\\\", \\\"echo *\\\": \\\"deny\\\", \\\"set *\\\": \\\"deny\\\" }, \\\"read\\\": { \\\"*\\\": \\\"allow\\\", \\\"*.log\\\": \\\"deny\\\", \\\"APP-META/**\\\": \\\"deny\\\", \\\"logs/**\\\": \\\"deny\\\", \\\"app/config/**\\\": \\\"deny\\\", \\\"*.env\\\": \\\"deny\\\", \\\"*.env.*\\\": \\\"deny\\\", \\\".env\\\": \\\"deny\\\", \\\".env.*\\\": \\\"deny\\\", \\\"*.env.local\\\": \\\"deny\\\", \\\"*.env.example\\\": \\\"allow\\\" } } } However, opencode can still directly read the contents of the APP-META folder.\", \"publishedDate\": \"2026-01-30T00:00:00\", \"thumbnail\": \"https://imgs.search.brave.com/PMrMr3ksuv7VE2WvH_Ddcysc4kqRCy1CRPRg9X_xMOQ/rs:fit:200:200:1:0/g:ce/aHR0cHM6Ly9vcGVu/Z3JhcGguZ2l0aHVi/YXNzZXRzLmNvbS83/YTc5NjFlMDJhNDQ4/YTU3ZjhjOGM0NTc2/MDc2OWU3YjgyZmE0/NWU2N2IxNTRlZTFm/MmY1ZGE4YWU3ODI1/MjVmL2Fub21hbHlj/by9vcGVuY29kZS9p/c3N1ZXMvMTEyNzI\", \"engine\": \"brave\", \"parsed_url\": [\"https\", \"github.com\", \"/anomalyco/opencode/issues/11272\", \"\", \"\", \"\"], \"img_src\": \"\", \"priority\": \"\", \"engines\": [\"brave\"], \"positions\": [19], \"score\": 0.05263157894736842, \"category\": \"general\", \"pubdate\": \"2026-01-30 00:00:00\"}, {\"template\": \"default.html\", \"url\": \"https://github.com/anomalyco/opencode/issues/5965\", \"title\": \"[FEATURE]: SDK-level permission overrides for tools \\u00b7 Issue #5965 \\u00b7 anomalyco/opencode\", \"content\": \"Support the same schema used in opencode.json, including command allowlists for bash: { \\\"permission\\\": { \\\"bash\\\": { \\\"*\\\": \\\"deny\\\", \\\"rg *\\\": \\\"allow\\\", \\\"sed *\\\": \\\"allow\\\" } } } Ideally allow per-agent overrides in the SDK call (e.g., agent: \\\"build\\\" with a permission override for that run). ... Prevents runaway tool usage when running agents programmatically. Enables safe, scoped automation without requiring a persistent config file on the server host.\", \"publishedDate\": \"2025-12-22T00:00:00\", \"thumbnail\": \"https://imgs.search.brave.com/2zWqHmMSEThm-LUquXENQ3IxjEjc0iXC47M-A-53cxg/rs:fit:200:200:1:0/g:ce/aHR0cHM6Ly9vcGVu/Z3JhcGguZ2l0aHVi/YXNzZXRzLmNvbS8w/OWIxYjViMTI1N2Fm/OWM1ZjczM2QyN2I1/ZjA2YzdjYjBiMmYw/NDlkYmNmN2YwMDVk/OGI5ODU1ODc3MzUw/OTMzL2Fub21hbHlj/by9vcGVuY29kZS9p/c3N1ZXMvNTk2NQ\", \"engine\": \"brave\", \"parsed_url\": [\"https\", \"github.com\", \"/anomalyco/opencode/issues/5965\", \"\", \"\", \"\"], \"img_src\": \"\", \"priority\": \"\", \"engines\": [\"brave\"], \"positions\": [20], \"score\": 0.05, \"category\": \"general\", \"