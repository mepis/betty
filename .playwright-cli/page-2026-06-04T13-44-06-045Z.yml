blishedDate\": null, \"pubdate\": \"\", \"length\": null, \"views\": \"\", \"author\": \"\", \"metadata\": \"\", \"priority\": \"\", \"engines\": [\"duckduckgo\"], \"open_group\": false, \"close_group\": false, \"positions\": [1], \"score\": 1.0, \"category\": \"general\", \"url\": \"https://github.com/NjengaFelix/opencode-permissions\", \"engine\": \"duckduckgo\", \"parsed_url\": [\"https\", \"github.com\", \"/NjengaFelix/opencode-permissions\", \"\", \"\", \"\"]}, {\"template\": \"default.html\", \"title\": \"opencode-docs/docs/official/permissions.md at main \\u00b7 mudrii ... - GitHub\", \"content\": \"OpenCode uses the permission config to decide whether a given action should run automatically, prompt you, or be blocked. As of v1.1.1, the legacy tools boolean config is deprecated and has been merged into permission. The old tools config is still supported for backwards compatibility.\", \"img_src\": \"\", \"iframe_src\": \"\", \"audio_src\": \"\", \"thumbnail\": \"\", \"publishedDate\": null, \"pubdate\": \"\", \"length\": null, \"views\": \"\", \"author\": \"\", \"metadata\": \"\", \"priority\": \"\", \"engines\": [\"duckduckgo\"], \"open_group\": false, \"close_group\": false, \"positions\": [2], \"score\": 0.5, \"category\": \"general\", \"url\": \"https://github.com/mudrii/opencode-docs/blob/main/docs/official/permissions.md\", \"engine\": \"duckduckgo\", \"parsed_url\": [\"https\", \"github.com\", \"/mudrii/opencode-docs/blob/main/docs/official/permissions.md\", \"\", \"\", \"\"]}, {\"template\": \"default.html\", \"url\": \"https://github.com/anomalyco/opencode/issues/10848\", \"title\": \"How do you configure opencode to always be allowed to read all files in a certain directory \\u00b7 Issue #10848 \\u00b7 anomalyco/opencode\", \"content\": \"Please check: opencode not respecting permissions #8832: opencode not respecting permissions - Users report that permission configurations in opencode.json are not being respected, requiring manual confirmation prompts despite explicit 'allow' rules Feel free to ignore if this doesn't address your specific case.\", \"publishedDate\": \"2026-01-27T00:00:00\", \"thumbnail\": \"https://imgs.search.brave.com/EUQJa1J3Ft8LVtbr5is-l1UO5U9VdgIWqsu32Pptitg/rs:fit:200:200:1:0/g:ce/aHR0cHM6Ly9vcGVu/Z3JhcGguZ2l0aHVi/YXNzZXRzLmNvbS9i/YTRmMTI1NTRmNDdl/ODNhMmVjMWRkNzJl/YTQzNzIyNDUzMzI0/ZTk4NjI5NjA5OGFh/NzkyMjY1MzY5MmVi/OTkxL2Fub21hbHlj/by9vcGVuY29kZS9p/c3N1ZXMvMTA4NDg\", \"engine\": \"brave\", \"parsed_url\": [\"https\", \"github.com\", \"/anomalyco/opencode/issues/10848\", \"\", \"\", \"\"], \"img_src\": \"\", \"priority\": \"\", \"engines\": [\"brave\", \"duckduckgo\"], \"positions\": [17, 4], \"score\": 0.6176470588235294, \"category\": \"general\", \"pubdate\": \"2026-01-27 00:00:00\"}, {\"template\": \"default.html\", \"url\": \"https://github.com/code-yeongyu/oh-my-openagent/issues/2194\", \"title\": \"[Bug]: Installing oh-my-opencode can cause the permissions configured in opencode.jsonc (such as \\\"external_directory\\\": \\\"deny\\\") to fail, leading to security issues like files being deleted! \\u00b7 Issue #2194 \\u00b7 code-yeongyu/oh-my-openagent\", \"content\": \"I cannot guarantee that all permissions are invalidated, but I am absolutely certain that the \\\"external_directory\\\": \\\"deny\\\" configuration fails to take effect.\", \"publishedDate\": \"2026-02-27T00:00:00\", \"thumbnail\": \"https://imgs.search.brave.com/64Ni0gy0Hhj3ZGd2Owc3MQ7102iSnzkTKMA-bsJr2y8/rs:fit:200:200:1:0/g:ce/aHR0cHM6Ly9vcGVu/Z3JhcGguZ2l0aHVi/YXNzZXRzLmNvbS81/MzAxZTQwMDFiYTc4/NzgxYzdlMzZlNzk1/NmJjZTE1YjZjOGU0/OGFlMGQzMmViOTMx/ZjA3MjMwMDZlZGEz/NjFjL2NvZGUteWVv/bmd5dS9vaC1teS1v/cGVuYWdlbnQvaXNz/dWVzLzIxOTQ\", \"engine\": \"brave\", \"parsed_url\": [\"https\", \"github.com\", \"/code-yeongyu/oh-my-openagent/issues/2194\", \"\", \"\", \"\"], \"img_src\": \"\", \"priority\": \"\", \"engines\": [\"brave\"], \"positions\": [2], \"score\": 0.5, \"category\": \"general\", \"pubdate\": \"2026-02-27 00:00:00\"}, {\"template\": \"default.html\", \"url\": \"https://github.com/anomalyco/opencode/issues/8832\", \"title\": \"opencode not respecting permissions \\u00b7 Issue #8832 \\u00b7 anomalyco/opencode\", \"content\": \"opencode not respecting permissions#8832 \\u00b7 #14070 \\u00b7 Copy link \\u00b7 Assignees \\u00b7 vstenvik \\u00b7 opened \\u00b7 on Jan 16, 2026 \\u00b7 Issue body actions \\u00b7 This is my opencode.json: { \\\"$schema\\\": \\\"https://opencode.ai/config.json\\\", \\\"autoupdate\\\": true, \\\"share\\\": \\\"disabled\\\", \\\"permission\\\": { \\\"bash\\\": { \\\"find\\\": \\\"allow\\\", \\\"ls\\\": \\\"allow\\\", \\\"wc\\\": \\\"allow\\\", \\\"grep\\\": \\\"allow\\\", \\\"tail\\\": \\\"allow\\\", \\\"head\\\": \\\"allow\\\", \\\"cat\\\": \\\"allow\\\", \\\"jq\\\": \\\"allow\\\", \\\"git\\\": \\\"deny\\\" }, \\\"webfetch\\\": \\\"ask\\\", \\\"edit\\\": \\\"allow\\\" }, But opencode keeps running git commands anyways \\u00b7\", \"publishedDate\": \"2026-01-16T00:00:00\", \"thumbnail\": \"https://imgs.search.brave.com/vrx3KR8IJIALNbq4wJhnuml0xs3VAe9H71xtR6RHDLo/rs:fit:200:200:1:0/g:ce/aHR0cHM6Ly9vcGVu/Z3JhcGguZ2l0aHVi/YXNzZXRzLmNvbS9j/ZjNlNjgxYTMyNmQ0/NWRjNTFkNjU3NzVi/OGZhNmE5OGU3ODdk/MWQ0YjQ0NmUwN2Ri/NDQ2NGM4MDA5ZGVi/OTkyL2Fub21hbHlj/by9vcGVuY29kZS9p/c3N1ZXMvODgzMg\", \"engine\": \"brave\", \"parsed_url\": [\"https\", \"github.com\", \"/anomalyco/opencode/issues/8832\", \"\", \"\", \"\"], \"img_src\": \"\", \"priority\": \"\", \"engines\": [\"brave\", \"duckduckgo\"], \"positions\": [10, 9], \"score\": 0.4222222222222222, \"category\": \"general\", \"pubdate\": \"2026-01-16 00:00:00\"}, {\"template\": \"default.html\", \"url\": \"https://github.com/anomalyco/opencode/issues/13751\", \"title\": \"Permission prompt appears when reading ~/.config/opencode/AGENTS.md \\u00b7 Issue #13751 \\u00b7 anomalyco/opencode\", \"content\": \"This path is OpenCode's own config directory and is already used as a first-class instruction source, so the extra external-directory prompt is unexpected and interrupts normal flows. Put an AGENTS.md in ~/.config/opencode/. Start a session in any project. Trigger a workflow where the model reads instruction files (for example asking it to investigate and read AGENTS files). Observe permission request: Access external directory ~/.config/opencode.\", \"publishedDate\": \"2026-02-15T00:00:00\", \"thumbnail\": \"https://imgs.search.brave.com/9AfiTcI9PEVZlPYUDTzwCodMRGKJ9dPQHmeHMIt0t0s/rs:fit:200:200:1:0/g:ce/aHR0cHM6Ly9vcGVu/Z3JhcGguZ2l0aHVi/YXNzZXRzLmNvbS9l/MWI1YzMyYmEyODhm/OWIxMmQ2NmNiMTJm/OWRkNjRlOWRkMjYx/ZmQyMmZjNjlkMmYw/Yjc5NDQ3YjM2M2Uz/NTM1L2Fub21hbHlj/by9vcGVuY29kZS9p/c3N1ZXMvMTM3NTE\", \"engine\": \"brave\", \"parsed_url\": [\"https\", \"github.com\", \"/anomalyco/opencode/issues/13751\", \"\", \"\", \"\"], \"img_src\": \"\", \"priority\": \"\", \"engines\": [\"brave\"], \"positions\": [5], \"score\": 0.2, \"category\": \"general\", \"pubdate\": \"2026-02-15 00:00:00\"}, {\"template\": \"default.html\", \"url\": \"https://github.com/wesammustafa/OpenCode-Everything-You-Need-to-Know/blob/main/docs/reference/permissions.md\", \"title\": \"OpenCode-Everything-You-Need-to-Know/docs/reference/permissions.md at main \\u00b7 wesammustafa/OpenCode-Everything-You-Need-to-Know\", \"content\": \"Commit a restrictive opencode.json so everyone's agent has the same guardrails \\u00b7 CI / headless \\u00b7 Use --dangerously-skip-permissions only after auditing what the prompt can reach \\u00b7 Working with secrets \\u00b7 external_directory: \\\"deny\\\" plus a plugin that blocks edits to .env/secrets/ First time on a repo \\u00b7 Set bash: \\\"ask\\\" everywhere until you trust the workflows \\u00b7 \\ud83d\\udcda Live reference: opencode.ai/docs/permissions and opencode.ai/docs/agents.\", \"publishedDate\": null, \"thumbnail\": \"https://imgs.search.brave.com/r1e9rIHRv6TsgyXB7LxbjyKVOBrUtBtXBDRVGhY7H1M/rs:fit:200:200:1:0/g:ce/aHR0cHM6Ly9vcGVu/Z3JhcGguZ2l0aHVi/YXNzZXRzLmNvbS84/ZjQwMDM2MDhiNDVi/