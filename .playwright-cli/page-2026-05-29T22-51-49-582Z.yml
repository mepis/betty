ocs/Web/SVG/Reference/Attribute/vector-effect\", \"title\": \"vector-effect\", \"content\": \"The vector-effect property specifies the vector effect to use when drawing an object. Vector effects are applied before any of the other compositing operations, i.e., filters, masks and clips.\", \"engine\": \"mdn\", \"template\": \"default.html\", \"parsed_url\": [\"https\", \"developer.mozilla.org\", \"/en-US/docs/Web/SVG/Reference/Attribute/vector-effect\", \"\", \"\", \"\"], \"img_src\": \"\", \"thumbnail\": \"\", \"priority\": \"\", \"engines\": [\"mdn\"], \"positions\": [4], \"score\": 0.25, \"category\": \"it\", \"publishedDate\": null}, {\"url\": \"https://developer.mozilla.org/en-US/docs/Web/SVG\", \"title\": \"SVG: Scalable Vector Graphics\", \"content\": \"Scalable Vector Graphics (SVG) is an XML-based markup language for describing two-dimensional based vector graphics.\", \"engine\": \"mdn\", \"template\": \"default.html\", \"parsed_url\": [\"https\", \"developer.mozilla.org\", \"/en-US/docs/Web/SVG\", \"\", \"\", \"\"], \"img_src\": \"\", \"thumbnail\": \"\", \"priority\": \"\", \"engines\": [\"mdn\"], \"positions\": [5], \"score\": 0.2, \"category\": \"it\", \"publishedDate\": null}, {\"url\": \"https://developer.mozilla.org/en-US/docs/Learn_web_development/Core/Structuring_content/Including_vector_graphics_in_HTML\", \"title\": \"Including vector graphics in HTML\", \"content\": \"Vector graphics are very useful in many circumstances \\u2014 they have small file sizes and are highly scalable, so they don't pixelate when zoomed in or blown up to a large size. In this article we'll show you how to include one in your webpage.\", \"engine\": \"mdn\", \"template\": \"default.html\", \"parsed_url\": [\"https\", \"developer.mozilla.org\", \"/en-US/docs/Learn_web_development/Core/Structuring_content/Including_vector_graphics_in_HTML\", \"\", \"\", \"\"], \"img_src\": \"\", \"thumbnail\": \"\", \"priority\": \"\", \"engines\": [\"mdn\"], \"positions\": [6], \"score\