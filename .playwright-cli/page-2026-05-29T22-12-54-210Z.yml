            - paragraph [ref=e655]: Performs web searches using Exa AI to find relevant information online. Useful for researching topics, finding current events, or gathering information beyond the training data cutoff.
            - paragraph [ref=e656]: No API key is required — the tool connects directly to Exa AI’s hosted MCP service without authentication.
            - complementary "Tip" [ref=e657]:
              - paragraph [ref=e658]:
                - img [ref=e659]
                - text: Tip
              - paragraph [ref=e663]:
                - text: Use
                - code [ref=e664]: "`websearch`"
                - text: when you need to find information (discovery), and
                - code [ref=e665]: "`webfetch`"
                - text: when you need to retrieve content from a specific URL (retrieval).
