            - paragraph [ref=e692]: "This tool allows the LLM to ask the user questions during a task. It’s useful for:"
            - list [ref=e693]:
              - listitem [ref=e694]: Gathering user preferences or requirements
              - listitem [ref=e695]: Clarifying ambiguous instructions
              - listitem [ref=e696]: Getting decisions on implementation choices
              - listitem [ref=e697]: Offering choices about what direction to take
            - paragraph [ref=e698]: Each question includes a header, the question text, and a list of options. Users can select from the provided options or type a custom answer. When there are multiple questions, users can navigate between them before submitting all answers.
            - separator [ref=e699]
            - heading "Custom tools" [level=2] [ref=e700]:
              - link "Custom tools" [ref=e701]:
                - /url: "#custom-tools"
            - paragraph [ref=e702]: Custom tools let you define your own functions that the LLM can call. These are defined in your config file and can execute arbitrary code.
            - paragraph [ref=e703]:
              - link "Learn more" [ref=e704] [cursor=pointer]:
                - /url: /docs/custom-tools
              - text: about creating custom tools.
            - separator [ref=e705]
            - heading "MCP servers" [level=2] [ref=e706]:
              - link "MCP servers" [ref=e707]:
                - /url: "#mcp-servers"
            - paragraph [ref=e708]: MCP (Model Context Protocol) servers allow you to integrate external tools and services. This includes database access, API integrations, and third-party services.
            - paragraph [ref=e709]:
              - link "Learn more" [ref=e710] [cursor=pointer]:
                - /url: /docs/mcp-servers
              - text: about configuring MCP servers.
            - separator [ref=e711]
            - heading "Internals" [level=2] [ref=e712]:
              - link "Internals" [ref=e713]:
                - /url: "#internals"
            - paragraph [ref=e714]:
              - text: Internally, tools like
              - code [ref=e715]: "`grep`"
              - text: and
              - code [ref=e716]: "`glob`"
              - text: use
              - link "ripgrep" [ref=e717] [cursor=pointer]:
                - /url: https://github.com/BurntSushi/ripgrep
              - text: under the hood. By default, ripgrep respects
              - code [ref=e718]: "`.gitignore`"
              - text: patterns, which means files and directories listed in your
              - code [ref=e719]: "`.gitignore`"
              - text: will be excluded from searches and listings.
            - separator [ref=e720]
            - heading "Ignore patterns" [level=3] [ref=e721]:
              - link "Ignore patterns" [ref=e722]:
                - /url: "#ignore-patterns"
            - paragraph [ref=e723]:
              - text: To include files that would normally be ignored, create a
              - code [ref=e724]: "`.ignore`"
              - text: file in your project root. This file can explicitly allow certain paths.
            - figure ".ignore" [ref=e726]:
