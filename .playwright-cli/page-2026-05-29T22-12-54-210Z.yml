            - paragraph [ref=e740]:
              - text: For example, this
              - code [ref=e741]: "`.ignore`"
              - text: file allows ripgrep to search within
              - code [ref=e742]: "`node_modules/`"
              - text: ","
              - code [ref=e743]: "`dist/`"
              - text: ", and"
              - code [ref=e744]: "`build/`"
              - text: directories even if they’re listed in
