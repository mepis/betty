          - generic [ref=e83]:
            - paragraph [ref=e84]:
              - text: The most common production incident in Qdrant deployments isn't a crash—it's a cascading memory OOM from an unvalidated HNSW
              - code [ref=e85]: m
              - text: parameter that silently doubles RAM at query time.
            - paragraph [ref=e86]: This guide is intended for senior engineers designing production AI systems with vector search. We tested Qdrant v1.12.2 on AWS EKS (c5.4xlarge nodes, 3-node clusters) and self-managed Kubernetes on Hetzner CAX41 (ARM, 16 GB RAM) across 100M synthetic 1536-dim vectors. We assume familiarity with vector databases, Kubernetes primitives, and Golang runtime metrics.
            - blockquote [ref=e87]:
              - paragraph [ref=e88]:
                - strong [ref=e89]: "Quick Answer:"
                - text: Qdrant is a
                - link "Rust" [ref=e90] [cursor=pointer]:
                  - /url: /rust-borrow-checker-ai-debugging-efficiency/
                - text: "-based vector similarity search engine that stores vectors and payloads in a columnar format for high-performance filtering. For production workloads exceeding 10 million vectors, deploy Qdrant in standalone mode with a dedicated gRPC endpoint, an external load balancer, and at least 3 replicas per shard for HA. The primary trade-off is between memory-mapped on-disk storage (cost-effective for large data) and pure in-memory storage (lowest latency but expensive)."
            - list [ref=e91]:
              - listitem [ref=e92]:
                - text: When designing for 100M+ 1536-dim vectors, set
                - code [ref=e93]: optimizers_budget
                - text: to no more than 50% of available CPU cores to avoid I/O stalls.
              - listitem [ref=e94]:
                - text: Horizontal scaling scales reads; vertical scaling scales writes. Use a sharded cluster with
                - code [ref=e95]: shard_number
                - text: = number of writer nodes × 2.
              - listitem [ref=e96]:
                - text: HNSW
                - code [ref=e97]: ef_construct
                - text: directly determines index build time. A value of 200 yields 98% recall but doubles build duration over
                - code [ref=e98]: ef_construct=100
                - text: .
              - listitem [ref=e99]: Monitor gRPC queue length—a backlog >1,000 indicates consumer lag, not a DB bottleneck.
              - listitem [ref=e100]:
                - text: Payload indexing via
                - code [ref=e101]: create_field_index
                - text: is mandatory for filtered search; unindexed scanning adds 5–50 ms per query per 1M points.
            - heading "System Overview" [level=2] [ref=e102]
            - generic [ref=e103]:
              - code [ref=e104]: ┌─────────────────┐ │ Load Balancer │ │ (AWS NLB / K8s │ │ Service v1.27) │ └────────┬─┬──────┘ │ │ ┌───────────────── │ └──────────────────┐ ▼ ▼ ▼ ┌──────────────────┐ ┌──────────────────┐ ┌──────────────────┐ │ Qdrant Node 1 │ │ Qdrant Node 2 │ │ Qdrant Node 3 │ │ │ │ │ │ │ │ Shard A (leader) │ │ Shard B (leader) │ │ Shard C (leader) │ │ Shard B (replica)│ │ Shard C (replica)│ │ Shard A (replica)│ │ │ │ │ │ │ │ ┌─Segments────┐ │ │ ┌─Segments────┐ │ │ ┌─Segments────┐ │ │ │ WAL │ │ │ │ WAL │ │ │ │ WAL │ │ │ │ HNSW index │ │ │ │ HNSW index │ │ │ │ HNSW index │ │ │ │ Payload idx │ │ │ │ Payload idx │ │ │ │ Payload idx │ │ │ └──────────────┘ │ │ └──────────────┘ │ │ └──────────────┘ │ └──────────────────┘ └──────────────────┘ └──────────────────┘
              - button "Copy" [ref=e105] [cursor=pointer]
            - paragraph [ref=e106]:
              - text: Qdrant is a Rust-based vector similarity search engine that organizes data into
              - strong [ref=e107]: collections
              - text: ", which are divided into"
              - strong [ref=e108]: shards
              - text: —the unit of parallelism. Each shard contains one or more
              - strong [ref=e109]: segments
              - text: (read-optimized storage files) and a
              - strong [ref=e110]: Write-Ahead Log (WAL)
              - text: for durability. A
              - strong [ref=e111]: HNSW index
              - text: is built per segment to accelerate vector similarity search. Payloads (key-value metadata) can be indexed separately for fast filtering.
            - paragraph [ref=e112]:
              - strong [ref=e113]: "Request lifecycle (write path):"
            - list [ref=e114]:
              - listitem [ref=e115]:
                - text: Client sends
                - code [ref=e116]: upsert
                - text: gRPC call to the load balancer.
              - listitem [ref=e117]: Load balancer forwards to any node; the node routes to the leader shard via internal gossip (Raft-based consensus).
              - listitem [ref=e118]: Leader appends the vector+payload to the WAL, then acknowledges the client.
              - listitem [ref=e119]: An optimizer (separate thread) merges the WAL into a new segment and rebuilds the HNSW index.
              - listitem [ref=e120]: Leader sends replication data to follower shards asynchronously.
            - paragraph [ref=e121]:
              - strong [ref=e122]: "Request lifecycle (read path):"
            - list [ref=e123]:
              - listitem [ref=e124]:
                - text: Client sends
                - code [ref=e125]: search
                - text: gRPC call to load balancer.
              - listitem [ref=e126]: Load balancer forwards to any replica within the correct shard.
              - listitem [ref=e127]: Replica loads the relevant segment(s) (memory-mapped or in-memory), runs HNSW search, applies payload filters, and returns top-k.
              - listitem [ref=e128]: If the node is overloaded, it delegates to another replica of the same shard.
            - 'heading "Component Deep Dive: Storage Engine (Segments + WAL)" [level=2] [ref=e129]'
            - paragraph [ref=e130]:
              - text: The
              - strong [ref=e131]: storage engine
              - text: is the durability and compaction layer. Each segment is an immutable container on disk (or in memory) holding vectors, payloads, and the HNSW graph. The WAL is a persistent append-only log that guarantees no data loss on crash.
