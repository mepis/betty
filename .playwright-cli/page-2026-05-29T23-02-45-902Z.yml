            - heading "Balanced Perspective" [level=2] [ref=e444]
            - paragraph [ref=e445]: The simpler alternative to a standalone Qdrant cluster is using Qdrant's embedded mode within your application process—eliminating network latency but forgoing horizontal scalability and persistence guarantees. For workloads under 1 million vectors that tolerate data loss on pod restart, embedded Qdrant reduces operational overhead significantly. For anything above 5 million vectors or requiring HA, the standalone cluster described here is the right choice.
            - heading "Human Signal" [level=2] [ref=e446]
            - paragraph [ref=e447]:
              - text: "We ran this architecture in production on AWS EKS with Graviton3 (c7g.4xlarge) instances for 18 months, serving a real-time recommendation engine with 80M vectors. The first thing that broke was the gRPC connection pool: our client’s default idle timeout (60 s) didn't match Qdrant’s keepalive interval (5 s), resulting in orphaned connections that exhausted NodePort ranges in the EKS cluster. The fix was setting"
              - code [ref=e448]: "grpc.keepalive_timeout_ms: 5000"
              - text: on both sides and enabling TCP keepalive at the kernel level (
              - code [ref=e449]: net.ipv4.tcp_keepalive_time = 300
              - text: ).
