            - heading "Honest Trade-off" [level=2] [ref=e509]
            - paragraph [ref=e510]:
              - text: The downside of this architecture is that it’s overengineered for teams running fewer than 5 million vectors. The operational burden of maintaining a dedicated Qdrant cluster—including operator management, persistent volume claims, gRPC reconnection logic, and Raft-based consensus—can outweigh the latency benefits when a simpler solution like LanceDB or
              - link "PostgreSQL" [ref=e511] [cursor=pointer]:
                - /url: /postgresql-v17-ai-query-optimization/
              - text: + pgvector suffices. For startups and early-stage products, we strongly advise starting with an embedded Qdrant or a managed vector DB service before committing to this topology.
            - heading "Frequently Asked Questions" [level=2] [ref=e512]
            - heading "How does Qdrant handle vector quantization?" [level=3] [ref=e513]
            - paragraph [ref=e514]:
              - text: Qdrant supports both scalar (int8) and product quantization (PQ). Scalar quantization maps each float dimension to one byte, reducing memory by 75% with <2% recall loss. PQ compresses vectors into codebooks (e.g., 64-bit per 1536-dim vector) but requires a separate index. Enable via
              - code [ref=e515]: quantization_config
              - text: at collection creation; you cannot toggle quantization on an existing collection.
            - heading "What is the recommended shard count for a 10-node cluster?" [level=3] [ref=e516]
            - paragraph [ref=e517]:
              - text: For a 10-node cluster, start with 10 shards and a replication factor of 3. This gives 30 shard replicas distributed evenly. Adjust
              - code [ref=e518]: shard_number
              - text: "if write throughput is the bottleneck—increase to 20 shards for heavy ingestion. Use the formula:"
              - code [ref=e519]: shard_number = ceiling(write QPS / 500)
              - text: plus overhead.
            - heading "Can I run Qdrant without Kubernetes? What are the tradeoffs?" [level=3] [ref=e520]
            - paragraph [ref=e521]: Yes, Qdrant runs as a standalone binary. You lose automated orchestration, self-healing, and easy scaling. For small deployments, run on a single VM with systemd. For multi-node clusters, you’ll need manual load balancing and failover logic. Kubernetes is recommended for
            - paragraph [ref=e522]:
              - text: is recommended for production deployments with more than three nodes. Use the Helm chart (
              - code [ref=e523]: qdrant/qdrant
              - text: ) for automated cluster setup.
            - paragraph [ref=e524]: That completes the FAQ section. The article is now finished. No further sections are required.
