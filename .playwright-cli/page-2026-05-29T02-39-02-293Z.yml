        - paragraph [ref=e199]: So on raw tok/s the MoE wins by 3x without DFlash. With DFlash on the dense, the gap shrinks to roughly even. On agentic-coding scores the dense wins. On general chat or RAG workloads the MoE is the better experience.
        - paragraph [ref=e200]: "The interesting wrinkle: the MoE leaves zero KV-cache headroom on a 3090 at UD-Q4_K_XL with 65K context. Push to 128K and you’ll need UD-Q3_K_M or KV cache offload. The 27B dense gives you more context for the same card."
        - 'heading "The Mac path: MLX, not GGUF" [level=2] [ref=e201]'
        - paragraph [ref=e202]:
          - text: Mac users running this on llama.cpp Metal will get it working but slower than they should. The Metal kernels for the Gated DeltaNet layers are still catching up to CUDA. MLX is the right path on Apple Silicon. The
          - link "Qwen MLX vs Ollama guide" [ref=e203] [cursor=pointer]:
            - /url: /guides/qwen35-mac-mlx-vs-ollama/
          - text: walks through the install, and the MLX team shipped 35B-A3B quants in the first week.
        - paragraph [ref=e204]:
          - text: For RAM-poor Macs, look for the 3-bit MLX quants in the
          - code [ref=e205]: baa-ai
          - text: and
          - code [ref=e206]: mlx-community
          - text: repos. A 3-bit 35B-A3B lands around 14-16 GB and runs on a 16GB M1 Pro. Quality is noticeably below Q4, but it’s the only way to get 35B onto a base Mac. The 27B dense at 4-bit MLX is a better quality-per-byte trade if your Mac has 24GB+ unified memory. See the
          - link "best local LLMs for Mac" [ref=e207] [cursor=pointer]:
            - /url: /guides/best-local-llms-mac-2026/
          - text: writeup for the broader picture.
        - heading "Setup walkthrough" [level=2] [ref=e208]
        - paragraph [ref=e209]: The fastest path that works today is llama.cpp built from source plus the Unsloth UD quants. Three steps.
        - heading "1. Build llama.cpp from a recent commit" [level=3] [ref=e210]
        - code [ref=e213]:
          - generic [ref=e215]: git clone https://github.com/ggml-org/llama.cpp
          - generic [ref=e217]: cd llama.cpp
          - generic [ref=e219]: cmake -B build -DGGML_CUDA=ON -DCMAKE_BUILD_TYPE=Release
          - generic [ref=e221]: cmake --build build --config Release -j
        - paragraph [ref=e222]:
          - text: You need a build at b8954 or later for
          - code [ref=e223]: "--cpu-moe"
          - text: and the latest Gated DeltaNet kernels. Pin CUDA 13.1 or earlier. Multiple reports of low-bit 3.6 quants producing gibberish on CUDA 13.2. The issue is in the cuBLAS path, not llama.cpp itself. Amine Raji flagged it explicitly. Unsloth’s docs flag it. If you see garbage tokens, this is the first thing to check.
        - heading "2. Pull the GGUF + mmproj" [level=3] [ref=e224]
        - paragraph [ref=e225]: "The 35B-A3B is multimodal. There are two files: the main GGUF and an mmproj vision sidecar. llama.cpp won’t load the model without mmproj on recent builds, even for text-only inference."
        - code [ref=e228]:
          - generic [ref=e230]: huggingface-cli download unsloth/Qwen3.6-35B-A3B-GGUF \
          - generic [ref=e232]: Qwen3.6-35B-A3B-UD-Q4_K_XL.gguf mmproj-F16.gguf \
          - generic [ref=e234]: "--local-dir ./qwen36-35b"
        - paragraph [ref=e235]:
          - text: UD-Q4_K_XL is the Unsloth Dynamic 4-bit “extra large” quant. It’s the recommended balance per their model card. UD-Q3_K_M is the 16GB-card alternative. The full quant table is on the
          - link "Unsloth GGUF page" [ref=e236] [cursor=pointer]:
            - /url: https://huggingface.co/unsloth/Qwen3.6-35B-A3B-GGUF
          - text: .
        - heading "3. Run llama-server" [level=3] [ref=e237]
        - code [ref=e240]:
          - generic [ref=e242]: ./build/bin/llama-server \
          - generic [ref=e244]: "--model ./qwen36-35b/Qwen3.6-35B-A3B-UD-Q4_K_XL.gguf \\"
          - generic [ref=e246]: "--mmproj ./qwen36-35b/mmproj-F16.gguf \\"
          - generic [ref=e248]: "--alias \"qwen36-35b-a3b\" \\"
          - generic [ref=e250]: "--ctx-size 65536 \\"
          - generic [ref=e252]: "--n-gpu-layers 99 \\"
          - generic [ref=e254]: "--flash-attn on \\"
          - generic [ref=e256]: "--cache-type-k q8_0 \\"
          - generic [ref=e258]: "--cache-type-v q8_0 \\"
          - generic [ref=e260]: "--temp 1.0 \\"
          - generic [ref=e262]: "--top-p 0.95 \\"
          - generic [ref=e264]: "--top-k 20 \\"
          - generic [ref=e266]: "--presence-penalty 1.5 \\"
          - generic [ref=e268]: "--min-p 0.00 \\"
          - generic [ref=e270]: "--port 8001"
        - paragraph [ref=e271]:
          - text: For a 16GB card add
          - code [ref=e272]: "--cpu-moe"
          - text: and drop
          - code [ref=e273]: "--n-gpu-layers"
          - text: to fit attention + shared expert in VRAM. For instruct (no thinking) mode, swap to
          - code [ref=e274]: "--temp 0.7 --top-p 0.8"
          - text: and pass
          - code [ref=e275]: "--chat-template-kwargs '{\"enable_thinking\":false}'"
          - text: .
        - paragraph [ref=e276]:
          - text: LM Studio works too. Point it at the same GGUF and set the mmproj field in the model config. Ollama is broken for 3.6 GGUFs as of late April. The mmproj sidecar isn’t supported in the Ollama loader yet. Stay on Qwen 3.5-35B-A3B in Ollama until that lands. The depth comparison is in
          - link "llama.cpp vs Ollama vs vLLM" [ref=e277] [cursor=pointer]:
            - /url: /guides/llamacpp-vs-ollama-vs-vllm/
          - text: .
        - heading "When to pick the MoE over the 27B dense" [level=2] [ref=e278]
        - paragraph [ref=e279]: "Pick 35B-A3B if:"
        - list [ref=e280]:
          - listitem [ref=e281]: You want fast everyday chat and RAG workloads on a 24GB card. 100 tok/s feels different from 30 tok/s.
          - listitem [ref=e282]: You only have 16GB VRAM and 32GB+ system RAM. CPU-MoE offload makes the full Q4 reachable. The 27B dense with KV offload is slower and worse.
          - listitem [ref=e283]: You’re on Apple Silicon with 64GB+ unified memory. MLX handles MoE well now.
          - listitem [ref=e284]: You want broader world knowledge in the weights. 35B of stored capacity matters for trivia and niche-domain work.
        - paragraph [ref=e285]: "Pick 27B dense if:"
        - list [ref=e286]:
          - listitem [ref=e287]: You code primarily and tool-use reliability matters. The 35B-A3B has community reports of dropping tool calls on long agent loops.
          - listitem [ref=e288]:
            - text: You need the
            - link "DFlash 2x speedup" [ref=e289] [cursor=pointer]:
              - /url: /guides/best-way-2x-token-output-rtx-3090-qwen-3-6-dflash/
            - text: . It’s NVIDIA-only, sm_86+, and only supports the dense.
          - listitem [ref=e290]: You want strict instruction-following under heavy system prompts. MoE routing drift bites here.
          - listitem [ref=e291]: You want more KV headroom on a 24GB card at long context.
        - paragraph [ref=e292]:
          - text: The
          - link "full Qwen 3.6 guide" [ref=e293] [cursor=pointer]:
            - /url: /guides/qwen-3-6-local-ai-guide/
          - text: walks through the dense side in detail and covers the Max-Preview cloud-only variant for completeness.
        - heading "Honest limits" [level=2] [ref=e294]
        - paragraph [ref=e295]: "A few rough edges that are real, week-one of late April 2026:"
        - list [ref=e296]:
          - listitem [ref=e297]:
            - strong [ref=e298]: Tool calling regressions.
            - text: r/LocalLLaMA threads include reports of the 35B-A3B repeating failed tool calls without reading back context, and skipping tool calls entirely on multi-turn loops. The 27B dense is steadier here. If you’re wiring this into Claude Code, OpenCode, or an MCP harness, test before you commit.
          - listitem [ref=e299]:
            - strong [ref=e300]: Web search broken in some llama.cpp builds.
            - text: The web-search tool path through llama-server has been reported broken on builds between b8954 and b8967 specifically for the 35B-A3B. Pin to a known-good build or compile head-of-tree. Issue is open on GitHub.
          - listitem [ref=e301]:
            - strong [ref=e302]: No DFlash support for MoE.
            - text: The block-diffusion speculative decoding speedup that doubles 27B dense throughput on a 3090 does not extend to the 35B-A3B. The DFlash team hasn’t said when or whether it will. The MoE routing changes the draft-verify math.
          - listitem [ref=e303]:
            - strong [ref=e304]: CUDA 13.2 gibberish.
            - text: Already covered. Pin 13.1, or use a build that has the cuBLAS workaround merged.
          - listitem [ref=e305]:
            - strong [ref=e306]: Speculative decoding via llama.cpp’s standard path doesn’t help.
            - text: "PR #19493 added MoE-aware speculative decoding, but per community testing the routing overhead eats the win on the 35B-A3B specifically. MTP through vLLM and SGLang is the better path if you need additional speed."
        - paragraph [ref=e307]: None of these are fatal. Most will be fixed in days, not months. But they’re current as of writing and worth knowing.
        - heading "Bottom line" [level=2] [ref=e308]
        - paragraph [ref=e309]: The 35B MoE is the right pick for fast general-purpose local AI on a 24GB card or with smart RAM offload on a 16GB card. The 27B dense is the right pick for coding and agentic work on the same hardware, especially with DFlash. Both are Apache 2.0, both are 262K context, both are natively multimodal.
        - paragraph [ref=e310]: If you only download one, ask yourself which workload dominates. Code all day? 27B dense. Chat, RAG, summarization, multilingual? 35B-A3B. If you have the disk for both, keep both. They cover different jobs and switching takes a llama-server restart.
