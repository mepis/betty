        - paragraph [ref=e149]: Caveats. RTX 4090 numbers are extrapolated from 3090 throughput plus the typical 4090 advantage on llama.cpp; community posts back this up roughly. RTX 5090 numbers are from a few r/LocalLLaMA reports running early Blackwell builds. Mac numbers are MLX, not GGUF. Metal MoE handling improved a lot in MLX 0.21+.
        - paragraph [ref=e150]:
          - text: The 5070 Ti 16GB + 32GB RAM thread on r/LocalLLaMA is the one that surprised people. With
          - code [ref=e151]: "--cpu-moe"
          - text: parking the 8 routed experts in system RAM and keeping the shared expert plus attention on GPU, a 16GB card runs the full Q4 model. Slow, but real, and the quality is the full Q4 model rather than a more aggressive quant. For a chat workload that’s a meaningful trade against running UD-IQ2 on-GPU for speed.
        - heading "–cpu-moe explained, briefly" [level=2] [ref=e152]
        - paragraph [ref=e153]:
          - code [ref=e154]: "--cpu-moe"
          - text: is a llama.cpp flag (landed in b8954-era builds) that tells the engine to keep MoE expert weights in CPU RAM and stream them across PCIe per token. The shared expert and attention layers stay on GPU. For a 3B-active MoE the per-token data movement is small enough that the speed hit isn’t fatal. You’re still doing 3B-active math, just with a hop across the bus to fetch which 8 experts to use.
        - paragraph [ref=e155]: "It only makes sense when:"
        - list [ref=e156]:
          - listitem [ref=e157]: The model doesn’t fit fully in VRAM (16GB cards, 12GB cards)
          - listitem [ref=e158]: You have enough system RAM to hold the expert weights (32GB+ for Q4, 64GB+ for Q6)
          - listitem [ref=e159]: You can tolerate ~3x slower generation than fully on-GPU
        - paragraph [ref=e160]: For a 24GB+ card the answer is don’t use it. Full GPU is always faster.
        - heading "35B MoE vs 27B dense on the same hardware" [level=2] [ref=e161]
