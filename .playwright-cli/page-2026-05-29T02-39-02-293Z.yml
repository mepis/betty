      - complementary [ref=e33]:
        - strong [ref=e34]: "Quick Answer:"
        - text: "Qwen3.6-35B-A3B is a Mixture-of-Experts model: 35B total parameters, only 3B active per token. UD-Q4_K_XL is 22.4 GB and runs at 101 tok/s on a single RTX 3090. UD-Q3_K_M is 16.6 GB and fits a 16GB card with KV offload. Dual RTX 5060 Ti 16GB and RTX 5070 Ti 16GB + 32GB system RAM both work via --cpu-moe expert offload, around 30-50 tok/s. Apple M3 Ultra runs Q6_K at 35-45 tok/s. Skip Ollama for now (mmproj vision file is unsupported). Use llama.cpp from a recent build, not CUDA 13.2 (gibberish bug). DFlash speculative decoding does not support the MoE. Only the 27B dense."
      - generic [ref=e35]:
        - paragraph [ref=e36]:
          - text: 📚
          - strong [ref=e37]: "More on this topic:"
          - link "Qwen 3.6 Complete Guide" [ref=e38] [cursor=pointer]:
            - /url: /guides/qwen-3-6-local-ai-guide/
          - text: ·
          - link "MoE Models Explained" [ref=e39] [cursor=pointer]:
            - /url: /guides/moe-models-explained/
          - text: ·
          - link "Best Local Coding Models" [ref=e40] [cursor=pointer]:
            - /url: /guides/best-local-coding-models-2026/
          - text: ·
          - link "VRAM Requirements" [ref=e41] [cursor=pointer]:
            - /url: /guides/vram-requirements-local-llms/
          - text: ·
          - link "llama.cpp vs Ollama vs vLLM" [ref=e42] [cursor=pointer]:
            - /url: /guides/llamacpp-vs-ollama-vs-vllm/
        - paragraph [ref=e43]: If you have 24GB VRAM and you’ve been running Qwen 3.6-27B dense, here’s the question. Would you trade for the MoE 35B-A3B?
        - paragraph [ref=e44]:
          - text: The honest answer is “it depends, and the dependencies are not what you’d guess.” More total parameters. Fewer active. Different speed profile. Different tool-use behavior. And the
          - link "DFlash 2x speedup" [ref=e45] [cursor=pointer]:
            - /url: /guides/best-way-2x-token-output-rtx-3090-qwen-3-6-dflash/
          - text: that landed yesterday for the 27B dense does not work on the MoE.
        - paragraph [ref=e46]: This piece is the hardware-reality view of the 35B MoE. What runs where, how fast, and the setup commands that actually work in late April 2026.
        - paragraph [ref=e47]:
          - 'img "Image: Qwen 3.6-27B dense vs 35B-A3B MoE comparison chart on RTX 3090, tok/s, VRAM, active parameters" [ref=e48]'
        - heading "What about low-VRAM hardware? (May 2026)" [level=2] [ref=e49]
        - paragraph [ref=e50]:
          - text: The hardware table above starts at a 12GB RTX 3060. The actual floor is lower than that. YouTube creator
          - link "Codacus demonstrated" [ref=e51] [cursor=pointer]:
            - /url: https://www.youtube.com/watch?v=8F_5pdcD3HY
          - text: Qwen 3.6-35B-A3B running on an 8-year-old GTX 1060 with 6GB VRAM, an Intel i3-8100 (4 cores, no hyperthreading), and 24GB DDR4 RAM at
          - strong [ref=e52]: 17 tok/s with 256K context
          - text: — production-stable for week-long uptime.
        - paragraph [ref=e53]: "Five flags get you there, all mainline llama.cpp (no fork required):"
        - list [ref=e54]:
          - listitem [ref=e55]:
            - strong [ref=e56]:
              - code [ref=e57]: "--n-cpu-moe N"
            - text: (N = layer count). Pins MoE expert blocks to CPU while keeping attention on GPU. The breakthrough flag — moves the GTX 1060 from 3 → 10 tok/s by itself.
          - listitem [ref=e58]:
            - strong [ref=e59]:
              - code [ref=e60]: "--no-mmap"
            - text: . Forces the full model into RAM upfront, avoiding page faults during inference. 10 → 13.5 tok/s.
          - listitem [ref=e61]:
            - strong [ref=e62]:
              - text: Tune
              - code [ref=e63]: "--n-cpu-moe"
              - text: down
            - text: (41 → 35). Pulls some experts back onto GPU using spare VRAM. 13.5 → 17 tok/s, but context window shrinks 100K → 64K.
          - listitem [ref=e64]:
            - strong [ref=e65]: TurboQuant KV cache quantization
            - text: (Google DeepMind’s random-rotation method). K=4 bits, V=3 bits, asymmetric because the model uses 8:1 grouped-query attention. Context goes 64K → 256K with no speed loss and negligible quality drop. Same 17 tok/s.
          - listitem [ref=e66]:
            - strong [ref=e67]:
              - code [ref=e68]: mlock
              - text: + Docker
              - code [ref=e69]: IPC_LOCK
              - text: +
              - code [ref=e70]: "--mlock"
            - text: . Stops the kernel from paging memory back to disk. Same 17 tok/s, but survives week-long uptime without slow degradation.
        - paragraph [ref=e71]:
          - text: "What didn’t work: speculative decoding with Qwen 3.5 0.8B as drafter dropped throughput to 11 tok/s despite a 65% accept rate. MoE batched verification pulls from up to 64 different experts per layer (memory thrash), and 30 of 40 layers are state-space layers that can’t parallelize across a draft window."
          - strong [ref=e72]: Spec decode does not help this MoE on current methods.
          - text: If you’re running the Qwen 3.6-27B dense instead, that’s where DFlash applies — see
          - link "DFlash on RTX 3090" [ref=e73] [cursor=pointer]:
            - /url: /guides/dflash-rtx-3090-bench-both-qwens/
          - text: and the
          - link "DFlash vs MTP head-to-head" [ref=e74] [cursor=pointer]:
            - /url: /guides/dflash-vs-mtp-rtx-3090-head-to-head/
          - text: .
        - paragraph [ref=e75]: This isn’t an alternative to the setup above. It’s the floor showing what’s possible when you’re hardware-constrained.
        - heading "What “35B-A3B” actually means" [level=2] [ref=e76]
        - paragraph [ref=e77]: A3B is the part that matters. The model holds 35 billion parameters in memory. For each token it predicts, it routes through 8 of 256 experts plus 1 shared expert. That’s roughly 3 billion parameters worth of compute per forward pass. You pay memory like a 35B and compute like a 3B. That asymmetry is the whole MoE pitch.
        - paragraph [ref=e78]: "Two consequences that change your hardware decision:"
        - list [ref=e79]:
          - listitem [ref=e80]:
            - strong [ref=e81]: More VRAM than 27B dense.
            - text: All 35B of weights have to live somewhere. UD-Q4_K_M is 22.1 GB versus ~17 GB for the 27B Q4. Same VRAM ballpark, but tighter on a 24GB card once you add KV cache.
          - listitem [ref=e82]:
            - strong [ref=e83]: Faster generation than a 27B dense at the same quant.
            - text: 3B-active means the GPU does roughly 3B’s worth of math per token. On an RTX 3090 the 35B-A3B benchmarks ~100 tok/s while the 27B dense lives around 35 tok/s. About 3x faster, despite being a bigger model on disk.
        - paragraph [ref=e84]:
          - text: If MoE architecture is new to you, the
          - link "MoE models explained" [ref=e85] [cursor=pointer]:
            - /url: /guides/moe-models-explained/
          - text: "primer covers the routing logic and why the 256-expert design works for local inference. The short version: experts are small (512-dim intermediate per expert in 3.6), routing is cheap, and the math works out in your favor whenever you’re bottlenecked on memory bandwidth. Most consumer GPUs are."
