            - heading "What Is Prompt Caching" [level=2] [ref=e69]
            - paragraph [ref=e70]:
              - text: "LLM inference has two phases:"
              - strong [ref=e71]: prefill
              - text: and
              - strong [ref=e72]: decode
              - text: . During prefill, the model processes the entire input prompt, computing Query, Key, and Value tensors across all transformer layers. This produces the first output token. During decode, the model generates tokens one at a time, using the KV tensors from prefill to attend back to the input.
            - paragraph [ref=e73]: Prefill is the expensive phase. It scales with prompt length, involves dense matrix multiplications across every layer, and runs once before any output appears. On a 10,000-token prompt, prefill dominates the time-to-first-token measurement.
            - paragraph [ref=e74]: "Prompt caching exploits a property of causal attention: the KV tensors for token N depend only on tokens 1 through N. If two requests share the same first 10,000 tokens, the KV tensors for those tokens are identical. Recomputing them is pure waste."
            - paragraph [ref=e75]: With caching, the provider stores the KV tensors from a previous prefill. When a new request arrives with the same prefix, it loads the stored tensors instead of recomputing them, then runs prefill only on the new tokens after the cached prefix. The latency savings are proportional to the fraction of the prompt that hits cache. The cost savings come from providers charging less for cached reads than fresh computation.
            - generic [ref=e76]:
              - heading "KV cache vs. prompt cache" [level=4] [ref=e77]
              - generic [ref=e78]:
                - paragraph [ref=e79]:
                  - strong [ref=e80]: KV cache
                  - text: "is the general mechanism: storing Key-Value tensors to avoid recomputation during autoregressive decoding within a single request. Every LLM inference engine uses this internally."
                - paragraph [ref=e81]:
                  - strong [ref=e82]: Prompt cache
                  - text: (or prefix cache) extends this across requests. It stores the KV tensors from one request's prefill phase and serves them to subsequent requests that share the same prefix. This is the API-level feature that providers expose.
          - generic [ref=e83]:
            - heading "How KV Cache Reuse Works" [level=2] [ref=e84]
            - paragraph [ref=e85]:
              - text: The implementation uses
              - link "PagedAttention" [ref=e86] [cursor=pointer]:
                - /url: https://blog.vllm.ai/2023/06/20/vllm.html
              - text: as its foundation. Instead of allocating one contiguous GPU memory block per request (which wastes ~70% of memory to fragmentation), the system breaks the KV cache into fixed-size blocks, typically 16 tokens each. Each block gets a hash based on its content and the hash of its parent block.
            - generic [ref=e87]:
              - heading "Prefix cache hash chain" [level=4] [ref=e89]
              - code [ref=e92]: "# Each KV cache block is hashed with its parent: hash(block_0) = sha256(tokens[0:16], metadata) hash(block_1) = sha256(hash(block_0), tokens[16:32], metadata) hash(block_2) = sha256(hash(block_1), tokens[32:48], metadata) # If block_2's hash matches, blocks 0 and 1 are # guaranteed identical. No need to verify each one. # When a new request arrives: # 1. Compute hashes for each block of the new prompt # 2. Walk forward until a hash miss occurs # 3. Load cached KV tensors for all matching blocks # 4. Run prefill only on blocks after the miss"
            - paragraph [ref=e93]:
              - text: The hash chain is the key insight. Because each block's hash includes its parent's hash, a match at block N guarantees matches for blocks 0 through N-1. The system walks forward through hashes until it hits a miss, loads all cached blocks up to that point, and only computes the remainder. This is why
              - strong [ref=e94]: static content must come first
              - text: "in your prompt: any change in the prefix invalidates the entire chain after that point."
            - paragraph [ref=e95]: "Multiple requests can share the same cached blocks simultaneously. Reference counting prevents premature deallocation. When the last request using a block finishes, the block returns to the free pool. This is why steady request streams maintain higher cache hit rates: the blocks stay allocated."
            - generic [ref=e96]:
              - heading "Why causal attention makes prefix caching possible" [level=4] [ref=e97]
              - paragraph [ref=e99]: In causal (autoregressive) attention, token N can only attend to tokens 1 through N. The KV tensors for token N depend exclusively on the prefix up to position N. Changing any token before position N invalidates the KV tensors for N and everything after it. This is why only contiguous prefixes from the start of the prompt can be cached, and why providers require static content at the beginning.
          - generic [ref=e100]:
            - 'heading "Anthropic: Explicit Cache Control" [level=2] [ref=e101]'
            - paragraph [ref=e102]:
              - text: Anthropic gives you direct control over cache boundaries through the
              - code [ref=e103]: cache_control
              - text: parameter. You mark specific content blocks as cacheable, and the system caches the prompt prefix up to that point. This explicit approach lets you control exactly what gets cached and at what TTL.
            - heading "Two Caching Modes" [level=3] [ref=e104]
