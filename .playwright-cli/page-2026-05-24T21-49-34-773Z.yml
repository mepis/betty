          - generic [ref=e562]:
            - heading "Frequently Asked Questions" [level=2] [ref=e563]
            - heading "What is prompt caching?" [level=3] [ref=e564]
            - paragraph [ref=e565]: Prompt caching reuses previously computed Key-Value tensors for identical prompt prefixes across API requests. Instead of running the full prefill computation on every call, the provider stores the KV tensors and serves them on subsequent requests that share the same prefix. This reduces input token costs by up to 90% and time-to-first-token latency by up to 80%.
            - heading "How does Anthropic's prompt caching work?" [level=3] [ref=e566]
            - paragraph [ref=e567]:
              - text: Anthropic uses explicit
              - code [ref=e568]: cache_control
              - text: "breakpoints. You mark content blocks as cacheable with either a 5-minute TTL (1.25x write cost) or 1-hour TTL (2x write cost). Cache reads cost 0.1x the base input price. Up to 4 explicit breakpoints per request, or use automatic caching which manages breakpoints as conversations grow. The cache follows a strict hierarchy: tools, then system, then messages. Changing anything earlier invalidates everything later."
            - heading "How does OpenAI's prompt caching work?" [level=3] [ref=e569]
            - paragraph [ref=e570]: Fully automatic. Any prompt over 1,024 tokens is eligible. The system caches the longest matching prefix in 128-token increments. No write surcharge. Cached tokens get a 50-90% discount depending on model (GPT-5.4 and GPT-4.1 get 90%). Caches persist 5-10 minutes in memory, with extended 24-hour retention via GPU-local storage on newer models.
            - heading "How does Google's context caching work?" [level=3] [ref=e571]
            - paragraph [ref=e572]: "Two modes. Implicit caching is automatic on Gemini 2.5+, requires no configuration, and has no storage cost. Explicit caching lets you set custom TTLs and guarantees cost savings but charges for storage ($1-4.50/MTok/hr depending on model). Cached reads cost 75-90% less than standard input. Minimum thresholds: 1,024 tokens (Flash) or 4,096 tokens (Pro)."
            - heading "Which provider has the cheapest caching?" [level=3] [ref=e573]
            - paragraph [ref=e574]: Depends on the access pattern. Anthropic offers the deepest read discount (90% off, 0.1x) across all models but charges a write premium. OpenAI has no write premium, making it profitable from the first cache hit, with 90% discounts on GPT-5.4 and GPT-4.1. Google's Gemini 2.5 models match the 90% read discount but charge for storage on explicit caches. For high-frequency agent workloads, Anthropic's model tends to win. For lower-frequency or diverse prompts, OpenAI's automatic approach has less downside risk.
            - heading "How much does prompt caching save for coding agents?" [level=3] [ref=e575]
            - paragraph [ref=e576]: Research across 500+ agent sessions measured 45-80% cost reductions and 13-31% latency improvements. The savings scale with the size of your stable prefix and the number of turns. A coding agent with a 12,000-token system prompt over 20 turns saves 85-89% on prefix costs. Combined with Morph Compact for conversation history, total savings exceed 90% of baseline input token spend.
            - heading "Does prompt caching affect output quality?" [level=3] [ref=e577]
            - paragraph [ref=e578]: No. All three providers confirm that cached and non-cached requests produce identical outputs. The KV tensors are mathematically the same whether computed fresh or loaded from cache. Caching only affects the computation path during prefill. The decoding phase is unaffected.
            - heading "Can I combine prompt caching with batch API discounts?" [level=3] [ref=e579]
            - paragraph [ref=e580]: "Yes. Anthropic, OpenAI, and Google all allow stacking batch API discounts (typically 50% off) with prompt caching discounts. On Anthropic, the multipliers compose: batch input at 0.5x times cache read at 0.1x gives 0.05x the base price. That is a 95% discount on cached batch reads."
            - heading "What is the minimum prompt length for caching?" [level=3] [ref=e581]
            - paragraph [ref=e582]: "Varies by provider and model. Anthropic: 1,024-4,096 tokens depending on model. OpenAI: 1,024 tokens across all models. Google: 1,024 (Flash) or 4,096 (Pro). Prompts below these thresholds are processed normally. The response usage fields will show zero cached tokens when caching does not activate."
            - heading "When does caching not help?" [level=3] [ref=e583]
            - paragraph [ref=e584]: When prompts are highly dynamic with no shared prefix. When prompts are below the minimum cacheable length. When requests are too infrequent to hit cache before TTL expiration. When you are caching dynamic tool results that will never be reused. In these cases, caching adds write overhead without corresponding read savings.
