        - article [ref=e50]:
          - paragraph [ref=e51]: "Prompt caching reuses the KV tensors from identical prompt prefixes across API requests instead of recomputing them from scratch. The result: up to 90% cheaper input tokens and up to 80% lower time-to-first-token latency. Every major LLM provider now supports it."
          - paragraph [ref=e52]: For coding agents, this matters more than for any other workload. Agents resend the same system prompt, tool definitions, and conversation history on every turn. The delta between consecutive API calls is often just a few lines of new content. Without caching, you pay full price to reprocess 10,000+ tokens of identical content on every single request.
          - paragraph [ref=e53]:
            - text: This guide covers how each provider implements prompt caching, exact pricing, implementation patterns that maximize cache hit rates, specific optimizations for coding agents, and how to stack caching with
            - link "token compaction" [ref=e54] [cursor=pointer]:
              - /url: /context-compression
            - text: for compounding savings.
