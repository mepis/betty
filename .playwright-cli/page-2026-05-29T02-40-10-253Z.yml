            - paragraph [ref=e814]:
              - text: "* SWE-Bench Series: Internal agent scaffold (bash + file-edit tools); temp=1.0, top_p=0.95, 200K context window. We correct some problematic tasks in the public set of SWE-bench Pro and evaluate all baselines on the refined benchmark."
              - text: "* Terminal-Bench 2.0: Harbor/Terminus-2 harness; 3h timeout, 32 CPU/48 GB RAM; temp=1.0, top_p=0.95, top_k=20, max_tokens=80K, 256K ctx; avg of 5 runs."
              - text: "* SkillsBench: Evaluated via OpenCode on 78 tasks (self-contained subset, excluding API-dependent tasks); avg of 5 runs."
              - text: "* NL2Repo: Others are evaluated via Claude Code (temp=1.0, top_p=0.95, max_turns=900)."
              - text: "* QwenClawBench: An internal real-user-distribution Claw agent benchmark (open-sourcing soon); temp=0.6, 256K ctx."
              - text: "* QwenWebBench: An internal front-end code generation benchmark; bilingual (EN/CN), 7 categories (Web Design, Web Apps, Games, SVG, Data Visualization, Animation, and 3D); auto-render + multimodal judge (code/visual correctness); BT/Elo rating system."
              - text: "* TAU3-Bench: We use the official user model (gpt-5.2, low reasoning effort) + default BM25 retrieval."
              - text: "* VITA-Bench: Avg subdomain scores; using claude-4-sonnet as judger, as the official judger (claude-3.7-sonnet) is no longer available."
              - text: "* MCPMark: GitHub MCP v0.30.3; Playwright responses truncated at 32K tokens."
              - text: "* MCP-Atlas: Public set score; gemini-2.5-pro judger."
              - text: "* AIME 26: We use the full AIME 2026 (I & II), where the scores may differ from Qwen 3.5 notes."
