          - paragraph [ref=e523]:
            - link "Qwen Chat" [ref=e524] [cursor=pointer]:
              - /url: https://chat.qwen.ai
              - img "Qwen Chat" [ref=e525]
          - blockquote [ref=e526]:
            - paragraph [ref=e527]: This repository contains model weights and configuration files for the post-trained model in the Hugging Face Transformers format.
            - paragraph [ref=e528]: These artifacts are compatible with Hugging Face Transformers, vLLM, SGLang, KTransformers, etc.
          - paragraph [ref=e529]: Following the February release of the Qwen3.5 series, we're pleased to share the first open-weight variant of Qwen3.6. Built on direct feedback from the community, Qwen3.6 prioritizes stability and real-world utility, offering developers a more intuitive, responsive, and genuinely productive coding experience.
          - heading "Qwen3.6 Highlights" [level=2] [ref=e530]:
            - link [ref=e531] [cursor=pointer]:
              - /url: "#qwen36-highlights"
              - img [ref=e533]
            - generic [ref=e535]: Qwen3.6 Highlights
          - paragraph [ref=e536]: This release delivers substantial upgrades, particularly in
          - list [ref=e537]:
            - listitem [ref=e538]:
              - strong [ref=e539]: "Agentic Coding:"
              - text: the model now handles frontend workflows and repository-level reasoning with greater fluency and precision.
            - listitem [ref=e540]:
              - strong [ref=e541]: "Thinking Preservation:"
              - text: we've introduced a new option to retain reasoning context from historical messages, streamlining iterative development and reducing overhead.
          - paragraph:
            - link "Benchmark Results":
              - /url: https://qianwen-res.oss-cn-beijing.aliyuncs.com/Qwen3.6/Figures/qwen3.6_35b_a3b_score.png
              - img "Benchmark Results"
          - paragraph [ref=e542]:
            - text: For more details, please refer to our blog post
            - link "Qwen3.6-35B-A3B" [ref=e543] [cursor=pointer]:
              - /url: https://qwen.ai/blog?id=qwen3.6-35b-a3b
            - text: .
          - heading "Model Overview" [level=2] [ref=e544]:
            - link [ref=e545] [cursor=pointer]:
              - /url: "#model-overview"
              - img [ref=e547]
            - generic [ref=e549]: Model Overview
          - list [ref=e550]:
            - listitem [ref=e551]: "Type: Causal Language Model with Vision Encoder"
            - listitem [ref=e552]: "Training Stage: Pre-training & Post-training"
            - listitem [ref=e553]:
              - text: Language Model
              - list [ref=e554]:
                - listitem [ref=e555]: "Number of Parameters: 35B in total and 3B activated"
                - listitem [ref=e556]: "Hidden Dimension: 2048"
                - listitem [ref=e557]: "Token Embedding: 248320 (Padded)"
                - listitem [ref=e558]: "Number of Layers: 40"
                - listitem [ref=e559]: "Hidden Layout: 10 × (3 × (Gated DeltaNet → MoE) → 1 × (Gated Attention → MoE))"
                - listitem [ref=e560]:
                  - text: "Gated DeltaNet:"
                  - list [ref=e561]:
                    - listitem [ref=e562]: "Number of Linear Attention Heads: 32 for V and 16 for QK"
                    - listitem [ref=e563]: "Head Dimension: 128"
                - listitem [ref=e564]:
                  - text: "Gated Attention:"
                  - list [ref=e565]:
                    - listitem [ref=e566]: "Number of Attention Heads: 16 for Q and 2 for KV"
                    - listitem [ref=e567]: "Head Dimension: 256"
                    - listitem [ref=e568]: "Rotary Position Embedding Dimension: 64"
                - listitem [ref=e569]:
                  - text: Mixture Of Experts
                  - list [ref=e570]:
                    - listitem [ref=e571]: "Number of Experts: 256"
                    - listitem [ref=e572]: "Number of Activated Experts: 8 Routed + 1 Shared"
                    - listitem [ref=e573]: "Expert Intermediate Dimension: 512"
                - listitem [ref=e574]: "LM Output: 248320 (Padded)"
                - listitem [ref=e575]: "MTP: trained with multi-steps"
            - listitem [ref=e576]: "Context Length: 262,144 natively and extensible up to 1,010,000 tokens."
