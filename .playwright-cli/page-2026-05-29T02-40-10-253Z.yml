          - heading "Quickstart" [level=2] [ref=e1023]:
            - link [ref=e1024] [cursor=pointer]:
              - /url: "#quickstart"
              - img [ref=e1026]
            - generic [ref=e1028]: Quickstart
          - paragraph [ref=e1029]: For streamlined integration, we recommend using Qwen3.6 via APIs. Below is a guide to use Qwen3.6 via OpenAI-compatible API.
          - heading "Serving Qwen3.6" [level=3] [ref=e1030]:
            - link [ref=e1031] [cursor=pointer]:
              - /url: "#serving-qwen36"
              - img [ref=e1033]
            - generic [ref=e1035]: Serving Qwen3.6
          - paragraph [ref=e1036]: Qwen3.6 can be served via APIs with popular inference frameworks. In the following, we show example commands to launch OpenAI-Compatible API servers for Qwen3.6 models.
          - blockquote [ref=e1037]:
            - paragraph [ref=e1038]: Inference efficiency and throughput vary significantly across frameworks. We recommend using the latest framework versions to ensure optimal performance and compatibility. For production workloads or high-throughput scenarios, dedicated serving engines such as SGLang, KTransformers or vLLM are strongly recommended.
          - blockquote [ref=e1039]:
            - paragraph [ref=e1040]: The model has a default context length of 262,144 tokens. If you encounter out-of-memory (OOM) errors, consider reducing the context window. However, because Qwen3.6 leverages extended context for complex tasks, we advise maintaining a context length of at least 128K tokens to preserve thinking capabilities.
          - heading "SGLang" [level=4] [ref=e1041]:
            - link [ref=e1042] [cursor=pointer]:
              - /url: "#sglang"
              - img [ref=e1044]
            - generic [ref=e1046]: SGLang
          - paragraph [ref=e1047]:
            - link "SGLang" [ref=e1048] [cursor=pointer]:
              - /url: https://github.com/sgl-project/sglang
            - text: is a fast serving framework for large language models and vision language models.
            - code [ref=e1049]: sglang>=0.5.10
            - text: "is recommended for Qwen3.6, which can be installed using the following command in a fresh environment:"
          - generic [ref=e1050]:
            - code [ref=e1052]: uv pip install sglang[all]
            - button [ref=e1053] [cursor=pointer]:
              - img [ref=e1054]
          - paragraph [ref=e1058]:
            - text: See
            - link "its documentation" [ref=e1059] [cursor=pointer]:
              - /url: https://docs.sglang.ai/get_started/install.html
            - text: for more details.
          - paragraph [ref=e1060]:
            - text: The following will create API endpoints at
            - code [ref=e1061]: http://localhost:8000/v1
            - text: ":"
          - list [ref=e1062]:
            - listitem [ref=e1063]:
              - paragraph [ref=e1064]:
                - strong [ref=e1065]: Standard Version
                - text: ": The following command can be used to create an API endpoint with maximum context length 262,144 tokens using tensor parallel on 8 GPUs."
              - generic [ref=e1066]:
                - code [ref=e1068]: python -m sglang.launch_server --model-path Qwen/Qwen3.6-35B-A3B --port 8000 --tp-size 8 --mem-fraction-static 0.8 --context-length 262144 --reasoning-parser qwen3
                - button [ref=e1069] [cursor=pointer]:
                  - img [ref=e1070]
            - listitem [ref=e1074]:
              - paragraph [ref=e1075]:
                - strong [ref=e1076]: Tool Use
                - text: ": To support tool use, you can use the following command."
              - generic [ref=e1077]:
                - code [ref=e1079]: python -m sglang.launch_server --model-path Qwen/Qwen3.6-35B-A3B --port 8000 --tp-size 8 --mem-fraction-static 0.8 --context-length 262144 --reasoning-parser qwen3 --tool-call-parser qwen3_coder
                - button [ref=e1080] [cursor=pointer]:
                  - img [ref=e1081]
            - listitem [ref=e1085]:
              - paragraph [ref=e1086]:
                - strong [ref=e1087]: Multi-Token Prediction (MTP)
                - text: ": The following command is recommended for MTP:"
              - generic [ref=e1088]:
                - code [ref=e1090]: python -m sglang.launch_server --model-path Qwen/Qwen3.6-35B-A3B --port 8000 --tp-size 8 --mem-fraction-static 0.8 --context-length 262144 --reasoning-parser qwen3 --speculative-algo NEXTN --speculative-num-steps 3 --speculative-eagle-topk 1 --speculative-num-draft-tokens 4
                - button [ref=e1091] [cursor=pointer]:
                  - img [ref=e1092]
          - paragraph [ref=e1096]:
            - text: For detailed deployment guide, see the
            - link "SGLang Qwen3.5 Cookbook" [ref=e1097] [cursor=pointer]:
              - /url: https://lmsysorg.mintlify.app/cookbook/llm/Qwen/Qwen3.5
            - text: .
          - heading "vLLM" [level=4] [ref=e1098]:
            - link [ref=e1099] [cursor=pointer]:
              - /url: "#vllm"
              - img [ref=e1101]
            - generic [ref=e1103]: vLLM
          - paragraph [ref=e1104]:
            - link "vLLM" [ref=e1105] [cursor=pointer]:
              - /url: https://github.com/vllm-project/vllm
            - text: is a high-throughput and memory-efficient inference and serving engine for LLMs.
            - code [ref=e1106]: vllm>=0.19.0
            - text: "is recommended for Qwen3.6, which can be installed using the following command in a fresh environment:"
          - generic [ref=e1107]:
            - code [ref=e1109]: uv pip install vllm --torch-backend=auto
            - button [ref=e1110] [cursor=pointer]:
              - img [ref=e1111]
          - paragraph [ref=e1115]:
            - text: See
            - link "its documentation" [ref=e1116] [cursor=pointer]:
              - /url: https://docs.vllm.ai/en/stable/getting_started/installation/index.html
            - text: for more details.
          - paragraph [ref=e1117]:
            - text: The following will create API endpoints at
            - code [ref=e1118]: http://localhost:8000/v1
            - text: ":"
          - list [ref=e1119]:
            - listitem [ref=e1120]:
              - paragraph [ref=e1121]:
                - strong [ref=e1122]: Standard Version
                - text: ": The following command can be used to create an API endpoint with maximum context length 262,144 tokens using tensor parallel on 8 GPUs."
              - generic [ref=e1123]:
                - code [ref=e1125]: vllm serve Qwen/Qwen3.6-35B-A3B --port 8000 --tensor-parallel-size 8 --max-model-len 262144 --reasoning-parser qwen3
                - button [ref=e1126] [cursor=pointer]:
                  - img [ref=e1127]
            - listitem [ref=e1131]:
              - paragraph [ref=e1132]:
                - strong [ref=e1133]: Tool Call
                - text: ": To support tool use, you can use the following command."
              - generic [ref=e1134]:
                - code [ref=e1136]: vllm serve Qwen/Qwen3.6-35B-A3B --port 8000 --tensor-parallel-size 8 --max-model-len 262144 --reasoning-parser qwen3 --enable-auto-tool-choice --tool-call-parser qwen3_coder
                - button [ref=e1137] [cursor=pointer]:
                  - img [ref=e1138]
            - listitem [ref=e1142]:
              - paragraph [ref=e1143]:
                - strong [ref=e1144]: Multi-Token Prediction (MTP)
                - text: ": The following command is recommended for MTP:"
              - generic [ref=e1145]:
                - code [ref=e1147]: "vllm serve Qwen/Qwen3.6-35B-A3B --port 8000 --tensor-parallel-size 8 --max-model-len 262144 --reasoning-parser qwen3 --speculative-config '{\"method\":\"qwen3_next_mtp\",\"num_speculative_tokens\":2}'"
                - button [ref=e1148] [cursor=pointer]:
                  - img [ref=e1149]
            - listitem [ref=e1153]:
              - paragraph [ref=e1154]:
                - strong [ref=e1155]: Text-Only
                - text: ": The following command skips the vision encoder and multimodal profiling to free up memory for additional KV cache:"
              - generic [ref=e1156]:
                - code [ref=e1158]: vllm serve Qwen/Qwen3.6-35B-A3B --port 8000 --tensor-parallel-size 8 --max-model-len 262144 --reasoning-parser qwen3 --language-model-only
                - button [ref=e1159] [cursor=pointer]:
                  - img [ref=e1160]
          - paragraph [ref=e1164]:
            - text: For detailed deployment guide, see the
            - link "vLLM Qwen3.5 Recipe" [ref=e1165] [cursor=pointer]:
              - /url: https://docs.vllm.ai/projects/recipes/en/latest/Qwen/Qwen3.5.html
            - text: .
          - heading "KTransformers" [level=4] [ref=e1166]:
            - link [ref=e1167] [cursor=pointer]:
              - /url: "#ktransformers"
              - img [ref=e1169]
            - generic [ref=e1171]: KTransformers
          - paragraph [ref=e1172]:
            - link "KTransformers" [ref=e1173] [cursor=pointer]:
              - /url: https://github.com/kvcache-ai/ktransformers
            - text: is a flexible framework for experiencing cutting-edge LLM inference optimizations with CPU-GPU heterogeneous computing. For running Qwen3.6 with KTransformers, see the
            - link "KTransformers Deployment Guide" [ref=e1174] [cursor=pointer]:
              - /url: https://github.com/kvcache-ai/ktransformers/blob/main/doc/en/Qwen3.5.md
            - text: .
          - heading "Hugging Face Transformers" [level=4] [ref=e1175]:
            - link [ref=e1176] [cursor=pointer]:
              - /url: "#hugging-face-transformers"
              - img [ref=e1178]
            - generic [ref=e1180]: Hugging Face Transformers
          - paragraph [ref=e1181]:
            - text: Hugging Face Transformers contains a
            - emphasis [ref=e1182]: lightweight
            - text: server which can be used for quick testing and moderate load deployment. The latest
            - code [ref=e1183]: transformers
            - text: "is required for Qwen3.6:"
          - generic [ref=e1184]:
            - code [ref=e1186]: pip install "transformers[serving]"
            - button [ref=e1187] [cursor=pointer]:
              - img [ref=e1188]
          - paragraph [ref=e1192]:
            - text: See
            - link "its documentation" [ref=e1193] [cursor=pointer]:
              - /url: https://huggingface.co/docs/transformers/main/serving
            - text: for more details. Please also make sure torchvision and pillow are installed.
          - paragraph [ref=e1194]:
            - text: Then, run
            - code [ref=e1195]: transformers serve
            - text: to launch a server with API endpoints at
            - code [ref=e1196]: http://localhost:8000/v1
            - text: "; it will place the model on accelerators if available:"
          - generic [ref=e1197]:
            - code [ref=e1199]: transformers serve Qwen/Qwen3.6-35B-A3B --port 8000 --continuous-batching
            - button [ref=e1200] [cursor=pointer]:
              - img [ref=e1201]
          - heading "Using Qwen3.6 via the Chat Completions API" [level=3] [ref=e1205]:
            - link [ref=e1206] [cursor=pointer]:
              - /url: "#using-qwen36-via-the-chat-completions-api"
              - img [ref=e1208]
            - generic [ref=e1210]: Using Qwen3.6 via the Chat Completions API
          - paragraph [ref=e1211]: The chat completions API is accessible via standard HTTP requests or OpenAI SDKs. Here, we show examples using the OpenAI Python SDK.
          - paragraph [ref=e1212]: "Before starting, make sure it is installed and the API key and the API base URL is configured, e.g.:"
          - generic [ref=e1213]:
            - code [ref=e1215]:
              - text: pip install -U openai
              - text: "# Set the following accordingly export OPENAI_BASE_URL=\"http://localhost:8000/v1\" export OPENAI_API_KEY=\"EMPTY\""
            - button [ref=e1216] [cursor=pointer]:
              - img [ref=e1217]
          - blockquote [ref=e1221]:
            - paragraph [ref=e1222]: We recommend using the following set of sampling parameters for generation
            - list [ref=e1223]:
              - listitem [ref=e1224]:
                - text: "Thinking mode for general tasks:"
                - code [ref=e1225]: temperature=1.0, top_p=0.95, top_k=20, min_p=0.0, presence_penalty=1.5, repetition_penalty=1.0
              - listitem [ref=e1226]:
                - text: "Thinking mode for precise coding tasks (e.g. WebDev):"
                - code [ref=e1227]: temperature=0.6, top_p=0.95, top_k=20, min_p=0.0, presence_penalty=0.0, repetition_penalty=1.0
              - listitem [ref=e1228]:
                - text: "Instruct (or non-thinking) mode for general tasks:"
                - code [ref=e1229]: temperature=0.7, top_p=0.8, top_k=20, min_p=0.0, presence_penalty=1.5, repetition_penalty=1.0
              - listitem [ref=e1230]:
                - text: "Instruct (or non-thinking) mode for reasoning tasks:"
                - code [ref=e1231]: temperature=1.0, top_p=0.95, top_k=20, min_p=0.0, presence_penalty=1.5, repetition_penalty=1.0
            - paragraph [ref=e1232]: Please note that the support for sampling parameters varies according to inference frameworks.
          - blockquote [ref=e1233]:
            - paragraph [ref=e1234]:
              - text: Qwen3.6 models operate in thinking mode by default, generating thinking content signified by
              - code [ref=e1235]: <think>\n...</think>\n\n
              - text: before producing the final responses. To disable thinking content and obtain direct response, refer to the examples
              - link "here" [ref=e1236] [cursor=pointer]:
                - /url: "#instruct-or-non-thinking-mode"
              - text: .
          - heading "Text-Only Input" [level=4] [ref=e1237]:
            - link [ref=e1238] [cursor=pointer]:
              - /url: "#text-only-input"
              - img [ref=e1240]
            - generic [ref=e1242]: Text-Only Input
          - generic [ref=e1243]:
            - code [ref=e1245]: "from openai import OpenAI # Configured by environment variables client = OpenAI() messages = [ {\"role\": \"user\", \"content\": \"Type \\\"I love Qwen3.6\\\" backwards\"}, ] chat_response = client.chat.completions.create( model=\"Qwen/Qwen3.6-35B-A3B\", messages=messages, max_tokens=81920, temperature=1.0, top_p=0.95, presence_penalty=1.5, extra_body={ \"top_k\": 20, }, ) print(\"Chat response:\", chat_response)"
            - button [ref=e1246] [cursor=pointer]:
              - img [ref=e1247]
          - heading "Image Input" [level=4] [ref=e1251]:
