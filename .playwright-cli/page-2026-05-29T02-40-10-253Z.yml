          - heading "Instruct (or Non-Thinking) Mode" [level=4] [ref=e1279]:
            - link [ref=e1280] [cursor=pointer]:
              - /url: "#instruct-or-non-thinking-mode"
              - img [ref=e1282]
            - generic [ref=e1284]: Instruct (or Non-Thinking) Mode
          - blockquote [ref=e1285]:
            - paragraph [ref=e1286]:
              - text: Qwen3.6 does not officially support the soft switch of Qwen3, i.e.,
              - code [ref=e1287]: /think
              - text: and
              - code [ref=e1288]: /nothink
              - text: .
          - paragraph [ref=e1289]: Qwen3.6 will think by default before response. You can obtain direct response from the model without thinking by configuring the API parameters. For example,
          - generic [ref=e1290]:
            - code [ref=e1292]: "from openai import OpenAI # Configured by environment variables client = OpenAI() messages = [ { \"role\": \"user\", \"content\": [ { \"type\": \"image_url\", \"image_url\": { \"url\": \"https://qianwen-res.oss-accelerate.aliyuncs.com/Qwen3.6/demo/RealWorld/RealWorld-04.png\" } }, { \"type\": \"text\", \"text\": \"Where is this?\" } ] } ] chat_response = client.chat.completions.create( model=\"Qwen/Qwen3.6-35B-A3B\", messages=messages, max_tokens=32768, temperature=0.7, top_p=0.8, presence_penalty=1.5, extra_body={ \"top_k\": 20, \"chat_template_kwargs\": {\"enable_thinking\": False}, }, ) print(\"Chat response:\", chat_response)"
            - button [ref=e1293] [cursor=pointer]:
              - img [ref=e1294]
          - blockquote [ref=e1298]:
            - paragraph [ref=e1299]:
              - text: If you are using APIs from Alibaba Cloud Model Studio, in addition to changing
              - code [ref=e1300]: model
              - text: ", please use"
              - code [ref=e1301]: "\"enable_thinking\": False"
              - text: instead of
              - code [ref=e1302]: "\"chat_template_kwargs\": {\"enable_thinking\": False}"
              - text: .
          - heading "Preserve Thinking" [level=4] [ref=e1303]:
            - link [ref=e1304] [cursor=pointer]:
              - /url: "#preserve-thinking"
              - img [ref=e1306]
            - generic [ref=e1308]: Preserve Thinking
          - paragraph [ref=e1309]:
            - text: By default, only the thinking blocks generated in handling the latest user message is retained, resulting in a pattern commonly as interleaved thinking. Qwen3.6 has been additionally trained to preserve and leverage thinking traces from historical messages. You can enable this behavior by setting the
            - code [ref=e1310]: preserve_thinking
            - text: "option:"
          - generic [ref=e1311]:
            - code [ref=e1313]: "from openai import OpenAI # Configured by environment variables client = OpenAI() messages = [...] chat_response = client.chat.completions.create( model=\"Qwen/Qwen3.6-35B-A3B\", messages=messages, max_tokens=32768, temperature=0.7, top_p=0.8, presence_penalty=1.5, extra_body={ \"top_k\": 20, \"chat_template_kwargs\": {\"preserve_thinking\": True}, }, ) print(\"Chat response:\", chat_response)"
            - button [ref=e1314] [cursor=pointer]:
              - img [ref=e1315]
          - blockquote [ref=e1319]:
            - paragraph [ref=e1320]:
              - text: If you are using APIs from Alibaba Cloud Model Studio, in addition to changing
              - code [ref=e1321]: model
              - text: ", please use"
              - code [ref=e1322]: "\"preserve_thinking\": True"
              - text: instead of
              - code [ref=e1323]: "\"chat_template_kwargs\": {\"preserve_thinking\": False}"
              - text: .
          - paragraph [ref=e1324]: This capability is particularly beneficial for agent scenarios, where maintaining full reasoning context can enhance decision consistency and, in many cases, reduce overall token consumption by minimizing redundant reasoning. Additionally, it can improve KV cache utilization, optimizing inference efficiency in both thinking and non-thinking modes.
          - heading "Agentic Usage" [level=2] [ref=e1325]:
            - link [ref=e1326] [cursor=pointer]:
              - /url: "#agentic-usage"
              - img [ref=e1328]
            - generic [ref=e1330]: Agentic Usage
          - paragraph [ref=e1331]: Qwen3.6 excels in tool calling capabilities.
          - heading "Qwen-Agent" [level=3] [ref=e1332]:
            - link [ref=e1333] [cursor=pointer]:
              - /url: "#qwen-agent"
              - img [ref=e1335]
            - generic [ref=e1337]: Qwen-Agent
          - paragraph [ref=e1338]:
            - text: We recommend using
            - link "Qwen-Agent" [ref=e1339] [cursor=pointer]:
              - /url: https://github.com/QwenLM/Qwen-Agent
            - text: to quickly build Agent applications with Qwen3.6.
          - paragraph [ref=e1340]: To define the available tools, you can use the MCP configuration file, use the integrated tool of Qwen-Agent, or integrate other tools by yourself.
          - generic [ref=e1341]:
            - code [ref=e1343]: "import os from qwen_agent.agents import Assistant # Define LLM # Using Alibaba Cloud Model Studio llm_cfg = { # Use the OpenAI-compatible model service provided by DashScope: 'model': 'Qwen3.6-35B-A3B', 'model_type': 'qwenvl_oai', 'model_server': 'https://dashscope.aliyuncs.com/compatible-mode/v1', 'api_key': os.getenv('DASHSCOPE_API_KEY'), 'generate_cfg': { 'use_raw_api': True, # When using Dash Scope OAI API, pass the parameter of whether to enable thinking mode in this way 'extra_body': { 'enable_thinking': True, 'preserve_thinking': True, }, }, } # Using OpenAI-compatible API endpoint. # functionality of the deployment frameworks and let Qwen-Agent automate the related operations. # # llm_cfg = { # # Use your own model service compatible with OpenAI API by vLLM/SGLang: # 'model': 'Qwen/Qwen3.6-35B-A3B', # 'model_type': 'qwenvl_oai', # 'model_server': 'http://localhost:8000/v1', # api_base # 'api_key': 'EMPTY', # # 'generate_cfg': { # 'use_raw_api': True, # # When using vLLM/SGLang OAI API, pass the parameter of whether to enable thinking mode in this way # 'extra_body': { # 'chat_template_kwargs': {'enable_thinking': True, 'preserve_thinking': True} # }, # }, # } # Define Tools tools = [ {'mcpServers': { # You can specify the MCP configuration file \"filesystem\": { \"command\": \"npx\", \"args\": [\"-y\", \"@modelcontextprotocol/server-filesystem\", \"/Users/xxxx/Desktop\"] } } } ] # Define Agent bot = Assistant(llm=llm_cfg, function_list=tools) # Streaming generation messages = [{'role': 'user', 'content': 'Help me organize my desktop.'}] for responses in bot.run(messages=messages): pass print(responses) # Streaming generation messages = [{'role': 'user', 'content': 'Develop a dog website and save it on the desktop'}] for responses in bot.run(messages=messages): pass print(responses)"
            - button [ref=e1344] [cursor=pointer]:
              - img [ref=e1345]
          - heading "Qwen Code" [level=3] [ref=e1349]:
            - link [ref=e1350] [cursor=pointer]:
              - /url: "#qwen-code"
              - img [ref=e1352]
            - generic [ref=e1354]: Qwen Code
          - paragraph [ref=e1355]:
            - link "Qwen Code" [ref=e1356] [cursor=pointer]:
              - /url: https://github.com/QwenLM/qwen-code
            - text: is an open-source AI agent for the terminal, optimized for Qwen models. It helps you understand large codebases, automate tedious work, and ship faster.
          - paragraph [ref=e1357]:
            - text: For more information, please refer to
            - link "Qwen Code" [ref=e1358] [cursor=pointer]:
              - /url: https://qwenlm.github.io/qwen-code-docs/
            - text: .
          - heading "Processing Ultra-Long Texts" [level=2] [ref=e1359]:
            - link [ref=e1360] [cursor=pointer]:
              - /url: "#processing-ultra-long-texts"
              - img [ref=e1362]
            - generic [ref=e1364]: Processing Ultra-Long Texts
          - paragraph [ref=e1365]: Qwen3.6 natively supports context lengths of up to 262,144 tokens. For long-horizon tasks where the total length (including both input and output) exceeds this limit, we recommend using RoPE scaling techniques to handle long texts effectively., e.g., YaRN.
          - paragraph [ref=e1366]:
            - text: YaRN is currently supported by several inference frameworks, e.g.,
            - code [ref=e1367]: transformers
            - text: ","
            - code [ref=e1368]: vllm
            - text: ","
            - code [ref=e1369]: ktransformers
            - text: and
            - code [ref=e1370]: sglang
            - text: ". In general, there are two approaches to enabling YaRN for supported frameworks:"
          - list [ref=e1371]:
            - listitem [ref=e1372]:
              - paragraph [ref=e1373]:
                - text: "Modifying the model configuration file: In the"
                - code [ref=e1374]: config.json
                - text: file, change the
                - code [ref=e1375]: rope_parameters
                - text: fields in
                - code [ref=e1376]: text_config
                - text: "to:"
              - generic [ref=e1377]:
                - code [ref=e1379]:
                  - text: "{ \"mrope_interleaved\":"
                  - generic [ref=e1380]: "true"
                  - text: ", \"mrope_section\": [ 11, 11, 10 ], \"rope_type\": \"yarn\", \"rope_theta\": 10000000, \"partial_rotary_factor\": 0.25, \"factor\": 4.0, \"original_max_position_embeddings\": 262144, }"
                - button [ref=e1381] [cursor=pointer]:
                  - img [ref=e1382]
            - listitem [ref=e1386]:
              - paragraph [ref=e1387]: "Passing command line arguments:"
              - paragraph [ref=e1388]:
                - text: For
                - code [ref=e1389]: vllm
                - text: ", you can use"
              - generic [ref=e1390]:
                - code [ref=e1392]: "VLLM_ALLOW_LONG_MAX_MODEL_LEN=1 vllm serve ... --hf-overrides '{\"text_config\": {\"rope_parameters\": {\"mrope_interleaved\": true, \"mrope_section\": [11, 11, 10], \"rope_type\": \"yarn\", \"rope_theta\": 10000000, \"partial_rotary_factor\": 0.25, \"factor\": 4.0, \"original_max_position_embeddings\": 262144}}}' --max-model-len 1010000"
                - button [ref=e1393] [cursor=pointer]:
                  - img [ref=e1394]
              - paragraph [ref=e1398]:
                - text: For
                - code [ref=e1399]: sglang
                - text: and
                - code [ref=e1400]: ktransformers
                - text: ", you can use"
              - generic [ref=e1401]:
                - code [ref=e1403]: "SGLANG_ALLOW_OVERWRITE_LONGER_CONTEXT_LEN=1 python -m sglang.launch_server ... --json-model-override-args '{\"text_config\": {\"rope_parameters\": {\"mrope_interleaved\": true, \"mrope_section\": [11, 11, 10], \"rope_type\": \"yarn\", \"rope_theta\": 10000000, \"partial_rotary_factor\": 0.25, \"factor\": 4.0, \"original_max_position_embeddings\": 262144}}}' --context-length 1010000"
                - button [ref=e1404] [cursor=pointer]:
                  - img [ref=e1405]
          - blockquote [ref=e1409]:
            - paragraph [ref=e1410]:
              - text: All the notable open-source frameworks implement static YaRN, which means the scaling factor remains constant regardless of input length,
              - strong [ref=e1411]: potentially impacting performance on shorter texts.
              - text: We advise modifying the
              - code [ref=e1412]: rope_parameters
              - text: configuration only when processing long contexts is required. It is also recommended to modify the
              - code [ref=e1413]: factor
              - text: as needed. For example, if the typical context length for your application is 524,288 tokens, it would be better to set
              - code [ref=e1414]: factor
              - text: as 2.0.
          - heading "Best Practices" [level=2] [ref=e1415]:
            - link [ref=e1416] [cursor=pointer]:
              - /url: "#best-practices"
              - img [ref=e1418]
            - generic [ref=e1420]: Best Practices
          - paragraph [ref=e1421]: "To achieve optimal performance, we recommend the following settings:"
          - list [ref=e1422]:
            - listitem [ref=e1423]:
              - paragraph [ref=e1424]:
                - strong [ref=e1425]: Sampling Parameters
                - text: ":"
              - list [ref=e1426]:
                - listitem [ref=e1427]:
                  - text: "We suggest using the following sets of sampling parameters depending on the mode and task type:"
                  - list [ref=e1428]:
                    - listitem [ref=e1429]:
                      - strong [ref=e1430]: Thinking mode for general tasks
                      - text: ":"
                      - code [ref=e1431]: temperature=1.0
                      - text: ","
                      - code [ref=e1432]: top_p=0.95
                      - text: ","
                      - code [ref=e1433]: top_k=20
                      - text: ","
                      - code [ref=e1434]: min_p=0.0
                      - text: ","
                      - code [ref=e1435]: presence_penalty=1.5
                      - text: ","
                      - code [ref=e1436]: repetition_penalty=1.0
                    - listitem [ref=e1437]:
                      - strong [ref=e1438]: Thinking mode for precise coding tasks (e.g., WebDev)
                      - text: ":"
                      - code [ref=e1439]: temperature=0.6
                      - text: ","
                      - code [ref=e1440]: top_p=0.95
                      - text: ","
                      - code [ref=e1441]: top_k=20
                      - text: ","
                      - code [ref=e1442]: min_p=0.0
                      - text: ","
                      - code [ref=e1443]: presence_penalty=0.0
                      - text: ","
                      - code [ref=e1444]: repetition_penalty=1.0
                    - listitem [ref=e1445]:
                      - strong [ref=e1446]: Instruct (or non-thinking) mode for general tasks
                      - text: ":"
                      - code [ref=e1447]: temperature=0.7
                      - text: ","
                      - code [ref=e1448]: top_p=0.8
                      - text: ","
                      - code [ref=e1449]: top_k=20
                      - text: ","
                      - code [ref=e1450]: min_p=0.0
                      - text: ","
                      - code [ref=e1451]: presence_penalty=1.5
                      - text: ","
                      - code [ref=e1452]: repetition_penalty=1.0
                    - listitem [ref=e1453]:
                      - strong [ref=e1454]: Instruct (or non-thinking) mode for reasoning tasks
                      - text: ":"
                      - code [ref=e1455]: temperature=1.0
                      - text: ","
                      - code [ref=e1456]: top_p=1.0
                      - text: ","
                      - code [ref=e1457]: top_k=40
                      - text: ","
                      - code [ref=e1458]: min_p=0.0
                      - text: ","
                      - code [ref=e1459]: presence_penalty=2.0
                      - text: ","
                      - code [ref=e1460]: repetition_penalty=1.0
                - listitem [ref=e1461]:
                  - text: For supported frameworks, you can adjust the
                  - code [ref=e1462]: presence_penalty
                  - text: parameter between 0 and 2 to reduce endless repetitions. However, using a higher value may occasionally result in language mixing and a slight decrease in model performance.
            - listitem [ref=e1463]:
              - paragraph [ref=e1464]:
                - strong [ref=e1465]: Adequate Output Length
                - text: ": We recommend using an output length of 32,768 tokens for most queries. For benchmarking on highly complex problems, such as those found in math and programming competitions, we suggest setting the max output length to 81,920 tokens. This provides the model with sufficient space to generate detailed and comprehensive responses, thereby enhancing its overall performance."
            - listitem [ref=e1466]:
              - paragraph [ref=e1467]:
                - strong [ref=e1468]: Standardize Output Format
                - text: ": We recommend using prompts to standardize model outputs when benchmarking."
              - list [ref=e1469]:
                - listitem [ref=e1470]:
                  - strong [ref=e1471]: Math Problems
                  - text: ": Include \"Please reason step by step, and put your final answer within \\boxed{}.\" in the prompt."
                - listitem [ref=e1472]:
                  - strong [ref=e1473]: Multiple-Choice Questions
                  - text: ": Add the following JSON structure to the prompt to standardize responses: \"Please show your choice in the"
                  - code [ref=e1474]: answer
                  - text: field with only the choice letter, e.g.,
                  - code [ref=e1475]: "\"answer\": \"C\""
                  - text: ."
            - listitem [ref=e1476]:
              - paragraph [ref=e1477]:
                - strong [ref=e1478]: Long Video Understanding
                - text: ": To optimize inference efficiency for plain text and images, the"
                - code [ref=e1479]: size
                - text: parameter in the released
                - code [ref=e1480]: video_preprocessor_config.json
                - text: is conservatively configured. It is recommended to set the
                - code [ref=e1481]: longest_edge
                - text: parameter in the video_preprocessor_config file to 469,762,048 (corresponding to 224k video tokens) to enable higher frame-rate sampling for hour-scale videos and thereby achieve superior performance. For example,
              - generic [ref=e1482]:
                - code [ref=e1484]: "{\"longest_edge\": 469762048, \"shortest_edge\": 4096}"
                - button [ref=e1485] [cursor=pointer]:
                  - img [ref=e1486]
              - paragraph [ref=e1490]:
                - text: "Alternatively, override the default values via engine startup parameters. For implementation details, refer to:"
                - link "vLLM" [ref=e1491] [cursor=pointer]:
                  - /url: https://github.com/vllm-project/vllm/pull/34330
                - text: /
                - link "SGLang" [ref=e1492] [cursor=pointer]:
                  - /url: https://github.com/sgl-project/sglang/pull/18467
                - text: .
          - heading "Citation" [level=3] [ref=e1493]:
