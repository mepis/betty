        - generic [ref=e2888]:
          - heading "Appendix A Limitations & Future Work" [level=2] [ref=e2889]:
            - generic [ref=e2890]: Appendix A
            - text: Limitations & Future Work
          - paragraph [ref=e2892]: Our work addresses the context management problem in long-horizon LLM agents and proposes a framework for optimized context compression. While the method effectively reduces token costs with minimal performance degradation, it also presents several limitations.
          - paragraph [ref=e2894]:
            - text: A primary limitation is computational overhead. As discussed in
            - link "Section 4.5" [ref=e2895] [cursor=pointer]:
              - /url: https://arxiv.org/html/2510.00615v2#S4.SS5
            - text: ", history compression can in some cases increase total cost, since additional steps may be required to complete challenging tasks with the compressed history. Moreover, it breaks the KV-cache of transformer-based LLMs, which forces re-computation of compressed histories. This effect is particularly evident in the FIFO baseline. Observation compression alleviates some of this overhead, but the generative compression procedure itself introduces latency, slowing down agent response time"
            - generic [ref=e2896]:
              - text: (Lee et al.,
              - link "2025" [ref=e2897] [cursor=pointer]:
                - /url: https://arxiv.org/html/2510.00615v2#bib.bib20
              - text: )
            - text: . A promising future direction is the development of KV-cache–level compression or eviction strategies. Prior work has considered KV-cache compression for single-step reasoning
            - generic [ref=e2898]:
              - text: (Zhang et al.,
              - link "2025" [ref=e2899] [cursor=pointer]:
                - /url: https://arxiv.org/html/2510.00615v2#bib.bib56
              - text: )
            - text: ", long documents"
            - generic [ref=e2900]:
              - text: (Xiao et al.,
              - link "2024" [ref=e2901] [cursor=pointer]:
