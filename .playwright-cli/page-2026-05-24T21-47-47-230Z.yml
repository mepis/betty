          - paragraph [ref=e94]:
            - text: The centrality of context, however, makes it a bottleneck. As interactions accumulate, contexts grow unbounded as in
            - link "Figure 2" [ref=e95] [cursor=pointer]:
              - /url: https://arxiv.org/html/2510.00615v2#S1.F2
            - text: ", creating two major challenges. First, the inference cost of transformers scales with the context length, which becomes prohibitive in long-horizon tasks. Second, excessively long contexts dilute relevant information, distracting the model with outdated or extraneous details"
            - generic [ref=e96]:
              - text: (Shi et al.,
              - link "2023" [ref=e97] [cursor=pointer]:
                - /url: https://arxiv.org/html/2510.00615v2#bib.bib33
              - text: )
            - text: . These issues make effective context management and compression indispensable. Existing compression approaches only partially address this need. Dialogue-oriented systems rely on session-level summarization or tiered memories suitable for conversational coherence but inadequate for multi-step carry-over
            - generic [ref=e98]:
              - text: (Packer et al.,
              - link "2023" [ref=e99] [cursor=pointer]:
