          - paragraph [ref=e109]:
            - text: "The challenge becomes particularly critical in productivity scenarios (e.g., email management, document processing, or workflow automation) where agents must coordinate across heterogeneous tools and maintain precise state information. Unlike simpler agent tasks, these environments demand preservation of diverse signal types: factual history, action–outcome relationships, evolving environment states, success preconditions, and future decision cues. Naive strategies like token truncation or generic summarization easily lose critical details essential for long-horizon reasoning. Recent agent-focused compression methods"
            - generic [ref=e110]:
              - text: (Deng et al.,
              - link "2023" [ref=e111] [cursor=pointer]:
                - /url: https://arxiv.org/html/2510.00615v2#bib.bib7
              - text: ; Lee et al.,
              - link "2025" [ref=e112] [cursor=pointer]:
                - /url: https://arxiv.org/html/2510.00615v2#bib.bib20
              - text: ; Smith,
              - link "2025" [ref=e113] [cursor=pointer]:
                - /url: https://arxiv.org/html/2510.00615v2#bib.bib35
              - text: )
            - text: either specialize narrowly or rely on brittle heuristics, limiting their applicability across the full spectrum of multi-step agent tasks.
          - paragraph [ref=e115]:
            - text: We address these challenges with
            - generic [ref=e116]: Agent Context Optimization (Acon)
            - text: ", a unified framework for systematic and adaptive context compression. Our study yields three key findings. First, task- and environment-specific guidelines enable consistent context compression across diverse agents without sacrificing performance. Second, optimized contexts not only reduce costs but also improve decision quality, allowing smaller LLMs to act more effectively. Third, high-quality compressors can be distilled into even smaller models, reducing overhead and improving deployability."
          - paragraph [ref=e118]:
            - text: Acon dynamically condenses environment observations and interaction histories into concise, informative representations. Rather than handcrafting prompts, we introduce a guideline optimization pipeline that refines compressor prompts via failure analysis in natural language space
            - generic [ref=e119]:
              - text: (Pryzant et al.,
              - link "2023" [ref=e120] [cursor=pointer]:
                - /url: https://arxiv.org/html/2510.00615v2#bib.bib30
              - text: ; Khattab et al.,
              - link "2024" [ref=e121] [cursor=pointer]:
                - /url: https://arxiv.org/html/2510.00615v2#bib.bib14
              - text: ; Yüksekgönül et al.,
              - link "2025" [ref=e122] [cursor=pointer]:
                - /url: https://arxiv.org/html/2510.00615v2#bib.bib55
              - text: ; Han et al.,
              - link "2025" [ref=e123] [cursor=pointer]:
                - /url: https://arxiv.org/html/2510.00615v2#bib.bib8
              - text: )
            - text: ", ensuring that critical environment-specific and task-relevant information is retained. Importantly, Acon is gradient-free, requiring no parameter updates, making it directly usable with closed-source or production models. We further distill optimized compressors into smaller models for cost-efficient deployment."
          - paragraph [ref=e125]:
            - text: "We validate Acon on three multi-step agent benchmarks: AppWorld"
            - generic [ref=e126]:
              - text: (Trivedi et al.,
              - link "2024" [ref=e127] [cursor=pointer]:
                - /url: https://arxiv.org/html/2510.00615v2#bib.bib38
              - text: )
            - text: ", OfficeBench"
            - generic [ref=e128]:
              - text: (Wang et al.,
              - link "2024b" [ref=e129] [cursor=pointer]:
                - /url: https://arxiv.org/html/2510.00615v2#bib.bib42
              - text: )
            - text: ", and Multi-objective QA"
            - generic [ref=e130]:
              - text: (Kwiatkowski et al.,
              - link "2019" [ref=e131] [cursor=pointer]:
                - /url: https://arxiv.org/html/2510.00615v2#bib.bib18
              - text: ; Zhou et al.,
              - link "2025" [ref=e132] [cursor=pointer]:
                - /url: https://arxiv.org/html/2510.00615v2#bib.bib58
              - text: )
            - text: ", each requiring 15+ interaction steps. Our empirical results demonstrate clear advantages of Acon: (i) lowers memory usage by 26–54% (peak tokens) while largely maintaining task performance; (ii) enables effective distillation of the context compressor into smaller models, preserving 95% of the teacher’s accuracy across all benchmarks, thereby reducing the overhead of the additional module; (iii) allows small LMs to function more effectively as agents, improving performance by 32% on AppWorld, 20% on OfficeBench, and 46% on Multi-objective QA by mitigating the distraction of long contexts through Acon. Our result highlights on AppWorld benchmark are in"
