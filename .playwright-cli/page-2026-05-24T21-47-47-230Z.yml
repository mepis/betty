        - generic [ref=e2370]:
          - heading "5 Conclusion" [level=2] [ref=e2371]:
            - generic [ref=e2372]: "5"
            - text: Conclusion
          - paragraph [ref=e2374]:
            - text: We presented
            - generic [ref=e2375]: Agent Context Optimization (Acon)
            - text: ", a unified framework that systematically compresses both interaction histories and environment observations for long-horizon LLM agents. Unlike prior work that relies on naive prompting or narrow domains, Acon introduces compression guideline optimization in natural language space, enabling adaptive and model-agnostic compression. Experiments on AppWorld, OfficeBench, and Multi-objective QA show that Acon reduces peak tokens by 26-54% while maintaining or even improving task success. Beyond efficiency, we demonstrate that optimized compressors can be distilled into smaller models, substantially lowering overhead without sacrificing performance. Moreover, by supplying concise yet informative contexts, Acon allows small agents such as Qwen3-14B to approach the performance of much larger models. Overall, our findings highlight that Acon lays a foundation for more general, cost-effective, and deployable long-horizon LLM agents."
        - generic [ref=e2376]:
          - heading "Ethics Statement" [level=2] [ref=e2377]
          - paragraph [ref=e2379]: This work investigates optimized context compression framework for long-horizon LLM agents. It does not involve human subjects, user studies, or the collection of personally identifiable information. All experiments are conducted on publicly available benchmarks released under their respective licenses, which, to the best of our knowledge, do not contain sensitive personal data.
