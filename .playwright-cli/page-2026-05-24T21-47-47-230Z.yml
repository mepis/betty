          - paragraph [ref=e81]:
            - text: Large language models (LLMs) have become the backbone of AI agents across diverse real-world tasks, leveraging language knowledge and reasoning to plan, act, and adapt in dynamic environments
            - generic [ref=e82]:
              - text: (Yao et al.,
              - link "2023" [ref=e83] [cursor=pointer]:
                - /url: https://arxiv.org/html/2510.00615v2#bib.bib53
              - text: )
            - text: ". These tasks often unfold over extended horizons: the agent must gather information, invoke tools, and revise plans based on feedback. In such settings, context is not auxiliary but foundational, as tool APIs and data formats lack standardization"
            - generic [ref=e84]:
              - text: (Anthropic,
              - link "2024a" [ref=e85] [cursor=pointer]:
                - /url: https://arxiv.org/html/2510.00615v2#bib.bib2
              - text: )
            - text: ", and even personalized environments differ in file structures or account data. Agents must therefore accumulate and maintain records of prior actions, observations, and world state. Losing this information, such as an email identifier, file version, or API format, can derail task success."
