            - text: (
            - code [ref=e364]: search_on_level
            - text: "): Performs a greedy search with a candidate list (beam) of size"
            - code [ref=e365]: ef
            - text: .
          - listitem [ref=e366]:
            - strong [ref=e367]: ACORN-1
            - text: (
            - code [ref=e368]: search_on_level_acorn
            - text: "): An enhancement that explores 2-hop neighbors to maintain high recall even when many points are deleted or filtered."
