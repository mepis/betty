        - paragraph [ref=e356]: Vector search through the HNSW index follows a hierarchical greedy beam search. Qdrant supports both the standard HNSW search and the ACORN algorithm.
        - heading "Search Algorithms Copy link to header" [level=3] [ref=e357]:
