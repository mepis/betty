          - button "Copy link to header" [ref=e163] [cursor=pointer]:
            - img [ref=e164]
        - paragraph [ref=e166]: "Flash Attention is a memory-efficient attention algorithm that reduces memory bandwidth requirements from $O(N^2)$ to $O(N)$ by tiling the computation and avoiding materialization of the full $N \\times N$ attention matrix. Traditional attention computes $S = Q \\times K^T$, applies $P = \\text{softmax}(S)$, then multiplies $O = P \\times V$, requiring storage of the full attention scores matrix $S$ of size $(\\text{seq_len} \\times \\text{seq_len})$. For a sequence of length 4096, this requires 64MB of memory just for the attention scores (at FP32), which becomes a bottleneck."
        - paragraph [ref=e167]: "Flash Attention eliminates this by:"
        - list [ref=e168]:
          - listitem [ref=e169]:
            - strong [ref=e170]: Tiling
            - text: ": Processing attention in blocks that fit in fast shared memory (CUDA/Vulkan) or threadgroup memory (Metal)."
          - listitem [ref=e171]:
            - strong [ref=e172]: Online Softmax
            - text: ": Computing softmax incrementally as blocks are processed, avoiding storing the full attention matrix."
          - listitem [ref=e173]:
            - strong [ref=e174]: Recomputation
            - text: ": Accepting some redundant compute to avoid expensive memory transfers."
        - paragraph [ref=e175]:
          - text: This page documents Flash Attention implementations across
          - code [ref=e176]: llama.cpp
          - text: "backends and related optimization techniques:"
        - list [ref=e177]:
          - listitem [ref=e178]:
            - strong [ref=e179]: Tiled computation
            - text: ": Block-wise processing to fit in fast memory ($Br \\times Bc$ tiles)."
          - listitem [ref=e180]:
            - strong [ref=e181]: Split-K parallelization
            - text: ": Dividing KV sequence across workgroups for better parallelism."
          - listitem [ref=e182]:
            - strong [ref=e183]: Cooperative matrices
            - text: ": Hardware-accelerated tensor operations (MMA on CUDA, Cooperative Matrix on Vulkan)."
          - listitem [ref=e184]:
            - strong [ref=e185]: Quantization support
            - text: ": On-the-fly dequantization of Q, K, V tensors within the attention kernel."
          - listitem [ref=e186]:
            - strong [ref=e187]: Accumulator type selection
            - text: ": FP16 vs FP32 trade-offs for performance and accuracy."
        - paragraph [ref=e188]:
          - text: The operation is exposed through
          - code [ref=e189]: GGML_OP_FLASH_ATTN_EXT
          - text: which handles both causal and non-causal attention patterns.
        - heading "Flash Attention Architecture Overview Copy link to header" [level=2] [ref=e190]:
          - text: Flash Attention Architecture Overview
          - button "Copy link to header" [ref=e191] [cursor=pointer]:
            - img [ref=e192]
