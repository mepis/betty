            - heading "Why Context Compression Matters for LLMs" [level=2] [ref=e70]
            - paragraph [ref=e71]: "Context compression reduces the number of tokens an LLM processes while preserving the information it needs to produce correct output. For coding agents running multi-step tasks, context accumulates fast: file reads, grep results, tool outputs, error traces, and conversation history all compete for the same finite window."
            - paragraph [ref=e72]:
              - text: The problem is not running out of space. It's
              - strong [ref=e73]: signal dilution
              - text: . As
              - link "context rot research" [ref=e74] [cursor=pointer]:
                - /url: /context-rot
              - text: shows, LLM performance degrades as input length increases, even when the window is nowhere near full. Liu et al.'s
              - link "\"Lost in the Middle\" paper" [ref=e75] [cursor=pointer]:
                - /url: https://arxiv.org/abs/2307.03172
              - text: found that LLM accuracy drops by over 30% when relevant information sits in the middle of the context rather than at the beginning or end. Every irrelevant token makes the model worse at attending to what matters.
            - paragraph [ref=e76]: "Transformer attention is quadratic: at 10,000 tokens, the model tracks 100 million pairwise relationships. At 100,000 tokens, that number is 10 billion. More context doesn't just dilute relevance. It makes the model architecturally worse at locating the right tokens."
            - paragraph [ref=e77]:
              - text: "Jason Liu framed the value precisely:"
              - strong [ref=e78]: "\"If in-context learning is gradient descent, then compaction is momentum.\""
              - text: It preserves the trajectory of the conversation while shedding the weight of irrelevant history.
            - generic [ref=e79]:
              - heading "Bigger windows don't solve the problem" [level=4] [ref=e80]
              - paragraph [ref=e82]: A model with a 1M token context window still exhibits context rot at 50K tokens. Chroma tested 18 frontier models (GPT-4.1, Claude Opus 4, Gemini 2.5, Qwen 3) and found every model's reliability declines as input length increases, even on simple retrieval tasks. The degradation is non-uniform and hard to predict. You can't plan around it.
