            - heading "Frequently Asked Questions" [level=2] [ref=e513]
            - heading "What is context compression for LLMs?" [level=3] [ref=e514]
            - paragraph [ref=e515]: "Context compression reduces the number of tokens an LLM processes while preserving the information needed for correct output. Seven main approaches exist: LLM summarization (rewrites into organized sections), opaque compression (model-internal reduction), verbatim compaction (deletes noise while keeping surviving text identical), token-level pruning (LLMlingua), observation masking (replaces processed outputs with placeholders), adaptive context control (ACON), and multi-agent isolation (separate context windows per agent)."
            - heading "What is the difference between summarization and compaction?" [level=3] [ref=e516]
            - paragraph [ref=e517]:
              - text: Summarization
              - strong [ref=e518]: rewrites
              - text: context into shorter form. In Factory.ai's evaluation of 36,000 real engineering messages, structured summarization scored 3.70/5. Compaction
              - strong [ref=e519]: deletes
              - text: low-signal tokens while keeping every surviving sentence word-for-word identical. Summarization achieves higher compression (70-90%) but introduces hallucination risk. Compaction achieves 50-70% reduction with zero hallucination risk. For coding agents, where exact file paths, line numbers, and error messages must survive intact, compaction preserves what matters.
            - heading "How much can context compression reduce token usage?" [level=3] [ref=e520]
            - paragraph [ref=e521]:
              - text: ACON achieves
              - strong [ref=e522]: 26-54% peak token reduction
              - text: while preserving 95%+ task accuracy. Morph Compact achieves
              - strong [ref=e523]: 50-70% reduction
              - text: at 3,300+ tok/s. LLMlingua can compress up to 20x, though practical ratios are 2-5x. JetBrains found observation masking matches summarization quality at zero compute cost. Prevention-first approaches (FlashCompact) extend effective context life by 3-4x.
            - heading "Does context compression cause hallucinations?" [level=3] [ref=e524]
            - paragraph [ref=e525]: "Summarization-based compression can introduce hallucinations because it rewrites context in the model's own words. File paths, line numbers, and code snippets can be altered. Opaque compression is a black box with unknown fidelity. Verbatim compaction (Morph Compact) produces zero hallucinations: every surviving token is identical to the original input. Observation masking also avoids hallucination since it removes content rather than rewriting it."
            - heading "What is the ACON framework?" [level=3] [ref=e526]
            - paragraph [ref=e527]:
              - link "ACON" [ref=e528] [cursor=pointer]:
                - /url: https://arxiv.org/abs/2510.00615
              - text: (Adaptive Context Optimization for Agents) targets tool call observations, which constitute 60-80% of context. It learns compression guidelines by analyzing why compressed versions fail, achieving 26-54% token reduction with 95%+ accuracy on AppWorld, OfficeBench, and Multi-objective QA. It also distills learned compressors into smaller models for efficient deployment.
            - heading "How does Claude Code auto-compact work?" [level=3] [ref=e529]
            - paragraph [ref=e530]:
              - text: Claude Code runs automatic summarization when conversations approach context limits. It summarizes history into structured sections (completed work, current state, pending tasks). You can customize what it preserves with
              - code [ref=e531]: /compact Focus on code samples and API usage
              - text: or add instructions in your CLAUDE.md file. Claude Code also supports
              - link "subagent isolation" [ref=e532] [cursor=pointer]:
                - /url: https://code.claude.com/docs/en/sub-agents
              - text: for delegating verbose operations to separate context windows.
            - heading "What is LLMlingua and how does it compress prompts?" [level=3] [ref=e533]
            - paragraph [ref=e534]:
              - link "LLMlingua" [ref=e535] [cursor=pointer]:
                - /url: https://arxiv.org/abs/2310.05736
              - text: (Microsoft, EMNLP 2023) compresses prompts at the token level using information entropy, achieving up to 20x compression.
              - link "LLMlingua-2" [ref=e536] [cursor=pointer]:
                - /url: https://arxiv.org/abs/2403.12968
              - text: (ACL 2024) uses bidirectional Transformer encoders (XLM-RoBERTa) for token classification, running 3-6x faster with 2-5x compression. Both are task-agnostic, work with any LLM, and have publicly available code.
            - heading "What is the best context compression method for coding agents?" [level=3] [ref=e537]
            - paragraph [ref=e538]:
              - text: Prevention beats compression.
              - link "Morph FlashCompact" [ref=e539] [cursor=pointer]:
                - /url: /flashcompact
              - text: combines
              - link "WarpGrep" [ref=e540] [cursor=pointer]:
                - /url: /products/warpgrep
              - text: (semantic search returning only relevant snippets, 0.73 F1 in 3.8 steps), Fast Apply (compact diffs at 10,500 tok/s), and Morph Compact (verbatim deletion at 3,300+ tok/s). This extends context life by 3-4x. When compression is needed, verbatim compaction preserves exact code, file paths, and error messages without hallucination risk. Morph achieves state-of-the-art results on SWE-Bench Pro with this approach.
