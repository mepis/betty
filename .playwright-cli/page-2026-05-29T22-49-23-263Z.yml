        - generic [ref=e40]:
          - generic [ref=e41]: "[Submitted on 21 Apr 2024]"
          - heading "Evaluating Retrieval Quality in Retrieval-Augmented Generation" [level=1] [ref=e42]
          - generic [ref=e43]:
            - link "Alireza Salemi" [ref=e44] [cursor=pointer]:
              - /url: https://arxiv.org/search/cs?searchtype=author&query=Salemi,+A
            - text: ","
            - link "Hamed Zamani" [ref=e45] [cursor=pointer]:
              - /url: https://arxiv.org/search/cs?searchtype=author&query=Zamani,+H
          - blockquote [ref=e46]: Evaluating retrieval-augmented generation (RAG) presents challenges, particularly for retrieval models within these systems. Traditional end-to-end evaluation methods are computationally expensive. Furthermore, evaluation of the retrieval model's performance based on query-document relevance labels shows a small correlation with the RAG system's downstream performance. We propose a novel evaluation approach, eRAG, where each document in the retrieval list is individually utilized by the large language model within the RAG system. The output generated for each document is then evaluated based on the downstream task ground truth labels. In this manner, the downstream performance for each document serves as its relevance label. We employ various downstream task metrics to obtain document-level annotations and aggregate them using set-based or ranking metrics. Extensive experiments on a wide range of datasets demonstrate that eRAG achieves a higher correlation with downstream RAG performance compared to baseline methods, with improvements in Kendall's $\tau$ correlation ranging from 0.168 to 0.494. Additionally, eRAG offers significant computational advantages, improving runtime and consuming up to 50 times less GPU memory than end-to-end evaluation.
