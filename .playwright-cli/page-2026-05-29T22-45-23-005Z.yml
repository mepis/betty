          - generic [ref=e181]:
            - generic [ref=e183]:
              - heading "What is Retrieval-Augmented Generation?" [level=2] [ref=e184]
              - paragraph [ref=e188]: Retrieval-Augmented Generation (RAG) is the process of optimizing the output of a large language model, so it references an authoritative knowledge base outside of its training data sources before generating a response. Large Language Models (LLMs) are trained on vast volumes of data and use billions of parameters to generate original output for tasks like answering questions, translating languages, and completing sentences. RAG extends the already powerful capabilities of LLMs to specific domains or an organization's internal knowledge base, all without the need to retrain the model. It is a cost-effective approach to improving LLM output so it remains relevant, accurate, and useful in various contexts.
            - generic [ref=e190]:
              - heading "Why is Retrieval-Augmented Generation important?" [level=2] [ref=e191]
              - generic [ref=e194]:
                - paragraph [ref=e195]:
                  - text: LLMs are a key
                  - link "artificial intelligence (AI)" [ref=e196] [cursor=pointer]:
                    - /url: /what-is/artificial-intelligence/
                  - text: technology powering intelligent
                  - link "chatbots" [ref=e197] [cursor=pointer]:
                    - /url: /what-is/chatbot/
                  - text: and other
                  - link "natural language processing (NLP)" [ref=e198] [cursor=pointer]:
                    - /url: /what-is/nlp/
                  - text: applications. The goal is to create bots that can answer user questions in various contexts by cross-referencing authoritative knowledge sources. Unfortunately, the nature of LLM technology introduces unpredictability in LLM responses. Additionally, LLM training data is static and introduces a cut-off date on the knowledge it has.
                - paragraph [ref=e199]: "Known challenges of LLMs include:"
                - list [ref=e200]:
                  - listitem [ref=e201]: Presenting false information when it does not have the answer.
                  - listitem [ref=e202]: Presenting out-of-date or generic information when the user expects a specific, current response.
                  - listitem [ref=e203]: Creating a response from non-authoritative sources.
                  - listitem [ref=e204]: Creating inaccurate responses due to terminology confusion, wherein different training sources use the same terminology to talk about different things.
                - paragraph [ref=e205]:
                  - text: You can think of the
                  - link "Large Language Model" [ref=e206] [cursor=pointer]:
                    - /url: /what-is/large-language-model/
                  - text: as an over-enthusiastic new employee who refuses to stay informed with current events but will always answer every question with absolute confidence. Unfortunately, such an attitude can negatively impact user trust and is not something you want your chatbots to emulate!
                - paragraph [ref=e207]: RAG is one approach to solving some of these challenges. It redirects the LLM to retrieve relevant information from authoritative, pre-determined knowledge sources. Organizations have greater control over the generated text output, and users gain insights into how the LLM generates the response.
            - generic [ref=e209]:
              - heading "What are the benefits of Retrieval-Augmented Generation?" [level=2] [ref=e210]
              - generic [ref=e213]:
                - paragraph [ref=e214]:
                  - text: RAG technology brings several benefits to an organization's
                  - link "generative AI" [ref=e215] [cursor=pointer]:
                    - /url: /what-is/generative-ai/
                  - text: efforts.
                - heading "Cost-effective implementation" [level=3] [ref=e216]:
                  - strong [ref=e217]: Cost-effective implementation
                - paragraph [ref=e218]:
                  - text: Chatbot development typically begins using a
                  - link "foundation model" [ref=e219] [cursor=pointer]:
                    - /url: /what-is/foundation-models/
                  - text: . Foundation models (FMs) are API-accessible LLMs trained on a broad spectrum of generalized and unlabeled data. The computational and financial costs of retraining FMs for organization or domain-specific information are high. RAG is a more cost-effective approach to introducing new data to the LLM. It makes generative artificial intelligence (generative AI) technology more broadly accessible and usable.
                - heading "Current information" [level=3] [ref=e220]:
                  - strong [ref=e221]: Current information
                - paragraph [ref=e222]: Even if the original training data sources for an LLM are suitable for your needs, it is challenging to maintain relevancy. RAG allows developers to provide the latest research, statistics, or news to the generative models. They can use RAG to connect the LLM directly to live social media feeds, news sites, or other frequently-updated information sources. The LLM can then provide the latest information to the users.
                - heading "Enhanced user trust" [level=3] [ref=e223]:
                  - strong [ref=e224]: Enhanced user trust
                - paragraph [ref=e225]: RAG allows the LLM to present accurate information with source attribution. The output can include citations or references to sources. Users can also look up source documents themselves if they require further clarification or more detail. This can increase trust and confidence in your generative AI solution.
                - heading "More developer control" [level=3] [ref=e226]:
                  - strong [ref=e227]: More developer control
                - paragraph [ref=e228]: With RAG, developers can test and improve their chat applications more efficiently. They can control and change the LLM's information sources to adapt to changing requirements or cross-functional usage. Developers can also restrict sensitive information retrieval to different authorization levels and ensure the LLM generates appropriate responses. In addition, they can also troubleshoot and make fixes if the LLM references incorrect information sources for specific questions. Organizations can implement generative AI technology more confidently for a broader range of applications.
            - generic [ref=e230]:
              - heading "How does Retrieval-Augmented Generation work?" [level=2] [ref=e231]
              - generic [ref=e234]:
                - paragraph [ref=e235]: Without RAG, the LLM takes the user input and creates a response based on information it was trained on—or what it already knows. With RAG, an information retrieval component is introduced that utilizes the user input to first pull information from a new data source. The user query and the relevant information are both given to the LLM. The LLM uses the new knowledge and its training data to create better responses. The following sections provide an overview of the process.
                - heading "Create external data" [level=3] [ref=e236]:
                  - strong [ref=e237]: Create external data
                - paragraph [ref=e238]:
                  - text: The new data outside of the LLM's original training data set is called
                  - emphasis [ref=e239]: external data
                  - text: . It can come from multiple data sources, such as a APIs, databases, or document repositories. The data may exist in various formats like files, database records, or long-form text. Another AI technique, called
                  - emphasis [ref=e240]: embedding language models
                  - text: ", converts data into numerical representations and stores it in a vector database. This process creates a knowledge library that the generative AI models can understand."
                - heading "Retrieve relevant information" [level=3] [ref=e241]:
                  - strong [ref=e242]: Retrieve relevant information
                - paragraph [ref=e243]:
                  - text: The next step is to perform a relevancy search. The user query is converted to a vector representation and matched with the vector databases. For example, consider a smart chatbot that can answer human resource questions for an organization. If an employee searches,
                  - emphasis [ref=e244]: "\"How much annual leave do I have?\""
                  - text: the system will retrieve annual leave policy documents alongside the individual employee's past leave record. These specific documents will be returned because they are highly-relevant to what the employee has input. The relevancy was calculated and established using mathematical vector calculations and representations.
                - heading "Augment the LLM prompt" [level=3] [ref=e245]:
                  - strong [ref=e246]: Augment the LLM prompt
                - paragraph [ref=e247]: Next, the RAG model augments the user input (or prompts) by adding the relevant retrieved data in context. This step uses prompt engineering techniques to communicate effectively with the LLM. The augmented prompt allows the large language models to generate an accurate answer to user queries.
                - heading "Update external data" [level=3] [ref=e248]:
                  - strong [ref=e249]: Update external data
                - paragraph [ref=e250]: The next question may be—what if the external data becomes stale? To maintain current information for retrieval, asynchronously update the documents and update embedding representation of the documents. You can do this through automated real-time processes or periodic batch processing. This is a common challenge in data analytics—different data-science approaches to change management can be used.
                - paragraph [ref=e251]: The following diagram shows the conceptual flow of using RAG with LLMs.
                - paragraph [ref=e252]
            - generic [ref=e254]:
              - heading "What is the difference between Retrieval-Augmented Generation and semantic search?" [level=2] [ref=e255]
              - generic [ref=e258]:
                - paragraph [ref=e259]: Semantic search enhances RAG results for organizations wanting to add vast external knowledge sources to their LLM applications. Modern enterprises store vast amounts of information like manuals, FAQs, research reports, customer service guides, and human resource document repositories across various systems. Context retrieval is challenging at scale and consequently lowers generative output quality.
                - paragraph [ref=e260]:
                  - text: Semantic search technologies can scan large databases of disparate information and retrieve data more accurately. For example, they can answer questions such as,
                  - emphasis [ref=e261]: "\"How much was spent on machinery repairs last year?”"
                  - text: by mapping the question to the relevant documents and returning specific text instead of search results. Developers can then use that answer to provide more context to the LLM.
                - paragraph [ref=e262]: Conventional or keyword search solutions in RAG produce limited results for knowledge-intensive tasks. Developers must also deal with word embeddings, document chunking, and other complexities as they manually prepare their data. In contrast, semantic search technologies do all the work of knowledge base preparation so developers don't have to. They also generate semantically relevant passages and token words ordered by relevance to maximize the quality of the RAG payload.
            - generic [ref=e264]:
              - heading "How can AWS support your Retrieval-Augmented Generation requirements?" [level=2] [ref=e265]
              - generic [ref=e268]:
                - paragraph [ref=e269]:
                  - link "Amazon Bedrock" [ref=e270] [cursor=pointer]:
                    - /url: /bedrock/
                  - text: is a fully-managed service that offers a choice of high-performing foundation models—along with a broad set of capabilities—to build generative AI applications while simplifying development and maintaining privacy and security. With knowledge bases for Amazon Bedrock, you can connect FMs to your data sources for RAG in just a few clicks. Vector conversions, retrievals, and improved output generation are all handled automatically.
                - paragraph [ref=e271]:
                  - text: For organizations managing their own RAG,
                  - link "Amazon Kendra" [ref=e272] [cursor=pointer]:
                    - /url: /kendra/
                  - text: is a highly-accurate enterprise search service powered by machine learning. It provides an optimized Kendra
                  - link "Retrieve API" [ref=e273] [cursor=pointer]:
                    - /url: https://docs.aws.amazon.com/kendra/latest/APIReference/API_Retrieve.html
                  - text: "that you can use with Amazon Kendra’s high-accuracy semantic ranker as an enterprise retriever for your RAG workflows. For example, with the Retrieve API, you can:"
                - list [ref=e274]:
                  - listitem [ref=e275]: Retrieve up to 100 semantically-relevant passages of up to 200 token words each, ordered by relevance.
                  - listitem [ref=e276]:
                    - text: Use pre-built connectors to popular data technologies like
                    - link "Amazon Simple Storage Service" [ref=e277] [cursor=pointer]:
                      - /url: /s3/
                    - text: ", SharePoint, Confluence, and other websites."
                  - listitem [ref=e278]: Support a wide range of document formats such as HTML, Word, PowerPoint, PDF, Excel, and text files.
                  - listitem [ref=e279]: Filter responses based on those documents that the end-user permissions allow.
                - paragraph [ref=e280]:
                  - text: Amazon also offers options for organizations who want to build more custom generative AI solutions.
                  - link "Amazon SageMaker JumpStart" [ref=e281] [cursor=pointer]:
                    - /url: https://aws.amazon.com/sagemaker/jumpstart/
                  - text: is a ML hub with FMs, built-in algorithms, and prebuilt ML solutions that you can deploy with just a few clicks. You can speed up RAG implementation by referring to existing SageMaker notebooks and code examples.
                - paragraph [ref=e282]:
                  - text: Get started with Retrieval-Augmented Generation on AWS by
                  - link "creating a free account today" [ref=e283] [cursor=pointer]:
                    - /url: https://portal.aws.amazon.com/billing/signup
