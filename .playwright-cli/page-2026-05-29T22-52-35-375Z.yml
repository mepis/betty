          - generic [ref=e121]:
            - paragraph [ref=e122]:
              - 'img "Exploring RAG and GraphRAG: Understanding when and how to use both" [ref=e123]'
            - paragraph [ref=e124]: Retrieval Augmented Generation (RAG) is an effective way to get AI to extract information from the specific set of data you want it to work with. The idea is relatively simple - although generative LLMs are amazing at what they do, they don’t know everything. So if we want an LLM to generate a response based on specific information in our documents, we have to provide it with that information (context) first.
            - paragraph [ref=e125]: RAG is the solution to that problem, and has become pretty much ubiquitous for most knowledge base search systems we see out in the wild today. What more can you need? In this article we want to highlight that your data and what it looks like, as well as the valuable information in your data, may dictate what kind of RAG is most effective for it.
            - paragraph [ref=e126]: While in many cases the relevant context may be found in the content of our data, there are applications where additional information can help improve performance of a RAG application. Graph RAG, for example, allows for context to be retrieved based on relations between data points in our database. With the combination of vector search based RAG and Graph RAG in a hybrid RAG system, we can return results not only on their contextual meaning, but also based on the relationships within our data. To help you understand the difference between the two approaches, we’ve also created a recipe that you can run with Colab.
            - generic [ref=e127]:
              - generic [ref=e128]:
                - img [ref=e130]
                - text: note
              - paragraph [ref=e133]:
                - text: 🧑‍🍳 This blog comes with an accompanying recipe and helper functions which can all be found in the
                - link "ms-graphrag-neo4j repository" [ref=e134] [cursor=pointer]:
                  - /url: https://github.com/neo4j-contrib/ms-graphrag-neo4j/
                  - code [ref=e135]: ms-graphrag-neo4j
                  - text: repository
                - text: . You can also open the specific "Naive RAG vs GraphRAG with Neo4J & Weaviate" recipe as a Colab
                - link "here" [ref=e136] [cursor=pointer]:
                  - /url: https://colab.research.google.com/github/neo4j-contrib/ms-graphrag-neo4j/blob/main/examples/neo4j_weaviate_combined.ipynb
            - heading "What is RAG & what is it good atDirect link to What is RAG & what is it good at" [level=2] [ref=e137]:
              - text: What is RAG & what is it good at
              - link "Direct link to What is RAG & what is it good at" [ref=e138] [cursor=pointer]:
                - /url: "#what-is-rag--what-is-it-good-at"
                - text: "#"
            - paragraph [ref=e139]:
              - text: RAG stands for “
              - link "Retrieval Augmented Generation" [ref=e140] [cursor=pointer]:
                - /url: /blog/introduction-to-rag
              - text: "”. Let’s zone in on the first word there: retrieval. The first step in getting an LLM to respond to something based on some specific context is to retrieve that relevant context in the first place."
            - heading "What is Naive RAG?Direct link to What is Naive RAG?" [level=3] [ref=e141]:
              - text: What is Naive RAG?
              - link "Direct link to What is Naive RAG?" [ref=e142] [cursor=pointer]:
                - /url: "#what-is-naive-rag"
                - text: "#"
            - paragraph [ref=e143]: Retrieving context can be done in many many ways, but by far the most common way is to do semantic search (vector search) over a given set of data. This brings us to the term “Naive RAG”, which is simply a basic question-answer system with vector search based retrieval. Within most RAG systems, the “R” (retrieval) is based on vector search. This allows us to use of the semantic meaning of a query and extract the most relevant data based on that meaning, using embedding models to encode both the user query and all the data we may have stored somewhere (vector databases like Weaviate that are designed to do just this).
            - paragraph [ref=e144]: "Because of the fundamental nature of Naive RAG, it’s a great way of retrieving relevant context for any given query, which can then be used by an LLM to generate a response. Most datasets that include embeddings used for Naive RAG contain a list of “text” fields, and for each of them, we have an embedding:"
            - paragraph [ref=e145]:
              - img "Vectors" [ref=e146]
            - paragraph [ref=e147]: An important thing to notice is that each entry is an independent entry. Each entry has meaning that can be represented by a vector (embedding). So, the only information Naive RAG has access to are the independent vectors for each entry. This way of representing data doesn’t represent any relationships between data points beyond the proximity of their meaning in vector space.
            - paragraph [ref=e148]:
              - text: Take the example in our recipe. Here, we’ll be showcasing RAG over a dataset that includes (fake) contracts (such as partnerships, employment etc) that were signed between individuals and companies. For each contract, we have the
              - code [ref=e149]: contract_text
              - text: ","
              - code [ref=e150]: author
              - text: and
              - code [ref=e151]: contract_type
              - text: . We then go ahead and vectorize all of this information, where each contract has one vector representing its meaning.
            - paragraph [ref=e152]: When we ask a question about the data, it does a great job at fetching the most relevant contracts to the question we just asked.
            - paragraph [ref=e153]:
              - img "Example RAG Result" [ref=e154]
            - heading "Where Naive RAG is not enoughDirect link to Where Naive RAG is not enough" [level=3] [ref=e155]:
              - text: Where Naive RAG is not enough
              - link "Direct link to Where Naive RAG is not enough" [ref=e156] [cursor=pointer]:
                - /url: "#where-naive-rag-is-not-enough"
                - text: "#"
            - paragraph [ref=e157]: Now, in most cases the so-called relationships between data points may not be so relevant to any given search task. But with these contracts, you can probably already start to imagine that something that encodes relationships might be super valuable. For example, for each contract we retrieve, we know the author, but our retrieved context does not encode further information such as whether the person the author has signed a contract with has relationships to yet other authors. With that in mind, let’s move on to Graph RAG 👇
            - heading "What is GraphRAG?Direct link to What is GraphRAG?" [level=2] [ref=e158]:
              - text: What is GraphRAG?
              - link "Direct link to What is GraphRAG?" [ref=e159] [cursor=pointer]:
                - /url: "#what-is-graphrag"
                - text: "#"
            - paragraph [ref=e160]:
              - text: GraphRAG has recently become an umbrella term referring broadly to RAG approaches where the retrieval component specifically leverages knowledge graphs. Under this umbrella, numerous methods have emerged, each differing in how they utilize graph-based retrieval to enhance LLM responses (learn more
              - link "here" [ref=e161] [cursor=pointer]:
                - /url: https://graphrag.com/
              - text: ).
            - paragraph [ref=e162]:
              - text: Among these, the
              - link "GraphRAG implementation from Microsoft" [ref=e163] [cursor=pointer]:
                - /url: https://microsoft.github.io/graphrag/
              - text: has risen as one of the most popular and widely-adopted approaches.
            - paragraph [ref=e164]:
              - img "Graph RAG Pipeline Stages" [ref=e165]
            - paragraph [ref=e166]: Microsoft's GraphRAG pipeline. Image from [Edge et al., 2024] licensed under CC BY 4.0.
            - paragraph [ref=e167]: Microsoft's GraphRAG (MS GraphRAG) enhances knowledge graph construction by leveraging an LLM in a two-stage process. In the initial stage, entities and relationships are extracted and summarized from source documents, laying the foundation for the knowledge graph, as depicted in the pipeline illustration above.
            - heading "How GraphRAG Extends Naive RAG CapabilitiesDirect link to How GraphRAG Extends Naive RAG Capabilities" [level=3] [ref=e168]:
              - text: How GraphRAG Extends Naive RAG Capabilities
              - link "Direct link to How GraphRAG Extends Naive RAG Capabilities" [ref=e169] [cursor=pointer]:
                - /url: "#how-graphrag-extends-naive-rag-capabilities"
                - text: "#"
            - paragraph [ref=e170]: What sets MS GraphRAG apart from naive RAG is its ability to detect graph communities and generate domain-specific summaries for groups of closely related entities once the knowledge graph is constructed. This layered approach integrates fragmented information from various text sources into a cohesive and organized representation of entities, relationships, and communities.
            - paragraph [ref=e171]: The resulting entity- and community-level summaries can be used to provide relevant information in response to user queries within a RAG application. Additionally, the structured knowledge graph enables the application of multiple retrieval approaches, such as a combination of graph search and vector search together, enhancing the overall search and retrieval experience
            - heading "Implementing GraphRAG with Neo4jDirect link to Implementing GraphRAG with Neo4j" [level=2] [ref=e172]:
              - text: Implementing GraphRAG with Neo4j
              - link "Direct link to Implementing GraphRAG with Neo4j" [ref=e173] [cursor=pointer]:
                - /url: "#implementing-graphrag-with-neo4j"
                - text: "#"
            - paragraph [ref=e174]:
              - text: For this blog post, we've developed a streamlined
              - link "Python project" [ref=e175] [cursor=pointer]:
                - /url: https://github.com/neo4j-contrib/ms-graphrag-neo4j/tree/main/src/ms_graphrag_neo4j
              - text: that encapsulates all the prompts to avoid overwhelming you with extensive code. While this implementation is a proof-of-concept rather than production-ready code, it provides a practical demonstration. You can easily initialize a Neo4j driver and pass it to this simplified Ms Graph RAG implementation to see the concepts in action.
            - heading "Extracting Entities and RelationsDirect link to Extracting Entities and Relations" [level=3] [ref=e176]:
              - text: Extracting Entities and Relations
              - link "Direct link to Extracting Entities and Relations" [ref=e177] [cursor=pointer]:
                - /url: "#extracting-entities-and-relations"
                - text: "#"
            - paragraph [ref=e178]:
              - text: We use the same dummy
              - link "financial dataset" [ref=e179] [cursor=pointer]:
                - /url: https://huggingface.co/datasets/weaviate/agents/viewer/query-agent-financial-contracts
              - text: as we used in the baseline RAG implementation. This dataset comprises 100 contracts involving various parties. For MS GraphRAG method, the most critical configuration decision involves specifying which entity types should be extracted and summarized, as this selection fundamentally shapes all downstream results. Given our focus on contracts, we prioritize the extraction of key entity categories including Person, Organization, and Location.
            - generic [ref=e181]:
              - code [ref=e183]:
                - generic [ref=e184]: allowed_entities = ["Person", "Organization", "Location"]
                - generic [ref=e185]: await ms_graph.extract_nodes_and_rels(texts, allowed_entities)
              - button "Copy code to clipboard" [ref=e187] [cursor=pointer]:
                - generic [ref=e188]:
                  - img [ref=e189]
                  - img [ref=e191]
            - paragraph [ref=e193]: "After the results we should have the following results:"
            - paragraph [ref=e194]:
              - img "Extracted Relations" [ref=e195]
            - paragraph [ref=e196]: The purple node is the contract that contains its text and metadata, while the green nodes represent extracted entities. Each entity has a name and description, and they can have multiple relationships between each other, as shown in the above image.
            - heading "Generating Community SummariesDirect link to Generating Community Summaries" [level=3] [ref=e197]:
              - text: Generating Community Summaries
              - link "Direct link to Generating Community Summaries" [ref=e198] [cursor=pointer]:
                - /url: "#generating-community-summaries"
                - text: "#"
            - paragraph [ref=e199]: When an entity is mentioned in multiple contracts, it will have multiple descriptions, as it gets one description per contract. Similarly, there can be multiple relationships between entities if they appear in multiple chunks. To consolidate the information, the implementation proceeds with entity and relationship summarization, where we use an LLM to generate concise summaries and resolve duplicates or redundant information.
            - generic [ref=e201]:
              - code [ref=e203]:
                - generic [ref=e204]: await ms_graph.summarize_nodes_and_rels()
              - button "Copy code to clipboard" [ref=e206] [cursor=pointer]:
                - generic [ref=e207]:
                  - img [ref=e208]
                  - img [ref=e210]
            - paragraph [ref=e212]: "Results are:"
            - paragraph [ref=e213]:
              - img "Relationsship and Entity Summaries" [ref=e214]
            - paragraph [ref=e215]: The revised model now displays a single consolidated relationship between entities, containing summarized information from all input sources. Furthermore, each entity receives a comprehensive summary, which can be quite detailed, as evidenced by the extensive profile generated for Danny Williams.
            - paragraph [ref=e216]: In the final phase of the indexing process, we employ graph algorithms, specifically the Leiden algorithm, to identify communities within the network. These communities represent clusters of densely interconnected nodes that exhibit stronger connections among themselves than with the rest of the graph.
            - paragraph [ref=e217]:
              - img "What a Full Graph May Look Like" [ref=e218]
            - paragraph [ref=e219]: Communities are distinguished by entity color in this visualization. This illustrates how densely interconnected nodes naturally cluster to form communities.
            - paragraph [ref=e220]: The idea behind MS GraphRAG is to generate comprehensive high-level summaries that span multiple relationships and nodes. This provides a more holistic overview by synthesizing interconnected information into a cohesive picture.
            - generic [ref=e222]:
              - code [ref=e224]:
                - generic [ref=e225]: await ms_graph.summarize_communities()
              - button "Copy code to clipboard" [ref=e227] [cursor=pointer]:
                - generic [ref=e228]:
                  - img [ref=e229]
                  - img [ref=e231]
            - paragraph [ref=e233]: With a knowledge graph constructed, we can move onto the retrieval part.
            - heading "Hybrid Local Graph & Vector SearchDirect link to Hybrid Local Graph & Vector Search" [level=2] [ref=e234]:
              - text: Hybrid Local Graph & Vector Search
              - link "Direct link to Hybrid Local Graph & Vector Search" [ref=e235] [cursor=pointer]:
                - /url: "#hybrid-local-graph--vector-search"
                - text: "#"
            - paragraph [ref=e236]:
              - text: There are multiple effective methods for retrieving information from a knowledge graph. The Microsoft GraphRAG team demonstrates
              - link "three distinct approaches" [ref=e237] [cursor=pointer]:
                - /url: https://microsoft.github.io/graphrag/query/overview/
              - text: ":"
            - list [ref=e238]:
              - listitem [ref=e239]:
                - paragraph [ref=e240]: Global search
              - listitem [ref=e241]:
                - paragraph [ref=e242]: Local search
              - listitem [ref=e243]:
                - paragraph [ref=e244]: DRIFT search
            - paragraph [ref=e245]: The local search approach generates responses by intelligently merging information from the AI-extracted knowledge graph with relevant text segments from the source documents. Local search is particularly effective for questions that require detailed understanding of specific entities or concepts documented in the corpus (e.g., "What therapeutic benefits does lavender oil provide?").
            - paragraph [ref=e246]:
              - img "Local Search" [ref=e247]
            - paragraph [ref=e248]: "Local search is a retrieval and response generation method that works by finding the most relevant information in your document collection based on specific entities mentioned in a user's question. Here's how it works:"
            - list [ref=e249]:
              - listitem [ref=e250]:
                - paragraph [ref=e251]: "Entity Recognition: When a user asks a question, the system identifies key entities (people, places, concepts, etc.) that are semantically related to the query."
              - listitem [ref=e252]:
                - paragraph [ref=e253]: "Knowledge Graph Navigation: These identified entities act as entry points into your knowledge graph, allowing the system to:"
            - list [ref=e254]:
              - listitem [ref=e255]: Find connected entities (relationships)
              - listitem [ref=e256]: Extract relevant attributes and properties
              - listitem [ref=e257]: Pull in contextual information from community reports or other sources
            - paragraph [ref=e258]:
              - text: After
              - link "indexing our entities in Weaviate" [ref=e259] [cursor=pointer]:
                - /url: https://colab.research.google.com/github/neo4j-contrib/ms-graphrag-neo4j/blob/main/examples/neo4j_weaviate_combined.ipynb#scrollTo=n105cc-_B9bN
              - text: ", we'll implement a retrieval pipeline that leverages both vector and graph databases. First, Weaviate's semantic search capabilities identify the most relevant entities based on the query's meaning. Then, we can use Neo4j's graph traversal capabilities to discover connected entities, relationships, and community structures, revealing both direct connections and broader contextual networks that might not be immediately apparent through vector search alone. This hybrid approach combines the semantic understanding of vector search with the relationship intelligence of graph databases for comprehensive information retrieval."
            - generic [ref=e261]:
              - code [ref=e263]:
                - generic [ref=e264]: retriever = WeaviateNeo4jRetriever(driver=driver,
                - generic [ref=e265]: client=client,
                - generic [ref=e266]: collection="Entities",
                - generic [ref=e267]: id_property_external="entity_id",
                - generic [ref=e268]: id_property_neo4j="name",
                - generic [ref=e269]: retrieval_query=retrieval_query
                - generic [ref=e270]: )
              - generic [ref=e271]:
                - button "Toggle word wrap" [ref=e272] [cursor=pointer]:
                  - img [ref=e273]
                - button "Copy code to clipboard" [ref=e275] [cursor=pointer]:
                  - generic [ref=e276]:
                    - img [ref=e277]
                    - img [ref=e279]
            - paragraph [ref=e281]: First, we query the Weaviate vector database to identify relevant entities based on semantic similarity to the user's question. The retrieved entity IDs serve as linking points that we map to corresponding nodes within our Neo4j graph database.
            - paragraph [ref=e282]:
              - text: Behind the scenes, the system then executes a
              - link "Cypher query" [ref=e283] [cursor=pointer]:
                - /url: https://github.com/neo4j-contrib/ms-graphrag-neo4j/blob/main/src/ms_graphrag_neo4j/cypher_queries.py
              - text: "that traverses the knowledge graph, following relationships between entities and extracting contextually relevant information. The integration of both the semantic search capabilities of Weaviate and the relationship-oriented structure of Neo4j creates a retrieval system that understands both content and connections within your data. The retrieval query is:"
            - generic [ref=e285]:
              - code [ref=e287]:
                - generic [ref=e288]: retrieval_query = """
                - generic [ref=e289]: WITH collect(node) as nodes
                - generic [ref=e290]: "WITH collect {"
                - generic [ref=e291]: UNWIND nodes as n
                - generic [ref=e292]: MATCH (n)<-[:MENTIONS]->(c:__Chunk__)
                - generic [ref=e293]: WITH c, count(distinct n) as freq
                - generic [ref=e294]: RETURN c.text AS chunkText
                - generic [ref=e295]: ORDER BY freq DESC
                - generic [ref=e296]: LIMIT 3
                - generic [ref=e297]: "} AS text_mapping,"
                - generic [ref=e298]: "collect {"
                - generic [ref=e299]: UNWIND nodes as n
                - generic [ref=e300]: MATCH (n)-[:IN_COMMUNITY*]->(c:__Community__)
                - generic [ref=e301]: WHERE c.summary IS NOT NULL
                - generic [ref=e302]: WITH c, c.rating as rank
                - generic [ref=e303]: RETURN c.summary
                - generic [ref=e304]: ORDER BY rank DESC
                - generic [ref=e305]: LIMIT 3
                - generic [ref=e306]: "} AS report_mapping,"
                - generic [ref=e307]: "collect {"
                - generic [ref=e308]: UNWIND nodes as n
                - generic [ref=e309]: MATCH (n)-[r:SUMMARIZED_RELATIONSHIP]-(m)
                - generic [ref=e310]: WHERE m IN nodes
                - generic [ref=e311]: RETURN r.summary AS descriptionText
                - generic [ref=e312]: LIMIT 3
                - generic [ref=e313]: "} as insideRels,"
                - generic [ref=e314]: "collect {"
                - generic [ref=e315]: UNWIND nodes as n
                - generic [ref=e316]: RETURN n.summary AS descriptionText
                - generic [ref=e317]: "} as entities"
                - generic [ref=e318]: "RETURN {Chunks: text_mapping, Reports: report_mapping,"
                - generic [ref=e319]: "Relationships: insideRels,"
                - generic [ref=e320]: "Entities: entities} AS output"
                - generic [ref=e321]: "\"\"\""
              - button "Copy code to clipboard" [ref=e323] [cursor=pointer]:
                - generic [ref=e324]:
                  - img [ref=e325]
                  - img [ref=e327]
            - paragraph [ref=e329]: This Cypher query traverses from the initial set of entities to their corresponding neighbors, communities, chunks, and more.
            - paragraph [ref=e330]: "If we test on the same example about Weaviate, we get the following answer (Note: all of the data for this demo is generated 👍):"
