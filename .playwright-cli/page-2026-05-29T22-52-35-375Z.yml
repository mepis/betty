            - heading "Known Limitations of GraphRAGDirect link to Known Limitations of GraphRAG" [level=3] [ref=e353]:
              - text: Known Limitations of GraphRAG
              - link "Direct link to Known Limitations of GraphRAG" [ref=e354] [cursor=pointer]:
                - /url: "#known-limitations-of-graphrag"
                - text: "#"
            - paragraph [ref=e355]: MS GraphRAG offers more entity-centric indexing and retrieval compared to traditional RAG's chunk-based approach, providing richer entity and community descriptions. However, it faces challenges with static LLM-generated summaries that require periodic full reindexing to capture updates when new data comes in. This indexing pipeline can incur substantial token costs. In contrast, traditional RAG does not require any reindexing pipeline for summary generation when new data is added, allowing for more efficient updates. Additionally, scalability might become problematic with nodes having thousands of connections, and highly-connected generic entity types must be filtered to prevent skewed results. The comprehensive preprocessing required for summarization represents both a strength for detail and a limitation for maintaining current information.
            - heading "SummaryDirect link to Summary" [level=2] [ref=e356]:
              - text: Summary
              - link "Direct link to Summary" [ref=e357] [cursor=pointer]:
                - /url: "#summary"
                - text: "#"
            - paragraph [ref=e358]: While Naive RAG is a simple and effective starting point for retrieval-augmented generation—especially when your data is well-structured and self-contained—Graph RAG takes things a step further by understanding the relationships and context between entities. It’s particularly powerful when your data is rich in connections and interdependencies, like contracts, research papers, or organizational records. By combining both approaches in a hybrid system, you can leverage the best of semantic similarity and structural insights to deliver more nuanced, accurate, and insightful responses. Whether you're just getting started with RAG or looking to push the boundaries with GraphRAG, choosing the right strategy starts with understanding your data.
