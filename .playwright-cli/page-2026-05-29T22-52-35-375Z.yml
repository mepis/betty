              - generic [ref=e113]:
                - link "Tomaz Bratanic" [ref=e114] [cursor=pointer]:
                  - /url: https://github.com/tomasonjo
                  - img "Tomaz Bratanic" [ref=e115]
                - generic [ref=e116]:
