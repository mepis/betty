        - generic [ref=e218]:
          - article [ref=e219]:
            - generic [ref=e221]:
              - paragraph [ref=e222]: "Building a production-ready AI agent harness takes 4-12 weeks and 5,000-20,000 lines of infrastructure code — far more than the model itself. A minimum viable harness (MVH) ships in 2-4 hours; what breaks teams is the path from MVH to production. The critical insight: harness quality, not model quality, determines agent reliability. LangChain’s data shows harness improvements alone lifted Terminal Bench scores from 52.8% to 66.5% — without touching the underlying model."
              - separator [ref=e223]
              - generic [ref=e224]:
                - paragraph [ref=e225]: Build Your AI Context Stack
                - paragraph [ref=e226]: Get the blueprint for implementing context graphs across your enterprise. This guide walks through the four-layer architecture — from metadata foundation to agent orchestration — with practical implementation steps for 2026.
                - link "Get the Stack Guide" [ref=e227] [cursor=pointer]:
                  - /url: https://atlan.com/resources/ai-context-stack/
              - separator [ref=e228]
              - heading "Why build an AI agent harness?" [level=2] [ref=e229]
              - paragraph [ref=e230]: "The raw agent loop (LLM call, tool execution, result feedback) is 20 lines. The harness that makes it safe for production is 5,000-20,000 lines. Without a harness: no context management, no permission tiers, no persistence across sessions, no verification. Manus spent 6 months and 5 complete architectural rewrites before their agent was production-ready."
              - paragraph [ref=e231]: Most “getting started” agent tutorials stop at the core loop. Production reliability requires infrastructure those tutorials never show. Common failure modes without a harness include runaway tool calls, context exhaustion, no audit trail, and undetected data errors propagating through multiple steps. LangChain built 4 distinct architectures for their LangGraph execution engine alone. The cost of retrofitting governance onto a running agent is substantially higher than building it in from the start.
              - paragraph [ref=e232]: The performance case is equally clear. LangChain achieved a harness improvement from 52.8% to 66.5% on Terminal Bench (a 13.7-point gain) without changing the underlying model. Vercel found that removing 80% of tools from the harness actually improved agent performance. Stripe ships 1,300 PRs per week using narrow-scope agents with disciplined harnesses. Enterprises that invest in harness engineering reduce agent failure rates by controlling how the model interacts with data, not just what the model sees.
              - paragraph [ref=e233]:
                - text: "Who should do this: platform and ML engineers building their first production agent; data teams deploying agents against governed enterprise data; teams with a working prototype that needs to be made production-safe. Not for teams that have not yet validated the core use case with a 20-line prototype. Learn more about"
                - link "what an agent harness is" [ref=e234] [cursor=pointer]:
                  - /url: https://atlan.com/know/what-is-an-agent-harness/
                - text: and
                - link "the harness engineering discipline" [ref=e235] [cursor=pointer]:
                  - /url: https://atlan.com/know/what-is-harness-engineering/
                - text: before starting.
              - separator [ref=e236]
              - heading "Prerequisites" [level=2] [ref=e237]
              - paragraph [ref=e238]:
                - strong [ref=e239]: "Organizational prerequisites:"
              - list [ref=e240]:
                - listitem [ref=e241]:
                  - text: "[ ]"
                  - strong [ref=e242]: "A bounded task domain:"
                  - text: "One agent, one job. Stripe’s pattern: one agent per bounded task."
                - listitem [ref=e243]:
                  - text: "[ ]"
                  - strong [ref=e244]: "Stakeholder approval for tool permissions:"
                  - text: Know upfront which tools require human-in-the-loop approval vs. auto-approve.
                - listitem [ref=e245]:
                  - text: "[ ]"
                  - strong [ref=e246]: "A governed data inventory:"
                  - text: Which tables, APIs, and files will the agent query? Are any uncertified or under active schema change? (Step 0 depends on this.)
                - listitem [ref=e247]:
                  - text: "[ ]"
                  - strong [ref=e248]: "Incident response plan:"
                  - text: Who owns a runaway agent? Who controls the kill switch?
              - paragraph [ref=e249]:
                - strong [ref=e250]: "Technical prerequisites:"
              - list [ref=e251]:
                - listitem [ref=e252]: "[ ] Python 3.10+, async-capable runtime"
                - listitem [ref=e253]: "[ ] LLM API credentials with spend limits set"
                - listitem [ref=e254]: "[ ] PostgreSQL + pgvector for persistence layer"
                - listitem [ref=e255]: "[ ] Access to all data sources the agent will query (read at minimum; write where required)"
                - listitem [ref=e256]: "[ ] Langfuse or equivalent observability backend"
              - paragraph [ref=e257]:
                - strong [ref=e258]: "Team and resources:"
              - list [ref=e259]:
                - listitem [ref=e260]:
                  - strong [ref=e261]: Harness Engineer
                  - text: "(50-100% FTE, Weeks 1-4): Core loop, context management, persistence, observability."
                - listitem [ref=e262]:
                  - strong [ref=e263]: Data Engineer / Data Owner
                  - text: "(20% FTE, Week 1): Step 0, the data certification audit."
                - listitem [ref=e264]:
                  - strong [ref=e265]: Security / Infra
                  - text: "(10% FTE, Weeks 3-4): Permission classification review, PII guardrails sign-off."
              - paragraph [ref=e266]:
                - strong [ref=e267]: "Time commitment:"
              - list [ref=e268]:
                - listitem [ref=e269]: "MVH (Steps 1-2 only): 2-4 hours"
                - listitem [ref=e270]: "Context + permissions (Steps 3-5): Days 2-5"
                - listitem [ref=e271]: "Persistence + observability (Steps 6-8): Days 5-20"
                - listitem [ref=e272]: "Guardrails + eval (Steps 9-10): Week 4+"
                - listitem [ref=e273]: "Total production-ready: 4-12 weeks"
              - separator [ref=e274]
              - heading "Step 0 — Certify your data layer" [level=2] [ref=e275]
              - paragraph [ref=e276]:
                - strong [ref=e277]: "What you’ll accomplish:"
                - text: Audit every data source your agent will query. Identify certified vs. uncertified tables, resolve schema drift, set up data contracts or certification policies, and establish the ground truth that Step 8’s verification loops will validate against.
              - paragraph [ref=e278]:
                - strong [ref=e279]: "Time required:"
                - text: 4-8 hours (initial audit); ongoing as data sources change.
              - paragraph [ref=e280]:
                - strong [ref=e281]: "Why this step matters:"
                - text: The harness fails at the data layer, not the model layer. An agent querying stale lineage or an uncertified join will confidently produce wrong answers. No amount of prompt tuning or LLM-as-judge scoring will fix a data quality problem. This is the step no other build guide includes, and it is the most common root cause of production failures.
              - paragraph [ref=e282]:
                - strong [ref=e283]: "How to do it:"
              - list [ref=e284]:
                - listitem [ref=e285]:
                  - strong [ref=e286]: Inventory every data source.
                  - text: "List all tables, APIs, files, and external services. For each: owner, last-certified date, schema stability status. Flag any table under active schema migration as “hold.”"
                - listitem [ref=e287]:
                  - strong [ref=e288]: Run a lineage check on critical tables.
                  - text: Trace upstream dependencies. Identify lineage gaps. A table with unknown lineage is an uncertified table. Atlan’s data lineage view surfaces column-level impact across pipelines automatically.
                - listitem [ref=e289]:
                  - strong [ref=e290]: Apply certification policies or tags.
                  - text: "Mark each source as certified, provisional, or blocked. “Certified” means: schema stable, quality rules passing, owner acknowledged. Atlan’s certification workflows allow bulk certification with approval flows, with no spreadsheet required."
                - listitem [ref=e291]:
                  - strong [ref=e292]: Draft data contracts for agent-critical tables.
                  - text: "For each table the agent will write to or use as a verification ground truth: define expected schema, allowed null rates, and freshness SLA."
                - listitem [ref=e293]:
                  - strong [ref=e294]: Document the certified set in AGENTS.md
                  - text: (Step 3). Record which sources are certified, naming conventions, and which tables require permission escalation before writes.
              - paragraph [ref=e295]:
                - strong [ref=e296]: "Validation checklist:"
              - list [ref=e297]:
                - listitem [ref=e298]: "[ ] All data sources inventoried with owner and last-certified date"
                - listitem [ref=e299]: "[ ] Lineage traced for every table used as a tool input"
                - listitem [ref=e300]: "[ ] Certification status (certified / provisional / blocked) applied to all sources"
                - listitem [ref=e301]: "[ ] Data contracts drafted for any source agent writes to or validates against"
                - listitem [ref=e302]: "[ ] Schema drift alerts enabled for certified tables"
              - paragraph [ref=e303]:
                - strong [ref=e304]: "Common mistakes:"
              - paragraph [ref=e305]:
                - text: "No: Treating data certification as a post-launch concern"
                - text: "Yes: Agents reading uncertified data return confident wrong answers. This is the most common root cause of silent production failures. Certify before build."
              - paragraph [ref=e306]:
                - text: "No: Using a single “looks good” from the data owner as certification"
                - text: "Yes: Certification should be a documented artifact with schema snapshot, quality rule results, and expiry date."
              - paragraph [ref=e307]:
                - strong [ref=e308]: "Atlan entry point:"
                - text: Atlan’s data catalog and certification workflows are the purpose-built tool for this step. The MCP server makes certified data context available as the transport layer for AGENTS.md and harness tooling.
              - separator [ref=e309]
              - heading "Step 1 — Define scope and tool set" [level=2] [ref=e310]
              - paragraph [ref=e311]:
                - strong [ref=e312]: "What you’ll accomplish:"
                - text: Select 4-5 atomic tools, assign one agent to one bounded task, and document tool schema precisely. This is the single biggest lever for agent performance.
              - paragraph [ref=e313]:
                - strong [ref=e314]: "Time required:"
                - text: Day 1, 2-4 hours.
              - paragraph [ref=e315]:
                - strong [ref=e316]: "Why:"
                - text: Vercel found that removing 80% of tools improved agent performance. More than 20 tools visible to the agent degrades model performance regardless of harness quality.
              - paragraph [ref=e317]:
                - strong [ref=e318]: "How:"
              - list [ref=e319]:
                - listitem [ref=e320]:
                  - text: Select 4-5 atomic tools (e.g.,
                  - code [ref=e321]: read_file
                  - text: ","
                  - code [ref=e322]: write_file
                  - text: ","
                  - code [ref=e323]: list_dir
                  - text: ","
                  - code [ref=e324]: shell
                  - text: ","
                  - code [ref=e325]: search_db
                  - text: ). Each does exactly one thing.
                - listitem [ref=e326]: "Define tool schema: name, description, parameters, return type, error behavior. Write the schema before the code; it goes into the system prompt."
                - listitem [ref=e327]: "Apply the Stripe pattern: one agent, one bounded task. If the task requires more than 5 tools, it is probably two tasks."
                - listitem [ref=e328]: "Document the tool permission tier for each tool: safe (auto-approve), moderate (whitelist), or dangerous (explicit approval). This seeds Step 5."
              - paragraph [ref=e329]:
                - strong [ref=e330]: "Validation checklist:"
              - list [ref=e331]:
                - listitem [ref=e332]: "[ ] 5 or fewer tools defined with atomic scope"
                - listitem [ref=e333]: "[ ] Tool schema written in structured format"
                - listitem [ref=e334]: "[ ] Permission tier assigned to every tool"
                - listitem [ref=e335]: "[ ] Task boundary defined: one agent, one job"
              - paragraph [ref=e336]:
                - strong [ref=e337]: "Common mistakes:"
              - paragraph [ref=e338]:
                - text: "No: Adding tools “just in case”"
                - text: "Yes: You can always add tools after observing real failures. Removing a tool from the system prompt without breaking existing behavior is costly to retrofit."
              - separator [ref=e339]
              - heading "Step 2 — Build the core agent loop" [level=2] [ref=e340]
              - paragraph [ref=e341]:
                - strong [ref=e342]: "What you’ll accomplish:"
                - text: Implement the ReAct loop (model call, tool execution, result feedback, repeat) in approximately 20 lines of Python. Add a max-iteration ceiling before anything else.
              - paragraph [ref=e343]:
                - strong [ref=e344]: "Time required:"
                - text: Days 1-2, 4-6 hours.
              - paragraph [ref=e345]:
                - strong [ref=e346]: "How:"
              - list [ref=e347]:
                - listitem [ref=e348]:
                  - text: Implement the ReAct loop. On
                  - code [ref=e349]: tool_call
                  - text: ": execute the tool, append the result, call the model again. On"
                  - code [ref=e350]: final_answer
                  - text: ": return."
                - listitem [ref=e351]: "Add a max-iteration ceiling immediately. Production ceiling: 50-100 iterations. An unbounded loop is a runaway agent."
                - listitem [ref=e352]: Build append-only message design. Nothing is mutated. This enables more than 80% KV-cache hit rate and produces a clean audit history.
                - listitem [ref=e353]: Log every loop iteration to stdout at minimum.
              - paragraph [ref=e354]:
                - text: "The key guard:"
                - code [ref=e355]: if response.stop_reason == "end_turn" or iteration >= MAX_ITERATIONS
                - text: . Set
                - code [ref=e356]: MAX_ITERATIONS
                - text: in a config file, not hardcoded.
              - paragraph [ref=e357]:
                - strong [ref=e358]: "Validation checklist:"
              - list [ref=e359]:
                - listitem [ref=e360]:
                  - text: "[ ] ReAct loop terminates on"
                  - code [ref=e361]: final_answer
                - listitem [ref=e362]: "[ ] Max-iteration ceiling enforced in config"
                - listitem [ref=e363]: "[ ] Append-only message history"
                - listitem [ref=e364]: "[ ] Basic loop iteration logging"
                - listitem [ref=e365]: "[ ] Loop tested with an intentionally failing tool"
              - paragraph [ref=e366]:
                - strong [ref=e367]: "Common mistakes:"
              - paragraph [ref=e368]:
                - text: "No: Skipping the iteration ceiling “to test in production first”"
                - text: "Yes: Add the ceiling before the first test run. A runaway loop exhausts API budget in minutes."
              - separator [ref=e369]
              - heading "Step 3 — Create your AGENTS.md configuration file" [level=2] [ref=e370]
              - paragraph [ref=e371]:
                - strong [ref=e372]: "What you’ll accomplish:"
                - text: Write the AGENTS.md file, the harness “inform” layer. Build and test commands, architectural boundaries, naming conventions, and behavioral constraints. Keep it to 150 lines or fewer.
              - paragraph [ref=e373]:
                - strong [ref=e374]: "Why:"
                - text: AGENTS.md is not documentation. It is operational context the agent reads at session start. It is also the substrate that a certified data catalog populates with governed source references.
              - paragraph [ref=e375]:
                - strong [ref=e376]: "How:"
              - list [ref=e377]:
                - listitem [ref=e378]: "Define build/test commands: the exact commands the agent runs to build, test, and validate output."
                - listitem [ref=e379]: "Document architectural boundaries: which directories the agent can read vs. write."
                - listitem [ref=e380]: "Add certified data references: certified tables from Step 0 with canonical names and conventions."
                - listitem [ref=e381]: "Set behavioral constraints, for example: never commit to main directly, always write tests before code changes."
                - listitem [ref=e382]: Keep to 150 lines or fewer. If the file is longer, you are writing documentation, not operational context.
              - paragraph [ref=e383]: See the full guide on how to write an AGENTS.md file for templates and worked examples.
              - paragraph [ref=e384]:
                - strong [ref=e385]: "Validation checklist:"
              - list [ref=e386]:
                - listitem [ref=e387]: "[ ] Build/test commands verified working"
                - listitem [ref=e388]: "[ ] Architectural boundaries explicit"
                - listitem [ref=e389]: "[ ] Certified data source names documented"
                - listitem [ref=e390]: "[ ] Behavioral constraints listed"
                - listitem [ref=e391]: "[ ] File length 150 lines or fewer"
              - paragraph [ref=e392]:
                - strong [ref=e393]: "Common mistakes:"
              - paragraph [ref=e394]:
                - text: "No: Writing AGENTS.md as a knowledge dump, pasting raw docs or full API specs"
                - text: "Yes: AGENTS.md is operational constraints. Keep it directive, not descriptive."
              - separator [ref=e395]
              - heading "Step 4 — Layer the system prompt" [level=2] [ref=e396]
              - paragraph [ref=e397]:
                - strong [ref=e398]: "What you’ll accomplish:"
                - text: "Build a structured system prompt: identity and role, tool schemas, behavioral constraints, and a dynamic context injection layer. Static portion under 60 lines."
              - paragraph [ref=e399]:
                - strong [ref=e400]: "How:"
              - list [ref=e401]:
                - listitem [ref=e402]:
                  - strong [ref=e403]: "Static section (60 lines or fewer):"
                  - text: Identity, role, tool schemas as JSON objects, and top-level behavioral constraints. Reference AGENTS.md for detail; do not copy it in.
                - listitem [ref=e404]:
                  - strong [ref=e405]: "Dynamic injection layer:"
                  - text: Current date and time, session ID, task-specific context, and certified table names relevant to the current task. Inject at runtime.
                - listitem [ref=e406]:
                  - strong [ref=e407]: "Tool schema block:"
                  - text: Each tool as a JSON object — matching the schemas from Step 1 exactly.
                - listitem [ref=e408]:
                  - strong [ref=e409]: "Test with context floods disabled:"
                  - text: Verify the static section alone produces correct tool-call formatting before adding dynamic layers.
              - paragraph [ref=e410]:
                - strong [ref=e411]: "Common mistakes:"
              - paragraph [ref=e412]:
                - text: "No: Repeating full AGENTS.md content in the system prompt"
                - text: "Yes: Reference AGENTS.md by name; inject only the sections relevant to the current task."
              - separator [ref=e413]
              - heading "Step 5 — Implement permission classification" [level=2] [ref=e414]
              - paragraph [ref=e415]:
                - strong [ref=e416]: "What you’ll accomplish:"
                - text: Enforce three permission tiers as middleware between the agent’s tool request and tool execution.
              - paragraph [ref=e417]:
                - strong [ref=e418]: "Why:"
                - text: Without permission tiers, the agent can execute
                - code [ref=e419]: git push origin main
                - text: the same way as
                - code [ref=e420]: list_dir
                - text: . One unguarded dangerous tool call equals a production incident.
              - paragraph [ref=e421]:
                - strong [ref=e422]: "How:"
              - list [ref=e423]:
                - listitem [ref=e424]:
                  - strong [ref=e425]: "Tier 1 (Safe / auto-approve):"
                  - code [ref=e426]: read_file
                  - text: ","
                  - code [ref=e427]: list_dir
                  - text: ","
                  - code [ref=e428]: search_db
                  - text: (read-only). Execute immediately and log.
                - listitem [ref=e429]:
                  - strong [ref=e430]: "Tier 2 (Moderate / whitelist):"
                  - code [ref=e431]: write_file
                  - text: ","
                  - code [ref=e432]: edit_file
                  - text: . Execute only if the target path is in an approved whitelist.
                - listitem [ref=e433]:
                  - strong [ref=e434]: "Tier 3 (Dangerous / explicit approval):"
                  - code [ref=e435]: shell
                  - text: ", API write calls,"
                  - code [ref=e436]: git push
                  - text: ", file deletion. Pause the loop, surface to a human operator, and resume only on approval. Log with timestamp and operator ID."
                - listitem [ref=e437]: Implement as a middleware function wrapping every tool call.
              - paragraph [ref=e438]:
                - text: Set
                - code [ref=e439]: "PERMISSION_MAP = {\"read_file\": \"safe\", \"write_file\": \"moderate\", \"shell\": \"dangerous\"}"
                - text: . Unknown tools default to “dangerous.”
              - separator [ref=e440]
              - heading "Step 6 — Add context management" [level=2] [ref=e441]
              - paragraph [ref=e442]:
                - strong [ref=e443]: "What you’ll accomplish:"
                - text: Token counting per message, auto-compaction at 85-92% capacity, and file-based overflow for outputs exceeding 80,000 characters.
              - paragraph [ref=e444]:
                - strong [ref=e445]: "Why:"
                - text: An agent without context management silently drops early messages when the context window fills, including the system prompt. The resulting behavioral degradation looks like a model problem, but it is a harness problem.
              - paragraph [ref=e446]:
                - strong [ref=e447]: "How:"
              - list [ref=e448]:
                - listitem [ref=e449]: Count tokens per message using tiktoken or the provider’s tokenizer. Track a running total.
                - listitem [ref=e450]: Set the compaction threshold at 85-92%. Summarize the oldest messages (do not delete them), and preserve tool call and result pairs in full.
                - listitem [ref=e451]: Handle file-based overflow for outputs exceeding 80,000 characters. Write to a named overflow file.
                - listitem [ref=e452]: Target more than 80% KV-cache hit rate.
              - paragraph [ref=e453]:
                - strong [ref=e454]: "Common mistakes:"
              - paragraph [ref=e455]:
                - text: "No: Letting context fill to 100%"
                - text: "Yes: Compaction at 85-92% gives the model room to complete the current tool call before context management kicks in."
              - separator [ref=e456]
              - heading "Step 7 — Build persistence layer" [level=2] [ref=e457]
              - paragraph [ref=e458]:
                - strong [ref=e459]: "What you’ll accomplish:"
                - text: Progress files (
                - code [ref=e460]: todo.md
                - text: ","
                - code [ref=e461]: progress.txt
                - text: ), git checkpointing, feature list JSON, and session state serialization so the agent can resume after crashes.
              - paragraph [ref=e462]:
                - strong [ref=e463]: "Why:"
                - text: Without persistence, every crash or context reset starts from zero. The Ralph Loop pattern (an Initializer Agent that sets up state, followed by a Coding Agent that reads git logs and progress files at session start) shows that state persistence is not optional for long-running tasks.
              - paragraph [ref=e464]:
                - strong [ref=e465]: "How:"
              - list [ref=e466]:
                - listitem [ref=e467]:
                  - strong [ref=e468]: "Progress files:"
                  - code [ref=e469]: todo.md
                  - text: (pending tasks as a checklist),
                  - code [ref=e470]: progress.txt
                  - text: (append-only log of completed steps). The agent reads both at session start.
                - listitem [ref=e471]:
                  - strong [ref=e472]: "Feature list JSON:"
                  - code [ref=e473]: feature-list.json
                  - text: ", a structured record of what is built, pending, and blocked."
                - listitem [ref=e474]:
                  - strong [ref=e475]: "Git checkpointing:"
                  - text: "After each task unit, the agent commits:"
                  - code [ref=e476]: "[agent-checkpoint] {task_id}: {description}"
                  - text: .
                - listitem [ref=e477]:
                  - strong [ref=e478]: "Session state serialization:"
                  - text: Serialize message history, the current task pointer, and the tool permission log to
                  - code [ref=e479]: session-state.json
                  - text: at every iteration.
              - paragraph [ref=e480]:
                - strong [ref=e481]: "Validation checklist:"
              - list [ref=e482]:
                - listitem [ref=e483]:
                  - text: "[ ]"
                  - code [ref=e484]: todo.md
                  - text: and
                  - code [ref=e485]: progress.txt
                  - text: created at session start if not present
                - listitem [ref=e486]:
                  - text: "[ ]"
                  - code [ref=e487]: feature-list.json
                  - text: updated after each completed task
                - listitem [ref=e488]: "[ ] Git checkpoint fires after each significant step"
                - listitem [ref=e489]: "[ ] Resume test: kill agent mid-task, restart, verify it picks up from the last checkpoint"
              - paragraph [ref=e490]:
                - strong [ref=e491]: "Common mistakes:"
              - paragraph [ref=e492]:
                - text: "No: Storing session state in memory only"
                - text: "Yes: If the process dies, memory dies. File-based persistence is the only reliable resume path."
              - separator [ref=e493]
              - heading "Step 8 — Deploy observability and verification" [level=2] [ref=e494]
              - paragraph [ref=e495]:
                - strong [ref=e496]: "What you’ll accomplish:"
                - text: Structured JSON logging, Langfuse integration, an LLM-as-judge pipeline, verification loops against the certified schema from Step 0, and pre-completion checklist middleware.
              - paragraph [ref=e497]:
                - strong [ref=e498]: "Why:"
                - text: LangChain found that adding pre-completion checklist middleware alone added 13.7 benchmark points. Verification without ground truth is noise — this is why Step 0 must precede this step.
              - paragraph [ref=e499]:
                - strong [ref=e500]: "How:"
              - list [ref=e501]:
                - listitem [ref=e502]:
                  - strong [ref=e503]: "Structured JSON logging:"
                  - text: "Every tool call, result, loop iteration, and permission check emits JSON. Include: timestamp, session ID, step, tool, input hash, output hash, duration in ms, and permission tier."
                - listitem [ref=e504]:
                  - strong [ref=e505]: "Langfuse integration:"
                  - text: Send traces for visualization. Captures spans, token counts, and latency.
                - listitem [ref=e506]:
                  - strong [ref=e507]: "LLM-as-judge pipeline:"
                  - text: "After every agent output, a second LLM call scores the output against a rubric: correctness, completeness, format compliance. Score written to"
                  - code [ref=e508]: verification-log.json
                  - text: .
                - listitem [ref=e509]:
                  - strong [ref=e510]: "Verification loop against certified schema:"
                  - text: "For any output referencing a certified table from Step 0: validate the output schema against the certified schema. Flag mismatches."
                - listitem [ref=e511]:
                  - strong [ref=e512]: "Pre-completion checklist middleware:"
                  - text: Before the agent returns
                  - code [ref=e513]: final_answer
                  - text: ", enforce a checklist: required fields present, output schema valid, no PII in response."
              - paragraph [ref=e514]:
                - strong [ref=e515]: "Atlan second entry point:"
                - text: Data quality contracts provide the certified expected schema that verification loops validate against. Audit trails log every agent action against governed assets, satisfying AI governance and compliance requirements.
              - paragraph [ref=e516]:
                - text: "See also:"
                - link "how to test your AI agent harness" [ref=e517] [cursor=pointer]:
                  - /url: https://atlan.com/know/how-to-test-ai-agent-harness/
                - text: for a full evaluation framework after completing these steps.
              - generic [ref=e518]:
                - paragraph [ref=e519]: Inside Atlan AI Labs & The 5x Accuracy Factor
                - paragraph [ref=e520]: Learn how context engineering drove 5x AI accuracy in real customer systems. Explore real experiments, quantifiable results, and a repeatable playbook for closing the gap between AI demos and production-ready systems.
                - link "Download E-Book" [ref=e521] [cursor=pointer]:
                  - /url: https://atlan.com/resources/atlan-ai-labs-ebook/
              - separator [ref=e522]
              - heading "Step 9 — Add guardrails" [level=2] [ref=e523]
              - paragraph [ref=e524]:
                - strong [ref=e525]: "What you’ll accomplish:"
                - text: Input guardrails (banned keywords, prompt injection regex, PII detection) and output guardrails (deterministic PII redaction and an LLM safety evaluation).
              - paragraph [ref=e526]:
                - strong [ref=e527]: "How:"
              - list [ref=e528]:
                - listitem [ref=e529]:
                  - strong [ref=e530]: "Input guardrails:"
                  - text: Banned keyword list, prompt injection regex (catch phrases like “ignore previous instructions” or “you are now”), and PII detection regex for SSN, credit card, and email patterns. Block and log on match.
                - listitem [ref=e531]:
                  - strong [ref=e532]: "Output guardrails, deterministic PII redaction:"
                  - text: Regex and NER scan before any output leaves the harness. Replace detected values with
                  - code [ref=e533]: "[REDACTED:{type}]"
                  - text: .
                - listitem [ref=e534]:
                  - strong [ref=e535]: "Output guardrails, LLM safety eval:"
                  - text: Classification model run on the first 2,000 characters. Flag outputs that score below threshold for human review.
                - listitem [ref=e536]:
                  - strong [ref=e537]: "Intermediate step PII scan:"
                  - text: Apply PII detection to tool call arguments and tool results, not just final answers.
              - paragraph [ref=e538]:
                - strong [ref=e539]: "Common mistakes:"
              - paragraph [ref=e540]:
                - text: "No: Adding guardrails only to"
                - code [ref=e541]: final_answer
                - text: output
                - text: "Yes: Tool call arguments are equally exposed. Passing a user’s SSN to a shell command is a guardrail failure even if the final output looks clean."
              - separator [ref=e542]
              - heading "Step 10 — Evaluate harness independently of model" [level=2] [ref=e543]
              - paragraph [ref=e544]:
                - strong [ref=e545]: "What you’ll accomplish:"
                - text: Run harness evaluation with the model held constant. Vary harness configuration, measure delta, and distinguish harness quality from model quality.
              - paragraph [ref=e546]:
                - strong [ref=e547]: "Why:"
                - text: LangChain improved Terminal Bench from 52.8% to 66.5% without touching the model. Most teams attribute performance problems to the model and switch providers. The harness is usually the culprit.
              - paragraph [ref=e548]:
                - strong [ref=e549]: "How:"
              - list [ref=e550]:
                - listitem [ref=e551]:
                  - strong [ref=e552]: "Freeze model version:"
                  - text: Pin the exact model ID and temperature.
                - listitem [ref=e553]:
                  - strong [ref=e554]: "Build a benchmark task set:"
                  - text: 20-50 representative tasks with expected outputs, validated by a human reviewer.
                - listitem [ref=e555]:
                  - strong [ref=e556]: "Vary one harness parameter at a time:"
                  - text: Context compaction threshold, system prompt length, tool set size, permission tier strictness, verification loop strictness.
                - listitem [ref=e557]:
                  - strong [ref=e558]: "Measure the delta:"
                  - text: Score each configuration. The delta between configurations is pure harness signal.
                - listitem [ref=e559]:
                  - strong [ref=e560]: "Document winners:"
                  - text: Each winning configuration change is a permanent harness update. Commit to version control.
              - paragraph [ref=e561]:
                - strong [ref=e562]: "Common mistakes:"
              - paragraph [ref=e563]:
                - text: "No: Changing both model and harness simultaneously and attributing improvement to the model"
                - text: "Yes: One variable at a time. A/B test the harness the same way you would A/B test a product feature."
              - separator [ref=e564]
              - heading "Common mistakes when building an AI agent harness" [level=2] [ref=e565]
              - paragraph [ref=e566]: "Most common failures share a pattern: over-engineering architecture before observing real failure modes, under-engineering data quality, and treating context management as optional. Teams that skip Step 0 and Step 8 consistently rebuild within 3 months."
              - heading "Mistake 1 — Over-engineering before observing failures" [level=3] [ref=e567]
              - paragraph [ref=e568]: Build the MVH (Steps 1-2) first. Run 50 real tasks. Observe actual failure modes. Then add infrastructure for what breaks. Building comprehensive observability before knowing what you need to observe is the most common harness engineering anti-pattern.
              - heading "Mistake 2 — Too many tools" [level=3] [ref=e569]
              - paragraph [ref=e570]: "More than 20 tools visible in the system prompt degrades performance. Start with 4-5 atomic tools. To test the effect: remove tools from the system prompt (not the codebase) and re-run the benchmark. The score difference is the tool-bloat tax."
              - heading "Mistake 3 — Context flooding" [level=3] [ref=e571]
              - paragraph [ref=e572]: Teams dump raw Confluence pages, Slack exports, and full API docs into harness context. Context is not a knowledge base. AGENTS.md is operational constraints at 150 lines or fewer. External knowledge goes into a retrieval layer accessed via tool call, not injected into every prompt.
              - heading "Mistake 4 — No context management" [level=3] [ref=e573]
              - paragraph [ref=e574]: Add Step 6 before running any task longer than 10 tool calls. An output exceeding 80,000 characters will crash the session without overflow handling. This is a harness bug, not a model limitation.
              - heading "Mistake 5 — Treating data quality as the model’s problem" [level=3] [ref=e575]
              - paragraph [ref=e576]:
                - text: The LLM confidently processes bad data. Stale lineage, uncertified tables, and schema drift are invisible to the model. It has no way to know that the
                - code [ref=e577]: revenue
                - text: column was redefined three weeks ago. Step 0 is not optional.
              - separator [ref=e578]
              - heading "How Atlan supports Steps 0 and 8" [level=2] [ref=e579]
              - paragraph [ref=e580]: Atlan is the governed data layer that makes the 80% work — the data the harness feeds the agent. At Step 0, the data catalog and certification workflows certify the substrate. At Step 8, data quality contracts and audit trails power verification loops.
              - paragraph [ref=e581]: Without a data catalog, Step 0 is a spreadsheet exercise. Schema drift goes undetected. Data contracts are informal agreements, not enforced artifacts. When the harness queries an uncertified join in production, tracing the failure back to the data source takes hours. The retrofit cost is substantially higher than certifying the data before the build.
              - paragraph [ref=e582]: Atlan’s data catalog provides a governed inventory of every data asset — tables, pipelines, APIs — with certification status, lineage, and quality rules attached. Certification workflows produce schema snapshots with quality rule results, not just informal sign-offs. Column-level lineage surfaces every upstream dependency automatically, so you know exactly which tables carry schema-drift risk before the agent goes live. At Step 8, data quality contracts provide the expected schema that verification loops validate against. Every agent action against a governed asset is logged in audit trails, satisfying AI governance requirements without any additional instrumentation.
              - paragraph [ref=e583]: "Enterprise teams building agent harnesses against governed data see fewer production rollbacks, faster root-cause attribution when failures occur, and compliance-ready audit trails from day one. The pattern is consistent: harnesses that start with a certified data layer at Step 0 spend substantially less time debugging silent production failures at Week 8."
              - paragraph [ref=e584]:
                - text: "Related reading:"
                - link "data catalog as LLM knowledge base" [ref=e585] [cursor=pointer]:
