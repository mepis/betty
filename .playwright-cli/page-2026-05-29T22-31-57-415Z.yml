      - generic [ref=e144]:
        - generic [ref=e146]:
          - generic [ref=e147]:
            - 'heading "How to build an AI agent harness: 10-step overview" [level=2] [ref=e148]'
            - button "Copy summary to clipboard" [ref=e149] [cursor=pointer]:
              - img [ref=e150]
              - generic [ref=e152]: Copy summary
          - paragraph [ref=e153]: A production-ready agent harness requires 10 engineering steps across 4 to 12 weeks. Begin by certifying your data layer before writing any harness code. Build the core ReAct loop next, then layer in context configuration, permission tiers, context management, persistence, observability, guardrails, and finally evaluate the harness independently of the model. Most guides start at Step 1. The ones that succeed start at Step 0.
          - generic [ref=e154]:
            - heading "Steps to build an AI agent harness:" [level=3] [ref=e155]
            - list [ref=e156]:
              - listitem [ref=e157]:
                - img [ref=e159]
                - generic [ref=e161]: "Step 0: Certify your data layer — inventory sources, trace lineage, apply certification policies"
              - listitem [ref=e162]:
                - img [ref=e164]
                - generic [ref=e166]: "Step 1: Define scope and tool set — 4-5 atomic tools, one agent per bounded task"
              - listitem [ref=e167]:
                - img [ref=e169]
                - generic [ref=e171]: "Step 2: Build the core agent loop — ReAct loop with max-iteration ceiling and append-only history"
              - listitem [ref=e172]:
                - img [ref=e174]
                - generic [ref=e176]: "Step 3: Create your AGENTS.md configuration file — build/test commands, boundaries, certified data refs"
              - listitem [ref=e177]:
                - img [ref=e179]
                - generic [ref=e181]: "Step 4: Layer the system prompt — identity, tool schemas, dynamic context injection"
              - listitem [ref=e182]:
                - img [ref=e184]
                - generic [ref=e186]: "Step 5: Implement permission classification — safe, moderate, and dangerous tiers as middleware"
              - listitem [ref=e187]:
                - img [ref=e189]
                - generic [ref=e191]: "Step 6: Add context management — token counting, compaction at 85-92%, file overflow"
              - listitem [ref=e192]:
