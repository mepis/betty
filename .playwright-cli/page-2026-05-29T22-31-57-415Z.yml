              - heading "Wrap-up — From MVH to production" [level=2] [ref=e632]
              - paragraph [ref=e633]: The gap between a 20-line MVH and a production-ready harness is not model quality. It is 10 engineering steps and 4-12 weeks of infrastructure investment across context management, permission tiers, persistence, observability, guardrails, and data quality.
              - paragraph [ref=e634]: "Teams that reach production fastest share three patterns: they certify the data layer first, they build narrow tool sets, and they observe real failures before engineering solutions for hypothetical ones. Manus’s 6 months and 5 architectural rewrites is the cautionary benchmark. Stripe’s 1,300 PRs per week is the production benchmark."
              - paragraph [ref=e635]: "Measure harness success the way LangChain does: hold the model constant, vary the harness, and measure the delta. The harness is the variable you control. 52.8% to 66.5% without touching the model is not an outlier. It is what disciplined harness engineering produces."
              - link "Book a Demo" [ref=e637] [cursor=pointer]:
                - /url: https://atlan.com/forms/talk-to-us/
              - separator [ref=e638]
              - 'heading "The 10-step build: summary" [level=2] [ref=e639]'
              - list [ref=e640]:
                - listitem [ref=e641]: The gap between a 20-line MVP agent loop and a production-ready harness is 5,000-20,000 lines of infrastructure code across 10 engineering steps.
                - listitem [ref=e642]: Harness quality, not model quality, is the primary variable in agent reliability. LangChain demonstrated a 13.7-point Terminal Bench gain with zero model changes.
                - listitem [ref=e643]: Step 0 (data layer certification) is the step most build guides skip and most teams regret skipping. Uncertified tables cause confident wrong answers — no harness component can compensate.
                - listitem [ref=e644]: "The Stripe pattern holds: one agent, one bounded task, 4-5 atomic tools. Tool sprawl is the fastest way to degrade performance."
                - listitem [ref=e645]: Context management is not optional. An agent running tasks longer than 10 tool calls without compaction is running on borrowed time.
                - listitem [ref=e646]: Persistence is file-based, not memory-based. Any session state that lives only in memory is gone on crash.
                - listitem [ref=e647]: "Evaluate the harness independently of the model: freeze model version, vary one harness parameter at a time, measure delta. The harness is the variable you control."
                - listitem [ref=e648]: Manus spent 6 months and 5 architectural rewrites. Teams that certify data first, build narrow, and observe before engineering reach production in 4-12 weeks.
              - separator [ref=e649]
              - heading "FAQs about how to build AI agent harness" [level=2] [ref=e650]
              - paragraph [ref=e651]:
                - strong [ref=e652]: 1. What is a minimum viable harness (MVH) and when should I build one?
              - paragraph [ref=e653]: "A minimum viable harness is the smallest set of infrastructure that makes an agent runnable: a ReAct loop, a bounded tool set of 4-5 atomic tools, a max-iteration ceiling, and append-only message history. It takes 2-4 hours to build and produces roughly 20-50 lines of code. Build an MVH when you have validated a use case with a prototype and need to run it against real data for the first time. Do not add persistence, observability, or guardrails until you have run 50 real tasks on the MVH and observed where it breaks."
              - paragraph [ref=e654]:
                - strong [ref=e655]: 2. What is the difference between an agent framework and an agent harness?
              - paragraph [ref=e656]: "An agent framework (LangChain, LangGraph, CrewAI) provides pre-built components for orchestrating agent behavior: memory abstractions, tool registries, prompt templates, and execution patterns. An agent harness is the control infrastructure you build on top of or around a framework: permission tiers, context management, persistence, observability, guardrails, and data quality verification. Frameworks reduce the boilerplate of the agent loop. The harness makes that loop safe for production."
              - paragraph [ref=e657]:
                - strong [ref=e658]: 3. Why is Step 0 (data certification) the most important step no one talks about?
              - paragraph [ref=e659]: Most agent build guides focus on the model, the prompt, or the framework. They assume the data is fine. It rarely is. A language model processes whatever data it receives with equal confidence — it has no internal way to detect that a table has been redefined, a join is returning stale rows, or lineage is broken. The result is confident wrong answers that trace back to the data layer, not the model. Step 0 exists to certify the substrate before any harness code is written. Teams that skip it typically rebuild within 3 months after silent production failures surface.
              - paragraph [ref=e660]:
                - strong [ref=e661]: 4. How many tools should an AI agent harness have?
              - paragraph [ref=e662]: Start with 4-5 atomic tools. Each tool should do exactly one thing. Research from Vercel shows that removing 80% of tools from the harness improved agent performance. More than 20 tools visible in the system prompt degrades model performance regardless of harness quality. If a task requires more than 5 tools, it is likely two tasks handled by two agents. Add tools only after observing real failures that require them.
              - paragraph [ref=e663]:
                - strong [ref=e664]: 5. What is the ReAct loop and why does it matter for harness engineering?
              - paragraph [ref=e665]: "ReAct (Reason + Act) is the fundamental execution pattern for agent loops: the model reasons about the current state, calls a tool, receives the result, and reasons again. The loop repeats until the model signals a final answer or the iteration ceiling is hit. The harness adds: iteration ceilings (preventing runaway loops), permission checks (intercepting tool calls before execution), context management (keeping the message history from exhausting the window), persistence (checkpointing state between iterations), and observability (logging every step). Without the harness, the ReAct loop is 20 lines that works in demos and fails in production."
              - paragraph [ref=e666]:
                - strong [ref=e667]: 6. How do I prevent context exhaustion in a long-running agent?
              - paragraph [ref=e668]: Token count every message using tiktoken or the provider’s tokenizer, and track a running total. Set a compaction threshold at 85-92% of the context window. When the threshold is crossed, summarize the oldest messages (do not delete them), and always preserve tool call and result pairs in full. For outputs exceeding 80,000 characters, write to a named overflow file rather than appending to the message history. Target more than 80% KV-cache hit rate by keeping the static system prompt consistent across turns.
              - paragraph [ref=e669]:
                - strong [ref=e670]: 7. How long does it take to build a production-ready AI agent harness?
              - paragraph [ref=e671]: "A minimum viable harness (Steps 1-2) takes 2-4 hours. Adding context management and permission tiers (Steps 3-5) takes Days 2-5. Persistence and observability (Steps 6-8) take Days 5-20. Guardrails and evaluation (Steps 9-10) take Week 4 and beyond. Total time to a production-ready harness: 4-12 weeks depending on the complexity of the task domain, the number of data sources requiring certification (Step 0), and the strictness of the governance requirements."
              - paragraph [ref=e672]:
                - strong [ref=e673]: 8. How do I know if my agent failures are harness failures vs. model failures?
              - paragraph [ref=e674]: Freeze the model version. Pin the exact model ID and temperature, and do not change them. Build a benchmark task set of 20-50 representative tasks with human-validated expected outputs. Vary one harness parameter at a time (context compaction threshold, system prompt length, tool set size, verification strictness) and score each configuration. The delta between configurations is pure harness signal. If performance improves when you change the harness, the failure was a harness failure. If performance does not improve after exhausting harness variables, then investigate the model. Most teams get this backwards and switch models before checking the harness.
