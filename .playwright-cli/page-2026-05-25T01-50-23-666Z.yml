              - heading "Key strategies for reliable results" [level=4] [ref=e1637]
              - list [ref=e1638]:
                - listitem [ref=e1639]:
                  - paragraph [ref=e1640]:
                    - strong [ref=e1641]: "Align all three levers:"
                    - text: For maximum predictability, ensure your Style Prompt, Text Content, and any Markup Tags are all semantically consistent and working toward the same goal.
                - listitem [ref=e1642]:
                  - paragraph [ref=e1643]:
                    - strong [ref=e1644]: "Use emotionally rich text:"
                    - text: Don't rely on prompts and tags alone. Give the model rich, descriptive text to work with. This is especially critical for nuanced emotions like sarcasm, fear, or excitement.
                - listitem [ref=e1645]:
                  - paragraph [ref=e1646]:
                    - strong [ref=e1647]: "Write specific, detailed prompts:"
                    - text: The more specific your style prompt, the more reliable the result. "React with an amused laugh" is better than just
                    - code [ref=e1648]: "[laughing]"
                    - text: . "Speak like a 1940s radio news announcer" is better than "Speak in an old-fashioned way."
                - listitem [ref=e1649]:
                  - paragraph [ref=e1650]:
                    - strong [ref=e1651]: "Test and verify new tags:"
                    - text: The behavior of a new or untested tag is not always predictable. A tag you assume is a style modifier might be vocalized. Always test a new tag or prompt combination to confirm its behavior before deploying to production.
              - heading "Safety check settings" [level=2] [ref=e1652]
              - paragraph [ref=e1653]:
                - text: While some safety checks cannot be disabled, you can adjust the thresholds for certain harm categories to further enhance safety and minimize misuse. This can be optionally enabled by setting safety filters under
                - link "AdvancedVoiceOptions" [ref=e1654] [cursor=pointer]:
                  - /url: /python/docs/reference/texttospeech/latest/google.cloud.texttospeech_v1.types.AdvancedVoiceOptions
                - text: .
