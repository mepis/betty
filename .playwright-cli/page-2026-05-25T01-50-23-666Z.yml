              - heading "Perform streaming single-speaker synthesis" [level=3] [ref=e1382]
              - paragraph [ref=e1383]: In Vertex AI API, unidirectional streaming is supported, that is, the client sends a single request and receives a stream of responses.
              - paragraph [ref=e1384]: This code sample demonstrates how to perform streaming single-speaker synthesis.
              - generic [ref=e1386]:
