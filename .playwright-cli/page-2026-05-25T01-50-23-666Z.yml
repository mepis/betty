                - tabpanel "Python" [ref=e1418]:
                  - code [ref=e1421]: "from google import genai from google.genai import types import wave import os import datetime PROJECT_ID = os.getenv(\"GOOGLE_CLOUD_PROJECT\") LOCATION = os.environ.get(\"GOOGLE_CLOUD_REGION\", \"global\") prompt = \"\"\"TTS the following conversation between Joe and Jane: Joe: How's it going today Jane? Jane: Not too bad! Honestly, I'm just blown away by this new Gemini Text-to-Speech model. Joe: Right?! This is a total game changer! And do you know what I just discovered? Jane: What? Joe: You can use the multi-speaker configuration to create a conversation, just like us! Jane: Just like us!\"\"\" # Set up the wave file to save the output: def wave_file(filename, pcm, channels=1, rate=24000, sample_width=2): with wave.open(filename, \"wb\") as wf: wf.setnchannels(channels) wf.setsampwidth(sample_width) wf.setframerate(rate) wf.writeframes(pcm) def synthesize(text: str, model: str, voice: str, locale: str): \"\"\"Synthesizes speech from the input text. Args: text: Text to synthesize. Note that The synthesis will start when the client initiates half-close. model: gemini tts model name. Available models are: gemini-3.1-flash-tts-preview, gemini-2.5-flash-tts, gemini-2.5-flash-lite-preview-tts, and gemini-2.5-pro-tts. voice: voice name. Example: leda, kore. Refer to available voices. locale: locale name. Example: en-us. Refer to available locales. \"\"\" client = genai.Client(vertexai=True, project=PROJECT_ID, location=LOCATION) generate_content_config=types.GenerateContentConfig( speech_config=types.SpeechConfig( language_code=\"en-in\", multi_speaker_voice_config=types.MultiSpeakerVoiceConfig( speaker_voice_configs=[ types.SpeakerVoiceConfig( speaker='Joe', voice_config=types.VoiceConfig( prebuilt_voice_config=types.PrebuiltVoiceConfig( voice_name='Kore', ) ) ), types.SpeakerVoiceConfig( speaker='Jane', voice_config=types.VoiceConfig( prebuilt_voice_config=types.PrebuiltVoiceConfig( voice_name='Puck', ) ) ), ] ) ), temperature=2.0, ) request_start_time = datetime.datetime.now() is_first_chunk_received = False final_audio_data = bytes() num_chunks_received = 0 for chunk in client.models.generate_content_stream( model=model, contents=text, config=generate_content_config, ): # just a simple progress indicator num_chunks_received += 1 print(\".\", end=\"\") if num_chunks_received % 40 == 0: print(\"\") # measuring time to first audio if not is_first_chunk_received: is_first_chunk_received = True first_chunk_received_time = datetime.datetime.now() if ( chunk.candidates is None or not chunk.candidates or chunk.candidates[0].content is None or not chunk.candidates[0].content.parts ): continue part = chunk.candidates[0].content.parts[0] if part.inline_data and part.inline_data.data: # accumulating audio. In a web-server scenario, you would want to # \"emit\" audio to the frontend as soon as it arrives. # # For example using flask socketio, you could do the following # from flask_socketio import SocketIO, emit # emit(\"audio\", chunk.candidates[0].content.parts[0].inline_data.data) # socketio.sleep(0) final_audio_data += chunk.candidates[0].content.parts[0].inline_data.data time_to_first_audio = first_chunk_received_time - request_start_time time_to_completion = datetime.datetime.now() - request_start_time print(\"\\n\") print(f\"Time to first audio: {time_to_first_audio.total_seconds()} seconds\") print(f\"Time to completion: {time_to_completion.total_seconds()} seconds\") return final_audio_data audio_data = synthesize( prompt, \"gemini-3.1-flash-tts-preview\", \"Kore\", \"en-in\") file_name='output_speech.wav' wave_file(file_name, audio_data) Audio(\"output_speech.wav\")"
