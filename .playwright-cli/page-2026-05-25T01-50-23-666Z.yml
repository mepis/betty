              - heading "Prompting tips" [level=2] [ref=e1473]
              - paragraph [ref=e1474]: Creating engaging and natural-sounding audio from text requires understanding the nuances of spoken language and translating them into script form. The following tips will help you craft scripts that sound authentic and capture the chosen tone.
              - heading "The three levers of speech control" [level=3] [ref=e1475]
              - paragraph [ref=e1476]: For the most predictable and nuanced results, ensure all three of the following components are consistent with your desired output.
              - paragraph [ref=e1477]:
                - strong [ref=e1478]: Style Prompt
                - text: The primary driver of the overall emotional tone and delivery. The prompt sets the context for the entire speech segment.
              - list [ref=e1479]:
                - listitem [ref=e1480]:
                  - paragraph [ref=e1481]:
                    - text: "Example:"
                    - code [ref=e1482]: You are an AI assistant speaking in a friendly and helpful tone.
                - listitem [ref=e1483]:
                  - paragraph [ref=e1484]:
                    - text: "Example:"
                    - code [ref=e1485]: Narrate this in the calm, authoritative tone of a nature documentary narrator.
              - paragraph [ref=e1486]:
                - strong [ref=e1487]: Text Content
                - text: The semantic meaning of the words you are synthesizing. An evocative phrase that is emotionally consistent with the style prompt will produce much more reliable results than neutral text.
              - list [ref=e1488]:
                - listitem [ref=e1489]:
                  - paragraph [ref=e1490]:
                    - text: "Good: A prompt for a scared tone works best with text like"
                    - code [ref=e1491]: I think someone is in the house.
                - listitem [ref=e1492]:
                  - paragraph [ref=e1493]:
                    - text: "Less Effective: A prompt for a scared tone with text like"
                    - code [ref=e1494]: The meeting is at 4 PM.
                    - text: will produce ambiguous results.
              - paragraph [ref=e1495]:
                - strong [ref=e1496]: Markup Tags (Preview)
                - text: Bracketed tags like
                - code [ref=e1497]: "[sigh]"
                - text: are best used for injecting a specific, localized action or style modification, not for setting the overall tone. They work in concert with the style prompt and text content.
              - heading "Markup tag guide" [level=3] [ref=e1498]
              - complementary [ref=e1499]:
                - paragraph [ref=e1500]:
                  - strong [ref=e1501]: Preview
                - paragraph [ref=e1502]:
                  - text: This product or feature is subject to the "Pre-GA Offerings Terms" in the General Service Terms section of the
                  - link "Service Specific Terms" [ref=e1503] [cursor=pointer]:
                    - /url: /terms/service-terms#1
                  - text: . Pre-GA products and features are available "as is" and might have limited support. For more information, see the
                  - link "launch stage descriptions" [ref=e1504] [cursor=pointer]:
                    - /url: https://cloud.google.com/products/#product-launch-stages
                  - text: .
              - paragraph [ref=e1505]: Our research shows that bracketed markup tags operate in one of three distinct modes. Understanding a tag's mode is key to using it effectively.
              - 'heading "Mode 1: Non-speech sounds" [level=4] [ref=e1506]'
              - paragraph [ref=e1507]: The markup is replaced by an audible, non-speech vocalization (e.g., a sigh, a laugh). The tag itself is not spoken. These are excellent for adding realistic, human-like hesitations and reactions.
              - table [ref=e1509]:
                - rowgroup [ref=e1510]:
                  - row "Tag Behavior Reliability Guidance" [ref=e1511]:
                    - columnheader "Tag" [ref=e1512]
                    - columnheader "Behavior" [ref=e1513]
                    - columnheader "Reliability" [ref=e1514]
                    - columnheader "Guidance" [ref=e1515]
                - rowgroup [ref=e1516]:
                  - row "[sigh] Inserts a sigh sound. High The emotional quality of the sigh is influenced by the prompt." [ref=e1517]:
                    - cell "[sigh]" [ref=e1518]:
                      - code [ref=e1519]: "[sigh]"
                    - cell "Inserts a sigh sound." [ref=e1520]
                    - cell "High" [ref=e1521]
                    - cell "The emotional quality of the sigh is influenced by the prompt." [ref=e1522]
                  - row "[laughing] Inserts a laugh. High For best results, use a specific prompt. e.g., a generic prompt may yield a laugh of shock, while \"react with an amused laugh\" creates a laugh of amusement." [ref=e1523]:
                    - cell "[laughing]" [ref=e1524]:
                      - code [ref=e1525]: "[laughing]"
                    - cell "Inserts a laugh." [ref=e1526]
                    - cell "High" [ref=e1527]
                    - cell "For best results, use a specific prompt. e.g., a generic prompt may yield a laugh of shock, while \"react with an amused laugh\" creates a laugh of amusement." [ref=e1528]
                  - row "[uhm] Inserts a hesitation sound. High Useful for creating a more natural, conversational feel." [ref=e1529]:
                    - cell "[uhm]" [ref=e1530]:
