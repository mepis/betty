                - tabpanel "Python" [ref=e1405]:
                  - code [ref=e1408]: "from google import genai from google.genai import types import wave import os import datetime PROJECT_ID = os.getenv(\"GOOGLE_CLOUD_PROJECT\") LOCATION = os.environ.get(\"GOOGLE_CLOUD_REGION\", \"global\") prompt = \"\"\"TTS the following conversation between Joe and Jane: Joe: How's it going today Jane? Jane: Not too bad, how about you?\"\"\" # Set up the wave file to save the output: def wave_file(filename, pcm, channels=1, rate=24000, sample_width=2): with wave.open(filename, \"wb\") as wf: wf.setnchannels(channels) wf.setsampwidth(sample_width) wf.setframerate(rate) wf.writeframes(pcm) client = genai.Client(vertexai=True, project=PROJECT_ID, location=LOCATION) response = client.models.generate_content( model=\"gemini-3.1-flash-tts-preview\", contents=prompt, config=types.GenerateContentConfig( speech_config=types.SpeechConfig( language_code=\"en-in\", multi_speaker_voice_config=types.MultiSpeakerVoiceConfig( speaker_voice_configs=[ types.SpeakerVoiceConfig( speaker='Joe', voice_config=types.VoiceConfig( prebuilt_voice_config=types.PrebuiltVoiceConfig( voice_name='Kore', ) ) ), types.SpeakerVoiceConfig( speaker='Jane', voice_config=types.VoiceConfig( prebuilt_voice_config=types.PrebuiltVoiceConfig( voice_name='Puck', ) ) ), ] ) ), temperature=2.0, ) ) data = response.candidates[0].content.parts[0].inline_data.data file_name='output_speech.wav' wave_file(file_name, data) # Saves the file to current directory Audio(\"output_speech.wav\")"
