              - heading "Choose the right API" [level=2] [ref=e1082]
              - paragraph [ref=e1083]:
                - text: Discover how to use Gemini-TTS models to synthesize single-speaker and multi-speaker speech using Cloud Text-to-Speech API or
                - link "Vertex AI API" [ref=e1084] [cursor=pointer]:
                  - /url: /vertex-ai/generative-ai/docs/sdks/overview
                - text: .
              - paragraph [ref=e1085]: Gemini-TTS is available through two APIs to help simplify the integration process for clients. Cloud Text-to-Speech API and Vertex AI API, with REST endpoints and SDKs in multiple programming languages.
              - paragraph [ref=e1086]: Here are some guidelines to help you choose the right API.
              - paragraph [ref=e1087]: "If the following applies, choose Cloud Text-to-Speech API:"
              - list [ref=e1088]:
                - listitem [ref=e1089]: If you are using Chirp 3 HD or other voices, then you can continue to use the same Cloud Text-to-Speech API with minimal incremental updates.
                - listitem [ref=e1090]: If you need specific output encoding types, Cloud Text-to-Speech API can specify audio encoding. In Vertex AI API, the output is PCM 16bit 24k audio data, and doesn't have WAV headers. If you want to convert to another audio format, then the conversion needs to be handled from the client side.
                - listitem [ref=e1091]: If you must stream text in multiple chunks, Cloud Text-to-Speech API supports multiple requests and multiple responses interaction. In contrast, Vertex AI API supports single request and multiple responses.
              - paragraph [ref=e1092]: "If the following applies, choose Vertex AI API:"
              - list [ref=e1093]:
                - listitem [ref=e1094]: If you are already using Gemini-TTS from AI Studio, you can switch to Vertex AI seamlessly to take advantage of the scalability and compliance of Google Cloud.
                - listitem [ref=e1095]: If you are using Vertex AI API for other models, then the unified api structure makes it easier to start using Gemini-TTS by specifying the model name and voice selection options.
                - listitem [ref=e1096]:
                  - text: If you want to set the
                  - code [ref=e1097]: temperature
                  - text: for your synthesis. This parameter controls the randomness of the output. A higher temperature results in more creative and diverse responses, while a lower temperature makes the output more predictable and focused. The valid range is (0.0, 2.0].
              - heading "Use Cloud Text-to-Speech API" [level=2] [ref=e1098]
              - complementary [ref=e1099]:
                - strong [ref=e1100]: "Note:"
                - text: The size of the text field and the prompt field individually can be at most 4,000 bytes. While the total size of the prompt and text fields can be up to 8,000 bytes, each field must be a maximum of 4000 bytes. The output audio can at most be around 655 seconds. If the input text amounts to audio longer than this limit, the audio will be truncated.
              - paragraph [ref=e1101]: Optionally specify audio formats and sampling rates in "audioConfig" field if non-default options are needed.
              - table [ref=e1103]:
                - rowgroup [ref=e1104]:
                  - row "Description Limit Type" [ref=e1105]:
                    - columnheader "Description" [ref=e1106]
                    - columnheader "Limit" [ref=e1107]
                    - columnheader "Type" [ref=e1108]
                - rowgroup [ref=e1109]:
                  - row "Text field Less than or equal to 4,000 bytes. Input" [ref=e1110]:
                    - cell "Text field" [ref=e1111]
                    - cell "Less than or equal to 4,000 bytes." [ref=e1112]
                    - cell "Input" [ref=e1113]
                  - row "Prompt field Less than or equal to 4,000 bytes. Input" [ref=e1114]:
                    - cell "Prompt field" [ref=e1115]
                    - cell "Less than or equal to 4,000 bytes." [ref=e1116]
                    - cell "Input" [ref=e1117]
                  - row "Text and prompt fields Less than or equal to 8,000 bytes. Input" [ref=e1118]:
                    - cell "Text and prompt fields" [ref=e1119]
                    - cell "Less than or equal to 8,000 bytes." [ref=e1120]
                    - cell "Input" [ref=e1121]
                  - row "Duration for the output audio Approximately 655 seconds. If the input text results in the audio exceeding 655 seconds, the audio is truncated. Output" [ref=e1122]:
                    - cell "Duration for the output audio" [ref=e1123]
                    - cell "Approximately 655 seconds. If the input text results in the audio exceeding 655 seconds, the audio is truncated." [ref=e1124]
                    - cell "Output" [ref=e1125]
              - complementary [ref=e1126]:
                - strong [ref=e1127]: "Note:"
                - generic [ref=e1128]:
                  - text: To be able to use Gemini-TTS,
                  - code [ref=e1129]: aiplatform.endpoints.predict
                  - text: permission is required for the model endpoint. This permission can be granted with the
                  - link "roles/aiplatform.user role" [ref=e1130] [cursor=pointer]:
                    - /url: /vertex-ai/docs/general/access-control#aiplatform.user
                  - text: .
              - heading "Before you begin" [level=3] [ref=e1131]
              - paragraph [ref=e1132]: "Before you can begin using Cloud Text-to-Speech, you must enable the API in the Google Cloud console by following steps:"
              - list [ref=e1133]:
                - listitem [ref=e1134]: Enable Cloud Text-to-Speech on a project.
                - listitem [ref=e1135]: Make sure billing is enabled for Cloud Text-to-Speech.
                - listitem [ref=e1136]: Set up authentication for your development environment.
                - listitem [ref=e1137]:
                  - text: Assign
