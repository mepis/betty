- generic [ref=e2]: "{\"query\": \"CVE-2026-27940 llama.cpp gguf buffer overflow security advisory\", \"number_of_results\": 0, \"results\": [{\"url\": \"https://www.sentinelone.com/vulnerability-database/cve-2026-27940/\", \"title\": \"CVE-2026-27940: llama.cpp Buffer Overflow Vulnerability - SentinelOne\", \"content\": \"CVE-2026-27940 Overview CVE-2026-27940 is an Integer Overflow vulnerability in llama.cpp, the popular open-source C/C++ implementation for LLM (Large Language Model) inference. The vulnerability exists in the gguf_init_from_file_impl () function within gguf.cpp, where an integer overflow leads to an undersized heap allocation.\", \"publishedDate\": null, \"engine\": \"startpage\", \"template\": \"default.html\", \"parsed_url\": [\"https\", \"www.sentinelone.com\", \"/vulnerability-database/cve-2026-27940/\", \"\", \"\", \"\"], \"img_src\": \"\", \"thumbnail\": \"\", \"priority\": \"\", \"engines\": [\"duckduckgo\", \"startpage\"], \"positions\": [1, 1], \"score\": 4.0, \"category\": \"general\"}, {\"url\": \"https://nvd.nist.gov/vuln/detail/CVE-2026-27940\", \"title\": \"CVE-2026-27940 - NVD\", \"content\": \"Mar 12, 2026 ... https://github.com/ggml-org/llama.cpp/security/advisories/GHSA-3p4r-fq3f-q74v ... Heap-based Buffer Overflow, GitHub, Inc. CWE-190, Integer\\u00a0...\", \"publishedDate\": null, \"engine\": \"startpage\", \"template\": \"default.html\", \"parsed_url\": [\"https\", \"nvd.nist.gov\", \"/vuln/detail/CVE-2026-27940\", \"\", \"\", \"\"], \"img_src\": \"\", \"thumbnail\": \"\", \"priority\": \"\", \"engines\": [\"startpage\"], \"positions\": [2], \"score\": 0.5, \"category\": \"general\"}, {\"template\": \"default.html\", \"title\": \"Buffer Overflow in llama.cpp via Malicious GGUF Model - GitHub\", \"content\": \"A malicious GGUF model file containing a vocabulary entry whose token_text.size() exceeds INT32_MAX. As soon as llama.cpp attempts any \\\"token \\u2192 string\\\" conversion (e.g., during model load, detokenization, gram