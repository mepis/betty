                - paragraph [ref=e810]:
                  - text: With
                  - code [ref=e811]: predicted_per_second
                  - text: as the per-request decode rate reported by llama-server and every tested config returning
                  - strong [ref=e812]: 100 % acceptance
                  - text: ", the classical intuition \"high acceptance → high speedup\" fails here. This is not a measurement artifact; it is MoE expert-loading overhead on every drafted token."
                - generic [ref=e813]:
                  - heading "Why — in one paragraph" [level=2] [ref=e814]
                  - 'link "Permalink: Why — in one paragraph" [ref=e815] [cursor=pointer]':
                    - /url: "#why--in-one-paragraph"
                    - img [ref=e816]
                - paragraph [ref=e818]:
                  - text: Qwen3.6-35B-A3B routes 8-of-256 experts per token (sparsity ρ ≈ 0.031). Per
                  - link "MoESD" [ref=e819] [cursor=pointer]:
                    - /url: https://arxiv.org/html/2505.19645
                  - text: the batch size needed to saturate the expert set is
                  - code [ref=e820]: "T_thres = log_{1-ρ}(1 - 0.95) ≈ 94"
                  - text: . For any
                  - code [ref=e821]: K
                  - text: draft tokens below that, each drafted token has high probability of pulling a fresh expert slice into compute, and the verification forward pass ends up loading the
                  - emphasis [ref=e822]: union
                  - text: of those per-token expert sets. At single-stream batch=1, K (1–32) ≪ T_thres, so this expert-union overhead is paid in full with no amortization vs autoregressive — exceeding the savings from skipping per-token forward passes, even at 100 % acceptance.
                - paragraph [ref=e823]:
                  - strong [ref=e824]: "Scope correction (2026-04-26):"
                  - text: earlier versions of this paragraph claimed the mechanism is "engine-independent" / "hardware-class-independent" because the same negative direction was seen across 3090 (llama.cpp draft) and A100 NVLink (vLLM MTP, prefix-cache-ON) and Hopper H20-3e (
                  - 'link "vllm #38182" [ref=e825] [cursor=pointer]':
                    - /url: https://github.com/vllm-project/vllm/issues/38182
                  - text: ). The v3 vLLM clean A/B retest with prefix-cache OFF on the same 3090 hardware (
                  - link "sibling repo" [ref=e826] [cursor=pointer]:
                    - /url: https://github.com/thc1006/qwen3.6-vllm-2x3090
                  - text: ) flipped vLLM MTP k=1 to
                  - strong [ref=e827]: +27.5 %
                  - text: ", so the engine-independence claim was wrong. The expert-saturation argument"
                  - strong [ref=e828]: does
                  - text: still explain why
                  - strong [ref=e829]: llama.cpp's draft-then-verify path
                  - text: "loses on consumer Ampere (the verify pass loads the union of K positions' expert sets at draft K=1–32 ≪ T_thres). What's different about vLLM MTP k=1 is the structurally smaller K (k=1 vs llama.cpp drafts of 5–64) and the lighter-weight verify path that reuses the target's hidden states without a separate draft-model forward pass. So: the mechanism is real and real-world relevant for"
                  - strong [ref=e830]: draft-model spec-decode
                  - text: ", but does not generalize to all spec-decode methods. Mixtral measurements in"
                  - link "arXiv 2506.20675" [ref=e831] [cursor=pointer]:
                    - /url: https://arxiv.org/pdf/2506.20675
                  - text: match the draft-spec direction.
                - paragraph [ref=e832]:
                  - text: "Counter-example: the same"
                  - code [ref=e833]: ngram-mod
                  - text: machinery in
                  - 'link "PR #20075" [ref=e834] [cursor=pointer]':
                    - /url: https://github.com/ggml-org/llama.cpp/pull/20075
                  - text: shows Qwen3.5-
                  - strong [ref=e835]: 122B-A10B
                  - text: (10 B active) gaining roughly
                  - strong [ref=e836]: +15–45 %
                  - text: on Apple M3 Max (PR author's bench, 0.8 B draft, acceptance 63–89 %), and
                  - strong [ref=e837]: +31 %
                  - text: to
                  - strong [ref=e838]: +119 %
                  - text: on AMD Strix Halo gfx1151 with the REAP-pruned variant (
                  - link "@0xSero" [ref=e839] [cursor=pointer]:
                    - /url: https://github.com/0xSero
                  - text: "'s comment in the same PR). A10B has a 3.3× larger active footprint and a correspondingly lower"
                  - code [ref=e840]: T_thres
                  - text: ", which is why it gains where A3B loses on consumer GPUs."
