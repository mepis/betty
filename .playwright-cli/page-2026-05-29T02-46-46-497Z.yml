          - generic [ref=e161]:
            - paragraph [ref=e162]: Qwen3.6 continues the strong trend of highly capable open models, and the 35B-A3B MoE variant hits a sweet spot for consumer hardware. With a low active parameter count per token, it runs fast while still retaining the "smart" feel of larger reasoning models, and includes multimodal capabilities out of the box.
            - paragraph [ref=e163]: This post covers my setup running Qwen3.6-35B-A3B on 12GB VRAM using mainline llama.cpp, with real-world throughput numbers for text and vision.
            - heading "TL;DR" [level=2] [ref=e164]
            - list [ref=e165]:
              - listitem [ref=e166]:
                - strong [ref=e167]: Model
                - text: ":"
                - code [ref=e168]: unsloth/Qwen3.6-35B-A3B-GGUF
                - text: (
                - code [ref=e169]: UD-Q5_K_XL
                - text: ) +
                - code [ref=e170]: mmproj-F16.gguf
                - text: .
              - listitem [ref=e171]:
                - strong [ref=e172]: Stack
                - text: ": mainline"
                - code [ref=e173]: llama.cpp
                - text: (rebuilt from upstream).
              - listitem [ref=e174]:
                - strong [ref=e175]: Best synthetic bench (fit)
                - text: ":"
                - code [ref=e176]: pp512=970.77
                - text: ","
                - code [ref=e177]: tg128=52.33
                - text: (fit winner).
              - listitem [ref=e178]:
                - strong [ref=e179]: Vision-safe defaults (12 GB class GPUs)
                - text: ":"
                - code [ref=e180]: FIT_TARGET=2048
                - text: ","
                - code [ref=e181]: BATCH_SIZE=256
                - text: ","
                - code [ref=e182]: GGML_CUDA_GRAPH_OPT=0
                - text: .
            - heading "End-to-end setup" [level=2] [ref=e183]
            - heading "1) Build mainline llama.cpp" [level=3] [ref=e184]
            - paragraph [ref=e185]: Clone and build from upstream. You need the CUDA toolkit installed.
            - generic [ref=e186]:
              - code [ref=e187]: "git clone https://github.com/ggerganov/llama.cpp cd llama.cpp mkdir build && cd build cmake .. \\ -DCMAKE_BUILD_TYPE=Release \\ -DGGML_CUDA=ON \\ -DLLAMA_CURL=ON \\ -DGGML_NATIVE=ON \\ -DGGML_LTO=ON \\ -DGGML_CUDA_GRAPHS=ON \\ -DGGML_CUDA_F16=ON \\ -DGGML_CUDA_FA_ALL_QUANTS=ON \\ -DCMAKE_CUDA_ARCHITECTURES=89 # change to match your GPU cmake --build . --config Release \\ --target llama-server llama-bench --parallel"
              - button "Copy code" [ref=e188] [cursor=pointer]:
                - img [ref=e189]
            - heading "2) Download model + mmproj" [level=3] [ref=e192]
            - paragraph [ref=e193]:
              - text: Use
              - code [ref=e194]: huggingface-cli
              - text: (from
              - code [ref=e195]: pip install huggingface_hub
              - text: "):"
            - generic [ref=e196]:
              - code [ref=e197]: huggingface-cli download unsloth/Qwen3.6-35B-A3B-GGUF \ --include '*UD-Q5_K_XL*' '*mmproj-F16*' \ --local-dir ~/models/unsloth/Qwen3.6-35B-A3B-GGUF
              - button "Copy code" [ref=e198] [cursor=pointer]:
                - img [ref=e199]
            - heading "3) Run text server" [level=3] [ref=e202]
            - generic [ref=e203]:
              - code [ref=e204]: llama-server \ -m ~/models/unsloth/Qwen3.6-35B-A3B-GGUF/Qwen3.6-35B-A3B-UD-Q5_K_XL.gguf \ --alias "unsloth/Qwen3.6-35B-A3B" \ --host 0.0.0.0 --port 8001 \ --ctx-size 65536 \ --fit on --fit-ctx 65536 --fit-target 512 \ --temp 0.6 --top-p 0.95 --top-k 20 --min-p 0.0 \ --repeat-penalty 1.0 \ -ctk q8_0 -ctv q8_0 \ --flash-attn on \ --batch-size 1024 --ubatch-size 512 \ --threads 10 --threads-batch 12 \ --no-mmap --mlock \ --parallel 1 --prio 2 --no-warmup --jinja
              - button "Copy code" [ref=e205] [cursor=pointer]:
                - img [ref=e206]
            - heading "4) Run vision server" [level=3] [ref=e209]
            - generic [ref=e210]:
              - code [ref=e211]: llama-server \ -m ~/models/unsloth/Qwen3.6-35B-A3B-GGUF/Qwen3.6-35B-A3B-UD-Q5_K_XL.gguf \ --mmproj ~/models/unsloth/Qwen3.6-35B-A3B-GGUF/mmproj-F16.gguf \ --alias "unsloth/Qwen3.6-35B-A3B-vision" \ --host 0.0.0.0 --port 8001 \ --ctx-size 65536 \ --fit on --fit-ctx 65536 --fit-target 2048 \ --temp 0.6 --top-p 0.95 --top-k 20 --min-p 0.0 \ --repeat-penalty 1.0 \ -ctk q8_0 -ctv q8_0 \ --flash-attn on \ --batch-size 256 --ubatch-size 512 \ --threads 10 --threads-batch 12 \ --no-mmap --mlock \ --parallel 1 --prio 2 --no-warmup --jinja
              - button "Copy code" [ref=e212] [cursor=pointer]:
                - img [ref=e213]
            - paragraph [ref=e216]:
              - text: "Key differences for vision: the mmproj is included,"
              - code [ref=e217]: FIT_TARGET=2048
              - text: leaves more VRAM headroom, and batch size is reduced to 256 to avoid assertion errors when processing large images.
            - complementary [ref=e218]:
              - paragraph [ref=e219]: Easier path
              - paragraph [ref=e221]:
                - link "carteakey/l3ms" [ref=e222] [cursor=pointer]:
                  - /url: https://github.com/carteakey/l3ms
                - text: wraps all of the above as pre-configured shell scripts (
                - code [ref=e223]: bench-models/run-llama-cpp-qwen3-6-35b-a3b.sh
                - text: ","
                - code [ref=e224]: bench-models/run-llama-cpp-qwen3-6-35b-a3b-vision.sh
                - text: ) along with a build helper, a model downloader, and bench scripts. Everything is editable text, not a UI form.
