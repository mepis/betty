      - main [ref=e141]:
        - generic [ref=e143]:
          - heading "Policies" [level=1] [ref=e144]
          - paragraph [ref=e145]: Control which configured resources OpenCode may use.
        - generic [ref=e147]:
          - generic [ref=e148]:
            - paragraph [ref=e149]:
              - text: Policies control whether OpenCode may perform an action on a named resource. This feature is experimental and is configured with the
              - code [ref=e150]: "`experimental.policies`"
              - text: array in
              - code [ref=e151]: "`opencode.json`"
              - text: .
            - paragraph [ref=e152]:
              - text: Policies are separate from
              - link "permissions" [ref=e153] [cursor=pointer]:
                - /url: /docs/permissions
              - text: . Permissions control what tools can do during a session, while policies control whether OpenCode may use a resource such as an LLM provider.
            - separator [ref=e154]
            - heading "Configuration" [level=2] [ref=e155]:
              - link "Configuration" [ref=e156]:
                - /url: "#configuration"
            - paragraph [ref=e157]: "Each policy statement has three fields:"
            - list [ref=e158]:
              - listitem [ref=e159]:
                - code [ref=e160]: "`effect`"
                - text: "- Either"
                - code [ref=e161]: "`\"allow\"`"
                - text: or
                - code [ref=e162]: "`\"deny\"`"
                - text: .
              - listitem [ref=e163]:
                - code [ref=e164]: "`action`"
                - text: "- The operation being controlled."
              - listitem [ref=e165]:
                - code [ref=e166]: "`resource`"
                - text: "- The resource ID or wildcard pattern the statement applies to."
            - paragraph [ref=e167]:
              - text: For example, deny use of the
              - code [ref=e168]: "`openai`"
              - text: "provider:"
            - figure "opencode.json" [ref=e170]:
              - generic [ref=e172]: opencode.json
              - code [ref=e174]:
                - generic [ref=e176]: "{"
                - generic [ref=e178]: "\"$schema\": \"https://opencode.ai/config.json\","
                - generic [ref=e180]: "\"experimental\": {"
                - generic [ref=e182]: "\"policies\": ["
                - generic [ref=e184]: "{"
                - generic [ref=e187]: "\"effect\": \"deny\","
                - generic [ref=e189]: "\"action\": \"provider.use\","
                - generic [ref=e191]: "\"resource\": \"openai\""
                - generic [ref=e193]: "}"
                - generic [ref=e196]: "]"
                - generic [ref=e199]: "}"
                - generic [ref=e202]: "}"
              - button "Copy to clipboard" [ref=e204] [cursor=pointer]
            - paragraph [ref=e206]: A provider denied by policy is not available for model selection or model use, even if it has credentials or is otherwise configured correctly.
            - separator [ref=e207]
            - heading "Available Policies" [level=2] [ref=e208]:
              - link "Available Policies" [ref=e209]:
                - /url: "#available-policies"
            - paragraph [ref=e210]: "OpenCode currently supports one policy action:"
            - table [ref=e211]:
              - rowgroup [ref=e212]:
                - row "Action Resource Description" [ref=e213]:
                  - columnheader "Action" [ref=e214]
                  - columnheader "Resource" [ref=e215]
