              - text: .
            - separator [ref=e272]
            - heading "Rule Order" [level=2] [ref=e273]:
              - link "Rule Order" [ref=e274]:
                - /url: "#rule-order"
            - paragraph [ref=e275]: When multiple statements match, the last matching statement wins. Put broad rules first, then more specific exceptions after them.
            - paragraph [ref=e276]: "For example, allow only Anthropic:"
            - figure "opencode.json" [ref=e278]:
              - generic [ref=e280]: opencode.json
              - code [ref=e282]:
                - generic [ref=e284]: "{"
                - generic [ref=e286]: "\"$schema\": \"https://opencode.ai/config.json\","
                - generic [ref=e288]: "\"experimental\": {"
                - generic [ref=e290]: "\"policies\": ["
                - generic [ref=e292]: "{"
