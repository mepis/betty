                - generic [ref=e297]: "\"action\": \"provider.use\","
                - generic [ref=e299]: "\"resource\": \"*\""
                - generic [ref=e301]: "},"
                - generic [ref=e304]: "{"
                - generic [ref=e307]: "\"effect\": \"allow\","
                - generic [ref=e309]: "\"action\": \"provider.use\","
                - generic [ref=e311]: "\"resource\": \"anthropic\""
                - generic [ref=e313]: "}"
                - generic [ref=e316]: "]"
                - generic [ref=e319]: "}"
                - generic [ref=e322]: "}"
              - button "Copy to clipboard" [ref=e324] [cursor=pointer]
            - paragraph [ref=e326]: If no policy matches a provider, provider use is allowed by default.
            - paragraph [ref=e327]: Policies may be set in both your global config and project config. If policies from both locations match the same provider, your global policy takes priority over the project policy. This prevents a repository from re-enabling a provider that you deny globally.
            - separator [ref=e328]
