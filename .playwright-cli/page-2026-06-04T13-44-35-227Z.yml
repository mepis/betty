                    - code [ref=e222]: "`openai`"
                  - cell "Allow or deny use of an LLM provider." [ref=e223]
            - paragraph [ref=e224]: More policy actions may be added in the future.
            - separator [ref=e225]
            - heading "Matching" [level=2] [ref=e226]:
              - link "Matching" [ref=e227]:
                - /url: "#matching"
            - paragraph [ref=e228]:
              - text: The
              - code [ref=e229]: "`resource`"
              - text: field supports wildcard matching. Use
              - code [ref=e230]: "`*`"
              - text: to match zero or more characters and
              - code [ref=e231]: "`?`"
              - text: to match one character.
            - figure "opencode.json" [ref=e233]:
              - generic [ref=e235]: opencode.json
              - code [ref=e237]:
                - generic [ref=e239]: "{"
                - generic [ref=e241]: "\"$schema\": \"https://opencode.ai/config.json\","
