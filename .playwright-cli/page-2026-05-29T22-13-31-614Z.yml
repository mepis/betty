              - code [ref=e1255]: "`mode`"
              - text: option can be set to
              - code [ref=e1256]: "`primary`"
              - text: ","
              - code [ref=e1257]: "`subagent`"
              - text: ", or"
              - code [ref=e1258]: "`all`"
              - text: . If no
              - code [ref=e1259]: "`mode`"
              - text: is specified, it defaults to
              - code [ref=e1260]: "`all`"
