            - paragraph [ref=e1348]:
              - text: When set to
              - code [ref=e1349]: "`deny`"
              - text: ", the subagent is removed from the Task tool description entirely, so the model won’t attempt to invoke it."
            - complementary "Tip" [ref=e1350]:
              - paragraph [ref=e1351]:
                - img [ref=e1352]
                - text: Tip
              - paragraph [ref=e1356]:
                - text: Rules are evaluated in order, and the
                - strong [ref=e1357]: last matching rule wins
                - text: . In the example above,
                - code [ref=e1358]: "`orchestrator-planner`"
                - text: matches both
                - code [ref=e1359]: "`*`"
                - text: (deny) and
                - code [ref=e1360]: "`orchestrator-*`"
                - text: (allow), but since
                - code [ref=e1361]: "`orchestrator-*`"
                - text: comes after
                - code [ref=e1362]: "`*`"
                - text: ", the result is"
                - code [ref=e1363]: "`allow`"
                - text: .
