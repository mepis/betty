      - main [ref=e206]:
        - generic [ref=e208]:
          - heading "Agents" [level=1] [ref=e209]
          - paragraph [ref=e210]: Configure and use specialized agents.
        - generic [ref=e212]:
          - generic [ref=e213]:
            - paragraph [ref=e214]: Agents are specialized AI assistants that can be configured for specific tasks and workflows. They allow you to create focused tools with custom prompts, models, and tool access.
            - complementary "Tip" [ref=e215]:
              - paragraph [ref=e216]:
                - img [ref=e217]
                - text: Tip
              - paragraph [ref=e221]: Use the plan agent to analyze code and review suggestions without making any code changes.
            - paragraph [ref=e222]:
              - text: You can switch between agents during a session or invoke them with the
              - code [ref=e223]: "`@`"
              - text: mention.
            - separator [ref=e224]
            - heading "Types" [level=2] [ref=e225]:
              - link "Types" [ref=e226]:
                - /url: "#types"
            - paragraph [ref=e227]: There are two types of agents in OpenCode; primary agents and subagents.
            - separator [ref=e228]
            - heading "Primary agents" [level=3] [ref=e229]:
              - link "Primary agents" [ref=e230]:
                - /url: "#primary-agents"
            - paragraph [ref=e231]:
              - text: Primary agents are the main assistants you interact with directly. You can cycle through them using the
              - strong [ref=e232]: Tab
              - text: key, or your configured
              - code [ref=e233]: "`switch_agent`"
              - text: keybind. These agents handle your main conversation. Tool access is configured via permissions — for example, Build has all tools enabled while Plan is restricted.
            - complementary "Tip" [ref=e234]:
              - paragraph [ref=e235]:
                - img [ref=e236]
                - text: Tip
              - paragraph [ref=e240]:
                - text: You can use the
                - strong [ref=e241]: Tab
                - text: key to switch between primary agents during a session.
            - paragraph [ref=e242]:
              - text: OpenCode comes with two built-in primary agents,
              - strong [ref=e243]: Build
              - text: and
              - strong [ref=e244]: Plan
              - text: . We’ll look at these below.
            - separator [ref=e245]
            - heading "Subagents" [level=3] [ref=e246]:
              - link "Subagents" [ref=e247]:
                - /url: "#subagents"
            - paragraph [ref=e248]:
              - text: Subagents are specialized assistants that primary agents can invoke for specific tasks. You can also manually invoke them by
              - strong [ref=e249]: "@ mentioning"
              - text: them in your messages.
            - paragraph [ref=e250]:
              - text: OpenCode comes with three built-in subagents,
              - strong [ref=e251]: General
              - text: ","
              - strong [ref=e252]: Explore
              - text: ", and"
              - strong [ref=e253]: Scout
              - text: . We’ll look at this below.
            - separator [ref=e254]
            - heading "Built-in" [level=2] [ref=e255]:
              - link "Built-in" [ref=e256]:
                - /url: "#built-in"
            - paragraph [ref=e257]: OpenCode comes with two built-in primary agents and three built-in subagents.
            - separator [ref=e258]
            - heading "Use build" [level=3] [ref=e259]:
              - link "Use build" [ref=e260]:
                - /url: "#use-build"
            - paragraph [ref=e261]:
              - emphasis [ref=e262]: Mode
              - text: ":"
              - code [ref=e263]: "`primary`"
            - paragraph [ref=e264]:
              - text: Build is the
              - strong [ref=e265]: default
              - text: primary agent with all tools enabled. This is the standard agent for development work where you need full access to file operations and system commands.
            - separator [ref=e266]
            - heading "Use plan" [level=3] [ref=e267]:
              - link "Use plan" [ref=e268]:
                - /url: "#use-plan"
            - paragraph [ref=e269]:
              - emphasis [ref=e270]: Mode
              - text: ":"
              - code [ref=e271]: "`primary`"
            - paragraph [ref=e272]:
              - text: A restricted agent designed for planning and analysis. We use a permission system to give you more control and prevent unintended changes. By default, all of the following are set to
              - code [ref=e273]: "`ask`"
              - text: ":"
            - list [ref=e274]:
              - listitem [ref=e275]:
                - code [ref=e276]: "`file edits`"
                - text: ": All writes, patches, and edits"
              - listitem [ref=e277]:
                - code [ref=e278]: "`bash`"
                - text: ": All bash commands"
            - paragraph [ref=e279]: This agent is useful when you want the LLM to analyze code, suggest changes, or create plans without making any actual modifications to your codebase.
            - separator [ref=e280]
            - heading "Use general" [level=3] [ref=e281]:
              - link "Use general" [ref=e282]:
                - /url: "#use-general"
            - paragraph [ref=e283]:
              - emphasis [ref=e284]: Mode
              - text: ":"
              - code [ref=e285]: "`subagent`"
            - paragraph [ref=e286]: A general-purpose agent for researching complex questions and executing multi-step tasks. Has full tool access (except todo), so it can make file changes when needed. Use this to run multiple units of work in parallel.
            - separator [ref=e287]
            - heading "Use explore" [level=3] [ref=e288]:
              - link "Use explore" [ref=e289]:
                - /url: "#use-explore"
            - paragraph [ref=e290]:
              - emphasis [ref=e291]: Mode
              - text: ":"
              - code [ref=e292]: "`subagent`"
            - paragraph [ref=e293]: A fast, read-only agent for exploring codebases. Cannot modify files. Use this when you need to quickly find files by patterns, search code for keywords, or answer questions about the codebase.
            - separator [ref=e294]
            - heading "Use scout" [level=3] [ref=e295]:
              - link "Use scout" [ref=e296]:
                - /url: "#use-scout"
            - paragraph [ref=e297]:
              - emphasis [ref=e298]: Mode
              - text: ":"
              - code [ref=e299]: "`subagent`"
            - paragraph [ref=e300]: A read-only agent for external docs and dependency research. Use this when you need to clone a dependency repository into OpenCode’s managed cache, inspect library source, or cross-reference local code against upstream implementations without modifying your workspace.
            - separator [ref=e301]
            - heading "Use compaction" [level=3] [ref=e302]:
              - link "Use compaction" [ref=e303]:
                - /url: "#use-compaction"
            - paragraph [ref=e304]:
              - emphasis [ref=e305]: Mode
              - text: ":"
              - code [ref=e306]: "`primary`"
            - paragraph [ref=e307]: Hidden system agent that compacts long context into a smaller summary. It runs automatically when needed and is not selectable in the UI.
            - separator [ref=e308]
            - heading "Use title" [level=3] [ref=e309]:
              - link "Use title" [ref=e310]:
                - /url: "#use-title"
            - paragraph [ref=e311]:
              - emphasis [ref=e312]: Mode
              - text: ":"
              - code [ref=e313]: "`primary`"
            - paragraph [ref=e314]: Hidden system agent that generates short session titles. It runs automatically and is not selectable in the UI.
            - separator [ref=e315]
            - heading "Use summary" [level=3] [ref=e316]:
              - link "Use summary" [ref=e317]:
                - /url: "#use-summary"
            - paragraph [ref=e318]:
              - emphasis [ref=e319]: Mode
              - text: ":"
              - code [ref=e320]: "`primary`"
            - paragraph [ref=e321]: Hidden system agent that creates session summaries. It runs automatically and is not selectable in the UI.
            - separator [ref=e322]
            - heading "Usage" [level=2] [ref=e323]:
              - link "Usage" [ref=e324]:
                - /url: "#usage"
            - list [ref=e325]:
              - listitem [ref=e326]:
                - paragraph [ref=e327]:
                  - text: For primary agents, use the
                  - strong [ref=e328]: Tab
                  - text: key to cycle through them during a session. You can also use your configured
                  - code [ref=e329]: "`switch_agent`"
                  - text: keybind.
              - listitem [ref=e330]:
                - paragraph [ref=e331]: "Subagents can be invoked:"
                - list [ref=e332]:
                  - listitem [ref=e333]:
                    - paragraph [ref=e334]:
                      - strong [ref=e335]: Automatically
                      - text: by primary agents for specialized tasks based on their descriptions.
                  - listitem [ref=e336]:
                    - paragraph [ref=e337]:
                      - text: Manually by
                      - strong [ref=e338]: "@ mentioning"
                      - text: a subagent in your message. For example.
                    - figure [ref=e340]:
                      - code [ref=e342]:
                        - generic [ref=e344]: "@general help me search for this function"
                      - button "Copy to clipboard" [ref=e346] [cursor=pointer]
              - listitem [ref=e348]:
                - paragraph [ref=e349]:
                  - strong [ref=e350]: Navigation between sessions
                  - text: ": When subagents create child sessions, use"
                  - code [ref=e351]: "`session_child_first`"
                  - text: "(default:"
                  - strong [ref=e352]: <Leader>+Down
                  - text: ) to enter the first child session from the parent.
              - listitem [ref=e353]:
                - paragraph [ref=e354]: "Once you are in a child session, use:"
                - list [ref=e355]:
                  - listitem [ref=e356]:
                    - code [ref=e357]: "`session_child_cycle`"
                    - text: "(default:"
                    - strong [ref=e358]: Right
                    - text: ) to cycle to the next child session
                  - listitem [ref=e359]:
                    - code [ref=e360]: "`session_child_cycle_reverse`"
                    - text: "(default:"
                    - strong [ref=e361]: Left
                    - text: ) to cycle to the previous child session
                  - listitem [ref=e362]:
                    - code [ref=e363]: "`session_parent`"
                    - text: "(default:"
                    - strong [ref=e364]: Up
                    - text: ) to return to the parent session
                - paragraph [ref=e365]: This lets you switch between the main conversation and specialized subagent work.
            - separator [ref=e366]
            - heading "Configure" [level=2] [ref=e367]:
              - link "Configure" [ref=e368]:
                - /url: "#configure"
            - paragraph [ref=e369]: "You can customize the built-in agents or create your own through configuration. Agents can be configured in two ways:"
            - separator [ref=e370]
            - heading "JSON" [level=3] [ref=e371]:
              - link "JSON" [ref=e372]:
                - /url: "#json"
            - paragraph [ref=e373]:
              - text: Configure agents in your
              - code [ref=e374]: "`opencode.json`"
              - text: "config file:"
            - figure "opencode.json" [ref=e376]:
              - generic [ref=e378]: opencode.json
              - code [ref=e380]:
                - generic [ref=e382]: "{"
                - generic [ref=e384]: "\"$schema\": \"https://opencode.ai/config.json\","
                - generic [ref=e386]: "\"agent\": {"
                - generic [ref=e388]: "\"build\": {"
                - generic [ref=e390]: "\"mode\": \"primary\","
                - generic [ref=e392]: "\"model\": \"anthropic/claude-sonnet-4-20250514\","
                - generic [ref=e394]: "\"prompt\": \"{file:./prompts/build.txt}\","
                - generic [ref=e396]: "\"permission\": {"
                - generic [ref=e398]: "\"edit\": \"allow\","
                - generic [ref=e400]: "\"bash\": \"allow\""
                - generic [ref=e402]: "}"
                - generic [ref=e405]: "},"
                - generic [ref=e408]: "\"plan\": {"
                - generic [ref=e410]: "\"mode\": \"primary\","
                - generic [ref=e412]: "\"model\": \"anthropic/claude-haiku-4-20250514\","
                - generic [ref=e414]: "\"permission\": {"
                - generic [ref=e416]: "\"edit\": \"deny\","
                - generic [ref=e418]: "\"bash\": \"deny\""
                - generic [ref=e420]: "}"
                - generic [ref=e423]: "},"
                - generic [ref=e426]: "\"code-reviewer\": {"
                - generic [ref=e428]: "\"description\": \"Reviews code for best practices and potential issues\","
                - generic [ref=e430]: "\"mode\": \"subagent\","
                - generic [ref=e432]: "\"model\": \"anthropic/claude-sonnet-4-20250514\","
                - generic [ref=e434]: "\"prompt\": \"You are a code reviewer. Focus on security, performance, and maintainability.\","
                - generic [ref=e436]: "\"permission\": {"
                - generic [ref=e438]: "\"edit\": \"deny\""
                - generic [ref=e440]: "}"
                - generic [ref=e443]: "}"
                - generic [ref=e446]: "}"
                - generic [ref=e449]: "}"
              - button "Copy to clipboard" [ref=e451] [cursor=pointer]
            - separator [ref=e453]
            - heading "Markdown" [level=3] [ref=e454]:
              - link "Markdown" [ref=e455]:
                - /url: "#markdown"
            - paragraph [ref=e456]: "You can also define agents using markdown files. Place them in:"
            - list [ref=e457]:
              - listitem [ref=e458]:
                - text: "Global:"
                - code [ref=e459]: "`~/.config/opencode/agents/`"
              - listitem [ref=e460]:
                - text: "Per-project:"
                - code [ref=e461]: "`.opencode/agents/`"
            - figure "~/.config/opencode/agents/review.md" [ref=e463]:
              - generic [ref=e465]: ~/.config/opencode/agents/review.md
              - code [ref=e467]:
                - generic [ref=e469]: "---"
                - generic [ref=e471]: "description: Reviews code for quality and best practices"
                - generic [ref=e473]: "mode: subagent"
                - generic [ref=e475]: "model: anthropic/claude-sonnet-4-20250514"
                - generic [ref=e477]: "temperature: 0.1"
                - generic [ref=e479]: "permission:"
                - generic [ref=e481]: "edit: deny"
                - generic [ref=e483]: "bash: deny"
                - generic [ref=e485]: "---"
                - generic [ref=e489]: "You are in code review mode. Focus on:"
