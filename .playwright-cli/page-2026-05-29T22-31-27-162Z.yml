              - paragraph [ref=e625]:
                - strong [ref=e626]: "Core capabilities:"
                - text: Haystack’s pipeline abstraction cleanly separates retrieval from processing from generation. Each stage in the pipeline is a typed component that can be swapped, tested, and replaced independently. The 160+ document store integrations cover every major vector database, search engine, and document repository in production use. Multi-modal search extends retrieval beyond text to images and structured data.
              - paragraph [ref=e627]:
                - strong [ref=e628]: "Data quality gap:"
                - text: Haystack integrates with many document stores but has no governance layer over what is stored in them. Documents can be stale, uncertified, or miscategorized; Haystack retrieves and passes them to agents regardless. The pipeline has no concept of document certification or schema validation.
