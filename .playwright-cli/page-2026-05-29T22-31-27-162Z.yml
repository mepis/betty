              - heading "Why 2026 is the year of the harness, not the agent" [level=2] [ref=e335]
              - paragraph [ref=e336]: "Model performance has stabilized. The frontier models available in 2026 are close enough in capability that model selection is rarely the bottleneck for enterprise teams. Differentiation has shifted to the layer that wraps the model: the harness."
              - paragraph [ref=e337]: "A widely cited Hacker News thread captured the structural reality well: “The AI should be considered as the whole cybernetic system of feedback loops joining the LLM and its harness, as the harness can make as much difference as improvements to the model itself.” That observation is now a design principle. Teams choosing between a better model and a better harness are increasingly choosing the harness."
              - paragraph [ref=e338]: Gartner’s projection of 40% enterprise agent adoption by end of 2026 reflects this maturity. The question is no longer whether enterprises will deploy agents — it is how they will build the control systems that make agents reliable.
              - paragraph [ref=e339]: "But every framework in this list makes the same foundational assumption: the context fed to agents is trustworthy. None of them verify it. McKinsey’s research puts this in sharp relief. 80% of agentic AI implementation time is consumed by data engineering and governance work, not by framework configuration or model selection. 8 in 10 companies cite data limitations as their primary roadblock."
              - paragraph [ref=e340]:
                - text: "This article maps all 11 tools honestly across their actual capabilities. It also surfaces the infrastructure layer they all assume exists but do not provide: a governed data layer that certifies inputs before agents read them. See"
                - link "What Is Harness Engineering?" [ref=e341] [cursor=pointer]:
                  - /url: https://atlan.com/know/what-is-harness-engineering/
                - text: for the broader architectural context.
              - separator [ref=e342]
              - 'heading "Section 1: Orchestration frameworks" [level=2] [ref=e343]'
              - paragraph [ref=e344]:
                - text: "These 6 frameworks represent the core control layer of most agent stacks in 2026. They differ in architecture (graph-based vs. role-based vs. conversational), target user, and latency and task-success tradeoffs. What they share: none govern the data flowing through them. For guidance on assembling these components into a working system, see"
                - link "How to Build an AI Agent Harness" [ref=e345] [cursor=pointer]:
                  - /url: https://atlan.com/know/how-to-build-ai-agent-harness/
                - text: .
              - separator [ref=e346]
              - heading "1. LangGraph — Best for fine-grained agent state control" [level=3] [ref=e347]
              - paragraph [ref=e348]: LangGraph is a graph-based multi-agent orchestration framework giving engineers explicit control over agent state through conditional edges, checkpointing, and streaming. Built on the LangChain ecosystem and integrating natively with LangSmith for observability, it achieves 87% task success in 2026 comparative benchmarks — the highest in this list — and is the preferred choice for production-grade stateful agent workflows.
              - paragraph [ref=e349]:
                - strong [ref=e350]: "Profile:"
              - list [ref=e351]:
                - listitem [ref=e352]: "Best for: Engineers needing precise state control; production multi-agent pipelines"
                - listitem [ref=e353]: "GitHub stars: 24,000+"
                - listitem [ref=e354]:
                  - text: "URL:"
                  - link "langchain.com/langgraph" [ref=e355] [cursor=pointer]:
                    - /url: http://langchain.com/langgraph
              - paragraph [ref=e356]:
                - strong [ref=e357]: "Pros:"
              - list [ref=e358]:
                - listitem [ref=e359]: 87% task success rate — highest in comparative benchmarks
                - listitem [ref=e360]: Graph-based state model enables complex conditional workflows
                - listitem [ref=e361]: LangSmith integration provides built-in observability
                - listitem [ref=e362]: Checkpointing allows long-running agent recovery
                - listitem [ref=e363]: Streaming support for real-time agent feedback
              - paragraph [ref=e364]:
                - strong [ref=e365]: "Cons:"
              - list [ref=e366]:
                - listitem [ref=e367]: Steep learning curve compared to role-based alternatives
                - listitem [ref=e368]: Verbose graph configuration for simpler workflows
                - listitem [ref=e369]: LangSmith observability sits behind a cloud-paid tier
              - paragraph [ref=e370]:
                - strong [ref=e371]: "Core capabilities:"
                - text: LangGraph’s graph-based stateful orchestration is its primary differentiator. Engineers define agent behavior as nodes and edges in a directed graph, with conditional routing logic embedded in the graph structure. State is explicit and persistent across steps. Checkpointing allows long-horizon tasks to resume after failure. LangSmith integrates at the observability layer for tracing and evaluation. Streaming enables real-time visibility into agent execution cycles.
              - paragraph [ref=e372]:
                - strong [ref=e373]: "Data quality gap:"
                - text: LangGraph has no built-in mechanism to validate, certify, or track lineage of context fed to agents. It assumes inputs are clean. In production environments with schema drift or stale data sources, LangGraph surfaces the failure at task completion, not at input ingestion. The 87% task success rate reflects framework performance against clean data; it does not reflect resilience to data quality failures.
              - paragraph [ref=e374]:
                - strong [ref=e375]: "Licensing:"
                - text: MIT; LangSmith cloud is paid
              - separator [ref=e376]
              - heading "2. CrewAI — Best for fastest multi-agent prototype" [level=3] [ref=e377]
              - paragraph [ref=e378]: CrewAI is the most accessible role-based multi-agent framework in 2026, with 45,900+ GitHub stars and 1.8 seconds average agent latency. Its “agents as employees” collaboration model and native MCP support make it the default choice for teams getting from zero to working multi-agent prototype in hours rather than weeks.
              - paragraph [ref=e379]:
                - strong [ref=e380]: "Profile:"
              - list [ref=e381]:
                - listitem [ref=e382]: "Best for: New teams; fastest time to prototype; MCP-native workflows"
                - listitem [ref=e383]: "GitHub stars: 45,900+"
                - listitem [ref=e384]:
                  - text: "URL:"
                  - link "crewai.com" [ref=e385] [cursor=pointer]:
                    - /url: http://crewai.com
              - paragraph [ref=e386]:
                - strong [ref=e387]: "Pros:"
              - list [ref=e388]:
                - listitem [ref=e389]: 45,900+ GitHub stars — highest adoption among role-based frameworks
                - listitem [ref=e390]: 1.8 second average agent latency — fastest among major frameworks
                - listitem [ref=e391]: Native MCP and A2A protocol support
                - listitem [ref=e392]: CrewAI Studio visual builder for non-engineers
                - listitem [ref=e393]: Active community; v1.10.1 as of April 2026
              - paragraph [ref=e394]:
                - strong [ref=e395]: "Cons:"
              - list [ref=e396]:
                - listitem [ref=e397]: 82% task success rate — lower than LangGraph’s 87%
                - listitem [ref=e398]: Concurrent agent logging is a known pain point for debugging
                - listitem [ref=e399]: Less granular state control than LangGraph
              - paragraph [ref=e400]:
                - strong [ref=e401]: "Core capabilities:"
                - text: CrewAI’s role-based model assigns each agent a persona (CEO, researcher, writer) with defined goals, tools, and communication protocols. Agents collaborate through A2A messaging. Native MCP support means tool configurations transfer directly to MCP-compatible harness configurations. CrewAI Studio provides a no-code interface for defining agent crews, lowering the barrier for non-engineer team members. The 1.8 second average latency benchmark is the fastest among major frameworks in 2026 evaluations.
              - paragraph [ref=e402]:
                - strong [ref=e403]: "Data quality gap:"
                - text: No data governance features. Concurrent agent execution makes it harder to trace context failures back to their source data. When an agent crew produces a wrong result, CrewAI provides no mechanism to determine whether the failure originated in the model, the prompt, or the data the agents read.
              - paragraph [ref=e404]:
                - strong [ref=e405]: "Licensing:"
                - text: OSS core; AOP platform approximately $99 per month; enterprise contracts available
              - separator [ref=e406]
              - heading "3. AutoGen / AG2 (Microsoft) — Best for code execution sandboxing" [level=3] [ref=e407]
              - paragraph [ref=e408]: AutoGen (now AG2) is Microsoft’s conversational multi-agent framework and the dominant choice for workflows involving sandboxed code execution, iterative debugging, and multi-turn agent debate. With 54,000+ GitHub stars and Docker-native execution isolation, it is the default for engineering teams running agents that need to write and test code safely.
              - paragraph [ref=e409]:
                - strong [ref=e410]: "Profile:"
              - list [ref=e411]:
                - listitem [ref=e412]: "Best for: Code execution sandboxing; iterative debugging workflows; multi-turn agent reasoning"
                - listitem [ref=e413]: "GitHub stars: 54,000+"
                - listitem [ref=e414]:
                  - text: "URL:"
                  - link "microsoft.github.io/autogen" [ref=e415] [cursor=pointer]:
                    - /url: http://microsoft.github.io/autogen
              - paragraph [ref=e416]:
                - strong [ref=e417]: "Pros:"
              - list [ref=e418]:
                - listitem [ref=e419]: 54,000+ GitHub stars — highest adoption in this list
                - listitem [ref=e420]: Docker-native sandboxed code execution
                - listitem [ref=e421]: Multi-turn debate and refinement between agents
                - listitem [ref=e422]: MIT license with strong Microsoft backing
              - paragraph [ref=e423]:
                - strong [ref=e424]: "Cons:"
              - list [ref=e425]:
                - listitem [ref=e426]: “Two agents looping indefinitely” is a known failure mode requiring manual intervention
                - listitem [ref=e427]: Context pruning required as conversations grow — no automated management
                - listitem [ref=e428]: Output quality depends heavily on human-written conversation scaffolding
              - paragraph [ref=e429]:
                - strong [ref=e430]: "Core capabilities:"
                - text: AutoGen’s core differentiation is its conversational architecture. Multiple agents take turns proposing, critiquing, and refining outputs in multi-turn exchanges. Docker-native sandboxing means code-writing agents execute in isolated environments without risk to the host system. The debate pattern — one agent proposes, another critiques, a third synthesizes — produces more reliable outputs than single-agent generation for engineering and analytical tasks.
              - paragraph [ref=e431]:
                - strong [ref=e432]: "Data quality gap:"
                - text: No mechanism to validate that retrieved data is current or certified. Multi-turn conversations accumulate context that must be manually pruned as token windows fill. No lineage tracking connects agent outputs to the source data they read.
              - paragraph [ref=e433]:
                - strong [ref=e434]: "Licensing:"
                - text: MIT
              - separator [ref=e435]
              - heading "4. LangChain deepagents — Best for complex long-horizon tasks" [level=3] [ref=e436]
              - paragraph [ref=e437]: LangChain deepagents is a full-stack agent harness designed for production-grade complex multi-step tasks. With write_todos planning, filesystem context offloading, subagent spawning, and auto-summarization, it is the 2026 successor to standard LangChain agents for teams needing long-horizon task support without building scaffolding from scratch.
              - paragraph [ref=e438]:
                - strong [ref=e439]: "Profile:"
              - list [ref=e440]:
                - listitem [ref=e441]: "Best for: Complex multi-step tasks; long-horizon workflows"
                - listitem [ref=e442]: "GitHub stars: Part of LangChain ecosystem (126,000+ main repo)"
                - listitem [ref=e443]:
                  - text: "URL:"
                  - link "langchain.com/deep-agents" [ref=e444] [cursor=pointer]:
                    - /url: http://langchain.com/deep-agents
              - paragraph [ref=e445]:
                - strong [ref=e446]: "Pros:"
              - list [ref=e447]:
                - listitem [ref=e448]: write_todos planning tool for structured task decomposition
                - listitem [ref=e449]: Filesystem context offloading handles context window limits
                - listitem [ref=e450]: Subagent spawning for context isolation between task phases
                - listitem [ref=e451]: Auto-summarization and context compaction
                - listitem [ref=e452]: MIT; 100% open source (0.2 release, March 2026)
              - paragraph [ref=e453]:
                - strong [ref=e454]: "Cons:"
              - list [ref=e455]:
                - listitem [ref=e456]: Launched late 2025 — younger than LangGraph and CrewAI
                - listitem [ref=e457]: Compaction and summarization can silently lose data provenance
                - listitem [ref=e458]: Filesystem backend adds operational complexity in containerized environments
              - paragraph [ref=e459]:
                - strong [ref=e460]: "Core capabilities:"
                - text: deepagents introduces structured long-horizon task management to the LangChain ecosystem. write_todos creates explicit task decomposition trees. Filesystem context offloading extends effective context windows by persisting intermediate state to disk rather than holding it in the model context. Subagent spawning creates isolated reasoning processes for distinct task phases. Auto-summarization compresses prior steps into dense summaries as context windows fill.
              - paragraph [ref=e461]:
                - strong [ref=e462]: "Data quality gap:"
                - text: No validation of what is stored in the filesystem context. Compaction and summarization can silently discard provenance — when an agent reads from a compacted context, there is no record of where that information originated. No lineage tracking connects compressed context back to source data.
              - paragraph [ref=e463]:
                - strong [ref=e464]: "Licensing:"
                - text: MIT
              - separator [ref=e465]
              - heading "5. Microsoft Semantic Kernel — Best for .NET and Microsoft-invested enterprises" [level=3] [ref=e466]
              - paragraph [ref=e467]: Microsoft Semantic Kernel is the enterprise orchestration framework for .NET teams and organizations invested in the Microsoft stack. With native Azure OpenAI, Copilot Studio, and Microsoft Graph integration, multi-language SDK support in C#, Python, and Java, and 27,000+ GitHub stars, it provides enterprise type safety and compile-time validation that other frameworks do not match.
              - paragraph [ref=e468]:
                - strong [ref=e469]: "Profile:"
              - list [ref=e470]:
                - listitem [ref=e471]: "Best for: Microsoft-invested enterprises; .NET developers; Azure-native deployments"
                - listitem [ref=e472]: "GitHub stars: 27,000+"
                - listitem [ref=e473]:
                  - text: "URL:"
                  - link "github.com/microsoft/semantic-kernel" [ref=e474] [cursor=pointer]:
                    - /url: https://github.com/microsoft/semantic-kernel
              - paragraph [ref=e475]:
                - strong [ref=e476]: "Pros:"
              - list [ref=e477]:
                - listitem [ref=e478]: "Multi-language: C#, Python, Java"
                - listitem [ref=e479]: Native Azure OpenAI, Copilot Studio, and Microsoft Graph integration
                - listitem [ref=e480]: Enterprise type safety and compile-time validation
                - listitem [ref=e481]: Plugin architecture for capability extension
                - listitem [ref=e482]: Improved planning and error recovery in 2026
              - paragraph [ref=e483]:
                - strong [ref=e484]: "Cons:"
              - list [ref=e485]:
                - listitem [ref=e486]: Strong Microsoft platform dependency
                - listitem [ref=e487]: Smaller open-source ecosystem compared to LangChain and CrewAI
                - listitem [ref=e488]: Plugin architecture adds verbosity for simple workflows
              - paragraph [ref=e489]:
                - strong [ref=e490]: "Core capabilities:"
                - text: Semantic Kernel’s plugin architecture extends agent capabilities through typed, composable components. Compile-time type safety catches configuration errors before runtime, which matters significantly in enterprise environments where failure carries compliance consequences. Azure OpenAI integration means enterprise agreements and rate limits flow through existing Microsoft contracts. Copilot Studio and Microsoft Graph connectors enable deep integration with M365 data and workflows.
              - paragraph [ref=e491]:
                - strong [ref=e492]: "Data quality gap:"
                - text: Azure RBAC controls who can call what — not what the data inputs contain. Schema drift, stale tables, and uncertified data sources pass through without validation. Azure governance governs API access. It does not govern what agents read.
              - paragraph [ref=e493]:
                - strong [ref=e494]: "Licensing:"
                - text: MIT; Azure service costs apply
              - separator [ref=e495]
              - heading "6. Mastra — Best for TypeScript teams needing observational memory" [level=3] [ref=e496]
              - paragraph [ref=e497]: Mastra is the fastest-rising TypeScript-first agent framework in 2026 — 19,000+ GitHub stars, 300,000+ weekly npm downloads, and a novel observational memory system using background Observer and Reflector agents to continuously compress conversation into dense structured observations. Enterprise RBAC, native MCP support, and remote sandbox make it the strongest TypeScript-native option currently available.
              - paragraph [ref=e498]:
                - strong [ref=e499]: "Profile:"
              - list [ref=e500]:
                - listitem [ref=e501]: "Best for: TypeScript and Node.js teams; observational memory; enterprise RBAC"
                - listitem [ref=e502]: "GitHub stars: 19,000+"
                - listitem [ref=e503]:
                  - text: "URL:"
                  - link "mastra.ai" [ref=e504] [cursor=pointer]:
                    - /url: http://mastra.ai
              - paragraph [ref=e505]:
                - strong [ref=e506]: "Pros:"
              - list [ref=e507]:
                - listitem [ref=e508]: 300,000+ weekly npm downloads
                - listitem [ref=e509]: Observational memory via Observer and Reflector agents — genuinely differentiated
                - listitem [ref=e510]: Enterprise RBAC released March 2026
                - listitem [ref=e511]: Native MCP support
                - listitem [ref=e512]: Remote sandbox support
              - paragraph [ref=e513]:
                - strong [ref=e514]: "Cons:"
              - list [ref=e515]:
                - listitem [ref=e516]: TypeScript-only — Python teams need a different framework
                - listitem [ref=e517]: Observational memory adds background agent overhead
                - listitem [ref=e518]: Enterprise tier pricing not publicly disclosed
              - paragraph [ref=e519]:
                - strong [ref=e520]: "Core capabilities:"
                - text: Mastra’s observational memory system is its most distinctive feature. Background Observer agents monitor conversations in real time and extract structured observations. Reflector agents periodically synthesize those observations into compressed, high-density memory artifacts. The result is a memory system that automatically maintains context quality without requiring manual prompting or compaction configuration. Enterprise RBAC controls which users can execute which agent workflows.
              - paragraph [ref=e521]:
                - strong [ref=e522]: "Data quality gap:"
                - text: RBAC governs who can run agents. It does not govern whether data inputs are certified, lineage-tracked, or schema-stable. A well-compressed observation derived from a stale data source is a well-compressed stale observation.
              - paragraph [ref=e523]:
                - strong [ref=e524]: "Licensing:"
                - text: OSS core; enterprise tier (pricing not public)
              - separator [ref=e525]
              - 'heading "Section 2: Open-source harness runtimes" [level=2] [ref=e526]'
              - paragraph [ref=e527]: Two projects both named “OpenHarness” exist — they are completely separate with different architectures. HKUDS is an agent runtime; MaxGfeller is an interoperability SDK. Both are MIT-licensed, and both are useful for practitioners who want transparency into how production harnesses work. The naming overlap is coincidental.
