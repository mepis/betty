                - strong [ref=e661]: "Data quality gap:"
                - text: AgentOps monitors agent behavior and catches failures after they happen. It does not monitor input data quality, lineage, or certification at the source. A session replay showing an agent confidently acting on stale data does not tell you the data was stale — it tells you what the agent did.
