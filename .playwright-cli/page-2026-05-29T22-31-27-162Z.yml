              - paragraph [ref=e688]:
                - strong [ref=e689]: "Core capabilities:"
                - text: Langfuse traces LLM calls at the span level, linking model invocations to their prompts, inputs, and outputs. Prompt management tracks versions and links evaluation scores to specific prompt versions. Evaluation pipelines score model outputs against defined criteria. Self-hosting puts all observability data behind the organization’s own security perimeter. Team collaboration features allow shared access to traces and evaluation results.
              - paragraph [ref=e690]:
                - strong [ref=e691]: "Data quality gap:"
                - text: Langfuse evaluates model outputs and prompt performance. It cannot determine whether the context the model read was stale, uncertified, or schema-drifted. High evaluation scores on outputs from bad inputs are possible — and they are misleading.
