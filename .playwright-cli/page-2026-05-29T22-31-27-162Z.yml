              - 'heading "Section 3: RAG and document-heavy workflow frameworks" [level=2] [ref=e600]'
              - paragraph [ref=e601]: "For agent workflows where the primary task is processing, searching, or reasoning over documents, Haystack is the reference implementation. Built RAG-first with 160+ document store integrations, it handles the retrieval architecture other frameworks leave to the user. The caveat: it integrates with everything but governs nothing."
              - separator [ref=e602]
              - heading "9. Haystack (deepset) — Best for RAG and document-heavy workflows" [level=3] [ref=e603]
              - paragraph [ref=e604]: Haystack by deepset is the production-ready RAG and document-heavy workflow framework for Python teams — 23,000+ GitHub stars, pipeline-based architecture, and 160+ document store integrations. It is the default choice when your agent workflow is primarily about searching, retrieving, and reasoning over large document corpora.
              - paragraph [ref=e605]:
