                - text: AgentOps records complete session transcripts including tool calls, model invocations, costs, and latency data. Session replay enables forensic analysis of agent failures — engineers can replay exactly what happened in a failing session. Multi-agent tracking captures interactions across concurrent agents in the same session. Cost data from sessions feeds back into fine-tuning prioritization.
