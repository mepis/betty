              - paragraph [ref=e530]:
                - text: OpenHarness by HKUDS (University of Hong Kong Data Systems group) is an open-source CLI-first agent runtime with 9,100 GitHub stars, built for researchers and practitioners who want to inspect how production agent harnesses work from the inside. With 43+ built-in tools, streaming tool-call cycles, multi-level permission modes,
                - link "MEMORY.md" [ref=e531] [cursor=pointer]:
                  - /url: http://MEMORY.md
                - text: persistence, and background task management, it is the most transparent agent runtime available.
