                - text: is a harness interoperability SDK — write-once agent code that deploys across Anthropic SDK, Goose, LangChain, Letta, and Claude Code without modification. Where the HKUDS project is a runtime you run agents inside, this project is an abstraction layer making agent code portable across runtimes.
