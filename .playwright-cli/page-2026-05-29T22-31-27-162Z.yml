              - 'heading "The missing layer: data quality infrastructure for agent harnesses" [level=2] [ref=e696]'
              - paragraph [ref=e697]: Every framework above operates on the control layer of the harness. None of them governs what the harness actually reads.
              - paragraph [ref=e698]: "McKinsey’s research makes the scale of this problem concrete: 8 in 10 companies cite data limitations as their primary roadblock to scaling agentic AI. Not framework choice. Not model selection. Data. The OWASP Top 10 for Agentic Applications identifies memory poisoning and cascading failures among the most critical agent security risks — both caused by bad data inputs entering the harness context. A consistent finding in 2026 AI governance research: “Much of what is dismissed as LLM hallucination is actually the consequence of inconsistent, stale, or partially replicated data sources.”"
              - paragraph [ref=e699]: "This is not a criticism of the tools listed above. LangGraph, CrewAI, Haystack, and the rest solve what they were built to solve. The gap is structural: no orchestration framework can certify its own inputs. That responsibility belongs to the data layer."
              - separator [ref=e700]
              - heading "What Atlan is — and what it is not" [level=3] [ref=e701]
              - paragraph [ref=e702]: Atlan is not a harness tool. It does not orchestrate agents, manage memory, or provide observability on agent runs. Comparing Atlan to LangGraph or CrewAI is a category error.
              - paragraph [ref=e703]: Atlan is the governed data substrate that harness tools depend on. It is the layer that determines whether what agents read is trustworthy before agents read it. You choose your harness framework from the list above. You use Atlan to ensure that the data that framework reads is certified, lineage-tracked, and schema-stable.
              - paragraph [ref=e704]: Atlan is a Gartner Leader 2026 in Data and Analytics Governance — the category that directly addresses the structural gap every harness framework assumes away.
              - separator [ref=e705]
              - heading "What Atlan provides for agent harness pipelines" [level=3] [ref=e706]
              - paragraph [ref=e707]:
                - strong [ref=e708]: "Active metadata:"
                - text: Atlan continuously monitors data systems and automatically maintains metadata freshness. Real-time certification status, schema state, and freshness signals are surfaced as structured context — agents do not need to guess whether a table is current.
              - paragraph [ref=e709]:
                - strong [ref=e710]: "Data contracts:"
                - text: Atlan enforces schema contracts on data assets before they enter the harness context window. Schema drift is caught before agents read it, not after agents produce wrong outputs. Contract enforcement is proactive, not post-hoc.
              - paragraph [ref=e711]:
                - strong [ref=e712]: "Data lineage:"
                - text: "End-to-end column-level lineage means agents can trace what they are reading back to its source. When an agent output is wrong, lineage enables root cause analysis: was the failure in the model, the prompt, or the source data? Column-level granularity makes that question answerable."
              - paragraph [ref=e713]:
                - strong [ref=e714]: "Certification status:"
                - text: Data stewards certify assets in Atlan. That certification state is readable as agent context. Agents can be configured to only read certified assets — eliminating one of the most common production failure modes in enterprise harness deployments.
              - paragraph [ref=e715]:
                - strong [ref=e716]: "MCP server:"
                - text: Atlan’s MCP server surfaces active metadata, data contracts, and lineage as structured context that any harness can query directly. Write once against the MCP interface; Atlan handles the governance layer underneath.
