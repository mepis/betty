                - text: OpenHarness HKUDS exposes every layer of agent execution to inspection. Tool calls, permission checks, memory reads and writes, and streaming cycles are all visible at the CLI level. The 43+ built-in tools cover a broader surface than most frameworks without requiring plugins.
