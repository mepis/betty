      - generic [ref=e140]:
        - paragraph [ref=e141]: Whether an 8GB GPU can run a 35B-class model depends on more than the total parameter count. Model architecture, quantization format, and the way the inference framework schedules work all matter.
        - paragraph [ref=e142]: The core idea in this setup is to use a GGUF quantized version of an MoE model such as Qwen3.6-35B-A3B, then use llama.cpp with CUDA acceleration, CPU Offload, MoE parameter scheduling, and KV Cache quantization to split memory pressure between the GPU and system RAM. With that approach, an older GPU such as the RTX 3070 8GB can still have a chance to run a 35B-class local multimodal model.
        - paragraph [ref=e143]: "One point needs to be clear first: this is not “fitting a full 35B model entirely into 8GB of VRAM.” A more accurate way to understand it is that the GPU handles the compute that benefits most from GPU acceleration, while some expert layers and cache pressure are carried by system memory. The real experience depends on RAM capacity, CPU performance, quantization format, context length, and parameter choices."
        - heading "Test environment" [level=2] [ref=e144]
        - paragraph [ref=e145]: "This kind of setup is sensitive to system memory. A reference configuration is:"
        - list [ref=e146]:
          - listitem [ref=e147]: "CPU: Intel Core i7-12700 class"
          - listitem [ref=e148]: "GPU: NVIDIA RTX 3070 8GB"
          - listitem [ref=e149]: "RAM: 64GB"
          - listitem [ref=e150]: "OS: Windows 11"
          - listitem [ref=e151]: "Inference framework: llama.cpp CUDA build"
          - listitem [ref=e152]: "Model format: GGUF"
        - paragraph [ref=e153]: If you only have 16GB or 32GB of RAM, it is not necessarily impossible to try, but a 35B MoE model is more likely to create memory pressure during loading and long-context inference. For stable use, 64GB of RAM is a safer target.
        - heading "Why 8GB VRAM can still run a 35B model" [level=2] [ref=e154]
        - paragraph [ref=e155]: The key to Qwen3.6-35B-A3B is its MoE architecture. Its total parameter scale is 35B, but not all parameters are activated during each inference step; only part of the expert parameters are active.
        - paragraph [ref=e156]: "That leads to two consequences:"
        - list [ref=e157]:
          - listitem [ref=e158]: The full model file is still large and requires enough disk space and system memory.
          - listitem [ref=e159]: The active compute per inference step is lower than a full 35B Dense model.
        - paragraph [ref=e160]: llama.cpp’s CPU Offload and MoE-related parameters can further reduce the VRAM threshold. The GPU mainly handles attention and some high-value compute, while the CPU and system memory carry part of the expert-layer weights. The tradeoff is that speed, response latency, and stability depend more on the whole machine, not only the GPU model.
        - heading "Preparing llama.cpp" [level=2] [ref=e161]
        - paragraph [ref=e162]: "Windows users can download a prebuilt CUDA version of llama.cpp directly. Pay attention to three points:"
        - list [ref=e163]:
          - listitem [ref=e164]: The GPU driver should be new enough, and the CUDA runtime should match the llama.cpp package you download.
          - listitem [ref=e165]: After downloading, place it in a path without Chinese characters or special characters so batch scripts are easier to run.
          - listitem [ref=e166]:
            - text: Put model files under a unified
            - code [ref=e167]: models
            - text: directory to avoid very long paths in commands.
        - paragraph [ref=e168]: If you use AMD, Intel graphics, or a CPU-only environment, you can also choose Vulkan, HIP, SYCL, or CPU builds, but the parameters and performance will be different. This article focuses on the CUDA route for NVIDIA GPUs.
        - heading "Download the model and multimodal projection file" [level=2] [ref=e169]
        - paragraph [ref=e170]: "The model used here is:"
        - list [ref=e171]:
          - listitem [ref=e172]:
            - code [ref=e173]: Qwen3.6-35B-A3B-UD-Q4_K_M.gguf
        - paragraph [ref=e174]:
          - text: The
          - code [ref=e175]: Q4_K_M
          - text: quantization format is chosen mainly to balance accuracy, file size, and speed. On low-VRAM machines, it is not a good idea to start with a higher-precision version, because loading failures or frequent system paging become much more likely.
        - paragraph [ref=e176]: "If you want image understanding, you also need the multimodal projection file, for example:"
        - list [ref=e177]:
          - listitem [ref=e178]:
            - code [ref=e179]: mmproj-BF16.gguf
        - paragraph [ref=e180]:
          - text: This file is important. Downloading only the main model usually gives you text inference only. Without
          - code [ref=e181]: mmproj
          - text: ", the web UI may not expose a usable image upload feature, or uploaded images may not be processed correctly."
