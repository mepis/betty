        - paragraph [ref=e296]: If the page opens and the model replies normally, the service has started successfully. The first model load can be slow. Avoid launching multiple instances repeatedly during loading, because that can fill system memory more easily.
        - heading "Understanding the key parameters" [level=2] [ref=e297]
        - paragraph [ref=e298]:
          - code [ref=e299]: "-ngl 99"
          - text: tries to place as many layers as possible on the GPU. How many layers actually fit depends on the model structure, quantization format, and VRAM usage.
        - paragraph [ref=e300]:
          - code [ref=e301]: "--n-cpu-moe 999"
          - text: pushes more MoE expert layers to the CPU side, reducing VRAM pressure. It is one of the key parameters for running large MoE models on low-VRAM hardware.
        - paragraph [ref=e302]:
          - code [ref=e303]: "--flash-attn on"
          - text: enables Flash Attention, which can reduce the cost of attention computation. Whether it is available depends on the current llama.cpp version and GPU support.
        - paragraph [ref=e304]:
          - code [ref=e305]: "-c 32768"
          - text: sets the context length. Long context significantly increases KV Cache pressure. If startup fails or inference is very slow, try lowering it to
          - code [ref=e306]: "8192"
          - text: or
          - code [ref=e307]: "16384"
          - text: .
        - paragraph [ref=e308]:
          - code [ref=e309]: "--cache-type-k q4_0"
          - text: and
          - code [ref=e310]: "--cache-type-v q4_0"
          - text: quantize the KV Cache, saving memory and VRAM, though they may have a small impact on output quality and speed.
        - paragraph [ref=e311]:
          - code [ref=e312]: "-b 512"
          - text: and
          - code [ref=e313]: "-ub 128"
          - text: control batching-related parameters. In a low-VRAM environment, do not start with overly aggressive batch settings.
        - heading "Common issues" [level=2] [ref=e314]
        - paragraph [ref=e315]:
          - text: If startup reports insufficient VRAM, first reduce the context length, for example changing
          - code [ref=e316]: "-c 32768"
          - text: to
          - code [ref=e317]: "-c 8192"
          - text: ", then try lowering"
          - code [ref=e318]: "-b"
          - text: and
          - code [ref=e319]: "-ub"
          - text: .
        - paragraph [ref=e320]:
          - text: If the image upload button is unavailable, first check whether the
          - code [ref=e321]: "--mmproj"
          - text: path is correct and whether the
          - code [ref=e322]: mmproj
          - text: file matches the model.
        - paragraph [ref=e323]: If the model responds slowly after loading, it usually does not mean the GPU is idle. Large amounts of weights or expert layers may be handled by the CPU and system memory. Use Task Manager to observe GPU, CPU, memory, and disk usage to identify the bottleneck.
        - paragraph [ref=e324]:
          - text: If the output format looks wrong, confirm that
          - code [ref=e325]: "--jinja"
          - text: is enabled and check whether the model requires the corresponding chat template.
        - paragraph [ref=e326]:
          - text: If the browser cannot open the service after startup, check the
          - code [ref=e327]: "--host"
          - text: and
          - code [ref=e328]: "--port"
          - text: settings, and make sure port 8080 is not occupied by another program.
        - heading "Who should try this" [level=2] [ref=e329]
        - paragraph [ref=e330]: This setup is suitable for users who already have 8GB VRAM devices such as RTX 3070, RTX 4060 Laptop, or RTX 3060 8GB, but want to experiment with larger MoE models.
        - paragraph [ref=e331]: It is not suitable for people who need maximum speed. Running a 35B MoE model on low VRAM essentially trades CPU and system memory for a lower VRAM requirement. Being able to run it is one thing; whether it feels smooth enough is another.
        - paragraph [ref=e332]: If your goal is high-frequency daily chatting, 7B, 8B, or 14B models may feel better. If your goal is to explore larger MoE models, multimodal capability, and the boundary of local deployment, an RTX 3070 8GB with 64GB of RAM is still worth trying.
        - heading "Summary" [level=2] [ref=e333]
        - paragraph [ref=e334]: The reason an RTX 3070 8GB can run Qwen3.6-35B-A3B is not that the GPU suddenly has more VRAM. It is the combination of MoE architecture, GGUF quantization, llama.cpp CPU Offload, and KV Cache optimization that lowers the threshold.
        - paragraph [ref=e335]: The most interesting part of this setup is that it lets older GPUs still participate in local large-model experiments. As long as you accept tradeoffs in speed and stability, an 8GB VRAM machine can still be a local AI model testing platform, not only an entry-level device for small models.
