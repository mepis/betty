                - /url: "#S7.T10"
              - text: ). Across all domains, MRR-impaired block selection (5-bit, 20 pm drift) produces
              - emphasis [ref=e7268]: identical
              - text: accuracy to full attention, confirming that the block-selection approximation introduces no measurable quality loss on diverse long-context tasks.
