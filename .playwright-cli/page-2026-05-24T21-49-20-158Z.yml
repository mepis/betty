            - paragraph [ref=e7262]: "A deployable Prism module would package the photonic chip, laser source, and TEC onto a single substrate, offered in one of three form factors: a PCIe add-in card for drop-in datacenter use, a CXL-attached device for lower-latency memory-semantic access, or a co-packaged chiplet on an interposer for maximum performance. Integration with existing LLM serving stacks (e.g., vLLM, TensorRT-LLM) would proceed via a block-index API: the host submits a query sketch and receives ranked block indices, transparently replacing the software signature-scan kernel."
          - generic [ref=e7263]:
            - heading "Benchmark scope." [level=4] [ref=e7264]
            - paragraph [ref=e7266]:
              - text: NIAH is a retrieval-oriented benchmark that tests single-needle recall; it does not exercise multi-hop reasoning, summarization, or other long-context capabilities. To assess generalization beyond NIAH, we evaluated Prism block selection on three LongBench-v2 domains (
