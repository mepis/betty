          - heading "Anchor Listener mode" [level=2] [ref=e1213]:
            - link "Anchor" [ref=e1214] [cursor=pointer]:
              - /url: "#listener-mode"
              - text: 
            - text: Listener mode
          - alert [ref=e1215]: ⚠ This is an experimental feature, its behavior may change in the future.
          - paragraph [ref=e1216]: "In some cases it might be useful to have a Qdrant node that only accumulates data and does not participate in search operations. There are several scenarios where this can be useful:"
          - list [ref=e1217]:
            - listitem [ref=e1218]: Listener option can be used to store data in a separate node, which can be used for backup purposes or to store data for a long time.
            - listitem [ref=e1219]: Listener node can be used to synchronize data into another region, while still performing search operations in the local region.
          - paragraph [ref=e1220]:
            - text: To enable listener mode, set
            - code [ref=e1221]: node_type
            - text: to
            - code [ref=e1222]: Listener
            - text: "in the config file:"
          - generic [ref=e1223]:
            - code [ref=e1225]:
              - generic [ref=e1227]: "storage:"
              - generic [ref=e1229]: "node_type: \"Listener\""
            - button "Copy to clipboard" [ref=e1230] [cursor=pointer]:
              - tooltip "Copy to clipboard" [ref=e1231]
          - paragraph [ref=e1232]: Listener node will not participate in search operations, but will still accept write operations and will store the data in the local storage.
          - paragraph [ref=e1233]:
            - text: All shards, stored on the listener node, will be converted to the
            - code [ref=e1234]: Listener
            - text: state.
          - paragraph [ref=e1235]:
            - text: Additionally, all write requests sent to the listener node will be processed with
            - code [ref=e1236]: wait=false
            - text: option, which means that the write operations will be considered successful once they are written to WAL. This mechanism should allow to minimize upsert latency in case of parallel snapshotting.
          - heading "Anchor Consensus Checkpointing" [level=2] [ref=e1237]:
            - link "Anchor" [ref=e1238] [cursor=pointer]:
              - /url: "#consensus-checkpointing"
              - text: 
            - text: Consensus Checkpointing
          - paragraph [ref=e1239]: Consensus checkpointing is a technique used in Raft to improve performance and simplify log management by periodically creating a consistent snapshot of the system state. This snapshot represents a point in time where all nodes in the cluster have reached agreement on the state, and it can be used to truncate the log, reducing the amount of data that needs to be stored and transferred between nodes.
          - paragraph [ref=e1240]: For example, if you attach a new node to the cluster, it should replay all the log entries to catch up with the current state. In long-running clusters, this can take a long time, and the log can grow very large.
          - paragraph [ref=e1241]: To prevent this, one can use a special checkpointing mechanism, that will truncate the log and create a snapshot of the current state.
          - paragraph [ref=e1242]:
            - text: To use this feature, simply call the
            - code [ref=e1243]: /cluster/recover
            - text: "API on required node:"
          - generic [ref=e1244]:
            - code [ref=e1246]:
              - generic [ref=e1248]: POST /cluster/recover
            - button "Copy to clipboard" [ref=e1249] [cursor=pointer]:
              - tooltip "Copy to clipboard" [ref=e1250]
          - paragraph [ref=e1251]: This API can be triggered on any non-leader node, it will send a request to the current consensus leader to create a snapshot. The leader will in turn send the snapshot back to the requesting node for application.
          - paragraph [ref=e1252]: In some cases, this API can be used to recover from an inconsistent cluster state by forcing a snapshot creation.
          - generic [ref=e1253]:
            - separator [ref=e1254]
            - list [ref=e1255]:
              - listitem [ref=e1256]:
                - paragraph [ref=e1257]:
                  - text: "Weak ordering for updates: All records are streamed to the target node in order. New updates are received on the target node in parallel, while the transfer of records is still happening. We therefore have"
                  - code [ref=e1258]: weak
                  - text: ordering, regardless of what
                  - link "ordering" [ref=e1259] [cursor=pointer]:
                    - /url: "#write-ordering"
                  - text: is used for updates.
                  - link "↩︎" [ref=e1260] [cursor=pointer]:
                    - /url: "#fnref:1"
                  - link "↩︎" [ref=e1261] [cursor=pointer]:
                    - /url: "#fnref1:1"
              - listitem [ref=e1262]:
                - paragraph [ref=e1263]:
                  - text: "Strong ordering for updates: A snapshot of the shard is created, it is transferred and recovered on the target node. That ensures the state of the shard is kept consistent. New updates are queued on the source node, and transferred in order to the target node. Updates therefore have the same"
                  - link "ordering" [ref=e1264] [cursor=pointer]:
                    - /url: "#write-ordering"
                  - text: as the user selects, making
                  - code [ref=e1265]: strong
                  - text: ordering possible.
                  - link "↩︎" [ref=e1266] [cursor=pointer]:
                    - /url: "#fnref:2"
                  - link "↩︎" [ref=e1267] [cursor=pointer]:
                    - /url: "#fnref1:2"
                  - link "↩︎" [ref=e1268] [cursor=pointer]:
