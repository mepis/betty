          - heading "Anchor Write ordering" [level=3] [ref=e1137]:
            - link "Anchor" [ref=e1138] [cursor=pointer]:
              - /url: "#write-ordering"
              - text: 
            - text: Write ordering
          - paragraph [ref=e1139]:
            - text: Write
            - code [ref=e1140]: ordering
            - text: can be specified for any write request to serialize it through a single “leader” node, which ensures that all write operations (issued with the same
            - code [ref=e1141]: ordering
            - text: ) are performed and observed sequentially.
          - list [ref=e1142]:
            - listitem [ref=e1143]:
              - code [ref=e1144]: weak
              - emphasis [ref=e1145]: (default)
              - text: ordering does not provide any additional guarantees, so write operations can be freely reordered.
            - listitem [ref=e1146]:
              - code [ref=e1147]: medium
              - text: ordering serializes all write operations through a dynamically elected leader, which might cause minor inconsistencies in case of leader change.
            - listitem [ref=e1148]:
              - code [ref=e1149]: strong
              - text: ordering serializes all write operations through the permanent leader, which provides strong consistency, but write operations may be unavailable if the leader is down.
          - status [ref=e1150]:
            - text: ⓘ Some
            - link "shard transfer methods" [ref=e1151] [cursor=pointer]:
              - /url: "#shard-transfer-method"
            - text: may affect ordering guarantees.
          - generic [ref=e1153]:
            - generic [ref=e1156]: http
            - generic [ref=e1159]: python
            - generic [ref=e1162]: typescript
            - generic [ref=e1165]: rust
            - generic [ref=e1168]: java
