    - generic [ref=e107]:
      - generic [ref=e108]:
        - list [ref=e109]:
          - listitem [ref=e110]:
            - link "Documentation" [ref=e111] [cursor=pointer]:
              - /url: https://qdrant.tech/documentation/
          - listitem [ref=e112]
          - listitem [ref=e113]: Distributed Deployment
        - article [ref=e114]:
          - heading "Anchor Distributed deployment" [level=1] [ref=e115]:
            - link "Anchor" [ref=e116] [cursor=pointer]:
              - /url: "#distributed-deployment"
              - text: 
            - text: Distributed deployment
          - paragraph [ref=e117]: Since version v0.8.0 Qdrant supports a distributed deployment mode. In this mode, multiple Qdrant services communicate with each other to distribute the data across the peers to extend the storage capabilities and increase stability.
          - heading "Anchor How many Qdrant nodes should I run?" [level=2] [ref=e118]:
            - link "Anchor" [ref=e119] [cursor=pointer]:
              - /url: "#how-many-qdrant-nodes-should-i-run"
              - text: 
            - text: How many Qdrant nodes should I run?
          - paragraph [ref=e120]: The ideal number of Qdrant nodes depends on how much you value cost-saving, resilience, and performance/scalability in relation to each other.
          - list [ref=e121]:
            - listitem [ref=e122]:
              - paragraph [ref=e123]:
                - strong [ref=e124]: Prioritizing cost-saving
                - text: ": If cost is most important to you, run a single Qdrant node. This is not recommended for production environments. Drawbacks:"
              - list [ref=e125]:
                - listitem [ref=e126]: "Resilience: Users will experience downtime during node restarts, and recovery is not possible unless you have backups or snapshots."
                - listitem [ref=e127]: "Performance: Limited to the resources of a single server."
            - listitem [ref=e128]:
              - paragraph [ref=e129]:
                - strong [ref=e130]: Prioritizing resilience
                - text: ": If resilience is most important to you, run a Qdrant cluster with three or more nodes and two or more shard replicas. Clusters with three or more nodes and replication can perform all operations even while one node is down. Additionally, they gain performance benefits from load-balancing and they can recover from the permanent loss of one node without the need for backups or snapshots (but backups are still strongly recommended). This is most recommended for production environments. Drawbacks:"
              - list [ref=e131]:
                - listitem [ref=e132]: "Cost: Larger clusters are more costly than smaller clusters, which is the only drawback of this configuration."
            - listitem [ref=e133]:
              - paragraph [ref=e134]:
                - strong [ref=e135]: Balancing cost, resilience, and performance
                - text: ": Running a two-node Qdrant cluster with replicated shards allows the cluster to respond to most read/write requests even when one node is down, such as during maintenance events. Having two nodes also means greater performance than a single-node cluster while still being cheaper than a three-node cluster. Drawbacks:"
              - list [ref=e136]:
                - listitem [ref=e137]: "Resilience (uptime): The cluster cannot perform operations on collections when one node is down. Those operations require >50% of nodes to be running, so this is only possible in a 3+ node cluster. Since creating, editing, and deleting collections are usually rare operations, many users find this drawback to be negligible."
                - listitem [ref=e138]: "Resilience (data integrity): If the data on one of the two nodes is permanently lost or corrupted, it cannot be recovered aside from snapshots or backups. Only 3+ node clusters can recover from the permanent loss of a single node since recovery operations require >50% of the cluster to be healthy."
                - listitem [ref=e139]: "Cost: Replicating your shards requires storing two copies of your data."
                - listitem [ref=e140]: "Performance: The maximum performance of a Qdrant cluster increases as you add more nodes."
          - paragraph [ref=e141]: In summary, single-node clusters are best for non-production workloads, replicated 3+ node clusters are the gold standard, and replicated 2-node clusters strike a good balance.
          - heading "Anchor Enabling distributed mode in self-hosted Qdrant" [level=2] [ref=e142]:
            - link "Anchor" [ref=e143] [cursor=pointer]:
              - /url: "#enabling-distributed-mode-in-self-hosted-qdrant"
              - text: 
            - text: Enabling distributed mode in self-hosted Qdrant
          - paragraph [ref=e144]:
            - text: To enable distributed deployment - enable the cluster mode in the
            - link "configuration" [ref=e145] [cursor=pointer]:
              - /url: https://qdrant.tech/documentation/ops-configuration/configuration/
            - text: "or using the ENV variable:"
            - code [ref=e146]: QDRANT__CLUSTER__ENABLED=true
            - text: .
          - generic [ref=e147]:
            - code [ref=e149]:
              - generic [ref=e151]: "cluster:"
              - generic [ref=e153]: "# Use `enabled: true` to run Qdrant in distributed deployment mode"
              - generic [ref=e155]: "enabled: true"
              - generic [ref=e157]: "# Configuration of the inter-cluster communication"
              - generic [ref=e159]: "p2p:"
              - generic [ref=e161]: "# Port for internal communication between peers"
              - generic [ref=e163]: "port: 6335"
              - generic [ref=e166]: "# Configuration related to distributed consensus algorithm"
              - generic [ref=e168]: "consensus:"
              - generic [ref=e170]: "# How frequently peers should ping each other."
              - generic [ref=e172]: "# Setting this parameter to lower value will allow consensus"
              - generic [ref=e174]: "# to detect disconnected node earlier, but too frequent"
              - generic [ref=e176]: "# tick period may create significant network and CPU overhead."
              - generic [ref=e178]: "# We encourage you NOT to change this parameter unless you know what you are doing."
              - generic [ref=e180]: "tick_period_ms: 100"
            - button "Copy to clipboard" [ref=e181] [cursor=pointer]:
              - tooltip "Copy to clipboard" [ref=e182]
          - paragraph [ref=e183]:
            - text: By default, Qdrant will use port
            - code [ref=e184]: "6335"
            - text: for its internal communication. All peers should be accessible on this port from within the cluster, but make sure to isolate this port from outside access, as it might be used to perform write operations.
          - paragraph [ref=e185]:
            - text: Additionally, you must provide the
            - code [ref=e186]: "--uri"
            - text: "flag to the first peer so it can tell other nodes how it should be reached:"
          - generic [ref=e187]:
            - code [ref=e189]:
              - generic [ref=e191]: ./qdrant --uri 'http://qdrant_node_1:6335'
            - button "Copy to clipboard" [ref=e192] [cursor=pointer]:
              - tooltip "Copy to clipboard" [ref=e193]
          - paragraph [ref=e194]: Subsequent peers in a cluster must know at least one node of the existing cluster to synchronize through it with the rest of the cluster.
          - paragraph [ref=e195]: "To do this, they need to be provided with a bootstrap URL:"
          - generic [ref=e196]:
            - code [ref=e198]:
              - generic [ref=e200]: ./qdrant --bootstrap 'http://qdrant_node_1:6335'
            - button "Copy to clipboard" [ref=e201] [cursor=pointer]:
              - tooltip "Copy to clipboard" [ref=e202]
          - paragraph [ref=e203]:
            - text: The URL of the new peers themselves will be calculated automatically from the IP address of their request. But it is also possible to provide them individually using the
            - code [ref=e204]: "--uri"
            - text: argument.
          - generic [ref=e205]:
            - code [ref=e207]:
              - generic [ref=e209]: "USAGE:"
              - generic [ref=e211]: qdrant [OPTIONS]
              - generic [ref=e214]: "OPTIONS:"
              - generic [ref=e216]: "--bootstrap <URI>"
              - generic [ref=e218]: Uri of the peer to bootstrap from in case of multi-peer deployment. If not specified -
              - generic [ref=e220]: this peer will be considered as a first in a new deployment
              - generic [ref=e223]: "--uri <URI>"
              - generic [ref=e225]: Uri of this peer. Other peers should be able to reach it by this uri.
              - generic [ref=e228]: This value has to be supplied if this is the first peer in a new deployment.
              - generic [ref=e231]: In case this is not the first peer and it bootstraps the value is optional. If not
              - generic [ref=e233]: supplied then qdrant will take internal grpc port from config and derive the IP address
              - generic [ref=e235]: of this peer on bootstrap peer (receiving side)
            - button "Copy to clipboard" [ref=e236] [cursor=pointer]:
              - tooltip "Copy to clipboard" [ref=e237]
          - paragraph [ref=e238]:
            - text: After a successful synchronization you can observe the state of the cluster through the
            - link "REST API" [ref=e239] [cursor=pointer]:
              - /url: https://api.qdrant.tech/master/api-reference/distributed/cluster-status
            - text: ":"
          - generic [ref=e240]:
            - code [ref=e242]:
              - generic [ref=e244]: GET /cluster
            - button "Copy to clipboard" [ref=e245] [cursor=pointer]:
              - tooltip "Copy to clipboard" [ref=e246]
          - paragraph [ref=e247]: "Example result:"
          - generic [ref=e248]:
            - code [ref=e250]:
              - generic [ref=e252]: "{"
              - generic [ref=e254]: "\"result\": {"
              - generic [ref=e256]: "\"status\": \"enabled\","
              - generic [ref=e258]: "\"peer_id\": 11532566549086892000,"
              - generic [ref=e260]: "\"peers\": {"
              - generic [ref=e262]: "\"9834046559507417430\": {"
              - generic [ref=e264]: "\"uri\": \"http://172.18.0.3:6335/\""
              - generic [ref=e266]: "},"
              - generic [ref=e268]: "\"11532566549086892528\": {"
              - generic [ref=e270]: "\"uri\": \"http://qdrant_node_1:6335/\""
              - generic [ref=e272]: "}"
              - generic [ref=e274]: "},"
              - generic [ref=e276]: "\"raft_info\": {"
              - generic [ref=e278]: "\"term\": 1,"
              - generic [ref=e280]: "\"commit\": 4,"
              - generic [ref=e282]: "\"pending_operations\": 1,"
              - generic [ref=e284]: "\"leader\": 11532566549086892000,"
              - generic [ref=e286]: "\"role\": \"Leader\""
              - generic [ref=e288]: "}"
              - generic [ref=e290]: "},"
              - generic [ref=e292]: "\"status\": \"ok\","
              - generic [ref=e294]: "\"time\": 5.731e-06"
              - generic [ref=e296]: "}"
            - button "Copy to clipboard" [ref=e297] [cursor=pointer]:
              - tooltip "Copy to clipboard" [ref=e298]
          - paragraph [ref=e299]:
            - text: Note that enabling distributed mode does not automatically replicate your data. See the section on
            - link "making use of a new distributed Qdrant cluster" [ref=e300] [cursor=pointer]:
              - /url: "#making-use-of-a-new-distributed-qdrant-cluster"
            - text: for the next steps.
          - heading "Anchor Enabling distributed mode in Qdrant Cloud" [level=2] [ref=e301]:
            - link "Anchor" [ref=e302] [cursor=pointer]:
              - /url: "#enabling-distributed-mode-in-qdrant-cloud"
              - text: 
            - text: Enabling distributed mode in Qdrant Cloud
          - paragraph [ref=e303]: For best results, first ensure your cluster is running Qdrant v1.7.4 or higher. Older versions of Qdrant do support distributed mode, but improvements in v1.7.4 make distributed clusters more resilient during outages.
          - paragraph [ref=e304]:
            - text: In the
            - link "Qdrant Cloud console" [ref=e305] [cursor=pointer]:
              - /url: https://cloud.qdrant.io/?__hstc=265983056.4739a70787d3320b724aaef5393ff57a.1780095965025.1780095965025.1780095965025.1&__hssc=265983056.1.1780095965025&__hsfp=97dd48aaab4ec16eeede391435d2a4fd
            - text: ", click “Scale Up” to increase your cluster size to >1. Qdrant Cloud configures the distributed mode settings automatically."
          - paragraph [ref=e306]:
            - text: Additionally, Qdrant Cloud also offers the ability to automatically rebalance and to reshard your collections, which is not available in self-hosted Qdrant. See the
            - link "Resharding" [ref=e307] [cursor=pointer]:
              - /url: https://qdrant.tech/documentation/cloud/cluster-scaling/#resharding
            - text: and
            - link "Shard Rebalancing" [ref=e308] [cursor=pointer]:
              - /url: https://qdrant.tech/documentation/cloud/configure-cluster/#shard-rebalancing
            - text: sections in for more details.
          - paragraph [ref=e309]: After the scale-up process completes, you will have a new empty node running alongside your existing node(s). To replicate data into this new empty node, see the next section.
          - heading "Anchor Making use of a new distributed Qdrant cluster" [level=2] [ref=e310]:
            - link "Anchor" [ref=e311] [cursor=pointer]:
              - /url: "#making-use-of-a-new-distributed-qdrant-cluster"
              - text: 
            - text: Making use of a new distributed Qdrant cluster
          - paragraph [ref=e312]: "When you enable distributed mode and scale up to two or more nodes, your data does not move to the new node automatically; it starts out empty. To make use of your new empty node, do one of the following:"
          - list [ref=e313]:
            - listitem [ref=e314]:
              - text: Create a new replicated collection by setting the
              - link "replication_factor" [ref=e315] [cursor=pointer]:
                - /url: "#replication-factor"
              - text: to 2 or more and setting the
              - link "number of shards" [ref=e316] [cursor=pointer]:
                - /url: "#choosing-the-right-number-of-shards"
              - text: to a multiple of your number of nodes.
            - listitem [ref=e317]: If you have an existing collection which does not contain enough shards for each node, you must create a new collection as described in the previous bullet point.
            - listitem [ref=e318]:
              - text: If you already have enough shards for each node, and you merely need to replicate your data, follow the directions for
              - link "creating new shard replicas" [ref=e319] [cursor=pointer]:
                - /url: "#creating-new-shard-replicas"
              - text: .
            - listitem [ref=e320]:
              - text: If you already have enough shards for each node, and your data is already replicated, you can move data (without replicating it) onto the new node(s) by
              - link "moving shards" [ref=e321] [cursor=pointer]:
                - /url: "#moving-shards"
              - text: .
          - heading "Anchor Raft" [level=2] [ref=e322]:
            - link "Anchor" [ref=e323] [cursor=pointer]:
              - /url: "#raft"
              - text: 
            - text: Raft
          - paragraph [ref=e324]:
            - text: Qdrant uses the
            - link "Raft" [ref=e325] [cursor=pointer]:
              - /url: https://raft.github.io/
            - text: consensus protocol to maintain consistency regarding the cluster topology and the collections structure.
          - paragraph [ref=e326]:
            - text: Operations on points, on the other hand, do not go through the consensus infrastructure. Qdrant is not intended to have strong transaction guarantees, which allows it to perform point operations with low overhead. In practice, it means that Qdrant does not guarantee atomic distributed updates but allows you to wait until the
            - link "operation is complete" [ref=e327] [cursor=pointer]:
              - /url: https://qdrant.tech/documentation/manage-data/points/#awaiting-result
            - text: to see the results of your writes.
          - paragraph [ref=e328]: Operations on collections, on the contrary, are part of the consensus which guarantees that all operations are durable and eventually executed by all nodes. In practice it means that a majority of nodes agree on what operations should be applied before the service will perform them.
          - paragraph [ref=e329]: Practically, it means that if the cluster is in a transition state - either electing a new leader after a failure or starting up, the collection update operations will be denied.
          - paragraph [ref=e330]:
            - text: You may use the cluster
            - link "REST API" [ref=e331] [cursor=pointer]:
              - /url: https://api.qdrant.tech/master/api-reference/distributed/cluster-status
            - text: to check the state of the consensus.
          - heading "Anchor Sharding" [level=2] [ref=e332]:
            - link "Anchor" [ref=e333] [cursor=pointer]:
              - /url: "#sharding"
              - text: 
            - text: Sharding
          - paragraph [ref=e334]: "A Collection in Qdrant is made of one or more shards. A shard is an independent store of points which is able to perform all operations provided by collections. There are two methods of distributing points across shards:"
          - list [ref=e335]:
            - listitem [ref=e336]:
              - paragraph [ref=e337]:
                - strong [ref=e338]: Automatic sharding
                - text: ": Points are distributed among shards by using a"
                - link "consistent hashing" [ref=e339] [cursor=pointer]:
                  - /url: https://en.wikipedia.org/wiki/Consistent_hashing
                - text: algorithm, so that shards are managing non-intersecting subsets of points. This is the default behavior.
            - listitem [ref=e340]:
              - paragraph [ref=e341]:
                - strong [ref=e342]: User-defined sharding
                - text: ":"
                - emphasis [ref=e343]: Available as of v1.7.0
                - text: "- Each point is uploaded to a specific shard, so that operations can hit only the shard or shards they need. Even with this distribution, shards still ensure having non-intersecting subsets of points."
                - link "See more…" [ref=e344] [cursor=pointer]:
                  - /url: "#user-defined-sharding"
          - paragraph [ref=e345]:
            - text: Each node knows where all parts of the collection are stored through the
            - link "consensus protocol" [ref=e346] [cursor=pointer]:
              - /url: "#raft"
            - text: ", so when you send a search request to one Qdrant node, it automatically queries all other nodes to obtain the full search result."
          - heading "Anchor Choosing the right number of shards" [level=3] [ref=e347]:
            - link "Anchor" [ref=e348] [cursor=pointer]:
              - /url: "#choosing-the-right-number-of-shards"
              - text: 
            - text: Choosing the right number of shards
          - paragraph [ref=e349]:
            - text: When you create a collection, Qdrant splits the collection into
            - code [ref=e350]: shard_number
            - text: shards. If left unset,
            - code [ref=e351]: shard_number
            - text: is set to the number of nodes in your cluster when the collection was created. The
            - code [ref=e352]: shard_number
            - text: cannot be changed without recreating the collection.
          - generic [ref=e354]:
            - generic [ref=e357]: http
            - generic [ref=e360]: python
            - generic [ref=e363]: typescript
            - generic [ref=e366]: rust
            - generic [ref=e369]: java
            - generic [ref=e372]: csharp
            - generic [ref=e375]: go
          - generic [ref=e377]:
            - code [ref=e379]:
              - generic [ref=e381]: "PUT /collections/{collection_name}"
              - generic [ref=e383]: "{"
              - generic [ref=e385]: "\"vectors\": {"
              - generic [ref=e387]: "\"size\": 300,"
              - generic [ref=e389]: "\"distance\": \"Cosine\""
              - generic [ref=e391]: "},"
              - generic [ref=e393]: "\"shard_number\": 6"
              - generic [ref=e395]: "}"
            - button "Copy to clipboard" [ref=e396] [cursor=pointer]:
              - tooltip "Copy to clipboard" [ref=e397]
          - paragraph [ref=e398]: To ensure all nodes in your cluster are evenly utilized, the number of shards must be a multiple of the number of nodes you are currently running in your cluster.
          - blockquote [ref=e399]:
            - paragraph [ref=e400]:
              - text: "Aside: Advanced use cases such as multitenancy may require an uneven distribution of shards. See"
              - link "Multitenancy" [ref=e401] [cursor=pointer]:
                - /url: https://qdrant.tech/articles/multitenancy/
              - text: .
          - paragraph [ref=e402]:
            - text: We recommend creating at least 2 shards per node to allow future expansion without having to re-shard.
            - link "Resharding" [ref=e403] [cursor=pointer]:
              - /url: "#resharding"
            - text: is possible when using our cloud offering, but should be avoided if hosting elsewhere as it would require creating a new collection.
          - paragraph [ref=e404]: If you anticipate a lot of growth, we recommend 12 shards since you can expand from 1 node up to 2, 3, 6, and 12 nodes without having to re-shard. Having more than 12 shards in a small cluster may not be worth the performance overhead.
          - paragraph [ref=e405]: Shards are evenly distributed across all existing nodes when a collection is first created.
          - paragraph [ref=e406]: "When you add or remove nodes from the cluster, rebalancing of existing shards across the nodes depends on how you’ve deployed the cluster:"
          - list [ref=e407]:
            - listitem [ref=e408]:
              - text: In Qdrant Cloud, shards are
              - link "balanced across the nodes automatically" [ref=e409] [cursor=pointer]:
                - /url: https://qdrant.tech/documentation/cloud/configure-cluster/#shard-rebalancing
              - text: .
            - listitem [ref=e410]:
              - text: If your cluster is not running in Qdrant Cloud, you need to
              - link "manually balance shards" [ref=e411] [cursor=pointer]:
                - /url: "#moving-shards"
              - text: .
          - heading "Anchor Resharding" [level=3] [ref=e412]:
            - link "Anchor" [ref=e413] [cursor=pointer]:
              - /url: "#resharding"
              - text: 
            - text: Resharding
          - paragraph [ref=e414]:
            - emphasis [ref=e415]: Available as of v1.13.0 in Cloud
          - paragraph [ref=e416]:
            - text: Resharding allows you to change the number of shards in your existing collections if you’re hosting with our
            - link "Cloud" [ref=e417] [cursor=pointer]:
              - /url: https://qdrant.tech/documentation/deploy-intro/
            - text: offering.
          - paragraph [ref=e418]: Resharding can change the number of shards both up and down, without having to recreate the collection from scratch.
          - paragraph [ref=e419]:
            - text: Please refer to the
            - link "Resharding" [ref=e420] [cursor=pointer]:
              - /url: https://qdrant.tech/documentation/cloud/cluster-scaling/#resharding
            - text: section in our cloud documentation for more details.
          - heading "Anchor Moving shards" [level=3] [ref=e421]:
            - link "Anchor" [ref=e422] [cursor=pointer]:
              - /url: "#moving-shards"
              - text: 
            - text: Moving shards
          - paragraph [ref=e423]:
            - emphasis [ref=e424]: Available as of v0.9.0
          - paragraph [ref=e425]: Qdrant allows moving shards between nodes in the cluster and removing nodes from the cluster. This functionality unlocks the ability to dynamically scale the cluster size without downtime. It also allows you to upgrade or migrate nodes without downtime.
          - paragraph [ref=e426]:
            - text: If your cluster is running in Qdrant Cloud, shards are balanced across the cluster nodes automatically. For more information see the
            - link "Configuring Cloud Clusters" [ref=e427] [cursor=pointer]:
              - /url: https://qdrant.tech/documentation/cloud/configure-cluster/#shard-rebalancing
            - text: and
            - link "Cloud Cluster Scaling" [ref=e428] [cursor=pointer]:
              - /url: https://qdrant.tech/documentation/cloud/cluster-scaling/
            - text: documentation.
          - paragraph [ref=e429]:
            - text: Qdrant provides the information regarding the current shard distribution in the cluster with the
            - link "Collection Cluster info API" [ref=e430] [cursor=pointer]:
              - /url: https://api.qdrant.tech/master/api-reference/distributed/collection-cluster-info
            - text: .
          - paragraph [ref=e431]:
            - text: Use the
            - link "Update collection cluster setup API" [ref=e432] [cursor=pointer]:
              - /url: https://api.qdrant.tech/master/api-reference/distributed/update-collection-cluster
            - text: "to initiate the shard transfer:"
          - generic [ref=e433]:
            - code [ref=e435]:
              - generic [ref=e437]: "POST /collections/{collection_name}/cluster"
              - generic [ref=e439]: "{"
              - generic [ref=e441]: "\"move_shard\": {"
              - generic [ref=e443]: "\"shard_id\": 0,"
              - generic [ref=e445]: "\"from_peer_id\": 381894127,"
              - generic [ref=e447]: "\"to_peer_id\": 467122995"
              - generic [ref=e449]: "}"
              - generic [ref=e451]: "}"
            - button "Copy to clipboard" [ref=e452] [cursor=pointer]:
              - tooltip "Copy to clipboard" [ref=e453]
          - status [ref=e454]:
            - text: ⓘ You likely want to select a specific
            - link "shard transfer method" [ref=e455] [cursor=pointer]:
              - /url: "#shard-transfer-method"
            - text: to get desired performance and guarantees.
          - paragraph [ref=e456]:
            - text: After the transfer is initiated, the service will process it based on the used
            - link "transfer method" [ref=e457] [cursor=pointer]:
              - /url: "#shard-transfer-method"
            - text: keeping both shards in sync. Once the transfer is completed, the old shard is deleted from the source node.
          - paragraph [ref=e458]:
            - text: In case you want to downscale the cluster, you can move all shards away from a peer and then remove the peer using the
            - link "remove peer API" [ref=e459] [cursor=pointer]:
              - /url: https://api.qdrant.tech/master/api-reference/distributed/remove-peer
            - text: .
          - generic [ref=e460]:
            - code [ref=e462]:
              - generic [ref=e464]: "DELETE /cluster/peer/{peer_id}"
            - button "Copy to clipboard" [ref=e465] [cursor=pointer]:
              - tooltip "Copy to clipboard" [ref=e466]
          - paragraph [ref=e467]: After that, Qdrant will exclude the node from the consensus, and the instance will be ready for shutdown.
          - heading "Anchor User-defined sharding" [level=3] [ref=e468]:
            - link "Anchor" [ref=e469] [cursor=pointer]:
              - /url: "#user-defined-sharding"
              - text: 
            - text: User-defined sharding
          - paragraph [ref=e470]:
            - emphasis [ref=e471]: Available as of v1.7.0
          - paragraph [ref=e472]: Qdrant allows you to specify the shard for each point individually. This feature is useful if you want to control the shard placement of your data, so that operations can hit only the subset of shards they actually need. In big clusters, this can significantly improve the performance of operations that do not require the whole collection to be scanned.
          - paragraph [ref=e473]: A clear use-case for this feature is managing a multi-tenant collection, where each tenant (let it be a user or organization) is assumed to be segregated, so they can have their data stored in separate shards.
          - paragraph [ref=e474]:
            - text: To enable user-defined sharding, set
            - code [ref=e475]: sharding_method
            - text: to
            - code [ref=e476]: custom
            - text: "during collection creation:"
          - generic [ref=e478]:
            - generic [ref=e481]: http
            - generic [ref=e484]: python
            - generic [ref=e487]: typescript
            - generic [ref=e490]: rust
            - generic [ref=e493]: java
            - generic [ref=e496]: csharp
            - generic [ref=e499]: go
          - generic [ref=e501]:
            - code [ref=e503]:
              - generic [ref=e505]: "PUT /collections/{collection_name}"
              - generic [ref=e507]: "{"
              - generic [ref=e509]: "\"shard_number\": 1,"
              - generic [ref=e511]: "\"sharding_method\": \"custom\""
              - generic [ref=e513]: // ... other collection parameters
              - generic [ref=e515]: "}"
            - button "Copy to clipboard" [ref=e516] [cursor=pointer]:
              - tooltip "Copy to clipboard" [ref=e517]
          - paragraph [ref=e518]:
            - text: In this mode, the
            - code [ref=e519]: shard_number
            - text: "means the number of shards per shard key, where points will be distributed evenly. For example, if you have 10 shard keys and a collection config with these settings:"
          - generic [ref=e520]:
            - code [ref=e522]:
              - generic [ref=e524]: "{"
              - generic [ref=e526]: "\"shard_number\": 1,"
              - generic [ref=e528]: "\"sharding_method\": \"custom\","
              - generic [ref=e530]: "\"replication_factor\": 2"
              - generic [ref=e532]: "}"
            - button "Copy to clipboard" [ref=e533] [cursor=pointer]:
              - tooltip "Copy to clipboard" [ref=e534]
          - paragraph [ref=e535]:
            - text: Then you will have
            - code [ref=e536]: 1 * 10 * 2 = 20
            - text: total physical shards in the collection.
          - paragraph [ref=e537]: Physical shards require a large amount of resources, so make sure your custom sharding key has a low cardinality.
          - paragraph [ref=e538]:
            - text: For large cardinality keys, it is recommended to use
            - link "partition by payload" [ref=e539] [cursor=pointer]:
              - /url: https://qdrant.tech/documentation/manage-data/multitenancy/#partition-by-payload
            - text: instead.
          - paragraph [ref=e540]:
            - text: Now you need to create custom shards (
            - link "API reference" [ref=e541] [cursor=pointer]:
              - /url: https://api.qdrant.tech/api-reference/distributed/create-shard-key#request
            - text: "):"
          - generic [ref=e543]:
            - generic [ref=e546]: http
            - generic [ref=e549]: python
            - generic [ref=e552]: typescript
            - generic [ref=e555]: rust
            - generic [ref=e558]: java
            - generic [ref=e561]: csharp
            - generic [ref=e564]: go
          - generic [ref=e566]:
            - code [ref=e568]:
              - generic [ref=e570]: "PUT /collections/{collection_name}/shards"
              - generic [ref=e572]: "{"
              - generic [ref=e574]: "\"shard_key\": \"{shard_key}\""
              - generic [ref=e576]: "}"
            - button "Copy to clipboard" [ref=e577] [cursor=pointer]:
              - tooltip "Copy to clipboard" [ref=e578]
          - paragraph [ref=e579]: "You can list all custom shard keys in a collection:"
          - generic [ref=e581]:
            - generic [ref=e584]: http
            - generic [ref=e587]: python
            - generic [ref=e590]: typescript
            - generic [ref=e593]: rust
            - generic [ref=e596]: java
            - generic [ref=e599]: csharp
            - generic [ref=e602]: go
          - generic [ref=e604]:
            - code [ref=e606]:
              - generic [ref=e608]: "GET /collections/{collection_name}/shards"
            - button "Copy to clipboard" [ref=e609] [cursor=pointer]:
              - tooltip "Copy to clipboard" [ref=e610]
          - paragraph [ref=e611]:
            - text: To specify the shard for each point, you need to provide the
            - code [ref=e612]: shard_key
            - text: "field in the upsert request:"
          - generic [ref=e614]:
            - generic [ref=e617]: http
            - generic [ref=e620]: python
            - generic [ref=e623]: typescript
            - generic [ref=e626]: rust
            - generic [ref=e629]: java
            - generic [ref=e632]: csharp
            - generic [ref=e635]: go
          - generic [ref=e637]:
            - code [ref=e639]:
              - generic [ref=e641]: "PUT /collections/{collection_name}/points"
              - generic [ref=e643]: "{"
              - generic [ref=e645]: "\"points\": ["
              - generic [ref=e647]: "{"
              - generic [ref=e649]: "\"id\": 1111,"
              - generic [ref=e651]: "\"vector\": [0.1, 0.2, 0.3]"
              - generic [ref=e653]: "},"
              - generic [ref=e655]: "],"
              - generic [ref=e657]: "\"shard_key\": \"user_1\""
              - generic [ref=e659]: "}"
            - button "Copy to clipboard" [ref=e660] [cursor=pointer]:
              - tooltip "Copy to clipboard" [ref=e661]
          - alert [ref=e662]:
            - text: ⚠ Using the same point ID across multiple shard keys is
            - strong [ref=e663]:
              - text: not supported
              - superscript [ref=e664]: "*"
            - text: and should be avoided.
          - superscript [ref=e665]:
            - strong [ref=e666]: "*"
            - text: When using custom sharding, IDs are only enforced to be unique within a shard key. This means that you can have multiple points with the same ID, if they have different shard keys. This is a limitation of the current implementation, and is an anti-pattern that should be avoided because it can create scenarios of points with the same ID to have different contents. In the future, we plan to add a global ID uniqueness check.
          - paragraph [ref=e667]:
            - text: Now you can target the operations to specific shard(s) by specifying the
            - code [ref=e668]: shard_key
            - text: on any operation you do. Operations that do not specify the shard key will be executed on
            - strong [ref=e669]: all
            - text: shards.
          - paragraph [ref=e670]: Another use-case would be to have shards that track the data chronologically, so that you can do more complex itineraries like uploading live data in one shard and archiving it once a certain age has passed.
          - img "Sharding per day" [ref=e671]
          - heading "Anchor Shard transfer method" [level=3] [ref=e672]:
            - link "Anchor" [ref=e673] [cursor=pointer]:
              - /url: "#shard-transfer-method"
              - text: 
            - text: Shard transfer method
          - paragraph [ref=e674]:
            - emphasis [ref=e675]: Available as of v1.7.0
          - paragraph [ref=e676]: There are different methods for transferring a shard, such as moving or replicating, to another node. Depending on what performance and guarantees you’d like to have and how you’d like to manage your cluster, you likely want to choose a specific method. Each method has its own pros and cons. Which is fastest depends on the size and state of a shard.
          - paragraph [ref=e677]: "Available shard transfer methods are:"
          - list [ref=e678]:
            - listitem [ref=e679]:
              - code [ref=e680]: stream_records
              - text: ":"
              - emphasis [ref=e681]: (default)
              - text: transfer by streaming just its records to the target node in batches.
            - listitem [ref=e682]:
              - code [ref=e683]: snapshot
              - text: ": transfer including its index and quantized data by utilizing a"
              - link "snapshot" [ref=e684] [cursor=pointer]:
                - /url: https://qdrant.tech/documentation/snapshots/
              - text: automatically.
            - listitem [ref=e685]:
              - code [ref=e686]: wal_delta
              - text: ":"
              - emphasis [ref=e687]: (auto recovery default)
              - text: transfer by resolving
              - link "WAL" [ref=e688] [cursor=pointer]:
                - /url: https://qdrant.tech/documentation/manage-data/storage/#versioning
              - text: difference; the operations that were missed.
          - paragraph [ref=e689]: "Each has pros, cons and specific requirements, some of which are:"
          - table [ref=e691]:
            - rowgroup [ref=e692]:
              - 'row "Method: Stream records Snapshot WAL delta" [ref=e693]':
                - columnheader "Method:" [ref=e694]
                - columnheader "Stream records" [ref=e695]
                - columnheader "Snapshot" [ref=e696]
                - columnheader "WAL delta" [ref=e697]
            - rowgroup [ref=e698]:
              - row "Version v0.8.0+ v1.7.0+ v1.8.0+" [ref=e699]:
                - cell "Version" [ref=e700]:
                  - strong [ref=e701]: Version
                - cell "v0.8.0+" [ref=e702]
                - cell "v1.7.0+" [ref=e703]
                - cell "v1.8.0+" [ref=e704]
              - row "Target New/existing shard New/existing shard Existing shard" [ref=e705]:
                - cell "Target" [ref=e706]:
                  - strong [ref=e707]: Target
                - cell "New/existing shard" [ref=e708]
                - cell "New/existing shard" [ref=e709]
                - cell "Existing shard" [ref=e710]
              - row "Connectivity Internal gRPC API (6335) REST API (6333) Internal gRPC API (6335) Internal gRPC API (6335)" [ref=e711]:
                - cell "Connectivity" [ref=e712]:
                  - strong [ref=e713]: Connectivity
                - cell "Internal gRPC API (6335)" [ref=e714]:
                  - text: Internal gRPC API
                  - generic [ref=e715]: (6335)
                - cell "REST API (6333) Internal gRPC API (6335)" [ref=e716]:
                  - text: REST API
                  - generic [ref=e717]: (6333)
                  - text: Internal gRPC API
                  - generic [ref=e718]: (6335)
                - cell "Internal gRPC API (6335)" [ref=e719]:
                  - text: Internal gRPC API
                  - generic [ref=e720]: (6335)
              - row "HNSW index Doesn’t transfer, will reindex on target. Does transfer, immediately ready on target. Doesn’t transfer, may index on target." [ref=e721]:
                - cell "HNSW index" [ref=e722]:
                  - strong [ref=e723]: HNSW index
                - cell "Doesn’t transfer, will reindex on target." [ref=e724]
                - cell "Does transfer, immediately ready on target." [ref=e725]
                - cell "Doesn’t transfer, may index on target." [ref=e726]
              - row "Quantization Doesn’t transfer, will requantize on target. Does transfer, immediately ready on target. Doesn’t transfer, may quantize on target." [ref=e727]:
                - cell "Quantization" [ref=e728]:
                  - strong [ref=e729]: Quantization
                - cell "Doesn’t transfer, will requantize on target." [ref=e730]
                - cell "Does transfer, immediately ready on target." [ref=e731]
                - cell "Doesn’t transfer, may quantize on target." [ref=e732]
              - row "Ordering Unordered updates on target1 Ordered updates on target2 Ordered updates on target2" [ref=e733]:
                - cell "Ordering" [ref=e734]:
                  - strong [ref=e735]: Ordering
                - cell "Unordered updates on target1" [ref=e736]:
                  - text: Unordered updates on target
                  - superscript [ref=e737]:
                    - link "1" [ref=e738] [cursor=pointer]:
                      - /url: "#fn:1"
                - cell "Ordered updates on target2" [ref=e739]:
                  - text: Ordered updates on target
                  - superscript [ref=e740]:
                    - link "2" [ref=e741] [cursor=pointer]:
                      - /url: "#fn:2"
                - cell "Ordered updates on target2" [ref=e742]:
                  - text: Ordered updates on target
                  - superscript [ref=e743]:
                    - link "2" [ref=e744] [cursor=pointer]:
                      - /url: "#fn:2"
              - row "Disk space No extra required Extra required for snapshot on both nodes No extra required" [ref=e745]:
                - cell "Disk space" [ref=e746]:
                  - strong [ref=e747]: Disk space
                - cell "No extra required" [ref=e748]
                - cell "Extra required for snapshot on both nodes" [ref=e749]
                - cell "No extra required" [ref=e750]
          - paragraph [ref=e751]:
            - text: To select a shard transfer method, specify the
            - code [ref=e752]: method
            - text: "like:"
          - generic [ref=e753]:
            - code [ref=e755]:
              - generic [ref=e757]: "POST /collections/{collection_name}/cluster"
              - generic [ref=e759]: "{"
              - generic [ref=e761]: "\"move_shard\": {"
              - generic [ref=e763]: "\"shard_id\": 0,"
              - generic [ref=e765]: "\"from_peer_id\": 381894127,"
              - generic [ref=e767]: "\"to_peer_id\": 467122995,"
              - generic [ref=e769]: "\"method\": \"snapshot\""
              - generic [ref=e771]: "}"
              - generic [ref=e773]: "}"
            - button "Copy to clipboard" [ref=e774] [cursor=pointer]:
              - tooltip "Copy to clipboard" [ref=e775]
          - paragraph [ref=e776]:
            - text: The
            - code [ref=e777]: stream_records
            - text: "transfer method is the simplest available. It simply transfers all shard records in batches to the target node until it has transferred all of them, keeping both shards in sync. It will also make sure the transferred shard indexing process is keeping up before performing a final switch. The method has two common disadvantages: 1. It does not transfer index or quantization data, meaning that the shard has to be optimized again on the new node, which can be very expensive. 2. The ordering guarantees are"
            - code [ref=e778]: weak
            - superscript [ref=e779]:
              - link "1" [ref=e780] [cursor=pointer]:
                - /url: "#fn:1"
            - text: ", which is not suitable for some applications. Because it is so simple, it’s also very robust, making it a reliable choice if the above cons are acceptable in your use case. If your cluster is unstable and out of resources, it’s probably best to use the"
            - code [ref=e781]: stream_records
            - text: transfer method, because it is unlikely to fail.
          - paragraph [ref=e782]:
            - text: The
            - code [ref=e783]: snapshot
            - text: transfer method utilizes
            - link "snapshots" [ref=e784] [cursor=pointer]:
              - /url: https://qdrant.tech/documentation/snapshots/
            - text: "to transfer a shard. A snapshot is created automatically. It is then transferred and restored on the target node. After this is done, the snapshot is removed from both nodes. While the snapshot/transfer/restore operation is happening, the source node queues up all new operations. All queued updates are then sent in order to the target shard to bring it into the same state as the source. There are two important benefits: 1. It transfers index and quantization data, so that the shard does not have to be optimized again on the target node, making them immediately available. This way, Qdrant ensures that there will be no degradation in performance at the end of the transfer. Especially on large shards, this can give a huge performance improvement. 2. The ordering guarantees can be"
            - code [ref=e785]: strong
            - superscript [ref=e786]:
              - link "2" [ref=e787] [cursor=pointer]:
                - /url: "#fn:2"
            - text: ", required for some applications."
          - paragraph [ref=e788]:
            - text: The
            - code [ref=e789]: wal_delta
            - text: transfer method only transfers the difference between two shards. More specifically, it transfers all operations that were missed to the target shard. The
            - link "WAL" [ref=e790] [cursor=pointer]:
              - /url: https://qdrant.tech/documentation/manage-data/storage/#versioning
            - text: "of both shards is used to resolve this. There are two benefits: 1. It will be very fast because it only transfers the difference rather than all data. 2. The ordering guarantees can be"
            - code [ref=e791]: strong
            - superscript [ref=e792]:
              - link "2" [ref=e793] [cursor=pointer]:
                - /url: "#fn:2"
            - text: ", required for some applications. Two disadvantages are: 1. It can only be used to transfer to a shard that already exists on the other node. 2. Applicability is limited because the WALs normally don’t hold more than 64MB of recent operations. But that should be enough for a node that quickly restarts, to upgrade for example. If a delta cannot be resolved, this method automatically falls back to"
            - code [ref=e794]: stream_records
            - text: which equals transferring the full shard.
          - paragraph [ref=e795]:
            - text: The
            - code [ref=e796]: stream_records
            - text: method is currently used as default. This may change in the future. As of Qdrant 1.9.0
            - code [ref=e797]: wal_delta
            - text: is used for automatic shard replications to recover dead shards.
          - heading "Anchor Replication" [level=2] [ref=e798]:
            - link "Anchor" [ref=e799] [cursor=pointer]:
              - /url: "#replication"
              - text: 
            - text: Replication
          - paragraph [ref=e800]: Qdrant allows you to replicate shards between nodes in the cluster.
          - paragraph [ref=e801]: Shard replication increases the reliability of the cluster by keeping several copies of a shard spread across the cluster. This ensures the availability of the data in case of node failures, except if all replicas are lost.
          - heading "Anchor Replication factor" [level=3] [ref=e802]:
            - link "Anchor" [ref=e803] [cursor=pointer]:
              - /url: "#replication-factor"
              - text: 
            - text: Replication factor
          - paragraph [ref=e804]:
            - text: When you create a collection, you can control how many shard replicas you’d like to store by changing the
            - code [ref=e805]: replication_factor
            - text: . By default,
            - code [ref=e806]: replication_factor
            - text: is set to “1”, meaning no additional copy is maintained automatically. The default can be changed in the
            - link "Qdrant configuration" [ref=e807] [cursor=pointer]:
              - /url: https://qdrant.tech/documentation/ops-configuration/configuration/#configuration-options
            - text: . You can change that by setting the
            - code [ref=e808]: replication_factor
            - text: when you create a collection.
          - paragraph [ref=e809]:
            - text: The
            - code [ref=e810]: replication_factor
            - text: can be updated for an existing collection, but the effect of this depends on how you’re running Qdrant. If you’re hosting the open source version of Qdrant yourself, changing the replication factor after collection creation doesn’t do anything. You can manually
            - link "create" [ref=e811] [cursor=pointer]:
              - /url: "#creating-new-shard-replicas"
            - text: or drop shard replicas to achieve your desired replication factor. In Qdrant Cloud (including Hybrid Cloud, Private Cloud) your shards will automatically be replicated or dropped to match your configured replication factor.
          - generic [ref=e813]:
            - generic [ref=e816]: http
            - generic [ref=e819]: python
            - generic [ref=e822]: typescript
            - generic [ref=e825]: rust
            - generic [ref=e828]: java
            - generic [ref=e831]: csharp
            - generic [ref=e834]: go
          - generic [ref=e836]:
            - code [ref=e838]:
              - generic [ref=e840]: "PUT /collections/{collection_name}"
              - generic [ref=e842]: "{"
              - generic [ref=e844]: "\"vectors\": {"
              - generic [ref=e846]: "\"size\": 300,"
              - generic [ref=e848]: "\"distance\": \"Cosine\""
              - generic [ref=e850]: "},"
              - generic [ref=e852]: "\"shard_number\": 6,"
              - generic [ref=e854]: "\"replication_factor\": 2"
              - generic [ref=e856]: "}"
            - button "Copy to clipboard" [ref=e857] [cursor=pointer]:
              - tooltip "Copy to clipboard" [ref=e858]
          - paragraph [ref=e859]: This code sample creates a collection with a total of 6 logical shards backed by a total of 12 physical shards.
          - paragraph [ref=e860]: Since a replication factor of “2” would require twice as much storage space, it is advised to make sure the hardware can host the additional shard replicas beforehand.
          - heading "Anchor Creating new shard replicas" [level=3] [ref=e861]:
            - link "Anchor" [ref=e862] [cursor=pointer]:
              - /url: "#creating-new-shard-replicas"
              - text: 
            - text: Creating new shard replicas
          - paragraph [ref=e863]:
            - text: It is possible to create or delete replicas manually on an existing collection using the
            - link "Update collection cluster setup API" [ref=e864] [cursor=pointer]:
              - /url: https://api.qdrant.tech/master/api-reference/distributed/update-collection-cluster
            - text: . This is usually only necessary if you run Qdrant open-source. In Qdrant Cloud shard replication is handled and updated automatically, matching the configured
            - code [ref=e865]: replication_factor
            - text: .
          - paragraph [ref=e866]: A replica can be added on a specific peer by specifying the peer from which to replicate.
          - generic [ref=e867]:
            - code [ref=e869]:
              - generic [ref=e871]: "POST /collections/{collection_name}/cluster"
              - generic [ref=e873]: "{"
              - generic [ref=e875]: "\"replicate_shard\": {"
              - generic [ref=e877]: "\"shard_id\": 0,"
              - generic [ref=e879]: "\"from_peer_id\": 381894127,"
              - generic [ref=e881]: "\"to_peer_id\": 467122995"
              - generic [ref=e883]: "}"
              - generic [ref=e885]: "}"
            - button "Copy to clipboard" [ref=e886] [cursor=pointer]:
              - tooltip "Copy to clipboard" [ref=e887]
          - status [ref=e888]:
            - text: ⓘ You likely want to select a specific
            - link "shard transfer method" [ref=e889] [cursor=pointer]:
              - /url: "#shard-transfer-method"
            - text: to get desired performance and guarantees.
          - paragraph [ref=e890]: And a replica can be removed on a specific peer.
          - generic [ref=e891]:
            - code [ref=e893]:
              - generic [ref=e895]: "POST /collections/{collection_name}/cluster"
              - generic [ref=e897]: "{"
              - generic [ref=e899]: "\"drop_replica\": {"
              - generic [ref=e901]: "\"shard_id\": 0,"
              - generic [ref=e903]: "\"peer_id\": 381894127"
              - generic [ref=e905]: "}"
              - generic [ref=e907]: "}"
            - button "Copy to clipboard" [ref=e908] [cursor=pointer]:
              - tooltip "Copy to clipboard" [ref=e909]
          - paragraph [ref=e910]: Keep in mind that a collection must contain at least one active replica of a shard.
          - heading "Anchor Error handling" [level=3] [ref=e911]:
            - link "Anchor" [ref=e912] [cursor=pointer]:
              - /url: "#error-handling"
              - text: 
            - text: Error handling
          - paragraph [ref=e913]: "Replicas can be in different states:"
          - list [ref=e914]:
            - listitem [ref=e915]: "Active: healthy and ready to serve traffic"
            - listitem [ref=e916]: "Dead: unhealthy and not ready to serve traffic"
            - listitem [ref=e917]: "Partial: currently under resynchronization before activation"
          - paragraph [ref=e918]: A replica is marked as dead if it does not respond to internal healthchecks or if it fails to serve traffic.
          - paragraph [ref=e919]: A dead replica will not receive traffic from other peers and might require a manual intervention if it does not recover automatically.
          - paragraph [ref=e920]: This mechanism ensures data consistency and availability if a subset of the replicas fail during an update operation.
          - heading "Anchor Node Failure Recovery" [level=3] [ref=e921]:
            - link "Anchor" [ref=e922] [cursor=pointer]:
              - /url: "#node-failure-recovery"
              - text: 
            - text: Node Failure Recovery
          - paragraph [ref=e923]: Sometimes hardware malfunctions might render some nodes of the Qdrant cluster unrecoverable. No system is immune to this.
          - paragraph [ref=e924]: But several recovery scenarios allow qdrant to stay available for requests and even avoid performance degradation. Let’s walk through them from best to worst.
          - paragraph [ref=e925]:
            - strong [ref=e926]: Recover with replicated collection
          - paragraph [ref=e927]: If the number of failed nodes is less than the replication factor of the collection, then your cluster should still be able to perform read, search and update queries.
          - paragraph [ref=e928]: Now, if the failed node restarts, consensus will trigger the replication process to update the recovering node with the newest updates it has missed.
          - paragraph [ref=e929]:
            - text: If the failed node never restarts, you can recover the lost shards if you have a 3+ node cluster. You cannot recover lost shards in smaller clusters because recovery operations go through
            - link "raft" [ref=e930] [cursor=pointer]:
              - /url: "#raft"
            - text: which requires >50% of the nodes to be healthy.
          - paragraph [ref=e931]:
            - strong [ref=e932]: Recreate node with replicated collections
          - paragraph [ref=e933]: If a node fails and it is impossible to recover it, you should exclude the dead node from the consensus and create an empty node.
          - paragraph [ref=e934]:
            - text: To exclude failed nodes from the consensus, use
            - link "remove peer" [ref=e935] [cursor=pointer]:
              - /url: https://api.qdrant.tech/master/api-reference/distributed/remove-peer
            - text: API. Apply the
            - code [ref=e936]: force
            - text: flag if necessary.
          - paragraph [ref=e937]:
            - text: When you create a new node, make sure to attach it to the existing cluster by specifying
            - code [ref=e938]: "--bootstrap"
            - text: CLI parameter with the URL of any of the running cluster nodes.
          - paragraph [ref=e939]:
            - text: Once the new node is ready and synchronized with the cluster, you might want to ensure that the collection shards are replicated enough. Remember that Qdrant will not automatically balance shards since this is an expensive operation. Use the
            - link "Replicate Shard Operation" [ref=e940] [cursor=pointer]:
              - /url: https://api.qdrant.tech/master/api-reference/distributed/update-collection-cluster
            - text: to create another copy of the shard on the newly connected node.
          - paragraph [ref=e941]:
            - text: It’s worth mentioning that Qdrant only provides the necessary building blocks to create an automated failure recovery. Building a completely automatic process of collection scaling would require control over the cluster machines themself. Check out our
            - link "cloud solution" [ref=e942] [cursor=pointer]:
              - /url: https://qdrant.to/cloud
            - text: ", where we made exactly that."
          - paragraph [ref=e943]:
            - strong [ref=e944]: Recover from snapshot
          - paragraph [ref=e945]: If there are no copies of data in the cluster, it is still possible to recover from a snapshot.
          - paragraph [ref=e946]: "Follow the same steps to detach failed node and create a new one in the cluster:"
          - list [ref=e947]:
            - listitem [ref=e948]:
              - text: To exclude failed nodes from the consensus, use
              - link "remove peer" [ref=e949] [cursor=pointer]:
                - /url: https://api.qdrant.tech/master/api-reference/distributed/remove-peer
              - text: API. Apply the
              - code [ref=e950]: force
              - text: flag if necessary.
            - listitem [ref=e951]:
              - text: Create a new node, making sure to attach it to the existing cluster by specifying the
              - code [ref=e952]: "--bootstrap"
              - text: CLI parameter with the URL of any of the running cluster nodes.
          - paragraph [ref=e953]: Snapshot recovery, used in single-node deployment, is different from cluster one. Consensus manages all metadata about all collections and does not require snapshots to recover it. But you can use snapshots to recover missing shards of the collections.
          - paragraph [ref=e954]:
            - text: Use the
            - link "Collection Snapshot Recovery API" [ref=e955] [cursor=pointer]:
              - /url: https://qdrant.tech/documentation/snapshots/#recover-in-cluster-deployment
            - text: to do it. The service will download the specified snapshot of the collection and recover shards with data from it.
          - paragraph [ref=e956]: Once all shards of the collection are recovered, the collection will become operational again.
          - heading "Anchor Temporary node failure" [level=3] [ref=e957]:
            - link "Anchor" [ref=e958] [cursor=pointer]:
              - /url: "#temporary-node-failure"
              - text: 
            - text: Temporary node failure
          - paragraph [ref=e959]: If properly configured, running Qdrant in distributed mode can make your cluster resistant to outages when one node fails temporarily.
          - paragraph [ref=e960]: "Here is how differently-configured Qdrant clusters respond:"
          - list [ref=e961]:
            - listitem [ref=e962]: "1-node clusters: All operations time out or fail for up to a few minutes. It depends on how long it takes to restart and load data from disk."
            - listitem [ref=e963]: "2-node clusters where shards ARE NOT replicated: All operations will time out or fail for up to a few minutes. It depends on how long it takes to restart and load data from disk."
            - listitem [ref=e964]: "2-node clusters where all shards ARE replicated to both nodes: All requests except for operations on collections continue to work during the outage."
            - listitem [ref=e965]: "3+-node clusters where all shards are replicated to at least 2 nodes: All requests continue to work during the outage."
          - heading "Anchor Consistency guarantees" [level=2] [ref=e966]:
            - link "Anchor" [ref=e967] [cursor=pointer]:
              - /url: "#consistency-guarantees"
              - text: 
            - text: Consistency guarantees
          - paragraph [ref=e968]: By default, Qdrant focuses on availability and maximum throughput of search operations. For the majority of use cases, this is a preferable trade-off.
          - paragraph [ref=e969]: During the normal state of operation, it is possible to search and modify data from any peers in the cluster.
          - paragraph [ref=e970]: Before responding to the client, the peer handling the request dispatches all operations according to the current topology in order to keep the data synchronized across the cluster.
          - list [ref=e971]:
            - listitem [ref=e972]: reads are using a partial fan-out strategy to optimize latency and availability
            - listitem [ref=e973]: writes are executed in parallel on all active sharded replicas
          - paragraph [ref=e974]: By default, concurrent updates on one point can result in an inconsistent state. For example, if two clients simultaneously update the same point in a collection with three replicas per shard. On some replicas, the point may reflect the update from one client, while on other replicas, the point may reflect the update from the other client.
          - paragraph [ref=e975]:
            - img "Two clients updating the same point at the same time." [ref=e976]
          - paragraph [ref=e977]: In some cases, it is necessary to ensure additional guarantees during possible hardware instabilities, mass concurrent updates of same documents, etc.
          - paragraph [ref=e978]: "Qdrant provides a few options to control consistency guarantees:"
          - list [ref=e979]:
            - listitem [ref=e980]:
              - code [ref=e981]: write_consistency_factor
              - text: "- defines the number of replicas that must acknowledge a write operation before responding to the client. Increasing this value will make write operations tolerant to network partitions in the cluster, but will require a higher number of replicas to be active to perform write operations."
            - listitem [ref=e982]:
              - text: Read
              - code [ref=e983]: consistency
              - text: param, can be used with search and retrieve operations to ensure that the results obtained from all replicas are the same. If this option is used, Qdrant will perform the read operation on multiple replicas and resolve the result according to the selected strategy. This option is useful to avoid data inconsistency in case of concurrent updates of the same documents. This options is preferred if the update operations are frequent and the number of replicas is low.
            - listitem [ref=e984]:
              - text: Write
              - code [ref=e985]: ordering
              - text: param, can be used with update and delete operations to ensure that the operations are executed in the same order on all replicas. If this option is used, Qdrant will route the operation to the leader replica of the shard and wait for the response before responding to the client. This option is useful to avoid data inconsistency in case of concurrent updates of the same documents. This options is preferred if read operations are more frequent than update and if search performance is critical.
          - heading "Anchor Write consistency factor" [level=3] [ref=e986]:
            - link "Anchor" [ref=e987] [cursor=pointer]:
              - /url: "#write-consistency-factor"
              - text: 
            - text: Write consistency factor
          - paragraph [ref=e988]:
            - text: The
            - code [ref=e989]: write_consistency_factor
            - text: represents the number of replicas that must acknowledge a write operation before responding to the client. It is set to 1 by default. It can be configured at the collection’s creation or when updating the collection parameters.
          - paragraph [ref=e990]: This value can range from 1 to the number of replicas you have for each shard.
          - generic [ref=e992]:
            - generic [ref=e995]: http
            - generic [ref=e998]: python
            - generic [ref=e1001]: typescript
            - generic [ref=e1004]: rust
            - generic [ref=e1007]: java
            - generic [ref=e1010]: csharp
            - generic [ref=e1013]: go
          - generic [ref=e1015]:
            - code [ref=e1017]:
              - generic [ref=e1019]: "PUT /collections/{collection_name}"
              - generic [ref=e1021]: "{"
              - generic [ref=e1023]: "\"vectors\": {"
              - generic [ref=e1025]: "\"size\": 300,"
              - generic [ref=e1027]: "\"distance\": \"Cosine\""
              - generic [ref=e1029]: "},"
              - generic [ref=e1031]: "\"shard_number\": 6,"
              - generic [ref=e1033]: "\"replication_factor\": 2,"
              - generic [ref=e1035]: "\"write_consistency_factor\": 2"
              - generic [ref=e1037]: "}"
            - button "Copy to clipboard" [ref=e1038] [cursor=pointer]:
              - tooltip "Copy to clipboard" [ref=e1039]
          - paragraph [ref=e1040]:
            - text: Write operations will fail if the number of active replicas is less than the
            - code [ref=e1041]: write_consistency_factor
            - text: . In this case, the client is expected to send the operation again to ensure a consistent state is reached.
          - paragraph [ref=e1042]:
            - text: Setting the
            - code [ref=e1043]: write_consistency_factor
            - text: to a lower value may allow accepting writes even if there are unresponsive nodes. Unresponsive nodes are marked as dead and will automatically be recovered once available to ensure data consistency.
          - paragraph [ref=e1044]:
            - text: The configuration of the
            - code [ref=e1045]: write_consistency_factor
            - text: is important for adjusting the cluster’s behavior when some nodes go offline due to restarts, upgrades, or failures.
          - paragraph [ref=e1046]: By default, the cluster continues to accept updates as long as at least one replica of each shard is online. However, this behavior means that once an offline replica is restored, it will require additional synchronization with the rest of the cluster. In some cases, this synchronization can be resource-intensive and undesirable.
          - paragraph [ref=e1047]:
            - text: Setting the
            - code [ref=e1048]: write_consistency_factor
            - text: to match the replication factor modifies the cluster’s behavior so that unreplicated updates are rejected, preventing the need for extra synchronization.
          - paragraph [ref=e1049]:
            - text: If the update is applied to enough replicas - according to the
            - code [ref=e1050]: write_consistency_factor
            - text: "- the update will return a successful status. Any replicas that failed to apply the update will be temporarily disabled and are automatically recovered to keep data consistency. If the update could not be applied to enough replicas, it’ll return an error and may be partially applied. The user must submit the operation again to ensure data consistency."
          - paragraph [ref=e1051]: For asynchronous updates and injection pipelines capable of handling errors and retries, this strategy might be preferable.
          - heading "Anchor Read consistency" [level=3] [ref=e1052]:
            - link "Anchor" [ref=e1053] [cursor=pointer]:
              - /url: "#read-consistency"
              - text: 
            - text: Read consistency
          - paragraph [ref=e1054]:
            - text: Read
            - code [ref=e1055]: consistency
            - text: can be specified for most read requests and will ensure that the returned result is consistent across cluster nodes.
          - list [ref=e1056]:
            - listitem [ref=e1057]:
              - code [ref=e1058]: all
              - text: will query all nodes and return points, which present on all of them
            - listitem [ref=e1059]:
              - code [ref=e1060]: majority
              - text: will query all nodes and return points, which present on the majority of them
            - listitem [ref=e1061]:
              - code [ref=e1062]: quorum
              - text: will query randomly selected majority of nodes and return points, which present on all of them
            - listitem [ref=e1063]:
              - code [ref=e1064]: "1"
              - text: /
              - code [ref=e1065]: "2"
              - text: /
              - code [ref=e1066]: "3"
              - text: /etc - will query specified number of randomly selected nodes and return points which present on all of them
            - listitem [ref=e1067]:
              - text: default
              - code [ref=e1068]: consistency
              - text: is
              - code [ref=e1069]: "1"
          - generic [ref=e1071]:
