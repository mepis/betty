            - listitem [ref=e2264]:
              - generic [ref=e2266]: •
              - paragraph [ref=e2268]: KLD shows how well a quantized model matches the original BF16 output distribution, indicating retained accuracy.
            - listitem [ref=e2269]:
              - generic [ref=e2271]: •
