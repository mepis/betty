          - paragraph [ref=e2257]: We conducted Mean KL Divergence benchmarks for Qwen3.6-35-A3B GGUFs across providers to help you pick the best quant.
          - list [ref=e2258]:
            - listitem [ref=e2259]:
              - generic [ref=e2261]: •
