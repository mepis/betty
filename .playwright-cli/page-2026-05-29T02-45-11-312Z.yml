          - paragraph [ref=e953]:
            - text: MTP (Multi Token Prediction)
            - strong [ref=e954]
            - text: speculative decoding enables models like Qwen3.6 to have
            - strong [ref=e955]: ~1.4-2.2x faster generation with
            - strong [ref=e957]: no change in accuracy
            - text: . This enables Qwen3.6 27B and 35B-A3B to have
            - strong [ref=e958]: ">1.4x speed-up"
            - text: over the original baseline which is especially useful for local models.
          - paragraph [ref=e959]:
            - text: Unsloth Qwen3.6 MTP GGUFs are no longer in experimental mode, and llama.cpp has merged MTP support. Run directly in
            - link "Unsloth Studio’s UI" [ref=e961] [cursor=pointer]:
              - /url: /docs/models/qwen3.6#unsloth-studio-guide
            - text: or via llama.cpp.
            - strong [ref=e962]: Qwen3.6 27B MTP now runs at 160 tokens/s generation and Qwen3.6 35B-A3B at 240 tokens/s on a RTX 6000 GPU.
            - text: See
            - strong [ref=e963]
            - link "MTP Benchmarks" [ref=e964] [cursor=pointer]:
              - /url: /docs/models/qwen3.6#mtp-benchmarks
            - text: .
          - paragraph [ref=e965]: Unsloth Studio automatically sets the ideal MTP settings optimized for your specific hardware (Mac, CPU, GPU etc.) - you can still change it later.
          - note "Information" [ref=e966]:
            - img [ref=e968]
            - paragraph [ref=e971]:
              - strong [ref=e972]: MTP uses slightly more VRAM than standard GGUFs
              - text: ", so plan for ~1 GB additional RAM/VRAM headroom."
          - paragraph [ref=e973]:
            - link "Run in Unsloth Studio" [ref=e974] [cursor=pointer]:
