                      - text: Qwen3.6-35B-A3B-MTP-GGUF
                      - img [ref=e996]
          - paragraph [ref=e1004]:
            - text: In practice, MTP predicts several future tokens, then the main model verifies those tokens in parallel. This reduces the number of forward passes needed during generation and make output faster.
            - strong [ref=e1005]: We found
            - code [ref=e1006]:
              - strong [ref=e1007]: "--spec-draft-n-max 2"
            - strong [ref=e1008]: to work best in most setups.
            - strong [ref=e1009]: However, do not assume
            - code [ref=e1010]:
              - strong [ref=e1011]: "2"
            - strong [ref=e1012]: is optimal, as performance is hardware-dependent. Try values from
            - code [ref=e1013]:
              - strong [ref=e1014]: "1"
            - strong [ref=e1015]: through
            - code [ref=e1016]:
              - strong [ref=e1017]: "6"
            - strong [ref=e1018]: and use whichever is fastest for your system.
          - paragraph [ref=e1019]:
            - text: We also
            - link "uploaded MTP GGUFs" [ref=e1021] [cursor=pointer]:
              - /url: https://huggingface.co/unsloth/models?search=mtp
              - text: uploaded MTP GGUFs
              - img [ref=e1022]
            - text: for the
            - link "Qwen3.5" [ref=e1025] [cursor=pointer]:
              - /url: /docs/models/qwen3.5
              - strong [ref=e1026]: Qwen3.5
            - strong [ref=e1027]: model family
            - text: "including: 0.8B, 2B, 4B, 9B, 27B, 35B-A3B, 122B-A10B and 397B-A17B. Llama.cpp is continually improving MTP performance, so expect it to get faster overtime!"
