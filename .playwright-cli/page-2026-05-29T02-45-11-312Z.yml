              - generic [ref=e977]: Run in llama.cpp
          - table [ref=e981]:
            - rowgroup [ref=e982]:
              - row "Qwen3.6-27B-MTP-GGUF Qwen3.6-35B-A3B-MTP-GGUF" [ref=e983]:
                - cell "Qwen3.6-27B-MTP-GGUF" [ref=e984]:
                  - paragraph [ref=e986]:
                    - link "Qwen3.6-27B-MTP-GGUF" [ref=e988] [cursor=pointer]:
                      - /url: https://huggingface.co/unsloth/Qwen3.6-27B-MTP-GGUF
                      - text: Qwen3.6-27B-MTP-GGUF
                      - img [ref=e989]
                - cell "Qwen3.6-35B-A3B-MTP-GGUF" [ref=e991]:
                  - paragraph [ref=e993]:
                    - link "Qwen3.6-35B-A3B-MTP-GGUF" [ref=e995] [cursor=pointer]:
