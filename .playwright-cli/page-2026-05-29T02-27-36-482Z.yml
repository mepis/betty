        - paragraph [ref=e112]:
          - strong [ref=e113]: †
          - text: Fermi and Kepler are deprecated from CUDA 9 and 11 onwards
          - strong [ref=e114]:
            - strong [ref=e115]: ‡
          - text: Maxwell is deprecated from CUDA 11.6 onwards
          - text: § Maxwell, Pascal, and Volta offline compilation support removed in CUDA 13.0.
        - heading "When should different ‘gencodes’ or ‘cuda arch’ be used?" [level=2] [ref=e116]
        - paragraph [ref=e117]:
          - text: When you compile CUDA code, you should always compile only one ‘
          - strong [ref=e118]:
            - code [ref=e119]: "-arch"
          - text: ‘ flag that matches your most used GPU cards. This will enable faster runtime, because code generation will occur during compilation.
          - text: If you only mention ‘
          - strong [ref=e120]:
            - code [ref=e121]: "-gencode"
          - text: ‘, but omit the ‘
          - strong [ref=e122]:
            - code [ref=e123]: "-arch"
          - text: ‘ flag, the GPU code generation will occur on the
          - strong [ref=e124]: JIT
          - text: compiler by the CUDA driver.
        - paragraph [ref=e125]:
          - text: When you want to speed up CUDA compilation, you want to reduce the amount of irrelevant ‘
          - strong [ref=e126]:
            - code [ref=e127]: "-gencode"
          - text: ‘ flags. However, sometimes you may wish to have better CUDA backwards compatibility by adding more comprehensive ‘
          - strong [ref=e128]:
            - code [ref=e129]: "-gencode"
          - text: ‘ flags.
        - paragraph [ref=e130]:
          - text: Before you continue, identify which GPU you have and
          - link "which CUDA version you have installed" [ref=e131] [cursor=pointer]:
            - /url: https://arnon.dk/check-cuda-installed/
          - text: first.
        - heading "Supported SM and Gencode variations" [level=2] [ref=e132]
        - paragraph [ref=e133]: Below are the supported sm variations and sample cards from that generation.
        - paragraph [ref=e134]: I’ve tried to supply representative NVIDIA GPU cards for each architecture name, and CUDA version.
        - heading "Note on family-specific architecture features (CUDA 12.9 and later)" [level=3] [ref=e135]
        - paragraph [ref=e136]:
          - text: "Starting with CUDA 12.9, NVIDIA introduced a third compilation target suffix:"
          - code [ref=e137]: f
          - text: "(family-specific). This sits between the baseline (no suffix) and architecture-specific (“a” suffix):"
        - list [ref=e138]:
          - listitem [ref=e139]: "No suffix (e.g. compute_100): Maximum forward compatibility across major versions. Basic feature set."
          - listitem [ref=e140]:
            - code [ref=e141]: "\"f\""
            - text: "suffix (e.g. compute_100f): Forward compatible within the same major version family. Enables family-specific features like certain Tensor Core ops. Code compiled for compute_100f runs on sm_100 AND sm_103 devices."
          - listitem [ref=e142]:
            - code [ref=e143]: "\"a\""
            - text: "suffix (e.g. compute_100a): Only runs on the exact compute capability. No forward compatibility at all. Enables the full set of architecture-specific features."
            - text: "There are currently two Blackwell families:"
            - list [ref=e144]:
              - listitem [ref=e145]: "The 10.x family (compute_100f): includes sm_100 (B100/B200) and sm_103 (B300)"
              - listitem [ref=e146]:
                - text: "The 12.x family (compute_120f): includes sm_120 (RTX 50 series) and sm_121 (GB10/DGX Spark)"
                - strong [ref=e147]:
                  - text: These two families are NOT cross-compatible —
                  - code [ref=e148]: sm_100f
                  - text: code does NOT run on
                  - code [ref=e149]: sm_120
                  - text: devices and vice versa.
