        - heading "Using TORCH_CUDA_ARCH_LIST for PyTorch" [level=2] [ref=e372]
        - paragraph [ref=e373]:
          - text: If you’re using PyTorch you can set the architectures using the
          - code [ref=e374]: TORCH_CUDA_ARCH_LIST
          - text: "env variable during installation like this:"
        - paragraph [ref=e375]:
          - code [ref=e376]: $ TORCH_CUDA_ARCH_LIST="7.0 7.5 8.0 8.6" python3 setup.py install
        - paragraph [ref=e377]: Note that while you can specify every single arch in this variable, each one will prolong the build time as kernels will have to compiled for every architecture.
        - paragraph [ref=e378]:
          - text: You can also tell PyTorch to generate PTX code that is forward compatible by newer cards by adding a
          - code [ref=e379]: +PTX
          - text: "suffix to the most recent architecture you specify:"
        - paragraph [ref=e380]:
          - code [ref=e381]: $ TORCH_CUDA_ARCH_LIST="7.0 7.5 8.0 8.6+PTX" python3 build_my_extension.py
        - paragraph [ref=e382]: "For Blackwell RTX 50 series and datacenter B200/B300:"
        - paragraph [ref=e383]:
          - code [ref=e384]: $ TORCH_CUDA_ARCH_LIST="8.0 8.6 8.9 9.0 10.0 10.3 12.0 12.1+PTX" python3 setup.py install
        - paragraph [ref=e385]: Note that PyTorch stable builds may not yet support all Blackwell architectures. Check your PyTorch version’s CUDA support before setting these flags.
        - heading "Using Cmake for TensorRT" [level=2] [ref=e386]
        - paragraph [ref=e387]:
          - text: If you’re compiling TensorRT with CMAKE, drop the
          - code [ref=e388]: sm_
          - text: and
          - code [ref=e389]: compute_
          - text: prefixes, refer only to the compute capabilities instead.
        - paragraph [ref=e390]:
          - text: "Example for Tesla V100 and Volta cards in general:"
          - code [ref=e391]:
            - text: cmake <...>
            - code [ref=e392]: "-DGPU_ARCHS=\"70\""
          - code
        - paragraph [ref=e393]:
          - text: "Example for NVIDIA RTX 2070 and Tesla T4:"
          - code [ref=e394]: cmake <...> -DGPU_ARCHS="75"
        - paragraph [ref=e395]:
          - text: "Example for NVIDIA A100:"
          - code [ref=e396]:
            - text: cmake <...>
            - code [ref=e397]: "-DGPU_ARCHS=\"80\""
        - paragraph [ref=e398]:
          - text: "Example for NVIDIA RTX 3080 and A100 together:"
          - code [ref=e399]: cmake <...> -DGPU_ARCHS="80 86"
        - paragraph [ref=e400]:
          - text: "Example for NVIDIA H100:"
          - code [ref=e401]: cmake <...> -DGPU_ARCHS="90"
        - paragraph [ref=e402]:
          - text: "Example for NVIDIA B300 (Blackwell Ultra):"
          - code [ref=e403]: cmake <…> -DGPU_ARCHS="103"
        - paragraph [ref=e404]:
          - text: "Example for NVIDIA RTX 5090 (consumer Blackwell):"
          - code [ref=e405]: cmake <…> -DGPU_ARCHS="120"
        - paragraph [ref=e406]:
          - text: "Example for DGX Spark (GB10):"
          - code [ref=e407]: cmake <…> -DGPU_ARCHS="121"
        - paragraph [ref=e408]:
          - text: "Example for all Blackwell variants together:"
          - code [ref=e409]: cmake <…> -DGPU_ARCHS="100 103 120 121"
        - heading "Using Cmake for CUTLASS with Hopper GH100" [level=2] [ref=e410]
        - paragraph [ref=e411]:
          - code [ref=e412]: cmake .. -DCUTLASS_NVCC_ARCHS=90a
        - heading "What does \"Value 'sm_86' is not defined for option 'gpu-architecture'\" mean?" [level=2] [ref=e413]:
          - text: What does
          - code [ref=e414]: "\"Value 'sm_86' is not defined for option 'gpu-architecture'\""
          - text: mean?
        - paragraph [ref=e415]: "If you get an error that looks like this:"
        - code [ref=e417]: "nvcc fatal : Value 'sm_86' is not defined for option 'gpu-architecture'"
        - paragraph [ref=e418]:
          - text: You probably have an older version of CUDA and/or the driver installed. Upgrade to a more recent driver, at least
          - strong [ref=e419]: 450.36.06
          - text: or higher, to support
          - code [ref=e420]: sm_8x
          - text: cards like the A100,
          - link "RTX 3080" [ref=e421] [cursor=pointer]:
            - /url: https://amzn.to/3zHFawu
          - text: .
        - 'heading "What does “CUDA runtime error: operation not supported” mean?" [level=2] [ref=e422]'
        - paragraph [ref=e423]:
          - text: If you get an
          - code [ref=e424]: std::runtime_error
          - text: "that looks like this:"
        - code [ref=e426]: "CUDA runtime error: operation not supported"
        - paragraph [ref=e427]: The implication is that your card is not supported with the runtime code that was generated.
        - paragraph [ref=e428]:
          - text: Check with
          - code [ref=e429]: nvidia-smi
          - text: to see which card and driver version you have. Then, try to match the gencodes to generate the correct runtime code suitable for your card.
