        - heading "Matching CUDA arch and CUDA gencode for various NVIDIA architectures" [level=1] [ref=e25]
      - generic [ref=e26]:
        - paragraph [ref=e27]:
          - emphasis [ref=e28]: Updated Apr 13th 202
          - text: "6"
        - heading "tl;dr" [level=2] [ref=e29]
        - paragraph [ref=e30]:
          - text: "I’ve seen some confusion regarding NVIDIA’s nvcc sm flags and what they’re used for:"
          - text: When compiling with NVCC, the arch flag (‘
          - strong [ref=e31]:
            - code [ref=e32]: "-arch"
          - text: ‘) specifies the name of the NVIDIA GPU architecture that the CUDA files will be compiled for.
          - text: Gencodes (‘
          - strong [ref=e33]:
            - code [ref=e34]: "-gencode"
          - text: ‘) allows for more PTX generations and can be repeated many times for different architectures.
        - paragraph [ref=e35]: "Here’s a list of NVIDIA architecture names, and which compute capabilities they have:"
        - figure [ref=e36]:
          - table [ref=e37]:
