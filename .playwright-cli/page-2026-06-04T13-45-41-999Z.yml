                    - 'heading "Context: Why Config-Level Hardening Matters (and Why It Isn''t Enough)" [level=2] [ref=e669]'
                    - 'link "Permalink: Context: Why Config-Level Hardening Matters (and Why It Isn''t Enough)" [ref=e670] [cursor=pointer]':
                      - /url: "#context-why-config-level-hardening-matters-and-why-it-isnt-enough"
                      - img [ref=e671]
                  - paragraph [ref=e673]:
                    - text: In the Claude Code security research at securitysandman.com, a core finding was that the
                    - emphasis [ref=e674]: settings file is the most important and most overlooked attack surface
                    - text: . The same is true for OpenCode. Both tools ship with permissive defaults — they are designed for developer productivity, not adversarial environments. Without explicit configuration, both will silently execute the majority of AI-directed actions with no user prompt.
                  - paragraph [ref=e675]: This section documents what OpenCode's config system can and cannot do, maps it to the Claude Code hardening baseline from the blog post, and provides a production-ready hardened opencode.json.
                  - paragraph [ref=e676]:
                    - strong [ref=e677]: "Critical caveat upfront:"
                    - text: "config-level permissions are one layer. They are enforced in-process, by the same application they are supposed to restrict. They can be:"
                  - list [ref=e678]:
                    - listitem [ref=e679]: Bypassed by a compromised binary
                    - listitem [ref=e680]: Undermined by prompt injection instructing the agent to "ignore previous rules"
                    - listitem [ref=e681]: Silently degraded if an auto-update replaces the binary
                    - listitem [ref=e682]:
                      - text: Accidentally wiped by running
                      - code [ref=e683]: opencode init
                      - text: in a project directory
                  - paragraph [ref=e684]: Container isolation (Method 1 and 2 in the install guide) provides a complementary hard boundary that config-level rules cannot provide on their own.
