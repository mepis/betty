                    - heading "Per-Agent Hardening (OpenCode-Specific Feature)" [level=2] [ref=e1083]
                    - 'link "Permalink: Per-Agent Hardening (OpenCode-Specific Feature)" [ref=e1084] [cursor=pointer]':
                      - /url: "#per-agent-hardening-opencode-specific-feature"
                      - img [ref=e1085]
                  - paragraph [ref=e1087]: OpenCode supports per-agent permission overrides — a capability Claude Code lacks. This allows a "reader" subagent to have zero write access, or a "reviewer" agent to have no bash access at all, even if the global config permits those tools.
                  - generic [ref=e1088]:
