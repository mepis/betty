                  - generic [ref=e1133]:
                    - heading "Known Gaps vs Claude Code (OpenCode Limitations)" [level=2] [ref=e1134]
                    - 'link "Permalink: Known Gaps vs Claude Code (OpenCode Limitations)" [ref=e1135] [cursor=pointer]':
                      - /url: "#known-gaps-vs-claude-code-opencode-limitations"
                      - img [ref=e1136]
                  - generic [ref=e1138]:
                    - heading "1. No OS-Level Sandbox" [level=3] [ref=e1139]
                    - 'link "Permalink: 1. No OS-Level Sandbox" [ref=e1140] [cursor=pointer]':
                      - /url: "#1-no-os-level-sandbox"
                      - img [ref=e1141]
                  - paragraph [ref=e1143]:
                    - text: Claude Code integrates AppArmor (Linux) and sandbox-exec (macOS) to enforce filesystem boundaries at the OS level — meaning even a compromised process cannot escape them. OpenCode has no equivalent. The
                    - code [ref=e1144]: external_directory
                    - text: permission is enforced in-process only and can be bypassed if the binary itself is compromised.
                  - paragraph [ref=e1145]:
                    - strong [ref=e1146]: "Mitigation:"
                    - text: Run inside a Docker container (see install guide).
                  - generic [ref=e1147]:
                    - heading "2. In-Process Enforcement Only" [level=3] [ref=e1148]
                    - 'link "Permalink: 2. In-Process Enforcement Only" [ref=e1149] [cursor=pointer]':
                      - /url: "#2-in-process-enforcement-only"
                      - img [ref=e1150]
                  - paragraph [ref=e1152]: "All OpenCode permissions are checked by the OpenCode process itself. A sufficiently sophisticated prompt injection attack could potentially manipulate the agent into approving its own escalations through the \"always\" approval mechanism. The blog post notes this risk: \"These permissions are best practice but will lead to users frustratingly disabling everything.\""
                  - paragraph [ref=e1153]:
                    - strong [ref=e1154]: "Mitigation:"
                    - text: Never use the "always" approval option in adversarial environments. Use "once" approvals only. Consider setting the most sensitive denies at the project config level (not just global) so they're version-controlled and auditable.
                  - generic [ref=e1155]:
                    - 'heading "3. edit: deny Does Not Block the write Tool Independently" [level=3] [ref=e1156]':
                      - text: "3."
                      - code [ref=e1157]: "edit: deny"
                      - text: Does Not Block the
                      - code [ref=e1158]: write
                      - text: Tool Independently
                    - 'link "Permalink: 3. edit: deny Does Not Block the write Tool Independently" [ref=e1159] [cursor=pointer]':
                      - /url: "#3-edit-deny-does-not-block-the-write-tool-independently"
                      - img [ref=e1160]
                  - paragraph [ref=e1162]:
                    - text: As of v1.1.1, OpenCode merged write, edit, patch, and multiedit under the
                    - code [ref=e1163]: edit
                    - text: permission key. This is correct and simpler than Claude Code's separate
                    - code [ref=e1164]: Write()
                    - text: tool. However, note that custom tools added via MCP servers may implement their own write mechanisms outside the
                    - code [ref=e1165]: edit
                    - text: permission path.
                  - paragraph [ref=e1166]:
                    - strong [ref=e1167]: "Mitigation:"
                    - text: Audit all MCP servers for custom file-writing tools. Set MCP server connections explicitly in config and minimize them.
                  - generic [ref=e1168]:
                    - heading "4. No \"Trusted Code\" Separation" [level=3] [ref=e1169]
                    - 'link "Permalink: 4. No \"Trusted Code\" Separation" [ref=e1170] [cursor=pointer]':
                      - /url: "#4-no-trusted-code-separation"
                      - img [ref=e1171]
                  - paragraph [ref=e1173]: Neither OpenCode nor Claude Code distinguish between code in your trusted project and code in third-party repositories being analyzed. If you ask OpenCode to review an untrusted repo, malicious comments in that repo have the same prompt injection attack surface as your own project code.
                  - paragraph [ref=e1174]:
                    - strong [ref=e1175]: "Mitigation:"
                    - text: Use a read-only subagent (example above) for reviewing untrusted repos. Never run the main agent with write and bash permissions against a cloned unknown codebase.
                  - generic [ref=e1176]:
                    - 'heading "5. autoupdate: false Is Required (Not Default)" [level=3] [ref=e1177]':
                      - text: "5."
                      - code [ref=e1178]: "autoupdate: false"
                      - text: Is Required (Not Default)
                    - 'link "Permalink: 5. autoupdate: false Is Required (Not Default)" [ref=e1179] [cursor=pointer]':
                      - /url: "#5-autoupdate-false-is-required-not-default"
                      - img [ref=e1180]
                  - paragraph [ref=e1182]:
                    - text: OpenCode defaults to
                    - code [ref=e1183]: "autoupdate: true"
                    - text: . An auto-update replaces the binary without repeating the SHA256 verification from your Dockerfile or install process. A compromised update delivery could silently replace the binary with a malicious one.
                  - paragraph [ref=e1184]:
                    - strong [ref=e1185]: "Mitigation:"
                    - text: Set
                    - code [ref=e1186]: "\"autoupdate\": false"
                    - text: in your global config and manage version upgrades manually following the Dockerfile hash-verification process.
                  - separator [ref=e1187]
