      - main [ref=e208]:
        - generic [ref=e210]:
          - heading "Agents" [level=1] [ref=e211]
          - paragraph [ref=e212]: Configure and use specialized agents.
        - generic [ref=e214]:
          - generic [ref=e215]:
            - paragraph [ref=e216]: Agents are specialized AI assistants that can be configured for specific tasks and workflows. They allow you to create focused tools with custom prompts, models, and tool access.
            - complementary "Tip" [ref=e217]:
              - paragraph [ref=e218]:
                - img [ref=e219]
                - text: Tip
              - paragraph [ref=e223]: Use the plan agent to analyze code and review suggestions without making any code changes.
            - paragraph [ref=e224]:
              - text: You can switch between agents during a session or invoke them with the
              - code [ref=e225]: "`@`"
              - text: mention.
            - separator [ref=e226]
            - heading "Types" [level=2] [ref=e227]:
              - link "Types" [ref=e228]:
                - /url: "#types"
            - paragraph [ref=e229]: There are two types of agents in OpenCode; primary agents and subagents.
            - separator [ref=e230]
            - heading "Primary agents" [level=3] [ref=e231]:
              - link "Primary agents" [ref=e232]:
                - /url: "#primary-agents"
            - paragraph [ref=e233]:
              - text: Primary agents are the main assistants you interact with directly. You can cycle through them using the
              - strong [ref=e234]: Tab
              - text: key, or your configured
              - code [ref=e235]: "`switch_agent`"
              - text: keybind. These agents handle your main conversation. Tool access is configured via permissions — for example, Build has all tools enabled while Plan is restricted.
            - complementary "Tip" [ref=e236]:
              - paragraph [ref=e237]:
                - img [ref=e238]
                - text: Tip
              - paragraph [ref=e242]:
                - text: You can use the
                - strong [ref=e243]: Tab
                - text: key to switch between primary agents during a session.
            - paragraph [ref=e244]:
              - text: OpenCode comes with two built-in primary agents,
              - strong [ref=e245]: Build
              - text: and
              - strong [ref=e246]: Plan
              - text: . We’ll look at these below.
            - separator [ref=e247]
            - heading "Subagents" [level=3] [ref=e248]:
              - link "Subagents" [ref=e249]:
                - /url: "#subagents"
            - paragraph [ref=e250]:
              - text: Subagents are specialized assistants that primary agents can invoke for specific tasks. You can also manually invoke them by
              - strong [ref=e251]: "@ mentioning"
              - text: them in your messages.
            - paragraph [ref=e252]:
              - text: OpenCode comes with three built-in subagents,
              - strong [ref=e253]: General
              - text: ","
              - strong [ref=e254]: Explore
              - text: ", and"
              - strong [ref=e255]: Scout
              - text: . We’ll look at this below.
            - separator [ref=e256]
            - heading "Built-in" [level=2] [ref=e257]:
              - link "Built-in" [ref=e258]:
                - /url: "#built-in"
            - paragraph [ref=e259]: OpenCode comes with two built-in primary agents and three built-in subagents.
            - separator [ref=e260]
            - heading "Use build" [level=3] [ref=e261]:
              - link "Use build" [ref=e262]:
                - /url: "#use-build"
            - paragraph [ref=e263]:
              - emphasis [ref=e264]: Mode
              - text: ":"
              - code [ref=e265]: "`primary`"
            - paragraph [ref=e266]:
              - text: Build is the
              - strong [ref=e267]: default
              - text: primary agent with all tools enabled. This is the standard agent for development work where you need full access to file operations and system commands.
            - separator [ref=e268]
            - heading "Use plan" [level=3] [ref=e269]:
              - link "Use plan" [ref=e270]:
                - /url: "#use-plan"
            - paragraph [ref=e271]:
              - emphasis [ref=e272]: Mode
              - text: ":"
              - code [ref=e273]: "`primary`"
            - paragraph [ref=e274]:
              - text: A restricted agent designed for planning and analysis. We use a permission system to give you more control and prevent unintended changes. By default, all of the following are set to
              - code [ref=e275]: "`ask`"
              - text: ":"
            - list [ref=e276]:
              - listitem [ref=e277]:
                - code [ref=e278]: "`file edits`"
                - text: ": All writes, patches, and edits"
              - listitem [ref=e279]:
                - code [ref=e280]: "`bash`"
                - text: ": All bash commands"
            - paragraph [ref=e281]: This agent is useful when you want the LLM to analyze code, suggest changes, or create plans without making any actual modifications to your codebase.
            - separator [ref=e282]
            - heading "Use general" [level=3] [ref=e283]:
              - link "Use general" [ref=e284]:
                - /url: "#use-general"
            - paragraph [ref=e285]:
              - emphasis [ref=e286]: Mode
              - text: ":"
              - code [ref=e287]: "`subagent`"
            - paragraph [ref=e288]: A general-purpose agent for researching complex questions and executing multi-step tasks. Has full tool access (except todo), so it can make file changes when needed. Use this to run multiple units of work in parallel.
            - separator [ref=e289]
            - heading "Use explore" [level=3] [ref=e290]:
              - link "Use explore" [ref=e291]:
                - /url: "#use-explore"
            - paragraph [ref=e292]:
              - emphasis [ref=e293]: Mode
              - text: ":"
              - code [ref=e294]: "`subagent`"
            - paragraph [ref=e295]: A fast, read-only agent for exploring codebases. Cannot modify files. Use this when you need to quickly find files by patterns, search code for keywords, or answer questions about the codebase.
            - separator [ref=e296]
            - heading "Use scout" [level=3] [ref=e297]:
              - link "Use scout" [ref=e298]:
                - /url: "#use-scout"
            - paragraph [ref=e299]:
              - emphasis [ref=e300]: Mode
              - text: ":"
              - code [ref=e301]: "`subagent`"
            - paragraph [ref=e302]: A read-only agent for external docs and dependency research. Use this when you need to clone a dependency repository into OpenCode’s managed cache, inspect library source, or cross-reference local code against upstream implementations without modifying your workspace.
            - separator [ref=e303]
            - heading "Use compaction" [level=3] [ref=e304]:
              - link "Use compaction" [ref=e305]:
                - /url: "#use-compaction"
            - paragraph [ref=e306]:
              - emphasis [ref=e307]: Mode
              - text: ":"
              - code [ref=e308]: "`primary`"
            - paragraph [ref=e309]: Hidden system agent that compacts long context into a smaller summary. It runs automatically when needed and is not selectable in the UI.
            - separator [ref=e310]
            - heading "Use title" [level=3] [ref=e311]:
              - link "Use title" [ref=e312]:
                - /url: "#use-title"
            - paragraph [ref=e313]:
              - emphasis [ref=e314]: Mode
              - text: ":"
              - code [ref=e315]: "`primary`"
            - paragraph [ref=e316]: Hidden system agent that generates short session titles. It runs automatically and is not selectable in the UI.
            - separator [ref=e317]
            - heading "Use summary" [level=3] [ref=e318]:
              - link "Use summary" [ref=e319]:
                - /url: "#use-summary"
            - paragraph [ref=e320]:
              - emphasis [ref=e321]: Mode
              - text: ":"
              - code [ref=e322]: "`primary`"
            - paragraph [ref=e323]: Hidden system agent that creates session summaries. It runs automatically and is not selectable in the UI.
            - separator [ref=e324]
            - heading "Usage" [level=2] [ref=e325]:
              - link "Usage" [ref=e326]:
                - /url: "#usage"
            - list [ref=e327]:
              - listitem [ref=e328]:
                - paragraph [ref=e329]:
                  - text: For primary agents, use the
                  - strong [ref=e330]: Tab
                  - text: key to cycle through them during a session. You can also use your configured
                  - code [ref=e331]: "`switch_agent`"
                  - text: keybind.
              - listitem [ref=e332]:
                - paragraph [ref=e333]: "Subagents can be invoked:"
                - list [ref=e334]:
                  - listitem [ref=e335]:
                    - paragraph [ref=e336]:
                      - strong [ref=e337]: Automatically
                      - text: by primary agents for specialized tasks based on their descriptions.
                  - listitem [ref=e338]:
                    - paragraph [ref=e339]:
                      - text: Manually by
                      - strong [ref=e340]: "@ mentioning"
                      - text: a subagent in your message. For example.
                    - figure [ref=e342]:
                      - code [ref=e344]:
                        - generic [ref=e346]: "@general help me search for this function"
                      - button "Copy to clipboard" [ref=e348] [cursor=pointer]
              - listitem [ref=e350]:
                - paragraph [ref=e351]:
                  - strong [ref=e352]: Navigation between sessions
                  - text: ": When subagents create child sessions, use"
                  - code [ref=e353]: "`session_child_first`"
                  - text: "(default:"
                  - strong [ref=e354]: <Leader>+Down
                  - text: ) to enter the first child session from the parent.
              - listitem [ref=e355]:
                - paragraph [ref=e356]: "Once you are in a child session, use:"
                - list [ref=e357]:
                  - listitem [ref=e358]:
                    - code [ref=e359]: "`session_child_cycle`"
                    - text: "(default:"
                    - strong [ref=e360]: Right
                    - text: ) to cycle to the next child session
                  - listitem [ref=e361]:
                    - code [ref=e362]: "`session_child_cycle_reverse`"
                    - text: "(default:"
                    - strong [ref=e363]: Left
                    - text: ) to cycle to the previous child session
                  - listitem [ref=e364]:
                    - code [ref=e365]: "`session_parent`"
                    - text: "(default:"
                    - strong [ref=e366]: Up
                    - text: ) to return to the parent session
                - paragraph [ref=e367]: This lets you switch between the main conversation and specialized subagent work.
            - separator [ref=e368]
            - heading "Configure" [level=2] [ref=e369]:
              - link "Configure" [ref=e370]:
                - /url: "#configure"
            - paragraph [ref=e371]: "You can customize the built-in agents or create your own through configuration. Agents can be configured in two ways:"
            - separator [ref=e372]
            - heading "JSON" [level=3] [ref=e373]:
              - link "JSON" [ref=e374]:
                - /url: "#json"
            - paragraph [ref=e375]:
              - text: Configure agents in your
              - code [ref=e376]: "`opencode.json`"
              - text: "config file:"
            - figure "opencode.json" [ref=e378]:
              - generic [ref=e380]: opencode.json
              - code [ref=e382]:
                - generic [ref=e384]: "{"
                - generic [ref=e386]: "\"$schema\": \"https://opencode.ai/config.json\","
                - generic [ref=e388]: "\"agent\": {"
                - generic [ref=e390]: "\"build\": {"
                - generic [ref=e392]: "\"mode\": \"primary\","
                - generic [ref=e394]: "\"model\": \"anthropic/claude-sonnet-4-20250514\","
                - generic [ref=e396]: "\"prompt\": \"{file:./prompts/build.txt}\","
                - generic [ref=e398]: "\"permission\": {"
                - generic [ref=e400]: "\"edit\": \"allow\","
                - generic [ref=e402]: "\"bash\": \"allow\""
                - generic [ref=e404]: "}"
                - generic [ref=e407]: "},"
                - generic [ref=e410]: "\"plan\": {"
                - generic [ref=e412]: "\"mode\": \"primary\","
                - generic [ref=e414]: "\"model\": \"anthropic/claude-haiku-4-20250514\","
                - generic [ref=e416]: "\"permission\": {"
                - generic [ref=e418]: "\"edit\": \"deny\","
                - generic [ref=e420]: "\"bash\": \"deny\""
                - generic [ref=e422]: "}"
                - generic [ref=e425]: "},"
                - generic [ref=e428]: "\"code-reviewer\": {"
                - generic [ref=e430]: "\"description\": \"Reviews code for best practices and potential issues\","
                - generic [ref=e432]: "\"mode\": \"subagent\","
                - generic [ref=e434]: "\"model\": \"anthropic/claude-sonnet-4-20250514\","
                - generic [ref=e436]: "\"prompt\": \"You are a code reviewer. Focus on security, performance, and maintainability.\","
                - generic [ref=e438]: "\"permission\": {"
                - generic [ref=e440]: "\"edit\": \"deny\""
                - generic [ref=e442]: "}"
                - generic [ref=e445]: "}"
                - generic [ref=e448]: "}"
                - generic [ref=e451]: "}"
              - button "Copy to clipboard" [ref=e453] [cursor=pointer]
            - separator [ref=e455]
            - heading "Markdown" [level=3] [ref=e456]:
              - link "Markdown" [ref=e457]:
                - /url: "#markdown"
            - paragraph [ref=e458]: "You can also define agents using markdown files. Place them in:"
            - list [ref=e459]:
              - listitem [ref=e460]:
                - text: "Global:"
                - code [ref=e461]: "`~/.config/opencode/agents/`"
              - listitem [ref=e462]:
                - text: "Per-project:"
                - code [ref=e463]: "`.opencode/agents/`"
            - figure "~/.config/opencode/agents/review.md" [ref=e465]:
              - generic [ref=e467]: ~/.config/opencode/agents/review.md
              - code [ref=e469]:
                - generic [ref=e471]: "---"
                - generic [ref=e473]: "description: Reviews code for quality and best practices"
                - generic [ref=e475]: "mode: subagent"
                - generic [ref=e477]: "model: anthropic/claude-sonnet-4-20250514"
                - generic [ref=e479]: "temperature: 0.1"
                - generic [ref=e481]: "permission:"
                - generic [ref=e483]: "edit: deny"
