            - paragraph [ref=e1350]:
              - text: When set to
              - code [ref=e1351]: "`deny`"
              - text: ", the subagent is removed from the Task tool description entirely, so the model won’t attempt to invoke it."
            - complementary "Tip" [ref=e1352]:
              - paragraph [ref=e1353]:
                - img [ref=e1354]
                - text: Tip
              - paragraph [ref=e1358]:
                - text: Rules are evaluated in order, and the
                - strong [ref=e1359]: last matching rule wins
                - text: . In the example above,
                - code [ref=e1360]: "`orchestrator-planner`"
                - text: matches both
                - code [ref=e1361]: "`*`"
                - text: (deny) and
                - code [ref=e1362]: "`orchestrator-*`"
                - text: (allow), but since
                - code [ref=e1363]: "`orchestrator-*`"
                - text: comes after
                - code [ref=e1364]: "`*`"
                - text: ", the result is"
                - code [ref=e1365]: "`allow`"
                - text: .
