            - paragraph [ref=e1256]:
              - text: The
              - code [ref=e1257]: "`mode`"
              - text: option can be set to
              - code [ref=e1258]: "`primary`"
              - text: ","
              - code [ref=e1259]: "`subagent`"
              - text: ", or"
              - code [ref=e1260]: "`all`"
              - text: . If no
              - code [ref=e1261]: "`mode`"
              - text: is specified, it defaults to
              - code [ref=e1262]: "`all`"
