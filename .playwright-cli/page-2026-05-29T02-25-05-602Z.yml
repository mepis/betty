              - text: "is recommended. Build with OpenCL enabled:"
            - code [ref=e130]: mkdir build && cd build cmake .. -DUSE_OPENCL=ON make -j$(nproc)
            - paragraph [ref=e131]: "On Android you may also need to set runtime env vars (example from a public run):"
            - code [ref=e133]: GGML_OPENCL_PLATFORM=0 GGML_OPENCL_DEVICE=0 export LD_LIBRARY_PATH=/vendor/lib64:$LD_LIBRARY_PATH
