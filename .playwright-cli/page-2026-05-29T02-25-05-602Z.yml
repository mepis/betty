            - 'heading "Example: CUDA (Nvidia)" [level=3] [ref=e115]'
            - paragraph [ref=e116]: "Install the CUDA toolkit and a matching driver. Then build:"
            - code [ref=e118]: mkdir build && cd build cmake .. -DUSE_CUDA=ON -DUSE_CUBLAS=ON make -j$(nproc)
            - paragraph [ref=e119]: "Run with:"
            - code [ref=e121]: ./main -m /path/to/model.gguf --n-gpu-layers 999 --main-gpu 0
            - 'heading "Example: HIP (AMD)" [level=3] [ref=e122]'
            - paragraph [ref=e123]: "Install ROCm/HIP per AMD docs. Then:"
            - code [ref=e125]: mkdir build && cd build cmake .. -DUSE_HIP=ON make -j$(nproc)
