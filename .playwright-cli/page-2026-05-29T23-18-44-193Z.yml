          - paragraph [ref=e848]: Traditional lexical metrics (e.g., F1, BLEU) emphasize surface-level token overlap, which is insufficient for agentic memory tasks where the goal is accurate retrieval and coherent synthesis rather than exact phrasing. To better capture semantic correctness, we adopt an LLM-based evaluator (gpt-4o-mini) as a proxy for human judgment. In this section, we assess the reliability of this protocol by analyzing the misalignment between lexical and semantic metrics and demonstrating the stability of our system rankings across competitive evaluation settings.
          - generic [ref=e849]:
            - heading "4.3.1 The Misalignment Gap" [level=4] [ref=e850]:
              - generic [ref=e851]: 4.3.1
              - text: The Misalignment Gap
            - paragraph [ref=e853]: Do lexical metrics correctly identify the best memory system? To examine this, we compared system rankings produced by F1-score with those generated by an LLM-based judge across six representative architectures on the LoCoMo dataset.
            - paragraph [ref=e855]:
              - text: Table
              - link "3" [ref=e856] [cursor=pointer]:
                - /url: "#S4.T3"
              - text: (Left) reveals a significant disconnect. Lexical metrics often fail to capture the strengths of abstractive memory systems. For example, AMem achieves solid semantic performance (Rank 4 across prompts) due to its logical coherence, yet it is heavily penalized by F1 (Rank 5, Score 0.116) because it does not rely on verbatim overlap. In contrast, SimpleMem receives a relatively higher F1 score (0.268) despite demonstrating limited ability to synthesize complex answers (semantic score < 0.30). This divergence indicates that optimizing solely for F1 may favor surface-level memorization over genuine reasoning and memory integration.
          - generic [ref=e857]:
            - heading "4.3.2 Semantic Judge Robustness Across Prompts" [level=4] [ref=e858]:
              - generic [ref=e859]: 4.3.2
              - text: Semantic Judge Robustness Across Prompts
            - paragraph [ref=e861]:
              - text: A common concern with LLM-as-a-judge is “prompt overfitting,” where a system appears strong only under a specific grading instruction. To ensure fairness and generality, we evaluated all architectures using three distinct prompt protocols derived from different sources (details in Appendix
              - link "D.3" [ref=e862] [cursor=pointer]:
                - /url: "#A4.SS3"
              - text: ).
            - paragraph [ref=e864]:
              - text: As shown in Table
              - link "3" [ref=e865] [cursor=pointer]:
                - /url: "#S4.T3"
              - text: "(Right), compared with F1-based rankings, the semantic judge exhibits strong robustness: the relative ordering of architectures remains highly consistent across different rubrics. While absolute scores fluctuate due to variations in grading strictness and prompt formulation, the comparative conclusions remain stable."
          - generic [ref=e866]:
            - heading "4.3.3 Discussion" [level=4] [ref=e867]:
              - generic [ref=e868]: 4.3.3
              - text: Discussion
            - paragraph [ref=e870]:
              - text: "Lexical metrics provide a convenient baseline but systematically diverge from semantic judgments due to two core failure modes: the Paraphrase Penalty, where correct abstractive answers are penalized for low token overlap, and the Negation Trap, where high overlap masks factual errors. Detailed examples are provided in Appendix"
              - link "F" [ref=e871] [cursor=pointer]:
                - /url: "#A6"
              - text: .
            - paragraph [ref=e873]: "In contrast, the semantic judge demonstrates greater stability: architecture rankings remain consistent across different grading rubrics, suggesting it better reflects underlying memory quality rather than surface phrasing. Although absolute scores vary with prompt strictness and some models show rubric-aligned specialization, the relative ordering is robust."
            - paragraph [ref=e875]: Overall, these results support LLM-as-a-judge as a more reliable evaluation protocol for agentic memory, while highlighting the importance of careful prompt design.
