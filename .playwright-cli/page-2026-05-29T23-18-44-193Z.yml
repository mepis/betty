            - paragraph [ref=e1132]: Beyond user-facing latency, maintenance introduces a hidden scalability constraint. Append-only or lightweight systems incur lower update cost, whereas structured architectures (e.g., MAGMA, AMem) require graph restructuring and LLM-driven consolidation. Although often asynchronous, excessive maintenance overhead risks throughput collapse, where updates lag behind user interactions and memory becomes stale. Thus, structured memory demands robust asynchronous infrastructure to remain viable at scale.
          - generic [ref=e1133]:
            - 'heading "4.5.2 Offline Scalability: Time and Token Economics" [level=4] [ref=e1134]':
              - generic [ref=e1135]: 4.5.2
              - text: "Offline Scalability: Time and Token Economics"
            - paragraph [ref=e1137]: Beyond online latency, we evaluate the offline cost of building the memory index. AMem requires approximately 15 hours for construction far slower than other baselines, suggesting super-linear update complexity (e.g., pairwise consolidation) that limits scalability on large datasets.
            - paragraph [ref=e1139]: Token consumption further exposes cost trade-offs. Nemori uses over 7.04M tokens during index construction, nearly five times that of SimpleMem (1.3M). Although this yields strong accuracy, it reflects a substantial “intelligence tax,” where improved memory quality incurs significantly higher operational cost. In comparison, MAGMA achieves a more favorable Pareto balance, delivering robust performance with moderate token usage (2.7M).
      - generic [ref=e1140]:
        - heading "5 Conclusion and Future Directions" [level=2] [ref=e1141]:
          - generic [ref=e1142]: "5"
          - text: Conclusion and Future Directions
        - paragraph [ref=e1144]: Our analysis shows that agentic memory is limited not only by architecture, but also by evaluation validity, scalability, and robustness.
        - generic [ref=e1145]:
          - heading "1. Rethinking Benchmark and Evaluation Design." [level=5] [ref=e1146]
          - paragraph [ref=e1148]:
            - text: Future benchmarks should be saturation-aware. As context windows expand, full-context prompting may solve many tasks, making it harder to isolate the value of external memory. Benchmarks should therefore stress task volume, temporal depth, entity diversity, and long-range dependency, while using the Context Saturation Gap (
            - math [ref=e1149]:
              - generic [ref=e1151]: Δ
            - text: ) as a diagnostic signal.
          - paragraph [ref=e1153]: Evaluation should also move beyond lexical overlap. F1-style metrics often miss semantic correctness, while LLM-as-a-judge requires prompt calibration and robustness checks.
        - generic [ref=e1154]:
          - heading "2. Designing Scalable and Robust Agentic Memory Systems." [level=5] [ref=e1155]
          - paragraph [ref=e1157]: Agentic memory systems must balance accuracy, latency, cost, and reliability. Structured memory improves reasoning but introduces maintenance overhead, while lightweight approaches improve efficiency but may lack abstraction.
          - paragraph [ref=e1159]: Future systems should explicitly model write latency, maintenance throughput, and user-facing cost. They should also use backbone-aware memory operations, constrained decoding, validation layers, or adaptive schemas to reduce silent corruption.
      - generic [ref=e1160]:
        - heading "Limitations" [level=2] [ref=e1161]
        - paragraph [ref=e1163]: This survey has several limitations. First, agentic memory is evolving rapidly, so our taxonomy may miss concurrent or very recent systems. Second, our empirical analysis covers representative MAG architectures and selected benchmarks rather than all systems and settings; results may vary with implementations, prompts, model versions, and API behavior. These limitations call for broader, standardized evaluations of agentic memory systems.
