              - text: .
            - paragraph [ref=e716]:
              - text: Volume (Total Token Load). This dimension captures the aggregate information size a model must process. Benchmarks such as HotpotQA (
              - math [ref=e717]:
                - generic [ref=e719]: ∼
              - text: 1k tokens) and MemBench (
              - math [ref=e720]:
                - generic [ref=e722]: ∼
              - text: 100k tokens) fall within a 128k context window, implying high theoretical saturation risk. LoCoMo (
              - math [ref=e723]:
                - generic [ref=e725]: ∼
              - text: 20k tokens) similarly remains comfortably in-window for modern models. Only datasets that substantially exceed the active window (e.g., LongMemEval-M at >1M tokens) structurally require external memory.
            - paragraph [ref=e727]: Interaction Depth (Temporal Structure). Beyond raw volume, scalability depends on how information unfolds across sessions. Single-turn QA (e.g., HotpotQA) imposes minimal temporal dependency, whereas multi-session settings (e.g., LoCoMo with 35 sessions) introduce longitudinal reasoning. However, unless cross-session dependencies exceed the active window or require persistent state tracking beyond prompt capacity, such datasets may still be solvable through direct in-context aggregation rather than true memory management.
            - paragraph [ref=e729]: Entity Diversity (Relational Complexity). This axis measures how many distinct entities or conceptual threads must be tracked simultaneously. Low-diversity benchmarks permit near-isolated retrieval, while higher-diversity settings (e.g., LoCoMo, LongMemEval) increase interference and relational reasoning demands. Nevertheless, if entity interactions remain bounded within context limits, structured external memory may not be strictly necessary.
            - paragraph [ref=e731]: "Discussion: Taken together, these dimensions show that saturation risk is determined not by surface difficulty but by whether a benchmark’s structural properties exceed the representational capacity of long-context LLMs."
