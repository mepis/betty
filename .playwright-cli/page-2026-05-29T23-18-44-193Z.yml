          - paragraph [ref=e588]: The four categories described above capture the dominant memory structures used in contemporary MAG systems. While individual systems may combine multiple mechanisms, each can typically be characterized by a primary memory organization that governs its behavior. This structure-first taxonomy provides a foundation for understanding how design choices in agentic memory influence accuracy, efficiency, and reliability. In the next section, we build on this taxonomy to analyze the empirical limitations and pain points that arise across current MAG systems.
