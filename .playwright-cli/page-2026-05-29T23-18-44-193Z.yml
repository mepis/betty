          - paragraph [ref=e1040]:
            - text: While accuracy is critical, the practical viability of agentic memory is constrained by latency and cost. Unlike read-only RAG systems, agentic memory introduces maintenance operations such as memory extraction, updates, and consolidation. We measure the user-facing load as retrieval (
