              - generic [ref=e711]: 4.2.1
              - text: Dimensions of Limitation
            - paragraph [ref=e713]:
              - text: "First, we evaluate benchmark scalability along three structural axes: volume, interaction depth, and entity diversity, to assess their saturation risk under long-context LLMs as shown in Table"
              - link "2" [ref=e714] [cursor=pointer]:
