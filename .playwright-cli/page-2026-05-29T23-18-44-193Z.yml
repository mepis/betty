        - paragraph [ref=e396]:
          - text: "Two coupled processes are operated in agentic memory: inference-time recall and memory update. At each step, the agent retrieves relevant information from an external memory store to condition its decision, and subsequently writes, updates, or consolidates memory to maintain a useful long-term state. Unlike parametric learning, this mechanism influences behavior through explicit read–write operations over an evolving memory state rather than by modifying model weights. A formalization of these operations including query generation, utility-aware retrieval, and memory actions such as store, summarize, link, and delete is provided in Appendix"
