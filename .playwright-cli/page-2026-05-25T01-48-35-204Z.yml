        - paragraph [ref=e118]:
          - generic [ref=e119]:
            - text: "We present a technical tutorial for building enterprise-grade realtime voice agents from first principles. While end-to-end speech-to-speech models may ultimately provide the best latency for voice agents, fully self-hosted end-to-end solutions are not yet available. We evaluate the closest candidate, Qwen3-Omni, across three configurations: its cloud-only DashScope Realtime API achieves"
            - math [ref=e120]:
              - generic [ref=e122]: ∼
            - text: 702ms audio-to-audio latency with streaming, but is not self-hostable; its local vLLM deployment supports only the Thinker (text generation from audio, 516ms), not the Talker (audio synthesis); and its local Transformers deployment runs the full pipeline but at
            - math [ref=e123]:
              - generic [ref=e125]: ∼
            - text: 146s—far too slow for realtime. The cascaded streaming pipeline (STT
            - math [ref=e126]:
              - generic [ref=e128]: →
            - text: LLM
            - math [ref=e129]:
              - generic [ref=e131]: →
            - text: TTS) therefore remains the practical architecture for self-hosted realtime voice agents, and the focus of this tutorial. We build a complete voice agent using Deepgram (streaming STT), vLLM-served LLMs with function calling (streaming text generation), and ElevenLabs (streaming TTS), achieving a measured time-to-first-audio of 755ms (best case 729ms) with full function calling support. We release the full codebase as a 9-chapter progressive tutorial with working, tested code for every component.
