                - generic [ref=e1223]: ∼
              - text: 13s TTFA, no function calling). However, this latency is only achievable via the cloud-hosted DashScope API. Locally, only the Thinker (text generation) can be served efficiently via vLLM; the Talker (audio synthesis) lacks an optimized self-hosted serving solution.
          - listitem [ref=e1224]:
            - text: "2."
            - paragraph [ref=e1226]:
              - text: "The cascaded pipeline is still necessary: For fully self-hosted realtime voice agents with function calling and streaming audio output, the STT"
              - math [ref=e1227]:
                - generic [ref=e1229]: →
              - text: LLM
              - math [ref=e1230]:
                - generic [ref=e1232]: →
              - text: TTS cascaded pipeline remains the only viable architecture, achieving
              - math [ref=e1233]:
                - generic [ref=e1235]: ∼
              - text: 755ms TTFA.
          - listitem [ref=e1236]:
            - text: "3."
            - paragraph [ref=e1238]: "Realtime = streaming + pipelining: The perception of instant response comes from overlapping execution of components. The sentence buffer is the critical orchestration primitive."
          - listitem [ref=e1239]:
            - text: "4."
            - paragraph [ref=e1241]: "A voice agent is an LLM agent with voice I/O: The hard part is the agent (reasoning, tools), not the voice. Building the voice layer from scratch is tractable once the streaming pattern is understood."
