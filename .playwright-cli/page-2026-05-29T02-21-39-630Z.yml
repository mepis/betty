                        - paragraph [ref=e2819]: "Thanks. It isn't the fastest setup around, especially when working with 70B+ models, but it is completely usable for inference. There are also some benefits I like about these particular cards (Gigabyte Windforce):"
                        - list [ref=e2820]:
                          - listitem [ref=e2821]: Two slots thick and only ~200 mm in length makes them easy to fit in a wide variety of cases
                          - listitem [ref=e2822]: Physical x8 PCI-e connector lets them fit in either x8 or x16 slots without modification (5060 TIs only use 8 lanes anyhow)
                          - listitem [ref=e2823]: Quiet (Silent when idle)
                          - listitem [ref=e2824]: Low idle power consumption (~5 watts per card)
                          - listitem [ref=e2825]: Relatively low power draw under full load (<180W each), so easy to power all four with an inexpensive PSU
                      - button "eyes 1" [disabled] [ref=e2832]:
