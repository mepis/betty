                  - text: ", but for CUDA! I think it's good to consolidate and discuss our results here."
                - paragraph [ref=e194]:
                  - text: We'll be testing the
                  - strong [ref=e195]: Llama 2 7B
                  - text: model like the other thread to keep things consistent, and use
                  - strong [ref=e196]: Q4_0
                  - text: as it's simple to compute and small enough to fit on a 4GB GPU. You can
                  - link "download it here" [ref=e197] [cursor=pointer]:
