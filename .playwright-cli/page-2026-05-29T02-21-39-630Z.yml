                  - heading "CMP 100-210 (Mining GV100 - sm_70/Volta - 16GB HBM2)" [level=3] [ref=e5703]
                  - paragraph [ref=e5704]: "I thought I'd chip in with a card I haven't seen good stats on: the CMP 100-210, a mining version of the V100. Like other CMP cards, the card is gimped to PCIe 1.1 x1 and has its Tensor Cores disabled, but seems to otherwise retain decent FP32 + FP16 performance and fully working 16GB of HBM2 memory. (FP64 however is mega gimped to ~0.377 TFLOPS unlike the real V100's 7.8 TFLOPs)."
                  - list [ref=e5705]:
                    - listitem [ref=e5706]: All tests were run with a 180W power limit; running at the full 250W gives no additional speed increase.
                    - listitem [ref=e5707]:
                      - text: llama.cpp was compiled with
                      - code [ref=e5708]: "-DGGML_CUDA=ON -DGGML_RPC=ON -DCMAKE_CUDA_ARCHITECTURES=\"70\""
