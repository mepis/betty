                  - text: .
                - heading "Instructions" [level=3] [ref=e198]
                - paragraph [ref=e199]:
                  - text: Either run the commands below or download one of our
                  - link "CUDA releases" [ref=e200] [cursor=pointer]:
                    - /url: https://github.com/ggml-org/llama.cpp/releases
                  - text: . If you have multiple GPUs please run the test on a single GPU using
                  - code [ref=e201]: "-sm none -mg YOUR_GPU_NUMBER"
                  - text: unless the model is too big to fit in VRAM.
                - generic [ref=e202]:
                  - code [ref=e204]: wget https://huggingface.co/TheBloke/Llama-2-7B-GGUF/resolve/main/llama-2-7b.Q4_0.gguf llama-bench -m llama-2-7b.Q4_0.gguf -ngl 99 -fa 0,1
                  - button "Copy code to clipboard" [ref=e206] [cursor=pointer]:
                    - img [ref=e207]
                - paragraph [ref=e210]: Share your llama-bench results along with the git hash and CUDA info string in the comments. Feel free to try other models and compare backends, but only valid runs will be placed on the scoreboard.
                - paragraph [ref=e211]: If multiple entries are posted for the same device I'll prioritize newer commits with substantial CUDA updates, otherwise I'll pick the one with the highest overall score at my discretion. Performance may vary depending on driver, operating system, board manufacturer, etc. even if the chip is the same. For integrated graphics note that your memory speed and number of channels will greatly affect your inference speed!
