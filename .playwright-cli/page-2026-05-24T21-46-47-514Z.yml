          - article [ref=e131]:
            - generic [ref=e132]:
              - paragraph [ref=e133]:
                - text: AI agents often operate in
                - strong [ref=e134]: long-running, multi-turn interactions
                - text: ", where keeping the right balance of"
                - strong [ref=e135]: context
                - text: is critical. If too much is carried forward, the model risks distraction, inefficiency, or outright failure. If too little is preserved, the agent loses coherence.
              - paragraph [ref=e136]:
                - text: Here, context refers to the total window of tokens (input + output) that the model can attend to at once. For
                - link "GPT-5" [ref=e137] [cursor=pointer]:
                  - /url: https://platform.openai.com/docs/models/gpt-5
                - text: ", this capacity is up to 272k input tokens and 128k output tokens but even such a large window can be overwhelmed by uncurated histories, redundant tool results, or noisy retrievals. This makes context management not just an optimization, but a necessity."
              - paragraph [ref=e138]:
                - text: In this cookbook, we’ll explore how to
                - strong [ref=e139]:
                  - text: manage context effectively using the
                  - code [ref=e140]: Session
                  - text: object from the
                  - link "OpenAI Agents SDK" [ref=e141] [cursor=pointer]:
                    - /url: https://github.com/openai/openai-agents-python
                - text: ", focusing on two proven context management techniques—"
                - strong [ref=e142]: trimming
                - text: and
                - strong [ref=e143]: compression
                - text: —to keep agents fast, reliable, and cost-efficient.
              - heading "Why Context Management Matters Copy link to Why Context Management Matters" [level=4] [ref=e144]:
                - generic [ref=e145]: Why Context Management Matters
                - button "Copy link to Why Context Management Matters" [ref=e146] [cursor=pointer]:
                  - img [ref=e147]
              - list [ref=e149]:
                - listitem [ref=e150]:
                  - strong [ref=e151]: Sustained coherence across long threads
                  - text: – Keep the agent anchored to the latest user goal without dragging along stale details. Session-level trimming and summaries prevent “yesterday’s plan” from overriding today’s ask.
                - listitem [ref=e152]:
                  - strong [ref=e153]: Higher tool-call accuracy
                  - text: – Focused context improves function selection and argument filling, reducing retries, timeouts, and cascading failures during multi-tool runs.
                - listitem [ref=e154]:
                  - strong [ref=e155]: Lower latency & cost
                  - text: – Smaller, sharper prompts cut tokens per turn and attention load.
                - listitem [ref=e156]:
                  - strong [ref=e157]: Error & hallucination containment
                  - text: – Summaries act as “clean rooms” that correct or omit prior mistakes; trimming avoids amplifying bad facts (“context poisoning”) turn after turn.
                - listitem [ref=e158]:
                  - strong [ref=e159]: Easier debugging & observability
                  - text: "– Stable summaries and bounded histories make logs comparable: you can diff summaries, attribute regressions, and reproduce failures reliably."
                - listitem [ref=e160]:
                  - strong [ref=e161]: Multi-issue and handoff resilience
                  - text: – In multi-problem chats, per-issue mini-summaries let the agent pause/resume, escalate to humans, or hand off to another agent while staying consistent.
              - paragraph [ref=e162]:
                - img "Memory Comparison in AI Agents" [ref=e163]
              - paragraph [ref=e164]:
                - text: The
                - link "OpenAI Responses API" [ref=e165] [cursor=pointer]:
                  - /url: https://platform.openai.com/docs/api-reference/responses/create#responses-create-previous_response_id
                - text: includes
                - strong [ref=e166]: basic memory support
                - text: through built-in state and message chaining with
                - code [ref=e167]: previous_response_id
                - text: .
              - paragraph [ref=e168]:
                - text: You can continue a conversation by passing the prior response’s
                - code [ref=e169]: id
                - text: as
                - code [ref=e170]: previous_response_id
                - text: ", or you can manage context manually by collecting outputs into a list and resubmitting them as the"
                - code [ref=e171]: input
                - text: for the next response.
              - paragraph [ref=e172]:
                - text: What you don’t get is
                - strong [ref=e173]: automatic memory management
                - text: . That’s where the
                - strong [ref=e174]: Agents SDK
                - text: comes in. It provides
                - link "session memory" [ref=e175] [cursor=pointer]:
                  - /url: https://openai.github.io/openai-agents-python/sessions/
                - text: on top of Responses, so you no longer need to manually append
                - code [ref=e176]: response.output
                - text: or track IDs yourself. The session becomes the
                - strong [ref=e177]: memory object
                - text: ": you simply call"
                - code [ref=e178]: session.run("...")
                - text: repeatedly, and the SDK handles context length, history, and continuity—making it far easier to build coherent, multi-turn agents.
              - heading "Real-World Scenario Copy link to Real-World Scenario" [level=4] [ref=e179]:
                - generic [ref=e180]: Real-World Scenario
                - button "Copy link to Real-World Scenario" [ref=e181] [cursor=pointer]:
                  - img [ref=e182]
              - paragraph [ref=e184]: "We’ll ground the techniques in a practical example for one of the common long-running tasks, such as:"
              - list [ref=e185]:
                - listitem [ref=e186]:
                  - strong [ref=e187]: Multi-turn Customer Service Conversations
                  - text: In extended conversations about tech products—spanning both hardware and software—customers often surface multiple issues over time. The agent must stay consistent and goal-focused while retaining only the essentials rather than hauling along every past detail.
              - heading "Techniques Covered Copy link to Techniques Covered" [level=4] [ref=e188]:
                - generic [ref=e189]: Techniques Covered
                - button "Copy link to Techniques Covered" [ref=e190] [cursor=pointer]:
                  - img [ref=e191]
              - paragraph [ref=e193]: "To address these challenges, we introduce two separate concrete approaches using OpenAI Agents SDK:"
              - list [ref=e194]:
                - listitem [ref=e195]:
                  - paragraph [ref=e196]:
                    - strong [ref=e197]: Context Trimming
                    - text: – dropping older turns while keeping the last N turns.
                  - list [ref=e198]:
                    - listitem [ref=e199]:
                      - paragraph [ref=e200]:
                        - strong [ref=e201]: Pros
                      - list [ref=e202]:
                        - listitem [ref=e203]:
                          - strong [ref=e204]: "Deterministic & simple:"
                          - text: No summarizer variability; easy to reason about state and to reproduce runs.
                        - listitem [ref=e205]:
                          - strong [ref=e206]: "Zero added latency:"
                          - text: No extra model calls to compress history.
                        - listitem [ref=e207]:
                          - strong [ref=e208]: "Fidelity for recent work:"
                          - text: Latest tool results, parameters, and edge cases stay verbatim—great for debugging.
                        - listitem [ref=e209]:
                          - strong [ref=e210]: "Lower risk of “summary drift”:"
                          - text: You never reinterpret or compress facts.
                      - paragraph [ref=e211]:
                        - strong [ref=e212]: Cons
                      - list [ref=e213]:
                        - listitem [ref=e214]:
                          - strong [ref=e215]: "Forgets long-range context abruptly:"
                          - text: Important earlier constraints, IDs, or decisions can vanish once they scroll past N.
                        - listitem [ref=e216]:
                          - strong [ref=e217]: "User experience “amnesia”:"
                          - text: Agent can appear to “forget” promises or prior preferences midway through long sessions.
                        - listitem [ref=e218]:
                          - strong [ref=e219]: "Wasted signal:"
                          - text: Older turns may contain reusable knowledge (requirements, constraints) that gets dropped.
                        - listitem [ref=e220]:
                          - strong [ref=e221]: "Token spikes still possible:"
                          - text: If a recent turn includes huge tool payloads, your last-N can still blow up the context.
                    - listitem [ref=e222]:
                      - paragraph [ref=e223]:
                        - strong [ref=e224]: Best when
                      - list [ref=e225]:
                        - listitem [ref=e226]: Your tasks in the conversation is indepentent from each other with non-overlapping context that does not reuqire carrying previous details further.
                        - listitem [ref=e227]: You need predictability, easy evals, and low latency (ops automations, CRM/API actions).
                        - listitem [ref=e228]: The conversation’s useful context is local (recent steps matter far more than distant history).
                - listitem [ref=e229]:
                  - paragraph [ref=e230]:
                    - strong [ref=e231]: Context Summarization
                    - text: – compressing prior messages(assistant, user, tools, etc.) into structured, shorter summaries injected into the conversation history.
                  - list [ref=e232]:
                    - listitem [ref=e233]:
                      - paragraph [ref=e234]:
                        - strong [ref=e235]: Pros
                      - list [ref=e236]:
                        - listitem [ref=e237]:
                          - strong [ref=e238]: "Retains long-range memory compactly:"
                          - text: Past requirements, decisions, and rationales persist beyond N.
                        - listitem [ref=e239]:
                          - strong [ref=e240]: "Smoother UX:"
                          - text: Agent “remembers” commitments and constraints across long sessions.
                        - listitem [ref=e241]:
                          - strong [ref=e242]: "Cost-controlled scale:"
                          - text: One concise summary can replace hundreds of turns.
                        - listitem [ref=e243]:
                          - strong [ref=e244]: "Searchable anchor:"
                          - text: A single synthetic assistant message becomes a stable “state of the world so far.”
                      - paragraph [ref=e245]:
                        - strong [ref=e246]: Cons
                      - list [ref=e247]:
                        - listitem [ref=e248]:
                          - strong [ref=e249]: "Summarization loss & bias:"
                          - text: Details can be dropped or misweighted; subtle constraints may vanish.
                        - listitem [ref=e250]:
                          - strong [ref=e251]: "Latency & cost spikes:"
                          - text: Each refresh adds model work (and potentially tool-trim logic).
                        - listitem [ref=e252]:
                          - strong [ref=e253]: "Compounding errors:"
                          - text: If a bad fact enters the summary, it can
                          - strong [ref=e254]: poison
                          - text: future behavior (“context poisoning”).
                        - listitem [ref=e255]:
                          - strong [ref=e256]: "Observability complexity:"
                          - text: You must log summary prompts/outputs for auditability and evals.
                    - listitem [ref=e257]:
                      - paragraph [ref=e258]:
                        - strong [ref=e259]: Best when
                      - list [ref=e260]:
                        - listitem [ref=e261]: You have use cases where your tasks needs context collected accross the flow such as planning/coaching, RAG-heavy analysis, policy Q&A.
                        - listitem [ref=e262]: You need continuity over long horizons and carry the important details further to solve related tasks.
                        - listitem [ref=e263]: Sessions exceed N turns but must preserve decisions, IDs, and constraints reliably.
              - paragraph [ref=e264]:
                - strong [ref=e265]: Quick comparison
              - table [ref=e266]:
                - rowgroup [ref=e267]:
                  - row "Dimension Trimming (last-N turns) Summarizing (older → generated summary)" [ref=e268]:
