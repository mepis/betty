              - paragraph [ref=e741]:
                - strong [ref=e742]: Summarization Prompt
              - paragraph [ref=e743]:
                - text: A well-crafted summarization prompt is essential for preserving the context of a conversation, and it should always be tailored to the specific use case. Think of it like
                - strong [ref=e744]: being a customer support agent handing off a case to the next agent
                - text: ". What concise yet critical details would they need to continue smoothly? The prompt should strike the right balance: not overloaded with unnecessary information, but not so sparse that key context is lost. Achieving this balance requires careful design and ongoing experimentation to fine-tune the level of detail."
              - generic [ref=e745]:
                - code [ref=e746]:
                  - generic [ref=e747]: SUMMARY_PROMPT = """
                  - generic [ref=e748]: You are a senior customer-support assistant for tech devices, setup, and software issues.
                  - generic [ref=e749]: Compress the earlier conversation into a precise, reusable snapshot for future turns.
                  - generic [ref=e750]: "Before you write (do this silently):"
                  - generic [ref=e751]: "- Contradiction check: compare user claims with system instructions and tool definitions/logs; note any conflicts or reversals."
                  - generic [ref=e752]: "- Temporal ordering: sort key events by time; the most recent update wins. If timestamps exist, keep them."
                  - generic [ref=e753]: "- Hallucination control: if any fact is uncertain/not stated, mark it as UNVERIFIED rather than guessing."
                  - generic [ref=e754]: "Write a structured, factual summary ≤ 200 words using the sections below (use the exact headings):"
                  - generic [ref=e755]: "• Product & Environment:"
                  - generic [ref=e756]: "- Device/model, OS/app versions, network/context if mentioned."
                  - generic [ref=e757]: "• Reported Issue:"
                  - generic [ref=e758]: "- Single-sentence problem statement (latest state)."
                  - generic [ref=e759]: "• Steps Tried & Results:"
                  - generic [ref=e760]: "- Chronological bullets (include tool calls + outcomes, errors, codes)."
                  - generic [ref=e761]: "• Identifiers:"
                  - generic [ref=e762]: "- Ticket #, device serial/model, account/email (only if provided)."
                  - generic [ref=e763]: "• Timeline Milestones:"
                  - generic [ref=e764]: "- Key events with timestamps or relative order (e.g., 10:32 install → 10:41 error)."
                  - generic [ref=e765]: "• Tool Performance Insights:"
                  - generic [ref=e766]: "- What tool calls worked/failed and why (if evident)."
                  - generic [ref=e767]: "• Current Status & Blockers:"
                  - generic [ref=e768]: "- What’s resolved vs pending; explicit blockers preventing progress."
                  - generic [ref=e769]: "• Next Recommended Step:"
                  - generic [ref=e770]: "- One concrete action (or two alternatives) aligned with policies/tools."
                  - generic [ref=e771]: "Rules:"
                  - generic [ref=e772]: "- Be concise, no fluff; use short bullets, verbs first."
                  - generic [ref=e773]: "- Do not invent new facts; quote error strings/codes exactly when available."
                  - generic [ref=e774]: "- If previous info was superseded, note “Superseded:” and omit details unless critical."
                  - generic [ref=e775]: "\"\"\""
                - button "Copy code to clipboard" [ref=e777] [cursor=pointer]:
                  - img [ref=e778]
              - paragraph [ref=e780]:
                - strong [ref=e781]: Key Principles for Designing Memory Summarization Prompts
              - list [ref=e782]:
                - listitem [ref=e783]:
                  - paragraph [ref=e784]:
                    - strong [ref=e785]: "Milestones:"
                    - text: Highlight important events in the conversation—for example, when an issue is resolved, valuable information is uncovered, or all necessary details have been collected.
                - listitem [ref=e786]:
                  - paragraph [ref=e787]:
                    - strong [ref=e788]: "Use Case Specificity:"
                    - text: Tailor the compression prompt to the specific use case. Think about how a human would track and recall information in working memory while solving the same task.
                - listitem [ref=e789]:
                  - paragraph [ref=e790]:
                    - strong [ref=e791]: "Contradiction Check:"
                    - text: Ensure the summary does not conflict with itself, system instructions or tool definitions. This is especially critical for reasoning models, which are more prone to conflicts in the context.
                - listitem [ref=e792]:
                  - paragraph [ref=e793]:
                    - strong [ref=e794]: "Timestamps & Temporal Flow:"
                    - text: Incorporate timing of events in the summary. This helps the model reason about updates in sequence and reduces confusion when forgetting or remembering the latest memory over a timeline.
                - listitem [ref=e795]:
                  - paragraph [ref=e796]:
                    - strong [ref=e797]: "Chunking:"
                    - text: Organize details into categories or sections rather than long paragraphs. Structured grouping improves an LLM’s ability to understand relationships between pieces of information.
                - listitem [ref=e798]:
                  - paragraph [ref=e799]:
                    - strong [ref=e800]: "Tool Performance Insights:"
                    - text: Capture lessons learned from multi-turn, tool-enabled interactions—for example, noting which tools worked effectively for specific queries and why. These insights are valuable for guiding future steps.
                - listitem [ref=e801]:
                  - paragraph [ref=e802]:
                    - strong [ref=e803]: "Guidance & Examples:"
                    - text: Steer the summary with clear guidance. Where possible, extract concrete examples from the conversation history to make future turns more grounded and context-rich.
                - listitem [ref=e804]:
                  - paragraph [ref=e805]:
                    - strong [ref=e806]: "Hallucination Control:"
                    - text: Be precise in what you include. Even minor hallucinations in a summary can propagate forward, contaminating future context with inaccuracies.
                - listitem [ref=e807]:
                  - paragraph [ref=e808]:
                    - strong [ref=e809]: "Model Choice:"
                    - text: Select a summarizer model based on use case requirements, summary length, and tradeoffs between latency and cost. In some cases, using the same model as the AI agent itself can be advantageous.
