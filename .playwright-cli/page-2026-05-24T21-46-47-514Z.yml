              - paragraph [ref=e1313]:
                - text: Ultimately,
                - strong [ref=e1314]: evals is all you need
                - text: "for context engineering too. The key question to ask is:"
                - emphasis [ref=e1315]: how do we know the model isn’t “losing context” or “confusing context”?
              - paragraph [ref=e1316]: "While a full cookbook around memory could stand on its own in the future, here are some lightweight evaluation harness ideas to start with:"
              - list [ref=e1317]:
                - listitem [ref=e1318]:
                  - strong [ref=e1319]: "Baseline & Deltas:"
                  - text: Continue running your core eval sets and compare before/after experiments to measure memory improvements.
                - listitem [ref=e1320]:
                  - strong [ref=e1321]: "LLM-as-Judge:"
                  - text: Use a model with a carefully designed grader prompt to evaluate summarization quality. Focus on whether it captures the most important details in the correct format.
                - listitem [ref=e1322]:
                  - strong [ref=e1323]: "Transcript Replay:"
                  - text: Re-run long conversations and measure next-turn accuracy with and without context trimming. Metrics could include exact match on entities/IDs and rubric-based scoring on reasoning quality.
                - listitem [ref=e1324]:
                  - strong [ref=e1325]: "Error Regression Tracking:"
                  - text: Watch for common failure modes—unanswered questions, dropped constraints, or unnecessary/repeated tool calls.
                - listitem [ref=e1326]:
                  - strong [ref=e1327]: "Token Pressure Checks:"
                  - text: Flag cases where token limits force dropping protected context. Log before/after token counts to detect when critical details are being pruned.
