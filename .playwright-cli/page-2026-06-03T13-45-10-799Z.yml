ssion\\\"]); readline.createInterface({ input: agent.stdout }).on(\\\"line\\\", (line) => { const event = JSON.parse(line); if (event.type === \\\"message_update\\\") { const { assistantMessageEvent } = event; if (assistantMessageEvent.type === \\\"text_delta\\\") { process.stdout.write(assistantMessageEvent.delta); } } }); // Send prompt agent.stdin.write(JSON.stringify({ type: \\\"prompt\\\", message: \\\"Hello\\\" }) + \\\"\\\\n\\\"); // Abort on Ctrl+C process.on(\\\"SIGINT\\\", () => { agent.stdin.write(JSON.stringify({ type: \\\"abort\\\" }) + \\\"\\\\n\\\"); });\", \"publishedDate\": null, \"thumbnail\": \"\", \"engine\": \"brave\", \"parsed_url\": [\"https\", \"hochej.github.io\", \"/pi-mono/coding-agent/rpc/\", \"\", \"\", \"\"], \"img_src\": \"\", \"priority\": \"\", \"engines\": [\"brave\", \"duckduckgo\"], \"positions\": [8, 2], \"score\": 1.25, \"category\": \"general\"}, {\"url\": \"https://github.com/badlogic/pi-mono/blob/main/packages/coding-agent/README.md\", \"title\": \"pi/packages/coding-agent/README.md at main \\u00b7 earendil-works/pi\", \"content\": \"For advanced multi-session runtime replacement, use createAgentSessionRuntime() and AgentSessionRuntime. See docs/sdk.md and examples/sdk/. For non-Node.js integrations, use RPC mode over stdin/stdout: ... RPC mode uses strict LF-delimited JSONL framing. Clients must split records on \\\\n only. Do not use generic line readers like Node readline, which also split on Unicode separators inside JSON payloads. See docs/rpc.md for the protocol.\", \"publishedDate\": null, \"engine\": \"startpage\", \"template\": \"default.html\", \"parsed_url\": [\"https\", \"github.com\", \"/badlogic/pi-mono/blob/main/packages/coding-agent/README.md\", \"\", \"\", \"\"], \"img_src\": \"\", \"thumbnail\": \"\", \"priority\": \"\", \"engines\": [\"startpage\", \"brave\"], \"positions\": [2, 11], \"score\": 1.1818181818181819, \"category\": \"general\"}, {\"url\": \"https://agent-safehouse.dev/docs/agent-investigations/