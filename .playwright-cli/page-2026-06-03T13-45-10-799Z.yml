e browser using the same @mariozechner/pi-web-ui components the official project provides. Browser (Lit + pi-web-ui components) \\u2502 WebSocket (/api/ws) \\u25bc Node.js server (Express + ws) \\u2502 Pi SDK (createAgentSession) \\u25bc System tools (bash, files, skills, extensions) \\u2502 \\u25bc LiteLLM \\u2192 llama-swap / Lemonade Server \\u2192 GPU / NPU\", \"publishedDate\": \"2026-04-11T00:00:00\", \"thumbnail\": \"https://imgs.search.brave.com/GgExZtJZBq_ZCmEJrSq5QO44q0NdbPrM8SbLYo5yVdo/rs:fit:200:200:1:0/g:ce/aHR0cHM6Ly9zbGVl/cGluZ3JvYm90cy5j/b20vb2cucG5n\", \"engine\": \"brave\", \"parsed_url\": [\"https\", \"sleepingrobots.com\", \"/dreams/pi-web-ui/\", \"\", \"\", \"\"], \"img_src\": \"\", \"priority\": \"\", \"engines\": [\"brave\"], \"positions\": [3], \"score\": 0.3333333333333333, \"category\": \"general\", \"pubdate\": \"2026-04-11 00:00:00\"}, {\"template\": \"default.html\", \"url\": \"https://nader.substack.com/p/how-to-build-a-custom-agent-framework\", \"title\": \"How to Build a Custom Agent Framework with PI: The Agent Stack Powering OpenClaw\", \"content\": \"The architecture is the same - createAgentSession + session.subscribe() + session.prompt(). The only change is how you render the events: instead of writing to stdout, you add and update Markdown, Text, and Loader components in the TUI\\u2019s component tree. This guide covered the four packages you need to build a terminal-based agent. The remaining pi-mono packages extend the system in other directions: pi-web-ui - Lit web components for browser-based chat interfaces.\", \"publishedDate\": \"2026-02-18T00:00:00\", \"thumbnail\": \"https://imgs.search.brave.com/9EWZvDAmNcGXkLnu1OPvIETcsZVjPbH-_SLTqMkHalk/rs:fit:200:200:1:0/g:ce/aHR0cHM6Ly9zdWJz/dGFja2Nkbi5jb20v/aW1hZ2UvZmV0Y2gv/JHNfIVZoZnIhLGZf/YXV0byxxX2F1dG86/Z29vZCxmbF9wcm9n/cmVzc2l2ZTpzdGVl/cC9odHRwcyUzQSUy/RiUyRnN1YnN0YWNr/LXBvc3QtbWVkaWEu/czMuYW1hem9uYXdz/LmNvbSUyRnB1Ymxp/YyUyRmltYWdlcyUy/RjVjMDM0ZGQxLTQz/OTUtNDZlNi1hNmYx/LTM4ZG