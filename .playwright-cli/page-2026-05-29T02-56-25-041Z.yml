                  - paragraph [ref=e569]: Great thread!
                  - paragraph [ref=e570]: I'm running Qwen 35B A3B on my RTX 2060 laptop (32GB RAM, 6 GB VRAM, i7 9750H, Windows 11) and this is the first model I am able to run at ridiculous amounts of context at great speeds.
