:00\", \"thumbnail\": \"\", \"engine\": \"brave\", \"parsed_url\": [\"https\", \"www.karimarttila.fi\", \"/genai/2026/03/04/qdrant-vector-database-in-genai-projects.html\", \"\", \"\", \"\"], \"img_src\": \"\", \"priority\": \"\", \"engines\": [\"brave\"], \"positions\": [16], \"score\": 0.0625, \"category\": \"general\", \"pubdate\": \"2026-03-04 00:00:00\"}, {\"template\": \"default.html\", \"url\": \"https://arxiv.org/html/2509.12384v1\", \"title\": \"Exploring Distributed Vector Databases Performance on HPC Platforms: A Study with Qdrant\", \"content\": \"This paradigm is used by vector databases such as Qdrant (Qdrant Team, 2025), Vald (Vald Team, 2025), and Weaviate (Weaviate Team, 2025). Alternatively, in a stateless architecture, workers perform computation but do not persistently store the dataset or indexes locally.\", \"publishedDate\": \"2025-09-15T00:00:00\", \"thumbnail\": \"\", \"engine\": \"brave\", \"parsed_url\": [\"https\", \"arxiv.org\", \"/html/2509.12384v1\", \"\", \"\", \"\"], \"img_src\": \"\", \"priority\": \"\", \"engines\": [\"brave\"], \"positions\": [21], \"score\": 0.047619047619047616, \"category\": \"general\", \"pubdate\": \"2025-09-15 00:00:00\"}, {\"template\": \"default.html\", \"url\": \"https://callsphere.ai/blog/vector-database-benchmarks-2026-pgvector-qdrant-weaviate-milvus-lancedb\", \"title\": \"Vector Database Benchmarks 2026: pgvector 0.9, Qdrant, Weaviate, Milvus, LanceDB | CallSphere Blog\", \"content\": \"This is a side-by-side based on April 2026 benchmarks and production reports. flowchart TB pgvector[pgvector 0.9<br/>Postgres extension] --> SQL[Use case: SQL-shaped apps] Qdrant[Qdrant<br/>Rust] --> Hybrid[Use case: hybrid + late interaction] Weaviate[Weaviate<br/>Go] --> Module[Use case: modular + GraphQL] Milvus[Milvus<br/>Go/C++] --> Scale[Use case: largest scale] LanceDB[LanceDB<br/>Rust + Lance] --> Embed[Use case: embedded / data lake]\", \"publishedDate\": \"2026-04-28T00:00:00\", \"thumbnail\": \"https://imgs.