- generic [ref=e2]: "{\"query\": \"opencode.ai external_directory workspace boundary sandbox restrict\", \"number_of_results\": 0, \"results\": [{\"url\": \"https://opencode.ai/docs/permissions/\", \"title\": \"Permissions - opencode.ai\", \"content\": \"Any directory allowed here inherits the same defaults as the current workspace. Since read defaults to allow, reads are also allowed for entries under external_directory unless overridden. Add explicit rules when a tool should be restricted in these paths, such as blocking edits while keeping reads:\", \"publishedDate\": null, \"engine\": \"startpage\", \"template\": \"default.html\", \"parsed_url\": [\"https\", \"opencode.ai\", \"/docs/permissions/\", \"\", \"\", \"\"], \"img_src\": \"\", \"thumbnail\": \"\", \"priority\": \"\", \"engines\": [\"startpage\", \"brave\", \"duckduckgo\"], \"positions\": [1, 2, 1], \"score\": 7.5, \"category\": \"general\"}, {\"template\": \"default.html\", \"url\": \"https://deepwiki.com/different-ai/openwork/4.5-sandbox-mode\", \"title\": \"Sandbox Mode | different-ai/openwork | DeepWiki\", \"content\": \"Sandbox Mode Relevant source files This page documents the Orchestrator CLI's sandbox mode feature, which runs OpenCode, OpenWork Server, and OpenCode Router inside a Linux container boundary while mounting the workspace from the host filesystem. This provides process isolation and enhanced security without requiring a full remote deployment. For information about the Orchestrator CLI's basic ...\", \"publishedDate\": \"2026-04-21T00:00:00\", \"thumbnail\": \"\", \"engine\": \"brave\", \"parsed_url\": [\"https\", \"deepwiki.com\", \"/different-ai/openwork/4.5-sandbox-mode\", \"\", \"\", \"\"], \"img_src\": \"\", \"priority\": \"\", \"engines\": [\"brave\", \"duckduckgo\"], \"positions\": [1, 5], \"score\": 2.4, \"category\": \"general\", \"pubdate\": \"2026-04-21 00:00:00\"}, {\"template\": \"default.html\", \"url\": \"https://open-code.ai/en/docs/permissions\", \"title\": \"OpenCode Permissions: Allow/Deny/Ask Rules for File, Bash, Web - OpenCode Docs\", \"content\": \"Any directory allowed here inherits the same defaults as the current workspace. Since read defaults to allow, reads are also allowed for entries under external_directory unless overridden. Add explicit rules when a tool should be restricted in these paths, such as blocking edits while keeping reads: ... { \\\"$schema\\\": \\\"https://opencode.ai/config.json\\\", \\\"permission\\\": { \\\"external_directory\\\": { \\\"~/projects/personal/**\\\": \\\"allow\\\" }, \\\"edit\\\": { \\\"~/projects/personal/**\\\": \\\"deny\\\" } } }\", \"publishedDate\": \"2026-02-22T00:00:00\", \"thumbnail\": \"\", \"engine\": \"brave\", \"parsed_url\": [\"https\", \"open-code.ai\", \"/en/docs/permissions\", \"\", \"\", \"\"], \"img_src\": \"\", \"priority\": \"\", \"engines\": [\"brave\", \"duckduckgo\"], \"positions\": [3, 2], \"score\": 1.6666666666666665, \"category\": \"general\", \"pubdate\": \"2026-02-22 00:00:00\"}, {\"url\": \"https://github.com/anomalyco/opencode/issues/5529\", \"title\": \"[FEATURE]: Add per-agent filesystem boundaries (allow/deny paths) + optional run-as user for bash \\u00b7 Issue #5529 \\u00b7 anomalyco/opencode\", \"content\": \"OpenCode already has permission.external_directory to require approval when accessing files outside the working directory ([OpenCode][2]). My suggestion: keep that as a simple safety net, but introduce per-agent allow/deny as the \\u201cstrong, explicit boundary\\u201d (works inside the repo too, not just outside). ... Result: blocked immediately with a message indicating which rule denied it. ... Result: fails even if user accidentally approves, because OS user / sandbox cannot read it (hard boundary).\", \"publishedDate\": null, \"engine\": \"startpage\", \"template\": \"default.html\", \"parsed_url\": [\"https\", \"github.com\", \"/anomalyco/opencode/issues/5529\", \"\", \"\", \"\"], \"img_src\": \"\", \"thumbnail\": \"\", \"priority\": \"\", \"engines\": [\"startpage\", \"brave\"], \"positions\": [2, 5], \"score\": 1.4, \"category\": \"general\", \"pubdate\": \"2025-12-14 00:00:00\"}, {\"template\": \"default.html\", \"url\": \"https://aminroosta.github.io/tools/llm/security/macos/2026/02/25/sandboxing-opencode-on-macos.html\", \"title\": \"Sandboxing opencode on macOS | Amin\\u2019s Blog\", \"content\": \"The OS sandbox is the hard boundary. OpenCode config is the \\u201cseatbelt\\u201d that still helps even when you forget to use the wrapper. From ~/.config/opencode/opencode.json, the settings I recommend for a sandboxed setup: { \\\"$schema\\\": \\\"https://opencode.ai/config.json\\\", \\\"share\\\": \\\"disabled\\\", \\\"autoupdate\\\": false, \\\"server\\\": { \\\"mdns\\\": false }, \\\"lsp\\\": false, \\\"formatter\\\": false, \\\"snapshot\\\": false, \\\"disabled_providers\\\": [\\\"opencode\\\"], \\\"permission\\\": { \\\"*\\\": \\\"ask\\\", \\\"external_directory\\\": { \\\"*\\\": \\\"ask\\\", \\\"$HOME/dev/*\\\": \\\"allow\\\", \\\"/tmp/*\\\": \\\"allow\\\" } }, \\\"agent\\\": { \\\"build\\\": { \\\"mode\\\": \\\"primary\\\", \\\"tools\\\": { \\\"*\\\": false, \\\"apply_patch\\\": true, \\\"batch\\\": true, \\\"glob\\\": true, \\\"grep\\\": true, \\\"invalid\\\": true, \\\"ls\\\": true, \\\"read\\\": true, \\\"task\\\": true, \\\"webfetch\\\": true, \\\"external_directory\\\": true, \\\"bash\\\": true } }, } }\", \"publishedDate\": \"2026-02-25T00:00:00\", \"thumbnail\": \"\", \"engine\": \"brave\", \"parsed_url\": [\"https\", \"aminroosta.github.io\", \"/tools/llm/security/macos/2026/02/25/sandboxing-opencode-on-macos.html\", \"\", \"\", \"\"], \"img_src\": \"\", \"priority\": \"\", \"engines\": [\"brave\", \"duckduckgo\"], \"positions\": [10, 6], \"score\": 0.5333333333333333, \"category\": \"general\", \"pubdate\": \"2026-02-25 00:00:00\"}, {\"url\": \"https://github.com/anomalyco/opencode/issues/6318\", \"title\": \"Limit tool (e.g. write, edit) permissions to specific folders \\u00b7 Issue #6318\", \"content\": \"Dec 28, 2025 ... Limiting access for tools in a safer way #4667: Limiting access for tools in a safer way - Proposes sandbox-style security contexts with read/\\u00a0...\", \"publishedDate\": null, \"engine\": \"startpage\", \"template\": \"default.html\", \"parsed_url\": [\"https\", \"github.com\", \"/anomalyco/opencode/issues/6318\", \"\", \"\", \"\"], \"img_src\": \"\", \"thumbnail\": \"\", \"priority\": \"\", \"engines\": [\"startpage\"], \"positions\": [3], \"score\": 0.3333333333333333, \"category\": \"general\"}, {\"template\": \"default.html\", \"title\": \"OpenCode | Docker Docs\", \"content\": \"Use OpenCode in Docker Sandboxes with multi-provider authentication and TUI interface for AI development.\", \"img_src\": \"\", \"iframe_src\": \"\", \"audio_src\": \"\", \"thumbnail\": \"\", \"publishedDate\": null, \"pubdate\": \"\", \"length\": null, \"views\": \"\", \"author\": \"\", \"metadata\": \"\", \"priority\": \"\", \"engines\": [\"duckduckgo\"], \"open_group\": false, \"close_group\": false, \"positions\": [3], \"score\": 0.3333333333333333, \"category\": \"general\", \"url\": \"https://docs.docker.com/ai/sandboxes/agents/opencode/\", \"engine\": \"duckduckgo\", \"parsed_url\": [\"https\", \"docs.docker.com\", \"/ai/sandboxes/agents/opencode/\", \"\", \"\", \"\"]}, {\"url\": \"https://dev.to/maxkrivich/ai-coding-agent-security-practical-guardrails-for-claude-code-copilot-and-codex-och\", \"title\": \"Practical Guardrails for Claude Code, Copilot, and Codex\", \"content\": \"Apr 8, 2026 ... A practical baseline is to allow workspace edits while keeping strong boundaries around execution: ... npm install -g @anthropic-ai/sandbox-\\u00a0...\", \"publishedDate\": null, \"engine\": \"startpage\", \"template\": \"default.html\", \"parsed_url\": [\"https\", \"dev.to\", \"/maxkrivich/ai-coding-agent-security-practical-guardrails-for-claude-code-copilot-and-codex-och\", \"\", \"\", \"\"], \"img_src\": \"\", \"thumbnail\": \"\", \"priority\": \"\", \"engines\": [\"startpage\"], \"positions\": [4], \"score\": 0.25, \"category\": \"general\"}, {\"template\": \"default.html\", \"title\": \"agent_playground/ai_research/opencode_local_hardening.md at main ...\", \"content\": \"Accidentally wiped by running opencode init in a project directory Container isolation (Method 1 and 2 in the install guide) provides a complementary hard boundary that config-level rules cannot provide on their own.\", \"img_src\": \"\", \"iframe_src\": \"\", \"audio_src\": \"\", \"thumbnail\": \"\", \"publishedDate\": null, \"pubdate\": \"\", \"length\": null, \"views\": \"\", \"author\": \"\", \"metadata\": \"\", \"priority\": \"\", \"engines\": [\"duckduckgo\"], \"open_group\": false, \"close_group\": false, \"positions\": [4], \"score\": 0.25, \"category\": \"general\", \"url\": \"https://github.com/secSandman/agent_playground/blob/main/ai_research/opencode_local_hardening.md\", \"engine\": \"duckduckgo\", \"parsed_url\": [\"https\", \"github.com\", \"/secSandman/agent_playground/blob/main/ai_research/opencode_local_hardening.md\", \"\", \"\", \"\"]}, {\"template\": \"default.html\", \"url\": \"https://developers.openai.com/codex/concepts/sandboxing\", \"title\": \"Sandbox \\u2013 Codex | OpenAI Developers\", \"content\": \"on-request: Codex works inside the sandbox by default and asks when it needs to go beyond that boundary. ... Full access means using sandbox_mode = \\\"danger-full-access\\\" together with approval_policy = \\\"never\\\". By contrast, the lower-risk local automation preset is sandbox_mode = \\\"workspace-write\\\" together with approval_policy = \\\"on-request\\\", or the matching CLI flags --sandbox workspace-write --ask-for-approval on-request.\", \"publishedDate\": null, \"thumbnail\": \"https://imgs.search.brave.com/ZCFLMIJr0lXK5i_0Irv_GPS6OvX2-fVvdVZPrcqaPxc/rs:fit:200:200:1:0/g:ce/aHR0cHM6Ly9kZXZl/bG9wZXJzLm9wZW5h/aS5jb20vb2cvY29k/ZXgvY29uY2VwdHMv/c2FuZGJveGluZy5w/bmc\", \"engine\": \"brave\", \"parsed_url\": [\"https\", \"developers.openai.com\", \"/codex/concepts/sandboxing\", \"\", \"\", \"\"], \"img_src\": \"\", \"priority\": \"\", \"engines\": [\"brave\", \"duckduckgo\"], \"positions\": [6, 8], \"score\": 0.5833333333333333, \"category\": \"general\"}, {\"template\": \"default.html\", \"url\": \"https://developers.openai.com/codex/agent-approvals-security\", \"title\": \"Agent approvals & security \\u2013 Codex | OpenAI Developers\", \"content\": \"Keep Codex\\u2019s Linux sandbox enabled ... sandbox. If the container is your intended security boundary, run Codex with --sandbox danger-full-access inside the container so Codex does not try to create a second sandbox laye...\", \"publishedDate\": \"2026-04-24T00:00:00\", \"thumbnail\": \"https://imgs.search.brave.com/0f4qWpxlKwegAt_BlWyG2XrcRpoK6_VRizS8NqYWEeE/rs:fit:200:200:1:0/g:ce/aHR0cHM6Ly9kZXZl/bG9wZXJzLm9wZW5h/aS5jb20vb2cvY29k/ZXgvYWdlbnQtYXBw/cm92YWxzLXNlY3Vy/aXR5LnBuZw\", \"engine\": \"brave\", \"parsed_url\": [\"https\", \"developers.openai.com\", \"/codex/agent-approvals-security\", \"\", \"\", \"\"], \"img_src\": \"\", \"priority\": \"\", \"engines\": [\"brave\"], \"positions\": [4], \"score\": 0.25, \"category\": \"general\", \"pubdate\": \"2026-04-24 00:00:00\"}, {\"template\": \"default.html\", \"url\": \"https://therouter.ai/news/codex-windows-sandbox-agent-isolation-security/\", \"title\": \"What OpenAI's Codex Windows Sandbox Reveals About Coding Agent Security \\u2014 TheRouter.ai | TheRouter.ai\", \"content\": \"The workspace directory gets targeted ACL entries that grant the sandbox SID write access, while the rest of the filesystem remains protected by the restricted token. Network access is controlled by a separate mechanism layered on top.\", \"publishedDate\": null, \"thumbnail\": \"https://imgs.search.brave.com/SzxtaUQXRSHPQjJMF6bts5nEHOp889dMqcM76R_pRHA/rs:fit:200:200:1:0/g:ce/aHR0cHM6Ly90aGVy/b3V0ZXIuYWkvbmV3/cy9jb2RleC13aW5k/b3dzLXNhbmRib3gt/YWdlbnQtaXNvbGF0/aW9uLXNlY3VyaXR5/L2NvdmVyLndlYnAv\", \"engine\": \"brave\", \"parsed_url\": [\"https\", \"therouter.ai\", \"/news/codex-windows-sandbox-agent-isolation-security/\", \"\", \"\", \"\"], \"img_src\": \"\", \"priority\": \"\", \"engines\": [\"brave\"], \"positions\": [7], \"score\": 0.14285714285714285, \"category\": \"general\"}, {\"template\": \"default.html\", \"url\": \"https://github.com/openai/codex/issues/18558\", \"title\": \"Windows: sandbox_mode = \\\"workspace-write\\\" + [windows] sandbox = \\\"elevated\\\" allows mutable access outside the workspace \\u00b7 Issue #18558 \\u00b7 openai/codex\", \"content\": \"With sandbox_mode = \\\"workspace-write\\\", Codex should not be able to create, modify, rename, or delete files outside the workspace unless those paths are explicitly granted through sandbox_workspace_write.writable_roots.\", \"publishedDate\": \"2026-04-19T00:00:00\", \"thumbnail\": \"https://imgs.search.brave.com/iT_anEUwzmPvi0Rdm1478yZPK_xD2HZynkr9kOKiWBk/rs:fit:200:200:1:0/g:ce/aHR0cHM6Ly9vcGVu/Z3JhcGguZ2l0aHVi/YXNzZXRzLmNvbS82/NzU0YmU3NzUwOWM0/MjMwNThmY2Y0ZjVi/NThkZjAxNzAxYzg2/M2QzMWQ2ODE4OTY0/MjViNGRmMDk3OWI2/NDZkL29wZW5haS9j/b2RleC9pc3N1ZXMv/MTg1NTg\", \"engine\": \"brave\", \"parsed_url\": [\"https\", \"github.com\", \"/openai/codex/issues/18558\", \"\", \"\", \"\"], \"img_src\": \"\", \"priority\": \"\", \"engines\": [\"brave\"], \"positions\": [8], \"score\": 0.125, \"category\": \"general\", \"pubdate\": \"2026-04-19 00:00:00\"}, {\"template\": \"default.html\", \"url\": \"https://developers.openai.com/codex/config-basic\", \"title\": \"Config basics \\u2013 Codex | OpenAI Developers\", \"content\": \"For mode-by-mode behavior (including protected .git/.codex paths and network defaults), see Sandbox and approvals, Protected paths in writable roots, and Network access. Codex also supports named permission profiles for reusable filesystem and network policies. Built-in profiles are :read-only, :workspace, and :danger-full-access.\", \"publishedDate\": \"2026-04-23T00:00:00\", \"thumbnail\": \"https://imgs.search.brave.com/bcfF6jNns79pWhQN3e5FBA-2wRG634CdyhYW1CVy_bg/rs:fit:200:200:1:0/g:ce/aHR0cHM6Ly9kZXZl/bG9wZXJzLm9wZW5h/aS5jb20vb2cvY29k/ZXgvY29uZmlnLWJh/c2ljLnBuZw\", \"engine\": \"brave\", \"parsed_url\": [\"https\", \"developers.openai.com\", \"/codex/config-basic\", \"\", \"\", \"\"], \"img_src\": \"\", \"priority\": \"\", \"engines\": [\"brave\"], \"positions\": [9], \"score\": 0.1111111111111111, \"category\": \"general\", \"pubdate\": \"2026-04-23 00:00:00\"}, {\"template\": \"default.html\", \"url\": \"https://github.com/openai/codex/issues/5203\", \"title\": \"\\ud83d\\udc94Sandbox allowed unauthorized out-of-workspace operations despite restrictions \\u00b7 Issue #5203 \\u00b7 openai/codex\", \"content\": \"Codex should strictly prevent any file system operations outside the workspace unless the user explicitly approves them, especially when sandbox mode is active.\", \"publishedDate\": \"2025-10-15T00:00:00\", \"thumbnail\": \"https://imgs.search.brave.com/hKjEDjehqDj3_EmOljkVlIOps-6H6kkK3Z5HrXGa9VA/rs:fit:200:200:1:0/g:ce/aHR0cHM6Ly9vcGVu/Z3JhcGguZ2l0aHVi/YXNzZXRzLmNvbS8y/MDIxYTQwODVjOGJh/ZGZiNWNjZGFlOGEw/ZWRhYjQyNWU4MGE2/ZjA2MDcxYmRkMDYx/YzAzYzEyNDJhMzNk/ZTlkL29wZW5haS9j/b2RleC9pc3N1ZXMv/NTIwMw\", \"engine\": \"brave\", \"parsed_url\": [\"https\", \"github.com\", \"/openai/codex/issues/5203\", \"\", \"\", \"\"], \"img_src\": \"\", \"priority\": \"\", \"engines\": [\"brave\"], \"positions\": [11], \"score\": 0.09090909090909091, \"category\": \"general\", \"pubdate\": \"2025-10-15 00:00:00\"}, {\"template\": \"default.html\", \"url\": \"https://developers.openai.com/codex/permissions\", \"title\": \"Permissions \\u2013 Codex | OpenAI Developers\", \"content\": \"Configure either default_permissions and [permissions], or sandbox_mode / sandbox_workspace_write, but not both. If sandbox_mode appears in any active config layer, you pass --sandbox, or a config profile sets sandbox_mode, Codex uses those older sandbox settings instead of default_permissions. Permission profiles let you apply least-privilege boundaries to local commands Codex runs on your behalf.\", \"publishedDate\": null, \"thumbnail\": \"https://imgs.search.brave.com/hTxKszAj_2G36gmxGu7UZ7IWX07sRCtvpBYkYDcMieM/rs:fit:200:200:1:0/g:ce/aHR0cHM6Ly9kZXZl/bG9wZXJzLm9wZW5h/aS5jb20vb2cvY29k/ZXgvcGVybWlzc2lv/bnMucG5n\", \"engine\": \"brave\", \"parsed_url\": [\"https\", \"developers.openai.com\", \"/codex/permissions\", \"\", \"\", \"\"], \"img_src\": \"\", \"priority\": \"\", \"engines\": [\"brave\"], \"positions\": [12], \"score\": 0.08333333333333333, \"category\": \"general\"}, {\"template\": \"default.html\", \"url\": \"https://instagit.com/anomalyco/opencode/how-does-opencode-handle-external-directory-access-and-security/\", \"title\": \"How OpenCode Handles External Directory Access and Security Boundaries | opencode | Instagit\", \"content\": \"OpenCode isolates every operation to the project instance directory and requires explicit user authorization through a permission engine before accessing any external path. The anomalyco/opencode repository implements strict filesystem isolation ...\", \"publishedDate\": null, \"thumbnail\": \"https://imgs.search.brave.com/NXfIv59jR4pvPI7DXVKv4wkiC__uoipmGD3sZzBLVUI/rs:fit:200:200:1:0/g:ce/aHR0cHM6Ly9pbnN0/YWdpdC5jb20vb2cv/YW5vbWFseWNvL29w/ZW5jb2RlL2hvdy1k/b2VzLW9wZW5jb2Rl/LWhhbmRsZS1leHRl/cm5hbC1kaXJlY3Rv/cnktYWNjZXNzLWFu/ZC1zZWN1cml0eS5w/bmc\", \"engine\": \"brave\", \"parsed_url\": [\"https\", \"instagit.com\", \"/anomalyco/opencode/how-does-opencode-handle-external-directory-access-and-security/\", \"\", \"\", \"\"], \"img_src\": \"\", \"priority\": \"\", \"engines\": [\"brave\"], \"positions\": [13], \"score\": 0.07692307692307693, \"category\": \"general\"}, {\"template\": \"default.html\", \"url\": \"https://developers.openai.com/codex/config-advanced\", \"title\": \"Advanced Configuration \\u2013 Codex | OpenAI Developers\", \"content\": \"This changes the reviewer, not the sandbox boundary. Use [auto_review].policy for local reviewer policy instructions. Managed guardian_policy_config takes precedence. approval_policy = \\\"untrusted\\\" # Other options: on-request, never, or { granular = { ... } } approvals_reviewer = \\\"user\\\" # Or \\\"auto_review\\\" for automatic review sandbox_mode = \\\"workspace-write\\\" allow_login_shell = false # Optional hardening: disallow login shells for shell tools # Example granular approval policy: # approval_policy = { granular = { # sandbox_approval = true, # rules = true, # mcp_elicitations = true, # request_per\", \"publishedDate\": null, \"thumbnail\": \"https://imgs.search.brave.com/R7H76HmXeLHU9TId4zQIFatboVLLLXePyzGywWwDZp4/rs:fit:200:200:1:0/g:ce/aHR0cHM6Ly9kZXZl/bG9wZXJzLm9wZW5h/aS5jb20vb2cvY29k/ZXgvY29uZmlnLWFk/dmFuY2VkLnBuZw\", \"engine\": \"brave\", \"parsed_url\": [\"https\", \"developers.openai.com\", \"/codex/config-advanced\", \"\", \"\", \"\"], \"img_src\": \"\", \"priority\": \"\", \"engines\": [\"brave\"], \"positions\": [14], \"score\": 0.07142857142857142, \"category\": \"general\"}, {\"url\": \"https://www.reddit.com/r/Codeium/comments/1ic2i5a/windsurf_accessing_files_outside_of_workspace_by/\", \"title\": \"Windsurf accessing files outside of workspace by default: Am I crazy ...\", \"content\": \"Jan 28, 2025 ... AI-assisted IDEs should have explicit trust boundaries and warn users before allowing access outside workspace directories. AI-assisted IDEs\\u00a0...\", \"publishedDate\": null, \"engine\": \"startpage\", \"template\": \"default.html\", \"parsed_url\": [\"https\", \"www.reddit.com\", \"/r/Codeium/comments/1ic2i5a/windsurf_accessing_files_outside_of_workspace_by/\", \"\", \"\", \"\"], \"img_src\": \"\", \"thumbnail\": \"\", \"priority\": \"\", \"engines\": [\"startpage\"], \"positions\": [5], \"score\": 0.2, \"category\": \"general\"}, {\"url\": \"https://github.com/anomalyco/opencode/issues/5395\", \"title\": \"Split external_directory permission int