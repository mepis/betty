: \"https://imgs.search.brave.com/ALFwEfzoz5Kr3RxN-Lq10JObkfH_n5wKhKhna6nWlkY/rs:fit:200:200:1:0/g:ce/aHR0cHM6Ly9kZXZl/bG9wZXJzLm9wZW5h/aS5jb20vb2cvY29k/ZXgvY29uZmlnLXJl/ZmVyZW5jZS5wbmc\", \"engine\": \"brave\", \"parsed_url\": [\"https\", \"developers.openai.com\", \"/codex/config-reference\", \"\", \"\", \"\"], \"img_src\": \"\", \"priority\": \"\", \"engines\": [\"brave\"], \"positions\": [19], \"score\": 0.05263157894736842, \"category\": \"general\", \"pubdate\": \"2026-03-08 00:00:00\"}, {\"template\": \"default.html\", \"url\": \"https://medium.com/@rafaelbenari/custom-containerized-sandboxes-for-ai-agents-dd2cd2603b3b\", \"title\": \"Custom Containerized Sandboxes for AI Agents | by Rafael Ben-Ari | Medium\", \"content\": \"As a bonus, this means I can also use docker\\u2019s container capabilities to lock down the opencode containers. To get this done, I took some inspiration from the gemini-cli Dockerfile. I could only do this because the two projects share much of their stack. Eventually, I ended up with something like this: FROM docker.io/library/node:20-slim ARG SANDBOX_NAME=\\\"opencode-cli-sandbox\\\" ARG CLI_VERSION_ARG ENV SANDBOX=\\\"$SANDBOX_NAME\\\" ENV CLI_VERSION=$CLI_VERSION_ARG # install minimal set of packages, then clean up RUN apt-get update && apt-get install -y --no-install-recommends \\\\ python3 \\\\ make \\\\ g++\", \"publishedDate\": \"2026-01-26T00:00:00\", \"thumbnail\": \"https://imgs.search.brave.com/-Z2h-c1t-_exl1IsqkD2VRzyRQRN8lMjpO5wyTH76HA/rs:fit:200:200:1:0/g:ce/aHR0cHM6Ly9taXJv/Lm1lZGl1bS5jb20v/MSpYbzZqUjFBSk1w/X1Jsd2NKaDJKUnJB/LnBuZw\", \"engine\": \"brave\", \"parsed_url\": [\"https\", \"medium.com\", \"/@rafaelbenari/custom-containerized-sandboxes-for-ai-agents-dd2cd2603b3b\", \"\", \"\", \"\"], \"img_src\": \"\", \"priority\": \"\", \"engines\": [\"brave\"], \"positions\": [20], \"score\": 0.05, \"category\": \"general\", \"pubdate\": \"2026-01-26 00:00:00\"}, {\"template\": \"default.html\", \"url\": \"https://developers.openai.com/codex/llms-full.txt\", \"title\": \"Codex \\u2014 full documentation\", \"content\": \"| | Auto-review mode | `--sandbox workspace-write --ask-for-approval on-request -c approvals_reviewer=auto_review` or `approvals_reviewer = \\\"auto_review\\\"` | Same sandbox boundary as standard on-request mode, but eligible approval requests are reviewed by Auto-review instead of surfacing to the user.\", \"publishedDate\": null, \"thumbnail\": \"\", \"engine\": \"brave\", \"parsed_url\": [\"https\", \"developers.openai.com\", \"/codex/llms-full.txt\", \"\", \"\", \"\"], \"img_src\": \"\", \"priority\": \"\", \"engines\": [\"brave\"], \"positions\": [16], \"score\": 0.0625, \"category\": \"general\"}], \"answers\": [], \"corrections\": [], \"infoboxes\": [], \"suggestions\": [], \"unresponsive_engines\": [[\"karmasearch\", \"access denied\"]]}"