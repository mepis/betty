      - generic [ref=e113]:
        - heading "How do I build the GPU version of llama.cpp on GB10?" [level=2] [ref=e114]
        - paragraph [ref=e115]: In the previous section, you verified that your DGX Spark system is correctly configured with the Grace CPU, Blackwell GPU, and CUDA 13 environment. Now that your hardware and drivers are ready, this section focuses on building the GPU-enabled version of llama.cpp, which is a lightweight, portable inference engine optimized for quantized LLM workloads on NVIDIA Blackwell GPUs. Llama.cpp is an open-source project by Georgi Gerganov that provides efficient and dependency-free large language model inference on both CPUs and GPUs.
        - 'heading "Step 1: Install dependencies" [level=2] [ref=e116]'
        - paragraph [ref=e117]: "In this step, you will install the necessary build tools and download a small quantized model for validation:"
        - generic [ref=e118]:
          - code [ref=e120]: sudo apt update sudo apt install -y git cmake build-essential nvtop htop
          - button "Copy" [ref=e123] [cursor=pointer]:
            - generic [ref=e124]: Copy
        - paragraph [ref=e125]: These packages provide the C/C++ compiler toolchain, CMake build system, and GPU monitoring utility (nvtop) required to compile and test llama.cpp.
        - heading "Download a test model" [level=2] [ref=e126]
        - paragraph [ref=e127]: To test your GPU build, you’ll need a quantized model. In this section, you’ll download a lightweight model that’s perfect for validation.
        - paragraph [ref=e128]: "First, ensure that you have the latest Hugging Face Hub CLI installed and download models:"
        - generic [ref=e129]:
          - code [ref=e131]: mkdir ~/models cd ~/models python3 -m venv venv source venv/bin/activate pip install -U huggingface_hub hf download TheBloke/TinyLlama-1.1B-Chat-v1.0-GGUF --local-dir TinyLlama-1.1B
          - button "Copy" [ref=e134] [cursor=pointer]:
            - generic [ref=e135]: Copy
        - generic [ref=e137]:
          - generic [ref=e141]:
            - generic: Note
          - generic [ref=e146]:
            - generic:
              - paragraph [ref=e147]:
                - text: After the download completes, you’ll find the models in the
                - code [ref=e148]: ~/models
                - text: directory.
              - paragraph [ref=e149]:
                - strong [ref=e150]: "Tip:"
                - text: Always activate your Python virtual environment with
                - code [ref=e151]: source venv/bin/activate
                - text: before installing packages or running Python-based tools. This ensures dependencies are isolated and prevents conflicts with system-wide packages.
        - paragraph [ref=e152]: Great! You’ve installed all the required build tools and downloaded a quantized model for validation. Your environment is ready for source code setup.
        - 'heading "Step 2: Clone the llama.cpp repository" [level=2] [ref=e153]'
        - paragraph [ref=e154]: "Use the commands below to download the source code for llama.cpp from GitHub:"
        - generic [ref=e155]:
          - code [ref=e157]:
            - text: cd ~ git clone
            - link "https://github.com/ggerganov/llama.cpp.git" [ref=e158] [cursor=pointer]:
              - /url: https://github.com/ggerganov/llama.cpp.git
            - text: cd ~/llama.cpp
          - button "Copy" [ref=e161] [cursor=pointer]:
            - generic [ref=e162]: Copy
        - paragraph [ref=e163]: Nice work! You now have the latest llama.cpp source code on your DGX Spark system.
        - 'heading "Step 3: Configure and build the CUDA-enabled version (GPU Mode)" [level=2] [ref=e164]'
        - paragraph [ref=e165]:
          - text: Run the following
          - code [ref=e166]: cmake
          - text: "command to configure the build system for GPU acceleration:"
        - generic [ref=e167]:
          - code [ref=e169]: mkdir -p build-gpu cd build-gpu cmake .. \ -DCMAKE_BUILD_TYPE=Release \ -DGGML_CUDA=ON \ -DGGML_CUDA_F16=ON \ -DCMAKE_CUDA_ARCHITECTURES=121 \ -DCMAKE_C_COMPILER=gcc \ -DCMAKE_CXX_COMPILER=g++ \ -DCMAKE_CUDA_COMPILER=nvcc
          - button "Copy" [ref=e172] [cursor=pointer]:
            - generic [ref=e173]: Copy
        - paragraph [ref=e174]: This command enables CUDA support and prepares llama.cpp for compiling GPU-optimized kernels.
        - heading "Explanation of key flags:" [level=3] [ref=e175]
        - paragraph [ref=e176]: "Here’s what each configuration flag does:"
        - table [ref=e178]:
          - rowgroup [ref=e179]:
            - row "Feature Description/Impact" [ref=e180]:
              - columnheader "Feature" [ref=e181]:
                - strong [ref=e182]: Feature
              - columnheader "Description/Impact" [ref=e183]:
                - strong [ref=e184]: Description/Impact
          - rowgroup [ref=e185]:
            - row "-DGGML_CUDA=ON Enables the CUDA backend in llama.cpp, allowing matrix operations and transformer layers to be offloaded to the GPU for acceleration" [ref=e186]:
              - cell "-DGGML_CUDA=ON" [ref=e187]
              - cell "Enables the CUDA backend in llama.cpp, allowing matrix operations and transformer layers to be offloaded to the GPU for acceleration" [ref=e188]
            - row "-DGGML_CUDA_F16=ON Enables FP16 (half-precision) CUDA kernels, reducing memory usage and increasing throughput — especially effective for quantized models (for example, Q4, Q5)" [ref=e189]:
              - cell "-DGGML_CUDA_F16=ON" [ref=e190]
              - cell "Enables FP16 (half-precision) CUDA kernels, reducing memory usage and increasing throughput — especially effective for quantized models (for example, Q4, Q5)" [ref=e191]
            - row "-DCMAKE_CUDA_ARCHITECTURES=121 Specifies the compute capability for the NVIDIA Blackwell GPU (GB10 = sm_121), ensuring the CUDA compiler (nvcc) generates optimized GPU kernels" [ref=e192]:
              - cell "-DCMAKE_CUDA_ARCHITECTURES=121" [ref=e193]
              - cell "Specifies the compute capability for the NVIDIA Blackwell GPU (GB10 = sm_121), ensuring the CUDA compiler (nvcc) generates optimized GPU kernels" [ref=e194]
        - paragraph [ref=e195]: "When the configuration process completes successfully, the terminal should display output similar to the following:"
        - code [ref=e198]: "-- Configuring done (2.0s) -- Generating done (0.1s) -- Build files have been written to: /home/nvidia/llama.cpp/build-gpu"
        - generic [ref=e200]:
          - generic [ref=e204]:
            - generic: Note
          - list [ref=e210]:
            - listitem [ref=e211]:
              - text: For systems with multiple CUDA versions installed, explicitly specifying the compilers (
              - code [ref=e212]: "-DCMAKE_C_COMPILER"
              - text: ","
              - code [ref=e213]: "-DCMAKE_CXX_COMPILER"
              - text: ","
              - code [ref=e214]: "-DCMAKE_CUDA_COMPILER"
              - text: ) ensures that CMake uses the correct CUDA 13.0 toolchain.
            - listitem [ref=e215]: If you encounter configuration errors, return to the previous section and confirm that your CUDA toolkit and driver versions are correctly installed and compatible with Blackwell (sm_121).
        - paragraph [ref=e216]: "Once CMake configuration succeeds, start the compilation process:"
        - generic [ref=e217]:
          - code [ref=e219]:
            - text: make -j
            - generic [ref=e220]:
              - text: "\""
              - generic [ref=e221]: $(nproc)
              - text: "\""
          - button "Copy" [ref=e224] [cursor=pointer]:
            - generic [ref=e225]: Copy
        - paragraph [ref=e226]: This command compiles all CUDA and C++ source files in parallel, using all available CPU cores. On the Grace CPU, the build typically finishes in 2–4 minutes.
        - paragraph [ref=e227]: "The build output is shown below:"
        - code [ref=e230]: "[ 0%] Building C object examples/gguf-hash/CMakeFiles/sha1.dir/deps/sha1/sha1.c.o [ 15%] Building CUDA object ggml/src/ggml-cuda/CMakeFiles/ggml-cuda.dir/cpy.cu.o [ 50%] Building CXX object src/CMakeFiles/llama.dir/llama-sampling.cpp.o [100%] Built target test-backend-ops [100%] Linking CXX executable ../../bin/llama-server [100%] Built target llama-server"
        - paragraph [ref=e231]:
          - text: After the build completes, you’ll find the GPU-accelerated binaries located under
          - code [ref=e232]: ~/llama.cpp/build-gpu/bin/
          - text: .
        - paragraph [ref=e233]: These binaries provide all necessary tools for quantized model inference (llama-cli) and for serving GPU inference using HTTP API (llama-server).
        - paragraph [ref=e234]: Excellent! The CUDA-enabled build is complete. Your binaries are optimized for the Blackwell GPU and ready for validation. Together, these options ensure that the build targets the Grace Blackwell GPU with full CUDA 13 compatibility. You are now ready to test quantized LLMs with full GPU acceleration in the next step.
        - 'heading "Step 4: Validate the CUDA-enabled build" [level=2] [ref=e235]'
        - paragraph [ref=e236]: After the build completes successfully, verify that the GPU-enabled binary of llama.cpp is correctly linked to the NVIDIA CUDA runtime.
        - paragraph [ref=e237]: "To verify CUDA linkage, run the following command:"
        - generic [ref=e238]:
          - code [ref=e240]: ldd bin/llama-cli | grep cuda
          - button "Copy" [ref=e243] [cursor=pointer]:
            - generic [ref=e244]: Copy
        - paragraph [ref=e245]: "The output is similar to:"
        - code [ref=e248]: libggml-cuda.so => /home/nvidia/llama.cpp/build-gpu/bin/libggml-cuda.so (0x0000eee1e8e30000) libcudart.so.13 => /usr/local/cuda/targets/sbsa-linux/lib/libcudart.so.13 (0x0000eee1e83b0000) libcublas.so.13 => /usr/local/cuda/targets/sbsa-linux/lib/libcublas.so.13 (0x0000eee1e4860000) libcuda.so.1 => /lib/aarch64-linux-gnu/libcuda.so.1 (0x0000eee1debd0000) libcublasLt.so.13 => /usr/local/cuda/targets/sbsa-linux/lib/libcublasLt.so.13 (0x0000eee1b36c0000)
        - paragraph [ref=e249]: If the CUDA library is correctly linked, it confirms that the binary can access the GPU through the system driver.
        - paragraph [ref=e250]: "Next, confirm that the binary initializes the GPU correctly by checking device detection and compute capability:"
        - generic [ref=e251]:
          - code [ref=e253]: ./bin/llama-server --version
          - button "Copy" [ref=e256] [cursor=pointer]:
            - generic [ref=e257]: Copy
        - paragraph [ref=e258]: "The expected output is:"
        - code [ref=e261]: "ggml_cuda_init: GGML_CUDA_FORCE_MMQ: no ggml_cuda_init: GGML_CUDA_FORCE_CUBLAS: no ggml_cuda_init: found 1 CUDA devices: Device 0: NVIDIA GB10, compute capability 12.1, VMM: yes version: 6819 (19a5a3ed) built with gcc (Ubuntu 12.4.0-2ubuntu1~24.04) 12.4.0 for aarch64-linux-gnu"
        - paragraph [ref=e262]: The message “compute capability 12.1” confirms that the build was compiled specifically for the Blackwell GPU (sm_121) and that CUDA 13.0 is functioning correctly.
        - paragraph [ref=e263]: "Next, use the downloaded quantized model (for example, TinyLlama-1.1B) to verify that inference executes successfully on the GPU:"
        - generic [ref=e264]:
          - code [ref=e266]: ./bin/llama-cli \ -m ~/models/TinyLlama-1.1B/tinyllama-1.1b-chat-v1.0.Q8_0.gguf \ -ngl 32 \ -t 16 \ -p "Explain the advantages of the Armv9 architecture."
          - button "Copy" [ref=e269] [cursor=pointer]:
            - generic [ref=e270]: Copy
        - paragraph [ref=e271]: If the build is successful, you will see text generation begin within a few seconds.
        - paragraph [ref=e272]:
          - text: To monitor GPU utilization during inference, use
          - code [ref=e273]: nvtop
          - text: "to view real-time performance metrics:"
        - generic [ref=e274]:
          - code [ref=e276]: nvtop
          - button "Copy" [ref=e279] [cursor=pointer]:
            - generic [ref=e280]: Copy
        - paragraph [ref=e281]: This command displays GPU utilization, memory usage, temperature, and power consumption. You can use this to verify that CUDA kernels are active during model inference.
        - paragraph [ref=e282]: "The following screenshot shows GPU utilization during TinyLlama inference on DGX Spark:"
        - paragraph [ref=e283]:
          - img "Image Alt Text:nvtop terminal interface displaying real-time GPU metrics, including GPU utilization, memory usage, temperature, power consumption, and active processes for the NVIDIA GB10 GPU during model inference on DGX Spark. alt-text" [ref=e284]
          - generic [ref=e285]: TinyLlama GPU Utilization
        - paragraph [ref=e286]: "The nvtop interface shows:"
        - list [ref=e287]:
          - listitem [ref=e288]: "GPU Utilization (%): Confirms CUDA kernels are active."
          - listitem [ref=e289]: "Memory Usage (VRAM): Shows model loading and runtime footprint."
          - listitem [ref=e290]: "Temperature / Power Draw: Monitors thermal stability under sustained workloads."
        - paragraph [ref=e291]: You have now successfully built and validated the CUDA-enabled version of llama.cpp on DGX Spark.
        - heading "What you have accomplished" [level=2] [ref=e292]
        - paragraph [ref=e293]: "You have:"
        - list [ref=e294]:
          - listitem [ref=e295]: Installed all required tools and dependencies
          - listitem [ref=e296]: Downloaded a quantized model for testing
          - listitem [ref=e297]: Built the CUDA-enabled version of llama.cpp
          - listitem [ref=e298]: Verified GPU linkage and successful inference
        - paragraph [ref=e299]: You’re ready to move on to building and testing the CPU-only version. You will build the optimized CPU-only version of llama.cpp and explore how the Grace CPU executes Armv9 vector instructions during inference.
