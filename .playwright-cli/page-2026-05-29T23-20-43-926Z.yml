          - paragraph [ref=e480]: "Model-Based Evaluation: We evaluate LLMs by providing multi-session conversation histories (as permitted by the context window) and asking them to answer memory-grounded questions. This setting isolates models’ ability to consolidate long interaction histories without external memory modules. We evaluate four LLMs: GPT-5.2, Claude Sonnet 4.5, Gemini 3 Pro Preview, and Qwen3-32B. They are tested under both standard and reasoning-enabled inference to assess whether reasoning tokens improves memory under frequent updates."
          - paragraph [ref=e482]: "Agent-Based Evaluation: We evaluate long-term memory agents that incrementally ingest prior conversations, retrieve relevant memories at query time, and generate responses conditioned on retrieved memories. We include representative memory agents spanning local vector stores, cloud-based memory APIs, profile-driven memories, and stateful agents, evaluated under identical conversations. The long-term memory agents are A-Mem, LangMem, Mem-0, MemoBase, MemoryOS, Nemori. All agents use the same LLM (GPT-4o-mini) backend for answer generation."
