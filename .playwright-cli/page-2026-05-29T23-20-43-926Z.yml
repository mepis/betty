          - heading "3.3 Conversation Generation" [level=3] [ref=e437]:
            - generic [ref=e438]: "3.3"
            - text: Conversation Generation
          - paragraph [ref=e440]:
            - text: "Building on the simulated session history, Memora converts each session specification into a multi-turn dialogue using a controlled, multi-agent conversation generation framework. The framework supports two types of conversational turns: 1) memory-neutral turns, which involve general turns ("
            - emphasis [ref=e441]: e.g., casual questions, acknowledgments
            - text: ), and 2) memory-grounded turns, in which the user expresses information corresponding to the simulated memory operation. An intent selection module determines a sequence of user and assistant intents (
            - emphasis [ref=e442]: e.g., greeting, memory disclosure, follow-up
            - text: ). Conversations are organized into a multi-phase interaction consisting of an opening phase, an exploration phase, a memory phase where the target operation is expressed, and a closing phase. Dialogue turns are generated using a multi-agent prompting setup with separate user and assistant roles conditioned on persona traits, selected intents, memory entities, and prior conversation context.
          - paragraph [ref=e444]:
            - text: LLM-based generation does not always strictly adhere to instructions given in the prompt and may introduce plausible but untracked memory details beyond the simulated session specification. To address this, all generated conversations are checked through an automated memory-grounding evaluation loop. The grounding checks verify that the intended memory operation and the entity is correctly expressed in the conversation, and no additional information is introduced. Each conversation is independently evaluated by three LLMs and accepted only if all agree. Otherwise feedback is shared and the conversation is regenerated. This iterative process promotes close alignment between generated conversations and the underlying memory trace. In addition to automated checks, we randomly sample 5% of generated conversations per persona for human verification. If annotators identify any inconsistency between the conversation and the memory trace, the entire batch is rejected. Further details are provided in Appendix
            - link "B" [ref=e445] [cursor=pointer]:
              - /url: "#A2"
            - text: .
