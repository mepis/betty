          - paragraph [ref=e2098]: "Each criterion is evaluated using a multi-judge LLM protocol. Specifically, we employ three independent judges drawn from different model families and providers: GPT-4.1 (OpenAI), Claude Haiku 4.5 (Anthropic), and Gemini 2.5 Flash (Google). All judges receive the same evaluation prompt, consisting of the model-generated response and a single binary evaluation question. Judges are instructed to focus on the semantic meaning and intent of the response rather than exact wording, and to accept paraphrases, indirect references, and natural conversational expressions when they convey the same underlying information."
          - paragraph [ref=e2100]: Each judge returns a structured JSON output containing a binary judgment (yes or no), a confidence score in the range [0,1], and a brief explanation. To ensure reproducibility and reduce evaluation variance, all judges operate with deterministic decoding (temperature set to 0.0). This configuration ensures that identical inputs produce consistent judgments across repeated evaluations. Final criterion-level decisions are determined by majority voting across the three judges. A criterion is marked as correct if at least two of the three judges agree on the judgment. This design ensures that no single judge can unilaterally determine correctness, providing robustness against occasional misinterpretations, hallucinations, or idiosyncratic biases of individual models. Majority voting also mitigates correlated failure modes that may arise when relying on a single evaluation.
          - paragraph [ref=e2102]: The evaluation system incorporates robust parsing, retry, and error-handling mechanisms to account for imperfect judge outputs. Although judges are instructed to return strictly formatted JSON, the parser tolerates minor formatting deviations such as markdown wrappers or extraneous text. If a judge response fails to parse or returns an invalid format, the evaluation request is automatically retried up to a fixed number of attempts, ensuring that transient generation or formatting errors do not affect the final decision. Only after repeated failures does the system fall back to conservative inference of binary judgments from textual content when possible. Judge outputs that remain invalid after all retries are excluded from aggregation, and if all judges fail for a given criterion—a rare event—the criterion is conservatively marked as incorrect. These safeguards ensure that evaluation failures do not artificially inflate model performance and that final scores reflect only reliable judge decisions.
