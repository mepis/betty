          - generic [ref=e778]:
            - generic [ref=e779]: "Table 3:"
            - text: Task-level FAMA scores aggregated over evaluation questions. For each task (remembering, recommending, reasoning) and temporal duration (weekly, monthly, quarterly), scores are computed by summing per-question FAMA scores and normalizing to [0, 100]. This represents performance within each task–duration setting.
        - paragraph [ref=e781]: "We analyze Forgetting-Aware Memory Accuracy (FAMA) scores to understand how LLMs and long-term memory agents behave under increasing temporal span, memory mutation requirements, and task complexity. Overall, three patterns emerge. First, performance generally declines from weekly to quarterly settings, showing that longer and more mutation-heavy interaction histories make memory use less reliable. Second, performance is strongly task-dependent: long-term memory agents are strongest on remembering, language models remain competitive on recommending, and reasoning is difficult for all LLMs and agents. Third, forgetting-aware evaluation reveals substantial reliance on outdated or invalidated memory that standard memory accuracy does not capture."
        - paragraph [ref=e783]:
          - text: "Performance Across Temporal Durations: A clear pattern in Table"
          - link "3" [ref=e784] [cursor=pointer]:
            - /url: "#S5.T3"
          - text: "is that performance generally degrades from the weekly to the quarterly setting. As the temporal horizon expands, agents must operate over substantially longer conversation histories with more accumulated memories, more updates, and more invalidations. This makes maintaining a temporally correct memory state increasingly difficult. The week-to-quarter degradation is most consistent in remembering: all LLMs and agents perform worse in the quarterly setting than in the weekly setting. This drop is especially pronounced for memory agents, including MemoBase (43.6 to 15.18), MemoryOS (51.84 to 25.05), and Mem-0 (40.42 to 19.90). This shows that even agents with explicit memory stores become increasingly brittle as memory grows longer and more mutation-heavy. The same weekly-to-quarterly decline also appears in most cases for reasoning, where 11 of 14 LLMs and agents perform worse at quarterly scale. Here, the degradation is particularly severe because reasoning already starts from a low baseline: for example, MemoBase (18.00 to 1.00) and MemoryOS (20.66 to 5.50)."
        - 'figure "Table 4: Aggregated FAMA obtained by summing the task-level scores from Table 3 across weekly, monthly, and quarterly durations. This aggregation highlights clear task-dependent differences: long-term memory agents outperform LLMs on remembering, language models remain competitive with top agents on recommending, and performance on reasoning remains low for both LLMs and long-term memory agents." [ref=e785]':
