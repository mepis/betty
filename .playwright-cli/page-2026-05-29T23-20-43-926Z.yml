          - text: "shows that average memory consolidation across benchmarks is approximately one session. This skewed distribution reduces most evaluations to whether a model can recall an isolated piece of information introduced in a prior session, rather than synthesizing information accumulated over extended interaction histories. Also, this retrieval-centric framing implicitly assumes that stored information remains permanently valid. In contrast, real-world long-term interaction is non-stationary: user information is updated, corrected, or withdrawn over time. Therefore, long-term memory requires not only recalling past information, but also correct handling of memory mutation. However, as shown in Table"
          - link "1" [ref=e249] [cursor=pointer]:
            - /url: "#S1.T1"
          - text: ", prior benchmarks place minimal stress on memory mutation. LongMemEval"
