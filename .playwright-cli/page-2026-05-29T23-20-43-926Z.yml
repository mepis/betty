        - generic [ref=e2014]:
          - heading "A.3 Operational and Temporal Constraints" [level=3] [ref=e2015]:
            - generic [ref=e2016]: A.3
            - text: Operational and Temporal Constraints
          - paragraph [ref=e2018]: "Memora regulates memory updates through two complementary mechanisms: operational constraints and temporal constraints. Together, these constraints determine what type of memory operation can occur, how frequently operations are invoked, and how they are distributed over time."
          - generic [ref=e2019]:
            - heading "Operational Constraints:" [level=4] [ref=e2020]
            - paragraph [ref=e2022]: Operational constraints define the validity of memory operations for each memory type. A memory operation corresponds to an explicit action on a memory entry, addition, update, or deletion, triggered by a user. Each memory category supports a set of operations. For example, append-only records such as step tracking or expense logging support only additive operations, whereas mutable artifacts such as preferences or work documents allow updates and deletions. These constraints prevent unrealistic memory dynamics, updating memory even before adding or deleting non-existent entries.
          - generic [ref=e2023]:
            - heading "Temporal Configurations:" [level=4] [ref=e2024]
            - paragraph [ref=e2026]: Temporal constraints regulate how memory operations are distributed over time. Not every interaction introduces or modifies memory. Instead, the simulator explicitly interleaves memory-grounded sessions with memory-neutral sessions (e.g., casual conversation, clarifications, acknowledgments), ensuring that memory evolution is incremental rather than continuous. Within each temporal configuration (weekly, monthly, quarterly), temporal constraints specify target frequencies for different memory categories, controlling how often memory-grounded sessions occur relative to neutral interactions. As the temporal duration increases, the absolute number of memory operations scales accordingly, increasing memory consolidation and mutation pressure without collapsing interactions into dense update sequences. Temporal constraints therefore determine when memory operations occur and how frequently they appear across the interaction history.
      - generic [ref=e2027]:
        - heading "Appendix B Conversation Generation Details" [level=2] [ref=e2028]:
          - generic [ref=e2029]: Appendix B
          - text: Conversation Generation Details
        - generic [ref=e2030]:
          - heading "B.1 Session Manager" [level=3] [ref=e2031]:
            - generic [ref=e2032]: B.1
            - text: Session Manager
          - paragraph [ref=e2034]: The Session Manager is responsible for transforming raw simulated data into a structured representation that can drive conversation generation. Each session encapsulates a single interaction point in a longer temporal trace and includes the persona identifier, memory type, operation type (add, update, delete, or none), relevant memory fields (e.g., category, item, values), and the memory state immediately before and after the session. The Session Manager also handles memory-type-specific normalization (e.g., mapping step counts, food expenses, or task updates into a common schema) and exposes filtered views of sessions by memory type or operation. This explicit session abstraction ensures that every generated conversation is anchored to a well-defined ground-truth memory transition.
        - generic [ref=e2035]:
          - heading "B.2 Intent Manager" [level=3] [ref=e2036]:
            - generic [ref=e2037]: B.2
            - text: Intent Manager
          - paragraph [ref=e2039]: The Intent Manager decomposes a conversation into a sequence of abstract intents, where each intent represents a single dialogue act to be performed by either the user or the assistant. Intents specify what a turn should accomplish, such as greeting, topic exploration, transitioning to memory, expressing a memory update, or acknowledging a change without specifying surface wording. Each intent is annotated with the speaking agent, the conversation phase (opening, exploration, memory, or closing), and whether the turn must explicitly share memory content. By operating at this abstraction level, the Intent Manager separates high-level conversational structure from language realization, enabling systematic variation while preserving semantic control.
        - generic [ref=e2040]:
          - heading "B.3 Flow Manager" [level=3] [ref=e2041]:
            - generic [ref=e2042]: B.3
            - text: Flow Manager
          - paragraph [ref=e2044]: The Flow Manager selects and orders intents into a coherent conversation flow for a given session. It enforces a fixed high-level phase structure, opening, exploration, memory, and closing, while allowing variability in the number and types of intents used within each phase. Flow selection is constrained to maintain natural speaker alternation, smooth transitions into the memory phase, and alignment with the intended operation (e.g., add vs. update vs. delete). For content-oriented memory (such as emails or meeting notes), the Flow Manager can generate field-by-field flows for complete coverage, whereas for other memory types, it samples from multiple valid flow patterns to promote diversity. This design ensures that conversations feel natural while adhering to the session specification.
        - generic [ref=e2045]:
          - heading "B.4 Prompt Manager" [level=3] [ref=e2046]:
            - generic [ref=e2047]: B.4
            - text: Prompt Manager
          - paragraph [ref=e2049]: The Prompt Manager converts each abstract intent into natural language by constructing the prompt used for a single dialogue turn. For every turn, it assembles the prompt from two components. The first component is a fixed system prompt, selected based on the speaking agent (user or assistant) and the memory type involved. This system prompt encodes global behavioral constraints, such as role-specific behavior, style requirements (e.g., brevity), and disallowed content, and remains constant across turns of the same type. The second component is a dynamically generated user content block. This includes the accumulated conversation history, a turn-specific instruction corresponding to the current intent, and the session context required to express the target memory operation.
          - paragraph [ref=e2051]: By separating global behavioral constraints from turn-level instructions, this two-part structure allows fine-grained control over each dialogue turn while preserving overall conversational consistency. The Prompt Manager executes this process sequentially for each turn, appending generated outputs to the conversation history, and produces a complete multi-turn dialogue that is subsequently validated by the grounding and evaluation pipeline.
        - generic [ref=e2052]:
          - heading "B.5 Auto-Evaluation and Grounding Verification" [level=3] [ref=e2053]:
            - generic [ref=e2054]: B.5
            - text: Auto-Evaluation and Grounding Verification
          - paragraph [ref=e2056]: Even with explicit session specifications, intent planning, and role-specific prompting, large language models may still fail to express the intended memory operation precisely or may introduce plausible but untracked details. To ensure that every conversation in Memora is strictly aligned with its underlying session trace, the generation process is coupled with an automatic evaluation and regeneration loop. After a full multi-turn conversation is generated, we evaluate all turns in the dialogue for consistency with the session specification. In addition, we apply targeted memory-grounding checks to a critical subset of turns that determine whether the intended memory operation was correctly realized. This subset includes (1) the final turn immediately preceding the memory phase, (2) all turns in which memory is introduced, updated, or deleted, and (3) the first assistant response following the memory phase. Evaluating the entire conversation ensures global coherence and prevents the introduction of untracked information at any point, while the focused checks on the memory-phase window verify that the target memory operation is expressed accurately and completely. Conversations that fail any grounding checks are regenerated until full alignment with the session trace is achieved.
          - paragraph [ref=e2058]: "From the structured session metadata, an evaluation-question generator then produces a small set of explicit, operation-specific yes/no questions. These questions are tailored to the memory type and operation and are designed to verify three conditions: (i) that the intended operation (addition, update, or deletion) was explicitly expressed by the user, (ii) that the correct memory entity and value were involved, and (iii) that no extraneous or outdated information was introduced. The evaluation questions are submitted to multiple independent LLM-based judges with the generated conversation, each of which produces a binary judgment for every question. A conversation is accepted only if all required questions receive affirmative judgments, enforcing a conservative unanimity criterion that prioritizes correctness over recall."
          - 'figure "Figure 5: Distribution of the number of automatic evaluation loop iterations required for generated conversation sessions to pass all quality checks. The majority of conversations converge within a small number of iterations, indicating efficient and stable generation." [ref=e2059]':
            - img "Refer to caption" [ref=e2060]
            - generic [ref=e2061]:
              - generic [ref=e2062]: "Figure 5:"
              - text: Distribution of the number of automatic evaluation loop iterations required for generated conversation sessions to pass all quality checks. The majority of conversations converge within a small number of iterations, indicating efficient and stable generation.
          - paragraph [ref=e2064]:
            - text: If any evaluation check fails, the system automatically generates targeted feedback describing which information is missing, incorrect, or inconsistent with the session trace. This feedback is appended to the instruction context used by the Prompt Manager, and the entire conversation is regenerated using the same session specification and intent flow. The evaluation–regeneration cycle is repeated up to a fixed maximum number of iterations, allowing the model to correct grounding errors while preserving the original conversational structure. As shown in Figure
            - link "5" [ref=e2065] [cursor=pointer]:
              - /url: "#A2.F5"
            - text: ", the majority of conversations converge within a small number of iterations, indicating that the grounding constraints are stable and efficiently enforced."
          - paragraph [ref=e2067]: Beyond automated validation, Memora includes a manual verification stage. A stratified subset (5%) of generated conversations, sampled across personas, memory types, and operation types, is reviewed by trained human annotators. Annotators are instructed to (1) verify that all required memory information specified by the session trace is explicitly expressed in the conversation, (2) check that no invalidated or deleted information is reintroduced at any point, and (3) ensure that the dialogue remains natural and coherent without revealing underlying memory operations. If annotators identify systematic inconsistencies or grounding errors, the entire affected batch is rejected and regenerated.
          - paragraph [ref=e2069]: "Together, automated evaluation and human verification ensure that generated conversations in Memora meet three requirements: (1) memory presence, meaning that all information specified by the session trace is explicitly stated in the dialogue; (2) forgetting absence, meaning that information that has been updated or deleted is not reintroduced at any point; and (3) conversational quality, meaning that the resulting dialogue remains natural, coherent, and linguistically diverse."
