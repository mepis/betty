            - link "2025" [ref=e309] [cursor=pointer]:
              - /url: "#bib.bib49"
            - text: )
          - text: extends personalization-oriented memory evaluation to agentic settings, highlighting competencies such as retrieval, test-time learning, and forgetting.
        - paragraph [ref=e311]: Taken together, prior works have expanded the scale and scope of long-term memory evaluation, either by increasing conversation length or by framing memory as personalization. However, across both lines of work, long-term memory is still predominantly operationalized as fact-retrieval from past interactions, with relatively limited emphasis on memory consolidation and frequent memory mutation. As a result, it remains unclear how well existing agents integrate information across extended timelines or handle evolving and invalidated memory. Memora targets these challenges by jointly stressing consolidation and mutation in long-term memory evaluation.
      - generic [ref=e312]:
        - heading "3 Memora" [level=2] [ref=e313]:
          - generic [ref=e314]: "3"
          - text: Memora
        - paragraph [ref=e316]: Memora is constructed through a simulation-driven pipeline that jointly generates long-term conversations and evaluation tasks. Starting from persona-level seed data, the pipeline simulates user interactions spanning weeks to months, converts these interactions into multi-turn conversations, and derives memory-grounded evaluation tasks. This design focuses on both memory consolidation and memory mutation, requiring models to adhere to the temporal validity of information across the Remembering, Reasoning, and Recommending tasks.
        - generic [ref=e317]:
