            - generic [ref=e331]: "3.2"
            - text: Session Simulation
          - paragraph [ref=e333]:
            - text: Given the seed data, a session simulator generates sequences of user interactions spanning weeks to months. The seed data defines the space of possible memory entities, and the simulator determines when and how those entities are introduced, updated, or invalidated under explicit temporal and operational constraints. The simulator also includes memory-neutral sessions that do not introduce, modify, or delete any stored memories (
            - emphasis [ref=e334]: e.g., casual conversations, clarifications
            - text: ). This mixture follows interaction patterns observed in prior conversational benchmarks
            - generic [ref=e335]:
