        - generic [ref=e1901]:
          - heading "A.2 Memory Types" [level=3] [ref=e1902]:
            - generic [ref=e1903]: A.2
            - text: Memory Types
          - paragraph [ref=e1905]: "Memora models long-term user state through three memory types: preference memory, activity memory, and goal memory. These categories are designed to jointly capture evolving behaviors and long-term objectives that arise in realistic personalized assistant usage. Each memory type exhibits distinct temporal dynamics and supports different evaluation tasks, enabling fine-grained analysis of memory consolidation, mutation, and forgetting."
          - generic [ref=e1906]:
            - heading "Preference Memory:" [level=4] [ref=e1907]
            - paragraph [ref=e1909]: "Preference memory encodes users’ likes and dislikes across entertainment and lifestyle domains. It serves as the primary signal for personalized recommendation tasks. Preferences are initialized from persona-specific archetypes and evolve gradually over time through additions, updates, and deletions. Preference memory spans four domains—movies, books, music, and travel—and includes a large inventory of candidate entities to prevent memorization or shortcut learning. Importantly, preference evolution is non-monotonic: users may reinforce existing preferences, weaken them, or reverse earlier statements. This design ensures that correct responses require sensitivity to temporal validity, rather than simply retrieving the earliest or most frequent preference mention."
          - generic [ref=e1910]:
            - heading "Activity Memory:" [level=4] [ref=e1911]
            - paragraph [ref=e1913]: Activity memory captures what users do over time and represents the most dynamic and frequently updated memory type in Memora. It is explicitly divided into personal activity and work activity, reflecting how real users interleave daily routines with professional responsibilities. Personal activity memory includes recurring, time-indexed behaviors such as expense tracking, task management, and fitness-related activities. These activities are typically additive and incremental, supporting reasoning tasks that require aggregation or status evaluation over multiple sessions. Work activity memory models sustained professional actions, including drafting and revising documents, composing emails, recording meeting notes, and producing other work-related artifacts. These activities often undergo multiple revisions or deletions, creating long dependency chains that stress memory consolidation and mutation handling. By treating both personal and work behaviors as activities rather than abstract records, Memora emphasizes action-centered memory that evolves continuously across sessions.
          - generic [ref=e1914]:
            - heading "Goal Memory:" [level=4] [ref=e1915]
            - paragraph [ref=e1917]: Goal memory represents long-term objectives that users aim to satisfy over extended interaction horizons. In contrast to activity memory, goals are relatively stable and are updated less often once introduced than other memory types. Examples include financial budgets or fitness targets. Goals serve as anchors for reasoning tasks that require synthesizing activity history against a persistent target (e.g., determining whether accumulated expenses exceed a budget). This structure forces models to integrate information across many temporally distributed sessions rather than relying on localized context.
