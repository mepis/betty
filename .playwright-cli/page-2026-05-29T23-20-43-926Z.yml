      - generic [ref=e1427]:
        - heading "6 Error Analysis" [level=2] [ref=e1428]:
          - generic [ref=e1429]: "6"
          - text: Error Analysis
        - paragraph [ref=e1431]: "We conduct a manual error analysis over 75 incorrect predictions, randomly sampled across all temporal durations, with 25 samples per task. For each task, we analyze errors from the best-performing long-term memory agent. Recommendation errors are primarily driven by the failures to forget outdated memory and partial memory retrieval. We found 16 of 25 errors (64%) were caused by outdated memory not being forgotten, and 7 of 25 (28%) errors involved partial retrieval of preferences. Agents often retrieve historical preferences while failing to apply recent updates. For example, a user initially preferred non-fiction books but later shifted toward contemporary fiction. When asked for a recommendation, the agent suggested a historical biography. Remembering errors are dominated by partial memory retrieval: 18 of 25 errors (72%), often resulting in incomplete structured outputs. Agents retrieve some but not all required memory items. For example, a project summary request initially included objectives and deadlines, with collaborators and a risk assessment added later. The generated summary omitted the later-added items. Reasoning errors consistently involve partial retrieval that prevents consolidation. All reasoning errors (100%) involved incomplete retrieval of relevant memory elements, preventing correct consolidation. For example, after logging multiple expenses under a monthly budget, agents responded with vague judgments (e.g., within budget) rather than computing the remaining amount."
        - paragraph [ref=e1433]: "In summary, error patterns are task-specific: recommending failures due to outdated or partial preferences, remembering failures due to incomplete retrieval, and reasoning failures because missing memory elements prevent consolidation. These highlight the need for task-aware memory mechanisms that jointly support retrieval, forgetting, and consolidation for long-term memory."
      - generic [ref=e1434]:
        - heading "7 Conclusion" [level=2] [ref=e1435]:
          - generic [ref=e1436]: "7"
          - text: Conclusion
        - paragraph [ref=e1438]: Memora serves as a controlled stress test that isolates key long-term memory challenges and enables more diagnostic evaluation. By grounding interactions in explicit memory traces, it assesses whether models maintain temporally consistent memory states rather than relying on isolated recall. We further introduce Forgetting-Aware Memory Accuracy (FAMA), which penalizes reliance on invalidated memory and exposes substantial performance gaps across both LLMs and long-term memory agents that standard metrics fail to capture. Together, these findings suggest that advancing long-term conversational memory will require mechanisms that explicitly integrate forgetting, consolidation, and mutation as first-class design principles.
      - generic [ref=e1439]:
        - heading "Limitations" [level=2] [ref=e1440]
        - paragraph [ref=e1442]: "Memora aims to provide a controlled and challenging benchmark for long-term conversational memory, which necessarily involves several design trade-offs. First, Memora relies on simulated long-horizon conversations with explicit memory creation, mutation, and deletion. While simulation cannot fully capture the ambiguity and unpredictability of real user interactions, collecting and manually annotating real-world memory logs over weeks or months is very costly. Such data would require user consent, careful privacy handling, and manual annotation of evolving user states, making it difficult to scale or standardize. Importantly, simulation does not simplify the task for evaluated systems: models already struggle under these controlled conditions. Since real deployments introduce additional complexities such as implicit updates and contradictory signals, Memora should be viewed as a lower bound. Systems that fail in simulation are unlikely to generalize to more complex real-world settings, making the benchmark a meaningful stress test despite its synthetic nature. Second, Memora centers on a constrained set of personas and memory categories (preferences, activities, and goals) that are directly relevant to personalized assistants. This scope excludes other forms of long-term memory, such as social relationships and multi-user coordination. We leave the inclusion of richer social and relational memory structures to future work. Third, evaluation relies primarily on LLM-based judges with majority voting to ensure scalability. Although automated judging may introduce shared biases, using multiple judge models and criterion-level decisions reduces variance and dependence on any single evaluator. Finally, we do not report runtime, latency, or efficiency metrics. Participating systems rely on heterogeneous hardware and storage infrastructures, making fair efficiency comparisons difficult. We therefore focus on correctness and robustness of memory usage rather than potentially misleading performance measurements."
      - generic [ref=e1443]:
        - heading "Ethical Considerations" [level=2] [ref=e1444]
        - paragraph [ref=e1446]: The authors state that this work is in accordance with the ACL Code of Ethics and does not raise ethical issues. AI assistants, specifically Grammarly and ChatGPT, were utilized to correct grammatical errors and restructure sentences.
