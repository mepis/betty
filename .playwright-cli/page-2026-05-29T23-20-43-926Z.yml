              - text: )
            - text: .
          - paragraph [ref=e339]:
            - text: The simulator maintains a persistent memory state that is updated after every session. This enables dynamics such as preference drift (
            - emphasis [ref=e340]: e.g., gradually losing interest in a favored director
            - text: ), recurring activities (
            - emphasis [ref=e341]: e.g., repeated activities logging
            - text: ), and incremental progression of long-term tasks (
            - emphasis [ref=e342]: e.g., refining a draft document across multiple sessions
            - text: ). By recording the full memory state before and after each session, Memora produces explicit memory traces that precisely track how information is introduced, updated, and invalidated over time. These traces define the ground truth for downstream conversation generation and memory evaluation.
