            - generic [ref=e3172]: "Table 10:"
            - text: High-level comparison of long-term memory agent backends and retrieval mechanisms. The table summarizes the storage backends, retrieval strategies, and embedding models used by each system. Agents vary from local vector stores (e.g., ChromaDB) and file-based storage to cloud-managed memory services. Retrieval approaches include vector similarity search, embedding-based lookup, hybrid vector–keyword retrieval (BM25), and proprietary or internal mechanisms. When specified as provider-managed or internal (opaque), the underlying embedding model or retrieval logic is abstracted away and not directly controlled by the agent implementation.
        - paragraph [ref=e3174]: This appendix provides additional implementation details and hyperparameter configurations for both the LLM-based evaluation and the long-term agent-based memory evaluation settings. The goal is to ensure reproducibility and to clarify design choices that are summarized in the main text.
        - generic [ref=e3175]:
          - heading "E.1 LLM-Based Evaluation" [level=3] [ref=e3176]:
            - generic [ref=e3177]: E.1
            - text: LLM-Based Evaluation
          - paragraph [ref=e3179]: "In the LLM-based setting, models are evaluated without any external memory system. Each model receives the available multi-session conversation history directly in-context and is asked to answer memory-dependent questions. This setting evaluates the intrinsic long-context memory and consolidation capabilities of large language models. We evaluate a diverse set of frontier and open-weight models with varying native context lengths. The full conversation history is passed to the model as context. When the total history exceeds the available context budget, we apply chronological truncation—retaining the most recent sessions and discarding older ones. We evaluate each model under two inference configurations: standard decoding (no_reasoning) and reasoning-enabled decoding (reasoning). For reasoning-enabled runs, we rely on provider-default reasoning token allocation and do not manually specify a fixed reasoning budget. All model calls are routed through OpenRouter when supported, providing a unified interface across providers."
        - generic [ref=e3180]:
          - heading "E.2 Long-Term Memory Agents Evaluation" [level=3] [ref=e3181]:
            - generic [ref=e3182]: E.2
            - text: Long-Term Memory Agents Evaluation
          - paragraph [ref=e3184]: In the agent-based setting, systems incrementally ingest conversations, store user-specific information in an external memory module, retrieve relevant memories at query time, and generate answers conditioned on the retrieved content. All agents are evaluated using identical conversation streams and question sets. To ensure consistent memory persistence across sessions, all systems adopt a unified user identifier format, persona_timeline.
