            - generic [ref=e319]: "3.1"
            - text: Seed Data Design
          - paragraph [ref=e321]:
            - text: We construct ten professional persona profiles (
            - emphasis [ref=e322]: e.g., software engineers, researchers, designers, executives
            - text: ") consisting of preference patterns, activity tendencies, and long-term goals. These personas serve as the semantic backbone of the benchmark. Memora models three user-centric memory types:"
            - emphasis [ref=e323]: preference memory, activity memory, and goal memory
            - text: . Preference memory captures users’ evolving likes and dislikes across domains (
            - emphasis [ref=e324]: e.g., movie, music, travel
            - text: ). Activity memory represents what users’ do over time, encompassing both personal activities (
            - emphasis [ref=e325]: e.g., expenses, fitness tracking, tasks
            - text: ) and professional activities (
            - emphasis [ref=e326]: e.g., drafting documents, managing meeting notes
            - text: ). Goal memory encodes users’ long-term objectives (
            - emphasis [ref=e327]: e.g., budgeting, fitness targets
            - text: ). Memory evolution is controlled by operational and temporal constraints that ensure chronological consistency across sessions. Further details are provided in Appendix
            - link "A" [ref=e328] [cursor=pointer]:
              - /url: "#A1"
            - text: .
