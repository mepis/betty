            - text: "across weekly, monthly, and quarterly durations. This aggregation highlights clear task-dependent differences: long-term memory agents outperform LLMs on remembering, language models remain competitive with top agents on recommending, and performance on reasoning remains low for both LLMs and long-term memory agents."
        - paragraph [ref=e890]: Recommending shows the weakest week-to-quarterly degradation. Most LLMs and agents still decline (11 of 14), especially memory agents such as MemoBase (68.94 to 45.62), MemoryOS (62.64 to 44.02), and Nemori (52.84 to 41.66). However, recommendation also contains most of the exceptions where performance remains stable or even improves, such as Gemini 3 Pro Preview and Claude Sonnet 4.5. We attribute this to the nature of the task. Unlike remembering and reasoning, which are evaluated against more determinate fact-based criteria derived from the current memory state, recommendation allows a wider range of acceptable responses. As a result, models can still receive credit by generating plausible suggestions that are broadly consistent with the user’s current preferences, even when explicit memory retrieval is incomplete, because they can infer likely preferences from persona-aligned conversational cues that remain available in the context window.
        - paragraph [ref=e892]:
          - text: "Performance Across Tasks: Table"
          - link "4" [ref=e893] [cursor=pointer]:
            - /url: "#S5.T4"
          - text: "shows that long-term memory performance differs by task. Memory agents are clearly the strongest on remembering, achieving 119.45 average aggregated FAMA versus 65.60–65.80 for language models. This large gap highlights the value of explicit memory mechanisms for factual recall. The reasoning tokens provide little benefit for LLMs on this task. By contrast, recommending is the only task where language models match or exceed memory agents, with average scores of 144.72 without reasoning and 153.34 with reasoning, compared to 138.37 for agents. Reasoning is the weakest task overall. Even the best average performance remains low, at 27.55 for memory agents, compared to 12.37 and 13.92 for language models. These results show that long-term memory is not a single capability: agents that retrieve well do not necessarily reason well over temporally distributed memory."
        - paragraph [ref=e895]:
          - text: "The effect of Forgetting-Aware Evaluation: Standard memory evaluation based on memory presence accuracy overestimates long-term memory performance. These metrics evaluate the final response by checking whether required information appears, but they do not penalize the use of obsolete or invalidated memory. As a result, models can achieve high scores even when their responses conflate between past and current memory states. Table"
          - link "5" [ref=e896] [cursor=pointer]:
            - /url: "#S5.T5"
          - text: compares aggregated memory-presence accuracy scores with the forgetting-aware reductions introduced by the proposed FAMA metric. Across all language models and long-term memory agents, applying forgetting-aware evaluation results in large score reductions.
        - paragraph [ref=e898]: The score reductions follow different trends for language models and memory agents. For language models, the reduction decreases as temporal range grows (from 32.6 weekly to 17.8 quarterly), not because memory improves, but because longer histories exceed the context window and relevant information is omitted altogether. Memory agents exhibit the opposite trend. Their score reductions increase with longer timelines (from 18.2 weekly to 29.5 quarterly), showing that as memory scales, agents increasingly rely on information that should have been revised or discarded. Retaining access to older memories without effective forgetting amplifies inconsistency.
        - paragraph [ref=e900]: Consequently, long-term memory agents with the same aggregated memory presence accuracy receive different forgetting-based reductions, leading to changes in their final performance rankings. For example, in the monthly setting, MemoryOS (112.8) and A-Mem (112.0) both outperform Nemori (105.4) under memory presence accuracy, but Nemori receives a much smaller forgetting-based reduction (15.4 vs. 28.4 and 29.5), yielding a higher final aggregated FAMA score and moving it ahead of both systems in the final ranking.
