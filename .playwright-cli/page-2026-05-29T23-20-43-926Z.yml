        - paragraph [ref=e301]:
          - text: In parallel, another line of work frames long-term memory primarily as personalization, aiming to adapt agents’ behavior to the individual users over extended interactions. Early benchmarks such as DuLeMon
          - generic [ref=e302]:
            - text: Xu et al. (
            - link "2022b" [ref=e303] [cursor=pointer]:
