            - generic [ref=e1410]: "Table 5:"
            - text: Aggregated memory-presence accuracy across all three tasks for each temporal duration. Parenthesized values show the score reduction after applying the forgetting-aware penalty in FAMA; larger reductions indicate heavier reliance on obsolete memory.
        - paragraph [ref=e1412]:
          - text: "Forgetting-aware performance variability: Figures"
          - link "3" [ref=e1413] [cursor=pointer]:
            - /url: "#S5.F3"
          - text: and
          - link "4" [ref=e1414] [cursor=pointer]:
            - /url: "#S5.F4"
          - text: provide complementary views of per-question FAMA across tasks and temporal durations. Both figures reveal substantial variability, indicating that long-term memory behavior is unstable across both time and task settings. In Figure
          - link "3" [ref=e1415] [cursor=pointer]:
            - /url: "#S5.F3"
          - text: ", the large error bars across durations show that systems are sensitive to temporal scaling, with longer interaction histories introducing inconsistent performance. In Figure"
          - link "4" [ref=e1416] [cursor=pointer]:
            - /url: "#S5.F4"
          - text: ", variability across tasks highlights that long-term memory is not a unified capability: systems that perform well on recommendation often fail on reasoning. This asymmetry reflects differing task requirements. Recommendation tolerates partial or approximate memory, allowing models to produce plausible outputs even with incomplete retrieval. In contrast, reasoning requires consistent integration of multiple memory elements, making it highly sensitive to missing or outdated information. This explains the consistently low reasoning scores across all systems."
        - paragraph [ref=e1418]: Finally, the divergence between mean performance and variability suggests that current systems are not only inaccurate but also brittle, with performance highly sensitive to temporal and task conditions. These findings indicate that long-term memory challenges stem less from memory capacity limitations (e.g., context length or storage size) and more from failures to maintain coherent, up-to-date memory under frequent mutation.
        - 'figure "Figure 3: FAMA scores for remembering, recommending, and reasoning tasks. For each task, we report the top three approaches. Points denote mean per-question FAMA scores, and error bars indicate variability across temporal durations." [ref=e1419]':
          - img "Refer to caption" [ref=e1420]
          - generic [ref=e1421]:
            - generic [ref=e1422]: "Figure 3:"
            - text: FAMA scores for remembering, recommending, and reasoning tasks. For each task, we report the top three approaches. Points denote mean per-question FAMA scores, and error bars indicate variability across temporal durations.
        - 'figure "Figure 4: FAMA scores for weekly, monthly, and quarterly durations. For each temporal duration, we report the top three approaches. Points denote mean per-question FAMA scores, and error bars indicate variability across tasks." [ref=e1423]':
