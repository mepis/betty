              - /url: "#bib.bib9"
            - text: )
          - text: handles updates across no more than three sessions. As a result, models are rarely required to reconcile multiple revisions of the same information or to track how user states evolve over extended timelines.
        - paragraph [ref=e255]:
          - text: To address these gaps, we introduce Memora, a benchmark that models long-term memory as a continuous and evolving process rather than static retrieval. Memora increases demands on both memory consolidation and mutation by requiring models to integrate information across weekly, monthly, and quarterly conversation sessions. Figure
          - link "1" [ref=e256] [cursor=pointer]:
            - /url: "#S1.F1"
          - text: "shows that Memora evaluates three memory-grounded tasks: remembering, reasoning, and recommending. All tasks require adhering to the temporal validity of users’ long-term memory."
        - generic [ref=e257]:
          - paragraph [ref=e258]: "Beyond benchmark design, Memora also revisits how long-term memory should be evaluated. Existing evaluations largely reward memory inclusion, measuring whether relevant information appears in a model’s response. This overlooks memory misuse, where obsolete information is retrieved and used. As long as the final answer appears correct, reliance on invalidated memory is not penalized. To address this, we introduce Forgetting-Aware Memory Accuracy (FAMA), an evaluation metric that explicitly accounts for invalid memories. FAMA measures whether a model’s response reflects the user’s current memory state by rewarding correct use of valid memory and penalizing reliance on obsolete or deleted memory. This enables evaluation of memory mutation over long interaction histories. Using Memora, we evaluate four LLMs and six long-term memory agents. Despite extended context windows and external memory mechanisms, our results reveal persistent failures in maintaining consistent belief states under high consolidation and mutation pressure. Models frequently reuse obsolete information, and long-term memory agents offer only limited improvements. In summary, our main contributions are:"
          - list [ref=e259]:
            - listitem [ref=e260]:
              - text: •
              - paragraph [ref=e262]: Introducing Memora, a benchmark that substantially increases demands on both memory consolidation and memory mutation across weekly, monthly and quarterly durations.
            - listitem [ref=e263]:
              - text: •
              - paragraph [ref=e265]: Proposing Forgetting-Aware Memory Accuracy (FAMA), an evaluation metric that penalizes reliance on outdated memories.
            - listitem [ref=e266]:
              - text: •
              - paragraph [ref=e268]: Empirical evaluation of LLMs and long-term memory agents, revealing limitations in maintaining consistent memory states.
          - paragraph [ref=e269]: These contributions position Memora as a rigorous benchmark for studying long-term memory. By jointly stressing memory consolidation, frequent memory mutation, and forgetting-aware evaluation, Memora exposes failure modes that remain hidden under retrieval-centric benchmarks.
