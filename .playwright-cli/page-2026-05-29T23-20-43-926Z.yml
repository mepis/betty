              - generic [ref=e2079]: "Figure 6:"
              - text: Distribution of agreement patterns among the three LLM judges for weekly, monthly, and quarterly evaluations. Each bar shows the frequency of unanimous agreement (all “yes” or all “no”) and partial agreement (2–1 splits). Across all temporal spans, the majority of evaluation criteria exhibit unanimous agreement, with partial disagreements accounting for a relatively small fraction of cases. The proportion of unanimous agreement increases with longer temporal durations, indicating stable and well-defined evaluation criteria even under higher memory consolidation and mutation pressure.
          - paragraph [ref=e2081]: Evaluating long-term memory in personalized agents requires assessing whether a model’s response is consistent with the user’s current memory state, rather than merely checking surface-form overlap with a reference answer. In Memora, correctness depends on whether responses correctly incorporate valid information accumulated across long interaction histories while simultaneously avoiding reliance on obsolete or invalidated memory. These properties are inherently semantic and context-dependent, making rule-based or string-matching evaluation insufficient. For this reason, Memora adopts an LLM-as-Judge evaluation framework, following established practices for evaluating open-ended and long-context tasks.
          - paragraph [ref=e2083]: "Each evaluation question in Memora is decomposed into a set of atomic, memory-aligned criteria, derived directly from the underlying memory trace. These criteria are divided into two categories: memory presence, which checks whether valid and temporally current memory items are correctly reflected in the response, and forgetting absence, which checks whether invalidated or deleted memory items are correctly excluded. By evaluating these criteria independently, Memora distinguishes correct memory usage from erroneous reuse of outdated information, enabling fine-grained analysis of memory consolidation and mutation."
          - 'figure "Figure 7: Pairwise Cohen’s κ scores between OpenAI, Anthropic, and Google judges for weekly, monthly, and quarterly evaluations. All judge pairs achieve κ values above 0.80 across temporal settings, corresponding to near-perfect agreement. High κ values persist despite increasing task difficulty at longer time scales, demonstrating strong alignment and low variance among heterogeneous LLM judges." [ref=e2084]':
