            - text: )
          - text: shifts toward personalized decision-making by testing whether models can infer evolving user states from long histories using multiple-choice questions. MemDaily
          - generic [ref=e306]:
            - text: Zhang et al. (
            - link "2024b" [ref=e307] [cursor=pointer]:
