                - cell "Low" [ref=e268]
          - separator [ref=e269]
          - heading "Evaluation" [level=2] [ref=e270]
          - heading "Benchmarks" [level=3] [ref=e271]
          - paragraph [ref=e272]:
            - strong [ref=e273]:
              - link "LongBench" [ref=e274] [cursor=pointer]:
                - /url: https://arxiv.org/abs/2308.14508
            - text: "(2023, updated to v2 in 2024) is the foundational bilingual multi-task benchmark for long-context understanding: 21 datasets across single-doc QA, multi-doc QA, summarization, few-shot learning, synthetic tasks, and code completion. Average English context length is ≈6 700 words; LongBench v2 extends to 503 challenging multiple-choice questions with contexts up to 2M words. LongBench is primarily used to measure baseline long-context capability, not compaction quality specifically."
          - paragraph [ref=e275]:
            - strong [ref=e276]: RULER
            - text: extends the Needle-in-a-Haystack (NIAH) paradigm with more varied retrieval and aggregation tasks across different context lengths. It surfaces the performance-cliff behavior of models as context grows beyond their effective attention range.
          - paragraph [ref=e277]:
            - strong [ref=e278]:
              - link "LoCoMo" [ref=e279] [cursor=pointer]:
                - /url: https://arxiv.org/abs/2402.17753
            - text: (Snap Research, 2024) is the most relevant benchmark for persistent agent evaluation. Fifty multi-session conversations, each averaging 300–600 turns over 19–35 sessions (9K–26K tokens per conversation). Tasks include single-hop and multi-hop factual QA, temporal QA, event summarization, and multi-modal next-turn generation. Findings confirm that models systematically fail at temporal and causal connections across sessions—precisely the failure mode that compaction chains exacerbate. A 2025 extension,
            - link "Locomo-Plus" [ref=e280] [cursor=pointer]:
              - /url: https://arxiv.org/html/2602.10715v1
            - text: ", adds \"beyond-factual\" cognitive memory tasks."
          - paragraph [ref=e281]:
            - strong [ref=e282]: Context-Bench
            - text: (Letta, October 2025) focuses on chained file operations, cross-project relationship tracing, and multi-step decision consistency—the specific failure modes of compaction chains. It is available as part of the Letta evaluation suite.
          - heading "Metrics and Common Pitfalls" [level=3] [ref=e283]
          - paragraph [ref=e284]:
            - link "Factory.ai's probe-based framework" [ref=e285] [cursor=pointer]:
              - /url: https://factory.ai/news/evaluating-compression
            - text: "offers the most actionable set of metrics for compaction evaluation: six dimensions (accuracy, context awareness, artifact trail, completeness, continuity, instruction following) scored 0–5 using an LLM judge (GPT-5.2). Their critical finding:"
            - strong [ref=e286]: compression ratio is a misleading primary metric.
            - text: All three tested methods achieved 98–99% compression, yet quality scores differed meaningfully (3.35–3.70) and the technical specificity of preserved information differed dramatically.
          - paragraph [ref=e287]: "Common evaluation pitfalls:"
          - list [ref=e288]:
            - listitem [ref=e289]:
              - strong [ref=e290]: Single-session evaluation.
              - text: Most benchmarks test one compaction event. Real persistent agents undergo dozens of compaction cycles; compaction chain degradation is not captured.
            - listitem [ref=e291]:
              - strong [ref=e292]: Factual recall over task continuation.
              - text: Asking "what was discussed?" is easier than "can you continue the task correctly?"—yet most benchmarks use the former.
            - listitem [ref=e293]:
              - strong [ref=e294]: No artifact tracking.
              - text: File modification history, tool call results, and intermediate decisions are the hardest to preserve and the most practically important for coding agents.
            - listitem [ref=e295]:
              - strong [ref=e296]: Static gold labels.
              - text: Conversations with predetermined correct answers do not model the open-ended nature of real agent sessions.
          - separator [ref=e297]
          - heading "Production Tradeoffs" [level=2] [ref=e298]
          - heading "Latency Spike at Compaction" [level=3] [ref=e299]
          - paragraph [ref=e300]:
            - text: Compaction requires a full-context inference pass plus the cost of generating a summary. Anthropic's billing documentation shows compaction runs as a separate iteration, billable separately from the main response. For a 150 000-token context window, the compaction call alone can consume 3 000–5 000 output tokens and add 5–15 seconds of wall-clock latency in a streaming session—a visible pause. Google ADK mitigates this by running compaction asynchronously relative to user-facing turns (the
            - code [ref=e301]: compaction_interval
            - text: fires after a turn completes, not during). Anthropic's
            - code [ref=e302]: "pause_after_compaction: true"
            - text: flag lets integrators absorb this latency gracefully by acknowledging the pause to the user.
          - heading "Correctness Loss" [level=3] [ref=e303]
          - paragraph [ref=e304]:
            - link "ACON's ablations" [ref=e305] [cursor=pointer]:
              - /url: https://arxiv.org/html/2510.00615v1
            - text: demonstrate that the failure mode is not uniform. On AppWorld (complex multi-step API tasks), naive summarization baselines lost 10–15 percentage points of accuracy versus no-compression upper bounds; ACON recovered to within 1–2%. But on tasks requiring exact artifact recall (which file paths were modified), all methods including ACON fell short. The
            - link "Factory.ai benchmark" [ref=e306] [cursor=pointer]:
              - /url: https://factory.ai/news/evaluating-compression
            - text: "makes this concrete: after a 178-message debugging session, Anthropic's compaction remembered \"401 error on the authentication endpoint\" while Factory's structured compaction remembered \"/api/auth/login endpoint… stale Redis connection.\""
          - heading "Debuggability" [level=3] [ref=e307]
          - paragraph [ref=e308]: "Compaction creates an asymmetric audit trail: the developer can see the current summary but not the raw history it was derived from. Structured compaction (explicit sections for files modified, decisions made, next steps) substantially reduces the opacity compared to freeform narrative summaries. Letta's architecture makes external memory fully inspectable: since memory is stored as structured data outside the model, it can be queried, versioned, and diffed."
          - heading "Cost Curve vs. Naive" [level=3] [ref=e309]
          - paragraph [ref=e310]:
            - text: "Without compaction, agentic token costs grow quadratically. With compaction at 80% threshold, costs grow linearly: each compaction resets the history to a summary of ≈1 000–5 000 tokens, and subsequent turns accumulate against that smaller base. In practice, the"
            - link "Augment Code guide" [ref=e311] [cursor=pointer]:
              - /url: https://www.augmentcode.com/guides/ai-agent-loop-token-cost-context-constraints
            - text: shows that combining prompt caching (90% reduction on stable prefixes) with context compaction (40–60% reduction) yields a net cost curve substantially below linear for sustained sessions.
          - separator [ref=e312]
          - heading "Prompt Caching Interaction" [level=2] [ref=e313]
          - paragraph [ref=e314]: This is the most underappreciated operational constraint for compaction-enabled platforms.
          - paragraph [ref=e315]:
            - text: Prompt caching—Anthropic's 5-minute TTL ephemeral cache and the 1-hour extended cache—requires an
            - strong [ref=e316]: exact byte-for-byte prefix match
            - text: . Any modification to early tokens invalidates the cache for all subsequent tokens. Compaction is a
            - strong [ref=e317]: hard semantic break
            - text: ": the moment a compaction fires and the conversation history is replaced with a summary, the entire prior cached prefix is stale. On the next API call, all tokens must be processed fresh."
          - paragraph [ref=e318]:
            - text: Anthropic's
            - link "official caching documentation" [ref=e319] [cursor=pointer]:
              - /url: https://platform.claude.com/docs/en/build-with-claude/prompt-caching
            - text: and the
            - link "compaction API specification" [ref=e320] [cursor=pointer]:
              - /url: https://platform.claude.com/docs/en/build-with-claude/compaction
            - text: "address this directly. The recommended architecture:"
          - list [ref=e321]:
            - listitem [ref=e322]:
              - strong [ref=e323]: Stable system prompt prefix.
              - text: The system prompt (tools, instructions, personality) never changes between turns. A
              - code [ref=e324]: "cache_control: { type: \"ephemeral\" }"
              - text: breakpoint is placed at the end of the system prompt.
            - listitem [ref=e325]:
              - strong [ref=e326]: Append-only conversation history.
              - text: New turns are always appended; no prior turns are modified.
            - listitem [ref=e327]:
              - strong [ref=e328]: Cache breakpoint on the compaction block.
              - text: When compaction fires, the API places a
              - code [ref=e329]: cache_control
              - text: marker on the compaction block itself. On subsequent turns, the system prompt and the compaction summary are both served from cache; only the new turns are billed as fresh input.
            - listitem [ref=e330]:
              - strong [ref=e331]: No dynamic content in the prefix.
              - text: Timestamps, session IDs, and user-specific metadata that changes every turn must be placed in the
              - strong [ref=e332]: last
              - text: user message, not in the system prompt—otherwise they invalidate the cache every call.
          - paragraph [ref=e333]:
            - text: The
            - link "arxiv paper \"Don't Break the Cache\"" [ref=e334] [cursor=pointer]:
              - /url: https://arxiv.org/html/2601.06007v2
            - text: "quantifies this empirically: prompt caching yields 41–80% cost savings and 13–31% TTFT improvements across providers, but"
            - strong [ref=e335]: naively enabling full-context caching can paradoxically increase latency
            - text: by triggering cache writes on dynamic tool results that are never re-used. System-prompt-only caching delivered more consistent benefits across both cost and latency dimensions.
          - paragraph [ref=e336]:
            - text: "A critical edge case surfaced in early 2026: a"
            - link "Claude Code bug (v2.1.62)" [ref=e337] [cursor=pointer]:
              - /url: https://github.com/anthropics/claude-code/issues/29230
            - text: increased KV cache hit rates without adding a compaction-event cache invalidation trigger, causing stale pre-compaction prefixes to be served into post-compaction turns. This illustrates that the compaction–caching interaction requires explicit engineering attention at the infrastructure layer.
          - separator [ref=e338]
          - heading "State of Play at Frontier Labs and Tools (2026)" [level=2] [ref=e339]
          - paragraph [ref=e340]:
            - strong [ref=e341]: Anthropic / Claude Code.
            - text: The
            - link "compact_20260112 API" [ref=e342] [cursor=pointer]:
              - /url: https://platform.claude.com/docs/en/build-with-claude/compaction
              - code [ref=e343]: compact_20260112
              - text: API
            - text: (beta as of April 2026) is the most fully specified production compaction interface. It supports configurable thresholds (minimum 50K, default 150K tokens), custom summarization prompts via
            - code [ref=e344]: instructions
            - text: ", streaming of compaction blocks, and"
            - code [ref=e345]: pause_after_compaction
            - text: for fine-grained control. Claude Code's
            - code [ref=e346]: /compact
            - text: command invokes this directly. Supported models include Claude Sonnet 4.6, Opus 4.6, and the Mythos preview.
          - paragraph [ref=e347]:
            - strong [ref=e348]: OpenAI / Codex.
            - link "GPT-5.1-Codex-Max and GPT-5.2-Codex" [ref=e349] [cursor=pointer]:
              - /url: https://openai.com/index/introducing-gpt-5-2-codex/
            - text: introduced compaction as a native training objective—"the model is trained to prune its own history while coherently preserving critical context." OpenAI reports internal runs
            - link "exceeding 25 hours" [ref=e350] [cursor=pointer]:
              - /url: https://www.gend.co/blog/gpt-5-1-codex-max-compaction
            - text: on complex coding tasks, consuming ≈13M tokens. A separate
            - code [ref=e351]: /responses/compact
            - text: API endpoint is available. Codex memory additionally stores cross-session preferences (preferred libraries, coding style) and surfaces them at session start—a form of external memory offload with automated capture.
          - paragraph [ref=e352]:
            - strong [ref=e353]: Google ADK.
            - link "Context compaction" [ref=e354] [cursor=pointer]:
              - /url: https://adk.dev/context/compaction/
            - text: ships in ADK Python v1.16.0+, Java v0.2.0+, and TypeScript v0.6.0+. The sliding-window event-count approach with configurable
            - code [ref=e355]: compaction_interval
            - text: and
            - code [ref=e356]: overlap_size
            - text: allows fine-grained control. Custom summarizer models via
            - code [ref=e357]: LlmEventSummarizer
            - text: enable domain-specific compression. ADK's Java 1.0 release (April 2026) elevated compaction to a first-class architecture concern.
          - paragraph [ref=e358]:
            - strong [ref=e359]: Cursor.
            - text: Native Cursor does not persist memory across chat sessions; each conversation starts fresh. The
            - link "2025 ecosystem" [ref=e360] [cursor=pointer]:
              - /url: https://forum.cursor.com/t/persistent-ai-memory-for-cursor/145660
            - text: "has produced community solutions: Recallium (MCP-based persistent memory), ContextPool (which scans prior sessions and injects relevant context via MCP), and Memory Bank (structured markdown files). Cursor 2.0 fixed memory leaks during long sessions but has not yet shipped built-in compaction. Best practice remains: open a new chat per task to prevent context rot, and commit key decisions to"
            - code [ref=e361]: .cursor/rules/
            - text: files.
          - paragraph [ref=e362]:
            - strong [ref=e363]: Devin (Cognition).
            - text: Devin's
            - link "long-horizon task handling" [ref=e364] [cursor=pointer]:
              - /url: https://docs.devin.ai/essential-guidelines/instructing-devin-effectively
            - text: "relies on structured planning documents and explicit memory saves. A 2025 finding showed Devin entering \"context anxiety\" mode as it approached limits—generating premature summaries and abandoning tasks. The fix was counterintuitive: allow a larger context window but cap usage programmatically at a lower threshold to prevent the model from seeing its own impending limit."
          - paragraph [ref=e365]:
            - strong [ref=e366]: LangGraph (LangChain).
            - link "LangGraph's checkpointing system" [ref=e367] [cursor=pointer]:
              - /url: https://docs.langchain.com/oss/python/langgraph/add-memory
            - text: provides thread-level state persistence via PostgresSaver, SqliteSaver, or RedisSaver. Long-term memory is stored in a separate
            - code [ref=e368]: Store
            - text: abstraction (vector-searchable). The
            - link "autonomous context compression middleware" [ref=e369] [cursor=pointer]:
              - /url: https://www.langchain.com/blog/autonomous-context-compression
            - text: (Deep Agents SDK) lets the model itself trigger compaction at task boundaries, retaining the 10 most recent messages verbatim and summarizing prior history. Evaluation on Terminal-bench-2 showed agents compress conservatively but accurately when they do.
          - paragraph [ref=e370]:
            - strong [ref=e371]: MCP (Model Context Protocol).
            - text: The
            - link "November 2025 MCP specification" [ref=e372] [cursor=pointer]:
              - /url: https://modelcontextprotocol.io/specification/2025-11-25
            - text: "adds server-side agent loops, parallel tool calls, and flexible task lifecycle management (working/input_required/completed states). MCP does not specify a compaction mechanism but enables the \"call now, fetch later\" pattern: a task ID is returned immediately, results are fetched asynchronously—reducing the need to keep pending tool output in the active context window."
          - separator [ref=e373]
          - heading "Open Problems" [level=2] [ref=e374]
          - paragraph [ref=e375]:
            - strong [ref=e376]: Agent-aware compaction.
            - text: Current summarization prompts compress conversation history without awareness of the agent's current tool schema, active goals, or pending sub-tasks. A summary that drops a tool call return value the agent was mid-way through processing can corrupt the agent's internal state silently. The
            - code [ref=e377]: pause_after_compaction
            - text: hook is a workaround but not a solution; the compactor needs access to a structured representation of active goals and pending tool results.
          - paragraph [ref=e378]:
            - strong [ref=e379]: Compaction chain degradation.
            - text: No published benchmark systematically measures accuracy degradation across sequential compaction events. A 7-day session might compact 50–100 times; each compaction is a lossy operation applied to the output of the previous one. The error compounds. This is not a solved problem—it is not even reliably measured.
          - paragraph [ref=e380]:
            - strong [ref=e381]: Cross-session continuity.
            - text: LoCoMo defines the problem space (300-turn, 35-session conversations), but production platforms have only partial solutions. Letta's archival memory, Cognee's knowledge graph, and Zylos's memory files are all file-based approaches that require explicit agent discipline to maintain. Automated cross-session extraction (identifying what from session N should persist to session N+1) remains heuristic.
          - paragraph [ref=e382]:
            - strong [ref=e383]: Multi-modal context.
            - text: As agents use vision (screenshots, diagrams, UI states), image tokens dominate context budgets—a single high-resolution screenshot can consume 1 000–2 000 tokens.
            - link "CVPR 2025 work on Progressive Visual Token Compression (PVC)" [ref=e384] [cursor=pointer]:
              - /url: https://openaccess.thecvf.com/content/CVPR2025/papers/Yang_PVC_Progressive_Visual_Token_Compression_for_Unified_Image_and_Video_CVPR_2025_paper.pdf
            - text: and
            - link "DyCoke" [ref=e385] [cursor=pointer]:
              - /url: https://openaccess.thecvf.com/content/CVPR2025/papers/Tao_DyCoke_Dynamic_Compression_of_Tokens_for_Fast_Video_Large_Language_CVPR_2025_paper.pdf
            - text: address visual token reduction at the model level, but agent-level compaction strategies for multi-modal histories (summarize the text; downsample or drop the screenshots; preserve key UI states as structured data) are largely unexplored.
          - paragraph [ref=e386]:
            - strong [ref=e387]: Evaluation of compaction quality.
            - text: The
            - link "Factory.ai probe-based framework" [ref=e388] [cursor=pointer]:
              - /url: https://factory.ai/news/evaluating-compression
            - text: is the most rigorous published methodology, but it requires large-scale production traces and an LLM judge—neither is accessible to most teams. A standardized open-source evaluation harness for compaction quality across the six dimensions (accuracy, artifact tracking, continuity, etc.) does not yet exist.
          - separator [ref=e389]
          - heading "Recommendations for Zylos-Style Platforms" [level=2] [ref=e390]
          - paragraph [ref=e391]: "The following guidelines apply to any persistent agent platform where sessions span hours to weeks:"
          - list [ref=e392]:
            - listitem [ref=e393]:
              - paragraph [ref=e394]:
                - strong [ref=e395]: Stabilize your system prefix and never vary it between turns.
                - text: Tool definitions, personality, core instructions—everything in the system prompt must be byte-for-byte identical across requests. Place a
                - code [ref=e396]: cache_control
                - text: breakpoint at the end of the system prompt. Move timestamps, session IDs, and per-turn metadata into the final user message, not the prefix. This is the single highest-ROI change for cost reduction.
            - listitem [ref=e397]:
              - paragraph [ref=e398]:
                - strong [ref=e399]: Set compaction threshold at ≈70–75% of the context window, not 95–98%.
                - text: Triggering compaction early (at 150K tokens for a 200K window) gives the model adequate output tokens to write a high-quality summary. Triggering at 98% leaves the model context-anxious and produces compressed, incomplete summaries—the "context anxiety" failure Devin documented.
            - listitem [ref=e400]:
              - paragraph [ref=e401]:
                - strong [ref=e402]: Use structured compaction templates, not freeform summarization.
                - text: "Require the compaction summary to explicitly populate sections:"
                - code [ref=e403]: "## Session Intent"
                - text: ","
                - code [ref=e404]: "## Files Modified"
                - text: (full paths),
                - code [ref=e405]: "## Key Decisions"
                - text: ","
                - code [ref=e406]: "## Active Goals"
                - text: ","
                - code [ref=e407]: "## Next Steps"
                - text: . Structured sections act as checklists the compressor must fill or explicitly mark as empty, preventing silent information loss. This is the primary differentiator in Factory.ai's benchmark results.
            - listitem [ref=e408]:
              - paragraph [ref=e409]:
                - strong [ref=e410]: Offload long-lived facts to external memory on write, not at compaction time.
                - text: Architectural decisions, user preferences, environment constants, and project conventions should be written to structured memory files (or a key-value store) as soon as they are established—not extracted from conversation history during compaction. Relying on compaction to capture important context produces fragile, retroactive extraction.
            - listitem [ref=e411]:
              - paragraph [ref=e412]:
                - strong [ref=e413]: Deduplicate tool results proactively and purge resolved errors.
                - text: "Before any compaction fires, apply deterministic structural cleanup: drop duplicate file reads (keep only the most recent), remove error messages whose errors have since been resolved, truncate verbose API responses to canonical-length excerpts. This free reduction can cut context by 15–30% with no information loss and no model cost."
            - listitem [ref=e414]:
              - paragraph [ref=e415]:
                - strong [ref=e416]: Test your compaction pipeline with probe-based evaluation, not ROUGE scores.
                - text: "Build or adapt the Factory.ai probe methodology: after each compaction event in CI/staging, fire four probe types (recall, artifact, continuation, decision) and score them with an LLM judge. Alert on regressions in artifact tracking score, which is the metric most sensitive to real-world agent failures."
            - listitem [ref=e417]:
              - paragraph [ref=e418]:
                - strong [ref=e419]: Implement compaction-aware cache invalidation.
                - text: Log every compaction event with a session token and timestamp. On each API call, verify that the cached prefix the provider is serving matches the post-compaction system prompt + compaction block, not a pre-compaction prefix. A mismatch (as in the Claude Code v2.1.62 bug) produces subtly corrupted sessions that are hard to detect without explicit monitoring.
            - listitem [ref=e420]:
              - paragraph [ref=e421]:
                - strong [ref=e422]: Design for compaction chains from day one.
                - text: "Assume any session over 4 hours will compact 10+ times. This means: (a) external memory must be the source of truth for durable facts, not the compaction summary; (b) active goal state should be explicitly written to a structured"
                - code [ref=e423]: state.md
                - text: at each significant milestone, not inferred from history; (c) compaction summary quality should be monitored as a rolling metric over the session lifetime, not just immediately after the first compaction.
