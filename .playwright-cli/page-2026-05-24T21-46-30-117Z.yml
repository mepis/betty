            - text: 2026-04-21
          - 'heading "Agent Context Compaction for Long-Running Sessions: Techniques and Tradeoffs" [level=1] [ref=e36]'
          - generic [ref=e37]:
            - generic [ref=e38]: ai-agents
            - generic [ref=e39]: context-engineering
            - generic [ref=e40]: compaction
            - generic [ref=e41]: prompt-caching
            - generic [ref=e42]: memory
            - generic [ref=e43]: long-running-agents
        - generic [ref=e44]:
          - heading "Executive Summary" [level=2] [ref=e45]
          - list [ref=e46]:
            - listitem [ref=e47]:
              - strong [ref=e48]: Context compaction is now a first-class platform concern.
              - text: Long-running agents accumulate O(N²) token costs with each tool call, suffer from the "lost-in-the-middle" attention deficit, and face hard context-window ceilings (200K–1M tokens). Without deliberate compaction, sessions are both expensive and increasingly unreliable after tens of thousands of tokens.
            - listitem [ref=e49]:
              - strong [ref=e50]: "The field has converged on four viable strategies:"
              - text: provider-native summarization APIs (Anthropic, OpenAI), structured "anchored iterative" compaction with persistent section templates, external memory offload (MemGPT/Letta, Cognee), and retrieval-augmented episodic memory. No single technique dominates; production platforms combine them.
            - listitem [ref=e51]:
              - strong [ref=e52]: Prompt caching and compaction are in fundamental tension.
              - text: Compaction is a hard semantic break that invalidates all prior cached prefixes. Mitigation requires stable system-prompt prefixes with cache breakpoints placed before the volatile conversation region, and Anthropic's server-side API (
              - code [ref=e53]: compact_20260112
              - text: ) natively places a
              - code [ref=e54]: cache_control
              - text: marker on the compaction block for this reason.
            - listitem [ref=e55]:
              - strong [ref=e56]: Evaluation lags practice significantly.
              - text: Benchmarks like
              - link "LoCoMo" [ref=e57] [cursor=pointer]:
                - /url: https://arxiv.org/abs/2402.17753
              - text: ","
              - link "LongBench" [ref=e58] [cursor=pointer]:
                - /url: https://arxiv.org/abs/2308.14508
              - text: ", and RULER measure single-session long-context recall but do not model compaction chains—sequential, lossy compressions over days-long agent runs. Artifact tracking (which files were modified?) is uniformly weak across all production methods, scoring 2.19–2.45/5.0 in"
              - link "Factory.ai's head-to-head evaluation" [ref=e59] [cursor=pointer]:
                - /url: https://factory.ai/news/evaluating-compression
              - text: .
            - listitem [ref=e60]:
              - strong [ref=e61]: "For Zylos-style persistent platforms, the practical stack is:"
              - text: stable system prefix + append-only cache breakpoint → structured compaction at ≈75% threshold → external memory offload for long-lived facts → episodic retrieval for cross-session continuity.
          - separator [ref=e62]
          - heading "The Compaction Problem" [level=2] [ref=e63]
          - heading "Why Long Sessions Break" [level=3] [ref=e64]
          - paragraph [ref=e65]: Every API call to a frontier model bills the full conversation history as input tokens. A naive 20-step agent loop where each step produces 1 000 tokens yields 210 000 cumulative input tokens—not the 20 000 a per-step estimate suggests. At Claude Sonnet 4.6 pricing, this O(N²) growth turns a 100-step debugging session into a non-trivial line item; at Opus 4.6 rates the same session can cost two orders of magnitude more than the first call.
          - paragraph [ref=e66]:
            - text: Token cost is only one failure mode. In a
            - link "2023/2024 paper published in Transactions of the ACL" [ref=e67] [cursor=pointer]:
              - /url: https://aclanthology.org/2024.tacl-1.9/
            - text: ", Liu et al. demonstrated that model performance peaks when relevant information sits at the very beginning or end of a context, and degrades sharply—by over 30 percentage points on multi-document QA—when the answer document falls in the middle of a 20-document context. The paper coined this the"
            - strong [ref=e68]: "\"lost-in-the-middle\""
            - text: "effect, and it is caused by how Rotary Position Embeddings (RoPE) attenuate mid-sequence attention. This is not a quirk of small models: the effect persists in explicitly long-context models and worsens as the session grows longer."
          - paragraph [ref=e69]:
            - link "Anthropic's own engineering blog on context engineering" [ref=e70] [cursor=pointer]:
              - /url: https://www.anthropic.com/engineering/effective-context-engineering-for-ai-agents
            - text: "names a third failure mode:"
            - strong [ref=e71]: context rot
            - text: —the gradual degradation of model behavior as irrelevant tool outputs, outdated intermediate states, and redundant re-reads accumulate. Context rot is insidious because the model does not emit an error; it just silently attends less accurately to the signal buried beneath the noise. A
            - link "2025 industry survey" [ref=e72] [cursor=pointer]:
              - /url: https://medium.com/@moradikor296/the-end-of-infinite-context-engineering-reliability-in-the-age-of-agentic-workflows-9531163159b4
            - text: attributed 65% of enterprise AI task failures to context drift or memory loss rather than raw token exhaustion.
          - paragraph [ref=e73]: The concrete trigger for compaction is the context-window ceiling. Most frontier models in 2025–2026 offer 200K tokens (Claude Sonnet/Opus) or up to 1M (Gemini 2.0). Anthropic's Claude Code auto-compact fires at approximately 98% of the effective window (total context minus reserved output tokens). At 200K tokens this is a hard wall that most multi-hour coding sessions hit.
          - separator [ref=e74]
          - heading "Techniques Landscape" [level=2] [ref=e75]
          - heading "Summarization-Based Compaction" [level=3] [ref=e76]
          - paragraph [ref=e77]:
            - strong [ref=e78]: How it works.
            - text: The simplest form is a
            - strong [ref=e79]: rolling summary
            - text: ": at a threshold, a model call summarizes the prior conversation into a compact narrative, which replaces the raw history. Hierarchical variants apply rolling summaries recursively—summarize turns 1–50, then turns 1–100 including the first summary, and so on. Map-reduce applies this in parallel: chunk the history, independently summarize each chunk (map), then combine the partial summaries into a final condensation (reduce). Google Cloud's"
            - link "Gemini long-document summarization workflow" [ref=e80] [cursor=pointer]:
              - /url: https://cloud.google.com/blog/products/ai-machine-learning/long-document-summarization-with-workflows-and-gemini-models
            - text: implements map-reduce for production document pipelines.
          - paragraph [ref=e81]:
            - strong [ref=e82]: Strengths.
            - text: Summarization is provider-agnostic, easy to implement, and produces human-readable state that can be inspected and debugged. It is the primary mechanism behind Anthropic's
            - code [ref=e83]: compact_20260112
            - text: API and Claude Code's
            - code [ref=e84]: /compact
            - text: command.
          - paragraph [ref=e85]:
            - strong [ref=e86]: Weaknesses.
            - text: Information loss is irreversible. Crucially, Factory.ai's
            - link "benchmark of 36 611 production messages" [ref=e87] [cursor=pointer]:
              - /url: https://factory.ai/news/evaluating-compression
            - text: found that all three tested summarization approaches—Factory's own, Anthropic's, and OpenAI's—scored only 2.19–2.45 out of 5.0 on
            - strong [ref=e88]: artifact tracking
            - text: (which files were modified). Freeform summaries silently discard precise technical details. The ACON paper (
            - link "arxiv:2510.00615" [ref=e89] [cursor=pointer]:
              - /url: https://arxiv.org/abs/2510.00615
            - text: ") confirms this: naive summarization baselines (\"FIFO,\" generic prompting) showed severe accuracy degradation on multi-step tasks, while ACON's optimized guidelines were needed to recover comparable task performance."
          - paragraph [ref=e90]:
            - strong [ref=e91]: Production users.
            - text: Anthropic Claude Code, Google ADK, Microsoft Azure AI Agent Framework, LangChain Deep Agents.
          - separator [ref=e92]
          - heading "Selective Eviction / Token Budgeting" [level=3] [ref=e93]
          - paragraph [ref=e94]:
            - strong [ref=e95]: How it works.
            - text: Rather than summarizing, selective eviction identifies which tokens or message blocks to drop entirely. LRU (least-recently-used) eviction drops the oldest tool results first. Importance-scoring variants—common in
            - strong [ref=e96]: KV cache compression
            - text: research—rank tokens by their cumulative attention weight (the "heavy hitter" heuristic), L₂ norm of key vectors, or entropy of attention distributions, then retain only the top-K. The
            - link "NACL paper (ACL 2024)" [ref=e97] [cursor=pointer]:
              - /url: https://aclanthology.org/2024.acl-long.428.pdf
            - text: combines random eviction with proxy-token attention estimates;
            - link "Ada-KV" [ref=e98] [cursor=pointer]:
              - /url: https://arxiv.org/abs/2407.11550
            - text: allocates the KV budget adaptively per attention head.
          - paragraph [ref=e99]:
            - text: "A higher-level application of the same concept appears in agent frameworks: tool results that are duplicates of prior calls (e.g., re-reading the same file twice) are dropped, keeping only the most recent result. The"
            - link "Pi dynamic context pruning" [ref=e100] [cursor=pointer]:
              - /url: https://github.com/complexthings/pi-dynamic-context-pruning
            - text: extension for Claude Code deduplicates identical tool outputs and purges error messages that were subsequently resolved.
          - paragraph [ref=e101]:
            - strong [ref=e102]: Strengths.
            - text: Zero information synthesis cost; no additional model call required for eviction. KV-level eviction operates inside inference, reducing memory footprint without API round trips.
          - paragraph [ref=e103]:
            - strong [ref=e104]: Weaknesses.
            - text: "Positional gaps and broken reference chains after eviction can confuse models. Importance scoring based on attention is circular: a token that was never retrieved because it was irrelevant in prior turns may be highly relevant to a new sub-task. LRU eviction discards old tool outputs that may be critical (e.g., an early-session architecture decision)."
          - paragraph [ref=e105]:
            - strong [ref=e106]: Production users.
            - text: vLLM's automatic prefix caching, SGLang's RadixAttention, Cursor's context window trimming (via third-party extensions).
          - separator [ref=e107]
          - heading "Retrieval-Augmented (Episodic Memory)" [level=3] [ref=e108]
          - paragraph [ref=e109]:
            - strong [ref=e110]: How it works.
            - text: Instead of keeping prior turns in the active context, this approach stores them in an external vector database and retrieves relevant segments on demand. Each conversation turn (or turn-chunk) is embedded and indexed; at each new step, the agent issues a semantic query against the index and injects only the top-K retrieved turns into the prompt. This mirrors how
            - link "LoCoMo's" [ref=e111] [cursor=pointer]:
              - /url: https://arxiv.org/abs/2402.17753
            - text: "evaluation model works: the benchmark tasks agents with answering questions about 300-turn, 35-session conversations that vastly exceed any context window."
          - paragraph [ref=e112]:
            - link "The February 2025 position paper \"Episodic Memory is the Missing Piece for Long-Term LLM Agents\"" [ref=e113] [cursor=pointer]:
              - /url: https://arxiv.org/abs/2502.06975
            - text: argues that the single-shot learning property of episodic memory—recording specific past events with their temporal and spatial context—is precisely what current agents lack, and that RAG-over-turns is the closest practical approximation.
          - paragraph [ref=e114]:
            - strong [ref=e115]: Strengths.
            - text: Near-unlimited history depth. Retrieval only pulls what is actually needed, keeping the active context small and precise. Scales to weeks-long sessions without context growth.
          - paragraph [ref=e116]:
            - strong [ref=e117]: Weaknesses.
            - text: "Retrieval accuracy is a hard prerequisite: a missed retrieval means a silently forgotten fact. As"
            - link "Factory.ai's evaluation notes" [ref=e118] [cursor=pointer]:
              - /url: https://factory.ai/news/evaluating-compression
            - text: ", RAG baselines perform well on factual QA but fail at"
            - strong [ref=e119]: preference inference
            - text: and
            - strong [ref=e120]: causal chains
            - text: —tasks that require implicit reasoning over many dispersed prior turns rather than a single relevant passage. Embedding-based retrieval also adds latency at each agent step and a dependency on a vector store.
          - paragraph [ref=e121]:
            - strong [ref=e122]: Production users.
            - text: Amazon Bedrock AgentCore Memory (Qdrant-backed), Letta's archival memory layer, AWS LangGraph + Redis vector search integrations.
          - separator [ref=e123]
          - 'heading "Hybrid: Keep Edges, Summarize the Middle" [level=3] [ref=e124]'
          - paragraph [ref=e125]:
            - strong [ref=e126]: How it works.
            - text: "The most widely deployed production strategy keeps three regions of context intact: (1) the"
            - strong [ref=e127]: system prompt
            - text: (full, unchanged), (2) the
            - strong [ref=e128]: recent N turns
            - text: (verbatim, for coherence), and (3) a
            - strong [ref=e129]: compact summary
            - text: "that replaces all prior history. Anthropic's server-side API makes this explicit: when compaction fires, it inserts a"
            - code [ref=e130]: compaction
            - text: block containing the summary, then on subsequent requests automatically drops all messages prior to that block while preserving the system prompt and the newly appended turns.
          - paragraph [ref=e131]:
            - link "Claude Code auto-compact" [ref=e132] [cursor=pointer]:
              - /url: https://platform.claude.com/docs/en/build-with-claude/compaction
            - text: follows this hybrid pattern. The default trigger is 150 000 input tokens, and the summary prompt instructs the model to write "anything that would be helpful, including state, next steps, learnings." The
            - code [ref=e133]: "pause_after_compaction: true"
            - text: flag lets integrators inject additional verbatim context (e.g., the 3 most recent tool results) before the session continues.
          - paragraph [ref=e134]:
            - link "Google ADK's compaction" [ref=e135] [cursor=pointer]:
              - /url: https://adk.dev/context/compaction/
            - text: "implements an event-count variant: it fires after"
            - code [ref=e136]: compaction_interval
            - text: completed workflow events, summarizes a sliding window defined by
            - code [ref=e137]: overlap_size
            - text: ", and writes the result back to the session as a new compaction event. Custom summarizer models (Gemini or user-specified) can be plugged in."
          - paragraph [ref=e138]:
            - strong [ref=e139]: Strengths.
            - text: Preserves coherence at the edges (the model always sees the current instruction and recent actions), while controlling growth. Simple to reason about and inspect.
          - paragraph [ref=e140]:
            - strong [ref=e141]: Weaknesses.
            - text: The "middle" summary is a lossy single point of failure. Compaction chains—repeated summarizations over a multi-day session—compound error. Each summary is itself summarized in the next compaction cycle, progressively smoothing out specifics.
          - paragraph [ref=e142]:
            - strong [ref=e143]: Production users.
            - text: Claude Code, Google ADK, Microsoft Azure AI Agent compaction, LangChain Deep Agents autonomous compaction.
          - separator [ref=e144]
          - heading "External Memory Offload" [level=3] [ref=e145]
          - paragraph [ref=e146]:
            - strong [ref=e147]: How it works.
            - text: Rather than compacting conversation history into a summary, the agent continuously writes important facts, decisions, and state into an external memory store—typically structured files, a key-value store, or a knowledge graph—and reads from it explicitly at each step. This is the approach taken by
            - link "MemGPT/Letta" [ref=e148] [cursor=pointer]:
              - /url: https://arxiv.org/abs/2310.08560
            - text: ", which drew inspiration from OS virtual memory: the LLM's context window acts as fast \"main memory,\" while an external store acts as \"disk.\" The agent uses tool calls ("
            - code [ref=e149]: core_memory_replace
            - text: ","
            - code [ref=e150]: archival_memory_insert
            - text: ) to move information in and out of active context.
          - paragraph [ref=e151]:
            - link "Cognee" [ref=e152] [cursor=pointer]:
              - /url: https://github.com/topoteretes/cognee
            - text: "extends this with a knowledge graph layer: ingested information is classified, chunked, entity-extracted (subject–relation–object triplets), and committed to a graph database. A"
            - code [ref=e153]: memify
            - text: pass then prunes stale nodes, strengthens frequently traversed connections, and adds derived facts. Retrieval combines vector similarity (to find entry nodes) with graph traversal (to collect structured context), providing 14 retrieval modes including chain-of-thought graph traversal. Cognee reports processing over one million pipelines per month in production.
          - paragraph [ref=e154]:
            - text: The
            - link "Zylos platform" [ref=e155] [cursor=pointer]:
              - /url: https://zylos.ai
            - text: "uses a markdown-file approach: structured"
            - code [ref=e156]: memory/
            - text: files act as the persistent store, with the agent reading and writing them explicitly. This is simpler to debug and version-control than a vector store, at the cost of requiring the agent to self-organize the taxonomy.
          - paragraph [ref=e157]:
            - strong [ref=e158]: Strengths.
            - text: No compaction chains—facts persist with full fidelity as long as the external store is intact. Supports cross-session continuity natively. Memory can be versioned, audited, and shared across agent instances.
          - paragraph [ref=e159]:
            - strong [ref=e160]: Weaknesses.
            - text: Requires the agent to proactively decide what to write to external memory. Missed writes mean silently lost context. Write latency adds overhead at each significant step. The Letta V1 agent
            - link "blog post" [ref=e161] [cursor=pointer]:
              - /url: https://www.letta.com/blog/letta-v1-agent
            - text: documents how the MemGPT heartbeat/
            - code [ref=e162]: request_heartbeat
            - text: control-flow mechanism was necessary to ensure tool chains kept running long enough for writes to happen—a complexity that has partially been absorbed by frontier models' native agentic training.
          - paragraph [ref=e163]:
            - strong [ref=e164]: Production users.
            - text: Letta (MemGPT architecture), Cognee, Zylos, Mem0 (used by AutoGPT, Cursor community extensions).
          - separator [ref=e165]
          - heading "Structural Techniques" [level=3] [ref=e166]
          - paragraph [ref=e167]:
            - strong [ref=e168]: How it works.
            - text: "These techniques reduce token count through engineering discipline rather than model calls. Key approaches:"
          - list [ref=e169]:
            - listitem [ref=e170]:
              - strong [ref=e171]: "Tool result deduplication:"
              - text: If the same file is read N times, only the most recent read is kept in context. Older identical outputs are replaced with a
              - code [ref=e172]: "[deduplicated: <timestamp>]"
              - text: marker. The Pi dynamic context pruning extension automates this for Claude Code.
            - listitem [ref=e173]:
              - strong [ref=e174]: "Canonicalization:"
              - text: Tool outputs are normalized to a standard format before being inserted (e.g., JSON → compact-JSON, verbose error stacktraces truncated to the first 20 lines + last 5 lines) to reduce token waste from verbose API responses.
            - listitem [ref=e175]:
              - strong [ref=e176]: "Error purging:"
              - text: Once an error is resolved (subsequent tool call succeeds), prior error messages are removed from context. This can be implemented deterministically without a model call.
            - listitem [ref=e177]:
              - strong [ref=e178]: "Extractive token compression (LLMLingua):"
              - link "Microsoft's LLMLingua-2" [ref=e179] [cursor=pointer]:
                - /url: https://arxiv.org/abs/2403.12968
              - text: frames compression as a binary token classification task—keep or drop each token—using a fine-tuned BERT-sized encoder trained via GPT-4 distillation. It achieves up to 20× compression with minimal accuracy loss, and is 3–6× faster than generative summarization, with end-to-end latency improvements of 1.6–2.9×. ACON's ablations confirm LLMLingua as a strong extractive baseline but one that underperforms optimized generative summarization on multi-step agentic tasks.
          - paragraph [ref=e180]:
            - strong [ref=e181]: Strengths.
            - text: Zero or near-zero model cost; no additional LLM call required. Predictable, deterministic behavior that is easy to test and debug.
          - paragraph [ref=e182]:
            - strong [ref=e183]: Weaknesses.
            - text: Cannot synthesize across information—only retain or discard existing tokens. LLMLingua-style extractive compression can corrupt syntax in code or structured data if not handled carefully.
          - separator [ref=e184]
          - heading "Learned Compaction" [level=3] [ref=e185]
          - paragraph [ref=e186]:
            - strong [ref=e187]: How it works.
            - text: The most ambitious approach trains a dedicated compression model rather than prompting an LLM to summarize.
            - link "ACON's distillation pathway" [ref=e188] [cursor=pointer]:
              - /url: https://arxiv.org/abs/2510.00615
            - text: shows that a GPT-4.1-optimized compression guideline can be distilled into a Qwen3-8B or Phi-4 compressor that retains 95%+ of the teacher's performance at a fraction of the cost and latency. CCF (Context Compression Framework,
            - link "arxiv:2509.09199" [ref=e189] [cursor=pointer]:
              - /url: https://arxiv.org/html/2509.09199v1
            - text: ) trains lightweight encoders to produce condensed continuous representations from long sequences. Separate work has co-trained a summarizer and a generator to learn a shared compression scheme, staying close to full-context next-token prediction while using an order of magnitude fewer tokens.
          - paragraph [ref=e190]:
            - strong [ref=e191]: Strengths.
            - text: Lower runtime cost and latency than invoking a frontier model for every compaction event. The compressor can be specialized for a domain (code, legal, medical) and trained to preserve task-relevant structure.
          - paragraph [ref=e192]:
            - strong [ref=e193]: Weaknesses.
            - text: Requires curated training data and periodic retraining as the host model changes. A mismatched compressor can produce summaries the downstream model cannot interpret correctly. Not yet widely deployed outside research.
          - separator [ref=e194]
          - heading "Technique Comparison" [level=2] [ref=e195]
