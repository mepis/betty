          - heading "FAQ" [level=2] [ref=e493]
          - paragraph [ref=e494]:
            - strong [ref=e495]: Q. How much GPU VRAM is required?
          - paragraph [ref=e496]: Most models are 0.5B–1.7B, so roughly 4–8GB VRAM is sufficient to run them in fp16/bf16. Chatterbox Turbo (350M) is the lightest and runs comfortably on a 4GB GPU. Qwen3-TTS 1.7B in bf16 typically needs 8–12GB.
          - paragraph [ref=e497]:
            - strong [ref=e498]: Q. Can these run on CPU only?
          - paragraph [ref=e499]: Technically yes, but not at a practical speed. Real-time generation (generating in equal or less time than it takes to read the text aloud) generally requires a GPU. CPU is fine for quality evaluation and experimentation.
          - paragraph [ref=e500]:
            - strong [ref=e501]: Q. Which model has the best Japanese quality?
          - paragraph [ref=e502]: Within the scope of this comparison, it comes down to Qwen3-TTS (official Japanese support) and Fish Speech S2 Pro (80-language coverage). That said, Japanese quality evaluation is highly dependent on the reference audio and input text — trying both on your actual use case will give you the most accurate answer.
          - paragraph [ref=e503]:
            - strong [ref=e504]: Q. What's the ideal reference audio length?
          - paragraph [ref=e505]: It varies by model, but 3–10 seconds is the practical range. Too short and speaker characteristics are insufficient; too long yields diminishing returns. Clarity of the recording (no background noise, clean speech) matters more than length.
          - paragraph [ref=e506]:
            - strong [ref=e507]: Q. How do I use Qwen3-TTS VoiceDesign mode?
          - paragraph [ref=e508]:
            - text: Use a
            - code [ref=e509]: CustomVoice
            - text: or
            - code [ref=e510]: VoiceDesign
            - text: mode model and pass a natural-language voice description to the
            - code [ref=e511]: text
            - text: "field — for example:"
            - code [ref=e512]: "\"A calm, middle-aged male voice with a slight husky tone.\""
            - text: This does not work with Clone mode models (the
            - code [ref=e513]: "*-Base"
            - text: variants).
          - paragraph [ref=e514]:
            - strong [ref=e515]: Q. Where can I verify the Fish Speech commercial license?
          - paragraph [ref=e516]:
            - text: Check the
            - code [ref=e517]: LICENSE
            - text: file directly on each model's Hugging Face card (e.g.,
            - code [ref=e518]: fishaudio/fish-speech-1.5
            - text: ). CC-BY-NC-SA-4.0 (non-commercial) and Fish Audio Research License (commercially permissive with conditions) coexist across versions. The "version = license" relationship can change over time, so always refer to the latest license file on Hugging Face.
          - separator [ref=e519]
          - heading "Summary" [level=2] [ref=e520]
          - paragraph [ref=e521]:
            - text: Open-source TTS reached a sufficient quality bar in 2026 to serve as a genuine alternative to cloud APIs. However, there are significant differences across models on three axes — quality, license, and features — so
            - strong [ref=e522]: clarifying your use case and license requirements before selecting a model is essential
            - text: .
          - paragraph [ref=e523]: In particular, Fish Speech and IndexTTS2 have licensing pitfalls that require careful reading before any commercial adoption. If you want high quality with a clean license, starting with Qwen3-TTS (Apache-2.0) or CosyVoice 3.0 (Apache-2.0) is the safest choice at this point in time.
