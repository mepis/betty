lt-in providers. Settings - global and project settings. Keybindings - default shortcuts and custom keybindings. Sessions - session management, branching, and tree navigation. Compaction - context compaction and branch summarization. Extensions - TypeScript modules for tools, commands, events, and custom UI. Skills - Agent Skills for reusable on-demand capabilities.\", \"publishedDate\": null, \"thumbnail\": \"https://imgs.search.brave.com/PkwwhCoYCJp5K1mNHDdvOnzY3UGNCpCvRNWP4VA0Jx4/rs:fit:200:200:1:0/g:ce/aHR0cHM6Ly9vcGVu/Z3JhcGguZ2l0aHVi/YXNzZXRzLmNvbS8w/ZjhmNDcyOWE1N2Jj/M2IwZTlhZDM0N2Rj/YTc3NWQ2MWI5NzQw/NmE0ZjI4NjBiNTNh/M2EwZDVlNmVlMjRm/NDJmL2VhcmVuZGls/LXdvcmtzL3Bp\", \"engine\": \"brave\", \"parsed_url\": [\"https\", \"github.com\", \"/earendil-works/pi/blob/main/packages/coding-agent/docs/index.md\", \"\", \"\", \"\"], \"img_src\": \"\", \"priority\": \"\", \"engines\": [\"brave\"], \"positions\": [8], \"score\": 0.125, \"category\": \"general\"}, {\"template\": \"default.html\", \"url\": \"https://github.com/badlogic/pi-mono/blob/main/packages/coding-agent/docs/extensions.md\", \"title\": \"pi/packages/coding-agent/docs/extensions.md at main \\u00b7 earendil-works/pi\", \"content\": \"This lets you inspect what Pi has loaded \\u2014 custom prompts, guidelines, tool snippets, context files, skills \\u2014 without re-discovering resources or re-parsing flags. Use it when your extension needs to make deep, informed changes to the system prompt while respecting user-provided configuration. Inside before_agent_start, event.systemPrompt and ctx.getSystemPrompt() both reflect the chained system prompt as of the current handler.\", \"publishedDate\": null, \"thumbnail\": \"https://imgs.search.brave.com/GaFrVqLi1YKDXBagp_0ElbcAcqV2dn0qOzsSOdbh4LI/rs:fit:200:200:1:0/g:ce/aHR0cHM6Ly9vcGVu/Z3JhcGguZ2l0aHVi/YXNzZXRzLmNvbS9m/MTMzYzllYTcwMjRj/MWQ0YmJjMmQzYmJi/NmQ0YWRjYjQ1YzY5/ZjY2OWU1YWY0YjJj/ZGJmMWE1YmJiOTk0/MGI5L2VhcmVuZGls/LXdvcmtzL3Bp\", \"engine\": \"brave\", \"parsed_