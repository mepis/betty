ngle AgentSession. createAgentSession() uses a ResourceLoader to supply extensions, skills, prompt templates, themes, and context files. If you do not provide one, it uses DefaultResourceLoader with standard discovery. import { createAgentSession, SessionManager } from \\\"@earendil-works/pi-coding-agent\\\"; // Minimal: defaults with DefaultResourceLoader const { session } = await createAgentSession(); // Custom: override specific options const { session } = await createAgentSession({ model: myModel, tools: [\\\"read\\\", \\\"bash\\\"], sessionManager: SessionManager.inMemory(), });\", \"publishedDate\": null, \"thumbnail\": \"https://imgs.search.brave.com/oS006nUhbxuR2OnjGUkpks9BmIzf6G82jBhhs38TWPA/rs:fit:200:200:1:0/g:ce/aHR0cHM6Ly9vcGVu/Z3JhcGguZ2l0aHVi/YXNzZXRzLmNvbS83/MWIzMDk1OTQxZjAx/ZGM5MTA2ZWFlYWZl/ZDZlYTFjZGNjNzU2/Y2NhYWQ1OTY2MzVi/NGVlMWMzNDkxODE5/M2UzL2VhcmVuZGls/LXdvcmtzL3Bp\", \"engine\": \"brave\", \"parsed_url\": [\"https\", \"github.com\", \"/badlogic/pi-mono/blob/main/packages/coding-agent/docs/sdk.md\", \"\", \"\", \"\"], \"img_src\": \"\", \"priority\": \"\", \"engines\": [\"brave\"], \"positions\": [5], \"score\": 0.2, \"category\": \"general\"}, {\"template\": \"default.html\", \"url\": \"https://github.com/badlogic/pi-mono/tree/main/packages/coding-agent\", \"title\": \"pi/packages/coding-agent at main \\u00b7 earendil-works/pi\", \"content\": \"AI agent toolkit: coding agent CLI, unified LLM API, TUI & web UI libraries, Slack bot, vLLM pods - earendil-works/pi\", \"publishedDate\": null, \"thumbnail\": \"https://imgs.search.brave.com/mj5J-vSLoYPAwnVBftK0wzJ6QbC9nRss7J9cbZJbmtk/rs:fit:200:200:1:0/g:ce/aHR0cHM6Ly9vcGVu/Z3JhcGguZ2l0aHVi/YXNzZXRzLmNvbS84/ODJjNjdiM2QyODky/NTE4YjhhNWIwYzVj/MmE2OGQyYmFmMzZm/NmIwZWM1YWIyNTU3/MTViYjE0MmU0OTli/ZDg1L2VhcmVuZGls/LXdvcmtzL3Bp\", \"engine\": \"brave\", \"parsed_url\": [\"https\", \"github.com\", \"/badlogic/pi-mono/tree/main/packages/coding-agent\", \"\", \"\", \"\"], \"img_src\": \"\", \"priority\": \"\", 