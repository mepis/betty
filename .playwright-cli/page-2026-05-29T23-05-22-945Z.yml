            - paragraph [ref=e117]:
              - strong [ref=e118]: "Request lifecycle (write):"
            - list [ref=e119]:
              - listitem [ref=e120]:
                - text: Client sends
                - code [ref=e121]: upsert_points
                - text: to the load balancer.
              - listitem [ref=e122]: Load balancer forwards to any node (all nodes can accept writes).
              - listitem [ref=e123]:
                - text: Node identifies the target shard (
                - code [ref=e124]: hash(point_id) % num_shards
                - text: ).
              - listitem [ref=e125]: If this node is the Raft leader for that shard, it writes to the local WAL (write‑ahead log) and replicates to followers.
              - listitem [ref=e126]:
                - text: Once
                - code [ref=e127]: write_consistency_factor
                - text: replicas acknowledge, the node returns success.
              - listitem [ref=e128]: Background segment merging and index building happen asynchronously.
            - paragraph [ref=e129]:
              - strong [ref=e130]: "Request lifecycle (search):"
            - list [ref=e131]:
              - listitem [ref=e132]:
                - text: Client sends
                - code [ref=e133]: search_points
                - text: to the load balancer.
              - listitem [ref=e134]: Load balancer forwards to any node.
              - listitem [ref=e135]: Node fans out the query to all shards that contain the target collection.
              - listitem [ref=e136]: Each shard performs a local HNSW search on its segments and returns top‑K results.
              - listitem [ref=e137]: Node merges all shard results using a heap and returns the final top‑K.
            - paragraph [ref=e138]:
              - strong [ref=e139]: "Latency breakdown:"
              - text: In our tests, a 10‑node cluster (3 replicas, 4 shards/node) achieved P50 write latency of 2 ms and P95 of 8 ms for single‑vector upserts. Search latency for 10M vectors was P50 12 ms, P95 35 ms.
            - heading "Options Compared" [level=2] [ref=e140]
            - paragraph [ref=e141]: Three common architectural patterns emerge when deploying Qdrant at scale. Each targets different operational constraints.
            - 'heading "Option A: Single‑Node (Dev / Low Volume)" [level=3] [ref=e142]'
            - list [ref=e143]:
