            - paragraph [ref=e84]:
              - text: The architectural decision that causes the most production incidents in
              - link "Qdrant" [ref=e85] [cursor=pointer]:
                - /url: /vs/qdrant-vs-airflow/
              - text: is choosing the wrong shard-to-node ratio combined with a replication factor that ignores the cluster's failure domain.
            - paragraph [ref=e86]: This guide is intended for senior engineers and solutions architects designing a production AI system. We tested Qdrant v1.12.6 on AWS EC2 c5d.4xlarge instances (16 vCPU, 32 GB RAM, NVMe SSDs) in us-east-1 with a 10‑collection workload of 10M 768‑dim vectors each. You should know the basics of vector search, Raft consensus, and horizontal scaling.
            - blockquote [ref=e87]:
              - paragraph [ref=e88]:
                - strong [ref=e89]: "Quick Answer:"
                - text: Qdrant is a vector similarity search engine that uses a sharded collection model with a custom HNSW index and Raft‑based replication. The recommended production topology is a multi‑node cluster with 4–8 shards per node and replication factor 3, backed by NVMe SSDs and at least 24 GB RAM per instance. The primary tradeoff is between query consistency during leader elections and write throughput – tune
                - code [ref=e90]: write_consistency_factor
                - text: and
                - code [ref=e91]: replication_factor
                - text: per workload.
            - paragraph [ref=e92]:
              - strong [ref=e93]: Key Takeaways
            - list [ref=e94]:
              - listitem [ref=e95]:
                - strong [ref=e96]: Shard each collection to 2× the number of nodes
                - text: – this lets you rebalance after scaling without full reindexing.
              - listitem [ref=e97]:
                - strong [ref=e98]: Set replication factor 3
                - text: – survive two concurrent node failures without data loss (tested in our AWS experiments).
              - listitem [ref=e99]:
                - strong [ref=e100]:
                  - text: Use
                  - code [ref=e101]: optimizer=1
                  - text: for write‑heavy workloads
                - text: – background segment merging consumes CPU; pin it to a separate vCPU set.
              - listitem [ref=e102]:
                - strong [ref=e103]:
                  - text: Monitor
                  - code [ref=e104]: raft_state
                  - text: and
                  - code [ref=e105]: segment_count
                - text: – a rising segment count signals merge pressure and degrades P95 query latency.
              - listitem [ref=e106]:
                - strong [ref=e107]: Over‑provision memory for the HNSW graph
                - text: – a 768‑dim collection of 10M vectors needs ~6 GB for the index alone; budget 2× that for working set.
            - heading "The Problem" [level=2] [ref=e108]
            - paragraph [ref=e109]: Designing a production Qdrant deployment requires balancing latency, throughput, consistency, and cost. Every cluster will face a node failure, network partition, or segment growth spike. Without a deliberate sharding and replication strategy, a startup with 100M vectors can suffer P95 query latency of 500 ms and data loss on a single node reboot.
            - paragraph [ref=e110]:
              - text: "The core tension:"
              - strong [ref=e111]: you cannot maximize both write throughput and query consistency in a single cluster configuration.
              - text: Writes require quorum agreement across replicas; reads benefit from local segment copies. Your architecture must pick a tradeoff point and instrument it.
            - heading "System Overview" [level=3] [ref=e112]
            - paragraph [ref=e113]: Below is the logical architecture of a production Qdrant cluster. All components communicate via gRPC; internal consensus uses a built‑in Raft implementation.
