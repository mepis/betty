                - strong [ref=e145]: "Setup:"
                - text: One server, no replication, memory‑mapped storage.
              - listitem [ref=e146]:
                - strong [ref=e147]: "Max throughput:"
                - text: ~1K queries/sec, ~500 upserts/sec for 10M vectors.
              - listitem [ref=e148]:
                - strong [ref=e149]: "Data durability:"
                - text: None – loss of the single instance loses all data.
              - listitem [ref=e150]:
                - strong [ref=e151]: "Cost:"
                - text: Low ($100–300/month on AWS c5d.2xlarge).
            - 'heading "Option B: Multi‑Node Cluster (Production Standard)" [level=3] [ref=e152]'
            - list [ref=e153]:
              - listitem [ref=e154]:
                - strong [ref=e155]: "Setup:"
                - text: 4–16 nodes, each with 2–8 shards, replication factor 3.
              - listitem [ref=e156]:
                - strong [ref=e157]: "Max throughput:"
                - text: ~10K queries/sec, ~5K upserts/sec (with fast NVMe).
              - listitem [ref=e158]:
                - strong [ref=e159]: "Data durability:"
                - text: Survives up to 2 node failures per replication group.
              - listitem [ref=e160]:
                - strong [ref=e161]: "Cost:"
