            - heading "Storage Engine (Rust)" [level=4] [ref=e202]
            - paragraph [ref=e203]: Qdrant stores points in immutable segments, each containing a vector index (HNSW) and payload index (BTrees). Writes go first to a write‑ahead log (WAL) for crash recovery, then are merged into new segments asynchronously.
