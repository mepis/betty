            - heading "Latency Budget by Component" [level=3] [ref=e300]
            - paragraph [ref=e301]: The chart below shows the typical contribution of each component to end‑to‑end query latency in a multi‑node cluster (measured from client start to result return). Routing overhead includes gRPC serialization and load balancer hop.
