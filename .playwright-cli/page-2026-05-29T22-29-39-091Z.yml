                - separator [ref=e1070]
                - generic [ref=e1071]:
                  - heading "Technical Challenges" [level=3] [ref=e1072]
                  - 'link "Permalink: Technical Challenges" [ref=e1073] [cursor=pointer]':
                    - /url: "#technical-challenges"
                    - img [ref=e1074]
                - paragraph [ref=e1076]:
                  - strong [ref=e1077]: "Scope:"
                  - text: We identify nine open research problems where current harness infrastructure provides partial solutions but no production-grade, generalizable frameworks. Each challenge represents a gap between what academic prototypes demonstrate and what deployed systems require.
                - paragraph [ref=e1078]:
                  - strong [ref=e1079]: "Evaluation criteria:"
                  - text: "For each challenge, we assess: (1)"
                  - strong [ref=e1080]: Academic coverage
                  - text: — peer-reviewed solutions, if any; (2)
                  - strong [ref=e1081]: Production maturity
                  - text: — whether any deployed system has solved it at scale; (3)
                  - strong [ref=e1082]: Blocking severity
                  - text: — whether the unsolved problem prevents deployment or merely limits performance.
                - paragraph [ref=e1083]:
                  - strong [ref=e1084]: "Cross-cutting theme:"
                  - text: Most challenges stem from the
                  - strong [ref=e1085]: composition problem
                  - text: — individual components (security sandboxes, memory stores, evaluation metrics) work in isolation, but combining them into a coherent harness surfaces emergent failures. Formal verification, portability testing, and protocol interoperability all require compositional reasoning that current research has not addressed.
                - generic [ref=e1086]:
                  - heading "Security & Sandboxing" [level=4] [ref=e1087]
                  - 'link "Permalink: Security & Sandboxing" [ref=e1088] [cursor=pointer]':
                    - /url: "#security--sandboxing"
                    - img [ref=e1089]
                - paragraph [ref=e1091]:
                  - strong [ref=e1092]: "Challenge:"
                  - text: Agent sandboxes must prevent malicious tool use while permitting legitimate system access — a harder problem than traditional application sandboxing because agents
                  - strong [ref=e1093]: intentionally
                  - text: interact with sensitive resources (file systems, network APIs, shell commands).
                - paragraph [ref=e1094]:
                  - strong [ref=e1095]: "State of the art:"
                  - text: SandboxEscapeBench shows frontier models can escape containers; PRISM demonstrates zero-fork defense-in-depth is possible but requires OS-level instrumentation. No generalizable sandbox exists that works across all agent use cases without manual per-task configuration.
                - paragraph [ref=e1096]:
                  - strong [ref=e1097]: "Open problems:"
                  - text: Compositional security properties (proving agent + harness + environment satisfy a safety specification) remain unsolved. Current defenses are reactive (detecting escapes) rather than preventive (proving impossibility of escape).
                - blockquote [ref=e1098]:
                  - paragraph [ref=e1099]:
                    - strong [ref=e1100]: "Key numbers:"
                    - text: SandboxEscapeBench — frontier LLMs achieve
                    - strong [ref=e1101]: 15–35% container escape rates
                    - text: ; PRISM — 10-hook zero-fork runtime reduces escape to near-zero with <5ms overhead.
                - list [ref=e1102]:
                  - listitem [ref=e1103]:
                    - text: "SandboxEscapeBench†:"
                    - strong [ref=e1104]: "\"Quantifying Frontier LLM Capabilities for Container Sandbox Escape\""
                    - text: .
                    - emphasis [ref=e1105]: Marchand et al.
                    - text: arXiv 2026. [
                    - link "Paper" [ref=e1106] [cursor=pointer]:
                      - /url: https://arxiv.org/abs/2603.02277
                    - text: "]"
