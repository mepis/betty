                - paragraph [ref=e515]:
                  - strong [ref=e516]: "Conceptual contribution:"
                  - text: We formalize the agent harness as an architectural object with six governable components (E, T, C, S, L, V), elevating it from implicit infrastructure to an explicit research target.
                - paragraph [ref=e517]:
                  - strong [ref=e518]: "Empirical scope:"
                  - text: We systematically review 110+ papers spanning academic research (evaluation benchmarks, security frameworks, memory architectures) and production deployments (Stripe, OpenAI, Cursor, METR), establishing that harness design is a binding constraint on deployed agent reliability.
                - paragraph [ref=e519]:
                  - strong [ref=e520]: "Methodological advance:"
                  - text: We introduce the
                  - strong [ref=e521]: Harness Completeness Matrix
                  - text: — a structured assessment framework mapping which of the six components each system implements — enabling direct comparison across heterogeneous agent systems that prior surveys could not evaluate on common terms.
                - paragraph [ref=e522]:
                  - strong [ref=e523]: "Open challenges identified:"
                  - text: "We document nine technical challenges where current research provides partial solutions but no production-grade infrastructure: formal security models, cross-harness portability, protocol interoperability (MCP/A2A), context economics at 1M+ tokens/task, Byzantine fault tolerance in multi-agent systems, and compositional verification."
                - paragraph [ref=e524]:
                  - strong [ref=e525]: "Practitioner-academic bridge:"
                  - text: Unlike prior surveys focused exclusively on model capabilities or isolated components (memory, planning, tool use), we synthesize peer-reviewed research with production deployment reports to show where theory meets practice — and where critical gaps remain.
                - paragraph [ref=e526]:
                  - strong [ref=e527]: "Intended audience:"
                  - text: Researchers designing agent infrastructure, practitioners building production systems, and evaluators seeking to understand why benchmark performance often fails to predict deployment outcomes.
