                    - img [ref=e888]
                - paragraph [ref=e890]:
                  - strong [ref=e891]: "What we classify:"
                  - text: We categorize agent systems by
                  - strong [ref=e892]: harness completeness
                  - text: — which of the six components (E, T, C, S, L, V) each system implements — distinguishing full-stack harnesses (all six components) from specialized frameworks (partial implementations).
                - paragraph [ref=e893]:
                  - strong [ref=e894]: "Why it matters:"
                  - text: Prior taxonomies classified agents by application domain (coding, web navigation, embodied AI) or model architecture (single-agent, multi-agent). These categorizations cannot explain why systems with similar models achieve different reliability outcomes. Our harness-centric taxonomy reveals that production-grade systems converge on full ETCSLV implementations, while research prototypes often implement only 2-3 components.
                - paragraph [ref=e895]:
                  - strong [ref=e896]: "Key finding:"
                  - text: No agent framework can achieve production reliability without implementing
                  - strong [ref=e897]: all six governance components
                  - text: . Systems missing L-component (lifecycle hooks) cannot enforce safety policies. Systems missing V-component (evaluation interfaces) cannot debug failures. Systems missing S-component (state persistence) cannot recover from crashes.
