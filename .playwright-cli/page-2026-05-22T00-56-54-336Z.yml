                    - img [ref=e692]
                - paragraph [ref=e694]: We treat npm dependency changes as reviewed code changes.
                - list [ref=e695]:
                  - listitem [ref=e696]: Direct external dependencies are pinned to exact versions. Internal workspace packages remain version-ranged.
                  - listitem [ref=e697]:
                    - code [ref=e698]: .npmrc
                    - text: sets
                    - code [ref=e699]: save-exact=true
                    - text: and
                    - code [ref=e700]: min-release-age=2
                    - text: to avoid same-day dependency releases during npm resolution.
                  - listitem [ref=e701]:
                    - code [ref=e702]: package-lock.json
                    - text: is the dependency ground truth. Pre-commit blocks accidental lockfile commits unless
                    - code [ref=e703]: PI_ALLOW_LOCKFILE_CHANGE=1
                    - text: is set.
                  - listitem [ref=e704]:
                    - code [ref=e705]: npm run check
                    - text: verifies pinned direct deps, native TypeScript import compatibility, and the generated coding-agent shrinkwrap.
                  - listitem [ref=e706]:
                    - text: The published CLI package includes
                    - code [ref=e707]: packages/coding-agent/npm-shrinkwrap.json
                    - text: ", generated from the root lockfile, to pin transitive deps for npm users."
                  - listitem [ref=e708]:
                    - text: Release smoke tests use
                    - code [ref=e709]: npm run release:local
                    - text: to build, pack, and create isolated npm and Bun installs outside the repo before publishing.
                  - listitem [ref=e710]:
                    - text: Local release installs, documented npm installs, and
                    - code [ref=e711]: pi update --self
                    - text: use
                    - code [ref=e712]: "--ignore-scripts"
                    - text: where supported.
                  - listitem [ref=e713]:
                    - text: CI installs with
                    - code [ref=e714]: npm ci --ignore-scripts
                    - text: ", and a scheduled GitHub workflow runs"
                    - code [ref=e715]: npm audit --omit=dev
                    - text: plus
                    - code [ref=e716]: npm audit signatures --omit=dev
                    - text: .
                  - listitem [ref=e717]: Shrinkwrap generation has an explicit allowlist for dependency lifecycle scripts; new lifecycle-script deps fail checks until reviewed.
