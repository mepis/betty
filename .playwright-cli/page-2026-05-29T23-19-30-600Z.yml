                            - generic [ref=e1400]:
                              - heading "4 Memory Operation Mechanism" [level=2] [ref=e1401]:
                                - generic [ref=e1402]: "4"
                                - text: Memory Operation Mechanism
                              - generic [ref=e1403]:
                                - heading "4.1 Memory Operations in the Single-Agent System" [level=3] [ref=e1404]:
                                  - generic [ref=e1405]: "4.1"
                                  - text: Memory Operations in the Single-Agent System
                                - paragraph [ref=e1407]: In a single-agent system, memory operation mechanisms define how a foundation agent actively constructs, updates, controls, and utilizes memory throughout long-horizon interaction and task execution. Rather than treating memory as a static repository, modern agents manipulate memory through a sequence of operations, including indexing, retrieval, updating, compression, summarization, forgetting, and pruning. These operations collectively regulate how past experience is incorporated into ongoing reasoning and future decision-making, forming the operational backbone of single-agent memory systems.
                                - generic [ref=e1408]:
                                  - heading "4.1.1 Storage and Index" [level=4] [ref=e1409]:
                                    - generic [ref=e1410]: 4.1.1
                                    - text: Storage and Index
                                  - paragraph [ref=e1412]:
                                    - text: As an agent’s memory grows over time, how information is stored and organized becomes essential for ensuring that relevant information can be efficiently and reliably retrieved when needed. In single-agent systems, memory is typically indexed at write time by associating each entry with semantic embeddings and auxiliary metadata such as timestamps, task identifiers, entities, or tool usage
                                    - generic [ref=e1413]:
                                      - text: (Lewis et al.,
                                      - link "2020" [ref=e1414] [cursor=pointer]:
                                        - /url: https://arxiv.org/html/2602.06052v3#bib.bib183
                                      - text: ; Zhang et al.,
                                      - link "2023b" [ref=e1415] [cursor=pointer]:
                                        - /url: https://arxiv.org/html/2602.06052v3#bib.bib184
                                      - text: ; Rezazadeh et al.,
                                      - link "2025b" [ref=e1416] [cursor=pointer]:
                                        - /url: https://arxiv.org/html/2602.06052v3#bib.bib106
                                      - text: )
                                    - text: . Vector-based storage remains the dominant paradigm in non-parametric agent memory, enabling efficient approximate nearest-neighbor search over episodic or semantic memory in retrieval-augmented agents
                                    - generic [ref=e1417]:
                                      - text: (Guu et al.,
                                      - link "2020" [ref=e1418] [cursor=pointer]:
                                        - /url: https://arxiv.org/html/2602.06052v3#bib.bib206
                                      - text: ; Quinn et al.,
                                      - link "2025" [ref=e1419] [cursor=pointer]:
                                        - /url: https://arxiv.org/html/2602.06052v3#bib.bib197
                                      - text: )
                                    - text: . Beyond flat vector indices, agents increasingly adopt structured storage formats, including relational tables, graph-based memory, and hierarchical tree representations, which enable relational queries, multi-level abstraction, and schema-aware access aligned with task structure
                                    - generic [ref=e1420]:
                                      - text: (Anokhin et al.,
                                      - link "2024" [ref=e1421] [cursor=pointer]:
                                        - /url: https://arxiv.org/html/2602.06052v3#bib.bib207
                                      - text: ; Sarthi et al.,
                                      - link "2024" [ref=e1422] [cursor=pointer]:
                                        - /url: https://arxiv.org/html/2602.06052v3#bib.bib208
                                      - text: ; Rezazadeh et al.,
                                      - link "2025b" [ref=e1423] [cursor=pointer]:
                                        - /url: https://arxiv.org/html/2602.06052v3#bib.bib106
                                      - text: )
                                    - text: . In parallel, some systems maintain text-record memories that store explicit, human-readable summaries and chronological logs, relying on keyword matching or lightweight string-based retrieval to prioritize transparency and controllability
                                    - generic [ref=e1424]:
                                      - text: (Park et al.,
                                      - link "2023" [ref=e1425] [cursor=pointer]:
                                        - /url: https://arxiv.org/html/2602.06052v3#bib.bib60
                                      - text: ; Zhang et al.,
                                      - link "2025m" [ref=e1426] [cursor=pointer]:
                                        - /url: https://arxiv.org/html/2602.06052v3#bib.bib209
                                      - text: )
                                    - text: ". Finally, storage is not limited to external memory modules: parametric memory embedded in model weights, transient working memory in the context window, and inference-time internal states such as KV caches collectively serve as implicit storage substrates that influence retrieval behavior and reasoning dynamics"
                                    - generic [ref=e1427]:
                                      - text: (Mallen et al.,
                                      - link "2023" [ref=e1428] [cursor=pointer]:
                                        - /url: https://arxiv.org/html/2602.06052v3#bib.bib185
                                      - text: ; Kwon et al.,
                                      - link "2023" [ref=e1429] [cursor=pointer]:
                                        - /url: https://arxiv.org/html/2602.06052v3#bib.bib74
                                      - text: ; Pope et al.,
                                      - link "2023" [ref=e1430] [cursor=pointer]:
                                        - /url: https://arxiv.org/html/2602.06052v3#bib.bib232
                                      - text: )
                                    - text: . As memory scales across longer horizons, the choice of storage format and indexing strategy directly affects retrieval precision, computational overhead, and downstream reasoning reliability.
                                - generic [ref=e1431]:
                                  - heading "4.1.2 Loading and Retrieval" [level=4] [ref=e1432]:
                                    - generic [ref=e1433]: 4.1.2
                                    - text: Loading and Retrieval
                                  - paragraph [ref=e1435]:
                                    - text: To utilize stored experience during ongoing reasoning and decision-making, an agent relies on retrieving task-relevant memories while limiting the influence of irrelevant or outdated information. In single-agent systems, this process typically begins with lightweight loading operations that filter or preselect memory entries based on metadata such as recency, task scope, or memory type, followed by similarity-based retrieval over vectorized representations
                                    - generic [ref=e1436]:
                                      - text: (Lewis et al.,
                                      - link "2020" [ref=e1437] [cursor=pointer]:
                                        - /url: https://arxiv.org/html/2602.06052v3#bib.bib183
                                      - text: ; Mallen et al.,
                                      - link "2023" [ref=e1438] [cursor=pointer]:
                                        - /url: https://arxiv.org/html/2602.06052v3#bib.bib185
                                      - text: ; Zhang et al.,
                                      - link "2025m" [ref=e1439] [cursor=pointer]:
                                        - /url: https://arxiv.org/html/2602.06052v3#bib.bib209
                                      - text: )
                                    - text: . Loaded memories are then ranked or refined using semantic similarity, heuristic constraints, or budget-aware selection strategies before being injected into the model’s prompt or working context, forming the primary interface between external memory and the LLM’s inference process
                                    - generic [ref=e1440]:
                                      - text: (Park et al.,
                                      - link "2023" [ref=e1441] [cursor=pointer]:
                                        - /url: https://arxiv.org/html/2602.06052v3#bib.bib60
                                      - text: ; Wang et al.,
                                      - link "2025o" [ref=e1442] [cursor=pointer]:
                                        - /url: https://arxiv.org/html/2602.06052v3#bib.bib212
                                      - text: )
                                    - text: . Prior studies indicate that retrieval quality has a substantial impact on agent performance. Retrieving excessive memory can introduce noise and context overload, while overly restrictive retrieval may prevent access to critical historical information
                                    - generic [ref=e1443]:
                                      - text: (Xu et al.,
                                      - link "2025e" [ref=e1444] [cursor=pointer]:
                                        - /url: https://arxiv.org/html/2602.06052v3#bib.bib114
                                      - text: ; Hu et al.,
                                      - link "2025c" [ref=e1445] [cursor=pointer]:
                                        - /url: https://arxiv.org/html/2602.06052v3#bib.bib215
                                      - text: )
                                    - text: . Consequently, effective loading and retrieval mechanisms aim to balance relevance, diversity, and context budget to support coherent long-horizon behavior.
                                - generic [ref=e1446]:
                                  - heading "4.1.3 Updates and Refresh" [level=4] [ref=e1447]:
                                    - generic [ref=e1448]: 4.1.3
                                    - text: Updates and Refresh
                                  - paragraph [ref=e1450]:
                                    - text: As agents interact with their environment over extended horizons, previously stored memory may become incomplete, outdated, or misaligned with newly observed information, making static or append-only memory representations insufficient. Update mechanisms enable a single agent to revise existing memory entries in response to new observations, external feedback, or reflective reasoning, allowing memory content to evolve rather than merely accumulate. In practice, updates are often triggered after task completion, evaluation signals, or detected inconsistencies, and may involve rewriting semantic summaries, merging overlapping episodic records, or adjusting the importance of stored information
                                    - generic [ref=e1451]:
                                      - text: (Park et al.,
                                      - link "2023" [ref=e1452] [cursor=pointer]:
                                        - /url: https://arxiv.org/html/2602.06052v3#bib.bib60
                                      - text: ; Tan et al.,
                                      - link "2025c" [ref=e1453] [cursor=pointer]:
                                        - /url: https://arxiv.org/html/2602.06052v3#bib.bib273
                                      - text: ; Wang et al.,
                                      - link "2023a" [ref=e1454] [cursor=pointer]:
                                        - /url: https://arxiv.org/html/2602.06052v3#bib.bib257
                                      - text: )
                                    - text: . In parallel, refresh operations focus on adjusting the relative prominence and accessibility of memory without altering its core content, such as re-ranking salient entries, regenerating condensed summaries, or reinforcing frequently accessed memories to preserve their influence over future reasoning. Recent agent systems further demonstrate that reflective or self-evaluative processes can autonomously trigger both updating and refresh actions, leading to improved long-term coherence and task performance
                                    - generic [ref=e1455]:
                                      - text: (Shinn et al.,
                                      - link "2023" [ref=e1456] [cursor=pointer]:
                                        - /url: https://arxiv.org/html/2602.06052v3#bib.bib59
                                      - text: ; Ouyang et al.,
                                      - link "2025" [ref=e1457] [cursor=pointer]:
                                        - /url: https://arxiv.org/html/2602.06052v3#bib.bib138
                                      - text: )
                                    - text: . Together, these mechanisms allow memory representations to evolve dynamically, supporting adaptation in non-stationary environments while mitigating the accumulation of obsolete or misleading information.
                                - generic [ref=e1458]:
                                  - heading "4.1.4 Compression and Summarization" [level=4] [ref=e1459]:
                                    - generic [ref=e1460]: 4.1.4
                                    - text: Compression and Summarization
                                  - paragraph [ref=e1462]:
                                    - text: Long-horizon agent memory systems require mechanisms that regulate growth while preserving information essential for future reasoning and decision-making. Compression and summarization address this need by converting fine-grained episodic records into more compact and abstract representations that reduce redundancy and improve memory efficiency. In practice, many agent systems perform summarization periodically or after task completion, consolidating interaction histories into semantic or hierarchical memory suitable for long-term storage
                                    - generic [ref=e1463]:
