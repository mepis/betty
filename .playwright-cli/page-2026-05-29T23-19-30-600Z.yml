                                      - generic [ref=e1702]:
                                        - 'heading "5.2 Fine-tuning: Parameterized Memory Policies" [level=3] [ref=e1703]':
                                          - generic [ref=e1704]: "5.2"
                                          - text: "Fine-tuning: Parameterized Memory Policies"
                                        - paragraph [ref=e1706]: Beyond prompt-based adaptation, supervised fine-tuning (SFT) internalizes memory policies into model parameters, enabling more stable and reusable memory behaviors. From a policy learning perspective, SFT-based approaches investigate how memory policies are internalized, stabilized, and executed efficiently once embedded into model weights.
                                        - generic [ref=e1707]:
                                          - heading "5.2.1 Policy Internalization into Parameters" [level=4] [ref=e1708]:
                                            - generic [ref=e1709]: 5.2.1
                                            - text: Policy Internalization into Parameters
                                          - paragraph [ref=e1711]: A defining characteristic of SFT-based memory control is that memory policies are internalized into model parameters, transforming memory from an external context manipulation problem into a parametric policy representation. Rather than relying on prompts or explicit buffers at inference time, these approaches embed memory-related behaviors directly into the weight space, enabling stable and reusable memory usage across tasks.
                                          - paragraph [ref=e1713]:
                                            - text: Within this paradigm, existing work explores several closely related research questions concerning how memory control policies can be embedded into model parameters and how such internalization should be structured. Some approaches focus on internalizing memory content itself, distilling short-term contextual information into long-term parametric representations
                                            - generic [ref=e1714]:
                                              - text: (Wang et al.,
                                              - link "2024l" [ref=e1715] [cursor=pointer]:
                                                - /url: https://arxiv.org/html/2602.06052v3#bib.bib86
                                              - text: ;
                                              - link "2025n" [ref=e1716] [cursor=pointer]:
                                                - /url: https://arxiv.org/html/2602.06052v3#bib.bib102
                                              - text: )
                                            - text: ). Others emphasize internalizing memory access and retrieval behaviors by learning parameterized interfaces or lightweight modules that mediate interaction with external or structured memory stores, rather than absorbing raw content into weights (e.g., Memory3
                                            - generic [ref=e1717]:
                                              - text: (Yang et al.,
                                              - link "2024a" [ref=e1718] [cursor=pointer]:
                                                - /url: https://arxiv.org/html/2602.06052v3#bib.bib95
                                              - text: )
                                            - text: and MLP Memory
                                            - generic [ref=e1719]:
                                              - text: (Wei et al.,
                                              - link "2025c" [ref=e1720] [cursor=pointer]:
                                                - /url: https://arxiv.org/html/2602.06052v3#bib.bib130
                                              - text: )
                                            - text: ). A related line of work investigates how such parameterized memory policies can be organized hierarchically, enabling scalable invocation of large memory components while decoupling long-tail knowledge from core reasoning abilities
                                            - generic [ref=e1721]:
                                              - text: (Pouransari et al.,
                                              - link "2025" [ref=e1722] [cursor=pointer]:
                                                - /url: https://arxiv.org/html/2602.06052v3#bib.bib143
                                              - text: )
                                            - text: . Despite their differences, these approaches share the objective of shifting memory control from prompt-level manipulation to parameterized decision rules learned through supervision.
                                        - generic [ref=e1723]:
                                          - heading "5.2.2 Parameterized Policy Stabilization and Boundary Control" [level=4] [ref=e1724]:
                                            - generic [ref=e1725]: 5.2.2
                                            - text: Parameterized Policy Stabilization and Boundary Control
                                          - paragraph [ref=e1727]: Beyond internalization, SFT enables the stabilization of memory policies by learning explicit boundaries on what should be written, corrected, or suppressed once memory control is embedded into parameters. Rather than merely expanding memory capacity, these approaches aim to prevent error accumulation, concept drift, and persona inconsistency under long-term use.
                                          - paragraph [ref=e1729]:
                                            - text: A common theme across these works is the use of supervision to regularize memory updates and enforce boundary constraints. Some approaches train models to perform reflection or self-analysis before committing information to memory, encouraging the storage of high-level, noise-resistant representations aligned with task intent
                                            - generic [ref=e1730]:
