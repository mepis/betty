                                - text: (Shridhar et al.,
                                - link "2021" [ref=e1358] [cursor=pointer]:
                                  - /url: https://arxiv.org/html/2602.06052v3#bib.bib419
                                - text: )
                              - text: in ReAct
                              - generic [ref=e1359]:
                                - text: (Yao et al.,
                                - link "2023" [ref=e1360] [cursor=pointer]:
                                  - /url: https://arxiv.org/html/2602.06052v3#bib.bib329
                                - text: )
                              - text: . Such abstractions also include reusable tool-use patterns (e.g., stable tool-use strategies (like Toolformer
                              - generic [ref=e1361]:
                                - text: (Schick et al.,
                                - link "2023" [ref=e1362] [cursor=pointer]:
                                  - /url: https://arxiv.org/html/2602.06052v3#bib.bib294
                                - text: )
                              - text: and ToolLLM
