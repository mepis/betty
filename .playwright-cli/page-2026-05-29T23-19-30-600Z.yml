                                        - /url: https://arxiv.org/html/2602.06052v3#bib.bib89
                                      - text: )
                                    - text: . Hierarchical consolidation further organizes compressed memory into multi-level or tree-structured representations, enabling scalable retrieval across different abstraction levels
                                    - generic [ref=e1466]:
                                      - text: (Sarthi et al.,
                                      - link "2024" [ref=e1467] [cursor=pointer]:
                                        - /url: https://arxiv.org/html/2602.06052v3#bib.bib208
                                      - text: ; Rezazadeh et al.,
                                      - link "2025b" [ref=e1468] [cursor=pointer]:
                                        - /url: https://arxiv.org/html/2602.06052v3#bib.bib106
                                      - text: )
                                    - text: . Dynamic Cheatsheets further instantiate this idea by maintaining a compact, task-adaptive summary that is continuously updated to surface only the most salient information for ongoing reasoning, reducing repeated large-scale retrieval and context expansion at inference time
                                    - generic [ref=e1469]:
                                      - text: (Suzgun et al.,
                                      - link "2025" [ref=e1470] [cursor=pointer]:
                                        - /url: https://arxiv.org/html/2602.06052v3#bib.bib559
                                      - text: )
