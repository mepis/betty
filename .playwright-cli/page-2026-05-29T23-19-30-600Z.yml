                                                      - /url: https://arxiv.org/html/2602.06052v3#bib.bib471
                                                    - text: )
                                                  - text: and skill-oriented abstractions like Claude Agent Skills
                                                  - generic [ref=e1936]:
                                                    - text: (Anthropic,
                                                    - link "2025" [ref=e1937] [cursor=pointer]:
                                                      - /url: https://arxiv.org/html/2602.06052v3#bib.bib470
                                                    - text: )
                                                  - text: further formalize how agents interact with external state by defining query semantics, update policies, and scope boundaries, thereby improving modularity, auditability, and behavioral safety
                                                  - generic [ref=e1938]:
