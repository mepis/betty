                                                                        - generic [ref=e4134]:
                                                                          - heading "9.6 Real-World Benchmarking and Evaluations" [level=3] [ref=e4135]:
                                                                            - generic [ref=e4136]: "9.6"
                                                                            - text: Real-World Benchmarking and Evaluations
                                                                          - paragraph [ref=e4138]:
                                                                            - text: A central challenge in real-world benchmarking for memory-enabled foundation agents lies in the persistent mismatch between research-level benchmark abstractions and real-world deployment complexities, for both user-centric and agent-centric memory. On the user side, most existing benchmarks reduce long-term personalization to synthetic factual recall, where agents retrieve static user attributes embedded in long contexts or scripted interaction histories (e.g., persona facts, preferences, or conversations). While such settings facilitate controlled evaluation, they fail to capture real user satisfaction, which depends on preference drift, conflicting signals, partial observability, and delayed feedback over weeks or months. Benchmarks such as LoCoMo
                                                                            - generic [ref=e4139]:
                                                                              - text: (Maharana et al.,
                                                                              - link "2024" [ref=e4140] [cursor=pointer]:
                                                                                - /url: https://arxiv.org/html/2602.06052v3#bib.bib279
                                                                              - text: )
                                                                            - text: and PersonaMem
                                                                            - generic [ref=e4141]:
                                                                              - text: (Jiang et al.,
                                                                              - link "2025a" [ref=e4142] [cursor=pointer]:
                                                                                - /url: https://arxiv.org/html/2602.06052v3#bib.bib416
                                                                              - text: )
                                                                            - text: emphasize long-context retrieval accuracy, yet implicitly assume stationary user intent and unambiguous ground truth, overlooking critical failure modes such as stale preference reuse, incorrect overwriting of long-term user state, or unsafe retention of sensitive information. On the agent-centric side, interactive benchmarks including WebArena
                                                                            - generic [ref=e4143]:
                                                                              - text: (Zhou et al.,
                                                                              - link "2024" [ref=e4144] [cursor=pointer]:
                                                                                - /url: https://arxiv.org/html/2602.06052v3#bib.bib35
                                                                              - text: )
                                                                            - text: and OSWorld
                                                                            - generic [ref=e4145]:
                                                                              - text: (Xie et al.,
                                                                              - link "2024" [ref=e4146] [cursor=pointer]:
                                                                                - /url: https://arxiv.org/html/2602.06052v3#bib.bib422
                                                                              - text: )
                                                                            - text: improve realism through execution-based evaluation, but remain bounded by curated environments, reset-centric task design, and short evaluation horizons. These constraints obscure whether agents can accumulate, revise, and safely exploit experience across episodes, especially under non-stationary tools, policies, or environments. As a result, agents may optimize for short-horizon success while silently failing at memory-critical competencies such as provenance tracking, contradiction resolution, and long-term policy consistency. This gap mirrors observations in general assistant benchmarks such as GAIA
                                                                            - generic [ref=e4147]:
                                                                              - text: (Mialon et al.,
                                                                              - link "2024" [ref=e4148] [cursor=pointer]:
                                                                                - /url: https://arxiv.org/html/2602.06052v3#bib.bib423
                                                                              - text: )
                                                                            - text: ", where failures often arise not from isolated reasoning errors but from brittle state transitions and incorrect memory updates across multimodal and tool-mediated interactions."
                                                                          - paragraph [ref=e4150]:
                                                                            - text: Future research should move toward closed-loop, longitudinal, and execution-grounded evaluation paradigms that explicitly stress persistent memory under realistic constraints, for both users and agents. For user-centric memory, benchmarks should incorporate recurring interactions with controlled preference drift, ambiguous feedback, and real-user rewards, enabling direct measurement of satisfaction-aligned memory behaviors such as compression, selective forgetting, and safe overwriting, rather than static recall accuracy (e.g., extending user history with multi-month preference evolution or counterfactual feedback). For agent-centric memory, evaluation should go beyond simulated resets toward partially open or continuously evolving environments, where experience accumulation has real consequences, such as financial trading sandboxes, long-running web services, or competitive control tasks with delayed payoffs, enabling comparison between memory-augmented agents and memory-free baselines under identical conditions. Execution-based frameworks like OSWorld
                                                                            - generic [ref=e4151]:
                                                                              - text: (Xie et al.,
                                                                              - link "2024" [ref=e4152] [cursor=pointer]:
                                                                                - /url: https://arxiv.org/html/2602.06052v3#bib.bib422
                                                                              - text: )
                                                                            - text: can be extended with memory-sensitive invariants, requiring agents to version, audit, and roll back persistent state, and to attach provenance metadata to stored knowledge. In parallel, standardized tool-mediation layers (e.g., MCP-style interfaces) can enable reproducible logging, permission enforcement, and replay, supporting fine-grained evaluation of memory–policy interactions under realistic constraints. Finally, benchmarks should explicitly quantify resource–utility trade-offs, measuring memory quality as a function of token budget, storage cost, and latency, reflecting the bounded-memory conditions of real deployments. Collectively, these directions reframe benchmarking from episodic task completion toward systems-level evaluation of memory as a first-class capability, jointly shaping user trust, agent autonomy, and long-term utility across evolving environments.
                                                                          - generic [ref=e4153]:
                                                                            - heading "10 Conclusions" [level=2] [ref=e4154]:
                                                                              - generic [ref=e4155]: "10"
                                                                              - text: Conclusions
                                                                            - paragraph [ref=e4157]: Memory is becoming the key component for foundation agents operating in long-horizon, context-exploded, and user-dependent environments. In this survey, we unify the design along three dimensions, including memory substrates (internal and external), cognitive mechanisms (sensory, working, episodic, semantic, and procedural), and memory subjects (user- and agent-centric), and analyze how memory is operated under single- and multi-agent systems, as well as how it is increasingly shaped by prompting-, fine-tuning-, and RL-based learning policies. In addition, we also summarize the metrics and benchmarks used to assess foundation agent performance, and categorize current works into representative application domains. To foster future memory research, we list out six key challenges to collectively point to a reliable, scalable, self-evolving, and trustworthy memory infrastructures for real-world human-agent memory system design.
