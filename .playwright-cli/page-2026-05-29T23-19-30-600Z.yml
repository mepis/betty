                                                        - /url: https://arxiv.org/html/2602.06052v3#bib.bib326
                                                      - text: )
                                                    - text: . These failures are not isolated reasoning errors but the cumulative consequence of long-term context mismanagement. Existing mitigation strategies, such as sliding context windows, heuristic truncation, and summary-based memory mechanisms
                                                    - generic [ref=e1895]:
