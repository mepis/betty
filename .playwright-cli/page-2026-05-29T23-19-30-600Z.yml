                                                                        - generic [ref=e2412]: "Table 3:"
                                                                        - text: "Overview of user-centric memory benchmarks. Memory Abilities— FE: Fact Extraction ; MR: Multi-Session Reasoning ; TR: Temporal Reasoning ; UR: Update & Refresh ; CS: Compression & Summarization ; FR: Forgetting & Retention ; UP: User Facts & Preferences ; AS: Assistant Facts ; IC: Implicit Inference ; AB: Abstain & Boundary Handling. Marks— ✓:"
                                                                        - emphasis [ref=e2413]: explicitly covered
                                                                        - text: ". The benchmark defines this ability as a target with dedicated task types or annotations and evaluates it directly; ✓:"
                                                                        - emphasis [ref=e2414]: partially or indirectly covered
                                                                        - text: ". The ability may be required in some instances or implied by the setup, but lacks dedicated labeling or ability specific evaluation, so coverage is weak or not cleanly attributable; ✗:"
                                                                        - emphasis [ref=e2415]: not covered
                                                                        - text: ". No corresponding task, annotation, rubric, and the evaluation does not require or measure this ability. Data source— Real (human-authored or real-world conversations), SIM (fully synthetic or simulated), MIX (mixture of real and synthetic). Evaluation metrics— AR: Accurate Retrieval; TTL: Test-Time Learning; LRU: Long-Range Understanding; SF: Selective Forgetting; MM-R: Multi-Message Relevance; RC: Response Correctness; CC: Contextual Coherence; MA: Memory Accuracy; MI: Memory Integrity; FMR: False Memory Rate; MRS: Memory Retention Score; JUDGE: LLM-as-a-judge."
