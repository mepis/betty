                - text: . These hidden states are the per-layer-wise representations that combine the fixed learned parameters with the current prompt, forming the model’s working state that drives the next-token prediction. Unlike weight-based memory, state memory is not durable. It is usually created during runtime activations, then used, and typically discarded or reset at the end of a request
