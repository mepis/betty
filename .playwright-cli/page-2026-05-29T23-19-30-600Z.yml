                                                                - /url: https://arxiv.org/html/2602.06052v3#bib.bib608
                                                              - text: ; Yadav et al.,
                                                              - link "2025" [ref=e2310] [cursor=pointer]:
                                                                - /url: https://arxiv.org/html/2602.06052v3#bib.bib609
                                                              - text: )
                                                            - text: .
                                                          - generic [ref=e2312]:
                                                            - heading "Accuracy-based Metrics." [level=5] [ref=e2313]
                                                            - paragraph [ref=e2315]:
                                                              - text: When tasks have a clear objective outcome, accuracy-based metrics are used. For answering questions about long histories, accuracy or memory accuracy directly assesses the alignment of the final response with the ground truth answer
                                                              - generic [ref=e2316]:
                                                                - text: (Yang et al.,
                                                                - link "2018" [ref=e2317] [cursor=pointer]:
                                                                  - /url: https://arxiv.org/html/2602.06052v3#bib.bib418
                                                                - text: ; Zhong et al.,
                                                                - link "2024" [ref=e2318] [cursor=pointer]:
                                                                  - /url: https://arxiv.org/html/2602.06052v3#bib.bib62
                                                                - text: ; Du et al.,
                                                                - link "2024" [ref=e2319] [cursor=pointer]:
                                                                  - /url: https://arxiv.org/html/2602.06052v3#bib.bib412
                                                                - text: )
                                                              - text: . F1 eases exact matching by giving credit for partial overlap at the token level. This is especially prevalent when responses do not match exactly but have some variance
                                                              - generic [ref=e2320]:
                                                                - text: (Trivedi et al.,
                                                                - link "2022" [ref=e2321] [cursor=pointer]:
                                                                  - /url: https://arxiv.org/html/2602.06052v3#bib.bib421
                                                                - text: ; Deng et al.,
                                                                - link "2023" [ref=e2322] [cursor=pointer]:
                                                                  - /url: https://arxiv.org/html/2602.06052v3#bib.bib431
                                                                - text: )
                                                              - text: . When the benchmark evaluates an explicit memory module, Recall@K, Mean Average Precision (MAP), and Normalized Discounted Cumulative Gain (NDCG)@K become central because they separate “did the system retrieve the right evidence” from “did the generator phrase the answer well.” Recall@K checks to see if at least one relevant item is in the top-
                                                              - math [ref=e2323]:
                                                                - generic [ref=e2325]: k
                                                              - text: retrieved results
                                                              - generic [ref=e2326]:
                                                                - text: (Wu et al.,
                                                                - link "2025a" [ref=e2327] [cursor=pointer]:
                                                                  - /url: https://arxiv.org/html/2602.06052v3#bib.bib414
                                                                - text: )
                                                              - text: . MAP and NDCG@K, on the other hand, also take into account the quality of the ranking and give systems that put relevant memories first a higher score
                                                              - generic [ref=e2328]:
                                                                - text: (Kohar and Krishnan,
                                                                - link "2025" [ref=e2329] [cursor=pointer]:
                                                                  - /url: https://arxiv.org/html/2602.06052v3#bib.bib600
                                                                - text: )
                                                              - text: . For interactive agents, correctness is instead defined by environment evaluators, so Success Rate (SR) or Goal Completion (GC) represents whether the agent finishes tasks end-to-end
                                                              - generic [ref=e2330]:
                                                                - text: (Zhou et al.,
                                                                - link "2024" [ref=e2331] [cursor=pointer]:
                                                                  - /url: https://arxiv.org/html/2602.06052v3#bib.bib35
                                                                - text: ; Zheng et al.,
                                                                - link "2025a" [ref=e2332] [cursor=pointer]:
                                                                  - /url: https://arxiv.org/html/2602.06052v3#bib.bib37
                                                                - text: )
                                                              - text: . For code and tool-use settings, Pass@K and Resolved Rate (RR) measure whether at least one of the top-
                                                              - math [ref=e2333]:
                                                                - generic [ref=e2335]: k
                                                              - text: attempts solves the task or resolves an issue
                                                              - generic [ref=e2336]:
                                                                - text: (Yao et al.,
                                                                - link "2025" [ref=e2337] [cursor=pointer]:
                                                                  - /url: https://arxiv.org/html/2602.06052v3#bib.bib593
                                                                - text: ; Jimenez et al.,
                                                                - link "2025" [ref=e2338] [cursor=pointer]:
                                                                  - /url: https://arxiv.org/html/2602.06052v3#bib.bib301
                                                                - text: )
                                                              - text: . In addition, memory-centric benchmarks increasingly add failure-mode assessment that are hard to capture with end-task accuracy alone. Memory Integrity quantifies whether extracted memories cover the required memory points, and False Memory Rate measures how often systems introduce fabricated or incorrect memories during storage, update, or use
                                                              - generic [ref=e2339]:
                                                                - text: (Chen et al.,
                                                                - link "2025a" [ref=e2340] [cursor=pointer]:
                                                                  - /url: https://arxiv.org/html/2602.06052v3#bib.bib415
                                                                - text: )
                                                              - text: .
                                                            - generic [ref=e2341]:
                                                              - heading "Similarity-based Metrics." [level=5] [ref=e2342]
                                                              - paragraph [ref=e2344]:
                                                                - text: Similarity-based metrics are most prevalent in dialogue generation and summarization, where the output is free-form, and correctness cannot be fully checked by the accuracy or F1 score
                                                                - generic [ref=e2345]:
                                                                  - text: (Chen et al.,
                                                                  - link "2024d" [ref=e2346] [cursor=pointer]:
                                                                    - /url: https://arxiv.org/html/2602.06052v3#bib.bib610
                                                                  - text: )
                                                                - text: . BLEU, ROUGE, and ROUGE-L measure lexical overlap with a reference, which is useful for tracking surface similarity but can underestimate valid paraphrases and overestimate fluent yet ungrounded responses
                                                                - generic [ref=e2347]:
                                                                  - text: (Gehrmann et al.,
                                                                  - link "2023" [ref=e2348] [cursor=pointer]:
                                                                    - /url: https://arxiv.org/html/2602.06052v3#bib.bib611
                                                                  - text: ; Ai et al.,
                                                                  - link "2025" [ref=e2349] [cursor=pointer]:
                                                                    - /url: https://arxiv.org/html/2602.06052v3#bib.bib601
                                                                  - text: )
                                                                - text: . Distinct-
                                                                - math [ref=e2350]:
                                                                  - generic [ref=e2352]: "n"
                                                                - text: complements overlap metrics by measuring lexical diversity, discouraging repetitive generations that can inflate similarity scores without improving faithfulness
                                                                - generic [ref=e2353]:
                                                                  - text: (He et al.,
                                                                  - link "2025a" [ref=e2354] [cursor=pointer]:
                                                                    - /url: https://arxiv.org/html/2602.06052v3#bib.bib602
                                                                  - text: )
                                                                - text: . When lexical overlap is too strict, BERTScore provides an embedding-based approximation of semantic similarity
                                                                - generic [ref=e2355]:
                                                                  - text: (Maharana et al.,
                                                                  - link "2024" [ref=e2356] [cursor=pointer]:
                                                                    - /url: https://arxiv.org/html/2602.06052v3#bib.bib279
                                                                  - text: )
                                                                - text: ", and FactScore evaluates memory faithfulness by checking agreement at the level of atomic factual claims"
                                                                - generic [ref=e2357]:
                                                                  - text: (Xu et al.,
                                                                  - link "2024b" [ref=e2358] [cursor=pointer]:
                                                                    - /url: https://arxiv.org/html/2602.06052v3#bib.bib603
                                                                  - text: )
                                                                - text: ", which is particularly relevant when summarization is used as a compression mechanism for long histories"
                                                                - generic [ref=e2359]:
                                                                  - text: (Saxena et al.,
                                                                  - link "2025" [ref=e2360] [cursor=pointer]:
                                                                    - /url: https://arxiv.org/html/2602.06052v3#bib.bib612
                                                                  - text: )
                                                                - text: . Perplexity is also used in some long dialogue benchmarks as a likelihood-based metric for generation quality over sessions
                                                                - generic [ref=e2361]:
                                                                  - text: (Xu et al.,
                                                                  - link "2022a" [ref=e2362] [cursor=pointer]:
                                                                    - /url: https://arxiv.org/html/2602.06052v3#bib.bib327
                                                                  - text: )
                                                                - text: ", but it remains an indirect indicator for memory performance, because it does not verify whether the model’s content is grounded in the correct historical evidence"
                                                                - generic [ref=e2363]:
                                                                  - text: (Durmus et al.,
                                                                  - link "2022" [ref=e2364] [cursor=pointer]:
                                                                    - /url: https://arxiv.org/html/2602.06052v3#bib.bib613
                                                                  - text: )
                                                                - text: .
                                                              - generic [ref=e2365]:
                                                                - heading "LLM-as-a-judge Metrics." [level=5] [ref=e2366]
                                                                - paragraph [ref=e2368]:
                                                                  - text: LLM-as-a-judge metrics are used when ground truth answers, or references, are incomplete, when multiple responses are acceptable, or when evaluation requires a rubric that is hard to encode as string matching
                                                                  - generic [ref=e2369]:
                                                                    - text: (Yu et al.,
                                                                    - link "2025a" [ref=e2370] [cursor=pointer]:
                                                                      - /url: https://arxiv.org/html/2602.06052v3#bib.bib614
                                                                    - text: )
                                                                  - text: . Response Correctness asks a strong model to decide whether the answer satisfies the user query
                                                                  - generic [ref=e2371]:
                                                                    - text: (Deshpande et al.,
                                                                    - link "2025" [ref=e2372] [cursor=pointer]:
                                                                      - /url: https://arxiv.org/html/2602.06052v3#bib.bib566
                                                                    - text: )
                                                                  - text: ", which is convenient for open-ended responses but introduces judge dependence and sensitivity to prompting. Faithfulness or Groundedness uses a judge to verify that claims are supported by retrieved context or memory (and in some settings, whether provided citations support the response)"
                                                                  - generic [ref=e2373]:
                                                                    - text: (Shao et al.,
                                                                    - link "2025" [ref=e2374] [cursor=pointer]:
                                                                      - /url: https://arxiv.org/html/2602.06052v3#bib.bib604
                                                                    - text: ; Wang et al.,
                                                                    - link "2025f" [ref=e2375] [cursor=pointer]:
                                                                      - /url: https://arxiv.org/html/2602.06052v3#bib.bib605
                                                                    - text: )
                                                                  - text: ", which helps distinguish helpful but hallucinated answers from evidence-supported ones. Preference Following uses a judge to determine whether the output respects explicit user constraints or stated preferences"
                                                                  - generic [ref=e2376]:
                                                                    - text: (Zhao et al.,
                                                                    - link "2025b" [ref=e2377] [cursor=pointer]:
                                                                      - /url: https://arxiv.org/html/2602.06052v3#bib.bib417
                                                                    - text: ; Tavakoli et al.,
                                                                    - link "2025" [ref=e2378] [cursor=pointer]:
                                                                      - /url: https://arxiv.org/html/2602.06052v3#bib.bib606
                                                                    - text: ; Pakhomov et al.,
                                                                    - link "2025" [ref=e2379] [cursor=pointer]:
                                                                      - /url: https://arxiv.org/html/2602.06052v3#bib.bib607
                                                                    - text: )
                                                                  - text: ", which is essential for personalization benchmarks where correctness is defined by user alignment rather than a single factual label"
                                                                  - generic [ref=e2380]:
                                                                    - text: (Wang et al.,
                                                                    - link "2024b" [ref=e2381] [cursor=pointer]:
                                                                      - /url: https://arxiv.org/html/2602.06052v3#bib.bib615
                                                                    - text: )
                                                                  - text: .
                                                                - paragraph [ref=e2383]:
                                                                  - text: Across these metrics, a practical implication is that evaluation becomes more attributable to memory mechanisms when the benchmark can separate retrieval or selection from generation
                                                                  - generic [ref=e2384]:
                                                                    - text: (Chen et al.,
                                                                    - link "2025a" [ref=e2385] [cursor=pointer]:
                                                                      - /url: https://arxiv.org/html/2602.06052v3#bib.bib415
                                                                    - text: )
                                                                  - text: . Retrieval and ranking metrics (Recall@K/MAP/NDCG@K) assess whether the memory interface surfaces the right items, while integrity and hallucination-oriented metrics (MI/FMR) expose failure modes that may not change end-task accuracy until they accumulate
                                                                  - generic [ref=e2386]:
                                                                    - text: (Zhang et al.,
                                                                    - link "2025a" [ref=e2387] [cursor=pointer]:
                                                                      - /url: https://arxiv.org/html/2602.06052v3#bib.bib616
                                                                    - text: )
                                                                  - text: . In contrast, similarity-based metrics remain useful for tracking fluency and summarization quality, but they should be paired with grounding checks (FactScore or judge-based faithfulness) to avoid rewarding ungrounded paraphrases
                                                                  - generic [ref=e2388]:
                                                                    - text: (Aralikatte et al.,
                                                                    - link "2021" [ref=e2389] [cursor=pointer]:
                                                                      - /url: https://arxiv.org/html/2602.06052v3#bib.bib618
                                                                    - text: )
                                                                  - text: . In addition, some benchmarks also emphasize cost and feasibility (e.g., capacity and efficiency)
                                                                  - generic [ref=e2390]:
                                                                    - text: (Tan et al.,
                                                                    - link "2025a" [ref=e2391] [cursor=pointer]:
                                                                      - /url: https://arxiv.org/html/2602.06052v3#bib.bib617
                                                                    - text: )
                                                                  - text: ", motivating reporting not only what the agent remembers, but also the computational and storage trade-offs required to achieve that performance."
                                                                - generic [ref=e2392]:
                                                                  - heading "7.2 Benchmarks" [level=3] [ref=e2393]:
                                                                    - generic [ref=e2394]: "7.2"
                                                                    - text: Benchmarks
                                                                  - paragraph [ref=e2396]:
                                                                    - text: "To assess the memory improvement on the foundation agent task in diverse scenarios, we categorize existing benchmarks into two primary domains: user-centric benchmarks and agent-centric benchmarks. User-centric benchmarks, such as MSC"
                                                                    - generic [ref=e2397]:
                                                                      - text: (Xu et al.,
                                                                      - link "2022a" [ref=e2398] [cursor=pointer]:
                                                                        - /url: https://arxiv.org/html/2602.06052v3#bib.bib327
                                                                      - text: )
                                                                    - text: and MemoryBank
                                                                    - generic [ref=e2399]:
                                                                      - text: (Zhong et al.,
                                                                      - link "2024" [ref=e2400] [cursor=pointer]:
                                                                        - /url: https://arxiv.org/html/2602.06052v3#bib.bib62
                                                                      - text: )
                                                                    - text: ", primarily evaluate conversational consistency, evaluating an agent’s ability to retain persona information, recall user preferences, and sustain coherent interactions across multi-session or multi-turn dialog. On the other hand, agent-centric benchmarks, including OSWorld"
                                                                    - generic [ref=e2401]:
                                                                      - text: (Xie et al.,
                                                                      - link "2024" [ref=e2402] [cursor=pointer]:
                                                                        - /url: https://arxiv.org/html/2602.06052v3#bib.bib422
                                                                      - text: )
                                                                    - text: and Webarena
                                                                    - generic [ref=e2403]:
                                                                      - text: (Zhou et al.,
                                                                      - link "2024" [ref=e2404] [cursor=pointer]:
                                                                        - /url: https://arxiv.org/html/2602.06052v3#bib.bib35
                                                                      - text: )
                                                                    - text: ", focus on the functional application of memory for complex problem-solving, measuring success rates in tasks that require multi-hop reasoning and tool usage. We present the commonly used user-centric and agent-centric benchmarks in Section"
                                                                    - link "7.2.1" [ref=e2405] [cursor=pointer]:
                                                                      - /url: https://arxiv.org/html/2602.06052v3#S7.SS2.SSS1
                                                                    - text: and Section
                                                                    - link "7.2.2" [ref=e2406] [cursor=pointer]:
                                                                      - /url: https://arxiv.org/html/2602.06052v3#S7.SS2.SSS2
                                                                    - text: ", respectively."
                                                                  - generic [ref=e2407]:
                                                                    - heading "7.2.1 User-centric Evaluation Benchmark" [level=4] [ref=e2408]:
                                                                      - generic [ref=e2409]: 7.2.1
