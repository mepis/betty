                                - link "2024" [ref=e1372] [cursor=pointer]:
                                  - /url: https://arxiv.org/html/2602.06052v3#bib.bib35
                                - text: )
                              - text: learns how to reuse successful multi-step browsing policies rather than re-exploring interfaces from scratch. For GUI agents, such procedural memory stores interface-specific action sequences, such as menu traversal, widget manipulation, and error recovery strategies in constraints of desktop or mobile environments
                              - generic [ref=e1373]:
