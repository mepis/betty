                        - generic [ref=e1071]:
                          - text: (Rasmussen et al.,
                          - link "2025" [ref=e1072] [cursor=pointer]:
                            - /url: https://arxiv.org/html/2602.06052v3#bib.bib110
                          - text: ; Wang et al.,
                          - link "2024n" [ref=e1073] [cursor=pointer]:
                            - /url: https://arxiv.org/html/2602.06052v3#bib.bib99
                          - text: )
                        - text: ", or entry-centric semantic structures"
                        - generic [ref=e1074]:
                          - text: (Xu et al.,
                          - link "2025e" [ref=e1075] [cursor=pointer]:
                            - /url: https://arxiv.org/html/2602.06052v3#bib.bib114
                          - text: ; Li et al.,
                          - link "2025d" [ref=e1076] [cursor=pointer]:
                            - /url: https://arxiv.org/html/2602.06052v3#bib.bib145
                          - text: )
                        - text: ", supporting long-term maintenance and structured access during reasoning. Other approaches encode semantic knowledge into neural memory modules"
                        - generic [ref=e1077]:
                          - text: (Behrouz et al.,
                          - link "2024" [ref=e1078] [cursor=pointer]:
                            - /url: https://arxiv.org/html/2602.06052v3#bib.bib109
                          - text: ; Wang et al.,
                          - link "2024l" [ref=e1079] [cursor=pointer]:
