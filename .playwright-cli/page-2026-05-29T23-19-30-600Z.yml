                                    - paragraph [ref=e1589]:
                                      - text: A direct strategy is to enforce isolation at the memory write and update stage. In each interaction round, an agent first compares newly extracted candidate facts against the existing memory state and selectively updates memory through a controlled evaluation mechanism, rather than blindly appending new information. In Memory-R1
                                      - generic [ref=e1590]:
                                        - text: (Yan et al.,
                                        - link "2025b" [ref=e1591] [cursor=pointer]:
                                          - /url: https://arxiv.org/html/2602.06052v3#bib.bib135
                                        - text: )
                                      - text: ", the memory manager agent is the only agent allowed to mutate memory. This includes four kinds of discrete editing actions, like ADD, UPDATE, DELETE, and NOOP. The ADD writes a new entry; UPDATE rewrites or merges an existing entry (especially when the new information is a refinement or correction of the old one, the system tends to keep the version with more information); DELETE removes an entry that is clearly contradicted by new evidence or becomes outdated; and NOOP means the information is already covered or is not important for long-term memory, so no update is made. For each user query, the memory manager observes the current memory state and decides which specific memory slots to operate on. As a result, irrelevant memory entries remain untouched. A related form of write-time isolation is adopted in WebCoach"
