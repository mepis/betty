        - paragraph [ref=e289]:
          - text: Although the rapid growth of foundation agent memory research has produced several surveys, important gaps remain in how agent memory is analyzed from a system design perspective in real-world agent utility backgrounds. Such memory design has shifted from short, isolated prompts to long-horizon interaction, where agents must operate over exploding context windows, multi-session workflows, and persistent real-world user relationships. Early works often organize memory primarily by task applications or management strategies
          - generic [ref=e290]:
            - text: (Zhang et al.,
            - link "2025m" [ref=e291] [cursor=pointer]:
              - /url: https://arxiv.org/html/2602.06052v3#bib.bib209
            - text: ; Du et al.,
            - link "2025" [ref=e292] [cursor=pointer]:
              - /url: https://arxiv.org/html/2602.06052v3#bib.bib195
            - text: )
          - text: ", or adopt neuroscience-inspired perspectives that project AI memory onto human memory through functional analogies and memory lifecycles"
          - generic [ref=e293]:
            - text: (Wu et al.,
            - link "2025f" [ref=e294] [cursor=pointer]:
              - /url: https://arxiv.org/html/2602.06052v3#bib.bib43
            - text: ; Liang et al.,
            - link "2025" [ref=e295] [cursor=pointer]:
              - /url: https://arxiv.org/html/2602.06052v3#bib.bib48
            - text: )
          - text: . While these approaches provide useful conceptual grounding, they do not systematically characterize underlying memory substrates or explicitly model the subject that memory serves within an agent system, which are significant when the context exceeds the foundation model’s limitations. As a result, they fall short of distinguishing the optimization goals of agent memory and overlook complementary dimensions connections that are essential for designing and deploying autonomous agent systems in real-world applications. More recent work begins to broaden this conceptual landscape. In particular,
          - generic [ref=e296]:
            - text: Hu et al. (
            - link "2025d" [ref=e297] [cursor=pointer]:
              - /url: https://arxiv.org/html/2602.06052v3#bib.bib47
            - text: )
          - text: organizes agent memory along forms, functions, and temporal dynamics. Despite offering a valuable consolidation of memory, it remains largely partial, focusing mainly on how memory functions in agent-centric tasks rather than how memory should be designed, optimized, and deployed for users. Motivated by these, this survey analyzes foundation agent memory of hundreds of papers from three major complementary perspectives that connect memory with system-level design choices in increasingly complex environments.
        - paragraph [ref=e299]:
          - text: "Specifically, we introduce a unified taxonomy that is organized around three core design dimensions: the memory substrate, the cognitive mechanism, and the memory subject, as shown in Figure"
          - link "2" [ref=e300] [cursor=pointer]:
            - /url: https://arxiv.org/html/2602.06052v3#S1.F2
          - text: . We classify existing foundation agent memory works by substrate into external and internal, by cognitive mechanism into functional categories such as episodic, sensory, working, semantic, and procedural memory, and by subject into user-centric versus agent-centric subjects. From a system perspective, we further analyze how these foundation agent memory systems are operated under different agent topologies, distinguishing the fundamental memory operations in single-agent systems from those memory routings in multi-agent settings. Furthermore, we highlight the growing role of learning policies, showing how agents are increasingly trained to conquer memory management itself and thus to learn from their interaction histories and self-evolve over time. To reflect the impact of shifting environments on foundation agent memory design, we discuss scalability issues across context length and environment complexity, and we review the evaluation method and metrics used to measure memory performance and utility. Finally, we outline six open challenges in foundation agent memory to guide the next generation of foundation agent memory design.
