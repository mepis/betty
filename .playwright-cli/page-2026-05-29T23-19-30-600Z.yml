                                            - 'heading "6 Scaling: Memory, Contexts, and Environments" [level=2] [ref=e1821]':
                                              - generic [ref=e1822]: "6"
                                              - text: "Scaling: Memory, Contexts, and Environments"
                                            - paragraph [ref=e1824]: "As LLMs and agents are deployed in increasingly realistic settings, their contexts grow rapidly and can explode along three scaling axes during interactions with the open-world environments: interaction horizon, environmental complexity, and system quantity. While traditional evaluations often rely on static, context-limited settings that overlook environmental dynamics, real-world utility requires the ability to accumulate, retain, and update knowledge across extended timeframes and heterogeneous data structures. This section explores how memory emerges as the essential architectural solution to this scaling challenge, transforming from a simple interaction log into a sophisticated context-management system that enables robust skill learning, long-term personalization, and collective coordination in multi-agent ecosystems."
                                            - generic [ref=e1825]:
