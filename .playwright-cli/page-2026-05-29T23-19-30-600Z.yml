                                            - text: Parameterized Policy Efficiency and Retrieval Refinement
                                          - paragraph [ref=e1746]:
                                            - text: Beyond learning what to store and how to stabilize memory, SFT is also used to refine how parameterized memory policies are executed at inference time, particularly during memory reading and retrieval. Rather than relying on exhaustive context access, these approaches treat retrieval itself as a learning policy and optimize how queries are formulated, iteratively refined, and applied to compressed memory representations. Through supervised training, models learn to generate precise retrieval cues for targeted memory access
