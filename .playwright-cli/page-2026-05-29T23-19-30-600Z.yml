                      - paragraph [ref=e1095]: In summary, semantic memory complements working and episodic memory by providing a stable yet revisable knowledge substrate. It serves as the primary site for distilling fragmented experiences into static laws and facts. By stripping universal knowledge ontologies from specific episodes, it equips the agent with the common-sense foundation necessary for cross-domain tasks. As research progresses, semantic memory is evolving from simple document storage toward self-evolving semantic networks, ensuring that agents maintain an accurate and consistent knowledge system over long-term operation.
