                                            - generic [ref=e1777]:
                                              - text: (Wang et al.,
                                              - link "2025o" [ref=e1778] [cursor=pointer]:
                                                - /url: https://arxiv.org/html/2602.06052v3#bib.bib212
                                              - text: )
                                            - text: generalizes this paradigm by framing memory construction itself as a sequential decision-making problem, where agents learn, via reinforcement learning, how to populate and update structured multi-component memories (e.g., core, semantic, and episodic memory) to maximize long-horizon task performance. Together, these approaches frame step-level memory control as the optimization of local memory actions through reinforcement signals, without explicitly modeling the long-term effects of memory state construction.
                                        - generic [ref=e1779]:
                                          - heading "5.3.2 Trajectory-Level Memory Representation" [level=4] [ref=e1780]:
                                            - generic [ref=e1781]: 5.3.2
                                            - text: Trajectory-Level Memory Representation
                                          - paragraph [ref=e1783]: As tasks extend over longer horizons, the value of memory decisions often emerges only through their cumulative influence on future reasoning and action selection. Reinforcement learning enables this setting by allowing delayed task outcomes to shape how trajectory-level memory states are constructed, updated, and maintained by a learning policy.
                                          - paragraph [ref=e1785]:
                                            - text: Within this scope, existing work studies how compact, decision-sufficient memory representations can be learned when interaction histories can no longer be evaluated step by step. Rather than treating memory as a transient buffer, these approaches view trajectory-level memory as part of the agent’s Markov state, whose quality is assessed through downstream decision performance
