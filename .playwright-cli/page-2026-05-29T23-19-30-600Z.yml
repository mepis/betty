                - heading "3.2.1 Sensory Memory" [level=4] [ref=e868]:
                  - generic [ref=e869]: 3.2.1
                  - text: Sensory Memory
                - img [ref=e872]:
                  - generic [ref=e873]:
                    - generic [ref=e887]: Sensory Memory
                    - generic [ref=e893]: Sensory memory refers to the temporary retention of incoming perceptual signals, allowing attention and selection mechanisms to operate before higher-level processing occurs, by briefly holding raw inputs long enough for the system to decide what to attend to next.
                - paragraph [ref=e895]:
                  - text: In current foundation agents, sensory memory is typically not explicitly modeled. This is largely due to the highly abstracted nature of textual inputs, where perceptual processing has already been collapsed into symbolic or linguistic representations. In contrast to memory systems that encode stable knowledge, sensory memory functions as a transient interface between perception and cognition, operating over very short timescales and across multiple sensory modalities
                  - generic [ref=e896]:
                    - text: (Atkinson and Shiffrin,
                    - link "1968" [ref=e897] [cursor=pointer]:
                      - /url: https://arxiv.org/html/2602.06052v3#bib.bib245
                    - text: )
                  - text: . However, in multimodal or embodied agents, analogous mechanisms emerge in the form of short-lived perceptual buffers, such as caches of visual, auditory, or interaction embeddings. These buffers function as a sensory stage by temporarily retaining minimally processed observations before they are filtered, summarized, or routed to working memory for downstream reasoning and control.
                - paragraph [ref=e899]:
                  - text: Only a limited number of LLM agent works explicitly instantiate sensory memory as a distinct stage in their memory architectures. Hierarchical and multi-stage designs such as HMT
                  - generic [ref=e900]:
                    - text: (He et al.,
                    - link "2025b" [ref=e901] [cursor=pointer]:
                      - /url: https://arxiv.org/html/2602.06052v3#bib.bib171
                    - text: )
                  - text: ", LightMem"
                  - generic [ref=e902]:
                    - text: (Fang et al.,
                    - link "2025a" [ref=e903] [cursor=pointer]:
                      - /url: https://arxiv.org/html/2602.06052v3#bib.bib160
                    - text: )
                  - text: ", and M2PA"
                  - generic [ref=e904]:
                    - text: (Zhou et al.,
                    - link "2025b" [ref=e905] [cursor=pointer]:
                      - /url: https://arxiv.org/html/2602.06052v3#bib.bib170
                    - text: )
                  - text: model sensory memory as an initial buffer that retains recent, minimally processed inputs before selection, compression, or consolidation into downstream memory components. Beyond these explicit formulations, implicit sensory memory realizations are more commonly realized in streaming and embodied agents. Systems such as SAM2
                  - generic [ref=e906]:
                    - text: (Ravi et al.,
                    - link "2024" [ref=e907] [cursor=pointer]:
                      - /url: https://arxiv.org/html/2602.06052v3#bib.bib246
                    - text: )
                  - text: and ReSurgSAM2
                  - generic [ref=e908]:
                    - text: (Liu et al.,
                    - link "2025d" [ref=e909] [cursor=pointer]:
                      - /url: https://arxiv.org/html/2602.06052v3#bib.bib174
                    - text: )
                  - text: maintain short-term perceptual queues over recent video frames, while ReKV
                  - generic [ref=e910]:
                    - text: (Di et al.,
                    - link "2025" [ref=e911] [cursor=pointer]:
                      - /url: https://arxiv.org/html/2602.06052v3#bib.bib248
                    - text: )
                  - text: and V-Rex
                  - generic [ref=e912]:
                    - text: (Kim et al.,
                    - link "2025a" [ref=e913] [cursor=pointer]:
                      - /url: https://arxiv.org/html/2602.06052v3#bib.bib247
                    - text: )
                  - text: rely on streaming KV caches or memory queues to retain recent tokens or visual representations during online inference. Although these mechanisms are rarely labeled as sensory memory, they serve an analogous function by buffering recent observations to support perceptual continuity and computational efficiency, and are typically tightly coupled with working and semantic memory rather than implemented as standalone cognitive modules.
                - paragraph [ref=e915]:
                  - text: Despite its limited explicit treatment in current LLM agent research, sensory memory is likely to become increasingly important as agents are deployed in multimodal, embodied, and robotic settings. In such environments, agents must process continuous, high-bandwidth sensory streams, such as video frames, audio signals, and proprioception, under real-time and memory constraints
                  - generic [ref=e916]:
                    - text: (Black et al.,
                    - link "2025" [ref=e917] [cursor=pointer]:
                      - /url: https://arxiv.org/html/2602.06052v3#bib.bib254
                    - text: ; Bjorck et al.,
                    - link "2025" [ref=e918] [cursor=pointer]:
                      - /url: https://arxiv.org/html/2602.06052v3#bib.bib255
                    - text: ; Mon-Williams et al.,
                    - link "2025" [ref=e919] [cursor=pointer]:
                      - /url: https://arxiv.org/html/2602.06052v3#bib.bib256
                    - text: )
                  - text: . In these extensive embodied applications, sensory memory is often instantiated through sensory-level buffering and gating mechanisms, such as short-lived perceptual embedding buffers, attention-driven filtering, and temporal integration, rather than explicitly labeled cognitive modules. These designs reduce redundant computation, stabilize partially observable environments, and support principled consolidation from raw sensory input into working and episodic memory. As a result, more explicit modeling of sensory memory may become a key design for scalable embodied and robotic foundation agents.
                - generic [ref=e920]:
                  - heading "3.2.2 Working Memory" [level=4] [ref=e921]:
                    - generic [ref=e922]: 3.2.2
                    - text: Working Memory
                  - img [ref=e925]:
                    - generic [ref=e926]:
                      - generic [ref=e940]: Working Memory
                      - generic [ref=e946]:
                        - emphasis [ref=e947]: Working memory
                        - text: refers to a short-term memory mechanism that supports the temporary storage and active manipulation of information necessary for complex tasks such as reasoning, comprehension, and learning, enabling information to be actively maintained during ongoing operations.
                  - paragraph [ref=e949]:
                    - text: In the LLM-based agent setting, the core goal of working memory
                    - generic [ref=e950]:
                      - text: (Baddeley,
                      - link "2020" [ref=e951] [cursor=pointer]:
                        - /url: https://arxiv.org/html/2602.06052v3#bib.bib251
                      - text: )
                    - text: is to maintain and manipulate task-relevant state under strict online capacity constraints, such that multi-step reasoning and action can proceed without interruption. Since LLMs are inherently stateless, working memory provides the mechanism through which such state is explicitly carried and updated across interaction steps.
                  - paragraph [ref=e953]:
                    - text: Working memory in foundation agents is most commonly instantiated through the active context, which includes the prompt context, intermediate reasoning traces, tool outputs, and runtime states such as key-value caches that are accessible during inference. Within this instantiation, existing approaches differ in where they intervene during execution. One line of work focuses on how task-relevant state is represented before or as it is written into the active context. By compressing
                    - generic [ref=e954]:
                      - text: (Kang et al.,
                      - link "2025" [ref=e955] [cursor=pointer]:
                        - /url: https://arxiv.org/html/2602.06052v3#bib.bib141
                      - text: ; Wu et al.,
                      - link "2025c" [ref=e956] [cursor=pointer]:
                        - /url: https://arxiv.org/html/2602.06052v3#bib.bib136
                      - text: )
                    - text: ", restructuring"
                    - generic [ref=e957]:
                      - text: (Sun et al.,
                      - link "2025b" [ref=e958] [cursor=pointer]:
                        - /url: https://arxiv.org/html/2602.06052v3#bib.bib153
                      - text: ; Ye et al.,
                      - link "2025b" [ref=e959] [cursor=pointer]:
                        - /url: https://arxiv.org/html/2602.06052v3#bib.bib357
                      - text: )
                    - text: ", or abstracting interaction history"
                    - generic [ref=e960]:
                      - text: (Labate et al.,
                      - link "2025" [ref=e961] [cursor=pointer]:
                        - /url: https://arxiv.org/html/2602.06052v3#bib.bib252
                      - text: )
                    - text: ", these methods aim to delay or avoid context saturation at the source. Specifically,"
                    - generic [ref=e962]:
                      - text: (Labate et al.,
                      - link "2025" [ref=e963] [cursor=pointer]:
                        - /url: https://arxiv.org/html/2602.06052v3#bib.bib252
                      - text: )
                    - text: replaces large intermediate outputs with lightweight references, while
                    - generic [ref=e964]:
                      - text: (Kang et al.,
                      - link "2025" [ref=e965] [cursor=pointer]:
                        - /url: https://arxiv.org/html/2602.06052v3#bib.bib141
                      - text: ; Wu et al.,
                      - link "2025c" [ref=e966] [cursor=pointer]:
                        - /url: https://arxiv.org/html/2602.06052v3#bib.bib136
                      - text: ; Sun et al.,
                      - link "2025b" [ref=e967] [cursor=pointer]:
                        - /url: https://arxiv.org/html/2602.06052v3#bib.bib153
                      - text: ; Ye et al.,
                      - link "2025b" [ref=e968] [cursor=pointer]:
                        - /url: https://arxiv.org/html/2602.06052v3#bib.bib357
                      - text: )
                    - text: periodically summarize or fold completed reasoning segments to maintain a compact working context. A second line of work addresses the problem after working state has already accumulated. These approaches study how task-relevant state can be continuously maintained, updated, or evicted under a fixed online budget during execution. They include agent-level policies that explicitly decide memory updates
                    - generic [ref=e969]:
                      - text: (Zhang et al.,
                      - link "2025l" [ref=e970] [cursor=pointer]:
                        - /url: https://arxiv.org/html/2602.06052v3#bib.bib154
                      - text: ; Yuan et al.,
                      - link "2025a" [ref=e971] [cursor=pointer]:
                        - /url: https://arxiv.org/html/2602.06052v3#bib.bib466
                      - text: )
                    - text: and system-level mechanisms that manage runtime states such as key-value caches and scheduling
                    - generic [ref=e972]:
                      - text: (Kim et al.,
                      - link "2025b" [ref=e973] [cursor=pointer]:
                        - /url: https://arxiv.org/html/2602.06052v3#bib.bib151
                      - text: ; Liu et al.,
                      - link "2025i" [ref=e974] [cursor=pointer]:
                        - /url: https://arxiv.org/html/2602.06052v3#bib.bib112
                      - text: ; Kwon et al.,
                      - link "2023" [ref=e975] [cursor=pointer]:
                        - /url: https://arxiv.org/html/2602.06052v3#bib.bib74
                      - text: ; Ni et al.,
                      - link "2025" [ref=e976] [cursor=pointer]:
                        - /url: https://arxiv.org/html/2602.06052v3#bib.bib249
                      - text: )
                    - text: .
                  - paragraph [ref=e978]: In summary, working memory in foundation agents serves as the agent’s online workspace, realized through the active context under strict capacity constraints. Rather than treating longer context windows as the sole solution, existing work shows that sustaining coherent long-horizon reasoning depends on selectively retaining and manipulating task-relevant state during execution. This shift reframes working memory from a passive context buffer to an actively managed computational resource. As agents scale to longer horizons and more complex interaction settings, progress in working memory will increasingly hinge on principled state selection and transformation, rather than unbounded context expansion.
                  - generic [ref=e979]:
                    - heading "3.2.3 Episodic Memory" [level=4] [ref=e980]:
                      - generic [ref=e981]: 3.2.3
                      - text: Episodic Memory
                    - img [ref=e984]:
                      - generic [ref=e985]:
                        - generic [ref=e999]: Episodic Memory
                        - generic [ref=e1005]:
                          - emphasis [ref=e1006]: Episodic memory
                          - text: refers to a form of long-term memory dedicated to persistent agents’ interactive experiences across sessions. It records specific events in particular temporal and environmental contexts, typically organized as interaction trajectories with action sequences and associated feedback.
                    - paragraph [ref=e1008]:
                      - text: The primary role of episodic memory in foundation agents is to preserve historical interaction contexts and outcomes over extended time horizons, enabling agents to reference past experiences when relevant to ongoing interactions or decision making
                      - generic [ref=e1009]:
                        - text: (Tulving,
                        - link "1983" [ref=e1010] [cursor=pointer]:
                          - /url: https://arxiv.org/html/2602.06052v3#bib.bib261
                        - text: ;
                        - link "2002" [ref=e1011] [cursor=pointer]:
                          - /url: https://arxiv.org/html/2602.06052v3#bib.bib262
                        - text: )
                      - text: . By maintaining access to concrete past experiences, episodic memory supports background reconstruction and cross-session continuity in dynamic environments. This allows agents to ground their behavior in previously observed situations, maintain consistency across repeated interactions, and recover relevant context that would otherwise be lost between sessions.
                    - paragraph [ref=e1013]:
                      - text: Episodic memory in foundation agents is most commonly instantiated as an explicit experience repository that accumulates interaction histories across sessions and can be accessed by the agent when needed. From a methodological perspective, existing work on episodic memory in foundation agents can be grouped into two dominant lines of research based on their primary focus. One line of work focuses on episode recording, namely how historical interactions across sessions are organized into coherent episodic records that preserve event structure and situational context. For cross-session interaction histories,
                      - generic [ref=e1014]:
                        - text: (Rajesh et al.,
                        - link "2025" [ref=e1015] [cursor=pointer]:
                          - /url: https://arxiv.org/html/2602.06052v3#bib.bib167
                        - text: )
                      - text: emphasizes selective episode writing and structured organization of past interactions, making what to store and how to organize episodic content explicit. For long video understanding,
                      - generic [ref=e1016]:
                        - text: (Yeo et al.,
                        - link "2025a" [ref=e1017] [cursor=pointer]:
                          - /url: https://arxiv.org/html/2602.06052v3#bib.bib260
                        - text: )
                      - text: constructs episodic records by organizing events together with their temporal and causal relations, enabling coherent episode-level representations of extended visual experiences. More broadly,
                      - generic [ref=e1018]:
                        - text: (Yeo et al.,
                        - link "2025b" [ref=e1019] [cursor=pointer]:
                          - /url: https://arxiv.org/html/2602.06052v3#bib.bib356
                        - text: )
                      - text: represents episodic events at multiple temporal scales, allowing episode formation and access to adapt to different levels of granularity.
                      - generic [ref=e1020]:
                        - text: (Anokhin et al.,
                        - link "2024" [ref=e1021] [cursor=pointer]:
                          - /url: https://arxiv.org/html/2602.06052v3#bib.bib207
                        - text: )
                      - text: links episodic observations with semantic anchors, enabling episodic recall during planning. A second line of work focuses on retrieval and reflection, namely how stored episodes are triggered, selected, and leveraged at decision time.
                      - generic [ref=e1022]:
                        - text: (Yeo et al.,
                        - link "2025b" [ref=e1023] [cursor=pointer]:
                          - /url: https://arxiv.org/html/2602.06052v3#bib.bib356
                        - text: )
                      - text: formulates episodic retrieval as an adaptive process that iteratively selects a memory source and temporal scale conditioned on the query and retrieval history.
                      - generic [ref=e1024]:
                        - text: (Latimer et al.,
                        - link "2025" [ref=e1025] [cursor=pointer]:
                          - /url: https://arxiv.org/html/2602.06052v3#bib.bib263
                        - text: )
                      - text: defines explicit recall and reflection operations that retrieve episodes based on their relevance to the current reasoning context and use them to guide subsequent behavior. In tool-use settings,
                      - generic [ref=e1026]:
                        - text: (Li et al.,
                        - link "2025f" [ref=e1027] [cursor=pointer]:
                          - /url: https://arxiv.org/html/2602.06052v3#bib.bib264
                        - text: )
                      - text: retrieves episodic experience by matching the current execution state against structured representations induced from past trajectories. For multi-session dialogue,
                      - generic [ref=e1028]:
                        - text: (Sarin et al.,
                        - link "2025" [ref=e1029] [cursor=pointer]:
                          - /url: https://arxiv.org/html/2602.06052v3#bib.bib381
                        - text: )
                      - text: triggers episodic retrieval using session-level context and user state cues to recall relevant episodic summaries across sessions. Finally,
                      - generic [ref=e1030]:
                        - text: (Alqithami,
                        - link "2025" [ref=e1031] [cursor=pointer]:
                          - /url: https://arxiv.org/html/2602.06052v3#bib.bib265
                        - text: )
                      - text: shows that retention policies under fixed memory budgets directly shape which episodes remain retrievable over long horizons.
                    - paragraph [ref=e1033]: "Overall, episodic memory research in foundation agents centers on preserving concrete interaction experiences across sessions and enabling selective access to those experiences at decision time. Existing work primarily addresses two methodological questions: episode recording and episodic retrieval or reflection. Open problems include how agents should define episode boundaries, regulate the influence of episodic recall during reasoning, and manage long-term retention as episodic memory scales."
                    - generic [ref=e1034]:
                      - heading "3.2.4 Semantic Memory" [level=4] [ref=e1035]:
                        - generic [ref=e1036]: 3.2.4
                        - text: Semantic Memory
                      - img [ref=e1039]:
                        - generic [ref=e1040]:
                          - generic [ref=e1054]: Semantic Memory
                          - generic [ref=e1060]:
                            - emphasis [ref=e1061]: Semantic memory
                            - text: refers to a form of long-term memory dedicated to the storage of abstract facts, general concepts, and structured knowledge. It provides agents with decontextualized information that remains stable over time and can be reused across different situations and objectives.
                      - paragraph [ref=e1063]:
                        - text: In foundation agent architectures, semantic memory functions as a stable knowledge base that supports knowing-what factual reasoning
                        - generic [ref=e1064]:
                          - text: (Tulving,
                          - link "1972" [ref=e1065] [cursor=pointer]:
                            - /url: https://arxiv.org/html/2602.06052v3#bib.bib242
                          - text: )
                        - text: . Its content is typically derived through the distillation and decontextualization of recurring facts accumulated in episodic memory. When an agent encounters similar knowledge patterns across multiple tasks, fragmented factual information from individual experiences is consolidated into universal concepts, entity relations, or attribute summaries via summarization mechanisms. This semanticization process equips the agent with a knowledge substrate analogous to an encyclopedia or technical manual. By enabling direct access to verified conceptual knowledge rather than repeated retrieval of raw interaction logs, semantic memory provides a coherent and reliable factual foundation for complex reasoning and decision-making. Importantly, in long-horizon agent settings, semantic memory is not static but subject to continual access, revision, and control as new information accumulates.
                      - paragraph [ref=e1067]:
                        - text: Existing semantic memory approaches mainly differ in how abstract knowledge is constructed and stabilized, and how it is selected, validated, and maintained as agents reason over long horizons. One line of work focuses on knowledge induction and organization, studying how stable, decontextualized knowledge is distilled from interactions, documents, or external evidence and stored in forms that can be reliably reused by agents. Representative approaches organize semantic knowledge using hierarchical schemas
                        - generic [ref=e1068]:
                          - text: (Zhao et al.,
                          - link "2025a" [ref=e1069] [cursor=pointer]:
