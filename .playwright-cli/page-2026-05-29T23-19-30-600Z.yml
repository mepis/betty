                                - generic [ref=e1474]:
                                  - heading "4.1.5 Forgetting and Retention" [level=4] [ref=e1475]:
                                    - generic [ref=e1476]: 4.1.5
                                    - text: Forgetting and Retention
                                  - paragraph [ref=e1478]:
                                    - text: In agent systems, memory relevance evolves over time as task objectives change and environments become non-stationary, making indiscriminate memory accumulation increasingly misaligned with effective long-term reasoning. Forgetting mechanisms address this challenge by reducing the influence of obsolete or low-utility information through explicitly removing or suppressing memory entries that are no longer aligned with an agent’s ongoing objectives. In practice, forgetting is commonly implemented via heuristic policies such as recency-based decay or importance thresholds, as well as learned strategies that optimize memory removal under explicit resource or efficiency constraints
                                    - generic [ref=e1479]:
                                      - text: (Alla et al.,
                                      - link "2025" [ref=e1480] [cursor=pointer]:
                                        - /url: https://arxiv.org/html/2602.06052v3#bib.bib216
                                      - text: ; Wang et al.,
                                      - link "2025o" [ref=e1481] [cursor=pointer]:
                                        - /url: https://arxiv.org/html/2602.06052v3#bib.bib212
                                      - text: )
                                    - text: . In contrast, retention mechanisms determine which memories should be preserved and prioritized over extended interaction horizons, ensuring that task-relevant knowledge remains accessible despite continual memory growth. Recent work emphasizes adaptive retention strategies, where agents dynamically adjust preservation priorities based on task context, feedback signals, or long-term performance objectives, enabling robust behavior in non-stationary environments
                                    - generic [ref=e1482]:
                                      - text: (Yan et al.,
                                      - link "2025b" [ref=e1483] [cursor=pointer]:
                                        - /url: https://arxiv.org/html/2602.06052v3#bib.bib135
                                      - text: ; Zheng et al.,
                                      - link "2025a" [ref=e1484] [cursor=pointer]:
