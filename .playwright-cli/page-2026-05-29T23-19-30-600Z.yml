                                                      - link "7.1" [ref=e1988] [cursor=pointer]:
                                                        - /url: https://arxiv.org/html/2602.06052v3#S7.SS1
                                                      - text: . In addition, we collect the commonly used benchmark to assess the foundation agent’s performance, as shown in Section
                                                      - link "7.2" [ref=e1989] [cursor=pointer]:
