                              - emphasis [ref=e1123]: Procedural memory
                              - text: refers to a form of long-term memory dedicated to how to perform tasks. It encodes operational skills, execution strategies, and automated routines for specific scenarios. Unlike memory that stores factual knowledge or raw event information, it abstracts complex action sequences into reusable patterns, enabling agents to complete tasks efficiently and coherently.
                        - paragraph [ref=e1125]:
                          - text: In foundation agent architectures, procedural memory is typically reflected in the execution layer, where repeated action sequences, decision rules, or workflows shape how high-level decisions are carried out. Rather than being tied to a single memory substrate, such knowledge may be distilled from prior executions, learned through optimization, or shared across agents. As execution experience accumulates, short-lived action states can be consolidated into reusable skills or routines, allowing agents to execute tasks more consistently over long interaction horizons
