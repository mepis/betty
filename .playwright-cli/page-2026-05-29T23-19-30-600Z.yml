                                                                      - generic [ref=e2827]:
                                                                        - generic [ref=e2828]: "Table 4:"
                                                                        - text: "Overview of agent-centric task benchmarks. Env—TEXT: Text/Document; WEB: Web; OS: Operating System/Desktop; APP: Application/API-centric; CODE: Code/Software Engineering; ROBOT: Embodied Robotics; GAME: Game/Simulation; VIDEO: Video (long-form); PAPER: Scientific Paper/Research. Interact—QA: Question Answering; MT: Multi-turn; GUI: Graphical UI; API: Tool/API Invocation; EXEC: Execution-based; MM: Multimodal; ACT: Action/Control. Data—REAL: real-world; SIM: simulated/synthetic; MIX: mixed real+sim. Abilities—MHOP: Multi-hop Reasoning; PLAN: Planning/Acting; STATE: State Tracking; GROUND: Grounding; TOOL: Tool Use; DEBUG: Debugging; CODEGEN: Code Generation; PATCH: Patch/Repair; TEMP: Temporal Reasoning; DIAL: Dialogue Management; TTL: Test-Time Learning. Evaluation—SR: Success Rate / Solve Rate; PR: Pass Rate; GC: Goal Success; RR: Resolved Rate; LCRR: Longest Consecutive Correct Sequence."
