                                              - text: )
                                            - text: defines atomic memory operations such as adding, updating, deleting, or skipping entries, and learns a memory policy that selects among these actions based on task-level rewards. MemAct
                                            - generic [ref=e1768]:
                                              - text: (Zhang et al.,
                                              - link "2025l" [ref=e1769] [cursor=pointer]:
                                                - /url: https://arxiv.org/html/2602.06052v3#bib.bib154
                                              - text: )
                                            - text: extends this formulation by incorporating finer-grained editing actions, including trimming and summarization, directly into the agent’s unified policy space. A closely related problem concerns step-level memory decisions under explicit capacity constraints. MemAgent
                                            - generic [ref=e1770]:
                                              - text: (Yu et al.,
                                              - link "2025b" [ref=e1771] [cursor=pointer]:
                                                - /url: https://arxiv.org/html/2602.06052v3#bib.bib128
                                              - text: )
                                            - text: and RMM
                                            - generic [ref=e1772]:
