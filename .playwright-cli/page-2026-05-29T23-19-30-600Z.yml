                                  - paragraph [ref=e1583]:
                                    - text: "Building on multi-agent architecture and memory routing, memory isolation is very important because memory is read and written by multiple agents rather than updated in a single, sequential loop. Multiple agents may produce conclusions in parallel, and their accessible resources and permissions often change over time. The system writes all the information into the same shared pool without any separation and make it visible to every agent, and there might be consistency conflicts: different agents may write facts that contradict each other, and outdated information may not be removed and still retrieved later, which can mislead reasoning. Agents Thinking Fast and Slow"
