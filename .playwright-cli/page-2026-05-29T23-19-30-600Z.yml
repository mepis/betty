                          - text: )
                        - text: or auxiliary parameters
                        - generic [ref=e1080]:
                          - text: (Wang et al.,
                          - link "2025n" [ref=e1081] [cursor=pointer]:
                            - /url: https://arxiv.org/html/2602.06052v3#bib.bib102
                          - text: ; Pouransari et al.,
                          - link "2025" [ref=e1082] [cursor=pointer]:
                            - /url: https://arxiv.org/html/2602.06052v3#bib.bib143
                          - text: )
                        - text: ", emphasizing compact representations and fast reuse without relying on explicit external structures. A second line of work focuses on how semantic knowledge is activated, validated, and updated during agent reasoning as new evidence accumulates. Representative approaches treat semantic access as a decision-time control process in which abstract knowledge is selectively chosen, checked for applicability, and applied to the current reasoning state, rather than retrieved through a fixed similarity lookup"
                        - generic [ref=e1083]:
