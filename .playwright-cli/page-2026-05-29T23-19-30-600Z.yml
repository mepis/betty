                                                                - /url: https://arxiv.org/html/2602.06052v3#bib.bib427
                                                              - text: )
                                                            - text: ", while others are open-ended (dialogue"
                                                            - generic [ref=e2302]:
                                                              - text: (Budzianowski et al.,
                                                              - link "2018" [ref=e2303] [cursor=pointer]:
                                                                - /url: https://arxiv.org/html/2602.06052v3#bib.bib545
                                                              - text: )
                                                            - text: ", summarization"
                                                            - generic [ref=e2304]:
                                                              - text: (Maharana et al.,
                                                              - link "2024" [ref=e2305] [cursor=pointer]:
                                                                - /url: https://arxiv.org/html/2602.06052v3#bib.bib279
                                                              - text: )
                                                            - text: ", preference following"
