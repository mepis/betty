                                      - generic [ref=e1754]:
                                        - heading "5.3 Reinforcement Learning for Memory Policies" [level=3] [ref=e1755]:
                                          - generic [ref=e1756]: "5.3"
                                          - text: Reinforcement Learning for Memory Policies
                                        - paragraph [ref=e1758]: Reinforcement learning introduces a fundamentally different paradigm for memory control by enabling memory policies to be optimized through interaction and reward feedback. Unlike prompt-based or supervised approaches, RL allows downstream task outcomes to influence earlier memory-related decisions, making memory construction itself a learnable policy. Existing work can be understood as progressively extending the temporal scope over which reinforcement signals shape memory behavior.
                                        - generic [ref=e1759]:
                                          - heading "5.3.1 Step-Level Memory Decisions" [level=4] [ref=e1760]:
                                            - generic [ref=e1761]: 5.3.1
                                            - text: Step-Level Memory Decisions
                                          - paragraph [ref=e1763]: At the shortest temporal scope, reinforcement learning is applied to memory control by treating memory management as a sequence of step-level decisions. In this setting, memory operations are modeled as actions selected by a learning policy and optimized based on their immediate or short-horizon impact on task reward.
                                          - paragraph [ref=e1765]:
