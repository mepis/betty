              - paragraph [ref=e634]:
                - text: Latent-state memory is implemented by carrying forward and reusing intermediate hidden states across steps or segments. Earlier activations can directly impact later computation even when the raw tokens are no longer in the window. The intermediate activations or hidden-state tensors are produced as information flows through layers during the forward pass process
