                                                                          - /url: https://arxiv.org/html/2602.06052v3#bib.bib607
                                                                        - text: )
                                                                      - text: ": Fact Extraction (FE) is the ability to identify and store reusable facts from dialogue (e.g., user attributes, constraints, key events) so they can be recalled later; Multi-Session Reasoning (MR) requires integrating evidence that is distributed across multiple sessions and turns rather than contained in a single section; Temporal Reasoning (TR) covers reasoning over time series (ordering, timestamps, recency) and selecting the correct state when information changes; Update & Refresh (UR) captures explicitly revising memory when new evidence contradicts old content (overwriting outdated facts and following the latest state under conflicts); Compression & Summarization (CS) is the ability to condense long interaction histories into compact memory representations that remain faithful and usable; Forgetting & Retention (FR) reflects maintaining long-range information while selectively forgetting obsolete or irrelevant content to reduce interference; User Facts & Preferences (UP) focuses on user-centric memory subjects (persona, preferences, relationships, recurring habits or events) and their evolution; Assistant Facts (AS) tracks the assistant’s own prior statements, recommendations, or commitments so the agent maintains coherence with what it previously said; Implicit Inference and Connection (IC) measures whether the agent can link scattered clues and perform multi-hop or implicit inference (e.g., applying a previously mentioned limitation to a new recommendation without being reminded); and Abstain & Boundary Handling (AB) measures recognizing unknown or unanswerable cases, conflicts, or false premises and avoiding fabrication. For example, explicitly saying “I don’t know” when the needed information was never stated."
                                                                    - paragraph [ref=e2775]:
                                                                      - text: A key pattern in Table
                                                                      - link "3" [ref=e2776] [cursor=pointer]:
                                                                        - /url: https://arxiv.org/html/2602.06052v3#S7.T3
                                                                      - text: is that MR and UP are the most consistently covered abilities, reflecting the dominant framing of user memory as retrieving user-related facts from long dialogue and using them later. In contrast, operational abilities are much less uniformly defined. Early long dialogue benchmarks such as MSC
                                                                      - generic [ref=e2777]:
                                                                        - text: (Xu et al.,
                                                                        - link "2022a" [ref=e2778] [cursor=pointer]:
                                                                          - /url: https://arxiv.org/html/2602.06052v3#bib.bib327
                                                                        - text: )
                                                                      - text: and DuLeMon
                                                                      - generic [ref=e2779]:
                                                                        - text: (Xu et al.,
                                                                        - link "2022b" [ref=e2780] [cursor=pointer]:
                                                                          - /url: https://arxiv.org/html/2602.06052v3#bib.bib411
                                                                        - text: )
                                                                      - text: emphasize multi-session coherence and persona usage, but their evaluation relies heavily on similarity-based or generated-based metrics (e.g., BLEU, Distinct-n, Perplexity, ROUGE), which weakly isolates memory. Fluency and generic helpfulness can mask incorrect recall, making FE, UR, and FR difficult to attribute. Newer benchmarks increasingly move toward mechanism attributable evaluation by defining specific task types or assessments. MemoryBank
                                                                      - generic [ref=e2781]:
                                                                        - text: (Zhong et al.,
                                                                        - link "2024" [ref=e2782] [cursor=pointer]:
                                                                          - /url: https://arxiv.org/html/2602.06052v3#bib.bib62
                                                                        - text: )
                                                                      - text: and HaluMem
                                                                      - generic [ref=e2783]:
                                                                        - text: (Chen et al.,
                                                                        - link "2025a" [ref=e2784] [cursor=pointer]:
                                                                          - /url: https://arxiv.org/html/2602.06052v3#bib.bib415
                                                                        - text: )
                                                                      - text: introduce explicit memory records and operation-level searching, turning extraction, updating, and memory integrity failures into measurable targets. LongMemEval
                                                                      - generic [ref=e2785]:
                                                                        - text: (Wu et al.,
                                                                        - link "2025a" [ref=e2786] [cursor=pointer]:
                                                                          - /url: https://arxiv.org/html/2602.06052v3#bib.bib414
                                                                        - text: )
                                                                      - text: further strengthens attribution by explicitly categorizing question types according to memory abilities, enabling cleaner localization of failures to temporal reasoning, updating, or abstention behaviors. However, CS and FR remain comparatively under systematically evaluated in the current benchmark designs. Compression is explicit in only a few benchmarks
                                                                      - generic [ref=e2787]:
                                                                        - text: (Hu et al.,
                                                                        - link "2025c" [ref=e2788] [cursor=pointer]:
                                                                          - /url: https://arxiv.org/html/2602.06052v3#bib.bib215
                                                                        - text: )
                                                                      - text: ", and selective forgetting or retention"
                                                                      - generic [ref=e2789]:
                                                                        - text: (Jia et al.,
                                                                        - link "2025b" [ref=e2790] [cursor=pointer]:
                                                                          - /url: https://arxiv.org/html/2602.06052v3#bib.bib321
                                                                        - text: )
                                                                      - text: is frequently partial or absent, despite being essential for long-horizon assistants operating under finite memory budgets and evolving user states. AB is also inconsistently required
                                                                      - generic [ref=e2791]:
                                                                        - text: (Ai et al.,
                                                                        - link "2025" [ref=e2792] [cursor=pointer]:
                                                                          - /url: https://arxiv.org/html/2602.06052v3#bib.bib601
                                                                        - text: ; Jiang et al.,
                                                                        - link "2025a" [ref=e2793] [cursor=pointer]:
                                                                          - /url: https://arxiv.org/html/2602.06052v3#bib.bib416
                                                                        - text: )
                                                                      - text: . Only a few benchmarks explicitly reward abstention under missing evidence, leaving a gap for evaluating safe memory behavior that prevents confident hallucinations.
                                                                    - paragraph [ref=e2795]:
                                                                      - text: Evaluation in Table
                                                                      - link "3" [ref=e2796] [cursor=pointer]:
                                                                        - /url: https://arxiv.org/html/2602.06052v3#S7.T3
                                                                      - text: follows several main aspects that reflect how much evaluation the benchmark provides. First, many benchmarks reduce evaluation to answer-level correctness on ground truth questions, reporting accuracy and F1 (e.g., PerLTQA
                                                                      - generic [ref=e2797]:
                                                                        - text: (Du et al.,
                                                                        - link "2024" [ref=e2798] [cursor=pointer]:
                                                                          - /url: https://arxiv.org/html/2602.06052v3#bib.bib412
                                                                        - text: )
                                                                      - text: ", LoCoMo"
                                                                      - generic [ref=e2799]:
                                                                        - text: (Maharana et al.,
                                                                        - link "2024" [ref=e2800] [cursor=pointer]:
                                                                          - /url: https://arxiv.org/html/2602.06052v3#bib.bib279
                                                                        - text: )
                                                                      - text: ", DialSim"
                                                                      - generic [ref=e2801]:
                                                                        - text: (Kim et al.,
                                                                        - link "2024a" [ref=e2802] [cursor=pointer]:
                                                                          - /url: https://arxiv.org/html/2602.06052v3#bib.bib413
                                                                        - text: )
                                                                      - text: ", PersonaMem"
                                                                      - generic [ref=e2803]:
                                                                        - text: (Jiang et al.,
                                                                        - link "2025a" [ref=e2804] [cursor=pointer]:
                                                                          - /url: https://arxiv.org/html/2602.06052v3#bib.bib416
                                                                        - text: )
                                                                      - text: ", MemoryAgentBench"
                                                                      - generic [ref=e2805]:
                                                                        - text: (Hu et al.,
                                                                        - link "2025c" [ref=e2806] [cursor=pointer]:
                                                                          - /url: https://arxiv.org/html/2602.06052v3#bib.bib215
                                                                        - text: )
                                                                      - text: ), and in some cases, using retrieval-style scoring such as Recall@K or ranked relevance metrics (MAP/NDCG@K) when the task is explicitly formed as selecting supporting memories rather than generating free-form text (e.g., PerLTQA
                                                                      - generic [ref=e2807]:
                                                                        - text: (Du et al.,
                                                                        - link "2024" [ref=e2808] [cursor=pointer]:
                                                                          - /url: https://arxiv.org/html/2602.06052v3#bib.bib412
                                                                        - text: )
                                                                      - text: ", LongMemEval"
                                                                      - generic [ref=e2809]:
                                                                        - text: (Wu et al.,
                                                                        - link "2025a" [ref=e2810] [cursor=pointer]:
                                                                          - /url: https://arxiv.org/html/2602.06052v3#bib.bib414
                                                                        - text: )
                                                                      - text: ). Second, several user-centric benchmarks introduce memory-specific assessment that goes beyond final answers and directly evaluates memory system behavior. HaluMem reports memory accuracy and integrity as well as false memory rate to quantify hallucinated or incorrect memory operations
                                                                      - generic [ref=e2811]:
                                                                        - text: (Chen et al.,
                                                                        - link "2025a" [ref=e2812] [cursor=pointer]:
                                                                          - /url: https://arxiv.org/html/2602.06052v3#bib.bib415
                                                                        - text: )
                                                                      - text: ", LOCCO"
                                                                      - generic [ref=e2813]:
                                                                        - text: (Jia et al.,
                                                                        - link "2025b" [ref=e2814] [cursor=pointer]:
                                                                          - /url: https://arxiv.org/html/2602.06052v3#bib.bib321
                                                                        - text: )
                                                                      - text: reports memory retention (MRS), and MemBench
                                                                      - generic [ref=e2815]:
                                                                        - text: (Tan et al.,
                                                                        - link "2025a" [ref=e2816] [cursor=pointer]:
                                                                          - /url: https://arxiv.org/html/2602.06052v3#bib.bib617
                                                                        - text: )
                                                                      - text: explicitly measures capacity and efficiency to capture performance and cost trade-offs under fixed memory budgets. Third, when outputs are open-ended or reference answers are insufficient, benchmarks increasingly rely on LLM-as-a-judge to score response correctness or preference adherence (e.g., LongMemEval
                                                                      - generic [ref=e2817]:
                                                                        - text: (Wu et al.,
                                                                        - link "2025a" [ref=e2818] [cursor=pointer]:
                                                                          - /url: https://arxiv.org/html/2602.06052v3#bib.bib414
                                                                        - text: )
                                                                      - text: ", PrefEval"
                                                                      - generic [ref=e2819]:
                                                                        - text: (Zhao et al.,
                                                                        - link "2025b" [ref=e2820] [cursor=pointer]:
                                                                          - /url: https://arxiv.org/html/2602.06052v3#bib.bib417
                                                                        - text: )
                                                                      - text: ", and MemoryBench"
                                                                      - generic [ref=e2821]:
                                                                        - text: (Ai et al.,
                                                                        - link "2025" [ref=e2822] [cursor=pointer]:
                                                                          - /url: https://arxiv.org/html/2602.06052v3#bib.bib601
                                                                        - text: )
                                                                      - text: ). Compared to exact-match scoring, judge-based evaluation expands coverage to realistic assistant behavior, but it is more sensitive to the evaluator model and rubric.
                                                                  - generic [ref=e2823]:
