                                                                    - paragraph [ref=e3408]:
                                                                      - text: Agent-centric benchmarks evaluate a foundation model as a
                                                                      - emphasis [ref=e3409]: semi-autonomous agent
                                                                      - text: "that must execute multi-step actions in an environment to reach a clearly specified goal, rather than only producing a response to a static prompt. These benchmarks typically provide a task specification (e.g., an initial state with constraints) together with an objective success checker, and summarize performance with end-to-end metrics such as Accuracy/F1 for text QA tasks or Success Rate (SR) for interactive environments. Because correctness is defined by the environment’s state, the target outcome is largely user-invariant: under the same task setting, different users issuing the same request should obtain the same completion signal, even if the agent follows different trajectories"
                                                                      - generic [ref=e3410]:
                                                                        - text: (Trivedi et al.,
                                                                        - link "2024" [ref=e3411] [cursor=pointer]:
                                                                          - /url: https://arxiv.org/html/2602.06052v3#bib.bib591
                                                                        - text: ; Zhou et al.,
                                                                        - link "2024" [ref=e3412] [cursor=pointer]:
                                                                          - /url: https://arxiv.org/html/2602.06052v3#bib.bib35
                                                                        - text: )
                                                                      - text: .
                                                                    - paragraph [ref=e3414]:
                                                                      - text: We summarize commonly used agent-centric benchmarks in Table
                                                                      - link "4" [ref=e3415] [cursor=pointer]:
                                                                        - /url: https://arxiv.org/html/2602.06052v3#S7.T4
                                                                      - text: . Beyond tagging each benchmark by task environment (Env) and interface (Interact), we further annotate (i) resource type, indicating whether the task world and evidence are constructed with real-world or simulated data , or a hybrid of both, and (ii) core agent abilities (Abilities) most directly exercised by the benchmark. We define a set of
                                                                      - emphasis [ref=e3416]: core ability tags
                                                                      - text: "commonly used to characterize agent and memory benchmarks: TEMP (temporal/sequence reasoning over event order and time dependencies), STATE (tracking and updating environment/task state across multi-step interaction), GROUND (grounding natural-language instructions into concrete environment targets/actions), PLAN (planning and re-planning multi-step actions toward a goal), TOOL (selecting and correctly invoking tools/APIs to solve subtasks), MHOP (multi-hop reasoning that composes multiple pieces of evidence), DIAL (goal-directed dialogue management such as clarification and consistency across turns), and ACT (executing correct environment actions such as click/type/select and producing a successful trajectory); optionally, TTL denotes test-time learning, where agents improve later performance by accumulating experience in memory"
                                                                      - emphasis [ref=e3417]: without
                                                                      - text: parameter updates. In these works, memory is treated as a tool and module for cross-session knowledge transfer and experiment sharing, enabling agents to preserve intermediate findings, tool outputs, and state updates across long horizons and limited context windows to improve downstream task completion ability.
                                                                    - paragraph [ref=e3419]:
                                                                      - text: Across environments, agent-centric evaluation covers TEXT/WEB information seeking
                                                                      - generic [ref=e3420]:
                                                                        - text: (Yang et al.,
                                                                        - link "2018" [ref=e3421] [cursor=pointer]:
                                                                          - /url: https://arxiv.org/html/2602.06052v3#bib.bib418
                                                                        - text: ; Trivedi et al.,
                                                                        - link "2022" [ref=e3422] [cursor=pointer]:
                                                                          - /url: https://arxiv.org/html/2602.06052v3#bib.bib421
                                                                        - text: ; Deng et al.,
                                                                        - link "2023" [ref=e3423] [cursor=pointer]:
                                                                          - /url: https://arxiv.org/html/2602.06052v3#bib.bib431
                                                                        - text: ; Yao et al.,
                                                                        - link "2022" [ref=e3424] [cursor=pointer]:
                                                                          - /url: https://arxiv.org/html/2602.06052v3#bib.bib430
                                                                        - text: ; Mialon et al.,
                                                                        - link "2024" [ref=e3425] [cursor=pointer]:
                                                                          - /url: https://arxiv.org/html/2602.06052v3#bib.bib423
                                                                        - text: )
                                                                      - text: ", OS/APP computer use"
                                                                      - generic [ref=e3426]:
                                                                        - text: (Xie et al.,
                                                                        - link "2024" [ref=e3427] [cursor=pointer]:
                                                                          - /url: https://arxiv.org/html/2602.06052v3#bib.bib422
                                                                        - text: ; Trivedi et al.,
                                                                        - link "2024" [ref=e3428] [cursor=pointer]:
                                                                          - /url: https://arxiv.org/html/2602.06052v3#bib.bib591
                                                                        - text: ; Yao et al.,
