                                                                        - text: Legal and Consulting. In legal and consulting services, agents must navigate massive volumes of heterogeneous documents, where the precise provenance of every claim is mandatory. Memory is the cognitive substrate that allows these agents to perform multi-step reasoning over long-duration cases, ensuring that advice remains consistent with previously cited statutes or client history. For instance, MALR
