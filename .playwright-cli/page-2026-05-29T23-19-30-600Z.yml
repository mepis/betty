                                                - /url: https://arxiv.org/html/2602.06052v3#bib.bib168
                                              - text: )
                                            - text: ", which encode experience as transferable decision knowledge learned through interaction. Crucially, such experience is retrieved and applied in a context-dependent manner governed by reinforcement learning, as exemplified by reflective retrieval policies in Retroformer"
