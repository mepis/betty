                                        - text: )
                                      - text: ", the orchestrator keeps the global state, generates the next subtask, selects an agent to execute it, and updates the state using the agent’s summary; memory is scheduled in the same way, with task memories injected to the orchestrator for planning and subtask memories routed to the selected agent for execution. GameGPT"
