                                                  - generic [ref=e1945]: 6.2.3
                                                  - text: Scaling with Environment Quantity
                                                - generic [ref=e1946]:
                                                  - heading "Memory as Interfaces of Tool Environments." [level=5] [ref=e1947]
                                                  - paragraph [ref=e1949]:
                                                    - text: In open-world settings, context complexity does not only from prolonged interaction within a single environment, but also from the need to operate across multiple heterogeneous tool environments, each defined by distinct state records and access protocols. For example, a personal embodied assistant may alternate between a physical household environment, where it performs long-horizon behaviors grounded in perceptual feedback, and a digital web environment, where it retrieves information such as weather forecasts through browser-based interactions. Supporting such behavior requires memory mechanisms that can preserve, differentiate, and reconcile environment-specific states across diverse action and observation modalities
