                                                    - /url: https://arxiv.org/html/2602.06052v3#bib.bib279
                                                  - text: )
                                                - text: ". While such settings facilitate reproducibility and experimental comparison, they substantially under-specify the memory demands faced by real-world agents. Therefore, strong benchmark performance often reflects proficiency in in-context pattern matching or short-term reasoning, rather than the ability to accumulate, retain, and reuse knowledge across extended interactions and evolving preferences of user contexts. This mismatch leads to a notable utility gap: agents that achieve high scores on existing benchmarks frequently fail to exhibit long-term adaptation, user personalization, or task-specific skill reuse in open-ended, dynamic environments."
