                                                - generic [ref=e1885]:
                                                  - heading "User–Agent Interactions Memory over Extended Horizons." [level=5] [ref=e1886]
                                                  - paragraph [ref=e1888]:
                                                    - text: In persistent user–agent interactions, agents are required to maintain coherent behavior and decision consistency aligned with the user across extended dialogue horizons. Unlike short, self-contained dialogues, information introduced in early rounds, such as user preferences, identity attributes, or implicit task constraints, may not immediately influence responses but often becomes decisive in later stages of interaction. Therefore, interaction history functions less as static input and more as a latent internal state that evolves over time. This requirement for information persistence arises from the stability of user personas and preferences across different turns
                                                    - generic [ref=e1889]:
