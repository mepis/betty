                                    - text: Memory Routing
                                  - paragraph [ref=e1542]: "Given an architecture, routing describes a set of memory allocation and access rules. When a new task arrives, the system needs to build a separate memory view for agents with different roles: it decides which past memories should be retrieved and how they should be injected into each agent’s context. We group routing methods by where the routing decision is made: a central orchestrator, individual agents, or the memory store itself via retrieval and matching."
