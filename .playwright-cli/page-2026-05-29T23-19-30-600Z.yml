                            - text: illustrates how this subject-level distinction connects with cognitive memory mechanisms. Working memory, procedural memory, and sensory memory are predominantly agent-centric, reflecting their roles in supporting many real-world downstream tasks. Semantic and episodic memory appear in both user- and agent-centric settings. For users, they encode stable preferences and interaction histories, whereas in agent-centric memory, they support world modeling and experience accumulation. Together, we may find that memory subjects interleave with cognitive categories, offering a complementary perspective for organizing memory research beyond the single classifications as in prior surveys
