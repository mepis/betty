                  - text: (Cai et al.,
                  - link "2024" [ref=e662] [cursor=pointer]:
                    - /url: https://arxiv.org/html/2602.06052v3#bib.bib233
                  - text: ; Feng et al.,
                  - link "2025b" [ref=e663] [cursor=pointer]:
                    - /url: https://arxiv.org/html/2602.06052v3#bib.bib234
                  - text: )
                - text: . The KV cache stores the keys and values from earlier tokens and, at each new step, only computes them for the freshly generated token and retrieves the rest from the cache. This mechanism significantly accelerates inference, especially on long outputs or large and deep models, but comes at the cost of higher memory usage and implementation complexity
                - generic [ref=e664]:
                  - text: (Pope et al.,
                  - link "2023" [ref=e665] [cursor=pointer]:
                    - /url: https://arxiv.org/html/2602.06052v3#bib.bib232
                  - text: ; Kwon et al.,
                  - link "2023" [ref=e666] [cursor=pointer]:
                    - /url: https://arxiv.org/html/2602.06052v3#bib.bib74
                  - text: )
                - text: . Recent research proposes several high-impact approaches for compressing the KV cache. One approach recognizes that a small portion of tokens contribute most to attention scores and dynamically evicts the rest, balancing “heavy hitters” with recently generated tokens. This method achieves large throughput improvements while retaining only a fraction of the cache
                - generic [ref=e667]:
                  - text: (Zhang et al.,
                  - link "2023c" [ref=e668] [cursor=pointer]:
                    - /url: https://arxiv.org/html/2602.06052v3#bib.bib235
                  - text: )
                - text: . Another technique identifies consistent attention patterns within a prompt’s observation window and clusters important features to enable substantial speed and memory savings for long input sequences
                - generic [ref=e669]:
                  - text: (Li et al.,
                  - link "2024d" [ref=e670] [cursor=pointer]:
                    - /url: https://arxiv.org/html/2602.06052v3#bib.bib589
                  - text: )
                - text: . Another approach observes that layers differ in how many key-value vectors they truly need, and instead of giving every layer the same cache size, ranks vectors by importance and uses a binary search to decide how many to keep per layer under a global budget, so only the most informative vectors are retained
                - generic [ref=e671]:
                  - text: (Wang et al.,
                  - link "2024a" [ref=e672] [cursor=pointer]:
                    - /url: https://arxiv.org/html/2602.06052v3#bib.bib590
                  - text: )
                - text: . These current studies demonstrate that the KV cache can be used efficiently to improve model performance significantly.
          - generic [ref=e673]:
            - heading "3.1.3 Tradeoffs Across Memory Substrates" [level=4] [ref=e674]:
              - generic [ref=e675]: 3.1.3
              - text: Tradeoffs Across Memory Substrates
            - paragraph [ref=e677]: Different memory substrates can have different advantages and drawbacks. They have trade-offs in terms of access speed, scalability, adaptability, and reliability in ways that show up quickly on long-horizon tasks. In practice, the choice often comes down to fast, precise internal state versus scalable external storage that can become noisy as it grows.
            - paragraph [ref=e679]: Internal memory, including parametric memory encoded in model weights, usually offers high-speed access and tight integration with reasoning. However, it is expensive to update and can suffer from catastrophic forgetting due to frequent modifications. It therefore fits stable, general-purpose knowledge better than rapidly changing or user-specific information. Latent substrates such as hidden activations or KV caches are fast and transient, making them well-suited to within-session state. However, their ephemeral nature and linear scaling with sequence length limit capacity and make them unsuitable for cross-session retention.
            - paragraph [ref=e681]:
              - text: External memory, consisting of vector databases or stores, scales naturally with experience and supports flexible editing without retraining. However, retrieval adds latency and makes performance sensitive to indexing and retrieval quality. Prior work shows that storing excessive or low-quality items can inject noise and increase the difficulty of targeting the informative items, which degrades tightly coupled decision-making
              - generic [ref=e682]:
                - text: (Liu et al.,
                - link "2024b" [ref=e683] [cursor=pointer]:
                  - /url: https://arxiv.org/html/2602.06052v3#bib.bib328
                - text: )
              - text: . To better tackle the issue, explicit memory management mechanisms such as pruning, summarization, and hierarchical organization are required and necessary.
            - paragraph [ref=e685]: Overall, no single substrate dominates across settings and environments. Effective system design increasingly adopts hybrid memory architectures, using internal or parametric memory for inherent knowledge or facts, latent memory for fast short-term reasoning, and external memory for scalable experience storage. This pattern reflects a broader shift from a static or persistent, defined knowledge storage mechanism to a more dynamic and adaptive approach that can handle the complexities of real-world tasks.
        - generic [ref=e686]:
          - heading "3.2 Memory Cognitive Mechanisms" [level=3] [ref=e687]:
            - generic [ref=e688]: "3.2"
            - text: Memory Cognitive Mechanisms
          - paragraph [ref=e690]:
            - text: Human memory provides a conceptual scaffold for analyzing memory in LLM-based agents
            - generic [ref=e691]:
              - text: (Kim et al.,
              - link "2023b" [ref=e692] [cursor=pointer]:
                - /url: https://arxiv.org/html/2602.06052v3#bib.bib240
              - text: ; Li and Li,
              - link "2024" [ref=e693] [cursor=pointer]:
                - /url: https://arxiv.org/html/2602.06052v3#bib.bib239
              - text: )
            - text: . Cognitive psychology distinguishes multiple interacting systems that explain how information is perceived, maintained, and reused
            - generic [ref=e694]:
              - text: (Baddeley,
              - link "2020" [ref=e695] [cursor=pointer]:
                - /url: https://arxiv.org/html/2602.06052v3#bib.bib251
              - text: ; Tulving,
              - link "1972" [ref=e696] [cursor=pointer]:
                - /url: https://arxiv.org/html/2602.06052v3#bib.bib242
              - text: )
            - text: ". While a wide range of cognitive memory types have been proposed in the literature, we focus on a set of five atomic cognitive memory systems that are particularly relevant for LLM-based agents: sensory, working, episodic, semantic, and procedural memory. Table"
            - link "3.2" [ref=e697] [cursor=pointer]:
              - /url: https://arxiv.org/html/2602.06052v3#S3.SS2
            - text: summarizes these five memory systems by mapping their core functional roles to representative research directions and illustrative agent-level implementations. These five systems constitute a minimal and architecturally complete decomposition of cognitive memory, whereas other memory constructs such as autobiographical
            - generic [ref=e698]:
              - text: (Conway and Pleydell-Pearce,
              - link "2000" [ref=e699] [cursor=pointer]:
                - /url: https://arxiv.org/html/2602.06052v3#bib.bib244
              - text: )
            - text: or prospective memory
            - generic [ref=e700]:
              - text: (Einstein and McDaniel,
              - link "1990" [ref=e701] [cursor=pointer]:
                - /url: https://arxiv.org/html/2602.06052v3#bib.bib241
              - text: )
            - text: can be understood as compositions or functional abstractions built upon them. Accordingly, our taxonomy is organized around these five atomic memory types, which cover both short-term and long-term memory mechanisms commonly realized, either explicitly or implicitly, in current agent architectures.
