                                                        - /url: https://arxiv.org/html/2602.06052v3#bib.bib323
                                                      - text: )
                                                    - text: ", the long-term structure of dialogue tasks involving planning or sustained goals, and the importance of identity and goal consistency for user trust and usability"
                                                    - generic [ref=e1891]:
                                                      - text: (Zhang et al.,
                                                      - link "2018" [ref=e1892] [cursor=pointer]:
                                                        - /url: https://arxiv.org/html/2602.06052v3#bib.bib324
                                                      - text: )
                                                    - text: . However, under fixed context window constraints, long-horizon dialogue systems frequently exhibit failure modes such as early-context forgetting and progressive context drift as interaction length increases
                                                    - generic [ref=e1893]:
