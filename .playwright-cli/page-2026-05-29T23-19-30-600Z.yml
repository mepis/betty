                                                - generic [ref=e1879]: "6.2"
                                                - text: Context-Exploded Real-World Environments
                                              - paragraph [ref=e1881]: Unlike context-limited benchmark evaluations in research works, real-world deployments expose agents to environments where context scales along multiple axes. It accumulates over long interaction horizons, becomes increasingly complex due to structured and heterogeneous system state, and spans multiple environments, agents, and tools.
