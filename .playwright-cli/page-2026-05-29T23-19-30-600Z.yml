                                  - /url: https://arxiv.org/html/2602.06052v3#bib.bib484
                                - text: )
                              - text: . In embodied agents, procedural memory manifests as executable skills and control policies that respect physical dynamics and action preconditions
                              - generic [ref=e1376]:
