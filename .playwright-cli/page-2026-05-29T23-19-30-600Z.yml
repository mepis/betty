                                                              - link "2025b" [ref=e2307] [cursor=pointer]:
                                                                - /url: https://arxiv.org/html/2602.06052v3#bib.bib417
                                                              - text: )
                                                            - text: ) where multiple outputs are acceptable and reference-based scoring is not reliable. As a result, existing work typically combines outcome-level correctness with retrieval-oriented assessment and judge-based rubrics, depending on whether the benchmark exposes memory module, uses long-context prompting, or evaluates agents acting in an specific environment, scenario, or task
                                                            - generic [ref=e2308]:
                                                              - text: (Patlan et al.,
