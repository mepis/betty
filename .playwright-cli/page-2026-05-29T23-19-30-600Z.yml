                                                      - /url: https://arxiv.org/html/2602.06052v3#bib.bib535
                                                    - text: )
                                                  - text: ". As environmental complexity increases, persistence becomes unavoidable: user models, system configurations, and task artifacts represent durable state that must remain consistent across sessions while respecting governance constraints such as privacy, permissions, and rollback"
                                                  - generic [ref=e1940]:
                                                    - text: (Sarin et al.,
