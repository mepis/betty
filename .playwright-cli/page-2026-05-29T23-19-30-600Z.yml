                            - text: Memory subjects characterize who the memory is primarily modeling and serving for. This dimension is orthogonal to memory substrate and cognitive mechanism, and is critical for understanding the optimization goal of the memory in foundation agents. Figure
                            - link "5" [ref=e1166] [cursor=pointer]:
