                                            - text: addresses this problem by maintaining an iteratively updated compact memory state and propagating advantages across contexts to refine memory representations. Together, these works characterize trajectory-level memory as a learned state representation whose utility is defined by its long-term contribution to decision making under reinforcement learning.
                                        - generic [ref=e1795]:
                                          - heading "5.3.3 Cross-Episode and Multi-Agent Memory" [level=4] [ref=e1796]:
                                            - generic [ref=e1797]: 5.3.3
                                            - text: Cross-Episode and Multi-Agent Memory
                                          - paragraph [ref=e1799]: When memory extends beyond individual trajectories, it no longer serves only immediate reasoning but accumulates experience whose value emerges across repeated episodes or interactions. At this scope, reinforcement learning is essential, as only long-term and cross-episode reward signals can determine which memories should persist, adapt, or be revised by the memory policy.
                                          - paragraph [ref=e1801]:
                                            - text: Research at this level focuses on how experience should be represented, reused, and coordinated once memory spans multiple episodes or agents. Rather than preserving raw interaction histories, cross-episode memory aims to distill higher-level decision-relevant knowledge, such as reusable strategies, self-correction rules, or abstracted behavioral patterns, whose utility is evaluated through repeated reinforcement signals. This perspective underlies approaches such as MCTR
