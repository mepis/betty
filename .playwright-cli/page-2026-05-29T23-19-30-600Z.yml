                                                - /url: https://arxiv.org/html/2602.06052v3#bib.bib136
                                              - text: )
                                            - text: . A closely related question concerns how long interaction histories should be abstracted into such representations. Several studies treat summarization, folding, or compression as policy decisions whose effectiveness can only be evaluated through reinforcement signals propagated from future outcomes
                                            - generic [ref=e1789]:
