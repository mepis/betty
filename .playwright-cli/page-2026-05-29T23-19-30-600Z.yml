                                                                          - heading "9.1 Memory for Continual Learning and Self-Evolving Agents" [level=3] [ref=e3995]:
                                                                            - generic [ref=e3996]: "9.1"
                                                                            - text: Memory for Continual Learning and Self-Evolving Agents
                                                                          - paragraph [ref=e3998]:
                                                                            - text: A fundamental challenge in memory-enabled self-evolving agents lies in managing memory dynamics across both intra-task and cross-task timescales. At the intra-task level, agents must continuously decide what information to retain, compress, or discard from heterogeneous streams such as tool outputs, search results, feedback signals, and intermediate reasoning traces, all under strict context-window constraints
                                                                            - generic [ref=e3999]:
                                                                              - text: (Gao et al.,
                                                                              - link "2025a" [ref=e4000] [cursor=pointer]:
                                                                                - /url: https://arxiv.org/html/2602.06052v3#bib.bib11
                                                                              - text: )
                                                                            - text: . Existing systems largely rely on heuristic memory controllers, leaving the internal coupling between memory evolution and reasoning behavior poorly understood. At the cross-task level, agents are expected to accumulate experience across episodes and task distributions
                                                                            - generic [ref=e4001]:
                                                                              - text: (Wei et al.,
                                                                              - link "2025d" [ref=e4002] [cursor=pointer]:
                                                                                - /url: https://arxiv.org/html/2602.06052v3#bib.bib193
                                                                              - text: )
                                                                            - text: ", yet current approaches primarily emphasize inference-time reuse rather than principled consolidation and generalization. In comparison, classical continual learning methods focus on preventing catastrophic forgetting through replay, regularization, or parameter isolation"
                                                                            - generic [ref=e4003]:
                                                                              - text: (Rebuffi et al.,
                                                                              - link "2017" [ref=e4004] [cursor=pointer]:
                                                                                - /url: https://arxiv.org/html/2602.06052v3#bib.bib461
                                                                              - text: ; Lopez-Paz and Ranzato,
                                                                              - link "2017" [ref=e4005] [cursor=pointer]:
                                                                                - /url: https://arxiv.org/html/2602.06052v3#bib.bib462
                                                                              - text: ; Shin et al.,
                                                                              - link "2017" [ref=e4006] [cursor=pointer]:
                                                                                - /url: https://arxiv.org/html/2602.06052v3#bib.bib463
                                                                              - text: ; Kemker and Kanan,
                                                                              - link "2018" [ref=e4007] [cursor=pointer]:
                                                                                - /url: https://arxiv.org/html/2602.06052v3#bib.bib464
                                                                              - text: )
                                                                            - text: ", but they typically treat memory as a static mechanism for knowledge retention. This framing is insufficient for agent-based systems, where memory must also track evolving interaction states, user-specific information, and procedural behaviors. Moreover, stable post-training adaptation from accumulated experience remains underexplored, with unresolved risks of negative transfer, uncontrolled drift, and semantic inconsistency"
                                                                            - generic [ref=e4008]:
                                                                              - text: (Ke et al.,
                                                                              - link "2025b" [ref=e4009] [cursor=pointer]:
                                                                                - /url: https://arxiv.org/html/2602.06052v3#bib.bib457
                                                                              - text: )
                                                                            - text: .
                                                                          - paragraph [ref=e4011]:
                                                                            - text: Future research should therefore reframe continual learning around a richer, agent-centric notion of memory that integrates semantic, episodic, and procedural components
                                                                            - generic [ref=e4012]:
                                                                              - text: (Ke et al.,
                                                                              - link "2025a" [ref=e4013] [cursor=pointer]:
                                                                                - /url: https://arxiv.org/html/2602.06052v3#bib.bib455
                                                                              - text: ; Lou,
                                                                              - link "2025" [ref=e4014] [cursor=pointer]:
                                                                                - /url: https://arxiv.org/html/2602.06052v3#bib.bib465
                                                                              - text: )
                                                                            - text: . Beyond explicit textual logs, latent and structured memory representations offer a promising direction for scalable and efficient adaptation, enabling compact storage while preserving causal and behavioral abstractions. Progress will likely require moving beyond inference-time heuristics toward principled post-training paradigms that leverage accumulated agent experience for continual improvement. This includes designing consolidation mechanisms that selectively distill long-term knowledge, align evolving memory with model parameters, and mitigate forgetting without sacrificing plasticity. Correspondingly, new benchmarks are needed that evaluate not only task-level retention, but also sustained adaptation, relevance-aware memory management, and behavioral stability under non-stationary objectives and environments
                                                                            - generic [ref=e4015]:
                                                                              - text: (Ke et al.,
                                                                              - link "2024" [ref=e4016] [cursor=pointer]:
                                                                                - /url: https://arxiv.org/html/2602.06052v3#bib.bib459
                                                                              - text: )
                                                                            - text: . Establishing a unified framework that connects classical continual learning objectives with structured memory design remains a key open direction for self-evolving foundation agents.
                                                                        - generic [ref=e4017]:
                                                                          - heading "9.2 Multi-Human-Agent Memory Organization" [level=3] [ref=e4018]:
                                                                            - generic [ref=e4019]: "9.2"
                                                                            - text: Multi-Human-Agent Memory Organization
                                                                          - paragraph [ref=e4021]:
                                                                            - text: Recent multi-agent LLM frameworks, such as AutoGen
                                                                            - generic [ref=e4022]:
                                                                              - text: (Wu et al.,
                                                                              - link "2024b" [ref=e4023] [cursor=pointer]:
                                                                                - /url: https://arxiv.org/html/2602.06052v3#bib.bib453
                                                                              - text: )
                                                                            - text: and AgentLite
                                                                            - generic [ref=e4024]:
                                                                              - text: (Liu et al.,
                                                                              - link "2024c" [ref=e4025] [cursor=pointer]:
                                                                                - /url: https://arxiv.org/html/2602.06052v3#bib.bib320
                                                                              - text: )
                                                                            - text: ", enable task decomposition and role-based coordination through structured message passing and prompt-driven control. In practice, such systems increasingly operate in human-agent collaborative settings, where artificial agents interact not only with other agents but also with human users or supervisors through iterative feedback, correction, and delegation"
                                                                            - generic [ref=e4026]:
                                                                              - text: (Lu et al.,
                                                                              - link "2025c" [ref=e4027] [cursor=pointer]:
                                                                                - /url: https://arxiv.org/html/2602.06052v3#bib.bib558
                                                                              - text: ; Zou et al.,
                                                                              - link "2025b" [ref=e4028] [cursor=pointer]:
                                                                                - /url: https://arxiv.org/html/2602.06052v3#bib.bib18
                                                                              - text: ;
                                                                              - link "c" [ref=e4029] [cursor=pointer]:
                                                                                - /url: https://arxiv.org/html/2602.06052v3#bib.bib325
                                                                              - text: )
                                                                            - text: ". However, despite this growing complexity, coordination remains largely episodic and transient: interactions are scoped to a single task instance, and little experience is retained once the task is completed"
                                                                            - generic [ref=e4030]:
                                                                              - text: Suzgun et al. (
                                                                              - link "2025" [ref=e4031] [cursor=pointer]:
                                                                                - /url: https://arxiv.org/html/2602.06052v3#bib.bib559
                                                                              - text: )
                                                                            - text: . As a result, both agent–agent and human–agent collaborations are repeatedly re-established from scratch, limiting the system’s ability to adapt interaction strategies, personalize behavior, or improve collaboration quality across repeated tasks or deployments.
                                                                          - paragraph [ref=e4033]:
                                                                            - text: Enabling persistent and adaptive collaboration among interacting entities (including both foundation agents and humans) would inspire long-term research questions
                                                                            - generic [ref=e4034]:
                                                                              - text: (Han et al.,
                                                                              - link "2024" [ref=e4035] [cursor=pointer]:
                                                                                - /url: https://arxiv.org/html/2602.06052v3#bib.bib452
                                                                              - text: ; Li et al.,
                                                                              - link "2024c" [ref=e4036] [cursor=pointer]:
                                                                                - /url: https://arxiv.org/html/2602.06052v3#bib.bib451
                                                                              - text: )
                                                                            - text: . One important direction is collaborative (social) memory, where agents retain experience about their collaborators, such as communication preferences, domain expertise, feedback patterns, or historical interaction outcomes, allowing them to adapt signaling strategies, calibrate trust, and reduce coordination overhead over time. At the same time, agents may benefit from role-specific flow and procedural memory, accumulating experience about their own recurring workflows
                                                                            - generic [ref=e4037]:
                                                                              - text: (Wang et al.,
                                                                              - link "2025t" [ref=e4038] [cursor=pointer]:
                                                                                - /url: https://arxiv.org/html/2602.06052v3#bib.bib98
                                                                              - text: )
                                                                            - text: ", including task decomposition patterns, execution strategies, and common failure modes, so that agents assuming stable functional roles can gradually refine their behavior through experience-driven specialization. Introducing persistent memory in such multi-entity settings also raises memory governance and coordination challenges, including questions of ownership, access, responsibility, and how divergent perspectives or human corrections should be handled. Addressing these issues is essential for preventing uncontrolled error propagation and for sustaining reliable collaboration as multi-agent systems scale in size, heterogeneity, and task complexity."
