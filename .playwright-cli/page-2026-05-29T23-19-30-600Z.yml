                                                      - emphasis [ref=e1985]: accuracy-based
                                                      - text: ","
                                                      - emphasis [ref=e1986]: similarity-based
                                                      - text: ", and"
                                                      - emphasis [ref=e1987]: LLM-as-a-judge
