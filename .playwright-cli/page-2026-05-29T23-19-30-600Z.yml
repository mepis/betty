                              - text: . This enables LLM agents to progressively evolve into more capable and efficient problem solvers, exhibiting behavior that mirrors human-like expertise development across diverse tasks over time.
                            - paragraph [ref=e1368]:
                              - text: Strategy and Skill Learning. In contrast to cross-task knowledge transfer, strategy and skill learning for the agent-centric memory focuses on retaining environment-grounded procedural memories that encode how to efficiently execute multi-step actions within a specific interaction regime, such as a web interface, GUI system, or physical environment. For instance, Web agents
                              - generic [ref=e1369]:
