                            - paragraph [ref=e1350]:
                              - text: Cross-Task Knowledge Transfer. Long-term memory enables agents to accumulate durable knowledge across tasks and episodes, supporting continual improvement without catastrophic forgetting
                              - generic [ref=e1351]:
                                - text: (Hatalis et al.,
                                - link "2023" [ref=e1352] [cursor=pointer]:
                                  - /url: https://arxiv.org/html/2602.06052v3#bib.bib295
                                - text: )
                              - text: . At a high level, cross-task knowledge transfer concerns how agents abstract and retain task-agnostic cognitive knowledge from diverse interactions, enabling generalization across heterogeneous tasks, domains, and environments rather than improving execution within a single setting or environment. For example, Agent KB
                              - generic [ref=e1353]:
                                - text: (Tang et al.,
                                - link "2025b" [ref=e1354] [cursor=pointer]:
                                  - /url: https://arxiv.org/html/2602.06052v3#bib.bib100
                                - text: )
                              - text: constructs a cross-domain experience framework that aggregates high-level strategies and execution lessons distilled from heterogeneous agent trajectories into a shared knowledge base, enabling agents to retrieve and reuse transferable problem-solving knowledge when facing novel tasks across different domains. Unlike specific trajectory replay, the goal of cross-task memory is to distill interaction experience into task-agnostic abstractions that generalize across environments and objectives. Another representative example is the action–thought patterns used across WebShop
                              - generic [ref=e1355]:
                                - text: (Yao et al.,
                                - link "2022" [ref=e1356] [cursor=pointer]:
                                  - /url: https://arxiv.org/html/2602.06052v3#bib.bib430
                                - text: )
                              - text: and ALFWorld
