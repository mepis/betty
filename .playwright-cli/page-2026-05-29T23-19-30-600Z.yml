                                                                              - text: )
                                                                            - text: ", which can accumulate silently over time. Recent work on secure and auditable memory modules"
                                                                            - generic [ref=e4098]:
                                                                              - text: (Wei et al.,
                                                                              - link "2025b" [ref=e4099] [cursor=pointer]:
                                                                                - /url: https://arxiv.org/html/2602.06052v3#bib.bib530
                                                                              - text: ; Wang et al.,
