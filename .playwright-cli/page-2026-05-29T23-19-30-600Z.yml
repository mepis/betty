                                        - link "2025c" [ref=e1514] [cursor=pointer]:
                                          - /url: https://arxiv.org/html/2602.06052v3#bib.bib310
                                        - text: )
                                      - text: further scales the workspace into a shared experience pool with offline data and an online replay buffer, where agents query with their current sub-trajectory and retrieve top-
                                      - math [ref=e1515]:
                                        - generic [ref=e1517]: k
                                      - text: similar trajectories to reuse in-context.
                                  - generic [ref=e1518]:
                                    - heading "Hybrid." [level=5] [ref=e1519]
                                    - paragraph [ref=e1521]:
                                      - text: This setup keeps both a private layer and a shared layer. It uses a policy to decide whether new information is written to the private space or to the shared space. At each call, it builds a permission-limited memory view for the agent, so the agent only sees what it is allowed to see. This gives a balance between maximizing memory reuse and keeping sensitive information isolated. For example, in Collaborative Memory
                                      - generic [ref=e1522]:
                                        - text: (Rezazadeh et al.,
                                        - link "2025a" [ref=e1523] [cursor=pointer]:
                                          - /url: https://arxiv.org/html/2602.06052v3#bib.bib124
                                        - text: )
                                      - text: ", the system separates all memory fragments into private memory and shared memory. During writing, a write policy decides whether the information is generally useful or user-specific, and then writes it to the shared or private layer. During reading, a read policy uses an access graph provided by the system to build a permission-limited memory view for the current call. Similarly, in MirrorMind"
