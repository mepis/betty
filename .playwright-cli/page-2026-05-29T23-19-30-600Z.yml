                                - text: (Qin et al.,
                                - link "2024" [ref=e1364] [cursor=pointer]:
                                  - /url: https://arxiv.org/html/2602.06052v3#bib.bib297
                                - text: )
                              - text: ", and error-avoidance execution heuristics accumulated through repeated failures"
                              - generic [ref=e1365]:
