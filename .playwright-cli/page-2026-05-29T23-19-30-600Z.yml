                                      - text: )
                                    - text: .
                              - generic [ref=e1485]:
                                - heading "4.2 Memory Mechanism in the Multi-Agent System" [level=3] [ref=e1486]:
                                  - generic [ref=e1487]: "4.2"
                                  - text: Memory Mechanism in the Multi-Agent System
                                - paragraph [ref=e1489]: "In a multi-agent system, memory operation mechanisms describe how several agents build and reuse memory together during collaboration: each agent can keep its own private memory, and they can also share experience through a shared workspace. As in single-agent systems, this mechanism still includes basic operations such as indexing, retrieval, updating, compression, summarization, forgetting, and pruning. Beyond these basic operations, what matters more in multi-agent settings is cross-agent read and write rules: in each task, the system needs to choose suitable memory for agents with different roles. In addition, the system often needs extra operations to remove redundancy, resolve conflicts, and keep the memory consistent."
                                - generic [ref=e1490]:
                                  - heading "4.2.1 Memory Architecture" [level=4] [ref=e1491]:
                                    - generic [ref=e1492]: 4.2.1
                                    - text: Memory Architecture
                                  - paragraph [ref=e1494]: In multi-agent systems, memory can be organized in different ways, varying in which layer it is stored, how read and write permissions are defined across agents, and whether the system introduces a controller. These design choices determine whether routing can construct an efficient memory view and whether systemic issues such as information leakage may arise.
                                  - generic [ref=e1495]:
                                    - heading "Private-only." [level=5] [ref=e1496]
                                    - paragraph [ref=e1498]:
                                      - text: In a private-only architecture, each agent has its own independent memory, and its read and write rights only take effect inside that agent’s memory. In multi-agent collaboration, agents can only rely on their own memory and the current task context to work. This setup gives strong isolation and makes the system easier to check. However, the same memories are often created again in multiple private spaces, which can waste resources. Representative examples include RecAgent
                                      - generic [ref=e1499]:
                                        - text: (Wang et al.,
                                        - link "2025h" [ref=e1500] [cursor=pointer]:
                                          - /url: https://arxiv.org/html/2602.06052v3#bib.bib88
                                        - text: )
                                      - text: ", which instantiates one agent per user and keeps a private memory to avoid mixing different users’ histories to better protect privacy; TradingGPT"
                                      - generic [ref=e1501]:
                                        - text: (Li et al.,
                                        - link "2023b" [ref=e1502] [cursor=pointer]:
                                          - /url: https://arxiv.org/html/2602.06052v3#bib.bib73
                                        - text: )
                                      - text: ", where each trading agent maintains its own memory so it can follow a consistent risk preference and sector focus, and collaboration mainly happens through exchanging selected viewpoints rather than sharing full memories; and MetaAgents"
                                      - generic [ref=e1503]:
                                        - text: (Li et al.,
                                        - link "2025j" [ref=e1504] [cursor=pointer]:
                                          - /url: https://arxiv.org/html/2602.06052v3#bib.bib76
                                        - text: )
                                      - text: ", which equips each role with an isolated memory of its past thoughts and decisions so the role stays stable and consistent, while any information gained from dialogue is written back locally."
                                  - generic [ref=e1505]:
                                    - heading "Shared-workspace." [level=5] [ref=e1506]
                                    - paragraph [ref=e1508]:
                                      - text: Unlike private-only memory, shared-workspace designs use a common pool that all agents can read and write. Agents share intermediate results through this shared state, so they do not need heavy peer-to-peer messaging, which reduces communication cost. However, the shared pool may quickly become noisy and therefore requires filtering mechanisms, as well as coordination strategies to avoid conflicts when multiple agents update the same information. As representative shared-workspace designs, MetaGPT
                                      - generic [ref=e1509]:
                                        - text: (Hong et al.,
                                        - link "2023" [ref=e1510] [cursor=pointer]:
                                          - /url: https://arxiv.org/html/2602.06052v3#bib.bib69
                                        - text: )
                                      - text: uses a simple shared pool to publish role agents’ intermediate artifacts, and each agent applies its role profile to filter the pool and pull only relevant memory into context. InteRecAgent
                                      - generic [ref=e1511]:
                                        - text: (Huang et al.,
                                        - link "2025b" [ref=e1512] [cursor=pointer]:
                                          - /url: https://arxiv.org/html/2602.06052v3#bib.bib309
                                        - text: )
                                      - text: "makes the shared state more task-specific by establishing a Candidate Bus: tools repeatedly read the current candidate set and write back filtered candidates, so the set is progressively narrowed which can avoid prompt length overflow. MAICC"
