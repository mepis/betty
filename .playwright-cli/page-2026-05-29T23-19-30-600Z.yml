      - generic [ref=e179]:
        - heading "Abstract" [level=6] [ref=e180]
        - paragraph [ref=e181]:
          - text: "The research of artificial intelligence is undergoing a paradigm shift from prioritizing model innovations over benchmark scores towards emphasizing problem definition and rigorous real-world evaluation. As the field enters the “second half,” the central challenge becomes real utility in long-horizon, dynamic, and user-dependent environments, where agents face context explosion and must continuously accumulate, manage, and selectively reuse large volumes of information across extended interactions. Memory, with hundreds of papers released this year, therefore emerges as the critical solution to fill the utility gap. In this survey, we provide a unified view of foundation agent memory along three dimensions:"
          - emphasis [ref=e182]: memory substrate
          - text: (internal and external),
          - emphasis [ref=e183]: cognitive mechanism
          - text: (episodic, semantic, sensory, working, and procedural), and
          - emphasis [ref=e184]: memory subject
          - text: (agent- and user-centric). We then analyze how memory is instantiated and operated under different agent topologies and highlight learning policies over memory operations. Finally, we review evaluation benchmarks and metrics for assessing memory utility, and outline various open challenges and future directions.
