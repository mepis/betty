                                                                      - generic [ref=e3473]:
                                                                        - text: (Jimenez et al.,
                                                                        - link "2025" [ref=e3474] [cursor=pointer]:
                                                                          - /url: https://arxiv.org/html/2602.06052v3#bib.bib301
                                                                        - text: ; Qiu et al.,
                                                                        - link "2025b" [ref=e3475] [cursor=pointer]:
                                                                          - /url: https://arxiv.org/html/2602.06052v3#bib.bib567
                                                                        - text: )
                                                                      - text: ". For memory-centric analysis, two additional dimensions are crucial: (1) dependency distance—how far apart the required information and its later use occur, such as within-turn, cross-turn, or cross-session), and (2) memory correctness under interaction—whether stored items remain faithful, non-contradictory, and policy-consistent as the environment evolves. This motivates complementing end-to-end success with memory-sensitive measurements such as: (i) retrieval faithfulness and coverage for required facts or tool outputs, (ii) error modes in state tracking (drift, omission, contradiction), (iii) persistence under interruptions (resume after long gaps), and (iv) efficiency trade-offs (memory size, update frequency, and retrieval cost). We expect next-generation benchmarks to go beyond a single end-to-end accuracy or success rate and instead incorporate memory-related metrics. so that evaluation can also be attributed to the memory mechanism rather than to short-horizon prompting or incidental heuristics."
