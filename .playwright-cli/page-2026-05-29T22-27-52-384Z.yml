        - generic [ref=e39]:
          - 'heading "OpenAI Agents SDK 0.14 Deep Dive: Sandbox Agents and Model-Native Harness" [level=1] [ref=e40]'
          - time [ref=e42]: May 11, 2026
        - generic [ref=e43]:
          - generic [ref=e44]:
            - term [ref=e45]: Authors
            - definition [ref=e46]:
              - list [ref=e47]:
