            - heading "The Six Axes of the 0.14 Runtime" [level=3] [ref=e127]:
              - img [ref=e129] [cursor=pointer]
              - text: The Six Axes of the 0.14 Runtime
            - paragraph [ref=e132]:
              - text: To understand how to implement these agents effectively, we must look at the six axes of the new runtime. When you obtain your API keys from
              - link "n1n.ai" [ref=e133] [cursor=pointer]:
                - /url: https://n1n.ai
              - text: ", you can plug them into this harness to begin building."
            - list [ref=e134]:
              - listitem [ref=e135]:
                - strong [ref=e136]: The Harness
                - text: ": Owned by the SDK, this acts as the memory and filesystem orchestrator. It is the only component that holds sensitive credentials."
              - listitem [ref=e137]:
                - strong [ref=e138]: The Model
                - text: ": Whether using OpenAI o3, DeepSeek-V3, or Claude 3.5 Sonnet, the model acts as the decision-maker. In 0.14, the model never has direct access to the sandbox."
              - listitem [ref=e139]:
                - strong [ref=e140]: Sandbox Client
                - text: ": This is the adapter (e.g.,"
                - code [ref=e141]: "`UnixLocalSandboxClient`"
                - text: ) that delegates code execution to the compute layer.
              - listitem [ref=e142]:
                - strong [ref=e143]: Compute Layer
                - text: ": The actual environment where shell commands and patches are applied. This is isolated from the Harness."
              - listitem [ref=e144]:
                - strong [ref=e145]: MCP Servers
                - text: ": The Model Context Protocol (MCP) is now the default way to externalize tools, allowing agents to share tool definitions with other platforms like Cursor or LangChain."
              - listitem [ref=e146]:
                - strong [ref=e147]: Persistence
                - text: ": The SDK now handles checkpoints and snapshots, ensuring that if a container expires, the agent can rehydrate its state and continue."
            - 'heading "Implementation: Local Development with UnixLocalSandboxClient" [level=3] [ref=e148]':
              - img [ref=e150] [cursor=pointer]
              - text: "Implementation: Local Development with UnixLocalSandboxClient"
            - paragraph [ref=e153]:
              - text: For local development, the
              - code [ref=e154]: "`UnixLocalSandboxClient`"
              - text: is a game-changer. It allows for a Docker-free loop that is significantly faster for debugging. Below is a standard implementation for a repository inspector agent.
            - code [ref=e157]:
              - generic [ref=e158]: from agents import Runner
              - generic [ref=e159]: from agents.sandbox import SandboxAgent, Manifest, UnixLocalSandboxClient
              - generic [ref=e161]: "# 1. Define the initial state of the workspace"
              - generic [ref=e162]: "manifest = Manifest.from_dict({"
              - generic [ref=e163]: "\"files\": {"
              - generic [ref=e164]: "\"ANALYSIS.md\": \"# Project Analysis\\nInitial state.\\n\","
              - generic [ref=e165]: "},"
              - generic [ref=e166]: "})"
              - generic [ref=e168]: "# 2. Initialize the Sandbox Agent"
              - generic [ref=e169]: "# Ensure your environment variables are configured with keys from n1n.ai"
              - generic [ref=e170]: agent = SandboxAgent(
              - generic [ref=e171]: name="code-architect",
              - generic [ref=e172]: instructions=(
              - generic [ref=e173]: "\"Analyze the codebase and apply improvements. \""
              - generic [ref=e174]: "\"Use apply_patch for all code modifications.\""
              - generic [ref=e175]: ),
              - generic [ref=e176]: default_manifest=manifest,
              - generic [ref=e177]: )
              - generic [ref=e179]: "# 3. Execute the run"
              - generic [ref=e180]: result = Runner.run_sync(
              - generic [ref=e181]: agent,
              - generic [ref=e182]: "\"Update ANALYSIS.md with a summary of the current directory structure.\","
              - generic [ref=e183]: sandbox=UnixLocalSandboxClient(),
              - generic [ref=e184]: )
              - generic [ref=e186]:
                - text: print(
                - generic [ref=e187]:
                  - text: "f\"Agent Output:"
                  - generic [ref=e188]: "{result.final_output}"
                  - text: "\""
                - text: )
            - 'heading "Advanced Features: Subagents and Codex-Style Tools" [level=3] [ref=e189]':
              - img [ref=e191] [cursor=pointer]
              - text: "Advanced Features: Subagents and Codex-Style Tools"
            - paragraph [ref=e194]:
              - text: One of the most powerful additions is the
              - strong [ref=e195]: Subagent pattern
              - text: ". In complex DevSecOps or RAG workflows, a single agent often becomes overwhelmed by context. By spawning subagents, a parent agent can delegate specific tasks—such as 'Review PR #101' and 'Run Security Scan'—to independent children. Each child runs in its own sandbox, preventing file pollution and improving reliability."
            - paragraph [ref=e196]:
              - text: Furthermore, the introduction of
              - code [ref=e197]: "`apply_patch`"
              - text: (inspired by OpenAI Codex) replaces the inefficient 'full-file rewrite' method. Instead of the model sending back 500 lines of code for a 2-line change, it sends a diff. This reduces token consumption and minimizes the risk of the model hallucinating changes in unrelated parts of the file.
            - heading "The 4-Week Migration Strategy" [level=3] [ref=e198]:
              - img [ref=e200] [cursor=pointer]
              - text: The 4-Week Migration Strategy
            - paragraph [ref=e203]: "For enterprises moving from legacy frameworks or earlier SDK versions, a structured migration is necessary. Based on internal validations, we recommend the following timeline:"
            - list [ref=e204]:
              - listitem [ref=e205]:
                - strong [ref=e206]: "Week 1: Local Devloop Optimization"
                - text: ": Transition to"
                - code [ref=e207]: "`UnixLocalSandboxClient`"
                - text: and establish an
                - code [ref=e208]: "`AGENTS.md`"
                - text: file in your repositories to define agent personas.
              - listitem [ref=e209]:
                - strong [ref=e210]: "Week 2: Sandbox Adapter Evaluation"
                - text: ": Test external providers like Daytona, E2B, or Vercel for cost and latency. Compare benchmarks against your specific workloads."
              - listitem [ref=e211]:
                - strong [ref=e212]: "Week 3: Subagent Implementation"
                - text: ": Refactor serial loops into parallel subagent workflows, especially for bulk processing tasks like PR reviews."
              - listitem [ref=e213]:
                - strong [ref=e214]: "Week 4: MCP Externalization"
                - text: ": Move internal tool logic (Jira, GitHub, Notion) into standalone MCP servers to decouple tools from the agent logic."
            - heading "Security and Operational Integrity" [level=3] [ref=e215]:
              - img [ref=e217] [cursor=pointer]
              - text: Security and Operational Integrity
            - paragraph [ref=e220]:
              - text: The 0.14 SDK significantly reduces the 'blast radius' of prompt injections. Because the compute plane (where code runs) is physically separated from the control plane (where API keys reside), a malicious injection that gains shell access cannot steal your
              - link "n1n.ai" [ref=e221] [cursor=pointer]:
                - /url: https://n1n.ai
              - text: credentials or move laterally into your corporate network.
            - paragraph [ref=e222]: However, operators must still enforce strict outbound network policies at the sandbox provider level. Using tools like OpenTelemetry to monitor both the harness calls and sandbox execution is vital for maintaining an audit trail and managing costs.
            - heading "Conclusion" [level=3] [ref=e223]:
              - img [ref=e225] [cursor=pointer]
              - text: Conclusion
            - paragraph [ref=e228]: The OpenAI Agents SDK 0.14 is a milestone in the path toward autonomous AI infrastructure. It acknowledges that an agent is not just a model—it is a combination of decision-making, secure compute, and persistent state. By standardizing these components, OpenAI has lowered the barrier to entry for building production-grade agents.
            - paragraph [ref=e229]: As you begin your journey with SDK 0.14, remember that the quality of your agent's decisions depends on the underlying model. For the most reliable and high-performance LLM access, always use a trusted aggregator.
            - paragraph [ref=e230]:
              - text: Get a free API key at
              - link "n1n.ai" [ref=e231] [cursor=pointer]:
                - /url: https://n1n.ai
