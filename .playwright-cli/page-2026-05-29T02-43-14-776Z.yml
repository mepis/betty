              - generic [ref=e183]:
                - paragraph [ref=e184]: First off, hats off to all llama.cpp contributors, it's truly an amazing open-source project in terms of making local AI accessible.
                - paragraph [ref=e185]:
                  - text: Now, I'm getting my feet wet with SFT, and would like to generate synthetic training data. As such I have a bunch of prompts that I feed
                  - code [ref=e186]: llama-server
                  - text: . However I'm not sure I'm extracting the best performance possible from my hardware. I've mostly just done single-issue inference such as chatting or agentic coding, and since this project moves so fast it's hard to know if advice given a year ago is valid today.
                - paragraph [ref=e187]:
                  - text: I got an AMD 5900X CPU, 96GB RAM, and a NVIDIA 5090 GPU, and I'm running an up-to-date Windows 11 with hardware-accelerated GPU scheduling enabled and CUDA toolkit 12.8. I'm currently using
                  - code [ref=e188]: b7488
                  - text: . My current command-line is
                - paragraph [ref=e189]:
                  - code [ref=e190]: llama-server -m %models%\gpt-oss-20b-MXFP4.gguf --no-mmap -c 65536 -np 16 -ngl 99 --reasoning-format none --jinja -fa on --top-k 0 --top-p 0 --min-p 0.05 -b 8192 -ub 1024 --cont-batching
                - paragraph [ref=e191]:
                  - text: What I'm observing is that I'm not really getting a significant speedup of
                  - code [ref=e192]: "-np"
                  - text: beyond 4 or so, with GPU utilization at around 30% as reported by Windows and GPU-Z. If I set
                  - code [ref=e193]: "-np 1"
                  - text: then GPU utilization goes up to 60% but average inference speed is roughly the same or slightly lower.
                - paragraph [ref=e194]:
                  - text: Is this to be expected for this model, or are there some knobs I can turn to make it much better? I've seen
                  - code [ref=e195]: "--swa-full"
                  - text: and
                  - code [ref=e196]: "--kv-unified"
                  - text: ", but was not sure if they were relevant nor how to use them correctly if so."
