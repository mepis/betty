                      - paragraph [ref=e651]: I've verified that my client can easily saturate the server by making a dummy server, so that shouldn't be an issue.
                      - paragraph [ref=e652]:
                        - text: "Using the following command-line I get 60% GPU utilization:"
                        - code [ref=e653]: llama-server -m %models%\gpt-oss-20b-MXFP4.gguf --no-mmap -c 65536 -np 32 -ngl 99 --reasoning-format none --jinja -fa on --top-k 0 --top-p 1 --min-p 0.05 -b 8192 -ub 1024 --cont-batching --swa-full
                      - paragraph [ref=e654]:
                        - text: I added
                        - code [ref=e655]: "--swa-full"
                        - text: which made some warning about full prompt reprocessing go away. I assume that's a good thing?
                      - paragraph [ref=e656]:
                        - text: Looking at the server performance stats printed, I see token generation hovers at around 25 t/s. If we multiply this with 32 we get ~800 t/s per batch, which is ~56% of the 32-batch
                        - code [ref=e657]: llama-batched-bench
                        - text: numbers which had 96% GPU utilization.
                      - paragraph [ref=e658]:
                        - text: Just to be sure this wasn't a Windows thing, I installed Linux on an external drive and compiled the same
                        - code [ref=e659]: b7488
                        - text: release of
                        - code [ref=e660]: llama.cpp
                        - text: using CUDA 13. I got nearly identical numbers both for
                        - code [ref=e661]: llama-bench
                        - text: and my client code against
                        - code [ref=e662]: llama-server
                        - text: . Again in Linux I did notice somewhat improved speed by lowering parallelism to
                        - code [ref=e663]: "-np 4"
                        - text: . So I think we can rule out OS and CUDA version.
                      - paragraph [ref=e664]: I'll live with these results, mostly just curious if there was a way to do better. Perhaps it's just Amdahl's law and my somewhat aging CPU?
