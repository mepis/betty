              - text: evaluates how agents perform when both successful and failed task experiences are stored in memory. Baseline methods experience a clear performance drop when exposed to unfiltered failures, indicating that naive memory accumulation introduces noise and disrupts subsequent retrieval. In contrast, evolving-memory approaches, particularly ReMem, remain robust by actively refining stored experiences, achieving the highest overall success and progress rates under both Claude and Gemini backbones. These results demonstrate that selective utilization, which involves learning from successes while appropriately leveraging information from failures, is crucial for stable test-time adaptation. They further highlight that memory refinement plays a central role in handling imperfect experiences and suggest that future work should explore failure-aware strategies for memory evolution.
