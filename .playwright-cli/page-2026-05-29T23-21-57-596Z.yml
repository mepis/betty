        - generic [ref=e3661]:
          - heading "Appendix D Limitations" [level=2] [ref=e3662]:
            - generic [ref=e3663]: Appendix D
            - text: Limitations
          - paragraph [ref=e3665]: While Evo-Memory offers a comprehensive evaluation of self-evolving memory, several practical constraints remain. Due to budget and API limits, we focus on a selected set of strong LLMs rather than exhaustively covering all available models. Additional evaluations on open-weight or multilingual models could further validate the generality of our findings. Moreover, our benchmark primarily emphasizes textual and goal-oriented tasks; extending it to richer multimodal or real-world environments would provide a more complete picture of continual memory evolution. Despite these limitations, the current study already spans diverse domains, tasks, and architectures, offering a solid foundation for future extensions.
        - generic [ref=e3666]:
          - heading "Appendix E Use of Large Language Models" [level=2] [ref=e3667]:
            - generic [ref=e3668]: Appendix E
            - text: Use of Large Language Models
          - paragraph [ref=e3670]: During the preparation of this paper, we made limited and controlled use of large language models (LLMs), specifically ChatGPT, as an auxiliary writing aid. The LLM was used only for stylistic refinement, including improvements in clarity, grammar, and readability of text originally drafted by the authors. All scientific ideas, analyses, experiments, and conclusions were fully developed, written, and verified by the authors. Thus, LLMs were employed solely as a language-editing tool, without contributing to the intellectual or scientific content of the work.
