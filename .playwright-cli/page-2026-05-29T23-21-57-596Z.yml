              - text: summarize the results across single-turn and multi-turn settings. Overall, Evo-Memory demonstrates that self-evolving memory architectures provide consistent improvements. In single-turn reasoning and QA benchmarks (AIME-24/25, GPQA, MMLU-Pro, ToolBench), evolving-memory methods show consistent improvements, with ReMem achieving 0.65 average exact match and 0.85/0.71 API accuracy under Gemini-2.5 Flash. Adaptive retrieval methods enhance factual grounding, yet only evolving systems maintain consistent gains through iterative refinement. Agents with procedural knowledge perform well on structured domains such as AIME but lag in scientific reasoning and tool use, showing limited flexibility. ExpRAG serves as a simple yet highly effective baseline, outperforming several more complex designs. While improvements in single-turn settings are moderate, the overall trend remains consistent across datasets and model families.
            - paragraph [ref=e1862]: In multi-turn reasoning environments (AlfWorld, BabyAI, PDDL, ScienceWorld), ReMem and ExpRAG achieve strong and stable performance on both Gemini-2.5 and Claude backbones, reaching 0.92/0.96 on BabyAI and 0.95/0.62 on ScienceWorld. These results indicate that continual reflection and refinement substantially improve procedural knowledge accumulation. Performance gains are notably larger in multi-turn settings, underscoring that continual adaptation becomes increasingly valuable as task horizons lengthen. While many baselines enhance retrieval grounding, they struggle to reuse long-horizon experiences and often falter in open-ended environments. Notably, lightweight variants such as ExpRecent and ExpRAG still perform competitively despite their simplicity, suggesting that explicit task-level utilization during test-time evolution is both promising and underexplored.
            - paragraph [ref=e1864]:
              - text: Across all experiments, evolving-memory methods demonstrate consistent gains on both Gemini and Claude backbones. Smaller models benefit particularly from self-evolving memory, suggesting that test-time refinement is a practical path to enhancing the capability of lighter LLMs. Together, these findings establish task-level memory utilization and continual reorganization as valuable directions for future research, providing a standardized reference point for developing and evaluating evolving-memory agents. Additional results across more LLM families are presented in Appendix
