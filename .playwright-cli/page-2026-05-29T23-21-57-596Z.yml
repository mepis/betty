              - text: shows the cumulative accuracy as tasks progress across four interactive environments. The curves mainly serve to compare ReMem with the History baseline, as individual trajectories carry limited standalone meaning. Across all environments, ReMem consistently achieves faster adaptation and more stable retention over time. These results highlight that continual reflection enables ReMem to sustain performance across long task sequences, illustrating its robustness in test-time learning. More comparative results on single-turn tasks are presented in Appendix
