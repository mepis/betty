          - heading "Abstract" [level=6] [ref=e119]
          - paragraph [ref=e120]:
            - text: Statefulness is essential for large language model (LLM) agents to perform long-term planning and problem-solving. This makes
            - emphasis [ref=e121]: memory
            - text: a critical component, yet its management and evolution remain largely underexplored. Existing evaluations mostly focus on static conversational settings, where memory is passively retrieved from dialogue to answer queries, overlooking the dynamic ability to accumulate and reuse
            - emphasis [ref=e122]: experience
            - text: across evolving task streams. In real-world environments such as interactive problem assistants or embodied agents, LLMs are required to handle continuous task streams, yet often fail to learn from accumulated interactions, losing valuable contextual insights, a limitation that calls for
            - emphasis [ref=e123]: test-time evolution
            - text: ", where LLMs retrieve, integrate, and update memory continuously during deployment. To bridge this gap, we introduce Evo-Memory, a comprehensive streaming benchmark and framework for evaluating"
            - emphasis [ref=e124]: self-evolving memory
            - text: in LLM agents. Evo-Memory structures datasets into sequential task streams, requiring LLMs to search, adapt, and evolve memory after each interaction. We unify and implement over ten representative memory modules and evaluate them across 10 diverse multi-turn goal-oriented and single-turn reasoning and QA datasets. To better benchmark experience reuse, we provide a baseline method, ExpRAG, for retrieving and utilizing prior experience, and further propose ReMem, an
            - emphasis [ref=e125]: action–think–memory refine
            - text: pipeline that tightly integrates reasoning, task actions, and memory updates to achieve continual improvement.
