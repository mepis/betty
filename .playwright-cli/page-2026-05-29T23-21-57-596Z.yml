          - generic [ref=e3542]:
            - heading "B.2 Additional Analysis of Memory Pruning" [level=3] [ref=e3543]:
              - generic [ref=e3544]: B.2
              - text: Additional Analysis of Memory Pruning
            - paragraph [ref=e3546]:
              - text: Figure
              - link "7" [ref=e3547] [cursor=pointer]:
                - /url: https://arxiv.org/html/2511.20857v1#A2.F7
              - text: shows memory pruning rates across datasets, revealing varying selectivity in memory retention. The pruning ratios differ substantially across benchmarks, which appears related to task diversity and domain coverage. Datasets with broader domain coverage such as GPQA, which encompasses diverse problem types across engineering, physics, and other domains, exhibit higher pruning rates (36.8%), suggesting that more memories are deemed redundant across heterogeneous tasks. In contrast, datasets with more concentrated problem types like AIME show lower pruning rates (17.5% and 10.8% respectively), indicating that memories remain more relevant due to higher task similarity. This pattern suggests that the pruning mechanism effectively identifies and discards domain-irrelevant experiences, though the precise relationship between task diversity and memory selectivity warrants further investigation.
          - generic [ref=e3548]:
            - heading "B.3 Additional Comparative Curves on Single-turn Tasks" [level=3] [ref=e3549]:
              - generic [ref=e3550]: B.3
              - text: Additional Comparative Curves on Single-turn Tasks
            - paragraph [ref=e3552]:
              - text: Figure
              - link "8" [ref=e3553] [cursor=pointer]:
                - /url: https://arxiv.org/html/2511.20857v1#A2.F8
              - text: presents cumulative accuracy curves comparing ReMem with the baseline across single-turn reasoning benchmarks and model variants. As task instances accumulate, ReMem shows consistent improvement on GPQA, ToolBench, and MMLU-PRO (Engineer) for both Gemini-2.5-Flash-Lite and Claude-3.7-Sonnet. Similar to the multi-turn results, History performs comparably at the beginning due to the cold-start phase, but ReMem quickly surpasses it as more tasks are processed, indicating the cumulative advantage of continual task-level adaptation.
