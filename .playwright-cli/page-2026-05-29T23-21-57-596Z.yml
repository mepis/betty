                - generic [ref=e1183]: 4.1.2
                - text: Evaluation
              - paragraph [ref=e1185]: Evo-Memory evaluates both task performance and memory quality along four dimensions. First, answer accuracy measures whether the model produces correct outputs in single-turn tasks. Second, success rate and progress rate evaluate goal completion in multi-turn tasks. Third, step efficiency tracks how many steps are needed to reach a goal, reflecting reasoning conciseness. Finally, sequence robustness tests whether performance stays stable under different task orders. Together, these metrics assess how well the agent learns, adapts, and reuses knowledge over time.
