- generic [ref=e2]: "{\"query\": \"opencode.ai external_directory symlink path traversal .. escape security\", \"number_of_results\": 0, \"results\": [{\"url\": \"https://dev.to/pachilo/reading-outside-the-lines-symlink-escape-in-opencodes-file-api-5f81\", \"title\": \"Reading Outside the Lines: Symlink Escape in OpenCode's File API - DEV Community\", \"content\": \"Securing it is the user's responsibility.\\\" At this point, I understand their threat model. Server mode is out of scope. Users are expected to protect it themselves. But I still think users should know that the file API can return files outside the project if symlinks are involved. That's the point of this post. ... This shows all symlinks and their targets. Do this before running opencode serve in a repo you don't fully trust.\", \"publishedDate\": null, \"engine\": \"startpage\", \"template\": \"default.html\", \"parsed_url\": [\"https\", \"dev.to\", \"/pachilo/reading-outside-the-lines-symlink-escape-in-opencodes-file-api-5f81\", \"\", \"\", \"\"], \"img_src\": \"\", \"thumbnail\": \"\", \"priority\": \"\", \"engines\": [\"startpage\", \"brave\", \"duckduckgo\"], \"positions\": [1, 1, 1], \"score\": 9.0, \"category\": \"general\", \"pubdate\": \"2026-03-10 00:00:00\"}, {\"url\": \"https://github.com/anomalyco/opencode/issues/5529\", \"title\": \"[FEATURE]: Add per-agent filesystem boundaries (allow/deny paths) + optional run-as user for bash \\u00b7 Issue #5529 \\u00b7 anomalyco/opencode\", \"content\": \"ny rules override allow rules; safe path resolution prevents traversal/symlink escapes ... Only external_directory checks (doesn\\u2019t solve \\u201cwithin-repo\\u201d boundaries like docs/** vs src/**) ([OpenCode][2])\", \"thumbnail\": null, \"engine\": \"google\", \"template\": \"default.html\", \"parsed_url\": [\"https\", \"github.com\", \"/anomalyco/opencode/issues/5529\", \"\", \"\", \"\"], \"img_src\": \"\", \"priority\": \"\", \"engines\": [\"startpage\", \"google\", \"brave\"], \"positions