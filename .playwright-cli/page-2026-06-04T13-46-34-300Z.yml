sal | OWASP Foundation\", \"content\": \"A path traversal attack (also known as directory traversal) aims to access files and directories that are stored outside the web root folder.\", \"publishedDate\": null, \"thumbnail\": \"\", \"engine\": \"brave\", \"parsed_url\": [\"https\", \"owasp.org\", \"/www-community/attacks/Path_Traversal\", \"\", \"\", \"\"], \"img_src\": \"\", \"priority\": \"\", \"engines\": [\"brave\"], \"positions\": [9], \"score\": 0.1111111111111111, \"category\": \"general\"}, {\"template\": \"default.html\", \"title\": \"Opencode Permissions and Security Configuration - Let AI Work ...\", \"content\": \"Learn how to configure Opencode's permission system, protect sensitive files and prevent dangerous operations while enjoying AI programming convenience and ensuring code security.\", \"img_src\": \"\", \"iframe_src\": \"\", \"audio_src\": \"\", \"thumbnail\": \"\", \"publishedDate\": null, \"pubdate\": \"\", \"length\": null, \"views\": \"\", \"author\": \"\", \"metadata\": \"\", \"priority\": \"\", \"engines\": [\"duckduckgo\"], \"open_group\": false, \"close_group\": false, \"positions\": [9], \"score\": 0.1111111111111111, \"category\": \"general\", \"url\": \"https://opencodex.cc/en/tutorials/security-config\", \"engine\": \"duckduckgo\", \"parsed_url\": [\"https\", \"opencodex.cc\", \"/en/tutorials/security-config\", \"\", \"\", \"\"]}, {\"template\": \"default.html\", \"title\": \"Opencode CLI on Windows Fix - Medium\", \"content\": \"I tried installing opencode on my windows machine and after a lot of troubleshooting I was able to make it work with no noticeable problems. When installing opencode-ai globally on a standard ...\", \"img_src\": \"\", \"iframe_src\": \"\", \"audio_src\": \"\", \"thumbnail\": \"\", \"publishedDate\": null, \"pubdate\": \"\", \"length\": null, \"views\": \"\", \"author\": \"\", \"metadata\": \"\", \"priority\": \"\", \"engines\": [\"duckduckgo\"], \"open_group\": false, \"close_group\": false, \"positions\": [10], \"score\": 0.1, \"category\": \"general\", \"url\": \"https://medium.com/@ceelopez/opencode-cli-on-windows-fix-1b90e241cc8f\", \"engine\": \"duckduckgo\", \"parsed_url\": [\"https\", \"medium.com\", \"/@ceelopez/opencode-cli-on-windows-fix-1b90e241cc8f\", \"\", \"\", \"\"]}, {\"template\": \"default.html\", \"url\": \"https://cwe.mitre.org/data/definitions/22.html\", \"title\": \"CWE - CWE-22: Improper Limitation of a Pathname to a Restricted Directory ('Path Traversal') (4.20)\", \"content\": \"Some pathname equivalence issues are not directly related to directory traversal, rather are used to bypass security-relevant checks for whether a file/directory can be accessed by the attacker (e.g.\", \"publishedDate\": null, \"thumbnail\": \"\", \"engine\": \"brave\", \"parsed_url\": [\"https\", \"cwe.mitre.org\", \"/data/definitions/22.html\", \"\", \"\", \"\"], \"img_src\": \"\", \"priority\": \"\", \"engines\": [\"brave\"], \"positions\": [13], \"score\": 0.07692307692307693, \"category\": \"general\"}, {\"template\": \"default.html\", \"url\": \"https://www.fastly.com/blog/back-to-basics-directory-traversal\", \"title\": \"Back to Basics: Directory Traversal | Fastly\", \"content\": \"Path canonicalization essentially shortens the file path to its actual path, effectively removing symlinks, ../ sequences, and other symbolic content. After getting a canonical path, you can verify it still starts with your expected base directory ...\", \"publishedDate\": \"2024-12-06T00:00:00\", \"thumbnail\": \"\", \"engine\": \"brave\", \"parsed_url\": [\"https\", \"www.fastly.com\", \"/blog/back-to-basics-directory-traversal\", \"\", \"\", \"\"], \"img_src\": \"\", \"priority\": \"\", \"engines\": [\"brave\"], \"positions\": [17], \"score\": 0.058823529411764705, \"category\": \"general\", \"pubdate\": \"2024-12-06 00:00:00\"}, {\"template\": \"default.html\", \"url\": \"https://stackoverflow.com/questions/45188708/how-to-prevent-directory-traversal-attack-from-python-code\", \"title\": \"How to prevent directory traversal attack from Python code - Stack Overflow\", \"content\": \"\", \"publishedDate\": null, \"thumbnail\": \"\", \"engine\": \"brave\", \"parsed_url\": [\"https\", \"stackoverflow.com\", \"/questions/45188708/how-to-prevent-directory-traversal-attack-from-python-code\", \"\", \"\", \"\"], \"img_src\": \"\", \"priority\": \"\", \"engines\": [\"brave\"], \"positions\": [20], \"score\": 0.05, \"category\": \"general\"}, {\"template\": \"default.html\", \"url\": \"https://github.com/onnx/onnx/commit/4755f8053928dce18a61db8fec71b69c74f786cb\", \"title\": \"Improve external data file handling - onnx.load (#7717) \\u00b7 onnx/onnx@4755f80\", \"content\": \"**Security Model Implementation** * Added a new `docs/security.md` describing the threat model, four-layer defense strategy (canonical path containment, symlink detection, O_NOFOLLOW, hardlink count), entry points protected, and known limitations. * In `onnx/checker.cc`, enhanced external data path validation to use `std::filesystem::weakly_canonical()` for canonical path containment, ensuring external data cannot escape the model directory via symlinks or path traversal.\", \"publishedDate\": \"2026-03-04T00:00:00\", \"thumbnail\": \"https://imgs.search.brave.com/JzIxuml1f8IZ2jIFyEES1ipKCSlLyTVTgSCrq8PnsIw/rs:fit:200:200:1:0/g:ce/aHR0cHM6Ly9vcGVu/Z3JhcGguZ2l0aHVi/YXNzZXRzLmNvbS8z/YzNjYzAyNzMxZDEy/N2I4MDM2YmRkYmEy/NjFlOTQ4NTMwYWNl/ZDI5NDg2ODJjMDg0/MzUxMDk0YzNmNTU0/NDkzL29ubngvb25u/eC9jb21taXQvNDc1/NWY4MDUzOTI4ZGNl/MThhNjFkYjhmZWM3/MWI2OWM3NGY3ODZj/Yg\", \"engine\": \"brave\", \"parsed_url\": [\"https\", \"github.com\", \"/onnx/onnx/commit/4755f8053928dce18a61db8fec71b69c74f786cb\", \"\", \"\", \"\"], \"img_src\": \"\", \"priority\": \"\", \"engines\": [\"brave\"], \"positions\": [19], \"score\": 0.05263157894736842, \"category\": \"general\", \"pubdate\": \"2026-03-04 00:00:00\"}, {\"template\": \"default.html\", \"url\": \"https://github.com/bentoml/BentoML/security/advisories/