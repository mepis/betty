../../../) by normalising the path. It validates that a path string starts with an allowed directory, but it does not resolve symlinks.\", \"publishedDate\": null, \"thumbnail\": \"\", \"engine\": \"brave\", \"parsed_url\": [\"https\", \"github.com\", \"/wonderwhy-er/DesktopCommanderMCP/issues/219\", \"\", \"\", \"\"], \"img_src\": \"\", \"priority\": \"\", \"engines\": [\"brave\"], \"positions\": [3, 6], \"score\": 1.0, \"category\": \"general\", \"pubdate\": \"2025-08-22 00:00:00\"}, {\"template\": \"default.html\", \"url\": \"https://www.invicti.com/learn/directory-traversal-path-traversal\", \"title\": \"How do symbolic links affect traversal defenses?\", \"content\": \"Symlinks can bypass checks that only look at the raw input string. A path can appear to stay inside an allowed directory but resolve to a location outside it if a symlink points elsewhere. Canonicalization should resolve the final path and verify it remains within the allowed base directory, and sensitive directories should avoid writable paths where attackers could create links.\", \"publishedDate\": null, \"thumbnail\": \"\", \"engine\": \"brave\", \"parsed_url\": [\"https\", \"www.invicti.com\", \"/learn/directory-traversal-path-traversal\", \"\", \"\", \"\"], \"img_src\": \"\", \"priority\": \"\", \"engines\": [\"brave\"], \"positions\": [4, 10], \"score\": 0.7, \"category\": \"general\"}, {\"url\": \"https://raw.githubusercontent.com/Brittany-Reid/nlp2testablecode/master/data/task,id.txt\", \"title\": \"task,id.txt - GitHub\", \"content\": \"... path,32789363 use by android camera activity,22128799 download in chef ... escape sequence,14619643 check for formatted strings,4444416 move rectangle ...\", \"thumbnail\": null, \"engine\": \"google\", \"template\": \"default.html\", \"parsed_url\": [\"https\", \"raw.githubusercontent.com\", \"/Brittany-Reid/nlp2testablecode/master/data/task,id.txt\", \"\", \"\", \"\"], \"img_src\": \"\", \"priority\": \"\", \"engines\": [\"startpage\", \"google\"],