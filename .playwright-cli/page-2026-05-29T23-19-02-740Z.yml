        - paragraph [ref=e400]: "Memory in LLM agents evolves along multiple dimensions. We categorize the major facets as: (1) the content of memory, comprising stored information and its level of detail; (2) the structure of memory, referring to the organization and representation of knowledge; and (3) the policy for memory management, namely the decision-making process that determines how memory is utilized and updated. While these facets are interrelated, examining them separately clarifies how modern systems transcend the limitations of static memory."
