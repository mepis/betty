          - text: Current memory systems predominantly prioritize adaptability—the ability of an agent to rapidly learn and incorporate new context—over stability and safety. In unrestricted architectures, the agent interacts directly with the storage medium, acting as both the sole generator and validator of its evolving knowledge base. As established in Section 4, this unconstrained autonomy is the primary catalyst for semantic drift, catastrophic forgetting, and susceptibility to adversarial memory poisoning
