    - article [ref=e60]:
      - 'heading "Governing Evolving Memory in LLM Agents: Risks, Mechanisms, and the Stability and Safety Governed Memory (SSGM) Framework" [level=1] [ref=e61]'
      - generic [ref=e63]:
        - generic [ref=e64]:
          - text: Chingkwun Lam, Jiaxin Li, Lingfei Zhang, Kuo Zhao
          - text: College of Intelligent Science and Engineering, Jinan University
          - generic [ref=e65]: zhaokuo@jnu.edu.cn
        - generic [ref=e66]: Corresponding author.
      - generic [ref=e67]:
        - heading "Abstract" [level=6] [ref=e68]
        - paragraph [ref=e69]: Long-term memory has emerged as a foundational component of autonomous Large Language Model (LLM) agents, enabling continuous adaptation, lifelong multimodal learning, and sophisticated reasoning. However, as memory systems transition from static retrieval databases to dynamic, agentic mechanisms, critical concerns regarding memory governance, semantic drift, and privacy vulnerabilities have surfaced. While recent surveys have focused extensively on memory retrieval efficiency, they largely overlook the emergent risks of memory corruption in highly dynamic environments. To address these emerging challenges, we propose the Stability and Safety-Governed Memory (SSGM) framework, a conceptual governance architecture. SSGM decouples memory evolution from execution by enforcing consistency verification, temporal decay modeling, and dynamic access control prior to any memory consolidation. Through formal analysis and architectural decomposition, we show how SSGM can mitigate topology-induced knowledge leakage where sensitive contexts are solidified into long-term storage, and help prevent semantic drift where knowledge degrades through iterative summarization. Ultimately, this work provides a comprehensive taxonomy of memory corruption risks and establishes a robust governance paradigm for deploying safe, persistent, and reliable agentic memory systems.
      - generic [ref=e70]:
        - heading "1 Introduction" [level=2] [ref=e71]:
          - generic [ref=e72]: "1"
          - text: Introduction
        - paragraph [ref=e74]:
          - text: Large Language Model (LLM) agents have demonstrated impressive reasoning and interaction capabilities across diverse domains
          - generic [ref=e75]:
            - text: (Matarazzo and Torlone,
            - link "2025" [ref=e76] [cursor=pointer]:
              - /url: "#bib.bib19"
            - text: )
          - text: ; yet, in the absence of specialized mechanisms, they remain fundamentally stateless. Standard LLMs rely on a fixed-length context window that prevents indefinite information retention
          - generic [ref=e77]:
            - text: (Zhong et al.,
            - link "2024" [ref=e78] [cursor=pointer]:
              - /url: "#bib.bib50"
            - text: ; Yousuf et al.,
            - link "2025" [ref=e79] [cursor=pointer]:
              - /url: "#bib.bib42"
            - text: ; OpenAI,
            - link "2023" [ref=e80] [cursor=pointer]:
              - /url: "#bib.bib21"
            - text: )
          - text: . While early solutions employed Retrieval-Augmented Generation (RAG) to provide a static knowledge base
          - generic [ref=e81]:
            - text: (Lewis et al.,
            - link "2020" [ref=e82] [cursor=pointer]:
              - /url: "#bib.bib17"
            - text: ; Gao et al.,
            - link "2023" [ref=e83] [cursor=pointer]:
              - /url: "#bib.bib8"
            - text: )
          - text: ", modern autonomous agents demand a more dynamic capability: the ability to learn from experience, update their world models, and refine their strategies over time"
          - generic [ref=e84]:
            - text: (Xi et al.,
            - link "2023" [ref=e85] [cursor=pointer]:
              - /url: "#bib.bib37"
            - text: ; Wang et al.,
            - link "2023" [ref=e86] [cursor=pointer]:
              - /url: "#bib.bib35"
            - text: )
          - text: .
        - paragraph [ref=e88]:
          - text: This necessity has driven a paradigm shift from static memory storage to adaptive, self-refining memory systems. Recent architectures treat memory operations not as passive retrieval tasks but as active decision-making processes. For instance, Memory-R1 employs reinforcement learning to train specialized sub-agents that autonomously decide when to add, update, or delete memory units based on task feedback
          - generic [ref=e89]:
            - text: (Yan et al.,
            - link "2026" [ref=e90] [cursor=pointer]:
              - /url: "#bib.bib40"
            - text: )
          - text: . Similarly, frameworks like Mem0 and AtomMem introduce dynamic consolidation mechanisms that continuously optimize the storage structure via atomic operations
          - generic [ref=e91]:
            - text: (Chhikara et al.,
            - link "2025" [ref=e92] [cursor=pointer]:
              - /url: "#bib.bib5"
            - text: ; Huo et al.,
            - link "2026" [ref=e93] [cursor=pointer]:
              - /url: "#bib.bib14"
            - text: )
          - text: . In these systems, memory is no longer an immutable log but a mutable asset that evolves alongside the agent
          - generic [ref=e94]:
            - text: (Zhang et al.,
            - link "2026b" [ref=e95] [cursor=pointer]:
              - /url: "#bib.bib47"
            - text: ; Luo et al.,
            - link "2026" [ref=e96] [cursor=pointer]:
              - /url: "#bib.bib48"
            - text: )
          - text: .
        - 'figure "Figure 1: The Lifecycle of Memory Evolution and Emergent Risks. Unlike static RAG, evolving memory systems introduce a feedback loop where errors can accumulate. We identify three critical failure points: (1) Memory Poisoning during input ingestion, (2) Semantic Drift during consolidation updates, and (3) Conflict/Hallucination during retrieval. SSGM aims to govern these interfaces." [ref=e97]':
          - img "Refer to caption" [ref=e98]
          - generic [ref=e99]:
            - generic [ref=e100]: "Figure 1:"
            - text: "The Lifecycle of Memory Evolution and Emergent Risks. Unlike static RAG, evolving memory systems introduce a feedback loop where errors can accumulate. We identify three critical failure points: (1) Memory Poisoning during input ingestion, (2) Semantic Drift during consolidation updates, and (3) Conflict/Hallucination during retrieval. SSGM aims to govern these interfaces."
        - paragraph [ref=e102]:
          - text: However, granting agents the autonomy to rewrite their own memory introduces the stability-plasticity dilemma into artificial systems. Without robust governance, the continuous refinement of memory creates significant risks. An agent may gradually distort facts through repeated summarization (semantic drift), reinforce suboptimal workflows (procedural drift)
          - generic [ref=e103]:
            - text: (Han et al.,
            - link "2025" [ref=e104] [cursor=pointer]:
              - /url: "#bib.bib10"
            - text: ; Rath,
            - link "2026" [ref=e105] [cursor=pointer]:
              - /url: "#bib.bib27"
            - text: )
          - text: ", or inadvertently internalize hallucinations and malicious injections as valid knowledge"
          - generic [ref=e106]:
            - text: (Wang et al.,
            - link "2025" [ref=e107] [cursor=pointer]:
              - /url: "#bib.bib38"
            - text: ; Greshake et al.,
            - link "2023" [ref=e108] [cursor=pointer]:
              - /url: "#bib.bib9"
            - text: )
          - text: . Unlike static RAG systems, where errors are isolated to a single retrieval step, errors in evolving memory systems are cumulative and persistent. As delineated in Figure
          - link "1" [ref=e109] [cursor=pointer]:
            - /url: "#S1.F1"
          - text: ", this creates a compounding failure loop across three critical interfaces: input ingestion (poisoning), memory consolidation (drift), and memory retrieval (hallucination). Figure"
          - link "1" [ref=e110] [cursor=pointer]:
            - /url: "#S1.F1"
          - text: presents this coarse-grained lifecycle risk loop, which is later refined into the four-dimensional failure taxonomy in Table
          - link "2" [ref=e111] [cursor=pointer]:
            - /url: "#S5.T2"
          - text: . As noted in recent surveys
          - generic [ref=e112]:
            - text: (Hu et al.,
            - link "2025" [ref=e113] [cursor=pointer]:
              - /url: "#bib.bib11"
            - text: ; Luo et al.,
            - link "2026" [ref=e114] [cursor=pointer]:
              - /url: "#bib.bib48"
            - text: )
          - text: ", while the mechanisms of memory update are well-studied, the protocols for ensuring their long-term correctness and safety remain underexplored."
        - generic [ref=e115]:
          - paragraph [ref=e116]: "To address this gap, this paper proposes the Stability- and Safety-Governed Memory (SSGM) framework. We argue that for LLM agents to be reliable in high-stakes environments, memory evolution must be decoupled from memory governance. Our contributions are fourfold:"
          - list [ref=e117]:
            - listitem [ref=e118]:
              - text: "1."
              - paragraph [ref=e120]:
                - text: "Taxonomy of Evolution: We categorize memory evolution along three dimensions: content abstraction, structural reorganization (e.g., from lists to Zettelkasten-style graphs"
                - generic [ref=e121]:
                  - text: (Xu et al.,
                  - link "2025" [ref=e122] [cursor=pointer]:
                    - /url: "#bib.bib39"
                  - text: ; Jiang et al.,
                  - link "2026" [ref=e123] [cursor=pointer]:
                    - /url: "#bib.bib15"
                  - text: )
                - text: ), and policy optimization.
            - listitem [ref=e124]:
              - text: "2."
              - paragraph [ref=e126]: "Failure Analysis: We identify and formalize key failure modes in adaptive memory, specifically distinguishing between intrinsic drift (e.g., knowledge conflict) and extrinsic threats (e.g., memory poisoning)."
            - listitem [ref=e127]:
              - text: "3."
              - paragraph [ref=e129]: "The SSGM Framework: We synthesize design principles for a governed memory architecture that integrates consistency verification and ground-truth anchoring to mitigate the risks of uncontrolled evolution."
            - listitem [ref=e130]:
              - text: "4."
              - paragraph [ref=e132]: "Fundamental Trade-offs: We establish a formal discussion on the three fundamental trade-offs inherent in agentic memory—the latency-safety trade-off, the stability-plasticity conflict, and the scalability of graph structures—setting the stage for future research."
      - generic [ref=e133]:
        - heading "2 From Static to Adaptive Memory Systems" [level=2] [ref=e134]:
          - generic [ref=e135]: "2"
          - text: From Static to Adaptive Memory Systems
        - paragraph [ref=e137]:
          - text: Initial iterations of LLM-based agent systems either lacked long-term memory entirely or relied on simplistic approaches to maintain context. For example, some agents maintained a sequential log of recent dialogue and instructions, truncating or discarding older content upon the saturation of the context window
          - generic [ref=e138]:
            - text: (Press et al.,
            - link "2021" [ref=e139] [cursor=pointer]:
              - /url: "#bib.bib24"
            - text: )
          - text: "; others utilized vector-similarity search within a database of past interactions to retrieve relevant segments on demand. These strategies constitute a paradigm of static memory: the agent does not alter its memory usage adaptively based on interaction outcomes, and the rules for storage and retrieval are predetermined by developers. A classic example is the Generative Agents framework"
          - generic [ref=e140]:
            - text: (Park et al.,
            - link "2023" [ref=e141] [cursor=pointer]:
              - /url: "#bib.bib23"
            - text: )
          - text: ", where simulated characters stored factual observations and reflections, retrieving them via a fixed relevance-and-recency scoring heuristic. While effective to a degree, this design required extensive manual tuning of storage and summarization criteria, and the system could not learn from memory management errors. Similarly, MemoryBank"
          - generic [ref=e142]:
            - text: (Zhong et al.,
            - link "2024" [ref=e143] [cursor=pointer]:
              - /url: "#bib.bib50"
            - text: )
          - text: and related systems summarized or discarded observations using fixed schedules or manually crafted triggers, illustrating the resource-intensive and suboptimal nature of heuristic memory management.
        - paragraph [ref=e145]:
          - text: The limitations of static approaches motivated the development of adaptive memory mechanisms. A crucial insight involved framing memory management as a decision problem amenable to learning or operating system-like management. MemGPT
          - generic [ref=e146]:
            - text: (Packer et al.,
            - link "2024" [ref=e147] [cursor=pointer]:
              - /url: "#bib.bib22"
            - text: )
          - text: pioneered the concept of treating context as a limited resource, employing an OS-inspired paging mechanism to transfer information between “main context” (RAM) and “external context” (disk) based on immediate task requirements. This represented a fundamental shift from simple sliding windows. The Tensor Brain
          - generic [ref=e148]:
            - text: (Tresp et al.,
            - link "2023" [ref=e149] [cursor=pointer]:
              - /url: "#bib.bib32"
            - text: )
          - text: constituted another early effort, introducing a neural architecture for differentiable episodic, semantic, and working memory. More recently, Memory-R1 explicitly formulates memory operations as actions to be optimized by a learned policy
          - generic [ref=e150]:
            - text: (Yan et al.,
            - link "2026" [ref=e151] [cursor=pointer]:
              - /url: "#bib.bib40"
            - text: )
          - text: .
        - paragraph [ref=e153]:
          - text: "Other systems incorporate adaptivity via alternative mechanisms: MemAct"
          - generic [ref=e154]:
            - text: (Zhang et al.,
            - link "2026b" [ref=e155] [cursor=pointer]:
              - /url: "#bib.bib47"
            - text: )
          - text: enables the agent to embed memory-related actions into its chain-of-thought prompting
          - generic [ref=e156]:
            - text: (Wei et al.,
            - link "2022" [ref=e157] [cursor=pointer]:
              - /url: "#bib.bib36"
            - text: ; Yao et al.,
            - link "2023" [ref=e158] [cursor=pointer]:
              - /url: "#bib.bib41"
            - text: )
          - text: . If the agent detects uncertainty regarding a detail, it can explicitly issue a “lookup memory” or “store memory” action. Over multiple reasoning sessions, the agent refines the timing of these actions via feedback. Similarly, Nemori
          - generic [ref=e159]:
            - text: (Nan et al.,
            - link "2025" [ref=e160] [cursor=pointer]:
              - /url: "#bib.bib20"
            - text: )
          - text: "draws upon cognitive science to introduce a self-organizing memory policy: the agent internalizes rules for maintaining consistency and organization (such as periodically reconciling new information with old) without external supervision, thereby gradually improving memory coherence."
