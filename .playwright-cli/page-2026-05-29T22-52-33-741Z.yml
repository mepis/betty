 {\"url\": \"https://developer.mozilla.org/en-US/docs/Web/API/SourceBuffer\", \"title\": \"SourceBuffer\", \"content\": \"The SourceBuffer interface represents a chunk of media to be passed into an HTMLMediaElement and played, via a MediaSource object. This can be made up of one or several media segments.\", \"engine\": \"mdn\", \"template\": \"default.html\", \"parsed_url\": [\"https\", \"developer.mozilla.org\", \"/en-US/docs/Web/API/SourceBuffer\", \"\", \"\", \"\"], \"img_src\": \"\", \"thumbnail\": \"\", \"priority\": \"\", \"engines\": [\"mdn\"], \"positions\": [6], \"score\": 0.16666666666666666, \"category\": \"it\", \"publishedDate\": null}, {\"url\": \"https://developer.mozilla.org/en-US/docs/Web/API/MediaSource/MediaSource\", \"title\": \"MediaSource: MediaSource() constructor\", \"content\": \"The MediaSource() constructor of the MediaSource interface constructs and returns a new MediaSource object with no associated source buffers.\", \"engine\": \"mdn\", \"template\": \"default.html\", \"parsed_url\": [\"https\", \"developer.mozilla.org\", \"/en-US/docs/Web/API/MediaSource/MediaSource\", \"\", \"\", \"\"], \"img_src\": \"\", \"thumbnail\": \"\", \"priority\": \"\", \"engines\": [\"mdn\"], \"positions\": [7], \"score\": 0.14285714285714285, \"category\": \"it\", \"publishedDate\": null}, {\"url\": \"https://developer.mozilla.org/en-US/docs/Web/API/MediaSource/addSourceBuffer\", \"title\": \"MediaSource: addSourceBuffer() method\", \"content\": \"The addSourceBuffer() method of the MediaSource interface creates a new SourceBuffer of the given MIME type and adds it to the MediaSource's sourceBuffers list. The new SourceBuffer is also returned.\", \"engine\": \"mdn\", \"template\": \"default.html\", \"parsed_url\": [\"https\", \"developer.mozilla.org\", \"/en-US/docs/Web/API/MediaSource/addSourceBuffer\", \"\", \"\", \"\"], \"img_src\": \"\", \"thumbnail\": \"\", \"priority\": \"\", \"engines\": [\"mdn\"], \"positions\": [8], \"score\": 0.125, \"category\"