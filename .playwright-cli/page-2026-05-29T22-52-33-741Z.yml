- generic [ref=e2]: "{\"query\": \"embedding model benchmark MTEB 2025 2026 text-embedding-3 gte multilingual best performance open source closed source\", \"number_of_results\": 0, \"results\": [{\"url\": \"https://developer.mozilla.org/en-US/docs/Learn_web_development/Core/Structuring_content/General_embedding_technologies\", \"title\": \"From object to iframe \\u2014 general embedding technologies\", \"content\": \"Developers commonly think of embedding media such as images, video and audio into web pages. In this article we take somewhat of a sideways step, looking at some elements that allow you to embed a wide variety of content types into your webpages: the <iframe>, <embed> and <object> elements. <iframe>s are for embedding other web pages, and the other two allow you to embed external resources such as PDF files.\", \"engine\": \"mdn\", \"template\": \"default.html\", \"parsed_url\": [\"https\", \"developer.mozilla.org\", \"/en-US/docs/Learn_web_development/Core/Structuring_content/General_embedding_technologies\", \"\", \"\", \"\"], \"img_src\": \"\", \"thumbnail\": \"\", \"priority\": \"\", \"engines\": [\"mdn\"], \"positions\": [1], \"score\": 1.0, \"category\": \"it\", \"publishedDate\": null}, {\"url\": \"https://developer.mozilla.org/en-US/docs/MDN/Community/Open_source_etiquette\", \"title\": \"Open source etiquette\", \"content\": \"If you've not worked on an open source project (OSP) before, it is a good idea to read this article before starting to contribute to MDN Web Docs and other open source projects. There are a few behaviors to adopt that will help you and the other project contributors feel valued and safe, and stay productive. This article won't teach you everything about contributing to open source; the aim is to cover foundational topics for taking part in open source communities.\", \"engine\": \"mdn\", \"template\": \"default.html\", \"parsed_url\": [\"https\", \"developer.mozilla.org\", \"/en-US/docs/MDN/Community/Open_source_etiquett