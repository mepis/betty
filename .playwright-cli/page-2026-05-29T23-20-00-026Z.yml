              - text: Analysis of Uncertainty Types
            - paragraph [ref=e1378]: "There are two types of uncertainty that are relevant to this model. Aleatoric uncertainty is associated with the data while epistemic uncertainty is associated with the model. More information can be obtained by analyzing these two kinds of uncertainty:"
            - list [ref=e1380]:
              - listitem [ref=e1381]:
                - text: "1."
                - paragraph [ref=e1383]: Epistemic uncertainty tends to be higher in regions with complex structures that the model struggles to learn, such as tumor boundaries and intricate brain structures.
              - listitem [ref=e1384]:
                - text: "2."
                - paragraph [ref=e1386]: Aleatoric uncertainty is more pronounced in regions with inherent ambiguity, such as partially visible tumors or artifacts in the imaging process.
            - paragraph [ref=e1388]: The complementary nature of these uncertainty types contributes to the robustness of our anomaly detection approach. By incorporating both types, the model can better distinguish between genuine anomalies and complex but normal brain structures.
