            - paragraph [ref=e1373]: A particular point of interest in the study of uncertainty mapping is that it emphasizes both central tumor sites as well as uncertainty in the boundary area between affected and healthy tissues. This is especially beneficial in clinical practice, where precise tumor borders are a necessity for designing treatment.
