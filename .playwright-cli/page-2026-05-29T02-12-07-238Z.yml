        - heading "Apple Silicon as a Reference Baseline" [level=2] [ref=e997]
        - paragraph [ref=e998]: "Discussion #4167 is useful because it established a more unified benchmark format early on. Besides Q4_0, it also includes F16 and Q8_0, which helps explain PP / TG / t/s. The thread explicitly defines:"
        - list [ref=e999]:
          - listitem [ref=e1000]: PP = prompt processing
          - listitem [ref=e1001]: TG = ext-generation
