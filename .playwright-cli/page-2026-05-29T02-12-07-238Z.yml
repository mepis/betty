      - generic [ref=e166]:
        - heading "Understanding the Metrics First" [level=2] [ref=e167]
        - heading "What is Q4_0" [level=3] [ref=e168]
        - paragraph [ref=e169]: Q4_0 is a 4-bit quantization format. It does not mean the model is stronger. It means the model is smaller, uses less VRAM, and fits on more devices. Most of these scoreboards standardize on Llama 2 7B, Q4_0 so that GPU-to-GPU comparisons are easier.
        - heading "What is pp512" [level=3] [ref=e170]
        - paragraph [ref=e171]: pp512 usually means prompt processing 512 tokens, which is the throughput while processing 512 input tokens.
        - list [ref=e172]:
          - listitem [ref=e173]: pp = prompt processing
          - listitem [ref=e174]: 512 = input length is 512 tokens
          - listitem [ref=e175]: /s = tokens per second This is closer to prompt-ingestion speed, so it is often much higher than generation speed.
        - heading "What is g128" [level=3] [ref=e176]
        - code [ref=e178]: g128 usually means ext generation 128 tokens, which is the speed while generating 128 tokens continuously.
        - list [ref=e179]:
          - listitem [ref=e180]: g = text generation
          - listitem [ref=e181]: 128 = generate 128 tokens continuously
          - listitem [ref=e182]: /s = tokens per second This is usually closer to the speed users actually feel in interactive usage.
        - heading "What is FA" [level=3] [ref=e183]
        - paragraph [ref=e184]: FA stands for Flash Attention.
        - list [ref=e185]:
          - listitem [ref=e186]: with FA means Flash Attention is enabled
          - listitem [ref=e187]
        - paragraph [ref=e188]: o FA means Flash Attention is disabled On many GPUs, FA improves pp512 more clearly than g128, but the gain is not identical across backends, drivers, and GPU architectures.
        - heading "How to read /s" [level=3] [ref=e189]
        - code [ref=e191]: /s means okens per second. When reading these scoreboards, the key rule is to compare the same type of test with the same settings.
        - list [ref=e192]:
          - listitem [ref=e193]: Do not compare pp512 and g128 as if they were the same thing
          - listitem [ref=e194]: Do not mix o FA and with FA
          - listitem [ref=e195]: Do not assume CUDA, ROCm, and Vulkan are directly interchangeable
        - heading "Quick Takeaways" [level=2] [ref=e196]
        - list [ref=e197]:
          - listitem [ref=e198]: CUDA is still the strongest overall path in llama.cpp GPU benchmarks, especially on high-end Nvidia GPUs.
          - listitem [ref=e199]: ROCm is already delivering strong results on high-end AMD GPUs and Instinct accelerators.
          - listitem [ref=e200]: Vulkan has the broadest hardware coverage, including Nvidia, AMD, Intel, older GPUs, and some Apple / Asahi setups.
          - listitem [ref=e201]: g128 is closer to everyday perceived speed, while pp512 is better for judging prompt throughput.
