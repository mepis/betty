        - heading "How to Use These Tables" [level=2] [ref=e2775]
        - list [ref=e2776]:
          - listitem [ref=e2777]: Decide whether you care more about g128 or pp512. For chat and interactive use, g128 usually matters more. For long prompts and batch throughput, pp512 matters more.
          - listitem [ref=e2778]: Match the backend you actually use. Nvidia users should usually prioritize CUDA. AMD users should compare ROCm and Vulkan first. Cross-platform users should pay close attention to Vulkan.
          - listitem [ref=e2779]: Check FA last. On many GPUs, enabling FA improves pp512 more than g128, so a single headline number can be misleading.
        - heading "One-Sentence Summary" [level=2] [ref=e2780]
        - paragraph [ref=e2781]: In llama.cpp benchmarks, pp512, g128, Q4_0, FA, and CUDA / ROCm / Vulkan describe different dimensions. Once the benchmark context is clear, the tables become much easier to read.
