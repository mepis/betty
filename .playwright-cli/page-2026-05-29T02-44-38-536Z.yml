              - paragraph [ref=e305]:
                - strong [ref=e306]: 3. Port 8080 held by Yamaha Device Center on Windows boot
                - text: "A Windows audio app auto-binds port 8080 on startup. Fix: move llama.cpp to port 8081 permanently. Check with"
                - code [ref=e307]: netstat -ano | findstr :8080
                - text: in PowerShell. Kill with
                - code [ref=e308]: taskkill /PID <PID> /F
                - text: .
              - paragraph [ref=e309]:
                - strong [ref=e310]: 4. –flash-attn flag changed in newer llama.cpp
                - text: "Newer builds require an explicit value:"
                - code [ref=e311]: "--flash-attn on"
                - text: ", not just"
                - code [ref=e312]: "--flash-attn"
                - text: . The container restarts silently with a usage error if you use the old form.
              - paragraph [ref=e313]:
                - strong [ref=e314]: 5. Docker image too old for Qwen3.6
                - text: The
                - code [ref=e315]: ghcr.io/ggml-org/llama.cpp:server-cuda
                - text: "image was built before Qwen3.6’s architecture change (3-element vs 4-element rope sections). Error:"
                - code [ref=e316]: rope.dimension_sections has wrong array length; expected 4, got 3
                - text: ". Fix: build llama.cpp from source."
              - paragraph [ref=e317]:
                - strong [ref=e318]: 6. Ollama silently splits CPU/GPU
                - text: My first Ollama benchmark showed 53-61 tok/s.
                - code [ref=e319]: ollama ps
                - text: showed
                - code [ref=e320]: 17%/83% CPU/GPU
                - text: and
                - code [ref=e321]: "SIZE: 28GB on a 24GB card"
                - text: . The model was overflowing to RAM. The real Ollama speed with a clean environment is ~99 tok/s — very different.
              - paragraph [ref=e322]:
                - strong [ref=e323]: 7. CUDA toolkit not installed in WSL
                - text: The Windows NVIDIA driver provides GPU access via WSL passthrough, but the CUDA toolkit still needs to be installed separately to build CUDA code.
