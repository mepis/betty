              - heading "10. conclusions" [level=2] [ref=e678]
              - paragraph [ref=e679]: "The honest gains from moving to llama.cpp on a 3090:"
              - list [ref=e680]:
                - listitem [ref=e681]:
                  - strong [ref=e682]: 1.4× faster generation
                  - text: (not 2.4× — that was wrong)
                - listitem [ref=e683]:
                  - strong [ref=e684]: 2× context window
                  - text: at lower VRAM, via q8_0 KV cache
                - listitem [ref=e685]:
                  - strong [ref=e686]: Day-one support
                  - text: for new models like Qwen3.6
              - paragraph [ref=e687]: "The speed gain is real but modest. The context gain matters more for coding. The compatibility requirement is the strongest argument: if you want to run frontier models as they drop, you need infrastructure that can keep up. Ollama will catch up to Qwen3.6 eventually — but eventually isn’t day one."
              - paragraph [ref=e688]:
                - text: Ollama isn’t gone from the setup. It handles quick tasks, manages the model library, and serves embedding models. llama.cpp handles everything serious. The repo makes switching between them a single
                - code [ref=e689]: make
                - text: command.
              - paragraph [ref=e690]:
                - text: Everything described here — compose files, Makefile, benchmark script, run scripts, download helpers — is at
                - link "github.com/aminrj/local-llm-ops" [ref=e691] [cursor=pointer]:
                  - /url: https://github.com/aminrj/local-llm-ops
                - text: . Adding a new model when it drops is two files and one Makefile target.
