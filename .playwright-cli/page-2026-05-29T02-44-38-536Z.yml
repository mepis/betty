              - separator [ref=e166]
              - heading "1. why move beyond Ollama" [level=2] [ref=e167]
              - paragraph [ref=e168]:
                - text: Ollama is great for getting started.
                - code [ref=e169]: ollama run qwen3-coder:30b
                - text: and you have a local model in 30 seconds. I used it happily until I read a Reddit post where someone was getting 100+ tok/s on a 35B MoE model with a 4090 — same VRAM budget as my 3090. They were using llama.cpp directly, not Ollama, with explicit control over parameters Ollama doesn’t expose.
              - paragraph [ref=e170]: I was getting ~55-60 tok/s. There was a gap worth investigating.
              - paragraph [ref=e171]: "What Ollama hides from you: Ollama wraps llama.cpp but strips the knobs. No KV cache quantization, no explicit flash attention control, no batch size tuning, no expert offloading strategy, no context size guarantee. For a 24GB card where every MB matters, this leaves real performance on the table."
              - paragraph [ref=e172]: "There’s also a compatibility ceiling that only became apparent when Qwen3.6 dropped: Ollama doesn’t support the latest multimodal models because of how it handles separate vision projector files. As models get more capable and multimodal, the abstraction becomes a constraint."
              - separator [ref=e173]
              - 'heading "2. the theory: what actually matters" [level=2] [ref=e174]'
              - heading "MoE — why 35b runs like 3.6b" [level=3] [ref=e175]
              - paragraph [ref=e176]:
                - text: Both Qwen3.5 and Qwen3.6 are Mixture of Experts models with
                - strong [ref=e177]: 35B total parameters but only 3.6B active per forward pass
                - text: . The “A3B” means exactly this. A router activates only the relevant experts per token. Inference cost ≈ a 3.6B dense model. Quality ≈ a 35B dense model. This is why 100+ tok/s is achievable on consumer hardware.
              - heading "KV cache quantization — the silent VRAM killer" [level=3] [ref=e178]
              - paragraph [ref=e179]:
                - text: The KV cache stores computed attention keys and values for every context token. At f16 (Ollama’s default), a 65k context window consumes ~10-15GB on top of model weights — blowing the 24GB budget. With q8_0 quantization (
                - code [ref=e180]: "--cache-type-k q8_0"
                - text: ), that footprint halves. This is how llama.cpp fits Qwen3.5 at
                - strong [ref=e181]: 65k context in 21.7GB
                - text: while Ollama needs
                - strong [ref=e182]: 32k context and still uses 23.4GB
                - text: .
              - table [ref=e184]:
                - rowgroup [ref=e185]:
                  - row "Format Bits/weight Quality 35B model size" [ref=e186]:
                    - columnheader "Format" [ref=e187]
