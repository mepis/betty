              - heading "Flash attention" [level=3] [ref=e216]
              - paragraph [ref=e217]:
                - text: "A fused kernel that computes attention without materializing the full N×N matrix in HBM. Cuts VRAM for attention computation by ~30%, improves throughput by keeping data on-chip. One flag:"
                - code [ref=e218]: "--flash-attn on"
                - text: . Free performance on the 3090 (compute capability 8.6, fully supported).
              - heading "GPU layer offloading" [level=3] [ref=e219]
              - paragraph [ref=e220]:
                - text: With
                - code [ref=e221]: "--n-gpu-layers 99"
                - text: ", llama.cpp pushes as many transformer layers as VRAM allows to GPU. For MoE models, attention layers are compute-bound and live on GPU; expert weights can spill to RAM with tolerable speed loss since only 8 of 256 experts activate per token."
              - separator [ref=e222]
              - 'heading "3. the setup: what I built" [level=2] [ref=e223]'
              - paragraph [ref=e224]: "The goal: Ollama stays available for quick tasks and model management, while llama.cpp handles serious sessions — with zero friction to switch and zero re-downloads."
              - heading "One model file, two tools" [level=3] [ref=e225]
              - paragraph [ref=e226]:
                - text: Ollama stores models as sha256-named blobs in
                - code [ref=e227]: /usr/share/ollama/.ollama/models/blobs/
                - text: (native Linux install). These blobs are actual GGUFs with opaque names. llama.cpp can mount and load them directly. A small script reads the manifest JSON, extracts the digest, and creates a human-readable symlink. No re-download.
