              - heading "What these numbers actually mean" [level=3] [ref=e376]
              - paragraph [ref=e377]:
                - strong [ref=e378]: "Finding 1 — Speed: llama.cpp is 1.4× faster on Qwen3.5"
                - text: "136 vs 99 tok/s, not 2.4×. Over a long session: a 512-token response takes 3.7s vs 5.2s. Across dozens of exchanges this accumulates into a real difference in flow."
              - paragraph [ref=e379]:
                - strong [ref=e380]: "Finding 2 — Context: llama.cpp gives 2× the window at lower VRAM"
                - text: 65k context at 21.7GB (llama.cpp) vs 32k context at 23.4GB (Ollama). The q8_0 KV cache quantization halves the cache footprint, giving double the context window while using less VRAM simultaneously. For repo-level coding tasks, 65k vs 32k is the difference between fitting the whole codebase or not.
              - paragraph [ref=e381]:
                - strong [ref=e382]: Finding 3 — Qwen3.6 is ~30% slower than Qwen3.5
                - text: 101 vs 142 tok/s at peak. The hybrid attention mechanism (Gated Delta Net) adds compute per token, and the model is slightly larger (22GB vs 21.7GB weights). You’re paying a speed tax for the capability upgrade.
              - paragraph [ref=e383]:
                - strong [ref=e384]: Finding 4 — Qwen3.6 requires llama.cpp
                - text: The newest frontier model only runs on the better stack. If you want to use current models as they drop, you need infrastructure that can keep up.
              - separator [ref=e385]
              - 'heading "7. qwen3.6: a new requirement" [level=2] [ref=e386]'
              - paragraph [ref=e387]:
                - text: Qwen3.6 dropped April 16, 2026. It introduced a new rope encoding format that broke every existing llama.cpp Docker image. The
                - code [ref=e388]: server-cuda
                - text: tag on ghcr.io was already behind on release day.
              - paragraph [ref=e389]:
                - text: "This exposed the structural problem with the Docker approach:"
                - strong [ref=e390]: floating image tags lag behind model releases
                - text: . For staying current with frontier models, you need a binary you control.
