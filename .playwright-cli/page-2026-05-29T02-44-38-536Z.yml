              - heading "4. the obstacles I hit" [level=2] [ref=e280]
              - paragraph [ref=e281]: Documenting these because they cost hours and are easy to miss.
              - paragraph [ref=e282]:
                - strong [ref=e283]: 1. Docker Desktop WSL integration conflict
                - text: Docker Desktop was running on Windows, not WSL. Enabling Ubuntu-24.04 as both “default” and “additional” caused a write conflict on
                - code [ref=e284]: ~/.docker/config.json
                - text: ". Fix: install native Docker Engine in WSL via"
                - code [ref=e285]: get.docker.com
                - text: ", disable Docker Desktop WSL integration entirely."
              - paragraph [ref=e286]:
                - strong [ref=e287]: 2. nvidia-container-toolkit GPG key
                - text: The standard install instructions need a
                - code [ref=e288]: sed
                - text: command to inject
                - code [ref=e289]: signed-by=...
                - text: into the apt source line. Without it, apt rejects the repo as unsigned.
              - generic [ref=e290]:
                - generic [ref=e291]:
                  - generic [ref=e292]:
                    - generic [ref=e293]: 
                    - text: Shell
                  - button "copy" [ref=e294] [cursor=pointer]:
