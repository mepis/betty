            - heading "Try Gemini Enterprise Business Edition today" [level=5] [ref=e104]
            - paragraph [ref=e105]: The front door to AI in the workplace
            - link "Try now" [ref=e106] [cursor=pointer]:
              - /url: https://business.gemini.google/?utm_source=cloud.google.com/blog&utm_medium=et&utm_campaign=FY26-Q2-GLOBAL-GLO27877-physicalevent-er-next26-mc-105752
          - generic [ref=e107]:
            - generic [ref=e109]:
              - paragraph [ref=e110]: Give your AI apps and agents a natural, almost human-like interface, all through a single WebSocket connection.
              - paragraph [ref=e111]:
                - text: Today,
                - link "we announced" [ref=e112] [cursor=pointer]:
                  - /url: https://cloud.google.com/blog/products/ai-machine-learning/gemini-live-api-available-on-vertex-ai
                - text: the general availability of Gemini Live API on Vertex AI, which is powered by the latest Gemini 2.5 Flash Native Audio model. This is more than just a model upgrade; it represents a fundamental move away from rigid, multi-stage voice systems towards a single, real-time, emotionally aware, and multimodal conversational architecture.
              - paragraph [ref=e113]: We’re thrilled to give developers a deep dive into what this means for building the next generation of multimodal AI applications. In this post we'll look at two templates and three reference demos that help you understand how to best use Gemini Live API.
              - heading "Gemini Live API as your new voice foundation" [level=2] [ref=e114]:
                - strong [ref=e115]: Gemini Live API as your new voice foundation
              - paragraph [ref=e116]: For years, building conversational AI involved stitching together a high-latency pipeline of Speech-to-Text (STT), a Large Language Model (LLM), and Text-to-Speech (TTS). This sequential process created the awkward, turn-taking delays that prevented conversations from ever feeling natural.
              - paragraph [ref=e117]: Gemini Live API fundamentally changes the engineering approach with a unified, low-latency, native audio architecture.
              - list [ref=e118]:
                - listitem [ref=e119]:
                  - strong [ref=e120]: "Native audio processing:"
                  - text: Gemini 2.5 Flash Native Audio model processes raw audio natively through a single, low-latency model. This unification is the core technical innovation that dramatically reduces latency.
                - listitem [ref=e121]:
                  - strong [ref=e122]: "Real-time multimodality:"
                  - text: The API is designed for unified processing across audio, text, and visual modalities. Your agent can converse about topics informed by live streams of visual data (like charts or live video feeds shared by a user) simultaneously with spoken input.
              - heading "Next-generation conversation features" [level=2] [ref=e123]
              - paragraph [ref=e124]: "Gemini Live API gives you a suite of production-ready features that define a new standard for AI agents:"
              - list [ref=e125]:
                - listitem [ref=e126]:
                  - strong [ref=e127]: "Affective dialogue (emotional intelligence):"
                  - text: By natively processing raw audio, the model can interpret subtle
                  - strong [ref=e128]: acoustic nuances
                  - text: like tone, emotion, and pace. This allows the agent to automatically de-escalate stressful support calls or adopt an appropriately empathetic tone.
                - listitem [ref=e129]:
                  - strong [ref=e130]: "Proactive audio (smarter barge-in):"
                  - text: This feature moves beyond simple Voice Activity Detection (VAD). As demonstrated in our live demo, you can configure the agent to intelligently decide when to respond and when to remain a silent co-listener. This prevents unnecessary interruptions when passive listening is required, making the interaction feel truly natural.
                - listitem [ref=e131]:
                  - strong [ref=e132]: "Tool use:"
                  - text: Developers can seamlessly integrate tools like Function Calling and Grounding with Google Search into these real-time conversations, allowing agents to pull real-time world knowledge and execute complex actions immediately based on spoken and visual input.
                - listitem [ref=e133]:
                  - strong [ref=e134]: "Continuous memory:"
                  - text: Agents maintain long, continuous context across all modalities.
                - listitem [ref=e135]:
                  - strong [ref=e136]: "Enterprise-grade stability:"
                  - text: With GA release, you get the high availability required for production workloads, including multi-region support to ensure your agents remain responsive and reliable for users globally.
            - figure [ref=e140]:
              - img "https://storage.googleapis.com/gweb-cloudblog-publish/images/traditional_vs_live_api.max-1400x1400.png" [ref=e142] [cursor=pointer]
            - generic [ref=e144]:
              - 'heading "Developer quickstart: Getting started" [level=2] [ref=e145]':
                - strong [ref=e146]: "Developer quickstart: Getting started"
              - paragraph [ref=e147]: For developers, the quickest way to experience the power of low-latency, real-time audio is to understand the flow of data. Unlike REST APIs where you make a request and wait, Gemini Live API requires managing a bi-directional stream.
              - heading "Gemini Live API flow" [level=3] [ref=e148]:
                - strong [ref=e149]: Gemini Live API flow
              - paragraph [ref=e150]: "Before diving into code, it is critical to visualize the production architecture. While a direct connection is possible for prototyping, most enterprise applications require a secure, proxied flow: User-facing App -> Your Backend Server -> Gemini Live API (Google Backend)."
              - paragraph [ref=e151]: In this architecture, your frontend captures media (microphone/camera) and streams it to your secure backend, which then manages the persistent WebSocket connection to Gemini Live API in Vertex AI. This ensures sensitive credentials never leave your server and allows you to inject business logic, persist conversation state, or manage access control before data flows to Google.
            - figure [ref=e155]:
              - img "https://storage.googleapis.com/gweb-cloudblog-publish/images/gemini_live_api_flow.max-2200x2200.png" [ref=e157] [cursor=pointer]
            - generic [ref=e159]:
              - paragraph [ref=e160]:
                - text: To help you get started, we have released
                - strong [ref=e161]: two distinct Quickstart templates
                - text: "- one for understanding the raw protocol, and one for modern component-based development."
              - 'heading "Option A: Vanilla JS Template (zero dependency)" [level=3] [ref=e162]':
                - strong [ref=e163]: "Option A:"
                - link "Vanilla JS Template (zero dependency)" [ref=e164] [cursor=pointer]:
                  - /url: https://github.com/GoogleCloudPlatform/generative-ai/tree/main/gemini/multimodal-live-api/native-audio-websocket-demo-apps/plain-js-demo-app
                  - strong [ref=e165]: Vanilla JS Template (zero dependency)
              - paragraph [ref=e166]: "Best for: Understanding the raw WebSocket implementation and media handling without framework overhead."
              - paragraph [ref=e167]: This template handles the WebSocket handshakes and media streaming, giving you a clean slate to build your logic.
