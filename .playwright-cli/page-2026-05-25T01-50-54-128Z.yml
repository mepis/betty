              - heading "Partner Integrations" [level=3] [ref=e397]
              - paragraph [ref=e398]:
                - text: If you prefer a simpler development process for specific telephony or WebRTC environments, we have third-party partner integrations with
                - link "Daily" [ref=e399] [cursor=pointer]:
                  - /url: https://docs.pipecat.ai/server/services/s2s/gemini-live-vertex
                - text: ","
                - link "Twilio" [ref=e400] [cursor=pointer]:
                  - /url: https://www.twilio.com/docs
                - text: ","
                - link "LiveKit" [ref=e401] [cursor=pointer]:
                  - /url: https://docs.livekit.io/agents/models/realtime/plugins/gemini/
                - text: ", and"
                - link "Voximplant" [ref=e402] [cursor=pointer]:
                  - /url: https://voximplant.com/products/gemini-client
                - text: . These platforms have integrated the Gemini Live API over the WebRTC protocol, allowing you to drop these capabilities directly into your existing voice and video workflows without managing the networking stack yourself .
              - 'heading "Gemini Live API: Three production-ready demos" [level=2] [ref=e403]':
                - strong [ref=e404]: "Gemini Live API: Three production-ready demos"
              - paragraph [ref=e405]: Once you have your foundation set with either template, how do you scale this into a product? We’ve built three demos showcasing the distinct "superpowers" of Gemini Live API.
              - heading "1. Real-time proactive advisor agent" [level=3] [ref=e406]:
                - strong [ref=e407]: 1. Real-time proactive advisor agent
              - paragraph [ref=e408]: The core of building truly natural conversational AI lies in creating a partner, not just a chatbot. This specialized application demonstrates how to build a business advisor that listens to a conversation and provides relevant insights based on a provided knowledge base.
              - paragraph [ref=e409]:
                - text: "It showcases two critical capabilities for professional agents:"
                - strong [ref=e410]: Dynamic Knowledge Injection
                - text: and
                - strong [ref=e411]: Dual Interaction Modes
                - text: .
              - list [ref=e412]:
                - listitem [ref=e413]:
                  - paragraph [ref=e414]:
                    - strong [ref=e415]: "The Scenario:"
                    - text: An advisor sits in on a business meeting. It has access to specific injected data (revenue stats, employee counts) that the user defines in the UI.
                - listitem [ref=e416]:
                  - paragraph [ref=e417]:
                    - strong [ref=e418]: "Dual modes:"
                - list [ref=e419]:
                  - listitem [ref=e420]:
                    - paragraph [ref=e421]:
                      - strong [ref=e422]: "Silent mode:"
                      - text: The advisor listens and "pushes" visual information via a show_modal tool without speaking. This is perfect for unobtrusive assistance where you want data, not interruption.
                  - listitem [ref=e423]:
                    - paragraph [ref=e424]:
                      - strong [ref=e425]: "Outspoken mode:"
                      - text: The advisor politely interjects verbally to offer advice, combining audio response with visual data.
                - listitem [ref=e426]:
                  - paragraph [ref=e427]:
                    - strong [ref=e428]: "Barge-in control:"
                    - text: The demo uses activity_handling configurations to prevent the user from accidentally interrupting the advisor, ensuring complete delivery of complex advice when necessary.
                - listitem [ref=e429]:
                  - strong [ref=e430]: "Tool use:"
                  - text: Uses a custom show_modal tool to display structured information to the user.
            - figure [ref=e434]:
              - img "https://storage.googleapis.com/gweb-cloudblog-publish/images/3_dLy041m.max-1300x1300.png" [ref=e436] [cursor=pointer]
            - generic [ref=e438]:
