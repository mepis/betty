              - heading "3. Real-time video game assistant" [level=3] [ref=e468]:
                - strong [ref=e469]: 3. Real-time video game assistant
              - paragraph [ref=e470]:
                - text: Gaming is better with a co-pilot. In this demo, we build a
                - strong [ref=e471]: Real-Time Gaming Guide
                - text: that moves beyond simple chat to become a true companion that watches your gameplay and adapts to your style.
              - paragraph [ref=e472]: "This React application streams both your screen capture and microphone audio to the model simultaneously, allowing the agent to understand the game state instantly. It showcases three advanced capabilities:"
              - list [ref=e473]:
                - listitem [ref=e474]:
                  - strong [ref=e475]: "Multimodal awareness:"
                  - text: The agent acts as a second pair of eyes, analyzing your screen to spot enemies, loot, or puzzle clues that you might miss.
                - listitem [ref=e476]:
                  - strong [ref=e477]: "Persona switching:"
                  - text: You can dynamically toggle the agent's personality - from a "Wise Wizard" offering cryptic hints to a "SciFi Robot" or "Commander" giving tactical orders. This demonstrates how system instructions can instantly change the voice and style of assistance.
                - listitem [ref=e478]:
                  - strong [ref=e479]: "Google Search Grounding:"
                  - text: The agent pulls real-time information to provide up-to-date walkthroughs and tips, ensuring you never get stuck on a new level.
