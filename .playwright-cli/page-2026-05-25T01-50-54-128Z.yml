                  - strong [ref=e441]: GitHub repository
                - text: .
              - heading "2. Multimodal customer support agent" [level=3] [ref=e442]:
                - strong [ref=e443]: 2. Multimodal customer support agent
              - paragraph [ref=e444]:
                - text: Customer support agents must be able to act on what they "see" and "hear." This demo layers
                - strong [ref=e445]: Contextual Action
                - text: and
                - strong [ref=e446]: Affective Dialogue
                - text: onto the voice stream, creating a support agent that can resolve issues instantly.
              - paragraph [ref=e447]: "This application simulates a futuristic customer support interaction where the agent can see what you see, understand your tone, and take real actions to resolve your issues instantly. Instead of describing an item for a return, the user simply shows it to the camera. The agent combines this visual input with emotional understanding to drive real actions:"
              - list [ref=e448]:
                - listitem [ref=e449]:
                  - strong [ref=e450]: "Multimodal Understanding:"
                  - text: The agent visually inspects items shown by the customer (e.g., verifying a product for return) while listening to their request.
                - listitem [ref=e451]:
                  - strong [ref=e452]: "Empathetic Response:"
                  - text: Using affective dialogue, the agent detects the user's emotional state (frustration, confusion) and adjusts its tone to respond with appropriate empathy.
                - listitem [ref=e453]:
                  - strong [ref=e454]: "Action Taking and Tool Use:"
                  - text: It doesn't just chat; it uses custom tools like process_refund (handling transaction IDs) or connect_to_human (transferring complex issues) to actually solve the problem.
                - listitem [ref=e455]:
                  - strong [ref=e456]: "Real-time Interaction:"
                  - text: Low-latency voice interaction using Gemini Live API over WebSockets.
            - figure [ref=e460]:
              - img "https://storage.googleapis.com/gweb-cloudblog-publish/images/4_cA7t4cF.max-1400x1400.png" [ref=e462] [cursor=pointer]
