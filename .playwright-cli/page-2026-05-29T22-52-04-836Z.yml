ent/General_embedding_technologies\", \"title\": \"From object to iframe \\u2014 general embedding technologies\", \"content\": \"Developers commonly think of embedding media such as images, video and audio into web pages. In this article we take somewhat of a sideways step, looking at some elements that allow you to embed a wide variety of content types into your webpages: the <iframe>, <embed> and <object> elements. <iframe>s are for embedding other web pages, and the other two allow you to embed external resources such as PDF files.\", \"engine\": \"mdn\", \"template\": \"default.html\", \"parsed_url\": [\"https\", \"developer.mozilla.org\", \"/en-US/docs/Learn_web_development/Core/Structuring_content/General_embedding_technologies\", \"\", \"\", \"\"], \"img_src\": \"\", \"thumbnail\": \"\", \"priority\": \"\", \"engines\": [\"mdn\"], \"positions\": [1], \"score\": 1.0, \"category\": \"it\", \"publishedDate\": null}, {\"url\": \"https://developer.mozilla.org/en-US/docs/Learn_web_development/Extensions/Server-side/Django/Models\", \"title\": \"Django Tutorial Part 3: Using models\", \"content\": \"This article shows how to define models for the LocalLibrary website. It explains what a model is, how it is declared, and some of the main field types. It also briefly shows a few of the main ways you can access model data.\", \"engine\": \"mdn\", \"template\": \"default.html\", \"parsed_url\": [\"https\", \"developer.mozilla.org\", \"/en-US/docs/Learn_web_development/Extensions/Server-side/Django/Models\", \"\", \"\", \"\"], \"img_src\": \"\", \"thumbnail\": \"\", \"priority\": \"\", \"engines\": [\"mdn\"], \"positions\": [2], \"score\": 0.5, \"category\": \"it\", \"publishedDate\": null}, {\"url\": \"https://developer.mozilla.org/en-US/docs/Web/API/WebGL_API/WebGL_best_practices\", \"title\": \"WebGL best practices\", \"content\": \"WebGL is a complicated API, and it's often not obvious what the recommended ways to use it are. This page tackles recommendations across the spectrum of expertise, and not only highlights dos and don'ts, but also details why. You can rely on this document to guide your choice of approach, and ensure you're on the right track no matter what browser or hardware your users run.\", \"engine\": \"mdn\", \"template\": \"default.html\", \"parsed_url\": [\"https\", \"developer.mozilla.org\", \"/en-US/docs/Web/API/WebGL_API/WebGL_best_practices\", \"\", \"\", \"\"], \"img_src\": \"\", \"thumbnail\": \"\", \"priority\": \"\", \"engines\": [\"mdn\"], \"positions\": [3], \"score\": 0.3333333333333333, \"category\": \"it\", \"publishedDate\": null}, {\"url\": \"https://developer.mozilla.org/en-US/docs/Learn_web_development/Core/Frameworks_libraries/Vue_methods_events_models\", \"title\": \"Adding a new todo form: Vue events, methods, and models\", \"content\": \"We now have sample data in place, and a loop that takes each bit of data and renders it inside a ToDoItem in our app. What we really need next is the ability to allow our users to enter their own todo items into the app, and for that we'll need a text <input>, an event to fire when the data is submitted, a method to fire upon submission to add the data and rerender the list, and a model to control the data. This is what we'll cover in this article.\", \"engine\": \"mdn\", \"template\": \"default.html\", \"parsed_url\": [\"https\", \"developer.mozilla.org\", \"/en-US/docs/Learn_web_development/Core/Frameworks_libraries/Vue_methods_events_models\", \"\", \"\", \"\"], \"img_src\": \"\", \"thumbnail\": \"\", \"priority\": \"\", \"engines\": [\"mdn\"], \"positions\": [4], \"score\": 0.25, \"category\": \"it\", \"publishedDate\": null}, {\"url\": \"https://developer.mozilla.org/en-US/docs/Mozilla/Firefox/Releases/3\", \"title\": \"Firefox 3 release notes for developers\", \"content\": \"If you're a developer trying to get a handle on all the new features in Firefox 3, this is the perfect place to start. This article provides a list of the new articles covering features added to Firefox 3. While it doesn't necessarily cover every little change, it will help you learn about the major improvements.\", \"engine\": \"mdn\", \"template\": \"default.html\", \"parsed_url\": [\"https\", \"developer.mozilla.org\", \"/en-US/docs/Mozilla/Firefox/Releases/3\", \"\", \"\", \"\"], \"img_src\": \"\", \"thumbnail\": \"\", \"priority\": \"\", \"engines\": [\"mdn\"], \"positions\": [5], \"score\": 0.2, \"category\": \"it\", \"publishedDate\": null}, {\"url\": \"https://developer.mozilla.org/en-US/docs/Web/Progressive_web_apps/Guides/Best_practices\", \"title\": \"Best practices for PWAs\", \"content\": \"Progressive Web Apps (PWAs) can be installed on devices and used as traditional websites in web browsers. This means that PWAs need to be able to adapt to different environments and to different user expectations.\", \"engine\": \"mdn\", \"template\": \"default.html\", \"parsed_url\": [\"https\", \"developer.mozilla.org\", \"/en-US/docs/Web/Progressive_web_apps/Guides/Best_practices\", \"\", \"\", \"\"], \"img_src\": \"\", \"thumbnail\": \"\", \"priority\": \"\", \"engines\": [\"mdn\"], \"positions\": [6], \"score\": 0.16666666666666666, \"category\": \"it\", \"publishedDate\": null}, {\"url\": \"https://developer.mozilla.org/en-US/docs/Learn_web_development/Extensions/Performance/Best_practices\", \"title\": \"Web Performance best practices & tips\", \"content\": \"There are many reasons why your website should perform as well as possible. Below is a quick review of best practices, tools, APIs with links to provide more information about each topic.\", \"engine\": \"mdn\", \"template\": \"default.html\", \"parsed_url\": [\"https\", \"developer.mozilla.org\", \"/en-US/docs/Learn_web_development/Extensions/Performance/Best_practices\", \"\", \"\", \"\"], \"img_src\": \"\", \"thumbnail\": \"\", \"priority\": \"\", \"engines\": [\"mdn\"], \"positions\": [7], \"score\": 0.14285714285714285, \"category\": \"it\", \"publishedDate\": null}, {\"ur