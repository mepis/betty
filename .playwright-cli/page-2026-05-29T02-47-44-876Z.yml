- generic [ref=e2]: "{\"query\": \"llama.cpp Qwen 3.6 35B A3B expert offloading settings --moe expert offload\", \"number_of_results\": 0, \"results\": [{\"url\": \"https://www.youtube.com/watch?v=8F_5pdcD3HY\", \"title\": \"Running a 35B AI Model on 6GB VRAM, FAST (llama.cpp Guide)\", \"content\": \"May 4, 2026 ... Run a 35B parameter AI model on just 6GB VRAM using llama.cpp and Qwen 3.6 ... large language models locally on low VRAM GPUs using MoE offloading\\u00a0...\", \"publishedDate\": null, \"engine\": \"startpage\", \"template\": \"default.html\", \"parsed_url\": [\"https\", \"www.youtube.com\", \"/watch\", \"\", \"v=8F_5pdcD3HY\", \"\"], \"img_src\": \"\", \"thumbnail\": \"\", \"priority\": \"\", \"engines\": [\"startpage\", \"duckduckgo\"], \"positions\": [2, 9], \"score\": 1.2222222222222223, \"category\": \"general\"}, {\"url\": \"https://www.reddit.com/r/ROCm/comments/1stqumw/help_with_llamacpp_qwen_36_35b_a3b_configuration/\", \"title\": \"Help with llama.cpp qwen 3.6 35b a3b configuration - Offloading\", \"content\": \"Apr 23, 2026 ... If it's moe you can try offload moe to cpu https://github.com/ggml-org/llama.cpp/tree/master/tools/server. -cmoe, --cpu-moe ... Experts (MoE)\\u00a0...\", \"publishedDate\": null, \"engine\": \"startpage\", \"template\": \"default.html\", \"parsed_url\": [\"https\", \"www.reddit.com\", \"/r/ROCm/comments/1stqumw/help_with_llamacpp_qwen_36_35b_a3b_configuration/\", \"\", \"\", \"\"], \"img_src\": \"\", \"thumbnail\": \"\", \"priority\": \"\", \"engines\": [\"startpage\"], \"positions\": [1], \"score\": 1.0, \"category\": \"general\"}, {\"template\": \"default.html\", \"title\": \"Best Way to Run Qwen 3.6 35B MoE Locally: VRAM, Speed, Setup\", \"content\": \"Quick Answer: Qwen3.6-35B-A3B is a Mixture-of-Experts model: 35B total parameters, only 3B active per token. UD-Q4_K_XL is 22.4 GB and runs at 101 tok/s on a single RTX 3090. UD-Q3_K_M is 16.6 GB and fits a 16GB card with KV offload. Dual RTX 5060 Ti 16GB and RTX 5070 Ti 16GB + 32GB system RAM both work via --cpu-moe expert offload, around 30-50 tok/s. Apple M3 Ultra runs Q6_K at 35-45 tok/s ...\", \"img_src\": \"\", \"iframe_src\": \"\", \"audio_src\": \"\", \"thumbnail\": \"\", \"publishedDate\": null, \"pubdate\": \"\", \"length\": null, \"views\": \"\", \"author\": \"\", \"metadata\": \"\", \"priority\": \"\", \"engines\": [\"duckduckgo\"], \"open_group\": false, \"close_group\": false, \"positions\": [1], \"score\": 1.0, \"category\": \"general\", \"url\": \"https://insiderllm.com/guides/best-way-run-qwen-3-6-35b-moe-locally/\", \"engine\": \"duckduckgo\", \"parsed_url\": [\"https\", \"insiderllm.com\", \"/guides/best-way-run-qwen-3-6-35b-moe-locally/\", \"\", \"\", \"\"]}, {\"url\": \"https://aminrj.com/posts/llamacpp-qwen36-35b/\", \"title\": \"Qwen3.6 on 24GB VRAM: Benchmark, Config, and Every Mistake\", \"content\": \"GPU layer offloading With --n-gpu-layers 99, llama.cpp pushes as many transformer layers as VRAM allows to GPU. For MoE models, attention layers are compute-bound and live on GPU; expert weights can spill to RAM with tolerable speed loss since only 8 of 256 experts activate per token.\", \"publishedDate\": null, \"engine\": \"startpage\", \"template\": \"default.html\", \"parsed_url\": [\"https\", \"aminrj.com\", \"/posts/llamacpp-qwen36-35b/\", \"\", \"\", \"\"], \"img_src\": \"\", \"thumbnail\": \"\", \"priority\": \"\", \"engines\": [\"startpage\", \"duckduckgo\"], \"positions\": [7, 8], \"score\": 0.5357142857142857, \"category\": \"general\"}, {\"url\": \"https://unsloth.ai/docs/models/qwen3.6\", \"title\": \"Qwen3.6 - How to Run Locally | Unsloth Documentation\", \"content\": \"Qwen3.6 is Alibaba's new family of multimodal hybrid-thinking models, including: Qwen3.6-27B and 35B-A3B. It delivers top performance for its size, supports 256K context across 201 languages. It excels in agentic coding, vision, chat tasks. Qwen3.6-27B runs on 18GB RAM setups and 35B-A3B runs on 22GB. You can now run and train the models in Unsloth Studio.\", \"publishedDate\": \"2026-05-24T02:47:44.440981\", \"engine\": \"startpage\", \"template\": \"default.html\", \"parsed_url\": [\"https\", \"unsloth.ai\", \"/docs/models/qwen3.6\", \"\", \"\", \"\"], \"img_src\": \"\", \"thumbnail\": \"\", \"priority\": \"\", \"engines\": [\"startpage\", \"duckduckgo\"], \"positions\": [8, 7], \"score\": 0.5357142857142857, \"category\": \"general\", \"pubdate\": \"2026-05-24 02:47:44\"}, {\"template\": \"default.html\", \"title\": \"Run Qwen 3.6 Locally: 27B vs 35B MoE - codersera.com\", \"content\": \"How to Run Qwen 3.6 Locally: 27B Dense vs 35B MoE (2026 Guide) Run Qwen 3.6 locally: 27B dense vs 35B-A3B MoE explained, VRAM tables per quant, and copy-paste Ollama, llama.cpp, vLLM, and MLX commands.\", \"img_src\": \"\", \"iframe_src\": \"\", \"audio_src\": \"\", \"thumbnail\": \"\", \"publishedDate\": null, \"pubdate\": \"\", \"length\": null, \"views\": \"\", \"author\": \"\", \"metadata\": \"\", \"priority\": \"\", \"engines\": [\"duckduckgo\"], \"open_group\": false, \"close_group\": false, \"positions\": [2], \"score\": 0.5, \"category\": \"general\", \"url\": \"https://codersera.com/blog/how-to-run-qwen-3-6-locally-2026/\", \"engine\": \"duckduckgo\", \"parsed_url\": [\"https\", \"codersera.com\", \"/blog/how-to-run-qwen-3-6-locally-2026/\", \"\", \"\", \"\"]}, {\"url\": \"https://www.facebook.com/groups/openclawgroup/posts/1885770515462847/\", \"title\": \"Running Qwen3.6-35B-A3B on outdated RTX GPU with tweaked ...\", \"content\": \"May 1, 2026 ... the cpu moe offload plus gpu attention split is exactly the kind of ... Qwen 3.6 broke my openclaw. 3w \\u00b7 1 like. Niranjan Bansal. Provide\\u00a0...\", \"publishedDate\": null, \"engine\": \"startpage\", \"template\": \"default.html\", \"parsed_url\": [\"https\", \"www.facebook.com\", \"/groups/openclawgroup/posts/1885770515462847/\", \"\", \"\", \"\"], \"img_src\": \"\", \"thumbnail\": \"\", \"priority\": \"\", \"engines\": [\"startpage\"], \"positions\": [3], \"score\": 0.3333333333333333, \"category\": \"general\"}, {\"template\": \"default.html\", \"title\": \"Running llama.cpp locally with Qwen3.6 35B A3B and systemd\", \"content\": \"The model in one paragraph Qwen3.6 35B A3B is a mixture-of-experts model from Alibaba's Qwen team. The number \\\"35B\\\" is the total parameter count; \\\"A3B\\\" \\u2014 active 3B \\u2014 is the number of parameters actually doing work per token. The architecture has 256 experts per MoE layer, of which 8 are routed plus 1 shared expert per forward pass.\", \"img_src\": \"\", \"iframe_src\": \"\", \"audio_src\": \"\", \"thumbnail\": \"\", \"publishedDate\": null, \"pubdate\": \"\", \"length\": null, \"views\": \"\", \"author\": \"\", \"metadata\": \"\", \"priority\": \"\", \"engines\": [\"duckduckgo\"], \"open_group\": false, \"close_group\": false, \"positions\": [3], \"score\": 0.3333333333333333, \"category\": \"general\", \"url\": \"https://ai-learn.timmoth.com/lessons/llama-cpp-qwen3.6-35b-a3b-setup/\", \"engine\": \"duckduckgo\", \"parsed_url\": [\"https\", \"ai-learn.timmoth.com\", \"/lessons/llama-cpp-qwen3.6-35b-a3b-setup/\", \"\", \"\", \"\"]}, {\"url\": \"https://github.com/ggml-org/llama.cpp/discussions/21112\", \"title\": \"Optimize my llama.cpp #21112 - GitHub\", \"content\": \"I'm running Qwen 35B A3B on my RTX 2060 laptop (32GB RAM, 6 GB VRAM ... --moe-cpu offloading we get these results: build-c2c/bin/llama\\u00a0...\", \"publishedDate\": \"2026-05-26T02:47:44.440605\", \"engine\": \"startpage\", \"template\": \"default.html\", \"parsed_url\": [\"https\", \"github.com\", \"/ggml-org/llama.cpp/discussions/21112\", \"\", \"\", \"\"], \"img_src\": \"\", \"thumbnail\": \"\", \"priority\": \"\", \"engines\": [\"startpage\"], \"positions\": [4], \"score\": 0.25, \"category\": \"general\", \"pubdate\": \"2026-05-26 02:47:44\"}, {\"template\": \"default.html\", \"title\": \"Running Qwen3.6-35B Locally on an RTX 3070 8GB: llama.cpp Deployment ...\", \"content\": \"The core idea in this setup is to use a GGUF quantized version of an MoE model such as Qwen3.6-35B-A3B, then use llama.cpp with CUDA acceleration, CPU Offload, MoE parameter scheduling, and KV Cache quantization to split memory pressure between the GPU and system RAM. With that approach, an older GPU such as the RTX 3070 8GB can still have a chance to run a 35B-class local multimodal model.\", \"img_src\": \"\", \"iframe_src\": \"\", \"audio_src\": \"\", \"thumbnail\": \"\", \"publishedDate\": null, \"pubdate\": \"\", \"length\": null, \"views\": \"\", \"author\": \"\", \"metadata\": \"\", \"priority\": \"\", \"engines\": [\"duckduckgo\"], \"open_group\": false, \"close_group\": false, \"positions\": [4], \"score\": 0.25, \"category\": \"general\", \"url\": \"https://knightli.com/en/2026/05/22/rtx-3070-8gb-qwen36-35b-llama-cpp-local-deployment/\", \"engine\": \"duckduckgo\", \"parsed_url\": [\"https\", \"knightli.com\", \"/en/2026/05/22/rtx-3070-8gb-qwen36-35b-llama-cpp-local-deployment/\", \"\", \"\", \"\"]}, {\"url\": \"https://agentnativedev.medium.com/qwen-3-5-35b-a3b-why-your-800-gpu-just-became-a-frontier-class-ai-workstation-63cc4d4ebac1\", \"title\": \"Qwen 3.5 35B-A3B: Why Your $800 GPU Just Became a Frontier ...\", \"content\": \"Mar 1, 2026 ... # Build llama.cpp from source (required -- prebuilt binaries may miss optimizations) ... Ollama does not support MoE expert offloading. When a MoE\\u00a0...\", \"publishedDate\": null, \"engine\": \"startpage\", \"template\": \"default.html\", \"parsed_url\": [\"https\", \"agentnativedev.medium.com\", \"/qwen-3-5-35b-a3b-why-your-800-gpu-just-became-a-frontier-class-ai-workstation-63cc4d4ebac1\", \"\", \"\", \"\"], \"img_src\": \"\", \"thumbnail\": \"\", \"priority\": \"\", \"engines\": [\"startpage\"], \"positions\": [5], \"score\": 0.2, \"category\": \"general\"}, {\"template\": \"default.html\", \"title\": \"Run Qwen3.6-35B-A3B on 6GB VRAM Using Llama.cpp (~30 tps)\", \"content\": \"In 2026, the latest re