            - separator [ref=e347]
            - heading "Configure" [level=2] [ref=e348]:
              - link "Configure" [ref=e349]:
                - /url: "#configure"
            - paragraph [ref=e350]: With OpenCode you can use any LLM provider by configuring their API keys.
            - paragraph [ref=e351]:
              - text: If you are new to using LLM providers, we recommend using
              - link "OpenCode Zen" [ref=e352] [cursor=pointer]:
                - /url: /docs/zen
              - text: . It’s a curated list of models that have been tested and verified by the OpenCode team.
            - list [ref=e353]:
              - listitem [ref=e354]:
                - paragraph [ref=e355]:
                  - text: Run the
                  - code [ref=e356]: "`/connect`"
                  - text: command in the TUI, select opencode, and head to
                  - link "opencode.ai/auth" [ref=e357] [cursor=pointer]:
                    - /url: https://opencode.ai/auth
                  - text: .
                - figure [ref=e359]:
                  - code [ref=e361]:
                    - generic [ref=e363]: /connect
                  - button "Copy to clipboard" [ref=e365] [cursor=pointer]
              - listitem [ref=e367]:
                - paragraph [ref=e368]: Sign in, add your billing details, and copy your API key.
              - listitem [ref=e369]:
                - paragraph [ref=e370]: Paste your API key.
                - figure [ref=e372]:
                  - code [ref=e374]:
                    - generic [ref=e376]: ┌ API key
                    - generic [ref=e378]: │
                    - generic [ref=e380]: │
                    - generic [ref=e382]: └ enter
                  - button "Copy to clipboard" [ref=e384] [cursor=pointer]
            - paragraph [ref=e386]:
              - text: Alternatively, you can select one of the other providers.
              - link "Learn more" [ref=e387] [cursor=pointer]:
                - /url: /docs/providers#directory
              - text: .
            - separator [ref=e388]
            - heading "Initialize" [level=2] [ref=e389]:
              - link "Initialize" [ref=e390]:
                - /url: "#initialize"
            - paragraph [ref=e391]: Now that you’ve configured a provider, you can navigate to a project that you want to work on.
            - figure "Terminal window" [ref=e393]:
              - generic [ref=e396]: Terminal window
              - code [ref=e398]:
                - generic [ref=e400]: cd /path/to/project
              - button "Copy to clipboard" [ref=e402] [cursor=pointer]
            - paragraph [ref=e404]: And run OpenCode.
            - figure "Terminal window" [ref=e406]:
              - generic [ref=e409]: Terminal window
              - code [ref=e411]:
                - generic [ref=e413]: opencode
              - button "Copy to clipboard" [ref=e415] [cursor=pointer]
            - paragraph [ref=e417]: Next, initialize OpenCode for the project by running the following command.
            - figure [ref=e419]:
              - code [ref=e421]:
                - generic [ref=e423]: /init
              - button "Copy to clipboard" [ref=e425] [cursor=pointer]
            - paragraph [ref=e427]:
              - text: This will get OpenCode to analyze your project and create an
              - code [ref=e428]: "`AGENTS.md`"
              - text: file in the project root.
            - complementary "Tip" [ref=e429]:
              - paragraph [ref=e430]:
                - img [ref=e431]
                - text: Tip
              - paragraph [ref=e435]:
                - text: You should commit your project’s
                - code [ref=e436]: "`AGENTS.md`"
                - text: file to Git.
            - paragraph [ref=e437]: This helps OpenCode understand the project structure and the coding patterns used.
            - separator [ref=e438]
            - heading "Usage" [level=2] [ref=e439]:
              - link "Usage" [ref=e440]:
                - /url: "#usage"
            - paragraph [ref=e441]: You are now ready to use OpenCode to work on your project. Feel free to ask it anything!
            - paragraph [ref=e442]: If you are new to using an AI coding agent, here are some examples that might help.
            - separator [ref=e443]
            - heading "Ask questions" [level=3] [ref=e444]:
              - link "Ask questions" [ref=e445]:
                - /url: "#ask-questions"
            - paragraph [ref=e446]: You can ask OpenCode to explain the codebase to you.
            - complementary "Tip" [ref=e447]:
              - paragraph [ref=e448]:
                - img [ref=e449]
                - text: Tip
              - paragraph [ref=e453]:
                - text: Use the
                - code [ref=e454]: "`@`"
                - text: key to fuzzy search for files in the project.
            - figure [ref=e456]:
              - code [ref=e458]:
                - generic [ref=e460]:
                  - text: How is authentication handled in
                  - mark [ref=e461]: "@packages/functions/src/api/index.ts"
              - button "Copy to clipboard" [ref=e463] [cursor=pointer]
            - paragraph [ref=e465]: This is helpful if there’s a part of the codebase that you didn’t work on.
            - separator [ref=e466]
            - heading "Add features" [level=3] [ref=e467]:
              - link "Add features" [ref=e468]:
                - /url: "#add-features"
            - paragraph [ref=e469]: You can ask OpenCode to add new features to your project. Though we first recommend asking it to create a plan.
            - list [ref=e470]:
              - listitem [ref=e471]:
                - paragraph [ref=e472]:
                  - strong [ref=e473]: Create a plan
                - paragraph [ref=e474]:
                  - text: OpenCode has a
                  - emphasis [ref=e475]: Plan mode
                  - text: that disables its ability to make changes and instead suggest
                  - emphasis [ref=e476]: how
                  - text: it’ll implement the feature.
                - paragraph [ref=e477]:
                  - text: Switch to it using the
                  - strong [ref=e478]: Tab
                  - text: key. You’ll see an indicator for this in the lower right corner.
                - figure [ref=e480]:
                  - code [ref=e482]:
                    - generic [ref=e484]: <TAB>
                  - button "Copy to clipboard" [ref=e486] [cursor=pointer]
                - paragraph [ref=e488]: Now let’s describe what we want it to do.
                - figure [ref=e490]:
                  - code [ref=e492]:
                    - generic [ref=e494]: When a user deletes a note, we'd like to flag it as deleted in the database.
                    - generic [ref=e496]: Then create a screen that shows all the recently deleted notes.
                    - generic [ref=e498]: From this screen, the user can undelete a note or permanently delete it.
                  - button "Copy to clipboard" [ref=e500] [cursor=pointer]
                - paragraph [ref=e502]: You want to give OpenCode enough details to understand what you want. It helps to talk to it like you are talking to a junior developer on your team.
                - complementary "Tip" [ref=e503]:
                  - paragraph [ref=e504]:
                    - img [ref=e505]
                    - text: Tip
                  - paragraph [ref=e509]: Give OpenCode plenty of context and examples to help it understand what you want.
              - listitem [ref=e510]:
                - paragraph [ref=e511]:
                  - strong [ref=e512]: Iterate on the plan
                - paragraph [ref=e513]: Once it gives you a plan, you can give it feedback or add more details.
                - figure [ref=e515]:
                  - code [ref=e517]:
                    - generic [ref=e519]: We'd like to design this new screen using a design I've used before.
                    - generic [ref=e521]: "[Image #1] Take a look at this image and use it as a reference."
                  - button "Copy to clipboard" [ref=e523] [cursor=pointer]
                - complementary "Tip" [ref=e525]:
                  - paragraph [ref=e526]:
                    - img [ref=e527]
                    - text: Tip
                  - paragraph [ref=e531]: Drag and drop images into the terminal to add them to the prompt.
                - paragraph [ref=e532]: OpenCode can scan any images you give it and add them to the prompt. You can do this by dragging and dropping an image into the terminal.
              - listitem [ref=e533]:
                - paragraph [ref=e534]:
                  - strong [ref=e535]: Build the feature
                - paragraph [ref=e536]:
                  - text: Once you feel comfortable with the plan, switch back to
                  - emphasis [ref=e537]: Build mode
                  - text: by hitting the
                  - strong [ref=e538]: Tab
                  - text: key again.
                - figure [ref=e540]:
                  - code [ref=e542]:
                    - generic [ref=e544]: <TAB>
                  - button "Copy to clipboard" [ref=e546] [cursor=pointer]
                - paragraph [ref=e548]: And asking it to make the changes.
                - figure [ref=e550]:
                  - code [ref=e552]:
                    - generic [ref=e554]: Sounds good! Go ahead and make the changes.
                  - button "Copy to clipboard" [ref=e556] [cursor=pointer]
            - separator [ref=e558]
            - heading "Make changes" [level=3] [ref=e559]:
              - link "Make changes" [ref=e560]:
                - /url: "#make-changes"
            - paragraph [ref=e561]: For more straightforward changes, you can ask OpenCode to directly build it without having to review the plan first.
            - figure [ref=e563]:
              - code [ref=e565]:
                - generic [ref=e567]: We need to add authentication to the /settings route. Take a look at how this is
                - generic [ref=e569]:
                  - text: handled in the /notes route in
                  - mark [ref=e570]: "@packages/functions/src/notes.ts"
                  - text: and implement
                - generic [ref=e572]:
                  - text: the same logic in
                  - mark [ref=e573]: "@packages/functions/src/settings.ts"
              - button "Copy to clipboard" [ref=e575] [cursor=pointer]
            - paragraph [ref=e577]: You want to make sure you provide a good amount of detail so OpenCode makes the right changes.
            - separator [ref=e578]
            - heading "Undo changes" [level=3] [ref=e579]:
              - link "Undo changes" [ref=e580]:
                - /url: "#undo-changes"
            - paragraph [ref=e581]: Let’s say you ask OpenCode to make some changes.
            - figure [ref=e583]:
              - code [ref=e585]:
                - generic [ref=e587]:
                  - text: Can you refactor the function in
                  - mark [ref=e588]: "@packages/functions/src/api/index.ts"
                  - text: "?"
              - button "Copy to clipboard" [ref=e590] [cursor=pointer]
            - paragraph [ref=e592]:
              - text: But you realize that it is not what you wanted. You
              - strong [ref=e593]: can undo
              - text: the changes using the
              - code [ref=e594]: "`/undo`"
              - text: command.
            - figure [ref=e596]:
