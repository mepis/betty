              - button "Copy to clipboard" [ref=e404] [cursor=pointer]
            - paragraph [ref=e406]:
              - strong [ref=e407]: For built-in agents
              - text: (in
              - code [ref=e408]: "`opencode.json`"
              - text: "):"
            - figure [ref=e410]:
              - code [ref=e412]:
                - generic [ref=e414]: "{"
                - generic [ref=e416]: "\"agent\": {"
                - generic [ref=e418]: "\"plan\": {"
                - generic [ref=e420]: "\"permission\": {"
                - generic [ref=e422]: "\"skill\": {"
