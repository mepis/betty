      - main [ref=e151]:
        - generic [ref=e153]:
          - heading "Agent Skills" [level=1] [ref=e154]
          - paragraph [ref=e155]: Define reusable behavior via SKILL.md definitions
        - generic [ref=e157]:
          - generic [ref=e158]:
            - paragraph [ref=e159]:
              - text: Agent skills let OpenCode discover reusable instructions from your repo or home directory. Skills are loaded on-demand via the native
              - code [ref=e160]: "`skill`"
              - text: tool—agents see available skills and can load the full content when needed.
            - separator [ref=e161]
            - heading "Place files" [level=2] [ref=e162]:
              - link "Place files" [ref=e163]:
                - /url: "#place-files"
            - paragraph [ref=e164]:
              - text: Create one folder per skill name and put a
              - code [ref=e165]: "`SKILL.md`"
              - text: "inside it. OpenCode searches these locations:"
            - list [ref=e166]:
              - listitem [ref=e167]:
                - text: "Project config:"
                - code [ref=e168]: "`.opencode/skills/<name>/SKILL.md`"
              - listitem [ref=e169]:
                - text: "Global config:"
                - code [ref=e170]: "`~/.config/opencode/skills/<name>/SKILL.md`"
              - listitem [ref=e171]:
                - text: "Project Claude-compatible:"
                - code [ref=e172]: "`.claude/skills/<name>/SKILL.md`"
              - listitem [ref=e173]:
                - text: "Global Claude-compatible:"
                - code [ref=e174]: "`~/.claude/skills/<name>/SKILL.md`"
              - listitem [ref=e175]:
                - text: "Project agent-compatible:"
                - code [ref=e176]: "`.agents/skills/<name>/SKILL.md`"
              - listitem [ref=e177]:
                - text: "Global agent-compatible:"
                - code [ref=e178]: "`~/.agents/skills/<name>/SKILL.md`"
            - separator [ref=e179]
            - heading "Understand discovery" [level=2] [ref=e180]:
              - link "Understand discovery" [ref=e181]:
                - /url: "#understand-discovery"
            - paragraph [ref=e182]:
              - text: For project-local paths, OpenCode walks up from your current working directory until it reaches the git worktree. It loads any matching
              - code [ref=e183]: "`skills/*/SKILL.md`"
              - text: in
              - code [ref=e184]: "`.opencode/`"
              - text: and any matching
              - code [ref=e185]: "`.claude/skills/*/SKILL.md`"
              - text: or
              - code [ref=e186]: "`.agents/skills/*/SKILL.md`"
              - text: along the way.
            - paragraph [ref=e187]:
              - text: Global definitions are also loaded from
              - code [ref=e188]: "`~/.config/opencode/skills/*/SKILL.md`"
              - text: ","
              - code [ref=e189]: "`~/.claude/skills/*/SKILL.md`"
              - text: ", and"
              - code [ref=e190]: "`~/.agents/skills/*/SKILL.md`"
              - text: .
            - separator [ref=e191]
            - heading "Write frontmatter" [level=2] [ref=e192]:
              - link "Write frontmatter" [ref=e193]:
                - /url: "#write-frontmatter"
            - paragraph [ref=e194]:
              - text: Each
              - code [ref=e195]: "`SKILL.md`"
              - text: "must start with YAML frontmatter. Only these fields are recognized:"
            - list [ref=e196]:
              - listitem [ref=e197]:
                - code [ref=e198]: "`name`"
                - text: (required)
              - listitem [ref=e199]:
                - code [ref=e200]: "`description`"
                - text: (required)
              - listitem [ref=e201]:
                - code [ref=e202]: "`license`"
                - text: (optional)
              - listitem [ref=e203]:
                - code [ref=e204]: "`compatibility`"
                - text: (optional)
              - listitem [ref=e205]:
                - code [ref=e206]: "`metadata`"
                - text: (optional, string-to-string map)
            - paragraph [ref=e207]: Unknown frontmatter fields are ignored.
            - separator [ref=e208]
            - heading "Validate names" [level=2] [ref=e209]:
              - link "Validate names" [ref=e210]:
                - /url: "#validate-names"
            - paragraph [ref=e211]:
              - code [ref=e212]: "`name`"
              - text: "must:"
            - list [ref=e213]:
              - listitem [ref=e214]: Be 1–64 characters
              - listitem [ref=e215]: Be lowercase alphanumeric with single hyphen separators
              - listitem [ref=e216]:
                - text: Not start or end with
                - code [ref=e217]: "`-`"
              - listitem [ref=e218]:
                - text: Not contain consecutive
                - code [ref=e219]: "`--`"
              - listitem [ref=e220]:
                - text: Match the directory name that contains
                - code [ref=e221]: "`SKILL.md`"
            - paragraph [ref=e222]: "Equivalent regex:"
            - figure [ref=e224]:
              - code [ref=e226]:
                - generic [ref=e228]: ^[a-z0-9]+(-[a-z0-9]+)*$
              - button "Copy to clipboard" [ref=e230] [cursor=pointer]
            - separator [ref=e232]
            - heading "Follow length rules" [level=2] [ref=e233]:
              - link "Follow length rules" [ref=e234]:
                - /url: "#follow-length-rules"
            - paragraph [ref=e235]:
              - code [ref=e236]: "`description`"
              - text: must be 1-1024 characters. Keep it specific enough for the agent to choose correctly.
            - separator [ref=e237]
            - heading "Use an example" [level=2] [ref=e238]:
              - link "Use an example" [ref=e239]:
                - /url: "#use-an-example"
            - paragraph [ref=e240]:
              - text: Create
              - code [ref=e241]: "`.opencode/skills/git-release/SKILL.md`"
              - text: "like this:"
            - figure [ref=e243]:
              - code [ref=e245]:
                - generic [ref=e247]: "---"
                - generic [ref=e249]: "name: git-release"
                - generic [ref=e251]: "description: Create consistent releases and changelogs"
                - generic [ref=e253]: "license: MIT"
                - generic [ref=e255]: "compatibility: opencode"
                - generic [ref=e257]: "metadata:"
                - generic [ref=e259]: "audience: maintainers"
                - generic [ref=e261]: "workflow: github"
                - generic [ref=e263]: "---"
                - generic [ref=e267]: "## What I do"
                - generic [ref=e271]: "- Draft release notes from merged PRs"
                - generic [ref=e273]: "- Propose a version bump"
                - generic [ref=e275]: "- Provide a copy-pasteable `gh release create` command"
                - generic [ref=e279]: "## When to use me"
                - generic [ref=e283]: Use this when you are preparing a tagged release.
                - generic [ref=e285]: Ask clarifying questions if the target versioning scheme is unclear.
              - button "Copy to clipboard" [ref=e287] [cursor=pointer]
            - separator [ref=e289]
            - heading "Recognize tool description" [level=2] [ref=e290]:
              - link "Recognize tool description" [ref=e291]:
                - /url: "#recognize-tool-description"
            - paragraph [ref=e292]:
              - text: OpenCode lists available skills in the
              - code [ref=e293]: "`skill`"
              - text: "tool description. Each entry includes the skill name and description:"
            - figure [ref=e295]:
              - code [ref=e297]:
                - generic [ref=e299]: <available_skills>
                - generic [ref=e301]: <skill>
                - generic [ref=e304]: <name>git-release</name>
                - generic [ref=e307]: <description>Create consistent releases and changelogs</description>
                - generic [ref=e310]: </skill>
                - generic [ref=e313]: </available_skills>
              - button "Copy to clipboard" [ref=e315] [cursor=pointer]
            - paragraph [ref=e317]: "The agent loads a skill by calling the tool:"
            - figure [ref=e319]:
              - code [ref=e321]:
                - generic [ref=e323]: "skill({ name: \"git-release\" })"
              - button "Copy to clipboard" [ref=e325] [cursor=pointer]
            - separator [ref=e327]
            - heading "Configure permissions" [level=2] [ref=e328]:
              - link "Configure permissions" [ref=e329]:
                - /url: "#configure-permissions"
            - paragraph [ref=e330]:
              - text: Control which skills agents can access using pattern-based permissions in
              - code [ref=e331]: "`opencode.json`"
              - text: ":"
            - figure [ref=e333]:
              - code [ref=e335]:
                - generic [ref=e337]: "{"
                - generic [ref=e339]: "\"permission\": {"
                - generic [ref=e341]: "\"skill\": {"
                - generic [ref=e343]: "\"*\": \"allow\","
                - generic [ref=e345]: "\"pr-review\": \"allow\","
                - generic [ref=e347]: "\"internal-*\": \"deny\","
                - generic [ref=e349]: "\"experimental-*\": \"ask\""
                - generic [ref=e351]: "}"
                - generic [ref=e354]: "}"
                - generic [ref=e357]: "}"
              - button "Copy to clipboard" [ref=e359] [cursor=pointer]
            - table [ref=e361]:
              - rowgroup [ref=e362]:
                - row "Permission Behavior" [ref=e363]:
                  - columnheader "Permission" [ref=e364]
                  - columnheader "Behavior" [ref=e365]
              - rowgroup [ref=e366]:
                - 'row "`allow` Skill loads immediately" [ref=e367]':
                  - 'cell "`allow`" [ref=e368]':
                    - code [ref=e369]: "`allow`"
                  - cell "Skill loads immediately" [ref=e370]
                - 'row "`deny` Skill hidden from agent, access rejected" [ref=e371]':
                  - 'cell "`deny`" [ref=e372]':
                    - code [ref=e373]: "`deny`"
                  - cell "Skill hidden from agent, access rejected" [ref=e374]
                - 'row "`ask` User prompted for approval before loading" [ref=e375]':
                  - 'cell "`ask`" [ref=e376]':
                    - code [ref=e377]: "`ask`"
                  - cell "User prompted for approval before loading" [ref=e378]
            - paragraph [ref=e379]:
              - text: "Patterns support wildcards:"
              - code [ref=e380]: "`internal-*`"
              - text: matches
              - code [ref=e381]: "`internal-docs`"
              - text: ","
              - code [ref=e382]: "`internal-tools`"
              - text: ", etc."
            - separator [ref=e383]
            - heading "Override per agent" [level=2] [ref=e384]:
              - link "Override per agent" [ref=e385]:
                - /url: "#override-per-agent"
            - paragraph [ref=e386]: Give specific agents different permissions than the global defaults.
            - paragraph [ref=e387]:
              - strong [ref=e388]: For custom agents
              - text: "(in agent frontmatter):"
            - figure [ref=e390]:
              - code [ref=e392]:
                - generic [ref=e394]: "---"
