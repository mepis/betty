        - paragraph [ref=e90]:
          - text: This page covers the managed and hosted methods for accessing Qwen3.6 and Qwen3.5 models. These interfaces range from end-user applications like Qwen Studio to developer-centric tools such as the Model Studio API and the Qwen Agent framework. These services provide the easiest path to leveraging advanced features like
          - strong [ref=e91]: Thinking Preservation
          - text: and
          - strong [ref=e92]: Agentic Coding
          - text: without managing local infrastructure.
