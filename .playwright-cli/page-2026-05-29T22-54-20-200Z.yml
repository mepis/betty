        - generic [ref=e152]:
          - heading "Frequently asked" [level=2] [ref=e153]
          - generic [ref=e154]:
            - generic [ref=e155]:
              - term [ref=e156]: Which RAG framework should I use?
              - definition [ref=e157]: LangChain for breadth of integrations and team familiarity (105k stars, most documented). LlamaIndex for retrieval-quality and document-heavy work (40.8k stars, 'retrieval king'). DSPy when you want to optimize prompts programmatically (23k stars, Stanford). Haystack for enterprise/regulated industries with strict observability needs (20.2k stars). RAGFlow for document-heavy domains with complex table extraction (48.5k stars). Pick by job, not popularity.
            - generic [ref=e158]:
              - term [ref=e159]: Is LangChain dying?
              - definition [ref=e160]: No, but the criticism is real. The HN consensus is that LangChain's abstractions get in the way of the parts you actually need to tune. Teams still ship LangChain in production at scale — Uber, Klarna, others — but a growing minority writes their own minimal pipeline. The framework choice matters less than the retrieval discipline.
            - generic [ref=e161]:
              - term [ref=e162]: DSPy vs LangChain — which?
              - definition [ref=e163]: Different categories. DSPy is a programmatic-prompt-optimization layer; LangChain is an orchestration library. You can run DSPy inside a LangChain pipeline. Use DSPy when prompts have many degrees of freedom and you want to optimize against a metric. Use LangChain when you need to wire components together. Most production RAG uses LangChain + an embedded reranker, not DSPy directly.
            - generic [ref=e164]:
              - term [ref=e165]: Do I need a framework at all?
              - definition [ref=e166]: "No. A minimal RAG pipeline is ~150 lines of Python or TypeScript: chunk → embed → store → retrieve → rerank → generate. HN engineers running RAG at 5M+ docs frequently report that the framework abstractions cost them more than they saved. If your pipeline is stable and small, frameworkless is reasonable."
            - generic [ref=e167]:
              - term [ref=e168]: What's the production RAG stack we'd actually ship?
              - definition [ref=e169]: Recursive 512-token chunking → voyage-3-large (or BGE-M3 self-hosted) → pgvector or Qdrant → Cohere rerank-v3 or voyage rerank → Claude or GPT-5 for generation. Wrap in either LangChain or your own minimal pipeline. The framework matters less than the retrieval pipeline.
            - generic [ref=e170]:
              - term [ref=e171]: Is RAGFlow the right choice for PDF-heavy work?
              - definition [ref=e172]: Often yes. RAGFlow's table extraction and PDF parsing are stronger than LangChain's defaults. The 48.5k stars are concentrated in document-heavy verticals (legal, healthcare, financial reporting). If your corpus is mostly clean prose, LangChain or LlamaIndex are easier. If it's PDFs with embedded tables, charts, and inconsistent formatting, RAGFlow's parser is worth the framework lock-in.
