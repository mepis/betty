        - generic [ref=e29]:
          - paragraph [ref=e30]: Topic · A4
          - 'heading "RAG Framework Picker: LangChain, LlamaIndex, DSPy, Haystack, RAGFlow" [level=1] [ref=e31]'
          - paragraph [ref=e32]: Five RAG frameworks dominate production usage in 2026. Each is good at something specific and bad at something else. This is the picker — what each framework optimizes for, when it loses, and the configuration we'd actually ship.
        - generic [ref=e33]:
          - paragraph [ref=e34]: In May 2026 the RAG framework landscape has consolidated around five frameworks that account for the majority of production usage. They are not interchangeable. Each was built for a different problem, optimizes for a different metric, and falls down in a different way. Picking the wrong one means rewriting your retrieval pipeline; picking the right one means you spend your time tuning instead of fighting the framework.
          - paragraph [ref=e35]: This page is the picker. What each framework does well, where it loses, the production stack we'd ship for common workloads, and when the right answer is "no framework, just write the 150 lines yourself."
          - heading "The five" [level=2] [ref=e36]
          - heading "LangChain — 105,000 stars, the default" [level=3] [ref=e37]
          - paragraph [ref=e38]: "What it is: the largest RAG framework by mind-share and integrations. Wraps every model, every vector DB, every embedding model, every document loader. Python and TypeScript first-class."
          - paragraph [ref=e39]: "What it does well: integrations. If a vendor has a Python SDK, LangChain has a wrapper. Switching from OpenAI to Anthropic to Cohere is a one-line config change. The community is large enough that almost every common problem has a Stack Overflow answer or LangChain doc page."
          - paragraph [ref=e40]:
            - text: "Where it loses: the abstractions get in the way at scale. HN consensus from production-RAG threads is consistent: \"LangChain abstracts you away from the parts you actually need to tune.\""
            - code [ref=e41]: LCEL
            - text: (LangChain Expression Language) is powerful but the learning curve is steep, and debugging a long chain is harder than debugging the equivalent direct calls. At 5M+ docs production scale, teams report rewriting the hot path to skip LangChain.
          - paragraph [ref=e42]: "When to use it: most production setups under 1M docs. Teams new to RAG. Workflows that span many providers. Prototyping."
          - heading "LlamaIndex — 40,800 stars, the retrieval-quality choice" [level=3] [ref=e43]
          - paragraph [ref=e44]: "What it is: framework built around document ingestion and retrieval as first-class concepts. Where LangChain is \"wrap every model,\" LlamaIndex is \"do retrieval well.\" Jerry Liu, the founder, has been publicly opinionated about retrieval mattering more than orchestration."
          - paragraph [ref=e45]:
            - text: "What it does well: ingestion of structured documents, multi-step retrieval (parent-document, hypothetical-questions, RAG-Fusion), and agentic retrieval where the agent decides what to retrieve next. The"
            - code [ref=e46]: Recursive Retriever
            - text: and
            - code [ref=e47]: Auto-Retriever
            - text: patterns are LlamaIndex inventions and they're production-tested.
          - paragraph [ref=e48]: "Where it loses: smaller integration surface than LangChain. Less mainstream familiarity — onboarding a new team member takes longer because there are fewer Stack Overflow answers. The \"agentic retrieval\" pattern is powerful but expensive (multiple LLM calls per query)."
          - paragraph [ref=e49]: "When to use it: document-heavy workloads. Multi-hop retrieval (answer requires synthesis across passages). When retrieval quality is the primary bottleneck."
          - heading "DSPy — 23,000 stars, programmatic prompt optimization" [level=3] [ref=e50]
          - paragraph [ref=e51]: "What it is: Stanford research framework for writing RAG (and other LLM) pipelines as composable modules with declared input/output signatures, then optimizing the prompts inside them automatically against a metric. Not a wrapper, not orchestration — a different programming model."
          - paragraph [ref=e52]:
            - text: "What it does well: when prompts have many degrees of freedom and you can define a metric (RAGAS score, accuracy on a test set, judge-LLM score), DSPy compiles a better prompt than a human would write. The"
            - code [ref=e53]: bootstrapped few-shot
            - text: and
            - code [ref=e54]: MIPRO
            - text: optimizers reliably outperform hand-written prompts on the right problems.
          - paragraph [ref=e55]: "Where it loses: the learning curve is steep. The \"compile\" step is itself an LLM workflow that costs tokens and time — a first compilation can take 30+ minutes and $20+ in tokens. Teams that ship every two weeks don't want a 30-minute step in the loop."
          - paragraph [ref=e56]: "When to use it: high-stakes RAG where you have a metric and the compilation cost amortizes (compile once, ship for months). Research-grade work. Optimization on top of an existing LangChain or LlamaIndex pipeline."
          - heading "Haystack — 20,200 stars, the enterprise pick" [level=3] [ref=e57]
          - paragraph [ref=e58]: "What it is: deepset's framework, built around pipelines as a first-class concept with strong observability and component-level isolation. Originally an information-retrieval framework that pivoted into LLM-era RAG."
          - paragraph [ref=e59]: "What it does well: regulated-industry production. Component-level versioning, strong audit logging, on-prem-friendly deployment. Haystack pipelines can be exported as YAML and version-controlled separately from code. The opinionated structure pays off for teams that need to explain to compliance what the pipeline does."
          - paragraph [ref=e60]: "Where it loses: speed of iteration. The structure that wins for compliance loses for experimentation. Less hot in the open-source community than LangChain/LlamaIndex — fewer recent tutorials, smaller plugin ecosystem."
          - paragraph [ref=e61]: "When to use it: financial services, healthcare, government. Anywhere \"explain the pipeline to an auditor\" is a real requirement. Anywhere on-prem deployment matters."
          - heading "RAGFlow — 48,500 stars, the document-extraction choice" [level=3] [ref=e62]
          - paragraph [ref=e63]: "What it is: InfiniFlow's open-source RAG framework specialized for parsing complex documents — PDFs with tables, charts, multi-column layouts, scanned content."
          - paragraph [ref=e64]: "What it does well: document understanding. RAGFlow's parser handles structured PDFs (financial reports, legal contracts, medical records) substantially better than LangChain's default PyPDF or PDFMiner loaders. Table extraction works on tables that other frameworks turn into garbage."
          - paragraph [ref=e65]: "Where it loses: less flexibility outside the document-heavy use case. The opinionated UI and pipeline structure don't fit all teams. Less developed support for streaming or low-latency inference."
          - paragraph [ref=e66]: "When to use it: knowledge bases over PDFs. Compliance review over contracts. Medical-record Q&A. Anywhere the bottleneck is \"the framework can't read my source documents\" rather than \"the framework can't orchestrate well.\""
          - 'heading "The framework that doesn''t exist on this list: yours" [level=2] [ref=e67]'
          - paragraph [ref=e68]: "A minimal RAG pipeline is ~150 lines:"
          - generic [ref=e69]:
            - code [ref=e70]:
              - text: "# Pseudocode for a minimal Python RAG from openai import OpenAI from sentence_transformers import SentenceTransformer import qdrant_client"
              - paragraph [ref=e71]: embedder = SentenceTransformer("BAAI/bge-m3") client = OpenAI() db = qdrant_client.QdrantClient(":memory:")
              - paragraph [ref=e72]: "def chunk(text, size=512, overlap=64): # recursive char splitter, ~30 lines ..."
              - paragraph [ref=e73]: "def index(documents): for doc in documents: for c in chunk(doc.text): v = embedder.encode(c) db.upsert(\"docs\", {\"vector\": v, \"payload\": {\"text\": c, \"doc\": doc.id}})"
              - paragraph [ref=e74]: "def retrieve(query, k=10): v = embedder.encode(query) return db.search(\"docs\", v, limit=k)"
            - paragraph [ref=e75]:
              - code [ref=e76]: "def generate(query, context): return client.chat.completions.create( model=\"gpt-5.4\", messages=[ {\"role\": \"system\", \"content\": \"Answer using only the provided context.\"}, {\"role\": \"user\", \"content\": f\"Context:\\n{context}\\n\\nQuestion: {query}\"} ] )"
          - paragraph
          - paragraph [ref=e77]: "For most teams' RAG, this is enough. The framework adds nothing the team couldn't write themselves. The HN production-RAG threads at 5M+ docs scale consistently report: \"we started with LangChain, rewrote in 200 lines, never looked back.\""
          - paragraph [ref=e78]: "The case for a framework: integrations (you need 5+ providers swappable), team size (more than 3 engineers means more abstraction helps), and tooling (LangSmith, observability that hooks into LangChain natively)."
          - paragraph [ref=e79]: "The case against: simplicity. Fewer moving parts. Less rewrite-when-the-abstraction-leaks."
          - heading "The production stack we'd actually ship" [level=2] [ref=e80]
          - paragraph [ref=e81]: "Independent of framework:"
          - list [ref=e82]:
            - listitem [ref=e83]:
              - strong [ref=e84]: "Chunking:"
              - text: recursive 512-token with 64-token overlap. Not semantic (semantic chunking lost in the Vecta 2026 benchmark, see
              - link "/blog/why-semantic-chunking-lost-to-recursive" [ref=e85] [cursor=pointer]:
                - /url: /blog/why-semantic-chunking-lost-to-recursive
              - text: ).
            - listitem [ref=e86]:
              - strong [ref=e87]: "Embedding model:"
              - text: voyage-3-large if you have budget; BGE-M3 self-hosted if cost-sensitive. Both beat OpenAI text-embedding-3-large in independent benchmarks. See
              - link "/topic/embeddings" [ref=e88] [cursor=pointer]:
                - /url: /topic/embeddings
              - text: .
            - listitem [ref=e89]:
              - strong [ref=e90]: "Vector DB:"
              - text: pgvector if you already run Postgres and you're under 10M vectors; Qdrant self-hosted on a $30/mo VPS for cost; Pinecone if you want managed and have the budget. See
              - link "/topic/vector-databases" [ref=e91] [cursor=pointer]:
                - /url: /topic/vector-databases
              - text: .
            - listitem [ref=e92]:
              - strong [ref=e93]: "Hybrid search:"
              - text: BM25 alongside vector. Recall lifts 15-25 points over vector-only.
            - listitem [ref=e94]:
              - strong [ref=e95]: "Reranker:"
              - text: Cohere rerank-v3 or voyage rerank-2. Add this before "is the framework choice my problem." It is not.
            - listitem [ref=e96]:
              - strong [ref=e97]: "Contextual retrieval:"
              - text: Anthropic's pattern (
              - link "/topic/contextual-retrieval" [ref=e98] [cursor=pointer]:
                - /url: /topic/contextual-retrieval
              - text: ) for high-stakes pipelines. 67% lift, $1.02/M document tokens once.
            - listitem [ref=e99]:
              - strong [ref=e100]: "Generation:"
              - text: Claude Opus 4.7, GPT-5.4, or Gemini 3.1 Pro depending on cost/quality trade-off. Mix via gateway (
              - link "/topic/llm-gateway-decision" [ref=e101] [cursor=pointer]:
                - /url: /topic/llm-gateway-decision
              - text: ).
          - text: The framework decision matters less than this stack. A bad stack in LangChain is bad. A good stack in 150-line-Python is good.
          - heading "When framework choice does matter" [level=2] [ref=e102]
          - paragraph [ref=e103]: Three cases.
          - strong [ref=e104]: Multi-provider routing as a feature.
          - text: If you need to switch providers at runtime based on cost or availability, LangChain's swap-the-model-string pattern is real value. Building this from scratch is 20+ lines of error-handling per provider.
          - strong [ref=e105]: Long-context agentic retrieval.
          - text: LlamaIndex's
          - code [ref=e106]: Auto-Retriever
          - text: and recursive patterns are nontrivial to reimplement. If your retrieval pattern is "agent decides what to retrieve next based on what it found," LlamaIndex is the shortest path.
          - strong [ref=e107]: Compliance and audit.
          - text: Haystack's YAML-pipeline-as-config is a real win for regulated environments. Telling an auditor "the pipeline is in this YAML file, version-controlled separately, with these components" is easier than telling them "it's distributed across these 8 Python files."
          - heading "Where this fails" [level=2] [ref=e108]
          - strong [ref=e109]: Frameworks change quickly.
          - text: LangChain shipped breaking changes between v0.1, v0.2, and v0.3 in 2024-2025. LlamaIndex did similar restructuring. Lock to a minor version and budget for migrations. The 150-line custom pipeline is more stable precisely because there are fewer moving parts.
          - strong [ref=e110]: Star count doesn't equal production quality.
          - text: Dify (90.5k stars) is huge but heavily no-code; production teams ship less Dify than the star count suggests. RAGFlow (48.5k) is genuinely production-quality but specialized.
          - strong [ref=e111]: The HN dissent is real.
          - text: "\"LangChain abstracts you away from the parts you need to tune\" is a recurring complaint at scale. Don't dismiss it. Plan to outgrow your framework if your traffic warrants it."
          - strong [ref=e112]: Frameworks don't fix retrieval.
          - text: A bad chunking strategy, a bad embedding model, or a missing reranker will produce bad RAG regardless of framework. If your pipeline doesn't work, fix the retrieval before changing the framework.
