          - paragraph [ref=e421]: However, a static experience pool cannot adapt to shifts in task distributions or improvements in model capability, making retrieved experiences increasingly irrelevant. To address this, we introduce an experience refinement mechanism that dynamically updates the experience pool via selective addition and utility‑based deletion.
          - paragraph [ref=e423]: "First, we carefully compare two distinct strategies for adding new experiences to the pool: 1) full addition, which incorporates experiences summarized from all new trajectories regardless of outcome; 2) selective addition, where only trajectories that lead to success are distilled into experiences and stored. The empirical evidence indicates that full addition often underperforms selective addition, which may be attributed to the quality of failure-based experiences. During initial experience pool construction, multiple failed trajectories can be collectively analyzed to extract meaningful insights. However, in real-time task execution, a single failed trajectory often provides insufficient context for accurate failure analysis, potentially leading to misguided experiences. In contrast, successful trajectories consistently yield more reliable and actionable insights, thereby making selective addition effective."
