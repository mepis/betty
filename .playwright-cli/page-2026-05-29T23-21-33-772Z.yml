          - text: Introduction
        - paragraph [ref=e147]:
          - text: The transition from static language models to autonomous agents marks a pivotal shift in artificial intelligence, enabling systems to handle complex, dynamic tasks through iterative reasoning and tool use
          - generic [ref=e148]:
            - text: (Tao et al.,
            - link "2024" [ref=e149] [cursor=pointer]:
              - /url: "#bib.bib1"
            - text: ; Gao et al.,
            - link "2025" [ref=e150] [cursor=pointer]:
              - /url: "#bib.bib2"
            - text: ; Fang et al.,
            - link "2025" [ref=e151] [cursor=pointer]:
              - /url: "#bib.bib3"
            - text: )
          - text: . To facilitate continuous improvement without model retraining, procedural memory, which internalizes “how-to” knowledge from past interactions, has emerged as a critical substrate for agent evolution
          - generic [ref=e152]:
            - text: (Zhang et al.,
            - link "2025b" [ref=e153] [cursor=pointer]:
              - /url: "#bib.bib4"
            - text: ; Xu et al.,
            - link "2025" [ref=e154] [cursor=pointer]:
              - /url: "#bib.bib5"
            - text: )
          - text: . By accumulating high-quality problem-solving experiences, agents can leverage prior successes and lessons to navigate novel scenarios, theoretically reducing redundant trial-and-error and avoiding local optima
          - generic [ref=e155]:
            - text: (Wang and Chen,
            - link "2025" [ref=e156] [cursor=pointer]:
              - /url: "#bib.bib6"
            - text: ; Chen et al.,
            - link "2025" [ref=e157] [cursor=pointer]:
              - /url: "#bib.bib21"
            - text: )
          - text: . Figure
          - link "1" [ref=e158] [cursor=pointer]:
            - /url: "#S1.F1"
          - text: contrasts how an agent completes one stock trading task with and without experiences.
        - 'figure "Figure 1: Example of how agents complete one stock trading task with and without past experience." [ref=e159]':
          - img "Refer to caption" [ref=e160]
          - generic [ref=e161]:
            - generic [ref=e162]: "Figure 1:"
            - text: Example of how agents complete one stock trading task with and without past experience.
        - paragraph [ref=e164]: "To bridge the gap between static storage and dynamic reasoning, an ideal procedural memory system must function not merely as a database, but as an evolving cognitive substrate satisfying three core criteria: 1) High-quality Extraction: The system should distill generalized, reusable knowledge from noisy execution trajectories, rather than raw, problem-specific observations. 2) Task-grounded Utilization: Retrieved memories should be dynamically adapted to the specific requirements of the current task, maximizing their utility in novel scenarios. 3) Progressive Optimization: The memory pool should maintain its vitality through continuous updates, autonomously reinforcing effective entries while removing outdated ones to prevent degradation over time."
        - paragraph [ref=e166]:
          - text: However, current frameworks often fall short of these criteria, largely constrained by a “passive accumulation” paradigm. Prevailing approaches typically treat memory as inert, static storage, built on either raw trajectories as experiences
          - generic [ref=e167]:
            - text: (Zheng et al.,
            - link "2024" [ref=e168] [cursor=pointer]:
              - /url: "#bib.bib18"
            - text: ; Hu et al.,
            - link "2024" [ref=e169] [cursor=pointer]:
              - /url: "#bib.bib19"
            - text: )
          - text: or summarized workflows corresponding to entire trajectories
          - generic [ref=e170]:
            - text: (Tang et al.,
            - link "2025" [ref=e171] [cursor=pointer]:
              - /url: "#bib.bib20"
            - text: ; Liu et al.,
            - link "2025b" [ref=e172] [cursor=pointer]:
              - /url: "#bib.bib22"
            - text: )
          - text: . This introduces several fundamental limitations. First, coarse-grained trajectory-level experiences may introduce irrelevant information that can prevent the agent from grasping the core logic. Second, fetched experiences are applied without adaptation, leading to failures in slightly shifted scenarios. Crucially, lack of timely update strategies causes the experience pool to degrade into a mixture of valid insights and toxic noise
          - generic [ref=e173]:
            - text: (Xiong et al.,
            - link "2025" [ref=e174] [cursor=pointer]:
              - /url: "#bib.bib23"
            - text: )
          - text: .
        - paragraph [ref=e176]: To address these challenges, we propose ReMe (Remember Me, Refine Me), a dynamic procedural memory framework that shifts the paradigm from passive storage to feedback-driven evolution. We introduce coordinated innovations across the memory lifecycle to meet the criteria of an ideal system. First, ReMe employs a multi-faceted distillation strategy for high-quality extraction. Through success pattern recognition, failure analysis and comparative insight generation, the system distills key steps from past execution trajectories into structured, reusable experiences. Second, we design a comprehensive reuse pipeline for task-grounded utilization. ReMe employs usage scenario indexing strategy for retrieval, supplemented by reranking and adaptive rewriting, aligning historical insights with the specific constraints of new tasks. Finally, ReMe implements a utility-based refinement mechanism for progressive optimization. The memory pool grows as new successful trajectories contribute reliable experiences and failure attempts trigger self-reflection to explore viable solutions for potential insights. Concurrently, our framework tracks the utility of each experience during reuse, periodically pruning low-utility entries to maintain a compact and highly effective memory state.
        - paragraph [ref=e178]: "Through extensive experiments on BFCL-V3 and AppWorld benchmarks, ReMe achieves state-of-the-art performance, demonstrating its effectiveness for memory-augmented agents. Most notably, results reveal that memory quality can substitute for model scale: ReMe enables Qwen3-8B to outperform larger Qwen3-14B (without memory), achieving average gains of 8.83% in Avg@4 and 7.29% in Pass@4. These findings suggest that a self-evolving memory mechanism paves the way for resource-efficient lifelong learning in LLM agents."
        - generic [ref=e179]:
          - paragraph [ref=e180]: "In summary, our contributions are as follows:"
          - list [ref=e181]:
            - listitem [ref=e182]:
              - text: •
              - paragraph [ref=e184]: We propose ReMe, a comprehensive framework for agent evolution that integrates multi-faceted experience distillation, context-adaptive reuse, and utility-based refinement. This achieves the closed loop of procedural memory, resolving the “passive accumulation” dilemma by enabling agents to autonomously distill, adapt, and maintain high-quality reasoning patterns.
            - listitem [ref=e185]:
              - text: •
              - paragraph [ref=e187]: We release reme.library, a fine-grained procedural memory dataset constructed from diverse agentic tasks, with structured success patterns and failure lessons to serve as a valuable community resource for studying procedure memory and optimizing memory-augmented agents.
            - listitem [ref=e188]:
              - text: •
              - paragraph [ref=e190]: Extensive experiments show that ReMe significantly enhances agent performance across diverse benchmarks. Crucially, we demonstrate a memory-scaling effect, where smaller models equipped with ReMe surpass larger baselines, validating our framework as a computationally efficient pathway for lifelong agent learning.
