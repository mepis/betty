              - text: is a system designed to provide LLM agents with agentic memory, allowing them to autonomously manage their own long-term knowledge. It constructs a memory-centric knowledge graph for agents, actively deciding what information to store, recall, and update based on their goals and interaction. In our experiments, we reproduce A-Mem using its open-source code, with slight prompt modifications to extract procedural memories.
