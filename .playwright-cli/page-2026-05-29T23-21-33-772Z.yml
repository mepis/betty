        - paragraph [ref=e2019]:
          - text: ReMe focuses on extracting keypoint-level experiences from historical trajectories, with examples for BFCL-V3 and AppWorld illustrated in Figure
          - link "8" [ref=e2020] [cursor=pointer]:
            - /url: "#A2.F8"
          - text: and
          - link "9" [ref=e2021] [cursor=pointer]:
            - /url: "#A2.F9"
          - text: ", respectively. To further investigate the impact of experience granularity, we compare trajectory-level and keypoint-level acquisition, as described in Section"
          - link "4.3" [ref=e2022] [cursor=pointer]:
            - /url: "#S4.SS3"
          - text: . In Figure
          - link "10" [ref=e2023] [cursor=pointer]:
            - /url: "#A2.F10"
          - text: ", we contrast the structural and content characteristics of the two granularity levels, showing how trajectory-level captures exhaustive procedural details, while keypoint-level emphasizes critical actions and omits less relevant steps."
