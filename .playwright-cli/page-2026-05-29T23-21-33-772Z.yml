      - generic [ref=e1536]:
        - heading "Appendix A Use of AI Assistants" [level=2] [ref=e1537]:
          - generic [ref=e1538]: Appendix A
          - text: Use of AI Assistants
        - paragraph [ref=e1540]: During the writing process of this paper, we utilized AI assistants for language refinement, including tasks such as grammar checking, sentence restructuring, and phrasing. All AI-suggested changes were thoroughly reviewed and approved by the authors to ensure the final content of this paper represents the authors’ original ideas.
      - generic [ref=e1541]:
        - heading "Appendix B Experimental Details" [level=2] [ref=e1542]:
          - generic [ref=e1543]: Appendix B
          - text: Experimental Details
        - paragraph [ref=e1545]: In this section, we detail our experimental setup, including the benchmark datasets, evaluation metrics, and baseline methods compared. We also describe the implementation details of ReMe crucial for reproducing our results.
        - generic [ref=e1546]:
          - heading "B.1 Datasets and Evaluation Metrics" [level=3] [ref=e1547]:
            - generic [ref=e1548]: B.1
            - text: Datasets and Evaluation Metrics
          - generic [ref=e1549]:
            - heading "BFCL-V3" [level=5] [ref=e1550]
            - paragraph [ref=e1552]:
              - text: Berkeley Function Calling Leaderboard V3 (BFCL-V3)
              - generic [ref=e1553]:
                - text: (Patil et al.,
                - link "2025" [ref=e1554] [cursor=pointer]:
                  - /url: "#bib.bib29"
                - text: )
              - text: is a benchmark which assesses the function calling and tool-using capabilities of LLMs, particularly in multi-turn and multi-step scenarios. It provides over 1,800 test tasks that require models to generate precise API calls, handle various programming languages (Python, Java, JavaScript), and manage complex interactions like parallel function calls. The evaluation employs both Abstract Syntax Tree (AST) matching to check syntactic correctness and executable testing to verify functional outcomes. In our experiments, a task is deemed successful when the agent makes the necessary function calls correctly and yields the expected outputs.
          - generic [ref=e1555]:
            - heading "AppWorld" [level=5] [ref=e1556]
            - paragraph [ref=e1558]:
              - text: AppWorld
              - generic [ref=e1559]:
                - text: (Trivedi et al.,
                - link "2024" [ref=e1560] [cursor=pointer]:
                  - /url: "#bib.bib30"
                - text: )
              - text: "is a benchmark designed to evaluate function calling and interactive coding agents. It simulates a world of 9 day-to-day applications (e.g., email, Spotify, Venmo) through 457 APIs and is populated with the digital activities of approximately 100 simulated users. A key feature of AppWorld is its robust evaluation framework, which uses state-based unit tests to assess task completion and provides two metrics to measure performance: 1) Task Goal Completion (TGC) measures percentage of tasks for which the agent passes all evaluation tests; 2) Scenario Goal Completion (SGC) is the percentage of scenarios where the agent passes all the unit tests for all tasks from that scenario. In our experiments, we report Task Goal Completion metric, which naturally reflects task success rate."
            - 'figure "Figure 7: Different indexing examples for the same BFCL-V3 task experience." [ref=e1561]':
