          - paragraph [ref=e911]: "Notably, smaller models equipped with ReMe can be comparable to, or even surpass, larger models without memory. For example, the average Pass@4 score for Qwen3-8B + ReMe (dynamic) exceeds that of vanilla Qwen3-14B (55.03% vs. 54.65%). Similarly, Qwen3-14B + ReMe (dynamic) exceeds the overall performance of Qwen3‑32B without memory (Avg@4: 44.66% vs. 40.89%; Pass@4: 63.71% vs. 61.52%). This underscores that an effective memory mechanism can significantly narrow the performance gap across model scales."
          - paragraph [ref=e913]: Moreover, ReMe (dynamic) consistently outperforms ReMe (fixed) across all model sizes and benchmarks. This underscores the importance of adaptive experience refinement during task execution. In addition, ReMe tends to reduce the standard deviation in performance across runs, particularly for larger models. This suggests that ReMe not only improves overall performance but also enhances the robustness and reliability of model outputs.
          - paragraph [ref=e915]:
            - text: To demonstrate the generalizability of ReMe across different backbones, we evaluate on six additional LLMs as shown in Figure
            - link "3" [ref=e916] [cursor=pointer]:
              - /url: "#S4.F3"
            - text: . ReMe delivers consistent gains in Avg@4 across all models, with the dynamic variant yielding further improvements.
