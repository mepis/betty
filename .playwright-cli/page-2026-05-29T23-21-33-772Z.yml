          - paragraph [ref=e241]:
            - text: Our framework, ReMe, as illustrated in Figure
            - link "2" [ref=e242] [cursor=pointer]:
              - /url: "#S2.F2"
            - text: ", operates through three interconnected phases: experience acquisition, reuse, and refinement. In the experience acquisition phase, a summarizer analyzes agent generated trajectories (both successful and failed) and distills actionable knowledge into a structured experience pool. During experience reuse, given a novel task, a retriever recalls relevant experiences from the experience pool. These experiences then augment the agent’s context, enhancing their reasoning and task-solving performance. Finally, the experience refinement phase continuously optimizes the experience pool by incorporating new solid experiences and discarding outdated ones, ensuring long-term relevance and adaptability to shifting task demands."
