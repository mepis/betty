            - text: Generalizability across Different Models
          - paragraph [ref=e2031]:
            - text: To examine the generalizability of ReMe, we conduct experiments with different backbone models, including GPT-4.1, o4‑mini, Qwen3‑Max, Kimi‑K2, DeepSeek‑V3.2, and GLM‑4.7. The stacked analysis in Figure
            - link "3" [ref=e2032] [cursor=pointer]:
              - /url: "#S4.F3"
            - text: and detailed results in Table
            - link "7" [ref=e2033] [cursor=pointer]:
              - /url: "#A2.T7"
            - text: show that ReMe consistently outperforms No Memory baseline across various backbones, confirming the model‑agnostic advantage of our novel procedural memory system.
        - generic [ref=e2034]:
          - heading "D.2 Results on Larger-scale Benchmark" [level=3] [ref=e2035]:
            - generic [ref=e2036]: D.2
            - text: Results on Larger-scale Benchmark
          - paragraph [ref=e2038]:
            - text: To further show the superiority of ReMe, we supplement the experiments on the Missing Parameters, Missing Functions, and Long Context category of BFCL-V3 benchmark with total 600 tasks. Using the experience pool constructed from 50 tasks in base multi-turn category, the evaluation results (Pass@4 as metric) are shown in Table
            - link "8" [ref=e2039] [cursor=pointer]:
              - /url: "#A2.T8"
            - text: . It can be observed that our ReMe still performs well when evaluated on a larger-size benchmark.
        - generic [ref=e2040]:
          - heading "D.3 Retrieval Key Analysis" [level=3] [ref=e2041]:
            - generic [ref=e2042]: D.3
            - text: Retrieval Key Analysis
          - paragraph [ref=e2044]:
            - text: Table
            - link "9" [ref=e2045] [cursor=pointer]:
              - /url: "#A2.T9"
            - text: compares four retrieval key strategies (task query, generalized query, query keywords, and usage scenario) across three model scales (Qwen3–8B, Qwen3–14B, and Qwen3–32B) on the BFCL-V3 benchmark under the ReMe(fixed) setting. Consistent with the trends observed in Figure
            - link "4" [ref=e2046] [cursor=pointer]:
              - /url: "#S4.F4"
            - text: ", simple indexing methods such as raw task query and query keywords generally yield lower performance. In contrast, LLM-generated retrieval keys, particularly the usage scenario field, exhibit consistently strong results across all models, achieving the highest or near-highest Avg@4 and Pass@4 scores."
      - generic [ref=e2047]:
        - heading "Appendix E Case Study" [level=2] [ref=e2048]:
          - generic [ref=e2049]: Appendix E
          - text: Case Study
        - paragraph [ref=e2051]:
          - text: To gain deeper insights into how experience reuse influences agent reasoning, we compare two agent trajectories on the same BFCL-V3 task, one guided by retrieved experiences and one without. As illustrated in Figure
          - link "1" [ref=e2052] [cursor=pointer]:
            - /url: "#S1.F1"
          - text: ", without past experience, the agent encounters a failure when purchasing Apple shares since it fabricates the current market price instead of fetching real-time data. With ReMe, past experience guides the agent to correctly obtain real-time pricing before placing an order, successfully completing the stock trading task. This case demonstrates how experience-driven reasoning prevents agents from repeating earlier mistakes and improves robustness across similar scenarios."
