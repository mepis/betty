            - text: presents the main results of ReMe across Qwen3 family models on BFCL-V3 and AppWorld benchmarks. Overall, ReMe achieves the highest average task success rate across three model sizes, consistently outperforming No Memory baseline and competitive baseline memory systems. Specifically, Qwen3-8B with ReMe surpasses the No Memory baseline by an improvement of 7.29% Pass@4 and 8.83% Avg@4 on average. The gains observed in Pass@4 indicate that retrieved experiences are effective at broadening the exploration space, increasing the likelihood of finding at least one successful solution among multiple attempts. Besides, the performance stability of our ReMe is particularly evident when compared to the baseline methods. For instance, while LangMem performs well on BFCL-V3, its performance drops significantly on AppWorld, especially for smaller models. Instead, ReMe (dynamic) shows remarkable consistency across both BFCL-V3 and AppWorld benchmarks.
