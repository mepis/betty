              - text: 14) indicates ReMe effectively leverages past experiences to strengthen its multi‑step reasoning capabilities, reducing propagation of earlier mistakes. ReMe also yields a moderate but meaningful reduction in Action Omission errors, which helps the agent recognize missing steps in multi-turn tasks, especially those requiring sequential tool interactions or state tracking.
      - generic [ref=e1282]:
        - heading "5 Conclusion" [level=2] [ref=e1283]:
          - generic [ref=e1284]: "5"
          - text: Conclusion
        - paragraph [ref=e1286]: We introduce ReMe, a dynamic procedural memory framework that evolves agent reasoning from blind trial-and-error to strategic experience reuse. By distilling structured knowledge from prior trajectories at a fine-grained level, ReMe enables agents to leverage critical insights, thus avoiding potential experience interference in coarse-grained approaches. Equipped with effective experience refinement, ReMe maintains a high-quality experience pool for agent evolution. Extensive experiments validate that ReMe significantly outperforms several baselines, with ablation studies highlighting the value of each core component in ReMe.
      - generic [ref=e1287]:
        - heading "Limitations" [level=2] [ref=e1288]
        - paragraph [ref=e1290]:
          - text: This paper focuses on procedural memory management for agent self-evolution. Despite its promising performance, there are several limitations that could be addressed in future work. First, ReMe currently employs a fixed retrieval strategy, where experiences are retrieved once at the beginning of each task. Implementing a more flexible, context-aware retrieval mechanism could potentially improve system performance, since dynamic experience incorporation promotes adaptive knowledge utilization. Secondly, although the existing experience validation process effectively filters out low-quality experiences, relying primarily on an LLM-as-judge approach may overlook nuanced aspects of experience quality and relevance. In the future, we can explore more sophisticated validation techniques for more precise experience evaluation. Furthermore, a larger-scale summarizer brings greater performance gains in agent reasoning, as shown in Section
          - link "4.4" [ref=e1291] [cursor=pointer]:
            - /url: "#S4.SS4"
          - text: ", which can be attributed to its stronger summarization capability. This indicates that designing advanced summarization strategies with small models can further boost agent self-evolution."
