            - text: . Moreover, to keep the experience pool compact, validated experiences undergo similarity‑based deduplication. Specifically, each new experience is encoded into a vector embedding and compared against existing ones via cosine similarity, and any candidate exceeding a predefined similarity threshold is discarded as redundant. This helps maintain the efficiency of the subsequent experience reuse phase and preserve the diversity of retrieved experiences.
