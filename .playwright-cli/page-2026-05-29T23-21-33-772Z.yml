          - generic [ref=e1568]:
            - heading "LangMem" [level=5] [ref=e1569]
            - paragraph [ref=e1571]:
              - text: LangMem
              - generic [ref=e1572]:
                - text: (LangChain,
                - link "2025" [ref=e1573] [cursor=pointer]:
                  - /url: "#bib.bib32"
                - text: )
              - text: is Langchain’s long-term memory module that extracts and stores key information from conversations for future retrieval. It provides both functional primitives compatible with any storage system and native integration with LangGraph’s storage layer, enabling agents to continuously improve. In our experiments, we adopt LangMem’s implementation of episodic memory
              - superscript [ref=e1575]: "3"
              - text: ", which helps the agent learn from experience."
          - generic [ref=e1576]:
            - heading "A-Mem" [level=5] [ref=e1577]
