                - paragraph [ref=e307]:
                  - text: According to my rough napkin math
                  - superscript [ref=e308]:
                    - link "[1]" [ref=e309] [cursor=pointer]:
                      - /url: "#user-content-fn-1-859ceba944c029c61990321fbf17a6c4"
                  - text: ", the theoretical speed-of-light for"
                  - code [ref=e310]: gpt-oss-20b
                  - text: on a 5090 is ~520 t/s, and we are able to reach ~419 t/s (~80%), although speedups are more modest as context size grows.
                - paragraph [ref=e311]:
                  - text: Most of the optimizations are enabled by default in llama.cpp, concurrent streams is enabled via an environment flag
                  - code [ref=e312]: GGML_CUDA_GRAPH_OPT=1
                  - text: (note that this particular optimization only works for a single GPU at the moment, also note that this has nothing to with CUDA Graphs)
                - heading "Kernel Fusion" [level=2] [ref=e313]
                - paragraph [ref=e314]: Fusing kernels reduces memory traffic and kernel launch time. Since TG is memory-bound, kernel fusion helps there the most. From experience fusion is the most useful when we have high memory bandwidth, conversely the results are not as great when the bandwidth is low.
                - paragraph [ref=e315]: Note that some fusion will increase register pressure and generally leads to more complex kernels, so it's not always worth doing.
                - paragraph [ref=e316]:
                  - text: llama.cpp's backend is based on ggml, a low level tensor library. ggml offers a lot of flexibility to backends via its cgraph (compute graph) interface. After upfront tensor allocation and initial graph ordering, it passes control to individual backends to compute the graph. The graph itself is composed of
                  - code [ref=e317]: ggml_tensor
                  - text: s, which contain all the information required for fusion.
                - paragraph [ref=e318]: "The backends are then responsible for fusion. The CUDA backend inspects order of operations and decides whether to fuse a bunch of individual kernels. This pattern can be described in pseudo-code:"
                - generic [ref=e319]:
                  - code [ref=e321]: "for (int i = 0; i < graph->n_nodes; ++i) { if (can_fuse(graph, i, FUSION_PATTERN)) { replace_nodes_with_kernel(graph, i, FUSION); i += SKIP_NODES; // Skip the nodes we just absorbed } }"
                  - button "Copy code to clipboard" [ref=e323] [cursor=pointer]:
                    - img [ref=e324]
                - paragraph [ref=e327]:
                  - text: In ggml-cuda, the relevant portions start from
                  - link "here" [ref=e328] [cursor=pointer]:
                    - /url: https://github.com/ggml-org/llama.cpp/blob/fa0465954faef9d7170b967ad89f8bc5303a32f3/ggml/src/ggml-cuda/ggml-cuda.cu#L3294
                - paragraph [ref=e329]: "Looking at the order of nodes, one can identify opportunities for fusion. Something which is commonly used in a lot of models is usually a good candidate. The following are the most effective fusions that the CUDA backend does at the moment:"
                - heading "GEMV fusion" [level=3] [ref=e330]
                - paragraph [ref=e331]:
                  - text: Matrix-vector multiplication is used instead of matrix-matrix multiplication during TG as we operate on 1 token at a time. We identify operations where
                  - code [ref=e332]: MUL_MAT
                  - text: follows an
                  - code [ref=e333]: ADD
                  - text: or more interestingly, when there is a gated activation i.e. the operation
                  - math [ref=e335]:
                    - generic [ref=e336]: o
                    - generic [ref=e337]: =
                    - generic [ref=e338]: σ
                    - generic [ref=e339]: (
                    - generic [ref=e340]:
                      - generic [ref=e341]: W
                      - generic [ref=e342]:
                        - generic [ref=e343]: g
                        - generic [ref=e344]: a
                        - generic [ref=e345]: t
                        - generic [ref=e346]: e
                    - generic [ref=e347]: X
                    - generic [ref=e348]: )
                    - generic [ref=e349]: ⊙
                    - generic [ref=e350]:
                      - generic [ref=e351]: W
                      - generic [ref=e352]:
                        - generic [ref=e353]: u
                        - generic [ref=e354]: p
                    - generic [ref=e355]: X
                  - text: ", so we can re-use the X activation and multiply by both matrices. More details"
                  - link "here" [ref=e356] [cursor=pointer]:
                    - /url: https://github.com/ggml-org/llama.cpp/pull/16715
                - heading "TopK-MoE" [level=3] [ref=e357]
                - paragraph [ref=e358]:
                  - text: This is the common scoring algorithm in MoE models to select expert weights per token. This usually involves a soft-max over the logits per expert, then a top-k selection for the experts for the sparse MoE matrix multiplication (called MUL_MAT_ID in ggml). More details
                  - link "here" [ref=e359] [cursor=pointer]:
                    - /url: https://github.com/ggml-org/llama.cpp/pull/16130
                - heading "Fused RMS Norm" [level=3] [ref=e360]
                - paragraph [ref=e361]:
                  - text: This is a relatively simple one, usually
                  - code [ref=e362]: RMS_NORM
                  - text: follows a
                  - code [ref=e363]: MUL
                  - text: and optionally an
                  - code [ref=e364]: ADD
                  - text: . We just do everything in the same kernel. More details
                  - link "here" [ref=e365] [cursor=pointer]:
                    - /url: https://github.com/ggml-org/llama.cpp/pull/14800
                  - text: .
                - paragraph [ref=e366]:
                  - text: Others include fusing
                  - link "adds" [ref=e367] [cursor=pointer]:
                    - /url: https://github.com/ggml-org/llama.cpp/pull/15631
                  - text: ", fusing the"
                  - link "softcap" [ref=e368] [cursor=pointer]:
                    - /url: https://github.com/ggml-org/llama.cpp/pull/14907
                  - text: operation.
                - heading "Concurrent CUDA Streams" [level=2] [ref=e369]
                - blockquote [ref=e370]:
                  - paragraph [ref=e371]:
                    - text: "Note: At the moment to run this you need to supply the env variable"
                    - code [ref=e372]: GGML_CUDA_GRAPH_OPT=1
                    - text: .
                - paragraph [ref=e373]:
                  - text: Since query (Q), key (K), and value(V) projections in the attention block are independent of each other prior to calculating the attention scores, we can run them independently using CUDA streams. This is better explained with a NSight diagram.
                  - link "qkv concurrent streams" [ref=e374] [cursor=pointer]:
                    - /url: https://private-user-images.githubusercontent.com/2929750/520493863-c460d4c4-d105-40f5-9aff-090036c9f204.png?jwt=eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9..mbxiiDi7E2I5MrnnevSOtNRfFUAzZpBrSQpZtPqSlUM
                    - img "qkv concurrent streams" [ref=e375]
                - paragraph [ref=e376]:
                  - text: The ggml graph allocator optimizes for memory footprint by reusing 'expired' buffers immediately. In a multi-stream context, 'expired' is ambiguous, leading to race conditions where Stream B overwrites Stream A's input. This is currently "solved" via interleaving the graph nodes to extend their lifetime. There will be a better long-term fix in ggml to allow for such scenarios. More details
                  - link "here" [ref=e377] [cursor=pointer]:
                    - /url: https://github.com/ggml-org/llama.cpp/pull/16991
                - heading "Conclusion" [level=2] [ref=e378]
                - paragraph [ref=e379]: Although none of these PRs increase the TG by more than 10%, taking them all altogether we get a nice speedup.
