      - main [ref=e150]:
        - generic [ref=e152]:
          - heading "Permissions" [level=1] [ref=e153]
          - paragraph [ref=e154]: Control which actions require approval to run.
        - generic [ref=e156]:
          - generic [ref=e157]:
            - paragraph [ref=e158]:
              - text: OpenCode uses the
              - code [ref=e159]: "`permission`"
              - text: config to decide whether a given action should run automatically, prompt you, or be blocked.
            - paragraph [ref=e160]:
              - text: As of
              - code [ref=e161]: "`v1.1.1`"
              - text: ", the legacy"
              - code [ref=e162]: "`tools`"
              - text: boolean config is deprecated and has been merged into
              - code [ref=e163]: "`permission`"
              - text: . The old
              - code [ref=e164]: "`tools`"
              - text: config is still supported for backwards compatibility.
            - separator [ref=e165]
            - heading "Actions" [level=2] [ref=e166]:
              - link "Actions" [ref=e167]:
                - /url: "#actions"
            - paragraph [ref=e168]: "Each permission rule resolves to one of:"
            - list [ref=e169]:
              - listitem [ref=e170]:
                - code [ref=e171]: "`\"allow\"`"
                - text: — run without approval
              - listitem [ref=e172]:
                - code [ref=e173]: "`\"ask\"`"
                - text: — prompt for approval
              - listitem [ref=e174]:
                - code [ref=e175]: "`\"deny\"`"
                - text: — block the action
            - separator [ref=e176]
            - heading "Configuration" [level=2] [ref=e177]:
              - link "Configuration" [ref=e178]:
                - /url: "#configuration"
            - paragraph [ref=e179]:
              - text: You can set permissions globally (with
              - code [ref=e180]: "`*`"
              - text: ), and override specific tools.
            - figure "opencode.json" [ref=e182]:
              - generic [ref=e184]: opencode.json
              - code [ref=e186]:
                - generic [ref=e188]: "{"
                - generic [ref=e190]: "\"$schema\": \"https://opencode.ai/config.json\","
                - generic [ref=e192]: "\"permission\": {"
                - generic [ref=e194]: "\"*\": \"ask\","
                - generic [ref=e196]: "\"bash\": \"allow\","
                - generic [ref=e198]: "\"edit\": \"deny\""
                - generic [ref=e200]: "}"
                - generic [ref=e203]: "}"
              - button "Copy to clipboard" [ref=e205] [cursor=pointer]
            - paragraph [ref=e207]: "You can also set all permissions at once:"
            - figure "opencode.json" [ref=e209]:
              - generic [ref=e211]: opencode.json
              - code [ref=e213]:
                - generic [ref=e215]: "{"
                - generic [ref=e217]: "\"$schema\": \"https://opencode.ai/config.json\","
                - generic [ref=e219]: "\"permission\": \"allow\""
                - generic [ref=e221]: "}"
              - button "Copy to clipboard" [ref=e223] [cursor=pointer]
            - separator [ref=e225]
            - heading "Granular Rules (Object Syntax)" [level=2] [ref=e226]:
              - link "Granular Rules (Object Syntax)" [ref=e227]:
                - /url: "#granular-rules-object-syntax"
            - paragraph [ref=e228]: For most permissions, you can use an object to apply different actions based on the tool input.
            - figure "opencode.json" [ref=e230]:
              - generic [ref=e232]: opencode.json
              - code [ref=e234]:
                - generic [ref=e236]: "{"
                - generic [ref=e238]: "\"$schema\": \"https://opencode.ai/config.json\","
                - generic [ref=e240]: "\"permission\": {"
                - generic [ref=e242]: "\"bash\": {"
                - generic [ref=e244]: "\"*\": \"ask\","
                - generic [ref=e246]: "\"git *\": \"allow\","
                - generic [ref=e248]: "\"npm *\": \"allow\","
                - generic [ref=e250]: "\"rm *\": \"deny\","
                - generic [ref=e252]: "\"grep *\": \"allow\""
                - generic [ref=e254]: "},"
                - generic [ref=e257]: "\"edit\": {"
                - generic [ref=e259]: "\"*\": \"deny\","
                - generic [ref=e261]: "\"packages/web/src/content/docs/*.mdx\": \"allow\""
                - generic [ref=e263]: "}"
                - generic [ref=e266]: "}"
                - generic [ref=e269]: "}"
              - button "Copy to clipboard" [ref=e271] [cursor=pointer]
            - paragraph [ref=e273]:
              - text: Rules are evaluated by pattern match, with the
              - strong [ref=e274]: last matching rule winning
              - text: . A common pattern is to put the catch-all
              - code [ref=e275]: "`\"*\"`"
              - text: rule first, and more specific rules after it.
            - heading "Wildcards" [level=3] [ref=e276]:
              - link "Wildcards" [ref=e277]:
                - /url: "#wildcards"
            - paragraph [ref=e278]: "Permission patterns use simple wildcard matching:"
            - list [ref=e279]:
              - listitem [ref=e280]:
                - code [ref=e281]: "`*`"
                - text: matches zero or more of any character
              - listitem [ref=e282]:
                - code [ref=e283]: "`?`"
                - text: matches exactly one character
              - listitem [ref=e284]: All other characters match literally
            - heading "Home Directory Expansion" [level=3] [ref=e285]:
              - link "Home Directory Expansion" [ref=e286]:
                - /url: "#home-directory-expansion"
            - paragraph [ref=e287]:
              - text: You can use
              - code [ref=e288]: "`~`"
              - text: or
              - code [ref=e289]: "`$HOME`"
              - text: at the start of a pattern to reference your home directory. This is particularly useful for
              - 'link "`external_directory`" [ref=e290] [cursor=pointer]':
                - /url: "#external-directories"
                - code [ref=e291]: "`external_directory`"
              - text: rules.
            - list [ref=e292]:
              - listitem [ref=e293]:
                - code [ref=e294]: "`~/projects/*`"
                - text: "->"
                - code [ref=e295]: "`/Users/username/projects/*`"
              - listitem [ref=e296]:
                - code [ref=e297]: "`$HOME/projects/*`"
                - text: "->"
                - code [ref=e298]: "`/Users/username/projects/*`"
              - listitem [ref=e299]:
                - code [ref=e300]: "`~`"
                - text: "->"
                - code [ref=e301]: "`/Users/username`"
            - heading "External Directories" [level=3] [ref=e302]:
              - link "External Directories" [ref=e303]:
                - /url: "#external-directories"
            - paragraph [ref=e304]:
              - text: Use
              - code [ref=e305]: "`external_directory`"
              - text: to allow tool calls that touch paths outside the working directory where OpenCode was started. This applies to any tool that takes a path as input (for example
              - code [ref=e306]: "`read`"
              - text: ","
              - code [ref=e307]: "`edit`"
              - text: ","
              - code [ref=e308]: "`glob`"
              - text: ","
              - code [ref=e309]: "`grep`"
              - text: ", and many"
              - code [ref=e310]: "`bash`"
              - text: commands).
            - paragraph [ref=e311]:
              - text: Home expansion (like
              - code [ref=e312]: "`~/...`"
              - text: ) only affects how a pattern is written. It does not make an external path part of the current workspace, so paths outside the working directory must still be allowed via
              - code [ref=e313]: "`external_directory`"
              - text: .
            - paragraph [ref=e314]:
              - text: For example, this allows access to everything under
              - code [ref=e315]: "`~/projects/personal/`"
              - text: ":"
            - figure "opencode.json" [ref=e317]:
              - generic [ref=e319]: opencode.json
              - code [ref=e321]:
                - generic [ref=e323]: "{"
                - generic [ref=e325]: "\"$schema\": \"https://opencode.ai/config.json\","
                - generic [ref=e327]: "\"permission\": {"
                - generic [ref=e329]: "\"external_directory\": {"
                - generic [ref=e331]: "\"~/projects/personal/**\": \"allow\""
                - generic [ref=e333]: "}"
                - generic [ref=e336]: "}"
                - generic [ref=e339]: "}"
              - button "Copy to clipboard" [ref=e341] [cursor=pointer]
            - paragraph [ref=e343]:
              - text: Any directory allowed here inherits the same defaults as the current workspace. Since
              - 'link "`read` defaults to `allow`" [ref=e344] [cursor=pointer]':
                - /url: "#defaults"
                - code [ref=e345]: "`read`"
                - text: defaults to
                - code [ref=e346]: "`allow`"
              - text: ", reads are also allowed for entries under"
              - code [ref=e347]: "`external_directory`"
              - text: "unless overridden. Add explicit rules when a tool should be restricted in these paths, such as blocking edits while keeping reads:"
            - figure "opencode.json" [ref=e349]:
              - generic [ref=e351]: opencode.json
              - code [ref=e353]:
                - generic [ref=e355]: "{"
                - generic [ref=e357]: "\"$schema\": \"https://opencode.ai/config.json\","
                - generic [ref=e359]: "\"permission\": {"
                - generic [ref=e361]: "\"external_directory\": {"
                - generic [ref=e363]: "\"~/projects/personal/**\": \"allow\""
                - generic [ref=e365]: "},"
                - generic [ref=e368]: "\"edit\": {"
                - generic [ref=e370]: "\"~/projects/personal/**\": \"deny\""
                - generic [ref=e372]: "}"
                - generic [ref=e375]: "}"
                - generic [ref=e378]: "}"
              - button "Copy to clipboard" [ref=e380] [cursor=pointer]
            - paragraph [ref=e382]:
              - text: Keep the list focused on trusted paths, and layer extra allow or deny rules as needed for other tools (for example
              - code [ref=e383]: "`bash`"
              - text: ).
            - separator [ref=e384]
            - heading "Available Permissions" [level=2] [ref=e385]:
              - link "Available Permissions" [ref=e386]:
                - /url: "#available-permissions"
            - paragraph [ref=e387]: "OpenCode permissions are keyed by tool name, plus a couple of safety guards:"
            - list [ref=e388]:
              - listitem [ref=e389]:
                - code [ref=e390]: "`read`"
                - text: — reading a file (matches the file path)
              - listitem [ref=e391]:
                - code [ref=e392]: "`edit`"
                - text: — all file modifications (covers
                - code [ref=e393]: "`edit`"
                - text: ","
                - code [ref=e394]: "`write`"
                - text: ","
                - code [ref=e395]: "`patch`"
                - text: )
              - listitem [ref=e396]:
                - code [ref=e397]: "`glob`"
                - text: — file globbing (matches the glob pattern)
              - listitem [ref=e398]:
                - code [ref=e399]: "`grep`"
                - text: — content search (matches the regex pattern)
              - listitem [ref=e400]:
                - code [ref=e401]: "`bash`"
                - text: — running shell commands (matches parsed commands like
                - code [ref=e402]: "`git status --porcelain`"
                - text: )
              - listitem [ref=e403]:
                - code [ref=e404]: "`task`"
                - text: — launching subagents (matches the subagent type)
              - listitem [ref=e405]:
                - code [ref=e406]: "`skill`"
                - text: — loading a skill (matches the skill name)
              - listitem [ref=e407]:
                - code [ref=e408]: "`lsp`"
                - text: — running LSP queries (currently non-granular)
              - listitem [ref=e409]:
                - code [ref=e410]: "`question`"
                - text: — asking the user questions during execution
              - listitem [ref=e411]:
                - code [ref=e412]: "`webfetch`"
                - text: — fetching a URL (matches the URL)
              - listitem [ref=e413]:
                - code [ref=e414]: "`websearch`"
                - text: — web search (matches the query)
              - listitem [ref=e415]:
                - code [ref=e416]: "`external_directory`"
                - text: — triggered when a tool touches paths outside the project working directory
              - listitem [ref=e417]:
                - code [ref=e418]: "`doom_loop`"
                - text: — triggered when the same tool call repeats 3 times with identical input
            - separator [ref=e419]
            - heading "Defaults" [level=2] [ref=e420]:
              - link "Defaults" [ref=e421]:
                - /url: "#defaults"
            - paragraph [ref=e422]: "If you don’t specify anything, OpenCode starts from permissive defaults:"
            - list [ref=e423]:
              - listitem [ref=e424]:
                - text: Most permissions default to
                - code [ref=e425]: "`\"allow\"`"
                - text: .
              - listitem [ref=e426]:
                - code [ref=e427]: "`doom_loop`"
                - text: and
                - code [ref=e428]: "`external_directory`"
                - text: default to
                - code [ref=e429]: "`\"ask\"`"
                - text: .
              - listitem [ref=e430]:
                - code [ref=e431]: "`read`"
                - text: is
                - code [ref=e432]: "`\"allow\"`"
                - text: ", but"
                - code [ref=e433]: "`.env`"
                - text: "files are denied by default:"
            - figure "opencode.json" [ref=e435]:
              - generic [ref=e437]: opencode.json
              - code [ref=e439]:
                - generic [ref=e441]: "{"
                - generic [ref=e443]: "\"permission\": {"
                - generic [ref=e445]: "\"read\": {"
                - generic [ref=e447]: "\"*\": \"allow\","
                - generic [ref=e449]: "\"*.env\": \"deny\","
                - generic [ref=e451]: "\"*.env.*\": \"deny\","
                - generic [ref=e453]: "\"*.env.example\": \"allow\""
                - generic [ref=e455]: "}"
                - generic [ref=e458]: "}"
                - generic [ref=e461]: "}"
              - button "Copy to clipboard" [ref=e463] [cursor=pointer]
            - separator [ref=e465]
            - heading "What “Ask” Does" [level=2] [ref=e466]:
              - link "What “Ask” Does" [ref=e467]:
                - /url: "#what-ask-does"
            - paragraph [ref=e468]: "When OpenCode prompts for approval, the UI offers three outcomes:"
            - list [ref=e469]:
              - listitem [ref=e470]:
                - code [ref=e471]: "`once`"
                - text: — approve just this request
              - listitem [ref=e472]:
                - code [ref=e473]: "`always`"
                - text: — approve future requests matching the suggested patterns (for the rest of the current OpenCode session)
              - listitem [ref=e474]:
                - code [ref=e475]: "`reject`"
                - text: — deny the request
            - paragraph [ref=e476]:
              - text: The set of patterns that
              - code [ref=e477]: "`always`"
              - text: would approve is provided by the tool (for example, bash approvals typically whitelist a safe command prefix like
              - code [ref=e478]: "`git status*`"
              - text: ).
            - separator [ref=e479]
            - heading "Agents" [level=2] [ref=e480]:
              - link "Agents" [ref=e481]:
                - /url: "#agents"
            - paragraph [ref=e482]:
              - text: You can override permissions per agent. Agent permissions are merged with the global config, and agent rules take precedence.
              - link "Learn more" [ref=e483] [cursor=pointer]:
