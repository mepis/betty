            - separator: · · ·
            - heading "Validity and Limitations" [level=1] [ref=e595]
            - paragraph [ref=e596]: This is a local inference tuning study, not a leaderboard submission.
            - paragraph [ref=e597]: The performance results are the strongest part of the article. They compare the same model family on the same machine using the same llama.cpp build and controlled runtime settings. Those results are useful for deciding what to run on this GB10 system.
            - paragraph [ref=e598]: The quality results are narrower.
            - paragraph [ref=e599]:
              - text: GSM8K used 100 examples, not the full 1,319-example test set. IFEval used 25 examples, not the full 541. lm-eval itself warns that
              - code [ref=e600]: "--limit"
              - text: should be used for testing, not official metrics.
            - paragraph [ref=e601]: The sample evals are still useful for relative comparison between Q4 and MXFP4, but I would not cite them as official Qwen3.6 scores.
            - paragraph [ref=e602]:
              - text: There is also a formatting caveat. GSM8K strict-match was 0.0 for both variants because the local completion format did not consistently emit the canonical
              - code [ref=e603]: "####"
              - text: answer format. I reported flexible exact match because it extracts the numeric answer from free-form generations.
            - separator: · · ·
            - heading "What I Would Run Next" [level=1] [ref=e604]
            - paragraph [ref=e605]: "For a follow-up, I would not rerun everything. I would focus on the two serious candidates: Q4 and MXFP4."
            - paragraph [ref=e606]: "The next tests I would run are:"
            - list [ref=e607]:
              - listitem [ref=e608]: Full GSM8K on Q4 overnight.
              - listitem [ref=e609]: Full IFEval on Q4 overnight.
              - listitem [ref=e610]: Patch or replace the logprobs adapter so HellaSwag, ARC-Challenge, TruthfulQA MC2, Winogrande, and selected MMLU subjects work cleanly through llama.cpp.
              - listitem [ref=e611]: Add HumanEval and MBPP if coding use cases matter.
              - listitem [ref=e612]: Compare Q4 and MXFP4 on a real internal RAG workload, not just synthetic prompt profiles.
            - paragraph [ref=e613]: The open question is not whether GB10 can run this class of model. It can.
            - paragraph [ref=e614]: The real question is which local setup gives you the best experience for the work you actually do.
            - paragraph [ref=e615]: "For me, after this run, the answer is simple:"
            - blockquote [ref=e616]:
              - paragraph [ref=e617]:
                - strong [ref=e618]: Use Q4 by default. Use MXFP4 when long prompts dominate.
