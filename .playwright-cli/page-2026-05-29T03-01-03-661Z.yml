            - heading "Summary" [level=2] [ref=e49]
            - paragraph [ref=e50]: Qwen3.6-35B-A3B runs comfortably on NVIDIA GB10-class hardware. That was not the real question.
            - paragraph [ref=e51]: The real question was which GGUF variant actually makes sense to use every day.
            - paragraph [ref=e52]:
              - text: Raw BF16 fits in memory, but it is not the best daily-driver option. Q8 is larger without being faster. Q5 works, but it does not clearly justify itself. The real decision comes down to
              - strong [ref=e53]: UD-Q4_K_M
              - text: versus
              - strong [ref=e54]: MXFP4_MOE
              - text: .
            - paragraph [ref=e55]:
              - text: After
              - strong [ref=e56]: 243 llama.cpp tuning runs
              - text: and two sample
              - strong [ref=e57]: lm-evaluation-harness
              - text: "quality checks, my recommendation is straightforward:"
            - list [ref=e58]:
              - listitem [ref=e59]:
                - text: Use
                - strong [ref=e60]: UD-Q4_K_M
                - text: for general local chat, coding help, structured extraction, and agent work.
              - listitem [ref=e61]:
                - text: Use
                - strong [ref=e62]: MXFP4_MOE
                - text: "when prompt ingestion is the bottleneck: RAG, long-context workflows, document processing, and agents carrying a lot of state."
              - listitem [ref=e63]:
                - text: Keep
                - strong [ref=e64]: raw BF16
                - text: as a reference baseline, not a daily driver.
              - listitem [ref=e65]:
                - text: Keep
                - strong [ref=e66]: flash attention on
                - text: .
              - listitem [ref=e67]:
                - text: Start with
                - strong [ref=e68]: f16/f16 KV cache
                - text: unless memory pressure forces you to experiment.
            - paragraph [ref=e69]: That is the short version. The rest of this article explains why.
