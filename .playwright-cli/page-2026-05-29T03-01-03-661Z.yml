            - paragraph [ref=e114]: The headline result is not just decode speed. The bigger result is the long-prompt gap.
            - paragraph [ref=e115]: "On the best mixed long-prompt profile:"
            - list [ref=e116]:
              - listitem [ref=e117]:
                - strong [ref=e118]: MXFP4 was 7.9x faster than BF16
              - listitem [ref=e119]:
                - strong [ref=e120]: UD-Q4 was 7.7x faster than BF16
            - paragraph [ref=e121]: That changes what feels practical locally.
            - paragraph [ref=e122]: For a chatbot, the difference between 30 tok/s and 65 tok/s is obvious. But for RAG and agent systems, prompt processing is often the larger bottleneck. Every retrieved document, tool result, scratchpad entry, JSON schema, and conversation-history chunk has to be ingested before the model can answer.
            - paragraph [ref=e123]: That is where quantized Qwen3.6 on GB10 starts to look very strong.
