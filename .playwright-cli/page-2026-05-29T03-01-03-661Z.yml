            - paragraph [ref=e430]: One issue showed up immediately in the GSM8K samples.
            - paragraph [ref=e431]:
              - text: The model sometimes emitted
              - code [ref=e432]: <think>
              - text: "-style reasoning or verbose setup text, and lm-eval’s extractor grabbed the wrong number."
            - paragraph [ref=e433]:
              - text: For example, on the classic ducks-and-eggs GSM8K prompt, the expected answer is 18. The response began by restating the problem and included the sale price
              - code [ref=e434]: $2
              - text: ; the flexible extractor picked
              - code [ref=e435]: $2
              - text: instead of the final answer.
            - paragraph [ref=e436]: That does not necessarily mean the model could not solve the problem. It means the local completion format and answer extraction were not aligned.
            - paragraph [ref=e437]: That matters in production too.
            - paragraph [ref=e438]: "If you use a reasoning model locally, you need to control output format. For math, extraction, and automation tasks, use explicit instructions such as:"
            - code [ref=e440]: Return only the final numeric answer. Do not include reasoning.
            - paragraph [ref=e441]: Or use a JSON schema if the runtime supports it.
