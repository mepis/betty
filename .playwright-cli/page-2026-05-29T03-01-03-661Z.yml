            - paragraph [ref=e35]: A detailed benchmark of Qwen3.6-35B-A3B on NVIDIA GB10 using 243 llama.cpp runs, comparing BF16, Q8, Q5, Q4, and MXFP4 GGUF variants for local AI inference, RAG, agents, and long-context workloads.
