            - paragraph [ref=e287]: BF16 fit on the machine. That part was impressive.
            - paragraph [ref=e288]:
              - text: But it did not make sense for real work. Its disk footprint was roughly
              - strong [ref=e289]: 3x larger
              - text: than Q4 or MXFP4, while decode speed was less than half and long-prompt throughput was far behind.
            - separator: · · ·
            - heading "What the Numbers Mean in Real Use" [level=1] [ref=e290]
            - paragraph [ref=e291]: Decode speed is the number people usually notice first. It controls how fast text appears once the model starts answering.
            - paragraph [ref=e292]:
              - text: At roughly
              - strong [ref=e293]: 65 tok/s
              - text: ", both Q4 and MXFP4 feel interactive. They are fast enough for local chat, coding loops, short analysis, and tool-using agents where the model may need to produce many short responses."
            - paragraph [ref=e294]:
              - text: BF16 at roughly
              - strong [ref=e295]: 29 tok/s
              - text: is not unusable, but it feels like a reference mode. It is the mode I would use to sanity-check quantization behavior, not the mode I would leave running for daily work.
            - paragraph [ref=e296]: The larger story is prompt ingestion.
            - paragraph [ref=e297]: "RAG and agent systems do not spend all their time generating polished prose. They spend a lot of time reading:"
            - list [ref=e298]:
              - listitem [ref=e299]: Retrieved chunks
              - listitem [ref=e300]: Instructions
              - listitem [ref=e301]: Prior conversation turns
              - listitem [ref=e302]: Tool outputs
              - listitem [ref=e303]: JSON schemas
              - listitem [ref=e304]: Scratchpads
              - listitem [ref=e305]: Agent state
            - paragraph [ref=e306]: If the prompt is 8K tokens, the model has to ingest that context before it can answer. That is where the tuned Q4 and MXFP4 runs pulled away from BF16.
            - paragraph [ref=e307]: "In plain English:"
            - list [ref=e308]:
              - listitem [ref=e309]: Chat feels better when decode is high.
              - listitem [ref=e310]: RAG feels better when prompt / prefill is high.
              - listitem [ref=e311]: Agents feel better when both are high, because every step compounds latency.
            - paragraph [ref=e312]: That is why I would not pick a local quant based on decode speed alone.
            - separator: · · ·
