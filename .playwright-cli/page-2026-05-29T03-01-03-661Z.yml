            - paragraph [ref=e481]: This is not an apples-to-apples benchmark suite. The Gemma 4 article used Ollama practical workloads, while this Qwen3.6 run used llama.cpp sweep profiles and lm-eval samples.
            - paragraph [ref=e482]: "Still, the direction is clear: Qwen3.6’s local throughput is strong enough that the bottleneck moves from:"
            - blockquote [ref=e483]:
              - paragraph [ref=e484]: Can I run it?
            - paragraph [ref=e485]: "to:"
            - blockquote [ref=e486]:
              - paragraph [ref=e487]: Which settings match my workload?
            - paragraph [ref=e488]: "The lesson is similar across both articles: mixture-of-experts models are a very good fit for GB10-class local inference. Dense BF16 runs are useful for reference, but the practical daily drivers are quantized MoE variants."
            - separator: · · ·
            - heading "What Surprised Me" [level=1] [ref=e489]
            - heading "BF16 Fit, But I Would Not Use It Day to Day" [level=2] [ref=e490]
            - paragraph [ref=e491]: The machine can load the BF16 GGUF. That is impressive.
            - paragraph [ref=e492]: But the throughput gap is too large. BF16 was roughly 65 GB on disk and only reached 29.5 tok/s decode. For most local work, I would rather run Q4 or MXFP4 and spend the saved memory on context, parallel services, embeddings, OCR, or other parts of the stack.
            - heading "Q8 Did Not Earn Its Extra 14 GB" [level=2] [ref=e493]
            - paragraph [ref=e494]: Q8_0 was larger than Q4/MXFP4 and slower in the performance sweep.
            - paragraph [ref=e495]: Without a stronger quality result, it is hard to recommend. I would only reach for it if a specific task shows Q4 or MXFP4 making mistakes that Q8 avoids.
            - heading "Q4 Beat MXFP4 in the Quality Samples" [level=2] [ref=e496]
            - paragraph [ref=e497]: I expected MXFP4 to be the speed pick and Q4 to be the conservative pick.
            - paragraph [ref=e498]: The performance data mostly supports that. What I did not expect was Q4 beating MXFP4 on both GSM8K and IFEval samples while still matching it on decode speed.
            - paragraph [ref=e499]: That is why Q4 is my default recommendation.
            - heading "IFEval Is Expensive Locally" [level=2] [ref=e500]
            - paragraph [ref=e501]: GSM8K-100 finished quickly. IFEval was a different story.
            - paragraph [ref=e502]: A full IFEval-100 attempt had many examples taking 60–120+ seconds, and some took several minutes. The IFEval-25 runs were enough for a sample check, but full IFEval is an overnight job.
            - paragraph [ref=e503]: "That is useful information if you are building your own benchmark loop:"
            - list [ref=e504]:
              - listitem [ref=e505]: Run GSM8K-style checks often.
              - listitem [ref=e506]: Run IFEval less often.
              - listitem [ref=e507]: Run the full suite overnight.
