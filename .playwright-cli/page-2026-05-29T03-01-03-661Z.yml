            - paragraph [ref=e386]:
              - text: The most important practical result is that
              - strong [ref=e387]: Q4 and MXFP4 both sit in the sweet spot
              - text: ":"
            - list [ref=e388]:
              - listitem [ref=e389]: 21 GB on disk
              - listitem [ref=e390]: Roughly 65 tok/s decode
              - listitem [ref=e391]: Strongest long-prompt throughput
              - listitem [ref=e392]: Practical enough for daily local inference
            - heading "Q8 Did Not Justify Its Extra Footprint" [level=2] [ref=e393]
            - paragraph [ref=e394]: Q8_0 was larger than Q4 and MXFP4, but slower in the performance sweep.
            - paragraph [ref=e395]: It may still matter for sensitive workloads where a specific task proves that Q8 avoids mistakes made by lower-bit variants. But this benchmark does not justify Q8 as the default.
            - heading "Q5 Was Squeezed From Both Sides" [level=2] [ref=e396]
            - paragraph [ref=e397]: Q5 worked, but it landed in an awkward middle ground.
            - paragraph [ref=e398]: It was larger than Q4 and MXFP4, while also being slower than both. If you already have a specific reason to prefer Q5, it is usable. But if you are choosing from scratch, Q4 and MXFP4 are more compelling.
            - heading "BF16 Is a Reference Mode, Not a Daily Driver" [level=2] [ref=e399]
            - paragraph [ref=e400]: BF16 fitting in memory is useful. It gives you a reference point.
            - paragraph [ref=e401]: But for practical local use, the cost is too high. It is much larger, much slower, and far behind on long-prompt workloads.
            - separator: · · ·
