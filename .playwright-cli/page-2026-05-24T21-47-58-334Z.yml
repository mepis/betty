            - paragraph [ref=e121]: Biological systems do not retain a perfect record of every muscle movement used to navigate a maze; they retain the learned map. Similarly, an agent exploring a codebase does not need to remember the 50 lines of ls -R output from ten minutes ago; it only needs to remember that “the config file is not in the /src directory.”
