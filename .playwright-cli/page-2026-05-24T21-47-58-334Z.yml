                      - text: •
                      - paragraph [ref=e141]: What was attempted?
                    - listitem [ref=e142]:
                      - text: •
                      - paragraph [ref=e144]: What was learned (facts, file paths, bugs)?
                    - listitem [ref=e145]:
                      - text: •
