            - paragraph [ref=e126]: "The Focus architecture introduces two primitives to the standard ReAct agent loop: start_focus and complete_focus. Crucially, the agent has full autonomy over when to invoke these tools—there are no external timers or heuristics forcing compression."
            - list [ref=e128]:
              - listitem [ref=e129]:
                - text: "1."
                - paragraph [ref=e131]: "Start Focus: The agent declares what it’s investigating (e.g., “Debug the database connection”). This marks a checkpoint in the conversation history."
              - listitem [ref=e132]:
                - text: "2."
                - paragraph [ref=e134]: "Explore: The agent uses standard tools (read, edit, run) to perform work."
              - listitem [ref=e135]:
                - text: "3."
                - generic [ref=e136]:
                  - paragraph [ref=e137]: "Consolidate: When the agent naturally completes the sub-task or hits a dead end, it decides to call complete_focus, generating a summary of:"
                  - list [ref=e138]:
