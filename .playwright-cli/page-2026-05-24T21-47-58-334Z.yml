          - paragraph [ref=e109]: Our Contribution. Unlike prior work, Focus enables intra-trajectory compression—the agent actively prunes its own history during a single task, preserving learnings in a structured knowledge block. This complements rather than replaces external memory approaches.
          - paragraph [ref=e111]: "Standard agents operate in an “Append-Only” mode: every thought, tool call, and system response is permanently added to the conversation history. This strategy works for short tasks but ensures failure for complex, open-ended exploration, as the agent inevitably hits the token limit or becomes confused by its own previous failures."
          - paragraph [ref=e113]: We propose a shift from Passive Retention to Active Compression. Inspired by the efficiency of Physarum polycephalum—a slime mold that explores environments and physically retracts from dead ends while leaving chemical markers to avoid re-exploration—we introduce the Focus Agent. This agent is equipped with the ability to introspect, summarize its recent trajectory into a high-level learning, and physically delete the raw logs of that trajectory from its immediate context.
