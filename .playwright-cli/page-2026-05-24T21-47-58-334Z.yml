                - text: Conceptual sawtooth pattern of context growth. Focus (blue) exhibits periodic compressions (drops) while Baseline (red) grows monotonically. With aggressive prompting, Focus compresses every 10-15 tool calls, preventing context bloat while preserving learnings in a persistent Knowledge block.
          - generic [ref=e422]:
            - heading "IV-G Analysis" [level=3] [ref=e423]:
              - generic [ref=e424]: IV-G
              - text: Analysis
            - paragraph [ref=e426]: "Aggressive Prompting Eliminates the Accuracy Trade-off: Our earlier experiments with passive Focus prompting showed accuracy degradation (60% vs. 80%). With aggressive prompting enforcing structured, frequent compressions, Focus matches Baseline accuracy (60% = 60%) while achieving 22.7% token savings. The key insight: when and how often to compress matters more than whether to compress. Frequent small compressions (every 10-15 calls) preserve recent context while discarding stale exploration logs, whereas infrequent large compressions risk losing critical implementation details."
            - paragraph [ref=e428]: "Exploration-Heavy Tasks Benefit Most: Token savings correlated with exploration complexity. Instances requiring extensive codebase navigation (matplotlib, sympy) showed 50-57% savings, as Focus efficiently compressed verbose directory listings, file contents, and failed attempts. Conversely, pylint-7080 required iterative refinement where prior context remained relevant, causing compression overhead to exceed benefits. This suggests Focus is most valuable for tasks with distinct explore/implement phases rather than tasks requiring continuous state accumulation."
            - paragraph [ref=e430]: "Prompting Strategy is Critical: The 22.7% savings required explicit prompting to “compress every 10-15 tool calls” and system-injected reminders. Without these, Claude Haiku 4.5 compressed only 2.0 times per task with 6% savings. This indicates that current LLMs do not naturally optimize for context efficiency—they require scaffolding that makes compression a first-class part of the workflow. Future work could explore fine-tuning or reinforcement learning to internalize compression heuristics."
        - generic [ref=e431]:
          - heading "V Discussion" [level=2] [ref=e432]:
            - generic [ref=e433]: V
            - text: Discussion
          - generic [ref=e434]:
            - heading "V-A The Cognitive Tax of Compression" [level=3] [ref=e435]:
              - generic [ref=e436]: V-A
              - text: The Cognitive Tax of Compression
            - paragraph [ref=e438]: "Active compression introduces a “cognitive tax”—the tokens spent generating summaries and the overhead of managing focus phases. Despite this tax, Focus achieved 22.7% net token savings across our experiments. The tax is amortized over the task lifetime: each compression costs a few hundred tokens but saves thousands by not re-processing stale history. For tasks with 50+ tool calls (common in SWE-bench), this amortization strongly favors compression."
          - generic [ref=e439]:
            - heading "V-B Prompting vs. Fine-Tuning" [level=3] [ref=e440]:
              - generic [ref=e441]: V-B
              - text: Prompting vs. Fine-Tuning
            - paragraph [ref=e443]: "Our results required aggressive prompting (“compress every 10-15 calls”, system reminders). This raises the question: could LLMs learn to compress optimally without explicit instructions? Current models appear to lack intrinsic cost-awareness—they do not naturally optimize for token efficiency. Future work could explore: (1) fine-tuning on compression-annotated trajectories, (2) reinforcement learning with token-cost penalties, or (3) constitutional AI approaches that embed efficiency preferences."
          - generic [ref=e444]:
            - heading "V-C Limitations" [level=3] [ref=e445]:
              - generic [ref=e446]: V-C
              - text: Limitations
            - list [ref=e448]:
              - listitem [ref=e449]:
                - text: "1."
                - paragraph [ref=e451]: "Sample Size: Our evaluation uses N=5 hard instances. While sufficient to demonstrate feasibility and measure token savings, validation on the full SWE-bench Lite benchmark (N=300) is needed to characterize which task types benefit most from compression."
              - listitem [ref=e452]:
                - text: "2."
                - paragraph [ref=e454]: "Task-Dependent Benefits: Focus showed 50-57% savings on exploration-heavy tasks but 110% overhead on one iterative refinement task. Identifying task characteristics that predict compression benefit remains future work."
              - listitem [ref=e455]:
                - text: "3."
                - paragraph [ref=e457]: "Model Generalization: We evaluated Claude Haiku 4.5. Whether GPT-4, Gemini, or open-source models exhibit similar compression behavior is unknown. The aggressive prompting strategy may need model-specific tuning."
              - listitem [ref=e458]:
                - text: "4."
                - paragraph [ref=e460]: "Scaffold Dependence: Our results use an optimized two-tool scaffold (bash + str_replace_editor). Different tool configurations may show different compression patterns."
        - generic [ref=e461]:
          - heading "VI Conclusion" [level=2] [ref=e462]:
            - generic [ref=e463]: VI
            - text: Conclusion
          - paragraph [ref=e465]: "We have demonstrated that aggressive, model-controlled context compression can achieve significant token savings without sacrificing task accuracy:"
          - list [ref=e467]:
            - listitem [ref=e468]:
              - text: "1."
              - paragraph [ref=e470]: "22.7% Token Savings with Equal Accuracy: On 5 context-intensive SWE-bench instances, Focus reduced total tokens from 14.9M to 11.5M while matching Baseline accuracy (3/5 = 60%). This contradicts the assumed accuracy-efficiency trade-off—with proper prompting, compression improves efficiency without hurting performance."
            - listitem [ref=e471]:
              - text: "2."
              - paragraph [ref=e473]: "Aggressive Prompting is Key: Passive prompting yielded only 6% savings and accuracy degradation. Explicit instructions to compress every 10-15 tool calls, combined with system reminders, increased compressions from 2.0 to 6.0 per task and enabled the 22.7% savings. Current LLMs require scaffolding to optimize for context efficiency."
            - listitem [ref=e474]:
              - text: "3."
              - paragraph [ref=e476]: "Exploration-Heavy Tasks Benefit Most: Token savings ranged from 18% to 57% on 4/5 instances, with the largest savings on tasks requiring extensive codebase exploration. One iterative refinement task showed compression overhead exceeding benefits, suggesting Focus is best suited for explore-then-implement workflows."
          - paragraph [ref=e478]: The Focus architecture provides a practical, infrastructure-free approach to context management that operates entirely within the conversation. Combined with an optimized scaffold (persistent bash, string-replace editing), it offers a path toward cost-aware agentic systems. As context windows grow and agent tasks become more complex, active compression will become increasingly valuable for managing the quadratic cost growth inherent in autoregressive inference.
          - paragraph [ref=e480]: "Future Work: (1) Validation on full SWE-bench (N=300) to characterize task-type dependencies; (2) Fine-tuning or RL approaches to internalize compression heuristics without explicit prompting; (3) Structured compression that preserves specific artifacts (test outputs, diffs) rather than free-text summaries; (4) Cross-model evaluation (GPT-4, Gemini, open-source) to assess generalization."
