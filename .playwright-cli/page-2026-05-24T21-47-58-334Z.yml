                - paragraph [ref=e150]: "Withdraw: The system takes this summary, appends it to a persistent “Knowledge” block at the top of the context, and deletes all messages between the checkpoint and the current step."
            - paragraph [ref=e152]: This converts the context from a monotonically increasing log into a “Sawtooth” pattern, where context grows during exploration and collapses during consolidation. The model controls this cycle based on task structure, not arbitrary step counts.
